<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitt Konto | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #f58220; --primary-hover: #e67312; --primary-soft: rgba(245,130,32,.12); --dark: #0f172a; --muted:#64748b; --bg: #f8fafc; --border: #e2e8f0; --danger: #ef4444; --danger-soft: rgba(239,68,68,.10); --success:#16a34a; --surface:#ffffff; --radius-full:999px; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; padding: 20px; color: var(--dark); }
        .wrapper { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 250px 1fr; gap: 30px; }
        @media (max-width: 768px) { .wrapper { grid-template-columns: 1fr; } }
        .tab-btn { width: 100%; text-align: left; padding: 15px; cursor: pointer; border-radius: 12px; margin-bottom: 10px; font-weight: 700; background: white; border: 1px solid var(--border); transition:.25s ease; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-btn:hover { border-color: rgba(245,130,32,.45); transform: translateY(-1px); }
        .tab-btn.danger { color: var(--danger); border-color: rgba(239,68,68,.25); background: var(--danger-soft); }
        .tab-btn.danger:hover { background: var(--danger); color: white; }
        .panel-card { background:white; border:1px solid var(--border); border-radius:18px; padding:22px; margin-bottom:18px; }
        .panel-card h2 { margin-bottom:10px; font-size:24px; font-weight:900; }
        .panel-card p { color:var(--muted); line-height:1.7; font-weight:600; margin-bottom:12px; }
        .danger-zone { border:1px solid rgba(239,68,68,.35); background:linear-gradient(180deg,#fff,#fff7f7); }
        .danger-zone h2 { color:var(--danger); }
        .btn-danger { min-height:48px; border:none; border-radius:14px; background:var(--danger); color:white; padding:12px 18px; font-size:14px; font-weight:900; display:inline-flex; align-items:center; gap:9px; cursor:pointer; }
        .btn-danger:disabled { background:#cbd5e1; cursor:not-allowed; }
        .btn-light { min-height:44px; border:1px solid var(--border); border-radius:14px; background:white; color:var(--dark); padding:10px 15px; font-weight:900; cursor:pointer; }
        .account-line { display:grid; gap:8px; color:var(--muted); font-size:14px; font-weight:700; }
        .account-line strong { color:var(--dark); }
        .profile-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; margin-top:18px; }
        .profile-item { border:1px solid var(--border); background:var(--surface); border-radius:16px; padding:14px; }
        .profile-item span { display:block; color:var(--muted); font-size:12px; font-weight:800; margin-bottom:6px; }
        .profile-item strong { display:block; color:var(--dark); font-size:14px; font-weight:900; word-break:break-word; }
        .profile-avatar { width:70px; height:70px; border-radius:24px; display:grid; place-items:center; background:var(--primary-soft); color:var(--primary); font-size:28px; margin-bottom:14px; }
        @media (max-width: 640px) { .profile-grid { grid-template-columns:1fr; } }
        .ad-card { display: flex; align-items: center; gap: 15px; padding: 15px; background: white; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 15px; cursor: pointer; transition:.25s ease; }
        .ad-card:hover { transform: translateY(-1px); border-color: rgba(245,130,32,.45); }
        .ad-card img { width: 100px; height: 75px; object-fit: cover; border-radius: 10px; background:#f1f5f9; flex:0 0 100px; }
        .ad-card h4 { margin:0 0 6px; font-size:15px; font-weight:900; color:var(--dark); }
        .ad-card p { margin:0; font-size:13px; font-weight:800; color:var(--muted); }
        .ad-card small { display:block; margin-top:5px; color:#94a3b8; font-weight:700; }
        .ad-info { min-width:0; flex:1; }
        .btn-del { margin-left: auto; color: var(--danger); border: none; background: none; font-size: 20px; cursor: pointer; width:42px; height:42px; border-radius:50%; display:grid; place-items:center; }
        .btn-del:hover { background: var(--danger-soft); }
        .state-box { background:white; border:1px solid var(--border); border-radius:18px; padding:26px; color:var(--muted); font-weight:800; line-height:1.7; }
    </style>
</head>
<body>
<header style="margin-bottom:30px; display:flex; justify-content:space-between; align-items:center;">
    <a href="index.html" style="text-decoration:none; font-weight:900; color:var(--dark); font-size:24px;">BIL<span>HK</span></a>
</header>
<div class="wrapper">
    <div class="sidebar">
        <button class="tab-btn active" id="btnAds" type="button">Mina Annonser</button>
        <button class="tab-btn" id="btnFavs" type="button">Sparade Bilar</button>
        <button class="tab-btn" id="btnProfile" type="button">Min profil</button>
        <button class="tab-btn" id="btnMessages" type="button">Meddelanden</button>
        <button class="tab-btn" id="btnDashboard" type="button">Dashboard</button>
    </div>
    <main class="content" id="mainContent" aria-live="polite">Laddar...</main>
</div>

<script type="module">
    import { auth, db, storage } from './firebase-config.js';
    import {
        onAuthStateChanged,
        deleteUser,
        EmailAuthProvider,
        GoogleAuthProvider,
        reauthenticateWithCredential,
        reauthenticateWithPopup,
        signOut
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import {
        collection,
        query,
        where,
        getDocs,
        getDoc,
        deleteDoc,
        doc,
        writeBatch
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import {
        ref,
        deleteObject
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    const CONFIG = Object.freeze({
        ROUTES: {
            HOME: 'index.html',
            LOGIN: 'login.html',
            DETAILS: 'details.html',
            MESSAGES: 'messages.html',
            DASHBOARD: 'dashboard.html',
            PLACEHOLDER_IMAGE: 'placeholder.jpg'
        },
        COLLECTIONS: {
            CARS: 'cars',
            FAVORITES: 'favorites',
            CHATS: 'chats',
            USERS: 'users'
        },
        LIMITS: {
            BATCH_LIMIT: 450,
            DOC_ID_MAX_LENGTH: 160
        }
    });

    const state = {
        user: null,
        activeTab: 'ads',
        isDeletingAccount: false,
        isDeletingAd: false
    };

    const elements = {
        mainContent: document.getElementById('mainContent'),
        btnAds: document.getElementById('btnAds'),
        btnFavs: document.getElementById('btnFavs'),
        btnProfile: document.getElementById('btnProfile'),
        btnMessages: document.getElementById('btnMessages'),
        btnDashboard: document.getElementById('btnDashboard')
    };

    initializePage();

    function initializePage() {
        attachStaticEvents();
        observeAuthState();
    }

    function attachStaticEvents() {
        elements.btnAds.addEventListener('click', () => switchTab('ads'));
        elements.btnFavs.addEventListener('click', () => switchTab('favs'));
        elements.btnProfile.addEventListener('click', () => switchTab('profile'));
        elements.btnMessages.addEventListener('click', () => safeNavigate(CONFIG.ROUTES.MESSAGES));
        elements.btnDashboard.addEventListener('click', () => safeNavigate(CONFIG.ROUTES.DASHBOARD));
    }

    function observeAuthState() {
        onAuthStateChanged(auth, async (currentUser) => {
            if (!currentUser) {
                safeNavigate(CONFIG.ROUTES.LOGIN);
                return;
            }

            state.user = currentUser;
            await switchTab('ads');
        });
    }

    async function switchTab(tab) {
        if (!state.user) {
            return;
        }

        state.activeTab = tab;
        updateActiveTabUI(tab);

        if (tab === 'profile') {
            renderProfilePanel(elements.mainContent);
            return;
        }

        setLoadingState('Söker...');

        try {
            if (tab === 'ads') {
                await renderUserAds();
                return;
            }

            if (tab === 'favs') {
                await renderUserFavorites();
            }
        } catch (error) {
            console.error('[BILHK] Account tab load failed:', error);
            setErrorState('Kunde inte ladda innehållet. Kontrollera anslutningen och försök igen.');
        }
    }

    function updateActiveTabUI(tab) {
        elements.btnAds.classList.toggle('active', tab === 'ads');
        elements.btnFavs.classList.toggle('active', tab === 'favs');
        elements.btnProfile.classList.toggle('active', tab === 'profile');
    }

    async function renderUserAds() {
        const adsQuery = query(
            collection(db, CONFIG.COLLECTIONS.CARS),
            where('sellerId', '==', state.user.uid)
        );

        const snap = await getDocs(adsQuery);
        renderListHeader('Mina Annonser');

        if (snap.empty) {
            appendEmptyText('Hittade inget här. När du publicerar en annons visas den här.');
            return;
        }

        const fragment = document.createDocumentFragment();

        snap.docs.forEach((documentSnapshot) => {
            const car = normalizeCarData(documentSnapshot.id, documentSnapshot.data());
            fragment.appendChild(createCarListCard({
                car,
                mode: 'ads',
                sourceDocId: documentSnapshot.id
            }));
        });

        elements.mainContent.appendChild(fragment);
    }

    async function renderUserFavorites() {
        const favQuery = query(
            collection(db, CONFIG.COLLECTIONS.FAVORITES),
            where('userId', '==', state.user.uid)
        );

        const snap = await getDocs(favQuery);
        renderListHeader('Sparade Bilar');

        if (snap.empty) {
            appendEmptyText('Hittade inget här. Bilar du sparar visas här.');
            return;
        }

        const fragment = document.createDocumentFragment();

        snap.docs.forEach((documentSnapshot) => {
            const favorite = normalizeFavoriteData(documentSnapshot.id, documentSnapshot.data());
            fragment.appendChild(createCarListCard({
                car: favorite,
                mode: 'favs',
                sourceDocId: documentSnapshot.id
            }));
        });

        elements.mainContent.appendChild(fragment);
    }

    function renderListHeader(titleText) {
        clearElement(elements.mainContent);
        const title = document.createElement('h2');
        title.textContent = titleText;
        title.style.marginBottom = '18px';
        title.style.fontWeight = '900';
        elements.mainContent.appendChild(title);
    }

    function appendEmptyText(message) {
        const empty = document.createElement('div');
        empty.className = 'state-box';
        empty.textContent = message;
        elements.mainContent.appendChild(empty);
    }

    function setLoadingState(message) {
        clearElement(elements.mainContent);
        const loading = document.createElement('div');
        loading.className = 'state-box';
        loading.textContent = message;
        elements.mainContent.appendChild(loading);
    }

    function setErrorState(message) {
        clearElement(elements.mainContent);
        const error = document.createElement('div');
        error.className = 'state-box';
        error.style.color = '#ef4444';
        error.textContent = message;
        elements.mainContent.appendChild(error);
    }

    function createCarListCard({ car, mode, sourceDocId }) {
        const card = document.createElement('article');
        card.className = 'ad-card';
        card.tabIndex = 0;
        card.setAttribute('role', 'link');
        card.setAttribute('aria-label', `Visa detaljer för ${buildCarTitle(car)}`);

        const carId = normalizeDocumentId(car.id);

        card.addEventListener('click', () => navigateToDetails(carId));
        card.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault();
                navigateToDetails(carId);
            }
        });

        const image = document.createElement('img');
        image.src = getSafeImageURL(car.image);
        image.alt = `Bilbild för ${buildCarTitle(car)}`;
        image.loading = 'lazy';
        image.decoding = 'async';
        image.addEventListener('error', () => {
            image.src = CONFIG.ROUTES.PLACEHOLDER_IMAGE;
        });

        const info = document.createElement('div');
        info.className = 'ad-info';

        const title = document.createElement('h4');
        title.textContent = buildCarTitle(car);

        const price = document.createElement('p');
        price.textContent = `${formatPrice(car.price)}${mode === 'favs' ? '' : ''}`;

        const meta = document.createElement('small');
        meta.textContent = buildCarMeta(car);

        info.append(title, price, meta);
        card.append(image, info);

        if (mode === 'ads') {
            const deleteButton = document.createElement('button');
            deleteButton.type = 'button';
            deleteButton.className = 'btn-del';
            deleteButton.setAttribute('aria-label', 'Radera annons');
            const icon = document.createElement('i');
            icon.className = 'fa-solid fa-trash';
            deleteButton.appendChild(icon);
            deleteButton.addEventListener('click', (event) => {
                event.stopPropagation();
                handleDeleteAd(sourceDocId);
            });
            card.appendChild(deleteButton);
        }

        if (mode === 'favs') {
            const removeFavoriteButton = document.createElement('button');
            removeFavoriteButton.type = 'button';
            removeFavoriteButton.className = 'btn-del';
            removeFavoriteButton.setAttribute('aria-label', 'Ta bort från sparade bilar');
            removeFavoriteButton.title = 'Ta bort från sparade bilar';
            const icon = document.createElement('i');
            icon.className = 'fa-solid fa-trash';
            removeFavoriteButton.appendChild(icon);
            removeFavoriteButton.addEventListener('click', (event) => {
                event.stopPropagation();
                handleRemoveFavorite(sourceDocId, carId);
            });
            card.appendChild(removeFavoriteButton);
        }

        return card;
    }

    async function handleRemoveFavorite(favoriteId, carId) {
        if (!state.user) {
            return;
        }

        const safeFavoriteId = normalizeDocumentId(favoriteId) || normalizeDocumentId(`${state.user.uid}_${carId}`);

        if (!safeFavoriteId) {
            await Swal.fire({
                icon: 'error',
                title: 'Kunde inte ta bort bilen',
                text: 'Favoritens ID saknas.',
                confirmButtonColor: '#f58220'
            });
            return;
        }

        const result = await Swal.fire({
            title: 'Ta bort från sparade?',
            text: 'Bilen tas bara bort från din favoritlista. Annonsen påverkas inte.',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'Ja, ta bort',
            cancelButtonText: 'Avbryt',
            confirmButtonColor: '#ef4444'
        });

        if (!result.isConfirmed) {
            return;
        }

        try {
            await deleteDoc(doc(db, CONFIG.COLLECTIONS.FAVORITES, safeFavoriteId));
            await Swal.fire({
                icon: 'success',
                title: 'Borttagen från sparade',
                confirmButtonColor: '#f58220',
                timer: 1300,
                showConfirmButton: false
            });
            await renderUserFavorites();
        } catch (error) {
            console.error('[BILHK] Remove favorite failed:', error);
            await Swal.fire({
                icon: 'error',
                title: 'Kunde inte ta bort bilen',
                text: getReadableDataError(error),
                confirmButtonColor: '#f58220'
            });
        }
    }

    async function handleDeleteAd(carId) {
        const safeCarId = normalizeDocumentId(carId);

        if (!safeCarId || state.isDeletingAd || !state.user) {
            return;
        }

        const result = await Swal.fire({
            title: 'Radera annons?',
            text: 'Annonsen, kopplade favoriter och kopplade konversationer tas bort.',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'Ja, radera',
            cancelButtonText: 'Avbryt',
            confirmButtonColor: '#ef4444'
        });

        if (!result.isConfirmed) {
            return;
        }

        try {
            state.isDeletingAd = true;
            await deleteCarWithRelatedData(safeCarId);
            await Swal.fire({
                icon: 'success',
                title: 'Annonsen är raderad',
                confirmButtonColor: '#f58220'
            });
            await switchTab('ads');
        } catch (error) {
            console.error('[BILHK] Delete ad failed:', error);
            Swal.fire({
                icon: 'error',
                title: 'Kunde inte radera annonsen',
                text: getReadableDataError(error),
                confirmButtonColor: '#f58220'
            });
        } finally {
            state.isDeletingAd = false;
        }
    }

    function renderProfilePanel(container) {
        clearElement(container);

        const providerLabels = getCurrentUserProviderLabels();
        const emailVerifiedText = state.user?.emailVerified ? 'Verifierad' : 'Inte verifierad';
        const createdAtText = state.user?.metadata?.creationTime ? formatDateTime(state.user.metadata.creationTime) : 'Okänt';
        const lastLoginText = state.user?.metadata?.lastSignInTime ? formatDateTime(state.user.metadata.lastSignInTime) : 'Okänt';
        const displayName = state.user?.displayName || 'Inte angivet';
        const email = state.user?.email || 'Ingen e-post registrerad';

        const profileCard = document.createElement('section');
        profileCard.className = 'panel-card';

        const avatar = document.createElement('div');
        avatar.className = 'profile-avatar';
        const avatarIcon = document.createElement('i');
        avatarIcon.className = 'fa-solid fa-user';
        avatar.appendChild(avatarIcon);

        const title = document.createElement('h2');
        title.textContent = 'Min profil';

        const intro = document.createElement('p');
        intro.textContent = 'Här visas kontouppgifter för den inloggade användaren. Alternativet för permanent radering finns längst ned i profilen.';

        const grid = document.createElement('div');
        grid.className = 'profile-grid';

        [
            ['E-post', email],
            ['Namn', displayName],
            ['Verifiering', emailVerifiedText],
            ['Inloggningsmetod', providerLabels],
            ['Skapad', createdAtText],
            ['Senaste inloggning', lastLoginText]
        ].forEach(([label, value]) => {
            grid.appendChild(createProfileItem(label, value));
        });

        profileCard.append(avatar, title, intro, grid);

        const dangerCard = document.createElement('section');
        dangerCard.className = 'panel-card danger-zone';

        const dangerTitle = document.createElement('h2');
        const dangerIcon = document.createElement('i');
        dangerIcon.className = 'fa-solid fa-triangle-exclamation';
        dangerTitle.append(dangerIcon, document.createTextNode(' Ta bort konto permanent'));

        const p1 = document.createElement('p');
        p1.textContent = 'Det här alternativet finns inne i profilen för att användaren tydligt ska se vilket konto som raderas.';
        const p2 = document.createElement('p');
        p2.textContent = 'När du trycker på knappen visas en varning först. Efter det måste du bekräfta med din e-postadress. Om kontot är skapat med e-post och lösenord måste lösenordet anges igen. Om kontot är skapat med Google måste Google-bekräftelse genomföras.';
        const p3 = document.createElement('p');
        p3.append(createStrongText('Viktigt:'), document.createTextNode(' raderingen försöker ta bort dina annonser, sparade bilar och konversationer kopplade till kontot innan själva Firebase-kontot tas bort. Detta går inte att ångra.'));

        const accountLine = document.createElement('div');
        accountLine.className = 'account-line';
        accountLine.append(
            createAccountLine('Inloggad användare:', state.user?.email || 'Okänd användare'),
            createAccountLine('Användar-ID:', state.user?.uid || '')
        );

        const br = document.createElement('br');
        const deleteButton = document.createElement('button');
        deleteButton.className = 'btn-danger';
        deleteButton.id = 'deleteAccountPermanentBtn';
        deleteButton.type = 'button';
        deleteButton.append(createIcon('fa-solid fa-user-xmark'), document.createTextNode(' Ta bort mitt konto permanent'));
        deleteButton.addEventListener('click', handlePermanentAccountDeletion);

        dangerCard.append(dangerTitle, p1, p2, p3, accountLine, br, deleteButton);
        container.append(profileCard, dangerCard);
    }

    function createProfileItem(labelText, valueText) {
        const item = document.createElement('div');
        item.className = 'profile-item';
        const label = document.createElement('span');
        label.textContent = labelText;
        const value = document.createElement('strong');
        value.textContent = valueText;
        item.append(label, value);
        return item;
    }

    function createAccountLine(labelText, valueText) {
        const line = document.createElement('span');
        const strong = createStrongText(labelText);
        line.append(strong, document.createTextNode(` ${valueText}`));
        return line;
    }

    async function handlePermanentAccountDeletion() {
        if (state.isDeletingAccount || !state.user) {
            return;
        }

        const firstConfirm = await Swal.fire({
            icon: 'warning',
            title: 'Ta bort konto permanent?',
            html: 'Kontot, dina annonser och dina konversationer kommer att tas bort. <b>Detta går inte att ångra.</b>',
            showCancelButton: true,
            confirmButtonText: 'Fortsätt',
            cancelButtonText: 'Avbryt',
            confirmButtonColor: '#ef4444'
        });

        if (!firstConfirm.isConfirmed) {
            return;
        }

        const expectedEmail = String(state.user?.email || '').trim().toLowerCase();

        const typedConfirm = await Swal.fire({
            icon: 'error',
            title: 'Bekräfta med e-post',
            input: 'email',
            inputLabel: 'Skriv kontots e-postadress för att bekräfta permanent radering',
            inputPlaceholder: expectedEmail || 'din e-postadress',
            showCancelButton: true,
            confirmButtonText: 'Bekräfta och fortsätt',
            cancelButtonText: 'Avbryt',
            confirmButtonColor: '#ef4444',
            inputValidator: (value) => {
                const typedEmail = String(value || '').trim().toLowerCase();

                if (!typedEmail) {
                    return 'E-postadress krävs.';
                }

                if (expectedEmail && typedEmail !== expectedEmail) {
                    return 'E-postadressen matchar inte kontot som är inloggat.';
                }

                return null;
            }
        });

        if (!typedConfirm.isConfirmed) {
            return;
        }

        try {
            state.isDeletingAccount = true;
            setDeleteAccountButtonLoading(true);

            await reauthenticateCurrentUser();
            await deleteAllUserRelatedData(state.user.uid);
            await deleteUser(state.user);

            await Swal.fire({
                icon: 'success',
                title: 'Kontot är borttaget',
                text: 'Ditt konto har raderats permanent.',
                confirmButtonColor: '#f58220'
            });

            safeNavigate(CONFIG.ROUTES.HOME);
        } catch (error) {
            console.error('Permanent account deletion error:', error);
            state.isDeletingAccount = false;
            setDeleteAccountButtonLoading(false);

            Swal.fire({
                icon: 'error',
                title: 'Kunde inte ta bort kontot',
                text: getReadableDeleteAccountError(error),
                confirmButtonColor: '#f58220'
            });
        }
    }

    function setDeleteAccountButtonLoading(isLoading) {
        const deleteButton = document.getElementById('deleteAccountPermanentBtn');

        if (!deleteButton) {
            return;
        }

        deleteButton.disabled = isLoading;
        clearElement(deleteButton);

        if (isLoading) {
            deleteButton.append(createIcon('fa-solid fa-spinner fa-spin'), document.createTextNode(' Raderar konto...'));
        } else {
            deleteButton.append(createIcon('fa-solid fa-user-xmark'), document.createTextNode(' Ta bort mitt konto permanent'));
        }
    }

    async function reauthenticateCurrentUser() {
        const currentUser = auth.currentUser;

        if (!currentUser) {
            throw new Error('Du är inte inloggad. Logga in igen och försök på nytt.');
        }

        const providers = currentUser.providerData.map((provider) => provider.providerId);

        if (providers.includes('password')) {
            const passwordPrompt = await Swal.fire({
                icon: 'question',
                title: 'Bekräfta lösenord',
                input: 'password',
                inputLabel: 'Ange ditt lösenord för att fortsätta',
                inputPlaceholder: 'Lösenord',
                showCancelButton: true,
                confirmButtonText: 'Bekräfta',
                cancelButtonText: 'Avbryt',
                confirmButtonColor: '#f58220',
                inputValidator: (value) => {
                    if (!value) {
                        return 'Lösenord krävs.';
                    }
                    return null;
                }
            });

            if (!passwordPrompt.isConfirmed) {
                throw new Error('Åtgärden avbröts.');
            }

            const credential = EmailAuthProvider.credential(currentUser.email, passwordPrompt.value);
            await reauthenticateWithCredential(currentUser, credential);
            return;
        }

        if (providers.includes('google.com')) {
            const googleProvider = new GoogleAuthProvider();
            await reauthenticateWithPopup(currentUser, googleProvider);
            return;
        }

        throw new Error('Logga ut och logga in igen innan du tar bort kontot.');
    }

    async function deleteAllUserRelatedData(uid) {
        const safeUid = normalizeDocumentId(uid);

        if (!safeUid || safeUid !== uid) {
            throw new Error('Ogiltigt användar-ID.');
        }

        await deleteUserCars(safeUid);
        await deleteUserFavorites(safeUid);
        await deleteUserChats(safeUid);
        await safeDeleteDoc(CONFIG.COLLECTIONS.USERS, safeUid);
    }

    async function deleteUserCars(uid) {
        const carsQuery = query(collection(db, CONFIG.COLLECTIONS.CARS), where('sellerId', '==', uid));
        const carsSnapshot = await getDocs(carsQuery);

        for (const carDoc of carsSnapshot.docs) {
            await deleteCarWithRelatedData(carDoc.id, carDoc.data());
        }
    }

    async function deleteCarWithRelatedData(carId, existingCarData = null) {
        const safeCarId = normalizeDocumentId(carId);

        if (!safeCarId) {
            throw new Error('Ogiltigt annons-ID.');
        }

        let carData = existingCarData;

        if (!carData) {
            const carRef = doc(db, CONFIG.COLLECTIONS.CARS, safeCarId);
            const carSnap = await getDoc(carRef);

            if (!carSnap.exists()) {
                throw new Error('Annonsen hittades inte.');
            }

            carData = carSnap.data();
        }

        if (carData?.sellerId !== state.user?.uid) {
            throw new Error('Du kan bara radera dina egna annonser.');
        }

        await deleteCarImagesFromStorage(carData);
        await deleteChatsByCarId(safeCarId);
        await deleteFavoritesByCarId(safeCarId);
        await deleteDoc(doc(db, CONFIG.COLLECTIONS.CARS, safeCarId));
    }

    async function deleteCarImagesFromStorage(carData) {
        const imagePaths = new Set();

        if (Array.isArray(carData?.imageFiles)) {
            carData.imageFiles.forEach((image) => {
                const path = normalizeStoragePath(image?.path);
                if (path) {
                    imagePaths.add(path);
                }
            });
        }

        if (Array.isArray(carData?.imagesPaths)) {
            carData.imagesPaths.forEach((path) => {
                const normalizedPath = normalizeStoragePath(path);
                if (normalizedPath) {
                    imagePaths.add(normalizedPath);
                }
            });
        }

        for (const imagePath of imagePaths) {
            try {
                await deleteObject(ref(storage, imagePath));
            } catch (error) {
                console.warn('Could not delete storage image:', imagePath, error);
            }
        }
    }

    async function deleteChatsByCarId(carId) {
        const chatsQuery = query(collection(db, CONFIG.COLLECTIONS.CHATS), where('carId', '==', carId));
        const chatsSnapshot = await getDocs(chatsQuery);

        for (const chatDoc of chatsSnapshot.docs) {
            await deleteChatWithMessages(chatDoc.id);
        }
    }

    async function deleteUserChats(uid) {
        const participantQueries = [
            query(collection(db, CONFIG.COLLECTIONS.CHATS), where('participants', 'array-contains', uid)),
            query(collection(db, CONFIG.COLLECTIONS.CHATS), where('buyerId', '==', uid)),
            query(collection(db, CONFIG.COLLECTIONS.CHATS), where('sellerId', '==', uid))
        ];

        const chatIds = new Set();

        for (const chatQuery of participantQueries) {
            try {
                const snapshot = await getDocs(chatQuery);
                snapshot.forEach((chatDoc) => chatIds.add(chatDoc.id));
            } catch (error) {
                console.warn('Could not fetch chat query during account deletion:', error);
            }
        }

        for (const chatId of chatIds) {
            await deleteChatWithMessages(chatId);
        }
    }

    async function deleteChatWithMessages(chatId) {
        const safeChatId = normalizeDocumentId(chatId);

        if (!safeChatId) {
            return;
        }

        const messagesSnapshot = await getDocs(collection(db, `${CONFIG.COLLECTIONS.CHATS}/${safeChatId}/messages`));
        let batch = writeBatch(db);
        let operationCount = 0;

        for (const messageDoc of messagesSnapshot.docs) {
            batch.delete(messageDoc.ref);
            operationCount += 1;

            if (operationCount >= CONFIG.LIMITS.BATCH_LIMIT) {
                await batch.commit();
                batch = writeBatch(db);
                operationCount = 0;
            }
        }

        batch.delete(doc(db, CONFIG.COLLECTIONS.CHATS, safeChatId));
        operationCount += 1;

        if (operationCount > 0) {
            await batch.commit();
        }
    }

    async function deleteUserFavorites(uid) {
        const favoritesQuery = query(collection(db, CONFIG.COLLECTIONS.FAVORITES), where('userId', '==', uid));
        const favoritesSnapshot = await getDocs(favoritesQuery);
        await deleteSnapshotInBatches(favoritesSnapshot);
    }

    async function deleteFavoritesByCarId(carId) {
        const favoritesQuery = query(collection(db, CONFIG.COLLECTIONS.FAVORITES), where('carId', '==', carId));
        const favoritesSnapshot = await getDocs(favoritesQuery);
        await deleteSnapshotInBatches(favoritesSnapshot);
    }

    async function deleteSnapshotInBatches(snapshot) {
        let batch = writeBatch(db);
        let operationCount = 0;

        for (const documentSnapshot of snapshot.docs) {
            batch.delete(documentSnapshot.ref);
            operationCount += 1;

            if (operationCount >= CONFIG.LIMITS.BATCH_LIMIT) {
                await batch.commit();
                batch = writeBatch(db);
                operationCount = 0;
            }
        }

        if (operationCount > 0) {
            await batch.commit();
        }
    }

    async function safeDeleteDoc(collectionName, documentId) {
        const safeDocumentId = normalizeDocumentId(documentId);

        if (!safeDocumentId) {
            return;
        }

        try {
            await deleteDoc(doc(db, collectionName, safeDocumentId));
        } catch (error) {
            console.warn(`Could not delete ${collectionName}/${safeDocumentId}:`, error);
        }
    }

    function normalizeCarData(id, data) {
        const images = Array.isArray(data?.images) ? data.images : [];
        const imageFiles = Array.isArray(data?.imageFiles) ? data.imageFiles : [];
        const firstImageFromFiles = imageFiles.find((image) => image?.url)?.url || '';

        return {
            id: normalizeDocumentId(id),
            brand: normalizeText(data?.brand),
            model: normalizeText(data?.model),
            title: normalizeText(data?.title),
            year: toNullableNumber(data?.year),
            price: toNullableNumber(data?.price),
            mileage: toNullableNumber(data?.mileage),
            fuelType: normalizeText(data?.fuelType || data?.fuel),
            location: normalizeText(data?.location || data?.city || data?.stad),
            image: data?.mainImage || images[0] || firstImageFromFiles || CONFIG.ROUTES.PLACEHOLDER_IMAGE
        };
    }

    function normalizeFavoriteData(id, data) {
        return {
            id: normalizeDocumentId(data?.carId || id),
            brand: normalizeText(data?.brand),
            model: normalizeText(data?.model),
            title: normalizeText(data?.title),
            year: toNullableNumber(data?.year),
            price: toNullableNumber(data?.price),
            mileage: toNullableNumber(data?.mileage),
            fuelType: normalizeText(data?.fuelType || data?.fuel),
            location: normalizeText(data?.location),
            image: data?.image || data?.mainImage || CONFIG.ROUTES.PLACEHOLDER_IMAGE
        };
    }

    function buildCarTitle(car) {
        const parts = [car.brand, car.model].filter(Boolean);
        const base = parts.length ? parts.join(' ') : (car.title || 'Annons');
        return car.year ? `${base} ${car.year}` : base;
    }

    function buildCarMeta(car) {
        const values = [];

        if (car.mileage !== null) {
            values.push(`${formatNumber(car.mileage)} mil`);
        }

        if (car.fuelType) {
            values.push(car.fuelType);
        }

        if (car.location) {
            values.push(car.location);
        }

        return values.length ? values.join(' • ') : 'Detaljer saknas';
    }

    function formatPrice(value) {
        const number = Number(value);

        if (!Number.isFinite(number) || number <= 0) {
            return 'Pris saknas';
        }

        return `${formatNumber(number)} kr`;
    }

    function formatNumber(value) {
        const number = Number(value);
        return Number.isFinite(number) ? number.toLocaleString('sv-SE') : '';
    }

    function normalizeText(value) {
        return String(value ?? '')
            .replace(/[\u0000-\u001F\u007F]/g, ' ')
            .replace(/\s+/g, ' ')
            .trim();
    }

    function toNullableNumber(value) {
        const number = Number(value);
        return Number.isFinite(number) ? number : null;
    }

    function normalizeDocumentId(value) {
        const normalized = String(value ?? '').trim();

        if (!/^[A-Za-z0-9_-]{1,160}$/.test(normalized)) {
            return '';
        }

        return normalized;
    }

    function normalizeStoragePath(value) {
        const path = normalizeText(value);

        if (!path || path.includes('..') || path.startsWith('/') || path.includes('://')) {
            return '';
        }

        if (!/^cars\/[A-Za-z0-9_-]+\/[A-Za-z0-9_-]+\/[A-Za-z0-9_.-]+$/.test(path)) {
            return '';
        }

        return path;
    }

    function getSafeImageURL(value) {
        const url = normalizeText(value);

        if (!url) {
            return CONFIG.ROUTES.PLACEHOLDER_IMAGE;
        }

        if (url === CONFIG.ROUTES.PLACEHOLDER_IMAGE) {
            return url;
        }

        try {
            const parsedUrl = new URL(url, window.location.origin);
            const allowedProtocols = ['http:', 'https:'];

            if (!allowedProtocols.includes(parsedUrl.protocol)) {
                return CONFIG.ROUTES.PLACEHOLDER_IMAGE;
            }

            return parsedUrl.href;
        } catch {
            return CONFIG.ROUTES.PLACEHOLDER_IMAGE;
        }
    }

    function navigateToDetails(carId) {
        const safeCarId = normalizeDocumentId(carId);

        if (!safeCarId) {
            return;
        }

        safeNavigate(`${CONFIG.ROUTES.DETAILS}?id=${encodeURIComponent(safeCarId)}`);
    }

    function safeNavigate(relativeUrl) {
        const target = normalizeText(relativeUrl);

        try {
            const url = new URL(target, window.location.origin);

            if (url.origin !== window.location.origin) {
                return;
            }

            window.location.href = `${url.pathname.replace(/^\//, '')}${url.search}${url.hash}`;
        } catch {
            window.location.href = CONFIG.ROUTES.HOME;
        }
    }

    function getReadableDeleteAccountError(error) {
        const code = error?.code || '';

        if (code === 'auth/requires-recent-login') {
            return 'Firebase kräver ny inloggning. Logga ut, logga in igen och försök sedan ta bort kontot.';
        }

        if (code === 'auth/wrong-password' || code === 'auth/invalid-credential') {
            return 'Lösenordet stämmer inte. Försök igen.';
        }

        if (code === 'auth/popup-closed-by-user' || code === 'auth/cancelled-popup-request') {
            return 'Google-bekräftelsen avbröts. Försök igen.';
        }

        return error?.message || 'Ett oväntat fel uppstod. Försök igen.';
    }

    function getReadableDataError(error) {
        const code = error?.code || '';

        if (code === 'permission-denied') {
            return 'Du saknar behörighet. Kontrollera Firestore Rules och att annonsen tillhör ditt konto.';
        }

        return error?.message || 'Ett oväntat fel uppstod.';
    }

    function getCurrentUserProviderLabels() {
        const providers = (state.user?.providerData || []).map((provider) => provider.providerId);
        const labels = providers.map((providerId) => {
            if (providerId === 'password') {
                return 'E-post och lösenord';
            }

            if (providerId === 'google.com') {
                return 'Google';
            }

            return providerId;
        });

        return labels.length ? labels.join(', ') : 'Okänd';
    }

    function formatDateTime(value) {
        try {
            return new Intl.DateTimeFormat('sv-SE', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            }).format(new Date(value));
        } catch {
            return 'Okänt';
        }
    }

    function createIcon(className) {
        const icon = document.createElement('i');
        icon.className = className;
        return icon;
    }

    function createStrongText(text) {
        const strong = document.createElement('strong');
        strong.textContent = text;
        return strong;
    }

    function clearElement(element) {
        while (element.firstChild) {
            element.removeChild(element.firstChild);
        }
    }

    window.addEventListener('error', (event) => {
        console.error('[BILHK] Global error:', event.error || event.message);
    });

    window.addEventListener('unhandledrejection', (event) => {
        console.error('[BILHK] Unhandled rejection:', event.reason);
    });
</script>
</body>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعلاناتي | BilMarknad-HK</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #0056b3; --danger: #dc3545; --bg: #f4f4f4; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .header-dash { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .car-item { background: #fff; padding: 15px; border-radius: 10px; display: flex; align-items: center; gap: 20px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .car-item img { width: 100px; height: 70px; object-fit: cover; border-radius: 5px; }
        .car-info { flex-grow: 1; }
        .btn-delete { background: var(--danger); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .btn-add { background: var(--primary); color: white; text-decoration: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-dash">
        <h1>إعلاناتي (Mina annonser)</h1>
        <a href="add-car.html" class="btn-add">+ إضافة إعلان جديد</a>
    </div>

    <div id="myCarsList">جاري تحميل إعلاناتك...</div>
</div>

<script>
    // ضع إعدادات Firebase الخاصة بك هنا
    const firebaseConfig = { /* بياناتك هنا */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    auth.onAuthStateChanged((user) => {
        if (user) {
            loadUserCars(user.uid);
        } else {
            window.location.href = "login.html";
        }
    });

    async function loadUserCars(userId) {
        const listDiv = document.getElementById('myCarsList');
        try {
            // جلب الإعلانات الخاصة بهذا المستخدم فقط
            const snapshot = await db.collection("cars").where("sellerId", "==", userId).get();
            
            if (snapshot.empty) {
                listDiv.innerHTML = "<p>ليس لديك إعلانات حالياً.</p>";
                return;
            }

            listDiv.innerHTML = "";
            snapshot.forEach((doc) => {
                const car = doc.data();
                listDiv.innerHTML += `
                    <div class="car-item" id="doc-${doc.id}">
                        <img src="${car.images[0]}" alt="car">
                        <div class="car-info">
                            <h3>${car.title}</h3>
                            <p>${car.price} SEK</p>
                        </div>
                        <button class="btn-delete" onclick="deleteCar('${doc.id}')">حذف الإعلان</button>
                    </div>
                `;
            });
        } catch (error) {
            listDiv.innerHTML = "حدث خطأ أثناء تحميل البيانات.";
        }
    }

    async function deleteCar(docId) {
        if (confirm("هل أنت متأكد من حذف هذا الإعلان نهائياً؟")) {
            try {
                await db.collection("cars").doc(docId).delete();
                document.getElementById(`doc-${docId}`).remove();
                alert("تم الحذف بنجاح");
            } catch (error) {
                alert("خطأ في الحذف: " + error.message);
            }
        }
    }
</script>
</body>
</html>

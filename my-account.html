<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitt Konto | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; --danger: #ef4444; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; padding: 20px; }
        .wrapper { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 250px 1fr; gap: 30px; }
        @media (max-width: 768px) { .wrapper { grid-template-columns: 1fr; } }
        .tab-btn { width: 100%; text-align: left; padding: 15px; cursor: pointer; border-radius: 12px; margin-bottom: 10px; font-weight: 700; background: white; border: 1px solid var(--border); }
        .tab-btn.active { background: var(--primary); color: white; }
        .ad-card { display: flex; align-items: center; gap: 15px; padding: 15px; background: white; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 15px; cursor: pointer; }
        .ad-card img { width: 100px; height: 75px; object-fit: cover; border-radius: 10px; }
        .btn-del { margin-left: auto; color: var(--danger); border: none; background: none; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>
<header style="margin-bottom:30px; display:flex; justify-content:space-between; align-items:center;">
    <a href="index.html" style="text-decoration:none; font-weight:900; color:var(--dark); font-size:24px;">BIL<span>HK</span></a>
</header>
<div class="wrapper">
    <div class="sidebar">
        <button class="tab-btn active" id="btnAds" onclick="switchTab('ads')">Mina Annonser</button>
        <button class="tab-btn" id="btnFavs" onclick="switchTab('favs')">Sparade Bilar</button>
        <button class="tab-btn" onclick="window.location.href='messages.html'">Meddelanden</button>
        <button class="tab-btn" onclick="window.location.href='dashboard.html'">Dashboard</button>
    </div>
    <div class="content" id="mainContent">Laddar...</div>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { collection, query, where, getDocs, deleteDoc, doc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let user = null;
    onAuthStateChanged(auth, u => { if(u) { user = u; switchTab('ads'); } else { window.location.href="login.html"; } });

    window.switchTab = async (tab) => {
        document.getElementById('btnAds').classList.toggle('active', tab === 'ads');
        document.getElementById('btnFavs').classList.toggle('active', tab === 'favs');
        const container = document.getElementById('mainContent');
        container.innerHTML = "Söker...";

        const col = tab === 'ads' ? 'cars' : 'favorites';
        const key = tab === 'ads' ? 'sellerId' : 'userId';
        const q = query(collection(db, col), where(key, "==", user.uid));
        const snap = await getDocs(q);

        container.innerHTML = `<h2>${tab === 'ads' ? 'Mina Annonser' : 'Sparade Bilar'}</h2>`;
        if (snap.empty) { container.innerHTML += "<p>Hittade inget här.</p>"; return; }
        
        snap.forEach(d => {
            const data = d.data();
            const carId = tab === 'ads' ? d.id : data.carId;
            const img = tab === 'ads' ? data.images[0] : data.image;
            const div = document.createElement('div');
            div.className = "ad-card";
            div.onclick = () => window.location.href = `details.html?id=${carId}`;
            div.innerHTML = `<img src="${img}"><div><h4>${data.brand}</h4><p>${data.price} kr</p></div>
                ${tab === 'ads' ? `<button class="btn-del" onclick="event.stopPropagation(); deleteAd('${d.id}')"><i class="fa-solid fa-trash"></i></button>` : ''}`;
            container.appendChild(div);
        });
    };

    window.deleteAd = async (id) => {
        const res = await Swal.fire({ title: 'Radera annons?', showCancelButton: true });
        if(res.isConfirmed) {
            await deleteDoc(doc(db, "cars", id));
            const q = query(collection(db, "chats"), where("carId", "==", id));
            const cSnap = await getDocs(q);
            const batch = writeBatch(db);
            for(let c of cSnap.docs) {
                const ms = await getDocs(collection(db, `chats/${c.id}/messages`));
                ms.forEach(m => batch.delete(m.ref));
                batch.delete(c.ref);
            }
            await batch.commit();
            location.reload();
        }
    };
</script>
</body>
</html>

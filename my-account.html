<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Min Sida | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f0f2f5; --border: #e2e8f0; }
        
        /* ضبط الارتفاع ليتناسب مع شاشات الأندرويد ولوحة المفاتيح */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        header { height: 60px; background: white; padding: 0 5%; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .logo { text-decoration: none; font-size: 22px; font-weight: 900; color: var(--dark); }
        .logo span { color: var(--primary); }

        /* نظام التبويب - متوافق مع اللمس */
        .tabs-nav { background: white; display: flex; padding: 8px 5%; gap: 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: 800; font-size: 13px; background: #f1f5f9; color: #64748b; cursor: pointer; }
        .tab-btn.active { background: var(--dark); color: white; }

        main { flex: 1; overflow: hidden; position: relative; }
        .view-pane { display: none; height: 100%; overflow-y: auto; }
        .view-pane.active { display: block; }

        /* المحادثات - نسخة الهاتف */
        .messenger { display: flex; height: 100%; }
        .sidebar { width: 350px; background: white; border-right: 1px solid var(--border); overflow-y: auto; }
        
        /* شاشة الدردشة في الأندرويد */
        .chat-view { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; position: relative; }
        
        @media (max-width: 750px) {
            .sidebar { width: 100%; }
            .chat-view { 
                position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; 
                z-index: 2000; display: none; 
            }
            .chat-view.active { display: flex; }
        }

        .chat-header { padding: 10px 15px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        .chat-header img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }

        .msg-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .bubble { max-width: 85%; padding: 10px 14px; border-radius: 15px; font-size: 14px; line-height: 1.4; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .bubble.me { align-self: flex-end; background: #dcf8c6; border-bottom-right-radius: 2px; }
        .bubble.them { align-self: flex-start; background: white; border-bottom-left-radius: 2px; }

        /* صندوق الإدخال - مثبت في الأسفل للأندرويد */
        .input-bar { 
            padding: 10px 15px; background: #f0f0f0; display: flex; gap: 8px; align-items: center;
            padding-bottom: env(safe-area-inset-bottom, 10px); /* حماية لأجهزة الأندرويد الحديثة */
        }
        .input-bar input { flex: 1; padding: 12px 18px; border-radius: 25px; border: none; outline: none; font-size: 16px; /* منع الزوم التلقائي في الأيفون والأندرويد */ }
        .send-btn { background: #075e54; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <button onclick="logout()" style="border:none; background:none; color:#ef4444; font-weight:700;">Logga ut</button>
</header>

<div class="tabs-nav">
    <button class="tab-btn active" id="tab-ads" onclick="switchTab('ads')"> المنشورات</button>
    <button class="tab-btn" id="tab-chat" onclick="switchTab('chat')"> البريد</button>
</div>

<main>
    <section id="ads-pane" class="view-pane active">
        <div id="myAds" style="padding:15px; display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:12px;"></div>
    </section>

    <section id="chat-pane" class="view-pane" style="padding:0;">
        <div class="messenger">
            <div class="sidebar" id="inboxList"></div>
            <div id="chatRoom" class="chat-view">
                <div style="margin:auto; text-align:center; color:#999; padding:20px;">
                    <p>Välj en konversation</p>
                </div>
            </div>
        </div>
    </section>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, addDoc, serverTimestamp, orderBy, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let user = null; let activeChatId = null; let unsub = null;

    onAuthStateChanged(auth, u => {
        if (!u) window.location.href = 'login.html';
        user = u;
        loadAds();
        listenInbox();
    });

    window.switchTab = (t) => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + t).classList.add('active');
        document.querySelectorAll('.view-pane').forEach(p => p.classList.remove('active'));
        document.getElementById(t + '-pane').classList.add('active');
    };

    async function loadAds() {
        const snap = await getDocs(query(collection(db, "cars"), where("sellerId", "==", user.uid)));
        document.getElementById('myAds').innerHTML = snap.docs.map(d => `
            <div style="background:white; border-radius:12px; overflow:hidden; border:1px solid #eee;">
                <img src="${d.data().images[0]}" style="width:100%; height:100px; object-fit:cover;">
                <div style="padding:8px; font-size:12px;"><b>${d.data().brand}</b><br>${d.data().price} kr</div>
            </div>`).join('');
    }

    function listenInbox() {
        const q = query(collection(db, "messages"), where("participants", "array-contains", user.uid), orderBy("timestamp", "desc"));
        onSnapshot(q, snap => {
            const unique = {};
            snap.docs.forEach(d => { if(!unique[d.data().chatId]) unique[d.data().chatId] = d.data(); });
            document.getElementById('inboxList').innerHTML = Object.values(unique).map(c => `
                <div class="chat-item" onclick="openChat('${c.chatId}', '${c.carId}', '${c.carTitle}', '${c.carImage}')">
                    <img src="${c.carImage}" style="width:45px; height:45px; border-radius:10px; object-fit:cover;">
                    <div style="flex:1;"><div style="font-weight:800; font-size:14px;">${c.senderId === user.uid ? 'Jag' : c.senderName}</div><div style="font-size:11px; color:#999;">${c.carTitle}</div></div>
                </div>`).join('');
        });
    }

    window.openChat = (id, carId, title, img) => {
        activeChatId = id; if(unsub) unsub();
        const room = document.getElementById('chatRoom');
        room.classList.add('active');
        room.innerHTML = `
            <div class="chat-header">
                <button onclick="document.getElementById('chatRoom').classList.remove('active')" style="border:none; background:none; font-size:20px; padding-right:10px;">←</button>
                <img src="${img}">
                <b style="font-size:14px; flex:1;">${title}</b>
            </div>
            <div id="msgsArea" class="msg-list"></div>
            <div class="input-bar">
                <input type="text" id="mIn" placeholder="Skriv..." onkeypress="if(event.key==='Enter') send()">
                <button class="send-btn" onclick="send()">➤</button>
            </div>`;

        const q = query(collection(db, "messages"), where("chatId", "==", id), orderBy("timestamp", "asc"));
        unsub = onSnapshot(q, snap => {
            const area = document.getElementById('msgsArea');
            area.innerHTML = snap.docs.map(d => `<div class="bubble ${d.data().senderId === user.uid ? 'me' : 'them'}">${d.data().message}</div>`).join('');
            area.scrollTop = area.scrollHeight;
        });
    };

    window.send = async () => {
        const input = document.getElementById('mIn'); if(!input.value.trim()) return;
        const txt = input.value; input.value = ""; // تفريغ فوري للخانة (سرعة استجابة)
        const p = activeChatId.split('_'); const recipient = (p[0] === user.uid) ? p[1] : p[0];
        
        await addDoc(collection(db, "messages"), {
            chatId: activeChatId, participants: [user.uid, recipient],
            carId: p[2], carTitle: document.querySelector('b').innerText, carImage: document.querySelector('.chat-header img').src,
            senderId: user.uid, senderName: user.email.split('@')[0], message: txt, timestamp: serverTimestamp()
        });
    };

    window.logout = () => signOut(auth).then(() => window.location.href = 'index.html');
</script>
</body>
</html>

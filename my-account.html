<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Min Sida | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f0f2f5; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { height: 60px; background: white; padding: 0 5%; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; z-index: 1000; }
        .logo { text-decoration: none; font-size: 22px; font-weight: 900; color: var(--dark); }
        .logo span { color: var(--primary); }

        .tabs-nav { background: white; display: flex; padding: 10px 5%; gap: 10px; border-bottom: 1px solid var(--border); }
        .tab-btn { padding: 10px 20px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; background: #f1f5f9; color: #64748b; font-size: 13px; }
        .tab-btn.active { background: var(--dark); color: white; }
        .logout-btn { margin-left: auto; color: #ef4444; background: #fee2e2; }

        main { flex: 1; overflow: hidden; position: relative; }
        .view-section { display: none; height: 100%; overflow-y: auto; padding: 20px 5%; }
        .view-section.active { display: block; }

        /* Ads List */
        .ads-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .ad-item { background: white; border-radius: 15px; border: 1px solid var(--border); overflow: hidden; }
        .ad-item img { width: 100%; height: 140px; object-fit: cover; }

        /* Messenger */
        .messenger { display: flex; height: 100%; background: white; overflow: hidden; }
        .chat-sidebar { width: 320px; border-right: 1px solid var(--border); overflow-y: auto; background: #fff; }
        .chat-view { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; }
        .chat-card { padding: 15px; display: flex; gap: 12px; cursor: pointer; border-bottom: 1px solid #f8fafc; }
        .chat-card.active { background: #fff5eb; border-left: 4px solid var(--primary); }
        .chat-card img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; }

        /* Chat Window UI */
        .chat-top { padding: 10px 20px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .msg-list { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .bubble { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 14px; }
        .bubble.me { align-self: flex-end; background: #dcf8c6; }
        .bubble.them { align-self: flex-start; background: white; }

        .chat-input-bar { padding: 15px; background: #f0f0f0; display: flex; gap: 10px; align-items: center; }
        .chat-input-bar input { flex: 1; padding: 12px 18px; border-radius: 25px; border: none; outline: none; }
        .send-btn { background: #075e54; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        @media (max-width: 750px) { .chat-sidebar { width: 100%; } .chat-view { display: none; position: fixed; top: 115px; left: 0; width: 100%; height: calc(100vh - 115px); z-index: 500; } .chat-view.active { display: flex; } }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <div id="statusName" style="font-weight: 800; font-size: 14px;">...</div>
</header>

<div class="tabs-nav">
    <button class="tab-btn active" id="t-ads" onclick="changeTab('ads')"> المنشورات</button>
    <button class="tab-btn" id="t-chat" onclick="changeTab('chat')"> البريد</button>
    <button class="tab-btn logout-btn" onclick="logout()">تسجيل الخروج</button>
</div>

<main>
    <section id="ads-view" class="view-section active">
        <div id="adsList" class="ads-grid">Hämtar dina annonser...</div>
    </section>

    <section id="chat-view" class="view-section" style="padding:0;">
        <div class="messenger">
            <div class="chat-sidebar">
                <div id="inboxList">Laddar meddelanden...</div>
            </div>
            <div id="activeChat" class="chat-view">
                <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:#999; text-align:center; padding:20px;">
                    <p>Välj en konversation för att skriva</p>
                </div>
            </div>
        </div>
    </section>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, serverTimestamp, orderBy, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let currentUser = null;
    let activeChatId = null;
    let unsub = null;

    onAuthStateChanged(auth, user => {
        if (!user) window.location.href = 'login.html';
        currentUser = user;
        document.getElementById('statusName').innerText = user.email.split('@')[0];
        loadMyAds();
        listenInbox();
    });

    window.changeTab = (t) => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('t-' + t).classList.add('active');
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.getElementById(t + '-view').classList.add('active');
    };

    async function loadMyAds() {
        const list = document.getElementById('adsList');
        const q = query(collection(db, "cars"), where("sellerId", "==", currentUser.uid));
        const snap = await getDocs(q);
        if (snap.empty) { list.innerHTML = "Inga annonser än."; return; }
        list.innerHTML = snap.docs.map(d => `<div class="ad-item"><img src="${d.data().images[0]}"><div style="padding:10px;"><b>${d.data().brand}</b><br>${d.data().price} kr</div></div>`).join('');
    }

    function listenInbox() {
        const q = query(collection(db, "messages"), where("participants", "array-contains", currentUser.uid), orderBy("timestamp", "desc"));
        onSnapshot(q, (snap) => {
            const unique = {};
            snap.docs.forEach(d => { if(!unique[d.data().chatId]) unique[d.data().chatId] = d.data(); });
            const chats = Object.values(unique);
            const list = document.getElementById('inboxList');
            if (chats.length === 0) { list.innerHTML = "<p style='padding:20px; color:#999;'>Inga meddelanden.</p>"; return; }
            list.innerHTML = chats.map(c => `
                <div class="chat-card ${activeChatId === c.chatId ? 'active' : ''}" onclick="openChat('${c.chatId}', '${c.carId}', '${c.carTitle}', '${c.carImage}')">
                    <img src="${c.carImage}">
                    <div style="flex:1; overflow:hidden;">
                        <div style="font-weight:800; font-size:13px;">${c.senderId === currentUser.uid ? 'Jag' : c.senderName}</div>
                        <div style="font-size:11px; color:#64748b; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${c.carTitle}: ${c.message}</div>
                    </div>
                </div>`).join('');
        });
    }

    window.openChat = (chatId, carId, carTitle, carImage) => {
        activeChatId = chatId;
        const view = document.getElementById('activeChat');
        view.classList.add('active');
        if (unsub) unsub();

        view.innerHTML = `
            <div class="chat-top" onclick="location.href='details.html?id=${carId}'">
                <img src="${carImage}">
                <div><h4 style="font-size:14px;">${carTitle}</h4><p style="font-size:11px; color:var(--primary);">Visa annons ➔</p></div>
                <button onclick="event.stopPropagation(); document.getElementById('activeChat').classList.remove('active')" style="margin-left:auto; border:none; background:none; font-size:20px;">✕</button>
            </div>
            <div id="msgsArea" class="msg-list">Laddar...</div>
            <div class="chat-input-bar">
                <input type="text" id="mInput" placeholder="Skriv meddelande..." onkeypress="if(event.key==='Enter') send()">
                <button class="send-btn" onclick="send()">➤</button>
            </div>`;

        const q = query(collection(db, "messages"), where("chatId", "==", chatId), orderBy("timestamp", "asc"));
        unsub = onSnapshot(q, (snap) => {
            const area = document.getElementById('msgsArea');
            area.innerHTML = snap.docs.map(d => `<div class="bubble ${d.data().senderId === currentUser.uid ? 'me' : 'them'}">${d.data().message}</div>`).join('');
            area.scrollTop = area.scrollHeight;
        });
    };

    window.send = async () => {
        const input = document.getElementById('mInput');
        if (!input.value.trim()) return;
        const val = input.value;
        input.value = "";
        const parts = activeChatId.split('_');
        const recipient = (parts[0] === currentUser.uid) ? parts[1] : parts[0];
        await addDoc(collection(db, "messages"), {
            chatId: activeChatId, participants: [currentUser.uid, recipient],
            carId: activeChatId.split('_')[2], carTitle: document.querySelector('.chat-top h4').innerText,
            carImage: document.querySelector('.chat-top img').src,
            senderId: currentUser.uid, senderName: currentUser.email.split('@')[0],
            message: val, timestamp: serverTimestamp()
        });
    };

    window.logout = () => signOut(auth).then(() => window.location.href = 'index.html');
</script>
</body>
</html>

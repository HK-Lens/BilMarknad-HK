<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitt Konto | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --white: #ffffff; --border: #e2e8f0; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; }
        .container { max-width: 1200px; margin: 50px auto; padding: 0 20px; display: grid; grid-template-columns: 280px 1fr; gap: 30px; }
        .sidebar { background: white; padding: 25px; border-radius: 24px; border: 1px solid var(--border); height: fit-content; }
        .nav-item { padding: 15px; border-radius: 12px; cursor: pointer; font-weight: 700; color: #64748b; margin-bottom: 8px; transition: 0.3s; }
        .nav-item.active { background: #fff7ed; color: var(--primary); }
        .content-panel { background: white; padding: 40px; border-radius: 28px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        .ad-card { display: flex; align-items: center; gap: 20px; padding: 15px; border: 1px solid var(--border); border-radius: 18px; margin-bottom: 15px; }
        .ad-card img { width: 100px; height: 75px; object-fit: cover; border-radius: 12px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <div class="nav-item active" onclick="switchTab('ads', this)">Mina Annonser</div>
        <div class="nav-item" onclick="switchTab('favs', this)">Sparade Bilar</div>
        <div class="nav-item" onclick="window.location.href='messages.html'">Meddelanden</div>
        <div class="nav-item" onclick="window.location.href='index.html'">Hem</div>
    </div>
    <div class="content-panel">
        <div id="ads" class="tab-content active">
            <h2 style="margin-bottom:25px;">Dina annonser</h2>
            <div id="adsList">Laddar...</div>
        </div>
        <div id="favs" class="tab-content">
            <h2 style="margin-bottom:25px;">Dina sparade bilar</h2>
            <div id="favsList">Laddar...</div>
        </div>
    </div>
</div>
<script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    onAuthStateChanged(auth, (user) => { if(user) { fetchAds(user.uid); fetchFavs(user.uid); } else { window.location.href="login.html"; } });

    async function fetchAds(uid) {
        const q = query(collection(db, "cars"), where("sellerId", "==", uid));
        const snap = await getDocs(q);
        const container = document.getElementById('adsList');
        container.innerHTML = snap.empty ? "Inga annonser hittades." : "";
        snap.forEach(d => {
            const car = d.data();
            container.innerHTML += `
                <div class="ad-card">
                    <img src="${car.images?.[0] || 'placeholder.jpg'}">
                    <div style="flex:1"><h4>${car.brand} ${car.model}</h4><p>${Number(car.price).toLocaleString()} kr</p></div>
                    <a href="details.html?id=${d.id}" style="color:var(--primary); font-weight:700; text-decoration:none;">Visa</a>
                </div>`;
        });
    }

    async function fetchFavs(uid) {
        const q = query(collection(db, "favorites"), where("userId", "==", uid));
        const snap = await getDocs(q);
        const container = document.getElementById('favsList');
        container.innerHTML = snap.empty ? "Inga sparade bilar." : "";
        snap.forEach(d => {
            const f = d.data();
            container.innerHTML += `
                <div class="ad-row ad-card">
                    <img src="${f.image || 'placeholder.jpg'}">
                    <div style="flex:1"><h4>${f.carName}</h4><p>${Number(f.price).toLocaleString()} kr</p></div>
                    <a href="details.html?id=${f.carId}" style="color:var(--primary); font-weight:700; text-decoration:none;">Visa</a>
                </div>`;
        });
    }

    window.switchTab = (id, btn) => {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }
</script>
</body>
</html>

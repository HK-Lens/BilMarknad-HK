<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Min Sida | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f0f2f5; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* الهيدر الثابت */
        header { height: 65px; background: white; padding: 0 5%; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 1001; }
        .logo { text-decoration: none; font-size: 24px; font-weight: 900; color: var(--dark); }
        .logo span { color: var(--primary); }

        /* قائمة التحكم العلوي */
        .dashboard-nav { background: white; padding: 10px 5%; border-bottom: 1px solid var(--border); display: flex; gap: 10px; flex-shrink: 0; overflow-x: auto; }
        .nav-btn { padding: 10px 20px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 13px; background: #f1f5f9; color: #64748b; white-space: nowrap; transition: 0.3s; }
        .nav-btn.active { background: var(--dark); color: white; }
        .nav-btn.logout { color: #ef4444; background: #fee2e2; margin-left: auto; }

        /* الحاوية الرئيسية */
        main { flex: 1; overflow: hidden; position: relative; }
        .page-content { display: none; height: 100%; overflow-y: auto; padding: 20px 5%; }
        .page-content.active { display: block; }

        /* المنشورات (إعلاناتي) */
        .ads-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .my-card { background: white; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); position: relative; }
        .my-card img { width: 100%; height: 160px; object-fit: cover; }
        .my-card-info { padding: 15px; }
        .my-card-btns { padding: 0 15px 15px; display: flex; gap: 10px; }
        .btn-del { flex: 1; background: #fee2e2; color: #ef4444; border: none; padding: 10px; border-radius: 10px; font-weight: 700; cursor: pointer; }

        /* نظام المراسلة (Messenger UI) */
        .messenger { display: flex; height: 100%; background: white; overflow: hidden; position: relative; }
        .inbox-sidebar { width: 350px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: #fff; }
        .chat-list { flex: 1; overflow-y: auto; }
        
        .chat-view { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; position: relative; }
        
        /* عناصر قائمة المحادثات */
        .chat-item { padding: 15px; display: flex; gap: 12px; cursor: pointer; border-bottom: 1px solid #f1f5f9; transition: 0.2s; }
        .chat-item.active { background: #fff5eb; border-left: 4px solid var(--primary); }
        .chat-item img { width: 55px; height: 55px; border-radius: 12px; object-fit: cover; }

        /* هيدر الدردشة (معلومات السيارة) */
        .chat-header { padding: 10px 20px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; cursor: pointer; z-index: 10; }
        .chat-header img { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; }
        .chat-header h4 { font-size: 14px; font-weight: 900; }
        .chat-header p { font-size: 11px; color: var(--primary); font-weight: 700; }

        /* منطقة الرسائل */
        .msg-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .bubble { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.4; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .bubble.me { align-self: flex-end; background: #dcf8c6; border-top-right-radius: 2px; }
        .bubble.them { align-self: flex-start; background: white; border-top-left-radius: 2px; }

        /* صندوق الإدخال */
        .input-box { padding: 15px; background: #f0f0f0; display: flex; gap: 10px; align-items: center; }
        .input-box input { flex: 1; padding: 12px 18px; border-radius: 25px; border: none; outline: none; font-size: 15px; }
        .btn-send { background: #075e54; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }

        /* للهاتف */
        @media (max-width: 750px) {
            .inbox-sidebar { width: 100%; }
            .chat-view { display: none; position: fixed; top: 120px; left: 0; width: 100%; height: calc(100vh - 120px); z-index: 500; }
            .chat-view.active { display: flex; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <div id="uName" style="font-weight: 800; font-size: 14px; color: var(--dark);">...</div>
</header>

<nav class="dashboard-nav">
    <button class="nav-btn active" id="tab-ads" onclick="changeTab('ads')"> المنشورات</button>
    <button class="nav-btn" id="tab-chat" onclick="changeTab('chat')"> صندوق البريد</button>
    <button class="nav-btn logout" onclick="logout()">تسجيل الخروج</button>
</nav>

<main>
    <section id="ads-content" class="page-content active">
        <h2 style="margin-bottom: 20px;">Mina annonser</h2>
        <div id="adsGrid" class="ads-grid">Hämtar dina annonser...</div>
    </section>

    <section id="chat-content" class="page-content" style="padding: 0;">
        <div class="messenger">
            <div class="inbox-sidebar">
                <div style="padding: 20px; font-weight: 900; border-bottom: 1px solid #eee;">Inkorg</div>
                <div id="conversations" class="chat-list">Laddar meddelanden...</div>
            </div>
            <div id="chatRoom" class="chat-view">
                <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:#94a3b8; padding:20px; text-align:center;">
                    <img src="https://cdn-icons-png.flaticon.com/512/3063/3063822.png" width="70" style="opacity:0.1; margin-bottom:15px;">
                    <p>Välj en konversation för att se meddelanden</p>
                </div>
            </div>
        </div>
    </section>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, serverTimestamp, orderBy, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let currentUser = null;
    let currentChatId = null;
    let chatUnsubscribe = null;

    onAuthStateChanged(auth, user => {
        if (!user) window.location.href = 'login.html';
        currentUser = user;
        document.getElementById('uName').innerText = user.displayName || user.email.split('@')[0];
        loadAds();
        listenToConversations();
    });

    // تبديل الأقسام
    window.changeTab = (type) => {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + type).classList.add('active');
        document.querySelectorAll('.page-content').forEach(s => s.classList.remove('active'));
        document.getElementById(type + '-content').classList.add('active');
    };

    // 1. تحميل المنشورات
    async function loadAds() {
        const grid = document.getElementById('adsGrid');
        const q = query(collection(db, "cars"), where("sellerId", "==", currentUser.uid));
        const snap = await getDocs(q);

        if (snap.empty) {
            grid.innerHTML = "<p style='color:#999; padding:20px;'>Du har inga annonser än.</p>";
            return;
        }

        grid.innerHTML = snap.docs.map(d => {
            const c = d.data();
            return `
                <div class="my-card">
                    <img src="${c.images[0]}">
                    <div class="my-card-info">
                        <h4 style="font-weight:900;">${c.brand} ${c.model}</h4>
                        <div style="color:var(--primary); font-weight:800; margin-top:5px;">${Number(c.price).toLocaleString()} kr</div>
                    </div>
                    <div class="my-card-btns">
                        <button class="btn-del" onclick="deleteAd('${d.id}')">Radera annons</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    // 2. الاستماع للمحادثات (صندوق الوارد)
    function listenToConversations() {
        const list = document.getElementById('conversations');
        const q = query(collection(db, "messages"), 
                  where("participants", "array-contains", currentUser.uid),
                  orderBy("timestamp", "desc"));

        onSnapshot(q, (snapshot) => {
            const unique = {};
            snapshot.docs.forEach(doc => {
                const data = doc.data();
                if (!unique[data.chatId]) unique[data.chatId] = data;
            });

            const chats = Object.values(unique);
            if (chats.length === 0) {
                list.innerHTML = "<p style='padding:20px; color:#999; text-align:center;'>Inga meddelanden.</p>";
                return;
            }

            list.innerHTML = chats.map(c => `
                <div class="chat-item ${currentChatId === c.chatId ? 'active' : ''}" onclick="openChat('${c.chatId}', '${c.carId}', '${c.carTitle}', '${c.carImage}')">
                    <img src="${c.carImage}">
                    <div style="flex:1; overflow:hidden;">
                        <div class="chat-item-name">${c.senderId === currentUser.uid ? 'Jag' : c.senderName}</div>
                        <div class="chat-item-last-msg">${c.carTitle}: ${c.message}</div>
                    </div>
                </div>
            `).join('');
        });
    }

    // 3. فتح غرفة الدردشة (WhatsApp Style)
    window.openChat = (chatId, carId, carTitle, carImage) => {
        currentChatId = chatId;
        const room = document.getElementById('chatRoom');
        room.classList.add('active');

        if (chatUnsubscribe) chatUnsubscribe();

        room.innerHTML = `
            <div class="chat-header" onclick="location.href='details.html?id=${carId}'">
                <img src="${carImage}">
                <div>
                    <h4>${carTitle}</h4>
                    <p>Se annonsen ➔</p>
                </div>
                <button onclick="event.stopPropagation(); document.getElementById('chatRoom').classList.remove('active')" style="margin-left:auto; border:none; background:none; font-size:24px;">✕</button>
            </div>
            <div id="messagesArea" class="msg-area">Laddar...</div>
            <div class="input-box">
                <input type="text" id="chatInput" placeholder="Skriv ett meddelande..." onkeypress="if(event.key==='Enter') sendMsg()">
                <button class="btn-send" onclick="sendMsg()">➤</button>
            </div>
        `;

        const q = query(collection(db, "messages"), where("chatId", "==", chatId), orderBy("timestamp", "asc"));
        chatUnsubscribe = onSnapshot(q, (snap) => {
            const area = document.getElementById('messagesArea');
            area.innerHTML = snap.docs.map(d => {
                const m = d.data();
                return `<div class="bubble ${m.senderId === currentUser.uid ? 'me' : 'them'}">${m.message}</div>`;
            }).join('');
            area.scrollTop = area.scrollHeight;
        });
    };

    // 4. إرسال رسالة
    window.sendMsg = async () => {
        const input = document.getElementById('chatInput');
        if (!input.value.trim()) return;

        const p = currentChatId.split('_');
        const recipient = (p[0] === currentUser.uid) ? p[1] : p[0];

        await addDoc(collection(db, "messages"), {
            chatId: currentChatId,
            participants: [currentUser.uid, recipient],
            carId: p[2],
            carTitle: document.querySelector('.chat-header h4').innerText,
            carImage: document.querySelector('.chat-header img').src,
            senderId: currentUser.uid,
            senderName: currentUser.displayName || currentUser.email.split('@')[0],
            message: input.value,
            timestamp: serverTimestamp()
        });
        input.value = "";
    };

    window.deleteAd = async (id) => {
        if (confirm("Vill du verkligen ta bort denna annons?")) {
            await deleteDoc(doc(db, "cars", id));
            loadAds();
        }
    };

    window.logout = () => signOut(auth).then(() => window.location.href = 'index.html');
</script>
</body>
</html>

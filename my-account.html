<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Sida | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding-bottom: 50px; }
        header { background: white; padding: 15px 6%; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .logo { text-decoration: none; font-size: 22px; font-weight: 900; color: var(--dark); }
        .logo span { color: var(--primary); }
        .container { max-width: 900px; margin: 30px auto; padding: 0 15px; }
        
        .section { background: white; padding: 25px; border-radius: 24px; margin-bottom: 25px; border: 1px solid #e2e8f0; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .tab { padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 700; color: #64748b; }
        .tab.active { background: var(--dark); color: white; }

        .msg-item { display: flex; gap: 15px; padding: 15px; border: 1px solid #eee; border-radius: 18px; margin-bottom: 12px; background: white; transition: 0.3s; }
        .car-img { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; }
        .btn-reply { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 24px; width: 90%; max-width: 450px; }
    </style>
</head>
<body>
<header><a href="index.html" class="logo">BIL<span>HK</span></a><button onclick="logout()" style="background:none; border:none; color:#ef4444; font-weight:700; cursor:pointer;">Logga ut</button></header>

<div class="container">
    <h1 id="uName" style="margin-bottom:25px; font-weight:900;">Min Sida</h1>
    <div class="section">
        <div class="tabs">
            <div class="tab active" id="tIn" onclick="loadM('in')">Mottagna</div>
            <div class="tab" id="tOut" onclick="loadM('out')">Skickade</div>
        </div>
        <div id="mList">Laddar...</div>
    </div>
    <div class="section"><h3>🚗 Mina annonser</h3><div id="aList" style="margin-top:15px;">Laddar...</div></div>
</div>

<div class="modal" id="rModal">
    <div class="modal-content">
        <h3 id="rTitle">Svara</h3>
        <textarea id="rTxt" style="width:100%; margin:15px 0; padding:15px; border-radius:15px; border:1px solid #ddd;" rows="5"></textarea>
        <button onclick="sendR()" style="width:100%; background:var(--dark); color:white; padding:15px; border-radius:50px; border:none; font-weight:800;">Skicka svar</button>
        <button onclick="document.getElementById('rModal').style.display='none'" style="width:100%; background:none; border:none; margin-top:10px; cursor:pointer; font-weight:700;">Avbryt</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let rData = {};

    onAuthStateChanged(auth, user => {
        if (!user) window.location.href = 'login.html';
        else {
            document.getElementById('uName').innerText = "Hej, " + (user.displayName || user.email.split('@')[0]);
            loadM('in'); loadA(user.uid);
        }
    });

    window.loadM = async (type) => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(type === 'in' ? 'tIn' : 'tOut').classList.add('active');
        const list = document.getElementById('mList');
        list.innerHTML = "Laddar...";
        
        const q = query(collection(db, "messages"), where(type === 'in' ? "recipientId" : "senderId", "==", auth.currentUser.uid));
        const snap = await getDocs(q);
        if (snap.empty) { list.innerHTML = "Inga meddelanden."; return; }

        list.innerHTML = snap.docs.sort((a,b)=>b.data().timestamp-a.data().timestamp).map(d => {
            const m = d.data();
            return `
                <div class="msg-item">
                    <img src="${m.carImage}" class="car-img">
                    <div style="flex:1;">
                        <div style="font-size:11px; font-weight:800; color:var(--primary);">${m.carTitle}</div>
                        <div style="font-weight:700; font-size:14px;">${type === 'in' ? 'Från: '+m.senderName : 'Till: '+ (m.recipientName || 'Säljare')}</div>
                        <p style="font-size:13px; color:#444; margin-top:5px; background:#f8fafc; padding:10px; border-radius:10px;">${m.message}</p>
                        ${type === 'in' ? `<button onclick="openR('${m.senderId}', '${m.senderName}', '${m.carId}', '${m.carTitle}', '${m.carImage}')" class="btn-reply">Svara ↩️</button>` : ''}
                    </div>
                </div>`;
        }).join('');
    };

    window.loadA = async (uid) => {
        const snap = await getDocs(query(collection(db, "cars"), where("sellerId", "==", uid)));
        document.getElementById('aList').innerHTML = snap.docs.map(d => `
            <div style="display:flex; gap:10px; border-bottom:1px solid #eee; padding:10px 0;">
                <img src="${d.data().images[0]}" style="width:50px; border-radius:8px;">
                <b>${d.data().brand} ${d.data().model}</b> - ${d.data().price} kr
            </div>`).join('');
    };

    window.openR = (to, name, cid, title, img) => {
        rData = { to, name, cid, title, img };
        document.getElementById('rTitle').innerText = "Svara till " + name;
        document.getElementById('rModal').style.display = 'flex';
    };

    window.sendR = async () => {
        await addDoc(collection(db, "messages"), {
            carId: rData.cid, carTitle: rData.title, carImage: rData.img,
            senderId: auth.currentUser.uid, senderName: auth.currentUser.email.split('@')[0],
            recipientId: rData.to, recipientName: rData.name, message: document.getElementById('rTxt').value, timestamp: serverTimestamp()
        });
        alert("Svar skickat!"); document.getElementById('rModal').style.display = 'none';
        loadM('in');
    };

    window.logout = () => signOut(auth).then(() => window.location.href = "index.html");
</script>
</body>
</html>

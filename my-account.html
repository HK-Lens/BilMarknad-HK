<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Sida | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f0f2f5; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { height: 60px; background: white; padding: 0 5%; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .logo { text-decoration: none; font-size: 22px; font-weight: 900; color: var(--dark); }
        .logo span { color: var(--primary); }
        .tabs { background: white; display: flex; padding: 10px 5%; gap: 10px; border-bottom: 1px solid #eee; }
        .tab-btn { padding: 10px 20px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; background: #f1f5f9; }
        .tab-btn.active { background: var(--dark); color: white; }
        .messenger { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 350px; background: white; border-right: 1px solid #eee; overflow-y: auto; }
        .chat-view { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; }
        .chat-item { padding: 15px; display: flex; gap: 12px; cursor: pointer; border-bottom: 1px solid #f8fafc; }
        .chat-item.active { background: #fff5eb; border-left: 4px solid var(--primary); }
        .msg-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .bubble { max-width: 75%; padding: 10px 15px; border-radius: 12px; font-size: 14px; }
        .bubble.me { align-self: flex-end; background: #dcf8c6; }
        .bubble.them { align-self: flex-start; background: white; }
        .input-bar { padding: 15px; background: #f0f0f0; display: flex; gap: 10px; }
        .input-bar input { flex: 1; padding: 12px; border-radius: 25px; border: none; outline: none; }
        .send-btn { background: #075e54; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; }
        @media (max-width: 750px) { .sidebar { width: 100%; } .chat-view { display: none; position: fixed; top: 115px; left: 0; width: 100%; height: calc(100vh - 115px); } .chat-view.active { display: flex; } }
    </style>
</head>
<body>
<header><a href="index.html" class="logo">BIL<span>HK</span></a><button onclick="logout()" style="border:none; background:none; color:red; font-weight:700;">Logga ut</button></header>
<div class="tabs"><button class="tab-btn active" id="btnAds" onclick="show('ads')"> المنشورات</button><button class="tab-btn" id="btnChat" onclick="show('chat')"> البريد</button></div>
<main style="flex:1; overflow:hidden;">
    <section id="ads-sect" style="padding:20px; display:block; height:100%; overflow-y:auto;"><div id="adsGrid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:15px;">Laddar...</div></section>
    <section id="chat-sect" style="display:none; height:100%;"><div class="messenger"><div class="sidebar" id="inbox"></div><div class="chat-view" id="chatView"><div style="margin:auto; color:#999;">Välj en chatt</div></div></div></section>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, serverTimestamp, orderBy, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let user = null; let activeId = null; let unsub = null;

    onAuthStateChanged(auth, u => { if(!u) window.location.href='login.html'; user = u; loadAds(); listen(); });

    window.show = (s) => {
        document.getElementById('ads-sect').style.display = s === 'ads' ? 'block' : 'none';
        document.getElementById('chat-sect').style.display = s === 'chat' ? 'flex' : 'none';
        document.getElementById('btnAds').classList.toggle('active', s === 'ads');
        document.getElementById('btnChat').classList.toggle('active', s === 'chat');
    };

    async function loadAds() {
        const snap = await getDocs(query(collection(db, "cars"), where("sellerId", "==", user.uid)));
        document.getElementById('adsGrid').innerHTML = snap.docs.map(d => `<div style="background:white; border-radius:12px; overflow:hidden; border:1px solid #eee;"><img src="${d.data().images[0]}" style="width:100%; height:120px; object-fit:cover;"><div style="padding:10px;"><b>${d.data().brand}</b><br>${d.data().price} kr<button onclick="del('${d.id}')" style="display:block; width:100%; margin-top:10px; background:#fee2e2; color:red; border:none; padding:5px; cursor:pointer;">Ta bort</button></div></div>`).join('');
    }

    function listen() {
        // إذا استمر التعليق، قم بإزالة orderBy("timestamp", "desc") مؤقتاً لتتأكد
        const q = query(collection(db, "messages"), where("participants", "array-contains", user.uid));
        onSnapshot(q, snap => {
            const unique = {};
            snap.docs.forEach(d => { if(!unique[d.data().chatId]) unique[d.data().chatId] = d.data(); });
            const list = document.getElementById('inbox');
            if (snap.empty) { list.innerHTML = "<p style='padding:20px; color:#999;'>Inga meddelanden.</p>"; return; }
            list.innerHTML = Object.values(unique).map(c => `
                <div class="chat-item ${activeId === c.chatId ? 'active' : ''}" onclick="openChat('${c.chatId}', '${c.carId}', '${c.carTitle}', '${c.carImage}')">
                    <img src="${c.carImage}" style="width:45px; height:45px; border-radius:8px; object-fit:cover;">
                    <div style="flex:1; overflow:hidden;"><div style="font-weight:800; font-size:13px;">${c.senderId === user.uid ? 'Jag' : c.senderName}</div><div style="font-size:11px; color:#999; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${c.message}</div></div>
                </div>`).join('');
        }, (err) => { console.error(err); document.getElementById('inbox').innerHTML = "Fel: " + err.message; });
    }

    window.openChat = (id, carId, title, img) => {
        activeId = id; if(unsub) unsub();
        document.getElementById('chatView').classList.add('active');
        document.getElementById('chatView').innerHTML = `
            <div style="padding:10px 20px; background:white; border-bottom:1px solid #eee; display:flex; align-items:center; gap:10px; cursor:pointer;" onclick="location.href='details.html?id=${carId}'">
                <img src="${img}" style="width:40px; height:40px; border-radius:5px; object-fit:cover;">
                <b style="font-size:14px;">${title}</b>
                <button onclick="event.stopPropagation(); document.getElementById('chatView').classList.remove('active')" style="margin-left:auto; border:none; background:none; font-size:20px;">✕</button>
            </div>
            <div class="msg-area" id="msgs"></div>
            <div class="input-bar"><input type="text" id="mIn" placeholder="Skriv..." onkeypress="if(event.key==='Enter') send()"><button onclick="send()" class="send-btn">➤</button></div>`;
        const q = query(collection(db, "messages"), where("chatId", "==", id), orderBy("timestamp", "asc"));
        unsub = onSnapshot(q, snap => {
            const area = document.getElementById('msgs');
            area.innerHTML = snap.docs.map(d => `<div class="bubble ${d.data().senderId === user.uid ? 'me' : 'them'}">${d.data().message}</div>`).join('');
            area.scrollTop = area.scrollHeight;
        });
    };

    window.send = async () => {
        const input = document.getElementById('mIn'); if(!input.value.trim()) return;
        const txt = input.value; input.value = "";
        const parts = activeId.split('_'); const recipient = (parts[0] === user.uid) ? parts[1] : parts[0];
        await addDoc(collection(db, "messages"), {
            chatId: activeId, participants: [user.uid, recipient],
            carId: parts[2], carTitle: document.querySelector('b').innerText, carImage: document.querySelector('#chatView img').src,
            senderId: user.uid, senderName: user.email.split('@')[0], message: txt, timestamp: serverTimestamp()
        });
    };

    window.del = async (id) => { if(confirm("Ta bort?")) { await deleteDoc(doc(db, "cars", id)); loadAds(); } };
    window.logout = () => signOut(auth).then(() => window.location.href='index.html');
</script>
</body>
</html>

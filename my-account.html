<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chatt | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f1f5f9; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { height: 60px; background: white; padding: 0 5%; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 100; }
        .logo { text-decoration: none; font-size: 20px; font-weight: 900; color: var(--dark); }
        .logo span { color: var(--primary); }
        .messenger { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 320px; background: white; border-right: 1px solid var(--border); overflow-y: auto; }
        @media (max-width: 700px) { .sidebar { width: 100%; } .chat-view { display: none; } .chat-view.active { display: flex; position: fixed; top: 60px; left: 0; width: 100%; height: calc(100vh - 60px); z-index: 200; } }
        .chat-item { padding: 15px; display: flex; gap: 12px; cursor: pointer; border-bottom: 1px solid #f8fafc; }
        .chat-item.active { background: #fff5eb; border-left: 4px solid var(--primary); }
        .chat-view { flex: 1; display: flex; flex-direction: column; background: white; }
        .msg-area { flex: 1; overflow-y: auto; padding: 20px; background: #f8fafc; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 14px; }
        .bubble.me { align-self: flex-end; background: var(--dark); color: white; }
        .bubble.them { align-self: flex-start; background: white; border: 1px solid #ddd; }
        .input-box { padding: 15px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: white; }
        .input-box input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
    </style>
</head>
<body>
<header><a href="index.html" class="logo">BIL<span>HK</span></a><button onclick="logout()" style="border:none; background:none; color:red; font-weight:700; cursor:pointer;">Logga ut</button></header>
<div class="messenger">
    <div class="sidebar" id="sidebar">
        <div style="padding:15px; font-weight:900; border-bottom:1px solid #eee;">Inbox</div>
        <div id="chats"></div>
    </div>
    <div class="chat-view" id="chatView">
        <div style="display:flex; align-items:center; justify-content:center; height:100%; color:#aaa;">Välj en chatt</div>
    </div>
</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, addDoc, serverTimestamp, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let user = null;
    let activeId = null;

    onAuthStateChanged(auth, u => { 
        if(!u) window.location.href='login.html'; 
        user = u;
        loadChats();
    });

    function loadChats() {
        const q = query(collection(db, "messages"), where("participants", "array-contains", user.uid), orderBy("timestamp", "desc"));
        onSnapshot(q, snap => {
            const unique = {};
            snap.docs.forEach(d => { if(!unique[d.data().chatId]) unique[d.data().chatId] = d.data(); });
            document.getElementById('chats').innerHTML = Object.values(unique).map(c => `
                <div class="chat-item ${activeId === c.chatId ? 'active' : ''}" onclick="openChat('${c.chatId}', '${c.carId}', '${c.carTitle}', '${c.carImage}')">
                    <img src="${c.carImage}" style="width:40px; height:40px; border-radius:5px; object-fit:cover;">
                    <div><div style="font-weight:800; font-size:13px;">${c.carTitle}</div><div style="font-size:11px; color:#999;">Klicka för att svara</div></div>
                </div>`).join('');
        });
    }

    window.openChat = (id, carId, title, img) => {
        activeId = id;
        const view = document.getElementById('chatView');
        view.classList.add('active');
        view.innerHTML = `
            <div style="padding:10px 20px; border-bottom:1px solid #eee; display:flex; align-items:center; gap:10px;">
                <img src="${img}" style="width:35px; height:35px; border-radius:5px;">
                <strong style="font-size:14px;">${title}</strong>
                <button onclick="document.getElementById('chatView').classList.remove('active')" style="margin-left:auto; border:none; background:none; font-weight:900;">✕</button>
            </div>
            <div class="msg-area" id="msgs"></div>
            <div class="input-box">
                <input type="text" id="mIn" placeholder="Skriv...">
                <button onclick="sendMsg()" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:15px; cursor:pointer;">➤</button>
            </div>`;

        const q = query(collection(db, "messages"), where("chatId", "==", id), orderBy("timestamp", "asc"));
        onSnapshot(q, snap => {
            document.getElementById('msgs').innerHTML = snap.docs.map(d => `<div class="bubble ${d.data().senderId === user.uid ? 'me' : 'them'}">${d.data().message}</div>`).join('');
            document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
        });
    };

    window.sendMsg = async () => {
        const input = document.getElementById('mIn');
        const text = input.value;
        if(!text) return;
        input.value = "";
        const parts = activeId.split('_');
        const recipient = (parts[0] === user.uid) ? parts[1] : parts[0];
        await addDoc(collection(db, "messages"), {
            chatId: activeId, carId: parts[2], carTitle: document.querySelector('strong').innerText,
            carImage: document.querySelector('.chat-view img').src, senderId: user.uid,
            recipientId: recipient, message: text, timestamp: serverTimestamp(), participants: [user.uid, recipient]
        });
    };

    window.logout = () => signOut(auth).then(() => window.location.href='index.html');
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Min Sida | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f0f2f5; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { height: 60px; background: white; padding: 0 5%; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .logo { text-decoration: none; font-size: 20px; font-weight: 900; color: var(--dark); }
        .logo span { color: var(--primary); }
        .nav-tabs { background: white; display: flex; padding: 10px 5%; gap: 10px; border-bottom: 1px solid var(--border); }
        .tab-btn { padding: 8px 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; background: #f1f5f9; font-size: 13px; }
        .tab-btn.active { background: var(--dark); color: white; }
        .messenger { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 320px; background: white; border-right: 1px solid var(--border); overflow-y: auto; }
        .chat-view { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; }
        .chat-item { padding: 15px; display: flex; gap: 12px; cursor: pointer; border-bottom: 1px solid #f8fafc; }
        .chat-item.active { background: #fff5eb; border-left: 4px solid var(--primary); }
        .msg-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 75%; padding: 10px 15px; border-radius: 12px; font-size: 14px; }
        .bubble.me { align-self: flex-end; background: #dcf8c6; }
        .bubble.them { align-self: flex-start; background: white; }
        .input-bar { padding: 15px; background: #f0f0f0; display: flex; gap: 10px; }
        .input-bar input { flex: 1; padding: 10px 15px; border-radius: 20px; border: none; outline: none; }
    </style>
</head>
<body>
<header><a href="index.html" class="logo">BIL<span>HK</span></a><button onclick="logout()" style="border:none; background:none; color:red; font-weight:700; cursor:pointer;">Logga ut</button></header>
<div class="nav-tabs"><button class="tab-btn active" id="btn-ads" onclick="show('ads')">Mina annonser</button><button class="tab-btn" id="btn-chat" onclick="show('chat')">Meddelanden</button></div>
<main style="flex:1; overflow:hidden;">
    <section id="ads-sect" style="padding:20px; display:block; overflow-y:auto; height:100%;">
        <div id="adsGrid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:15px;">Laddar...</div>
    </section>
    <section id="chat-sect" style="display:none; height:100%;">
        <div class="messenger">
            <div class="sidebar" id="chats"></div>
            <div class="chat-view" id="chatView"><div style="margin:auto; color:#999;">Välj en chatt</div></div>
        </div>
    </section>
</main>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, serverTimestamp, orderBy, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let user = null; let activeId = null; let unsub = null;

    onAuthStateChanged(auth, u => { if(!u) window.location.href='login.html'; user = u; loadAds(); listen(); });

    window.show = (s) => {
        document.getElementById('ads-sect').style.display = s === 'ads' ? 'block' : 'none';
        document.getElementById('chat-sect').style.display = s === 'chat' ? 'flex' : 'none';
        document.getElementById('btn-ads').classList.toggle('active', s === 'ads');
        document.getElementById('btn-chat').classList.toggle('active', s === 'chat');
    };

    async function loadAds() {
        const snap = await getDocs(query(collection(db, "cars"), where("sellerId", "==", user.uid)));
        document.getElementById('adsGrid').innerHTML = snap.docs.map(d => `
            <div style="background:white; border-radius:15px; overflow:hidden; border:1px solid #eee;">
                <img src="${d.data().images[0]}" style="width:100%; height:120px; object-fit:cover;">
                <div style="padding:10px;"><b>${d.data().brand}</b><br>${d.data().price} kr</div>
                <button onclick="del('${d.id}')" style="width:100%; border:none; padding:8px; background:#fee2e2; color:red; cursor:pointer;">Ta bort</button>
            </div>`).join('');
    }

    function listen() {
        const q = query(collection(db, "messages"), where("participants", "array-contains", user.uid), orderBy("timestamp", "desc"));
        onSnapshot(q, snap => {
            const unique = {};
            snap.docs.forEach(d => { if(!unique[d.data().chatId]) unique[d.data().chatId] = d.data(); });
            document.getElementById('chats').innerHTML = Object.values(unique).map(c => `
                <div class="chat-item ${activeId === c.chatId ? 'active' : ''}" onclick="openChat('${c.chatId}', '${c.carId}', '${c.carTitle}', '${c.carImage}')">
                    <img src="${c.carImage}" style="width:40px; height:40px; border-radius:8px; object-fit:cover;">
                    <div><div style="font-weight:800; font-size:13px;">${c.senderId === user.uid ? 'Jag' : c.senderName}</div><div style="font-size:11px; color:#999;">${c.carTitle}</div></div>
                </div>`).join('');
        });
    }

    window.openChat = (id, carId, title, img) => {
        activeId = id; if(unsub) unsub();
        document.getElementById('chatView').innerHTML = `
            <div style="padding:10px; background:white; border-bottom:1px solid #eee; display:flex; align-items:center; gap:10px; cursor:pointer;" onclick="location.href='details.html?id=${carId}'">
                <img src="${img}" style="width:35px; height:35px; border-radius:5px; object-fit:cover;">
                <b style="font-size:14px;">${title}</b>
            </div>
            <div class="msg-area" id="msgs"></div>
            <div class="input-bar"><input type="text" id="mIn" placeholder="Skriv..."><button onclick="send()" style="background:#075e54; color:white; border:none; padding:8px 15px; border-radius:20px; cursor:pointer;">➤</button></div>`;
        const q = query(collection(db, "messages"), where("chatId", "==", id), orderBy("timestamp", "asc"));
        unsub = onSnapshot(q, snap => {
            document.getElementById('msgs').innerHTML = snap.docs.map(d => `<div class="bubble ${d.data().senderId === user.uid ? 'me' : 'them'}">${d.data().message}</div>`).join('');
            document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
        });
    };

    window.send = async () => {
        const input = document.getElementById('mIn'); if(!input.value.trim()) return;
        const parts = activeId.split('_'); const recipient = (parts[0] === user.uid) ? parts[1] : parts[0];
        await addDoc(collection(db, "messages"), {
            chatId: activeId, participants: [user.uid, recipient],
            carId: parts[2], carTitle: document.querySelector('b').innerText, carImage: document.querySelector('#chatView img').src,
            senderId: user.uid, senderName: user.email.split('@')[0], recipientId: recipient, message: input.value, timestamp: serverTimestamp()
        });
        input.value = "";
    };

    window.del = async (id) => { if(confirm("Ta bort?")) { await deleteDoc(doc(db, "cars", id)); loadAds(); } };
    window.logout = () => signOut(auth).then(() => window.location.href='index.html');
</script>
</body>
</html>

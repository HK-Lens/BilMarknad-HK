<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Sida | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); }

        header { background: white; padding: 15px 6%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { text-decoration: none; font-size: 24px; font-weight: 900; color: var(--dark); }
        .logo span { color: var(--primary); }

        .dashboard-header { background: var(--dark); color: white; padding: 50px 6%; text-align: center; }
        .dashboard-header h1 { font-size: 32px; font-weight: 900; margin-bottom: 10px; }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        
        /* بطاقة إدارة السيارة */
        .admin-card { 
            background: white; border-radius: 20px; padding: 20px; display: grid; 
            grid-template-columns: 150px 1fr auto; gap: 20px; align-items: center;
            margin-bottom: 15px; border: 1px solid var(--border); transition: 0.3s;
        }
        .admin-card img { width: 150px; height: 110px; object-fit: cover; border-radius: 12px; }

        .btn-group { display: flex; flex-direction: column; gap: 8px; }
        .btn-action { 
            padding: 10px 20px; border-radius: 10px; border: none; font-weight: 700; 
            cursor: pointer; font-size: 13px; transition: 0.2s; text-align: center; text-decoration: none;
        }
        .btn-edit { background: var(--primary); color: white; }
        .btn-delete { background: #fee2e2; color: #ef4444; }

        /* نافذة التعديل المنبثقة (Edit Modal) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 35px; border-radius: 24px; width: 95%; max-width: 550px; max-height: 90vh; overflow-y: auto; }
        .modal-header { font-size: 22px; font-weight: 900; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        .field { margin-bottom: 15px; }
        .field label { display: block; font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; }
        .modal-input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; outline: none; font-size: 14px; }
        
        .modal-footer { display: flex; gap: 10px; margin-top: 25px; }
        .btn-save { flex: 2; background: var(--dark); color: white; }
        .btn-cancel { flex: 1; background: #f1f5f9; color: var(--dark); }

        .empty-state { text-align: center; padding: 60px; background: white; border-radius: 24px; border: 2px dashed var(--border); }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <div style="display: flex; gap: 15px;">
        <a href="add-car.html" style="background:var(--primary); color:white; padding:8px 16px; border-radius:10px; text-decoration:none; font-weight:800; font-size:13px;">+ Ny annons</a>
        <button onclick="logout()" style="background:none; border:none; color:#ef4444; font-weight:700; cursor:pointer;">Logga ut</button>
    </div>
</header>

<div class="dashboard-header">
    <h1>Min Sida</h1>
    <p id="userEmail">Laddar konto...</p>
</div>

<div class="container" id="adsList">
    </div>

<div class="modal" id="editModal">
    <div class="modal-content">
        <div class="modal-header">Redigera fordon</div>
        
        <div class="field">
            <label>Pris (kr)</label>
            <input type="number" id="editPrice" class="modal-input">
        </div>

        <div class="field">
            <label>Miltal (mil)</label>
            <input type="number" id="editMileage" class="modal-input">
        </div>

        <div class="field">
            <label>Drivmedel</label>
            <select id="editFuel" class="modal-input">
                <option value="Bensin">Bensin</option>
                <option value="Diesel">Diesel</option>
                <option value="El">El</option>
                <option value="Hybrid">Hybrid</option>
            </select>
        </div>

        <div class="field">
            <label>Beskrivning</label>
            <textarea id="editDesc" class="modal-input" rows="4"></textarea>
        </div>

        <div class="modal-footer">
            <button class="btn-action btn-cancel" onclick="closeModal()">Avbryt</button>
            <button class="btn-action btn-save" onclick="saveChanges()">Spara ändringar</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentEditId = null;

    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = "login.html";
        } else {
            document.getElementById('userEmail').innerText = user.email;
            loadMyAds(user.uid);
        }
    });

    async function loadMyAds(uid) {
        const adsList = document.getElementById('adsList');
        const q = query(collection(db, "cars"), where("sellerId", "==", uid));
        const snap = await getDocs(q);

        if (snap.empty) {
            adsList.innerHTML = `<div class="empty-state"><h3>Här var det tomt.</h3><p>Du har inte publicerat några annonser än.</p></div>`;
            return;
        }

        adsList.innerHTML = snap.docs.map(d => {
            const car = d.data();
            return `
                <div class="admin-card">
                    <img src="${car.images?.[0] || 'https://via.placeholder.com/150'}">
                    <div>
                        <div style="font-weight:900; font-size:18px;">${car.brand} ${car.model || ''}</div>
                        <div style="color:var(--primary); font-weight:800; font-size:20px;">${Number(car.price).toLocaleString()} kr</div>
                        <div style="font-size:12px; color:#64748b; margin-top:5px;">${car.year} • ${car.mileage} mil • ${car.fuelType || 'Bensin'}</div>
                    </div>
                    <div class="btn-group">
                        <button class="btn-action btn-edit" onclick="openEditModal('${d.id}', ${car.price}, ${car.mileage}, '${car.fuelType || 'Bensin'}', \`${car.description || ''}\`)">Redigera</button>
                        <button class="btn-action btn-delete" onclick="deleteAd('${d.id}')">Ta bort</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    // فتح نافذة التعديل
    window.openEditModal = (id, price, mileage, fuel, desc) => {
        currentEditId = id;
        document.getElementById('editPrice').value = price;
        document.getElementById('editMileage').value = mileage;
        document.getElementById('editFuel').value = fuel;
        document.getElementById('editDesc').value = desc;
        document.getElementById('editModal').style.display = 'flex';
    };

    window.closeModal = () => { document.getElementById('editModal').style.display = 'none'; };

    // حفظ التعديلات في Firebase
    window.saveChanges = async () => {
        const p = Number(document.getElementById('editPrice').value);
        const m = Number(document.getElementById('editMileage').value);
        const f = document.getElementById('editFuel').value;
        const d = document.getElementById('editDesc').value;

        try {
            await updateDoc(doc(db, "cars", currentEditId), {
                price: p,
                mileage: m,
                fuelType: f,
                description: d
            });
            alert("Uppgifterna har uppdaterats!");
            location.reload();
        } catch (e) {
            alert("Ett fel uppstod.");
        }
    };

    window.deleteAd = async (id) => {
        if (confirm("Vill du ta bort annonsen permanent?")) {
            await deleteDoc(doc(db, "cars", id));
            location.reload();
        }
    };

    window.logout = () => signOut(auth).then(() => window.location.href = "index.html");
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitt Konto | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #f58220; 
            --dark: #0f172a; 
            --bg: #f1f5f9; 
            --white: #ffffff;
            --chat-in: #e2e8f0;
            --chat-out: #f58220;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding-bottom: 20px; }
        header { background: var(--white); padding: 15px 6%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 1000; }
        .logo { text-decoration: none; color: var(--dark); font-weight: 900; font-size: 22px; }
        .logo span { color: var(--primary); }
        
        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }
        .section-title { font-weight: 900; margin: 30px 0 15px; color: var(--dark); text-transform: uppercase; letter-spacing: 1px; font-size: 18px; }

        /* --- Smart Chat Layout --- */
        .chat-wrapper { background: var(--white); border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: flex; flex-direction: column; height: 500px; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #fafafa; }
        
        .bubble { max-width: 75%; padding: 12px 16px; border-radius: 15px; font-size: 14px; line-height: 1.4; position: relative; }
        .bubble.in { align-self: flex-start; background: var(--chat-in); color: var(--dark); border-bottom-left-radius: 2px; }
        .bubble.out { align-self: flex-end; background: var(--chat-out); color: white; border-bottom-right-radius: 2px; }
        
        .bubble .info { font-size: 10px; opacity: 0.6; display: block; margin-top: 5px; text-align: right; }
        .bubble .car-ref { font-size: 10px; font-weight: 900; margin-bottom: 4px; display: block; opacity: 0.8; }

        /* --- Chat Input --- */
        .chat-input-area { padding: 15px; background: white; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .chat-input-area input { flex: 1; padding: 12px 20px; border: 1px solid #ddd; border-radius: 30px; outline: none; transition: 0.3s; }
        .chat-input-area input:focus { border-color: var(--primary); }
        .send-btn { background: var(--dark); color: white; border: none; padding: 0 25px; border-radius: 30px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .send-btn:hover { background: var(--primary); }

        /* --- Grid for Ads --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .car-card { background: white; border-radius: 15px; overflow: hidden; border: 1px solid #eee; }
        .car-img { width: 100%; height: 120px; object-fit: cover; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <button onclick="logout()" style="background:#fee2e2; color:#ef4444; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:700;">Logga ut</button>
</header>

<div class="container">
    <h2 class="section-title">Mina Annonser</h2>
    <div id="myCarsGrid" class="grid"><p>Laddar...</p></div>

    <h2 class="section-title">Smart Chat</h2>
    <div class="chat-wrapper">
        <div id="chatWindow" class="chat-messages">
            <p style="text-align:center; color:#999; margin-top:100px;">Hämtar konversationer...</p>
        </div>
        <div class="chat-input-area">
            <input type="text" id="replyInput" placeholder="Skriv ett svar...">
            <button class="send-btn" id="sendBtn">Skicka</button>
        </div>
    </div>
</div>

<script type="module">
    import { db, auth } from './firebase-config.js';
    import { collection, query, where, getDocs, addDoc, serverTimestamp, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    let currentUser = null;
    let chatContext = { partnerId: null, partnerEmail: null, carTitle: "Allmän förfrågan" };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            loadMyCars();
            listenToMessages();
        } else {
            window.location.href = "login.html";
        }
    });

    async function loadMyCars() {
        const grid = document.getElementById('myCarsGrid');
        const q = query(collection(db, "cars"), where("sellerId", "==", currentUser.uid));
        const snap = await getDocs(q);
        grid.innerHTML = snap.docs.length === 0 ? "<p>Inga annonser upplagda.</p>" : snap.docs.map(d => `
            <div class="car-card">
                <img src="${d.data().images?.[0] || ''}" class="car-img">
                <div style="padding:10px; font-weight:700; font-size:14px;">${d.data().brand} ${d.data().model}</div>
            </div>
        `).join('');
    }

    function listenToMessages() {
        const chatWindow = document.getElementById('chatWindow');
        
        // جلب الرسائل التي يكون المستخدم طرفاً فيها (مرسل أو مستقبل)
        const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));

        onSnapshot(q, (snapshot) => {
            const allMsgs = snapshot.docs
                .map(d => ({ id: d.id, ...d.data() }))
                .filter(m => m.receiverId === currentUser.uid || m.senderId === currentUser.uid);

            if (allMsgs.length === 0) {
                chatWindow.innerHTML = "<p style='text-align:center; margin-top:100px;'>Inga meddelanden ännu.</p>";
                return;
            }

            chatWindow.innerHTML = allMsgs.map(m => {
                const isOut = m.senderId === currentUser.uid;
                
                // تحديث سياق الرد التلقائي بناءً على آخر رسالة مستلمة
                if (!isOut) {
                    chatContext.partnerId = m.senderId;
                    chatContext.partnerEmail = m.senderEmail;
                    chatContext.carTitle = m.carTitle;
                }

                return `
                    <div class="bubble ${isOut ? 'out' : 'in'}">
                        <span class="car-ref">${m.carTitle}</span>
                        ${m.message}
                        <span class="info">${m.createdAt?.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                    </div>
                `;
            }).join('');
            
            chatWindow.scrollTop = chatWindow.scrollHeight;
        });
    }

    document.getElementById('sendBtn').onclick = async () => {
        const input = document.getElementById('replyInput');
        if (!input.value.trim() || !chatContext.partnerId) return;

        try {
            await addDoc(collection(db, "messages"), {
                senderId: currentUser.uid,
                senderName: "Säljare",
                senderEmail: currentUser.email,
                receiverId: chatContext.partnerId,
                receiverEmail: chatContext.partnerEmail,
                carTitle: "RE: " + chatContext.carTitle,
                message: input.value,
                createdAt: serverTimestamp()
            });
            input.value = "";
        } catch (err) {
            console.error("Error sending message:", err);
        }
    };

    window.logout = () => signOut(auth).then(() => window.location.href="login.html");
</script>

</body>
</html>

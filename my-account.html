<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Min Sida | BILHK</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .tab-content { flex: 1; overflow-y: auto; display: none; }
        .tab-content.active { display: block; }
        .messenger { display: flex; height: 100%; }
        .sidebar { width: 300px; border-right: 1px solid #ddd; overflow-y: auto; }
        .chat-view { flex: 1; display: flex; flex-direction: column; background: #f0f0f0; }
        @media (max-width: 700px) { .sidebar { width: 100%; } .chat-view { display: none; position: fixed; inset: 0; z-index: 100; } .chat-view.active { display: flex; } }
    </style>
</head>
<body>
<header><a href="index.html" class="logo">BIL<span>HK</span></a><button onclick="logout()">Logga ut</button></header>
<nav class="tabs">
    <button onclick="showTab('ads')" id="t-ads" class="active">Mina annonser</button>
    <button onclick="showTab('msgs')" id="t-msgs">Meddelanden</button>
</nav>

<main>
    <div id="ads" class="tab-content active">
        <div id="myAdsGrid" class="grid-small"></div>
    </div>
    <div id="msgs" class="tab-content">
        <div class="messenger">
            <div id="inbox" class="sidebar"></div>
            <div id="chatRoom" class="chat-view">
                <div class="empty">Välj en chatt</div>
            </div>
        </div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot, addDoc, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let user, activeChat, unsub;

    onAuthStateChanged(auth, u => {
        if (!u) location.href = 'login.html';
        user = u;
        listenInbox();
    });

    window.showTab = (t) => {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.getElementById(t).classList.add('active');
    };

    function listenInbox() {
        const q = query(collection(db, "messages"), where("participants", "array-contains", user.uid));
        onSnapshot(q, snap => {
            const unique = {};
            snap.docs.forEach(d => { if(!unique[d.data().chatId]) unique[d.data().chatId] = d.data(); });
            document.getElementById('inbox').innerHTML = Object.values(unique).map(c => `
                <div class="inbox-item" onclick="openChat('${c.chatId}', '${c.carTitle}', '${c.carImage}')">
                    <img src="${c.carImage}">
                    <div><b>${c.carTitle}</b><br><small>${c.message}</small></div>
                </div>`).join('');
        });
    }

    window.openChat = (id, title, img) => {
        activeChat = id; if(unsub) unsub();
        const room = document.getElementById('chatRoom');
        room.classList.add('active');
        room.innerHTML = `
            <div class="chat-header"><button onclick="room.classList.remove('active')">←</button> ${title}</div>
            <div id="msgFlow" class="msg-flow"></div>
            <div class="input-box"><input id="replyIn"><button onclick="sendReply()">➤</button></div>`;
        
        const q = query(collection(db, "messages"), where("chatId", "==", id), orderBy("timestamp", "asc"));
        unsub = onSnapshot(q, snap => {
            document.getElementById('msgFlow').innerHTML = snap.docs.map(d => `
                <div class="msg ${d.data().senderId === user.uid ? 'me' : 'them'}">${d.data().message}</div>`).join('');
        });
    };

    window.sendReply = async () => {
        const val = document.getElementById('replyIn').value;
        const p = activeChat.split('_');
        const rec = (p[0] === user.uid) ? p[1] : p[0];
        await addDoc(collection(db, "messages"), {
            chatId: activeChat, participants: [user.uid, rec],
            senderId: user.uid, message: val, timestamp: serverTimestamp(),
            carTitle: document.querySelector('.chat-header').innerText.replace('← ', ''),
            carImage: document.querySelector('.inbox-item img').src
        });
        document.getElementById('replyIn').value = "";
    };

    window.logout = () => signOut(auth).then(() => location.href='index.html');
</script>
</body>
</html>

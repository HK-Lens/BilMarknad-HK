<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Min Sida | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f0f2f5; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        header { 
            height: 60px; 
            background: white; 
            padding: 0 5%; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            flex-shrink: 0; 
        }
        
        .logo { text-decoration: none; font-size: 22px; font-weight: 900; color: var(--dark); }
        .logo span { color: var(--primary); }

        .nav-tabs { 
            background: white; 
            display: flex; 
            padding: 8px 5%; 
            gap: 8px; 
            border-bottom: 1px solid var(--border); 
            flex-shrink: 0; 
        }
        
        .tab-btn { 
            flex: 1; 
            padding: 12px; 
            border: none; 
            border-radius: 12px; 
            font-weight: 800; 
            font-size: 13px; 
            background: #f1f5f9; 
            color: #64748b; 
            cursor: pointer; 
            transition: 0.2s;
        }
        
        .tab-btn.active { background: var(--dark); color: white; }
        .logout-btn { color: #ef4444; background: #fee2e2; }

        main { flex: 1; overflow: hidden; position: relative; }
        
        .view-pane { display: none; height: 100%; overflow-y: auto; }
        .view-pane.active { display: block; }

        .ads-grid { 
            padding: 15px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 12px; 
        }
        
        .ad-card { 
            background: white; 
            border-radius: 15px; 
            overflow: hidden; 
            border: 1px solid var(--border); 
        }
        
        .ad-card img { width: 100%; height: 110px; object-fit: cover; }
        .ad-card-body { padding: 10px; }
        .btn-del { 
            width: 100%; 
            padding: 8px; 
            background: #fee2e2; 
            color: #ef4444; 
            border: none; 
            border-radius: 8px; 
            font-weight: 700; 
            font-size: 11px; 
            cursor: pointer;
            margin-top: 8px;
        }

        .messenger { display: flex; height: 100%; background: white; }
        .sidebar { width: 350px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-list { flex: 1; overflow-y: auto; }
        
        .chat-view { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; position: relative; }

        @media (max-width: 750px) {
            .sidebar { width: 100%; }
            .chat-view { 
                position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; 
                z-index: 2000; display: none; 
            }
            .chat-view.active { display: flex; }
        }

        .chat-header { 
            padding: 10px 15px; 
            background: white; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }
        
        .chat-header img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }

        .msg-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        
        .bubble { 
            max-width: 85%; 
            padding: 10px 14px; 
            border-radius: 15px; 
            font-size: 14px; 
            line-height: 1.4; 
            box-shadow: 0 1px 1px rgba(0,0,0,0.1); 
        }
        
        .bubble.me { align-self: flex-end; background: #dcf8c6; border-bottom-right-radius: 2px; }
        .bubble.them { align-self: flex-start; background: white; border-bottom-left-radius: 2px; }

        .input-bar { 
            padding: 10px 15px; 
            background: #f0f0f0; 
            display: flex; 
            gap: 10px; 
            align-items: center; 
            flex-shrink: 0;
            padding-bottom: env(safe-area-inset-bottom, 10px);
        }
        
        .input-bar input { 
            flex: 1; 
            padding: 12px 18px; 
            border-radius: 25px; 
            border: 1px solid #ddd; 
            outline: none; 
            font-size: 16px; 
            background: white;
        }
        
        .send-btn { 
            background: #075e54; 
            color: white; 
            border: none; 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 20px; 
            cursor: pointer;
        }

        .empty-state { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100%; 
            color: #94a3b8; 
            padding: 40px; 
            text-align: center; 
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <div id="uName" style="font-weight: 800; font-size: 13px;">...</div>
</header>

<div class="nav-tabs">
    <button class="tab-btn active" id="tab-ads" onclick="switchView('ads')"> المنشورات</button>
    <button class="tab-btn" id="tab-chat" onclick="switchView('chat')"> صندوق البريد</button>
    <button class="tab-btn logout-btn" onclick="logout()">Logga ut</button>
</div>

<main>
    <section id="ads-view" class="view-pane active">
        <div id="myAdsGrid" class="ads-grid"></div>
    </section>

    <section id="chat-view" class="view-pane">
        <div class="messenger">
            <div class="sidebar">
                <div style="padding: 15px; font-weight: 900; border-bottom: 1px solid #eee;">Inkorg</div>
                <div id="inboxList" class="sidebar-list"></div>
            </div>
            <div id="chatRoom" class="chat-view">
                <div class="empty-state">
                    <p>Välj en konversation för att skriva</p>
                </div>
            </div>
        </div>
    </section>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, addDoc, serverTimestamp, orderBy, onSnapshot, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let user = null; 
    let activeChatId = null; 
    let unsubChat = null;

    onAuthStateChanged(auth, u => {
        if (!u) { window.location.href = 'login.html'; return; }
        user = u;
        document.getElementById('uName').innerText = u.email.split('@')[0];
        loadMyAds();
        listenToInbox();
    });

    window.switchView = (v) => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + v).classList.add('active');
        document.querySelectorAll('.view-pane').forEach(p => p.classList.remove('active'));
        document.getElementById(v + '-view').classList.add('active');
    };

    async function loadMyAds() {
        const grid = document.getElementById('myAdsGrid');
        try {
            const q = query(collection(db, "cars"), where("sellerId", "==", user.uid));
            const snap = await getDocs(q);
            if (snap.empty) { grid.innerHTML = "<p class='empty-state'>Inga annonser.</p>"; return; }
            grid.innerHTML = snap.docs.map(d => {
                const c = d.data();
                return `
                    <div class="ad-card">
                        <img src="${c.images[0]}">
                        <div class="ad-card-body">
                            <b>${c.brand}</b><br>${Number(c.price).toLocaleString()} kr
                            <button class="btn-del" onclick="deleteAd('${d.id}')">Ta bort</button>
                        </div>
                    </div>`;
            }).join('');
        } catch (e) { grid.innerHTML = "Error loading ads."; }
    }

    function listenToInbox() {
        const list = document.getElementById('inboxList');
        const q = query(collection(db, "messages"), where("participants", "array-contains", user.uid));
        
        onSnapshot(q, snap => {
            const unique = {};
            snap.docs.forEach(d => { 
                const m = d.data();
                if(!unique[m.chatId]) unique[m.chatId] = m;
            });
            
            const chats = Object.values(unique);
            if (chats.length === 0) { list.innerHTML = "<p class='empty-state'>Inga meddelanden.</p>"; return; }
            
            list.innerHTML = chats.map(c => `
                <div class="chat-item" onclick="openChat('${c.chatId}', '${c.carId}', '${c.carTitle}', '${c.carImage}')" 
                     style="padding:15px; display:flex; gap:12px; border-bottom:1px solid #f8fafc; cursor:pointer;">
                    <img src="${c.carImage}" style="width:45px; height:45px; border-radius:10px; object-fit:cover;">
                    <div style="flex:1; overflow:hidden;">
                        <div style="font-weight:800; font-size:14px;">${c.senderId === user.uid ? 'Jag' : c.senderName}</div>
                        <div style="font-size:11px; color:#94a3b8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${c.carTitle}</div>
                    </div>
                </div>`).join('');
        }, err => {
            list.innerHTML = "<p style='padding:20px; color:red; font-size:12px;'>Error: " + err.message + "</p>";
        });
    }

    window.openChat = (chatId, carId, title, img) => {
        activeChatId = chatId;
        if(unsubChat) unsubChat();
        const room = document.getElementById('chatRoom');
        room.classList.add('active');
        
        room.innerHTML = `
            <div class="chat-header">
                <button onclick="document.getElementById('chatRoom').classList.remove('active')" style="border:none; background:none; font-size:24px; padding-right:10px;">←</button>
                <img src="${img}" onclick="location.href='details.html?id=${carId}'" style="cursor:pointer;">
                <div style="flex:1;">
                    <b style="font-size:14px;">${title}</b>
                </div>
            </div>
            <div id="msgArea" class="msg-list"></div>
            <div class="input-bar">
                <input type="text" id="mIn" placeholder="Skriv..." onkeypress="if(event.key==='Enter') send()">
                <button class="send-btn" onclick="send()">➤</button>
            </div>`;

        const q = query(collection(db, "messages"), where("chatId", "==", chatId), orderBy("timestamp", "asc"));
        unsubChat = onSnapshot(q, snap => {
            const area = document.getElementById('msgArea');
            area.innerHTML = snap.docs.map(d => `
                <div class="bubble ${d.data().senderId === user.uid ? 'me' : 'them'}">
                    ${d.data().message}
                </div>`).join('');
            area.scrollTop = area.scrollHeight;
        });
    };

    window.send = async () => {
        const input = document.getElementById('mIn');
        if (!input.value.trim()) return;
        const txt = input.value;
        input.value = ""; 
        
        const parts = activeChatId.split('_');
        const recipient = (parts[0] === user.uid) ? parts[1] : parts[0];
        
        try {
            await addDoc(collection(db, "messages"), {
                chatId: activeChatId,
                participants: [user.uid, recipient],
                carId: activeChatId.split('_')[2],
                carTitle: document.querySelector('.chat-header b').innerText,
                carImage: document.querySelector('.chat-header img').src,
                senderId: user.uid,
                senderName: user.email.split('@')[0],
                message: txt,
                timestamp: serverTimestamp()
            });
        } catch (e) { console.error(e); }
    };

    window.deleteAd = async (id) => {
        if(confirm("Vill du ta bort annonsen?")) {
            await deleteDoc(doc(db, "cars", id));
            loadMyAds();
        }
    };

    window.logout = () => signOut(auth).then(() => window.location.href = 'index.html');
</script>
</body>
</html>

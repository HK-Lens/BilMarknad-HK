<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbox & Chatt | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: white; height: 100vh; overflow: hidden; }
        
        header { height: 70px; background: white; padding: 0 6%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { text-decoration: none; font-size: 22px; font-weight: 900; color: var(--dark); }
        .logo span { color: var(--primary); }

        .messenger-container { display: grid; grid-template-columns: 350px 1fr; height: calc(100vh - 70px); }
        @media (max-width: 800px) { .messenger-container { grid-template-columns: 1fr; } .chat-view { display: none; } }

        /* القائمة الجانبية (Conversations) */
        .sidebar { border-right: 1px solid var(--border); overflow-y: auto; background: var(--bg); }
        .sidebar-header { padding: 20px; font-weight: 900; font-size: 20px; background: white; border-bottom: 1px solid var(--border); }
        .chat-item { padding: 15px 20px; display: flex; gap: 12px; cursor: pointer; border-bottom: 1px solid #eee; transition: 0.2s; background: white; }
        .chat-item:hover { background: #f1f5f9; }
        .chat-item.active { background: #fff5eb; border-left: 4px solid var(--primary); }
        .chat-item img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; }

        /* نافذة الدردشة (Main View) */
        .chat-view { display: flex; flex-direction: column; background: white; }
        .chat-header { padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: white; }
        .car-info-bar { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .car-info-bar img { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; }

        .messages-area { flex: 1; overflow-y: auto; padding: 25px; background: #f8fafc; display: flex; flex-direction: column; gap: 15px; }
        .bubble { max-width: 70%; padding: 12px 18px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
        .bubble.me { align-self: flex-end; background: var(--dark); color: white; border-bottom-right-radius: 4px; }
        .bubble.them { align-self: flex-start; background: white; border: 1px solid var(--border); border-bottom-left-radius: 4px; }

        .input-area { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 12px; background: white; }
        .input-area input { flex: 1; padding: 12px 20px; border-radius: 30px; border: 1px solid var(--border); outline: none; background: #f1f5f9; }
        .btn-send { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-weight: 900; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <button onclick="logout()" style="background:none; border:none; color:#ef4444; font-weight:700; cursor:pointer;">Logga ut</button>
</header>

<div class="messenger-container">
    <div class="sidebar">
        <div class="sidebar-header">Inkorg</div>
        <div id="chatsList">Laddar...</div>
    </div>

    <div class="chat-view" id="chatView">
        <div style="height: 100%; display: flex; align-items: center; justify-content: center; color: #94a3b8;">
            Välj en konversation för att börja chatta
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, serverTimestamp, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let currentUser = null;
    let activeChatId = null;

    onAuthStateChanged(auth, user => {
        if (!user) window.location.href = 'login.html';
        currentUser = user;
        loadConversations();
    });

    // 1. تحميل قائمة المحادثات (Inbox)
    async function loadConversations() {
        const chatsList = document.getElementById('chatsList');
        // جلب الرسائل التي تخص المستخدم (سواء كان مرسلاً أو مستلماً)
        const qRec = query(collection(db, "messages"), where("recipientId", "==", currentUser.uid));
        const qSen = query(collection(db, "messages"), where("senderId", "==", currentUser.uid));
        
        const [snapRec, snapSen] = await Promise.all([getDocs(qRec), getDocs(qSen)]);
        const allMsgs = [...snapRec.docs, ...snapSen.docs];

        // تجميع الرسائل حسب الـ ChatId لفتح غرف فريدة
        const uniqueChats = {};
        allMsgs.forEach(doc => {
            const m = doc.data();
            if (!uniqueChats[m.chatId]) uniqueChats[m.chatId] = m;
        });

        const chatsArr = Object.values(uniqueChats);
        if (chatsArr.length === 0) {
            chatsList.innerHTML = `<p style="padding:20px; color:#94a3b8;">Inga meddelanden än.</p>`;
            return;
        }

        chatsList.innerHTML = chatsArr.map(c => `
            <div class="chat-item" onclick="openChat('${c.chatId}', '${c.carId}', '${c.carTitle}', '${c.carImage}')">
                <img src="${c.carImage}">
                <div>
                    <div style="font-weight:800; font-size:14px;">${c.carTitle}</div>
                    <div style="font-size:12px; color:#64748b;">Klicka för att svara</div>
                </div>
            </div>
        `).join('');
    }

    // 2. فتح غرفة الدردشة (WhatsApp Style)
    window.openChat = (chatId, carId, carTitle, carImage) => {
        activeChatId = chatId;
        const chatView = document.getElementById('chatView');
        
        chatView.innerHTML = `
            <div class="chat-header">
                <div class="car-info-bar" onclick="location.href='details.html?id=${carId}'">
                    <img src="${carImage}">
                    <div>
                        <div style="font-weight:900; font-size:14px;">${carTitle}</div>
                        <div style="font-size:11px; color:var(--primary); font-weight:700;">Visa annons ➔</div>
                    </div>
                </div>
            </div>
            <div class="messages-area" id="msgsArea">Laddar...</div>
            <div class="input-area">
                <input type="text" id="msgInput" placeholder="Skriv ett meddelande...">
                <button class="btn-send" onclick="sendMessage('${chatId}', '${carId}', '${carTitle}', '${carImage}')">➤</button>
            </div>
        `;

        // استماع للرسائل في الوقت الحقيقي (Real-time)
        const q = query(collection(db, "messages"), where("chatId", "==", chatId), orderBy("timestamp", "asc"));
        onSnapshot(q, (snapshot) => {
            const area = document.getElementById('msgsArea');
            area.innerHTML = snapshot.docs.map(doc => {
                const m = doc.data();
                const isMe = m.senderId === currentUser.uid;
                return `<div class="bubble ${isMe ? 'me' : 'them'}">${m.message}</div>`;
            }).join('');
            area.scrollTop = area.scrollHeight;
        });
    };

    // 3. إرسال رد داخل الدردشة
    window.sendMessage = async (chatId, carId, carTitle, carImage) => {
        const input = document.getElementById('msgInput');
        if (!input.value) return;

        // تحديد المستلم (الطرف الآخر في المحادثة)
        const parts = chatId.split('_');
        const recipientId = parts[0] === currentUser.uid ? parts[1] : parts[0];

        await addDoc(collection(db, "messages"), {
            chatId: chatId,
            carId: carId,
            carTitle: carTitle,
            carImage: carImage,
            senderId: currentUser.uid,
            senderName: currentUser.displayName || currentUser.email.split('@')[0],
            recipientId: recipientId,
            message: input.value,
            timestamp: serverTimestamp()
        });
        input.value = "";
    };

    window.logout = () => signOut(auth).then(() => window.location.href = "index.html");
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitt Konto | BilHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .account-container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .user-card { 
            background: var(--dark); color: white; padding: 40px; 
            border-radius: 20px; text-align: center; margin-bottom: 40px;
        }
        .user-card h1 { font-size: 28px; margin-bottom: 10px; }
        .user-email { opacity: 0.8; font-size: 16px; margin-bottom: 20px; display: block; }
        
        .btn-logout { 
            background: #ef4444; color: white; border: none; 
            padding: 10px 25px; border-radius: 8px; font-weight: 700; 
            cursor: pointer; transition: 0.3s;
        }
        .btn-logout:hover { background: #dc2626; }

        .my-ads-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .no-ads { text-align: center; padding: 50px; background: white; border-radius: 15px; color: gray; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <a href="index.html" style="text-decoration:none; color:var(--dark); font-weight:700;">Tillbaka till hem</a>
</header>

<div class="account-container">
    <div class="user-card">
        <h1>Välkommen!</h1>
        <span class="user-email" id="userDisplayEmail">Laddar...</span>
        <button class="btn-logout" id="logoutBtn">Logga ut (تسجيل الخروج)</button>
    </div>

    <div class="my-ads-header">
        <h2>Mina annonser (إعلاناتي)</h2>
        <a href="sell.html" class="btn-sell" style="background:var(--primary); color:white; padding:8px 15px; border-radius:8px; text-decoration:none; font-size:14px;">+ Ny annons</a>
    </div>

    <div class="cars-grid" id="myCarsGrid">
        <div class="no-ads">Hämtar dina annonser...</div>
    </div>
</div>

<script type="module">
    import { db, auth } from './firebase-config.js';
    import { collection, getDocs, query, where, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // 1. مراقبة حالة المستخدم وجلب بياناته
    onAuthStateChanged(auth, (user) => {
        if (user) {
            // إظهار البريد الإلكتروني
            document.getElementById('userDisplayEmail').textContent = user.email;
            // جلب الإعلانات الخاصة بهذا المستخدم فقط
            fetchMyAds(user.email);
        } else {
            // إذا لم يكن مسجلاً، وجهه لصفحة الدخول
            window.location.href = "login.html";
        }
    });

    // 2. وظيفة جلب الإعلانات الخاصة بالمستخدم
    async function fetchMyAds(email) {
        const grid = document.getElementById('myCarsGrid');
        try {
            const q = query(
                collection(db, "cars"), 
                where("sellerEmail", "==", email),
                orderBy("createdAt", "desc")
            );
            const snap = await getDocs(q);

            if (snap.empty) {
                grid.innerHTML = '<div class="no-ads">Du har inga aktiva annonser än.</div>';
                return;
            }

            grid.innerHTML = snap.docs.map(doc => {
                const c = doc.data();
                return `
                    <div class="car-card">
                        <img src="${c.images ? c.images[0] : 'placeholder.jpg'}">
                        <div class="card-content">
                            <div class="price-tag">${Number(c.price).toLocaleString()} kr</div>
                            <div class="car-title">${c.brand} ${c.model}</div>
                            <div style="display:flex; gap:10px; margin-top:15px;">
                                <button onclick="deleteAd('${doc.id}')" style="flex:1; padding:8px; background:#fee2e2; color:#ef4444; border:none; border-radius:5px; cursor:pointer; font-weight:700;">Ta bort</button>
                                <button onclick="window.location.href='details.html?id=${doc.id}'" style="flex:1; padding:8px; background:#f1f5f9; color:#475569; border:none; border-radius:5px; cursor:pointer; font-weight:700;">Visa</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        } catch (err) {
            console.error(err);
            grid.innerHTML = '<div class="no-ads">Kunde inte hämta annonser.</div>';
        }
    }

    // 3. وظيفة تسجيل الخروج (Logout)
    document.getElementById('logoutBtn').onclick = async () => {
        try {
            await signOut(auth);
            window.location.href = "index.html"; // العودة للرئيسية بعد الخروج
        } catch (err) {
            alert("Kunde inte logga ut.");
        }
    };

    // 4. وظيفة الحذف (Global)
    window.deleteAd = async (id) => {
        if (confirm("Är du säker på att du vill ta bort annonsen?")) {
            try {
                await deleteDoc(doc(db, "cars", id));
                location.reload(); // تحديث الصفحة بعد الحذف
            } catch (err) {
                alert("Fel vid borttagning.");
            }
        }
    };
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitt Konto | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #f58220; 
            --dark: #0f172a; 
            --bg: #f8fafc; 
            --border: #e2e8f0; 
            --white: #ffffff;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); }

        header {
            background: var(--white);
            padding: 15px 6%;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { text-decoration: none; font-size: 24px; font-weight: 900; color: var(--dark); }
        .logo span { color: var(--primary); }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .welcome-card { background: var(--dark); color: white; padding: 30px; border-radius: 20px; margin-bottom: 30px; }
        
        .section-title { font-weight: 800; font-size: 20px; margin: 30px 0 15px; display: flex; align-items: center; gap: 10px; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .car-card { background: white; border-radius: 15px; overflow: hidden; border: 1px solid var(--border); transition: 0.3s; }
        .car-card:hover { transform: translateY(-5px); box-shadow: var(--shadow); }
        .car-img { width: 100%; height: 160px; object-fit: cover; }
        .car-info { padding: 15px; }

        /* تسيق الرسائل */
        .msg-card { background: white; padding: 20px; border-radius: 15px; border-left: 5px solid var(--primary); margin-bottom: 15px; border-top: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .reply-box { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); }
        textarea { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--border); font-family: inherit; margin-bottom: 10px; outline: none; }
        textarea:focus { border-color: var(--primary); }

        .btn { padding: 8px 16px; border-radius: 8px; font-weight: 700; cursor: pointer; border: none; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-reply { background: none; color: var(--primary); padding-left: 0; }
        .btn-send { background: var(--dark); color: white; font-size: 13px; }

        /* Modal */
        #editModal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; z-index:2000; }
        .modal-content { background:white; padding:30px; border-radius:20px; width:90%; max-width:400px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <button id="logoutAction" class="btn" style="color: #ef4444; background: #fee2e2;">Logga ut</button>
</header>

<div class="container">
    <div class="welcome-card">
        <h1 id="userGreeting">Välkommen!</h1>
        <p id="userEmail" style="opacity: 0.7; font-size: 14px;"></p>
    </div>

    <h2 class="section-title">Mina annonser</h2>
    <div id="myCarsGrid" class="grid">
        <p>Laddar dina annonser...</p>
    </div>

    <h2 class="section-title">Mottagna förfrågningar</h2>
    <div id="messagesGrid">
        <p>Laddar meddelanden...</p>
    </div>
</div>

<div id="editModal">
    <div class="modal-content">
        <h3 style="margin-bottom: 20px;">Redigera annons</h3>
        <label style="font-size: 12px; font-weight: 700; display: block; margin-bottom: 5px;">PRIS (KR)</label>
        <input type="number" id="editPrice" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; border:1px solid #ddd;">
        
        <label style="font-size: 12px; font-weight: 700; display: block; margin-bottom: 5px;">MILTAL</label>
        <input type="number" id="editMileage" style="width:100%; padding:12px; margin-bottom:20px; border-radius:10px; border:1px solid #ddd;">
        
        <div style="display: flex; gap: 10px;">
            <button id="saveEditBtn" class="btn btn-primary" style="flex:1;">Spara</button>
            <button id="closeModalBtn" class="btn" style="flex:1; background:#e2e8f0;">Avbryt</button>
        </div>
    </div>
</div>

<script type="module">
    import { db, auth } from './firebase-config.js';
    import { collection, query, where, getDocs, orderBy, doc, deleteDoc, updateDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    let currentUser = null;
    let currentEditId = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('userGreeting').innerText = `Hej, ${user.displayName || 'Bilvän'}!`;
            document.getElementById('userEmail').innerText = user.email;
            loadMyCars();
            loadMessages();
        } else {
            window.location.href = "login.html";
        }
    });

    // تحميل الإعلانات الخاصة بي
    async function loadMyCars() {
        const grid = document.getElementById('myCarsGrid');
        try {
            const q = query(collection(db, "cars"), where("sellerId", "==", currentUser.uid));
            const snap = await getDocs(q);
            const cars = snap.docs.map(d => ({ id: d.id, ...d.data() }));

            if (cars.length === 0) {
                grid.innerHTML = "<p>Du har inga aktiva annonser.</p>";
                return;
            }

            grid.innerHTML = cars.map(c => `
                <div class="car-card" id="card-${c.id}">
                    <img src="${c.images?.[0] || 'placeholder.jpg'}" class="car-img">
                    <div class="car-info">
                        <div style="font-weight: 800;">${c.brand} ${c.model}</div>
                        <div style="color: var(--primary); font-weight: 900; margin: 5px 0;">${Number(c.price).toLocaleString()} kr</div>
                        <div style="font-size: 12px; color: #64748b; margin-bottom: 15px;">${c.year} | ${c.mileage} mil</div>
                        <div style="display: flex; gap: 8px;">
                            <button class="btn btn-edit" data-id="${c.id}" data-price="${c.price}" data-mile="${c.mileage}" style="flex:1; background: #e2e8f0; font-size: 12px;">Redigera</button>
                            <button class="btn btn-delete" data-id="${c.id}" style="flex:1; background: #fee2e2; color: #ef4444; font-size: 12px;">Radera</button>
                        </div>
                    </div>
                </div>
            `).join('');

            attachCarEvents();
        } catch (err) { console.error(err); }
    }

    // تحميل الرسائل مع ميزة الرد
    async function loadMessages() {
        const msgGrid = document.getElementById('messagesGrid');
        try {
            const q = query(collection(db, "messages"), where("receiverId", "==", currentUser.uid), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));

            if (msgs.length === 0) {
                msgGrid.innerHTML = "<p>Inga mottagna meddelanden än.</p>";
                return;
            }

            msgGrid.innerHTML = msgs.map(m => `
                <div class="msg-card">
                    <div style="font-weight: 800; color: var(--dark); font-size: 15px;">${m.carTitle || 'Förfrågan'}</div>
                    <div style="font-size: 12px; color: #64748b; margin-bottom: 10px;">Från: ${m.senderName} (${m.senderEmail})</div>
                    <p style="background: #f1f5f9; padding: 12px; border-radius: 10px; font-size: 14px; line-height: 1.5;">${m.message}</p>
                    
                    <button class="btn btn-reply" data-id="${m.id}">Svara (رد)</button>

                    <div id="reply-box-${m.id}" class="reply-box">
                        <textarea id="text-${m.id}" placeholder="Skriv ditt svar..."></textarea>
                        <button class="btn btn-send" data-msgid="${m.id}" data-target="${m.senderId}" data-title="${m.carTitle}">Skicka svar</button>
                    </div>

                    <div style="font-size: 10px; color: #94a3b8; margin-top: 10px; text-align: right;">
                        ${m.createdAt?.toDate().toLocaleString('sv-SE')}
                    </div>
                </div>
            `).join('');

            attachMessageEvents();
        } catch (err) {
            msgGrid.innerHTML = "<p>Kunde inte ladda meddelanden.</p>";
        }
    }

    function attachMessageEvents() {
        // فتح صندوق الرد
        document.querySelectorAll('.btn-reply').forEach(btn => {
            btn.onclick = () => {
                const id = btn.dataset.id;
                const box = document.getElementById(`reply-box-${id}`);
                box.style.display = box.style.display === 'block' ? 'none' : 'block';
            };
        });

        // إرسال الرد
        document.querySelectorAll('.btn-send').forEach(btn => {
            btn.onclick = async () => {
                const { msgid, target, title } = btn.dataset;
                const text = document.getElementById(`text-${msgid}`).value;

                if (!text) return alert("Skriv ett svar först.");

                btn.disabled = true;
                btn.innerText = "Skickar...";

                try {
                    await addDoc(collection(db, "messages"), {
                        senderId: currentUser.uid,
                        senderName: "Säljare (هيثم)",
                        senderEmail: currentUser.email,
                        receiverId: target,
                        carTitle: "RE: " + title,
                        message: text,
                        createdAt: serverTimestamp()
                    });
                    alert("Svar skickat!");
                    document.getElementById(`reply-box-${msgid}`).style.display = 'none';
                } catch (err) {
                    alert("Kunde inte skicka svar.");
                } finally {
                    btn.disabled = false;
                    btn.innerText = "Skicka svar";
                }
            };
        });
    }

    function attachCarEvents() {
        document.querySelectorAll('.btn-edit').forEach(btn => {
            btn.onclick = () => {
                currentEditId = btn.dataset.id;
                document.getElementById('editPrice').value = btn.dataset.price;
                document.getElementById('editMileage').value = btn.dataset.mile;
                document.getElementById('editModal').style.display = 'flex';
            };
        });

        document.querySelectorAll('.btn-delete').forEach(btn => {
            btn.onclick = async () => {
                if (confirm("Ta bort annonsen?")) {
                    await deleteDoc(doc(db, "cars", btn.dataset.id));
                    location.reload();
                }
            };
        });
    }

    document.getElementById('saveEditBtn').onclick = async () => {
        const p = Number(document.getElementById('editPrice').value);
        const m = Number(document.getElementById('editMileage').value);
        await updateDoc(doc(db, "cars", currentEditId), { price: p, mileage: m });
        location.reload();
    };

    document.getElementById('closeModalBtn').onclick = () => document.getElementById('editModal').style.display = 'none';
    document.getElementById('logoutAction').onclick = () => signOut(auth).then(() => window.location.href = "login.html");

</script>
</body>
</html>

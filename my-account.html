<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meddelanden | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #f58220; 
            --dark: #0f172a; 
            --bg: #f8fafc; 
            --white: #ffffff;
            --border: #e2e8f0;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: var(--dark); }
        header { background: var(--white); padding: 15px 6%; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .logo { font-weight: 900; text-decoration: none; color: var(--dark); }
        .logo span { color: var(--primary); }

        .container { max-width: 1100px; margin: 20px auto; display: grid; grid-template-columns: 350px 1fr; gap: 20px; height: 85vh; padding: 0 20px; }

        /* قائمة الرسائل (تشبه البريد الوارد) */
        .inbox-list { background: var(--white); border-radius: 15px; border: 1px solid var(--border); overflow-y: auto; }
        .inbox-item { padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .inbox-item:hover { background: #f1f5f9; }
        .inbox-item.active { border-left: 5px solid var(--primary); background: #fef3e7; }
        .inbox-item .car-name { font-weight: 800; font-size: 14px; }
        .inbox-item .sender-name { font-size: 12px; color: #64748b; margin-top: 5px; }

        /* نافذة المحادثة */
        .chat-view { background: var(--white); border-radius: 15px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { padding: 15px 20px; border-bottom: 1px solid var(--border); background: #fafafa; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #fdfdfd; }
        
        .bubble { max-width: 70%; padding: 12px; border-radius: 12px; font-size: 14px; line-height: 1.4; }
        .bubble.in { align-self: flex-start; background: #e2e8f0; }
        .bubble.out { align-self: flex-end; background: var(--primary); color: white; }

        .chat-input { padding: 15px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .chat-input input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid var(--border); outline: none; }
        .chat-input button { background: var(--dark); color: white; border: none; padding: 0 20px; border-radius: 25px; cursor: pointer; font-weight: 700; }

        /* معلومات السيارة داخل المحادثة */
        .car-info-bar { font-size: 12px; background: #fff4eb; padding: 8px 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ffe0c2; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <button id="logoutBtn" style="background:none; border:none; color:red; cursor:pointer;">Logga ut</button>
</header>

<div class="container">
    <div class="inbox-list" id="inboxList">
        <p style="padding:20px; text-align:center; color:#999;">Hämtar meddelanden...</p>
    </div>

    <div class="chat-view" id="chatView" style="display:none;">
        <div class="chat-header" id="chatHeader"></div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input">
            <input type="text" id="replyText" placeholder="Skriv ditt svar...">
            <button id="sendReply">Svara</button>
        </div>
    </div>
    
    <div id="noChatSelected" style="display:flex; align-items:center; justify-content:center; color:#94a3b8; background:white; border-radius:15px; border:1px solid #e2e8f0;">
        Välj en konversation för att läsa
    </div>
</div>

<script type="module">
    import { db, auth } from './firebase-config.js';
    import { collection, query, where, getDocs, addDoc, serverTimestamp, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    let currentUser = null;
    let activeChat = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            loadInbox();
        } else {
            window.location.href = "login.html";
        }
    });

    // تحميل قائمة المحادثات (كل محادثة هي خيط منفصل بين مشتري وبائع)
    function loadInbox() {
        const q = query(collection(db, "messages"), orderBy("createdAt", "desc"));
        
        onSnapshot(q, (snap) => {
            const inboxList = document.getElementById('inboxList');
            const threads = {};

            snap.docs.forEach(doc => {
                const m = doc.data();
                if (m.senderId === currentUser.uid || m.receiverId === currentUser.uid) {
                    // إنشاء معرف فريد للمحادثة يجمع بين المشتري والبائع والسيارة
                    const threadId = [m.senderId, m.receiverId].sort().join("_") + "_" + (m.carId || m.carTitle);
                    if (!threads[threadId]) {
                        threads[threadId] = {
                            id: threadId,
                            lastMsg: m.message,
                            carTitle: m.carTitle,
                            partnerName: m.senderId === currentUser.uid ? "Mottagare" : m.senderName,
                            partnerId: m.senderId === currentUser.uid ? m.receiverId : m.senderId,
                            partnerEmail: m.senderId === currentUser.uid ? m.receiverEmail : m.senderEmail
                        };
                    }
                }
            });

            const threadArray = Object.values(threads);
            if (threadArray.length === 0) {
                inboxList.innerHTML = "<p style='padding:20px; text-align:center;'>Inga meddelanden.</p>";
                return;
            }

            inboxList.innerHTML = threadArray.map(t => `
                <div class="inbox-item" onclick="openThread('${t.id}', '${t.partnerId}', '${t.partnerName}', '${t.carTitle}', '${t.partnerEmail}')">
                    <div class="car-name">${t.carTitle}</div>
                    <div class="sender-name">${t.partnerName}</div>
                    <div style="font-size:11px; color:#94a3b8; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:5px;">${t.lastMsg}</div>
                </div>
            `).join('');
        });
    }

    // فتح محادثة معينة
    window.openThread = (threadId, partnerId, partnerName, carTitle, partnerEmail) => {
        activeChat = { threadId, partnerId, partnerName, carTitle, partnerEmail };
        
        document.getElementById('noChatSelected').style.display = 'none';
        document.getElementById('chatView').style.display = 'flex';
        
        document.getElementById('chatHeader').innerHTML = `
            <div style="font-weight:900;">${partnerName}</div>
            <div style="font-size:12px; color:var(--primary);">Gäller: ${carTitle}</div>
        `;

        // استماع للرسائل داخل هذه المحادثة فقط
        const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));
        onSnapshot(q, (snap) => {
            const chatMessages = document.getElementById('chatMessages');
            const filtered = snap.docs
                .map(d => d.data())
                .filter(m => {
                    const id = [m.senderId, m.receiverId].sort().join("_") + "_" + (m.carId || m.carTitle);
                    return id === threadId;
                });

            chatMessages.innerHTML = filtered.map(m => `
                <div class="bubble ${m.senderId === currentUser.uid ? 'out' : 'in'}">
                    ${m.message}
                    <div style="font-size:9px; opacity:0.6; margin-top:5px;">
                        ${m.createdAt?.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}
                    </div>
                </div>
            `).join('');
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });
    };

    // إرسال رد
    document.getElementById('sendReply').onclick = async () => {
        const text = document.getElementById('replyText').value;
        if (!text || !activeChat) return;

        try {
            await addDoc(collection(db, "messages"), {
                senderId: currentUser.uid,
                senderName: "Säljare",
                senderEmail: currentUser.email,
                receiverId: activeChat.partnerId,
                receiverEmail: activeChat.partnerEmail,
                carTitle: activeChat.carTitle,
                message: text,
                createdAt: serverTimestamp()
            });
            document.getElementById('replyText').value = "";
        } catch (err) { console.error(err); }
    };

    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => window.location.href="login.html");
</script>
</body>
</html>

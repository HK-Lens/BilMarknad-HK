<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitt Konto | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #f58220; 
            --dark: #0f172a; 
            --bg: #f1f5f9; 
            --white: #ffffff;
            --chat-in: #e2e8f0;
            --chat-out: #f58220;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding-bottom: 20px; }
        header { background: var(--white); padding: 15px 6%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 1000; }
        .logo { text-decoration: none; color: var(--dark); font-weight: 900; font-size: 22px; }
        .logo span { color: var(--primary); }
        
        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }
        .section-title { font-weight: 900; margin: 30px 0 15px; color: var(--dark); text-transform: uppercase; letter-spacing: 1px; font-size: 18px; }

        /* --- Smart Chat Layout --- */
        .chat-wrapper { background: var(--white); border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: flex; flex-direction: column; height: 550px; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #fafafa; }
        
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; position: relative; }
        .bubble.in { align-self: flex-start; background: var(--chat-in); color: var(--dark); border-bottom-left-radius: 2px; }
        .bubble.out { align-self: flex-end; background: var(--chat-out); color: white; border-bottom-right-radius: 2px; }
        
        .bubble .info { font-size: 10px; opacity: 0.6; display: block; margin-top: 5px; }
        .bubble.out .info { text-align: right; }
        .bubble .car-ref { font-size: 10px; font-weight: 900; margin-bottom: 4px; display: block; opacity: 0.8; }

        /* --- Chat Input Area --- */
        .chat-input-area { padding: 15px; background: white; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .chat-input-area input { flex: 1; padding: 12px 20px; border: 1px solid #ddd; border-radius: 30px; outline: none; transition: 0.3s; }
        .chat-input-area input:focus { border-color: var(--primary); }
        .send-btn { background: var(--dark); color: white; border: none; padding: 0 25px; border-radius: 30px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .send-btn:hover { background: var(--primary); }

        /* --- Ads Grid --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .car-card { background: white; border-radius: 15px; overflow: hidden; border: 1px solid #eee; }
        .car-img { width: 100%; height: 120px; object-fit: cover; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <button id="logoutAction" style="background:#fee2e2; color:#ef4444; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:700;">Logga ut</button>
</header>

<div class="container">
    <h2 class="section-title">Mina Annonser</h2>
    <div id="myCarsGrid" class="grid"><p>Laddar...</p></div>

    <h2 class="section-title">Smart Chat</h2>
    <div class="chat-wrapper">
        <div id="chatWindow" class="chat-messages">
            <p style="text-align:center; color:#999; margin-top:150px;">Väntar på meddelanden...</p>
        </div>
        <div class="chat-input-area">
            <input type="text" id="replyInput" placeholder="Skriv ett svar...">
            <button class="send-btn" id="sendBtn">Skicka</button>
        </div>
    </div>
</div>

<script type="module">
    import { db, auth } from './firebase-config.js';
    import { collection, query, where, addDoc, serverTimestamp, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    let currentUser = null;
    let chatPartner = { id: null, email: null, title: "Förfrågan" };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            loadMyCars();
            startChatListener();
        } else {
            window.location.href = "login.html";
        }
    });

    // تحميل إعلاناتي
    async function loadMyCars() {
        const grid = document.getElementById('myCarsGrid');
        const q = query(collection(db, "cars"), where("sellerId", "==", currentUser.uid));
        
        onSnapshot(q, (snap) => {
            grid.innerHTML = snap.docs.length === 0 ? "<p>Inga annonser upplagda.</p>" : snap.docs.map(d => `
                <div class="car-card">
                    <img src="${d.data().images?.[0] || ''}" class="car-img">
                    <div style="padding:10px; font-weight:700; font-size:13px;">${d.data().brand} ${d.data().model}</div>
                </div>
            `).join('');
        });
    }

    // نظام الدردشة المباشر (الطرفين)
    function startChatListener() {
        const chatWindow = document.getElementById('chatWindow');
        const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));

        onSnapshot(q, (snapshot) => {
            // تصفية الرسائل التي يكون المستخدم الحالي طرفاً فيها
            const messages = snapshot.docs
                .map(d => ({ id: d.id, ...d.data() }))
                .filter(m => m.receiverId === currentUser.uid || m.senderId === currentUser.uid);

            if (messages.length === 0) {
                chatWindow.innerHTML = "<p style='text-align:center; margin-top:150px;'>Inga meddelanden ännu.</p>";
                return;
            }

            chatWindow.innerHTML = messages.map(m => {
                const isMine = m.senderId === currentUser.uid;
                
                // إذا لم تكن الرسالة لي، فأنا المستلم، إذن الطرف الآخر هو المرسل
                if (!isMine) {
                    chatPartner.id = m.senderId;
                    chatPartner.email = m.senderEmail;
                    chatPartner.title = m.carTitle;
                }

                return `
                    <div class="bubble ${isMine ? 'out' : 'in'}">
                        <span class="car-ref">${m.carTitle}</span>
                        ${m.message}
                        <span class="info">${m.createdAt?.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                    </div>
                `;
            }).join('');
            
            chatWindow.scrollTop = chatWindow.scrollHeight;
        });
    }

    // إرسال الرد
    document.getElementById('sendBtn').onclick = async () => {
        const input = document.getElementById('replyInput');
        const text = input.value.trim();

        if (!text || !chatPartner.id) return;

        try {
            await addDoc(collection(db, "messages"), {
                senderId: currentUser.uid,
                senderName: currentUser.displayName || "Säljare",
                senderEmail: currentUser.email,
                receiverId: chatPartner.id,
                receiverEmail: chatPartner.email,
                carTitle: chatPartner.title,
                message: text,
                createdAt: serverTimestamp()
            });
            input.value = "";
        } catch (err) {
            console.error("Fel vid sändning:", err);
        }
    };

    document.getElementById('logoutAction').onclick = () => signOut(auth).then(() => window.location.href="login.html");
</script>

</body>
</html>

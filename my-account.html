<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Sida | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); }
        header { background: white; padding: 15px 6%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { text-decoration: none; font-size: 24px; font-weight: 900; color: var(--dark); }
        .logo span { color: var(--primary); }
        .dashboard-header { background: var(--dark); color: white; padding: 50px 6%; text-align: center; }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        
        .admin-card { background: white; border-radius: 20px; padding: 20px; display: grid; grid-template-columns: 150px 1fr auto; gap: 20px; align-items: center; margin-bottom: 15px; border: 1px solid var(--border); }
        .admin-card img { width: 150px; height: 110px; object-fit: cover; border-radius: 12px; }
        
        .btn-group { display: flex; flex-direction: column; gap: 8px; }
        .btn-action { padding: 10px 20px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; font-size: 13px; }
        .btn-edit { background: var(--primary); color: white; }
        .btn-delete { background: #fee2e2; color: #ef4444; }

        /* نافذة التعديل (Modal) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 35px; border-radius: 24px; width: 95%; max-width: 500px; }
        .field { margin-bottom: 15px; }
        .field label { display: block; font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; }
        .modal-input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; outline: none; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <div style="display: flex; gap: 15px; align-items: center;">
        <span id="userNameTop" style="font-weight: 700; font-size: 13px; color: #64748b;"></span>
        <button onclick="logout()" style="background:none; border:none; color:#ef4444; font-weight:700; cursor:pointer;">Logga ut</button>
    </div>
</header>

<div class="dashboard-header">
    <h1 id="welcomeText">Min Sida</h1>
    <p id="userEmail">Laddar...</p>
</div>

<div class="container" id="adsList"></div>

<div class="modal" id="editModal">
    <div class="modal-content">
        <h2 style="margin-bottom:20px; font-weight:900;">Redigera annons</h2>
        <div class="field"><label>Pris (kr)</label><input type="number" id="editPrice" class="modal-input"></div>
        <div class="field"><label>Miltal (mil)</label><input type="number" id="editMileage" class="modal-input"></div>
        <div class="field"><label>Drivmedel</label>
            <select id="editFuel" class="modal-input">
                <option value="Bensin">Bensin</option><option value="Diesel">Diesel</option>
                <option value="El">El</option><option value="Hybrid">Hybrid</option>
            </select>
        </div>
        <div class="field"><label>Beskrivning</label><textarea id="editDesc" class="modal-input" rows="4"></textarea></div>
        <div style="display:flex; gap:10px;">
            <button onclick="closeModal()" style="flex:1; padding:12px; border-radius:10px; border:none; cursor:pointer;">Avbryt</button>
            <button onclick="saveChanges()" style="flex:2; padding:12px; border-radius:10px; border:none; background:var(--dark); color:white; font-weight:700; cursor:pointer;">Spara</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let currentEditId = null;

    onAuthStateChanged(auth, (user) => {
        if (!user) { window.location.href = "login.html"; }
        else {
            const name = user.displayName || user.email.split('@')[0];
            document.getElementById('userNameTop').innerText = name;
            document.getElementById('welcomeText').innerText = `Välkommen, ${name}!`;
            document.getElementById('userEmail').innerText = user.email;
            loadMyAds(user.uid);
        }
    });

    async function loadMyAds(uid) {
        const adsList = document.getElementById('adsList');
        const q = query(collection(db, "cars"), where("sellerId", "==", uid));
        const snap = await getDocs(q);

        adsList.innerHTML = snap.docs.map(d => {
            const car = d.data();
            return `
                <div class="admin-card">
                    <img src="${car.images?.[0] || ''}">
                    <div>
                        <div style="font-weight:900; font-size:18px;">${car.brand} ${car.model || ''}</div>
                        <div style="color:var(--primary); font-weight:800;">${Number(car.price).toLocaleString()} kr</div>
                        <div style="font-size:12px; color:#64748b;">${car.year} • ${car.mileage} mil • ${car.fuelType}</div>
                    </div>
                    <div class="btn-group">
                        <button class="btn-action btn-edit" onclick="openEditModal('${d.id}', ${car.price}, ${car.mileage}, '${car.fuelType}', \`${car.description || ''}\`)">Redigera</button>
                        <button class="btn-action btn-delete" onclick="deleteAd('${d.id}')">Ta bort</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    window.openEditModal = (id, price, mileage, fuel, desc) => {
        currentEditId = id;
        document.getElementById('editPrice').value = price;
        document.getElementById('editMileage').value = mileage;
        document.getElementById('editFuel').value = fuel;
        document.getElementById('editDesc').value = desc;
        document.getElementById('editModal').style.display = 'flex';
    };

    window.closeModal = () => { document.getElementById('editModal').style.display = 'none'; };

    window.saveChanges = async () => {
        await updateDoc(doc(db, "cars", currentEditId), {
            price: Number(document.getElementById('editPrice').value),
            mileage: Number(document.getElementById('editMileage').value),
            fuelType: document.getElementById('editFuel').value,
            description: document.getElementById('editDesc').value
        });
        alert("Uppdaterat!");
        location.reload();
    };

    window.deleteAd = async (id) => {
        if (confirm("Ta bort annonsen?")) {
            await deleteDoc(doc(db, "cars", id));
            location.reload();
        }
    };

    window.logout = () => signOut(auth).then(() => window.location.href = "index.html");
</script>
</body>
</html>

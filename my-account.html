<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Min Sida | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f0f2f5; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* الهيدر مع الشعار */
        header { height: 65px; background: white; padding: 0 5%; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 1000; }
        .logo { text-decoration: none; font-size: 24px; font-weight: 900; color: var(--dark); }
        .logo span { color: var(--primary); }

        /* أزرار التنقل بين المنشورات والبريد */
        .tab-nav { background: white; padding: 10px 5%; display: flex; gap: 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .tab-btn { padding: 10px 20px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 13px; background: #f1f5f9; color: #64748b; transition: 0.3s; }
        .tab-btn.active { background: var(--dark); color: white; }
        .btn-logout { background: #fee2e2; color: #ef4444; margin-left: auto; }

        main { flex: 1; overflow: hidden; position: relative; }
        .section-content { display: none; height: 100%; overflow-y: auto; padding: 20px 5%; }
        .section-content.active { display: block; }

        /* تصميم الإعلانات (المنشورات) */
        .ads-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .ad-card { background: white; border-radius: 20px; border: 1px solid var(--border); overflow: hidden; }
        .ad-card img { width: 100%; height: 150px; object-fit: cover; }
        .ad-info { padding: 15px; }
        .ad-delete { width: 100%; background: #fee2e2; color: #ef4444; border: none; padding: 10px; font-weight: 700; cursor: pointer; border-radius: 0 0 10px 10px; }

        /* تصميم نظام المراسلة (واتساب ستايل) */
        .messenger { display: flex; height: 100%; background: white; overflow: hidden; }
        .sidebar { width: 350px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: #fff; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-view { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; }
        
        .chat-item { padding: 15px; display: flex; gap: 12px; cursor: pointer; border-bottom: 1px solid #f8fafc; }
        .chat-item.active { background: #fff5eb; border-left: 4px solid var(--primary); }
        .chat-item img { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; }

        /* هيدر الدردشة */
        .chat-header { padding: 10px 20px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; cursor: pointer; z-index: 10; }
        .chat-header img { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; }

        /* منطقة الرسائل */
        .msg-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .bubble { max-width: 75%; padding: 10px 15px; border-radius: 12px; font-size: 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .bubble.me { align-self: flex-end; background: #dcf8c6; border-top-right-radius: 2px; }
        .bubble.them { align-self: flex-start; background: white; border-top-left-radius: 2px; }

        /* منطقة الإدخال وسهم الإرسال */
        .input-bar { padding: 15px; background: #f0f0f0; display: flex; gap: 10px; align-items: center; }
        .input-bar input { flex: 1; padding: 12px 18px; border-radius: 25px; border: none; outline: none; font-size: 15px; }
        .send-btn { background: #075e54; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        @media (max-width: 750px) {
            .sidebar { width: 100%; }
            .chat-view { display: none; position: fixed; top: 125px; left: 0; width: 100%; height: calc(100vh - 125px); z-index: 500; }
            .chat-view.active { display: flex; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <div id="uDisplay" style="font-weight: 800; font-size: 14px;">...</div>
</header>

<nav class="tab-nav">
    <button class="tab-btn active" id="tabAds" onclick="openTab('ads')"> المنشورات</button>
    <button class="tab-btn" id="tabChat" onclick="openTab('chat')"> البريد</button>
    <button class="tab-btn btn-logout" onclick="logout()">تسجيل الخروج</button>
</nav>

<main>
    <section id="ads-sect" class="section-content active">
        <h2 style="margin-bottom: 20px;">Mina annonser</h2>
        <div id="adsGrid" class="ads-grid">Hämtar dina annonser...</div>
    </section>

    <section id="chat-sect" class="section-content" style="padding:0;">
        <div class="messenger">
            <div class="sidebar">
                <div style="padding:15px; font-weight:900; border-bottom:1px solid #eee;">Inkorg</div>
                <div id="chatItems" class="chat-list">Laddar meddelanden...</div>
            </div>
            <div id="chatWindow" class="chat-view">
                <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:#94a3b8; padding:20px; text-align:center;">
                    <img src="https://cdn-icons-png.flaticon.com/512/3063/3063822.png" width="70" style="opacity:0.1; margin-bottom:15px;">
                    <p>Välj en konversation</p>
                </div>
            </div>
        </div>
    </section>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, serverTimestamp, orderBy, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let user = null;
    let activeChat = null;
    let chatSub = null;

    onAuthStateChanged(auth, u => {
        if (!u) window.location.href = 'login.html';
        user = u;
        document.getElementById('uDisplay').innerText = u.displayName || u.email.split('@')[0];
        loadAds();
        listenToInbox();
    });

    window.openTab = (name) => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
        document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
        document.getElementById(name + '-sect').classList.add('active');
    };

    async function loadAds() {
        const grid = document.getElementById('adsGrid');
        try {
            const q = query(collection(db, "cars"), where("sellerId", "==", user.uid));
            const snap = await getDocs(q);
            if (snap.empty) { grid.innerHTML = "<p>Du har inga annonser.</p>"; return; }
            grid.innerHTML = snap.docs.map(d => {
                const c = d.data();
                return `<div class="ad-card"><img src="${c.images[0]}"><div class="ad-info"><h4>${c.brand} ${c.model}</h4></div><button class="ad-delete" onclick="deleteAd('${d.id}')">Radera</button></div>`;
            }).join('');
        } catch(e) { grid.innerHTML = "Kunde inte ladda annonser."; }
    }

    function listenToInbox() {
        const list = document.getElementById('chatItems');
        const q = query(collection(db, "messages"), where("participants", "array-contains", user.uid), orderBy("timestamp", "desc"));
        
        onSnapshot(q, (snap) => {
            const unique = {};
            snap.docs.forEach(d => { if(!unique[d.data().chatId]) unique[d.data().chatId] = d.data(); });
            const chats = Object.values(unique);
            if (chats.length === 0) { list.innerHTML = "<p style='padding:15px; color:#999;'>Inga meddelanden.</p>"; return; }
            list.innerHTML = chats.map(c => `
                <div class="chat-item ${activeChat === c.chatId ? 'active' : ''}" onclick="openChat('${c.chatId}', '${c.carId}', '${c.carTitle}', '${c.carImage}')">
                    <img src="${c.carImage}">
                    <div style="flex:1; overflow:hidden;">
                        <div style="font-weight:800; font-size:13px;">${c.senderId === user.uid ? 'Jag' : c.senderName}</div>
                        <div style="font-size:11px; color:#64748b; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${c.message}</div>
                    </div>
                </div>`).join('');
        });
    }

    window.openChat = (chatId, carId, carTitle, carImage) => {
        activeChat = chatId;
        const windowDiv = document.getElementById('chatWindow');
        windowDiv.classList.add('active');
        if(chatSub) chatSub();

        windowDiv.innerHTML = `
            <div class="chat-header" onclick="location.href='details.html?id=${carId}'">
                <img src="${carImage}">
                <div><h4 style="font-size:14px; font-weight:900;">${carTitle}</h4><p style="font-size:11px; color:var(--primary);">Visa annons ➔</p></div>
                <button onclick="event.stopPropagation(); document.getElementById('chatWindow').classList.remove('active')" style="margin-left:auto; border:none; background:none; font-size:20px;">✕</button>
            </div>
            <div id="msgArea" class="msg-area">Laddar...</div>
            <div class="input-bar">
                <input type="text" id="mIn" placeholder="Skriv ett meddelande..." onkeypress="if(event.key==='Enter') send()">
                <button class="send-btn" onclick="send()">➤</button>
            </div>`;

        const q = query(collection(db, "messages"), where("chatId", "==", chatId), orderBy("timestamp", "asc"));
        chatSub = onSnapshot(q, snap => {
            const area = document.getElementById('msgArea');
            area.innerHTML = snap.docs.map(d => `<div class="bubble ${d.data().senderId === user.uid ? 'me' : 'them'}">${d.data().message}</div>`).join('');
            area.scrollTop = area.scrollHeight;
        });
    };

    window.send = async () => {
        const input = document.getElementById('mIn');
        if (!input.value.trim()) return;
        const txt = input.value;
        input.value = "";
        const parts = activeChat.split('_');
        const recipient = (parts[0] === user.uid) ? parts[1] : parts[0];
        await addDoc(collection(db, "messages"), {
            chatId: activeChat, participants: [user.uid, recipient],
            carId: activeChat.split('_')[2], carTitle: document.querySelector('.chat-header h4').innerText,
            carImage: document.querySelector('.chat-header img').src,
            senderId: user.uid, senderName: user.displayName || user.email.split('@')[0],
            message: txt, timestamp: serverTimestamp()
        });
    };

    window.deleteAd = async (id) => { if(confirm("Ta bort?")) { await deleteDoc(doc(db, "cars", id)); loadAds(); } };
    window.logout = () => signOut(auth).then(() => window.location.href = 'index.html');
</script>
</body>
</html>

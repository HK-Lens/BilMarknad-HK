<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Min Sida | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f0f2f5; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* الشعار والناف بار */
        header { height: 65px; background: white; padding: 0 5%; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 1000; }
        .logo { text-decoration: none; font-size: 24px; font-weight: 900; color: var(--dark); }
        .logo span { color: var(--primary); }

        /* أزرار التحكم الرئيسية */
        .account-nav { background: white; display: flex; justify-content: center; gap: 10px; padding: 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .nav-btn { padding: 10px 20px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 13px; background: #f8fafc; color: #64748b; transition: 0.3s; }
        .nav-btn.active { background: var(--dark); color: white; }
        .nav-btn.logout { color: #ef4444; background: #fee2e2; }

        /* الحاوية الرئيسية للأقسام */
        main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
        .page-section { display: none; height: 100%; overflow-y: auto; padding: 20px 5%; }
        .page-section.active { display: block; }

        /* تصميم الإعلانات المنشورة */
        .ads-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .my-ad-card { background: white; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); }
        .my-ad-card img { width: 100%; height: 160px; object-fit: cover; }
        .ad-actions { padding: 15px; display: flex; gap: 10px; }
        .btn-edit { flex: 1; background: var(--primary); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .btn-delete { background: #fee2e2; color: #ef4444; border: none; padding: 10px; border-radius: 8px; cursor: pointer; }

        /* تصميم نظام المراسلة (واتساب ستايل) */
        .messenger { display: flex; height: 100%; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .chat-sidebar { width: 320px; border-right: 1px solid var(--border); overflow-y: auto; background: #fcfcfc; }
        .chat-view { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; }
        
        .chat-item { padding: 15px; display: flex; gap: 12px; cursor: pointer; border-bottom: 1px solid #f1f5f9; }
        .chat-item.active { background: #fff5eb; border-left: 4px solid var(--primary); }
        .chat-item img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; }

        .chat-header { padding: 10px 20px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .chat-header:hover { background: #fdfdfd; }
        .chat-header img { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; }

        .msg-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 75%; padding: 10px 15px; border-radius: 12px; font-size: 14px; position: relative; }
        .bubble.me { align-self: flex-end; background: #dcf8c6; border-top-right-radius: 2px; }
        .bubble.them { align-self: flex-start; background: white; border-top-left-radius: 2px; }

        .input-area { padding: 15px; background: #f0f0f0; display: flex; gap: 10px; }
        .input-area input { flex: 1; padding: 12px; border-radius: 25px; border: none; outline: none; }

        @media (max-width: 750px) {
            .chat-sidebar { width: 100%; }
            .chat-view { display: none; position: fixed; top: 120px; left: 0; width: 100%; height: calc(100vh - 120px); z-index: 500; }
            .chat-view.active { display: flex; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <span id="userName" style="font-weight: 700; font-size: 14px; color: var(--dark);"></span>
</header>

<nav class="account-nav">
    <button class="nav-btn active" onclick="showSection('ads', this)">📦 Mina annonser</button>
    <button class="nav-btn" onclick="showSection('chat', this)">💬 Meddelanden</button>
    <button class="nav-btn logout" onclick="logout()">🚪 Logga ut</button>
</nav>

<main>
    <section id="ads-section" class="page-section active">
        <h2 style="margin-bottom: 20px;">Mina publicerade fordon</h2>
        <div id="myAdsGrid" class="ads-grid">Laddar dina annonser...</div>
    </section>

    <section id="chat-section" class="page-section">
        <div class="messenger">
            <div class="chat-sidebar" id="chatsList">Laddar محادثات...</div>
            <div class="chat-view" id="chatWindow">
                <div style="display:flex; align-items:center; justify-content:center; height:100%; color:#94a3b8;">
                    Välj en chatt för att svara
                </div>
            </div>
        </div>
    </section>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, serverTimestamp, orderBy, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let currentUser = null;
    let activeChatId = null;
    let unsubscribeChat = null;

    onAuthStateChanged(auth, user => {
        if (!user) window.location.href = 'login.html';
        currentUser = user;
        document.getElementById('userName').innerText = user.displayName || user.email.split('@')[0];
        loadMyAds();
        listenToInbox();
    });

    // تبديل الأقسام
    window.showSection = (section, btn) => {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
        document.getElementById(section + '-section').classList.add('active');
    };

    // 1. تحميل المنشورات (إعلاناتي)
    async function loadMyAds() {
        const grid = document.getElementById('myAdsGrid');
        const q = query(collection(db, "cars"), where("sellerId", "==", currentUser.uid));
        const snap = await getDocs(q);

        if (snap.empty) {
            grid.innerHTML = "<p>Du har inga annonser än.</p>";
            return;
        }

        grid.innerHTML = snap.docs.map(d => {
            const c = d.data();
            return `
                <div class="my-ad-card">
                    <img src="${c.images[0]}">
                    <div style="padding:15px;">
                        <h4 style="font-weight:900;">${c.brand} ${c.model}</h4>
                        <div style="color:var(--primary); font-weight:800; margin-top:5px;">${Number(c.price).toLocaleString()} kr</div>
                    </div>
                    <div class="ad-actions">
                        <button class="btn-edit" onclick="location.href='sell.html?edit=${d.id}'">Redigera</button>
                        <button class="btn-delete" onclick="deleteAd('${d.id}')">🗑️</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    // 2. نظام البريد الوارد (Inbox)
    function listenToInbox() {
        const list = document.getElementById('chatsList');
        const q = query(collection(db, "messages"), where("participants", "array-contains", currentUser.uid), orderBy("timestamp", "desc"));

        onSnapshot(q, (snap) => {
            const unique = {};
            snap.docs.forEach(doc => {
                const m = doc.data();
                if (!unique[m.chatId]) unique[m.chatId] = m;
            });

            const chats = Object.values(unique);
            if (chats.length === 0) {
                list.innerHTML = "<p style='padding:20px; color:#999;'>Inga meddelanden.</p>";
                return;
            }

            list.innerHTML = chats.map(c => `
                <div class="chat-item ${activeChatId === c.chatId ? 'active' : ''}" onclick="openChat('${c.chatId}', '${c.carId}', '${c.carTitle}', '${c.carImage}')">
                    <img src="${c.carImage}">
                    <div style="flex:1; overflow:hidden;">
                        <div style="font-weight:800; font-size:14px;">${c.senderId === currentUser.uid ? 'Jag' : c.senderName}</div>
                        <div style="font-size:12px; color:#64748b; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${c.message}</div>
                    </div>
                </div>
            `).join('');
        });
    }

    // 3. فتح المحادثة (WhatsApp UI)
    window.openChat = (chatId, carId, carTitle, carImage) => {
        activeChatId = chatId;
        const view = document.getElementById('chatWindow');
        view.classList.add('active');

        if (unsubscribeChat) unsubscribeChat();

        view.innerHTML = `
            <div class="chat-header" onclick="location.href='details.html?id=${carId}'">
                <img src="${carImage}">
                <div>
                    <h4>${carTitle}</h4>
                    <p>Se annonsen ➔</p>
                </div>
                <button onclick="event.stopPropagation(); document.getElementById('chatWindow').classList.remove('active')" style="margin-left:auto; border:none; background:none; font-size:20px;">✕</button>
            </div>
            <div class="msg-area" id="msgContainer">Laddar...</div>
            <div class="input-area">
                <input type="text" id="msgInput" placeholder="Skriv ett svar..." onkeypress="if(event.key==='Enter') send()">
                <button onclick="send()" style="background:var(--primary); color:white; border:none; width:40px; height:40px; border-radius:50%; cursor:pointer;">➤</button>
            </div>
        `;

        const q = query(collection(db, "messages"), where("chatId", "==", chatId), orderBy("timestamp", "asc"));
        unsubscribeChat = onSnapshot(q, (snap) => {
            const container = document.getElementById('msgContainer');
            container.innerHTML = snap.docs.map(d => {
                const m = d.data();
                return `<div class="bubble ${m.senderId === currentUser.uid ? 'me' : 'them'}">${m.message}</div>`;
            }).join('');
            container.scrollTop = container.scrollHeight;
        });
    };

    window.send = async () => {
        const input = document.getElementById('msgInput');
        if (!input.value.trim()) return;

        const parts = activeChatId.split('_');
        const recipient = (parts[0] === currentUser.uid) ? parts[1] : parts[0];

        await addDoc(collection(db, "messages"), {
            chatId: activeChatId,
            participants: [currentUser.uid, recipient],
            carId: activeChatId.split('_')[2],
            carTitle: document.querySelector('.chat-header h4').innerText,
            carImage: document.querySelector('.chat-header img').src,
            senderId: currentUser.uid,
            senderName: currentUser.displayName || currentUser.email.split('@')[0],
            message: input.value,
            timestamp: serverTimestamp()
        });
        input.value = "";
    };

    window.deleteAd = async (id) => {
        if (confirm("Vill du ta bort annonsen?")) {
            await deleteDoc(doc(db, "cars", id));
            loadMyAds();
        }
    };

    window.logout = () => signOut(auth).then(() => window.location.href = 'index.html');
</script>
</body>
</html>

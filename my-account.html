<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitt Konto | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; padding: 20px; }
        .wrapper { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 250px 1fr; gap: 30px; }
        @media (max-width: 768px) { .wrapper { grid-template-columns: 1fr; } }
        .tab-btn { padding: 15px; cursor: pointer; border-radius: 12px; margin-bottom: 10px; font-weight: 700; color: #64748b; background: white; border: 1px solid var(--border); }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .ad-card { display: flex; align-items: center; gap: 15px; padding: 15px; background: white; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 15px; cursor: pointer; }
        .ad-card img { width: 80px; height: 60px; object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="sidebar">
        <div class="tab-btn active" id="btnAds" onclick="switchTab('ads')">Mina Annonser</div>
        <div class="tab-btn" id="btnFavs" onclick="switchTab('favs')">Sparade Bilar</div>
        <div class="tab-btn" onclick="window.location.href='messages.html'">Meddelanden</div>
        <div class="tab-btn" onclick="window.location.href='index.html'">Hem</div>
    </div>
    <div class="content" id="mainContent">Laddar...</div>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let user = null;
    onAuthStateChanged(auth, (u) => { if(u) { user = u; switchTab('ads'); } else { window.location.href="login.html"; } });

    window.switchTab = async (tab) => {
        document.getElementById('btnAds').classList.toggle('active', tab === 'ads');
        document.getElementById('btnFavs').classList.toggle('active', tab === 'favs');
        const container = document.getElementById('mainContent');
        container.innerHTML = "Laddar...";

        const col = tab === 'ads' ? 'cars' : 'favorites';
        const key = tab === 'ads' ? 'sellerId' : 'userId';
        const q = query(collection(db, col), where(key, "==", user.uid));
        const snap = await getDocs(q);

        container.innerHTML = `<h2>${tab === 'ads' ? 'Mina Annonser' : 'Sparade Bilar'}</h2>`;
        if (snap.empty) { container.innerHTML += "<p>Ingenting hittades.</p>"; return; }
        
        snap.forEach(d => {
            const data = d.data();
            const carId = tab === 'ads' ? d.id : data.carId;
            const img = tab === 'ads' ? (data.images?.[0] || '') : (data.image || '');
            const title = tab === 'ads' ? `${data.brand} ${data.model}` : data.brand;
            container.innerHTML += `
                <div class="ad-card" onclick="window.location.href='details.html?id=${carId}'">
                    <img src="${img}">
                    <div><h4>${title}</h4><p>${Number(data.price).toLocaleString()} kr</p></div>
                </div>`;
        });
    }
</script>
</body>
</html>

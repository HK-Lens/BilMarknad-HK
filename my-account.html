<script type="module">
    async function loadMessages(uid) {
        const msgDiv = document.getElementById('messagesList');
        const q = query(collection(db, "messages"), where("recipientId", "==", uid));
        const snap = await getDocs(q);

        msgDiv.innerHTML = snap.docs.sort((a,b) => b.data().timestamp - a.data().timestamp).map(d => {
            const m = d.data();
            return `
                <div class="msg-card" style="display:flex; gap:12px; padding:15px; border:1px solid #eee; border-radius:12px; margin-bottom:10px; background:white;">
                    <img src="${m.carImage}" onerror="this.src='https://via.placeholder.com/60?text=Bil'" style="width:60px; height:60px; border-radius:8px; object-fit:cover;">
                    <div style="flex:1;">
                        <div style="font-weight:800; font-size:13px;">${m.senderName}</div>
                        <div style="font-size:11px; color:var(--primary); font-weight:700;">Ref: ${m.carTitle}</div>
                        <p style="font-size:13px; color:#444; margin-top:5px;">${m.message}</p>
                        <button onclick="openReply('${m.senderId}', '${m.carId}', '${m.carTitle}', '${m.carImage}')" style="background:none; border:none; color:var(--primary); font-weight:700; cursor:pointer; font-size:12px; margin-top:8px;">Svara ↩️</button>
                    </div>
                </div>`;
        }).join('');
    }
</script>

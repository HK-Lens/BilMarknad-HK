<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mitt Konto | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; --danger: #ef4444; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); padding-bottom: 50px; }
        header { background: white; padding: 15px 6%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .wrapper { max-width: 1100px; margin: 30px auto; display: grid; grid-template-columns: 280px 1fr; gap: 30px; padding: 0 15px; }
        @media (max-width: 768px) { .wrapper { grid-template-columns: 1fr; } }
        .sidebar { background: white; padding: 20px; border-radius: 20px; border: 1px solid var(--border); height: fit-content; }
        .tab-btn { width: 100%; text-align: left; padding: 15px; cursor: pointer; border-radius: 12px; margin-bottom: 10px; font-weight: 700; color: #64748b; background: white; border: 1px solid var(--border); transition: 0.3s; display: flex; align-items: center; gap: 12px; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 12px rgba(245, 130, 32, 0.15); }
        .ad-card { display: flex; align-items: center; gap: 15px; padding: 15px; background: white; border-radius: 18px; border: 1px solid var(--border); margin-bottom: 15px; cursor: pointer; transition: 0.3s; }
        .ad-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .ad-card img { width: 100px; height: 75px; object-fit: cover; border-radius: 10px; }
        .ad-info { flex: 1; }
        .ad-info h4 { margin: 0; font-size: 17px; font-weight: 800; }
        .ad-info p { margin: 4px 0 0 0; color: var(--primary); font-weight: 900; }
        .btn-del { width: 45px; height: 45px; border-radius: 12px; border: none; cursor: pointer; color: var(--danger); background: #fee2e2; display: flex; align-items: center; justify-content: center; }
        .empty-state { text-align: center; padding: 60px 20px; color: #94a3b8; font-weight: 600; }
    </style>
</head>
<body>
<header>
    <a href="index.html" style="text-decoration:none; font-size:24px; font-weight:900; color:var(--dark);">BIL<span style="color:var(--primary);">HK</span></a>
    <a href="index.html" style="text-decoration:none; color:var(--dark); font-weight:700;"><i class="fa-solid fa-house"></i> Hem</a>
</header>
<div class="wrapper">
    <div class="sidebar">
        <button class="tab-btn active" id="btnAds" onclick="switchTab('ads')"><i class="fa-solid fa-car"></i> Mina Annonser</button>
        <button class="tab-btn" id="btnFavs" onclick="switchTab('favs')"><i class="fa-solid fa-heart"></i> Sparade Bilar</button>
        <button class="tab-btn" onclick="window.location.href='messages.html'"><i class="fa-solid fa-message"></i> Meddelanden</button>
        <button class="tab-btn" onclick="window.location.href='dashboard.html'"><i class="fa-solid fa-chart-line"></i> Dashboard</button>
        <button class="tab-btn" style="margin-top:20px; color:var(--danger); border-color:#fee2e2;" onclick="auth.signOut().then(()=>location.href='index.html')"><i class="fa-solid fa-right-from-bracket"></i> Logga ut</button>
    </div>
    <div class="content" id="mainContent">
        <div class="empty-state">Laddar ditt konto...</div>
    </div>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { collection, query, where, getDocs, deleteDoc, doc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let user = null;
    onAuthStateChanged(auth, (u) => { if(u) { user = u; switchTab('ads'); } else { window.location.href="login.html"; } });

    window.switchTab = async (tab) => {
        document.getElementById('btnAds').classList.toggle('active', tab === 'ads');
        document.getElementById('btnFavs').classList.toggle('active', tab === 'favs');
        const container = document.getElementById('mainContent');
        container.innerHTML = "<div class='empty-state'><i class='fa-solid fa-circle-notch fa-spin'></i> Söker efter dina uppgifter...</div>";

        const col = tab === 'ads' ? 'cars' : 'favorites';
        const key = tab === 'ads' ? 'sellerId' : 'userId';
        
        try {
            const q = query(collection(db, col), where(key, "==", user.uid));
            const snap = await getDocs(q);
            container.innerHTML = `<h2 style="margin-bottom:25px; font-weight:900;">${tab === 'ads' ? 'Mina Annonser' : 'Sparade Bilar'}</h2>`;
            
            if (snap.empty) { container.innerHTML += `<div class='empty-state'>Här var det tomt.</div>`; return; }
            
            snap.forEach(d => {
                const data = d.data();
                const id = d.id;
                const carId = tab === 'ads' ? id : data.carId;
                const img = tab === 'ads' ? (data.images?.[0] || 'placeholder.jpg') : (data.image || 'placeholder.jpg');
                const title = tab === 'ads' ? `${data.brand} ${data.model}` : data.brand;

                const card = document.createElement('div');
                card.className = "ad-card";
                card.onclick = () => window.location.href = `details.html?id=${carId}`;
                
                card.innerHTML = `
                    <img src="${img}">
                    <div class="ad-info">
                        <h4>${title}</h4>
                        <p>${Number(data.price).toLocaleString()} kr</p>
                    </div>
                    ${tab === 'ads' ? `
                        <button class="btn-del" onclick="event.stopPropagation(); deleteAd('${id}')">
                            <i class="fa-solid fa-trash"></i>
                        </button>` : ''}
                `;
                container.appendChild(card);
            });
        } catch (e) { container.innerHTML = "Ett fel uppstod vid laddning."; }
    };

    window.deleteAd = async (id) => {
        const res = await Swal.fire({ title: 'Radera annons?', text: 'Dina chattar kopplade till denna bil kommer också att raderas.', icon: 'warning', showCancelButton: true });
        if(res.isConfirmed) {
            await deleteDoc(doc(db, "cars", id));
            // مسح الرسائل والغرف المرتبطة
            const q = query(collection(db, "chats"), where("carId", "==", id));
            const chatSnap = await getDocs(q);
            const batch = writeBatch(db);
            for(let chatDoc of chatSnap.docs) {
                const msgs = await getDocs(collection(db, `chats/${chatDoc.id}/messages`));
                msgs.forEach(m => batch.delete(m.ref));
                batch.delete(chatDoc.ref);
            }
            await batch.commit();
            location.reload();
        }
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chatt & Inbox | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f0f2f5; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* الهيدر مع الشعار الثابت */
        header { height: 60px; background: white; padding: 0 5%; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 1000; }
        .logo { text-decoration: none; font-size: 22px; font-weight: 900; color: var(--dark); }
        .logo span { color: var(--primary); }

        /* حاوية الماسنجر */
        .messenger { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 60px); }
        
        /* القائمة الجانبية (قائمة الأشخاص والسيارات) */
        .sidebar { width: 350px; background: white; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; font-weight: 900; font-size: 18px; border-bottom: 1px solid #eee; }
        .chats-list { flex: 1; overflow-y: auto; }
        
        .chat-item { padding: 15px; display: flex; gap: 12px; cursor: pointer; border-bottom: 1px solid #f8fafc; transition: 0.2s; position: relative; }
        .chat-item:hover { background: #f0f2f5; }
        .chat-item.active { background: #fff5eb; border-left: 4px solid var(--primary); }
        .chat-item img { width: 55px; height: 55px; border-radius: 12px; object-fit: cover; }
        .chat-item-content { flex: 1; overflow: hidden; }
        .chat-item-name { font-weight: 700; font-size: 14px; color: var(--dark); margin-bottom: 3px; }
        .chat-item-last-msg { font-size: 12px; color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* نافذة الدردشة النشطة */
        .chat-view { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; /* لون خلفية واتساب الشهير */ position: relative; }
        
        /* شريط معلومات السيارة العلوي (داخل الدردشة) */
        .chat-car-header { padding: 10px 20px; background: white; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .chat-car-header img { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; }
        .chat-car-header h4 { font-size: 14px; font-weight: 800; }
        .chat-car-header p { font-size: 11px; color: var(--primary); font-weight: 700; }

        /* منطقة الرسائل (Bubbles) */
        .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .bubble { max-width: 70%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.4; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .bubble.me { align-self: flex-end; background: #dcf8c6; color: #303030; border-top-right-radius: 2px; }
        .bubble.them { align-self: flex-start; background: white; color: #303030; border-top-left-radius: 2px; }
        .bubble-time { font-size: 9px; color: #888; display: block; text-align: right; margin-top: 4px; }

        /* منطقة الإدخال */
        .input-area { padding: 12px 20px; background: #f0f0f0; display: flex; gap: 10px; align-items: center; }
        .input-area input { flex: 1; padding: 12px 18px; border-radius: 25px; border: none; outline: none; font-size: 15px; }
        .btn-send { background: #075e54; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        /* للجوال */
        @media (max-width: 750px) {
            .sidebar { width: 100%; }
            .chat-view { display: none; position: fixed; top: 60px; left: 0; width: 100%; height: calc(100vh - 60px); z-index: 500; }
            .chat-view.active { display: flex; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <button onclick="logout()" style="border:none; background:none; color:red; font-weight:700; cursor:pointer;">Logga ut</button>
</header>

<div class="messenger">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">Inkorg</div>
        <div class="chats-list" id="chatsList">
            <p style="text-align:center; padding:20px; color:#999;">Laddar محادثات...</p>
        </div>
    </div>

    <div class="chat-view" id="chatView">
        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:#999;">
            <img src="https://cdn-icons-png.flaticon.com/512/3063/3063822.png" width="80" style="opacity:0.2; margin-bottom:15px;">
            <p>Välj en konversation för att börja chatta</p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, addDoc, serverTimestamp, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let currentUser = null;
    let activeChatId = null;
    let unsubscribeChat = null;

    onAuthStateChanged(auth, user => {
        if (!user) window.location.href = 'login.html';
        currentUser = user;
        listenToChats();
    });

    // 1. الاستماع لقائمة المحادثات (بدون تكرار)
    function listenToChats() {
        const chatsList = document.getElementById('chatsList');
        const q = query(collection(db, "messages"), 
                  where("participants", "array-contains", currentUser.uid),
                  orderBy("timestamp", "desc"));

        onSnapshot(q, (snapshot) => {
            const uniqueChats = {};
            snapshot.docs.forEach(doc => {
                const data = doc.data();
                if (!uniqueChats[data.chatId]) uniqueChats[data.chatId] = data;
            });

            const chatsArr = Object.values(uniqueChats);
            if (chatsArr.length === 0) {
                chatsList.innerHTML = `<p style="padding:20px; text-align:center; color:#999;">Inga meddelanden än.</p>`;
                return;
            }

            chatsList.innerHTML = chatsArr.map(c => `
                <div class="chat-item ${activeChatId === c.chatId ? 'active' : ''}" onclick="openChat('${c.chatId}', '${c.carId}', '${c.carTitle}', '${c.carImage}')">
                    <img src="${c.carImage}" onerror="this.src='https://via.placeholder.com/60'">
                    <div class="chat-item-content">
                        <div class="chat-item-name">${c.senderId === currentUser.uid ? 'Jag' : c.senderName}</div>
                        <div class="chat-item-last-msg">${c.carTitle}: ${c.message}</div>
                    </div>
                </div>
            `).join('');
        });
    }

    // 2. فتح المحادثة وعرض معلومات السيارة في الأعلى
    window.openChat = (chatId, carId, carTitle, carImage) => {
        activeChatId = chatId;
        const chatView = document.getElementById('chatView');
        chatView.classList.add('active');

        if (unsubscribeChat) unsubscribeChat();

        chatView.innerHTML = `
            <div class="chat-car-header" onclick="location.href='details.html?id=${carId}'">
                <img src="${carImage}">
                <div>
                    <h4>${carTitle}</h4>
                    <p>Visa annonsen ➔</p>
                </div>
                <button onclick="event.stopPropagation(); closeChatMobile()" style="margin-left:auto; border:none; background:none; font-size:20px; cursor:pointer;">✕</button>
            </div>
            <div class="messages-area" id="msgContainer">Laddar...</div>
            <div class="input-area">
                <input type="text" id="msgInput" placeholder="Skriv ett meddelande..." onkeypress="if(event.key==='Enter') send()">
                <button class="btn-send" onclick="send()">➤</button>
            </div>
        `;

        // الاستماع للرسائل في هذه الغرفة فقط
        const q = query(collection(db, "messages"), where("chatId", "==", chatId), orderBy("timestamp", "asc"));
        unsubscribeChat = onSnapshot(q, (snapshot) => {
            const container = document.getElementById('msgContainer');
            container.innerHTML = snapshot.docs.map(doc => {
                const m = doc.data();
                const isMe = m.senderId === currentUser.uid;
                return `
                    <div class="bubble ${isMe ? 'me' : 'them'}">
                        ${m.message}
                        <span class="bubble-time">${m.timestamp ? m.timestamp.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : ''}</span>
                    </div>`;
            }).join('');
            container.scrollTop = container.scrollHeight;
        });
    };

    // 3. إرسال الرسالة
    window.send = async () => {
        const input = document.getElementById('msgInput');
        if (!input.value.trim() || !activeChatId) return;

        const text = input.value;
        input.value = ""; // مسح فوري للـ UI ليكون سريعاً

        const parts = activeChatId.split('_');
        const recipientId = (parts[0] === currentUser.uid) ? parts[1] : parts[0];

        await addDoc(collection(db, "messages"), {
            chatId: activeChatId,
            participants: [currentUser.uid, recipientId],
            carId: parts[2],
            carTitle: document.querySelector('.chat-car-header h4').innerText,
            carImage: document.querySelector('.chat-car-header img').src,
            senderId: currentUser.uid,
            senderName: currentUser.displayName || currentUser.email.split('@')[0],
            recipientId: recipientId,
            message: text,
            timestamp: serverTimestamp()
        });
    };

    window.closeChatMobile = () => document.getElementById('chatView').classList.remove('active');
    window.logout = () => signOut(auth).then(() => window.location.href = "index.html");
</script>
</body>
</html>

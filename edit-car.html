<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Redigera Annons | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; padding: 20px; color: var(--dark); margin: 0; }
        .form-card { max-width: 600px; margin: 30px auto; background: white; padding: 35px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.03); }
        h2 { margin-bottom: 25px; font-weight: 900; text-align: center; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 14px; color: #64748b; }
        input, select, textarea { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); outline: none; font-size: 15px; background: #f8fafc; transition: 0.3s; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); background: white; }
        .btn-save { width: 100%; padding: 16px; background: var(--dark); color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-save:hover { background: #1e293b; }
        .btn-save:disabled { background: #cbd5e1; cursor: not-allowed; }
        .btn-cancel { width: 100%; padding: 16px; background: transparent; color: #64748b; border: none; font-weight: 700; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>

<div class="form-card">
    <h2>Redigera din annons</h2>
    <form id="editForm">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group"><label>Märke</label><input type="text" id="brand" required></div>
            <div class="form-group"><label>Modell</label><input type="text" id="model" required></div>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group"><label>Årsmodell</label><input type="number" id="year" required></div>
            <div class="form-group"><label>Pris (kr)</label><input type="number" id="price" required></div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group"><label>Miltal</label><input type="number" id="mileage" required></div>
            <div class="form-group">
                <label>Växellåda</label>
                <select id="transmission">
                    <option value="Automat">Automat</option>
                    <option value="Manuell">Manuell</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Drivmedel</label>
            <select id="fuelType">
                <option value="Bensin">Bensin</option>
                <option value="Diesel">Diesel</option>
                <option value="El">El</option>
                <option value="Hybrid">Hybrid</option>
            </select>
        </div>

        <div class="form-group">
            <label>Beskrivning</label>
            <textarea id="description" rows="5"></textarea>
        </div>

        <button type="submit" class="btn-save" id="saveBtn">Spara ändringar</button>
    </form>
    <button class="btn-cancel" onclick="window.location.href='my-account.html'">Avbryt</button>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { doc, getDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const carId = new URLSearchParams(window.location.search).get('id');

    onAuthStateChanged(auth, (user) => {
        if (!user) window.location.href = "login.html";
        else fetchCar();
    });

    async function fetchCar() {
        const snap = await getDoc(doc(db, "cars", carId));
        if (snap.exists()) {
            const data = snap.data();
            document.getElementById('brand').value = data.brand || '';
            document.getElementById('model').value = data.model || '';
            document.getElementById('year').value = data.year || '';
            document.getElementById('price').value = data.price || '';
            document.getElementById('mileage').value = data.mileage || '';
            document.getElementById('transmission').value = data.transmission || 'Automat';
            document.getElementById('fuelType').value = data.fuelType || 'Bensin';
            document.getElementById('description').value = data.description || '';
        } else {
            Swal.fire('Fel', 'Annonsen hittades inte.', 'error').then(() => {
                window.location.href = "my-account.html";
            });
        }
    }

    document.getElementById('editForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('saveBtn');
        btn.disabled = true; 
        btn.innerText = "Sparar...";

        try {
            await updateDoc(doc(db, "cars", carId), {
                brand: document.getElementById('brand').value,
                model: document.getElementById('model').value,
                year: Number(document.getElementById('year').value),
                price: Number(document.getElementById('price').value),
                mileage: Number(document.getElementById('mileage').value),
                transmission: document.getElementById('transmission').value,
                fuelType: document.getElementById('fuelType').value,
                description: document.getElementById('description').value,
                updatedAt: serverTimestamp()
            });
            await Swal.fire('Sparat!', 'Din annons har uppdaterats framgångsrikt.', 'success');
            window.location.href = "my-account.html";
        } catch (error) {
            Swal.fire('Fel!', 'Ett fel uppstod: ' + error.message, 'error');
            btn.disabled = false;
            btn.innerText = "Spara ändringar";
        }
    };
</script>
</body>
</html>

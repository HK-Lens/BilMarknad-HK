<script type="module">

import { auth, db } from './firebase-config.js';

import {
doc,
getDoc,
updateDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const carId =
new URLSearchParams(window.location.search).get('id');

const featuresList = [
"ABS-bromsar",
"ACC",
"Autobroms",
"Filassistans",
"Döda vinkel-varnare",
"360° Kamera",
"Navigation",
"Skinnklädsel",
"Dragkrok",
"Panoramaglastak",
"CarPlay",
"Parkeringssensorer",
"Backkamera",
"LED-strålkastare",
"Sätesvärme",
"Farthållare"
];

const fGrid =
document.getElementById('featuresGrid');

featuresList.forEach(feature=>{

fGrid.innerHTML += `
<label class="check-item">

<input
type="checkbox"
class="feat-check"
value="${feature}"
>

<span>${feature}</span>

</label>
`;

});

if(!carId){

window.location.href = "dashboard.html";

}

onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.href = "login.html";
return;

}

await loadCarData(user.uid);

});

async function loadCarData(uid){

try{

const carRef = doc(db,"cars",carId);

const snap = await getDoc(carRef);

if(!snap.exists()){

Swal.fire(
"Fel",
"Annonsen hittades inte.",
"error"
);

window.location.href = "dashboard.html";
return;

}

const car = snap.data();

if(car.sellerId !== uid){

Swal.fire(
"Åtkomst nekad",
"Du får inte redigera denna annons.",
"error"
);

window.location.href = "dashboard.html";
return;

}

document.getElementById('brand').value =
car.brand || '';

document.getElementById('model').value =
car.model || '';

document.getElementById('price').value =
car.price || '';

document.getElementById('regNr').value =
car.regNr || '';

document.getElementById('year').value =
car.year || '';

document.getElementById('mil').value =
car.mileage || '';

document.getElementById('fuel').value =
car.fuel || 'Bensin';

document.getElementById('gear').value =
car.gear || 'Automat';

document.getElementById('karosseri').value =
car.karosseri || 'SUV';

document.getElementById('drive').value =
car.drive || '';

document.getElementById('hp').value =
car.hp || '';

document.getElementById('color').value =
car.color || '';

document.getElementById('seats').value =
car.seats || '';

document.getElementById('doors').value =
car.doors || '';

document.getElementById('description').value =
car.description || '';

if(Array.isArray(car.features)){

document.querySelectorAll('.feat-check')
.forEach(cb=>{

if(car.features.includes(cb.value)){

cb.checked = true;

}

});

}

document.getElementById('loader').style.display =
'none';

}catch(err){

console.error(err);

document.getElementById('loader').style.display =
'none';

Swal.fire(
"Fel",
"Kunde inte läsa annonsen.",
"error"
);

}

}

document.getElementById('editForm')
.addEventListener('submit',async(e)=>{

e.preventDefault();

const btn =
document.getElementById('saveBtn');

btn.disabled = true;

btn.innerHTML =
`
<i class="fa-solid fa-spinner fa-spin"></i>
Sparar...
`;

try{

const selectedFeatures =
Array.from(
document.querySelectorAll('.feat-check:checked')
).map(cb=>cb.value);

const cleanNumber = (value)=>{

const num = Number(value);

return isNaN(num) ? 0 : num;

};

const updatedData = {

price:
cleanNumber(
document.getElementById('price').value
),

regNr:
document.getElementById('regNr')
.value
.trim(),

year:
cleanNumber(
document.getElementById('year').value
),

mileage:
cleanNumber(
document.getElementById('mil').value
),

fuel:
document.getElementById('fuel')
.value
.trim(),

gear:
document.getElementById('gear')
.value
.trim(),

karosseri:
document.getElementById('karosseri')
.value
.trim(),

drive:
document.getElementById('drive')
.value
.trim(),

hp:
cleanNumber(
document.getElementById('hp').value
),

color:
document.getElementById('color')
.value
.trim(),

seats:
cleanNumber(
document.getElementById('seats').value
),

doors:
cleanNumber(
document.getElementById('doors').value
),

description:
document.getElementById('description')
.value
.trim(),

features:
selectedFeatures,

updatedAt:
serverTimestamp()

};

await updateDoc(
doc(db,"cars",carId),
updatedData
);

await Swal.fire({
title:'Klart!',
text:'Annonsen har uppdaterats.',
icon:'success',
confirmButtonColor:'#f58220'
});

window.location.href =
"dashboard.html";

}catch(err){

console.error(err);

Swal.fire(
"Fel",
"Kunde inte uppdatera annonsen.",
"error"
);

btn.disabled = false;

btn.innerHTML =
`
<i class="fa-solid fa-floppy-disk"></i>
Spara ändringar
`;

}

});

</script>

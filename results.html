<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Sökresultat | BILHK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 20px; }
        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .car-card { background: white; border-radius: 20px; overflow: hidden; border: 1px solid #e2e8f0; cursor: pointer; position: relative; }
        .favorite-btn { position:absolute; top:12px; right:12px; width:42px; height:42px; border:none; border-radius:50%; background:rgba(255,255,255,.95); color:#94a3b8; box-shadow:0 8px 20px rgba(15,23,42,.18); cursor:pointer; font-size:18px; z-index:5; }
        .favorite-btn.saved { color:#ef4444; }
        .no-results { text-align: center; padding: 100px; grid-column: 1/-1; }
    </style>
</head>
<body>
    <h2 style="text-align:center; margin-bottom:30px;">Hittade fordon</h2>
    <div id="resultsGrid" class="results-grid"></div>

<script type="module">
    import { db, auth } from './firebase-config.js';
    import { collection, getDocs, query, where, doc, getDoc, setDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const urlParams = new URLSearchParams(window.location.search);
    const grid = document.getElementById('resultsGrid');
    let currentUser = null;
    let savedFavoriteIds = new Set();
    let favoriteCarCache = {};

    onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        if (user) await loadUserFavorites();
        else savedFavoriteIds = new Set();
        updateFavoriteButtons();
    });

    async function loadUserFavorites() {
        const qFav = query(collection(db, "favorites"), where("userId", "==", currentUser.uid));
        const snap = await getDocs(qFav);
        savedFavoriteIds = new Set(snap.docs.map(d => d.data().carId));
    }

    function updateFavoriteButtons() {
        document.querySelectorAll('.favorite-btn').forEach(btn => {
            const isSaved = savedFavoriteIds.has(btn.dataset.carId);
            btn.classList.toggle('saved', isSaved);
            btn.title = isSaved ? 'Ta bort från sparade' : 'Spara bilen';
            btn.innerHTML = `<i class="${isSaved ? 'fa-solid' : 'fa-regular'} fa-heart"></i>`;
        });
    }

    window.toggleFavorite = async (event, carId) => {
        event.stopPropagation();
        if (!currentUser) { window.location.href = `login.html?redirect=${encodeURIComponent(window.location.href)}`; return; }
        const car = favoriteCarCache[carId] || {};
        const favRef = doc(db, "favorites", `${currentUser.uid}_${carId}`);
        const favSnap = await getDoc(favRef);
        if (favSnap.exists()) {
            await deleteDoc(favRef);
            savedFavoriteIds.delete(carId);
        } else {
            await setDoc(favRef, { userId: currentUser.uid, carId, brand: car.brand || '', model: car.model || '', price: Number(car.price) || 0, image: car.images?.[0] || 'placeholder.jpg', createdAt: serverTimestamp() });
            savedFavoriteIds.add(carId);
        }
        updateFavoriteButtons();
    };

    async function loadResults() {
        grid.innerHTML = "<p class='no-results'>Söker efter matchningar...</p>";
        
        try {
            const snapshot = await getDocs(collection(db, "cars"));
            grid.innerHTML = "";
            let foundCount = 0;

            snapshot.forEach(doc => {
                const car = doc.data();
                favoriteCarCache[doc.id] = car;
                
                // 💡 منطق الفلترة المطابق لصفحة البيع
                const matchesBrand = urlParams.get('brand') === 'all' || !urlParams.get('brand') || car.brand === urlParams.get('brand');
                const matchesKar = urlParams.get('kar') === 'all' || car.karosseri === urlParams.get('kar');
                const matchesFuel = urlParams.get('fuel') === 'all' || !urlParams.get('fuel') || car.fuel === urlParams.get('fuel');
                
                // فلترة السعر
                const price = Number(car.price);
                const minP = Number(urlParams.get('minP')) || 0;
                const maxP = Number(urlParams.get('maxP')) || Infinity;

                if (matchesBrand && matchesKar && matchesFuel && price >= minP && price <= maxP) {
                    foundCount++;
                    grid.innerHTML += `
                        <div class="car-card" onclick="window.location.href='details.html?id=${doc.id}'">
                            <button class="favorite-btn" data-car-id="${doc.id}" onclick="toggleFavorite(event, '${doc.id}')" title="Spara bilen">
                                <i class="fa-regular fa-heart"></i>
                            </button>
                            <img src="${car.images?.[0] || 'placeholder.jpg'}" style="width:100%; height:200px; object-fit:cover;">
                            <div style="padding:15px;">
                                <h3 style="color:#f58220;">${price.toLocaleString()} kr</h3>
                                <p><strong>${car.brand} ${car.model}</strong></p>
                                <p style="font-size:12px; color:#64748b;">${car.year} | ${car.mileage} mil | ${car.fuel}</p>
                            </div>
                        </div>`;
                }
            });

            updateFavoriteButtons();
            if (foundCount === 0) grid.innerHTML = "<div class='no-results'>Inga fordon matchade din sökning. Prova bredare filter!</div>";
        } catch (err) { console.error(err); }
    }

    loadResults();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sökresultat | BILHK</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root{--primary:#f58220;--dark:#0f172a;--bg:#f8fafc;--border:#e2e8f0;--white:#fff;--muted:#64748b;--danger:#ef4444}*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif}body{background:var(--bg);color:var(--dark);min-height:100vh;display:flex;flex-direction:column}a{text-decoration:none;color:inherit}header{background:var(--white);padding:15px 6%;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:20}.logo{font-size:26px;font-weight:900}.logo span{color:var(--primary)}.container{max-width:1200px;margin:38px auto;padding:0 20px;width:100%;flex:1}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;gap:15px;flex-wrap:wrap}h1{font-size:26px;font-weight:900}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:22px}.card{background:white;border:1px solid var(--border);border-radius:20px;overflow:hidden;cursor:pointer;position:relative;transition:.2s}.card:hover{transform:translateY(-4px);box-shadow:0 12px 30px rgba(15,23,42,.08)}.card img{width:100%;height:200px;object-fit:cover}.info{padding:18px}.price{font-size:22px;font-weight:900;color:var(--primary)}.name{font-size:16px;font-weight:900;margin:4px 0}.meta{display:flex;gap:9px;flex-wrap:wrap;color:var(--muted);font-size:12px;font-weight:800}.sold{position:absolute;top:14px;left:14px;background:var(--danger);color:white;font-size:11px;font-weight:900;padding:5px 10px;border-radius:7px;z-index:2}.empty{text-align:center;padding:70px 20px;color:var(--muted);font-weight:800;grid-column:1/-1}.pager{display:flex;gap:8px;justify-content:center;margin:30px 0;flex-wrap:wrap}.page-btn{border:1px solid var(--border);background:white;border-radius:10px;padding:9px 13px;font-weight:900;cursor:pointer}.page-btn.active{background:var(--primary);color:white;border-color:var(--primary)}footer{background:var(--white);border-top:1px solid var(--border);padding:34px 20px;text-align:center;color:#94a3b8;font-size:13px;margin-top:auto}.footer-links{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}.footer-links a{font-weight:900;color:var(--muted)}.footer-links a:hover{color:var(--primary)}
  </style>
</head>
<body>
<header><a href="index.html" class="logo">BIL<span>HK</span></a><a href="index.html" style="font-weight:900"><i class="fa-solid fa-arrow-left"></i> Tillbaka till sök</a></header>
<main class="container"><div class="top"><h1 id="count">Söker bilar...</h1><a href="filter.html" style="font-weight:900;color:var(--primary)"><i class="fa-solid fa-sliders"></i> Ändra filter</a></div><div id="grid" class="grid"></div><div id="pager" class="pager"></div></main>
<footer><div class="footer-links"><a href="terms.html">Användarvillkor</a><a href="terms.html#disclaimer">Ansvarsfriskrivning</a></div><div>BILHK är en annonsplattform. Vi ansvarar inte för annonser, affärer, betalningar eller tvister mellan användare.</div></footer>
<script type="module">
import { db } from './firebase-config.js';
import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
const params=new URLSearchParams(location.search);const pageSize=12;let cars=[],page=1;const esc=v=>String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));const money=v=>Number(v||0).toLocaleString('sv-SE');
const f={brand:params.get('brand'),model:(params.get('model')||'').toLowerCase(),minP:+params.get('minP')||0,maxP:+params.get('maxP')||Infinity,yFrom:+params.get('yFrom')||0,yTo:+params.get('yTo')||Infinity,fuel:params.get('fuel'),gear:params.get('gear'),mil:+(params.get('mil')||params.get('milTo')||params.get('maxMil'))||Infinity,milFrom:+params.get('milFrom')||0,body:params.get('body')||params.get('kar'),drive:params.get('drive'),color:(params.get('color')||'').toLowerCase(),minHp:+params.get('minHp')||0,seats:+params.get('seats')||0,doors:+params.get('doors')||0,feats:(params.get('feats')||'').split(',').filter(Boolean)};
async function load(){document.getElementById('grid').innerHTML='<div class="empty"><i class="fa-solid fa-spinner fa-spin"></i> Laddar...</div>';let q=collection(db,'cars');if(f.brand&&f.brand!=='all')q=query(q,where('brand','==',f.brand));const snap=await getDocs(q);cars=[];snap.forEach(d=>{const c={id:d.id,...d.data()};const mileage=Number(c.mileage||c.mil||0);const price=Number(c.price||0);const hp=Number(c.hp||0);const body=c.karosseri||c.body||c.carType||'';const gear=c.gear||c.transmission||'';const fuel=c.fuel||c.fuelType||'';let ok=true;if(f.model&&!String(c.model||'').toLowerCase().includes(f.model))ok=false;if(price<f.minP||price>f.maxP)ok=false;if(Number(c.year||0)<f.yFrom||Number(c.year||0)>f.yTo)ok=false;if(f.fuel&&f.fuel!=='all'&&fuel!==f.fuel)ok=false;if(f.gear&&f.gear!=='all'&&gear!==f.gear)ok=false;if(mileage<f.milFrom||mileage>f.mil)ok=false;if(f.body&&f.body!=='all'&&body!==f.body)ok=false;if(f.drive&&f.drive!=='all'&&c.drive!==f.drive)ok=false;if(f.color&&!String(c.color||'').toLowerCase().includes(f.color))ok=false;if(f.minHp&&hp<f.minHp)ok=false;if(f.seats&&Number(c.seats||0)!==f.seats)ok=false;if(f.doors&&Number(c.doors||0)!==f.doors)ok=false;if(f.feats.length&&!f.feats.every(x=>(c.features||[]).includes(x)))ok=false;if(ok)cars.push(c)});cars.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));render()}
function render(){document.getElementById('count').innerText=`${cars.length} bilar hittades`;const grid=document.getElementById('grid');const start=(page-1)*pageSize;const shown=cars.slice(start,start+pageSize);if(!shown.length){grid.innerHTML='<div class="empty">Inga bilar matchade din sökning.</div>'}else{grid.innerHTML=shown.map(c=>{const sold=c.status==='sold';return `<article class="card" onclick="location.href='details.html?id=${c.id}'">${sold?'<div class="sold">SÅLD</div>':''}<img src="${esc(c.images?.[0]||'placeholder.jpg')}" style="${sold?'opacity:.6':''}"><div class="info" style="${sold?'opacity:.75':''}"><div class="price">${money(c.price)} kr</div><div class="name">${esc(c.brand)} ${esc(c.model)}</div><div class="meta"><span>${esc(c.year)}</span><span>${esc(c.mileage||c.mil||0)} mil</span><span>${esc(c.fuel||c.fuelType||'-')}</span></div></div></article>`}).join('')}renderPager()}
function renderPager(){const total=Math.ceil(cars.length/pageSize);const p=document.getElementById('pager');if(total<=1){p.innerHTML='';return}let html=`<button class="page-btn" ${page===1?'disabled':''} onclick="setPage(${page-1})">Föregående</button>`;for(let i=1;i<=total;i++)html+=`<button class="page-btn ${i===page?'active':''}" onclick="setPage(${i})">${i}</button>`;html+=`<button class="page-btn" ${page===total?'disabled':''} onclick="setPage(${page+1})">Nästa</button>`;p.innerHTML=html}window.setPage=n=>{const total=Math.ceil(cars.length/pageSize);page=Math.min(Math.max(1,n),total);render();scrollTo({top:0,behavior:'smooth'})};load();
</script>
</body>
</html>

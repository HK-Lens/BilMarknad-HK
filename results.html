<!DOCTYPE html>
<html lang="sv" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sökresultat | BILHK Professional Search</title>

    <!-- Google Fonts & FontAwesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- SweetAlert2 for Professional Alerts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #f58220;
            --primary-hover: #e07210;
            --primary-soft: #fff5eb;
            --dark: #0f172a;
            --dark-2: #1e293b;
            --muted: #64748b;
            --bg: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
            --success: #10b981;
            --shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--dark); line-height: 1.6; overflow-x: hidden; }

        /* --- Navigation --- */
        nav {
            background: var(--white);
            padding: 15px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-size: 26px; font-weight: 900; text-decoration: none; color: var(--dark); letter-spacing: -1.5px; }
        .logo span { color: var(--primary); }

        /* --- Search Header --- */
        .results-header {
            background: var(--white);
            padding: 25px 6%;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .summary-text h1 { font-size: 24px; font-weight: 900; letter-spacing: -0.5px; }
        .summary-text p { font-size: 14px; color: var(--muted); font-weight: 600; }

        .controls-wrap { display: flex; gap: 12px; align-items: center; }
        .pro-select {
            padding: 12px 18px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--bg);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            outline: none;
            transition: var(--transition);
        }
        .pro-select:focus { border-color: var(--primary); background: white; }

        .view-toggle-btn {
            width: 46px;
            height: 46px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--white);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            transition: var(--transition);
        }
        .view-toggle-btn.active { background: var(--dark); color: white; border-color: var(--dark); }

        /* --- Layout Grid --- */
        .main-content {
            max-width: 1440px;
            margin: 40px auto;
            padding: 0 5%;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 40px;
        }

        /* --- Sidebar Filters --- */
        .sidebar { position: sticky; top: 100px; height: fit-content; }
        .filter-panel {
            background: var(--white);
            border-radius: 30px;
            border: 1px solid var(--border);
            padding: 30px;
            box-shadow: var(--shadow);
        }
        .filter-group { margin-bottom: 25px; }
        .filter-group label { display: block; font-size: 12px; font-weight: 900; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; letter-spacing: 0.5px; }
        
        .side-input {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--bg);
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }
        .side-input:focus { border-color: var(--primary); background: white; outline: none; }

        .dual-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .btn-update {
            width: 100%;
            padding: 16px;
            background: var(--dark);
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }
        .btn-update:hover { background: var(--primary); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        /* --- Results Grid & Cards --- */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .car-pro-card {
            background: var(--white);
            border-radius: 32px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: var(--transition);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            position: relative;
        }
        .car-pro-card:hover { transform: translateY(-12px); box-shadow: var(--shadow); border-color: var(--primary); }

        .img-container { width: 100%; height: 230px; background: #f1f5f9; position: relative; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s ease; }
        .car-pro-card:hover .img-container img { transform: scale(1.1); }

        .floating-price {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 15px;
            font-weight: 900;
            font-size: 20px;
            box-shadow: 0 10px 20px rgba(245, 130, 32, 0.3);
            z-index: 2;
        }

        .card-details { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }
        .car-title { font-size: 20px; font-weight: 800; color: var(--dark); margin-bottom: 12px; }
        
        .tag-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .spec-tag { 
            background: var(--bg); 
            padding: 6px 12px; 
            border-radius: 10px; 
            font-size: 12px; 
            font-weight: 700; 
            color: var(--muted); 
            display: flex; 
            align-items: center; 
            gap: 6px; 
        }

        .card-meta {
            margin-top: auto;
            padding-top: 18px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: 700;
            color: var(--muted);
        }

        /* --- List View Logic --- */
        .results-grid.list-view { grid-template-columns: 1fr; }
        .results-grid.list-view .car-pro-card { flex-direction: row; height: 260px; }
        .results-grid.list-view .img-container { width: 380px; height: 100%; }

        /* --- Skeleton & Empty State --- */
        .skeleton-box {
            background: linear-gradient(90deg, #f1f5f9 25%, #f8fafc 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: pulse 1.5s infinite;
            border-radius: 32px;
            height: 420px;
        }
        @keyframes pulse { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .not-found {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 40px;
            background: var(--white);
            border-radius: 40px;
            border: 2px dashed var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .not-found i { font-size: 70px; color: var(--border); }
        .not-found h2 { font-weight: 800; color: var(--dark); }

        @media (max-width: 1024px) {
            .main-content { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">BIL<span>HK</span></a>
        <div id="authNavContainer"></div>
    </nav>

    <header class="results-header">
        <div class="summary-text">
            <h1 id="viewTitle">Hittade fordon</h1>
            <p id="totalFoundLabel">Ansluter till databasen...</p>
        </div>

        <div class="controls-wrap">
            <select id="sortMechanism" class="pro-select">
                <option value="newest">Senast tillagda</option>
                <option value="price_asc">Pris: Lågt till högt</option>
                <option value="price_desc">Pris: Högt till lågt</option>
                <option value="mil_asc">Miltal: Lägst först</option>
            </select>
            <button class="view-toggle-btn active" id="btnGrid"><i class="fa-solid fa-table-cells-large"></i></button>
            <button class="view-toggle-btn" id="btnList"><i class="fa-solid fa-list"></i></button>
        </div>
    </header>

    <div class="main-content">
        <aside class="sidebar">
            <div class="filter-panel">
                <div class="filter-group">
                    <label>Märke</label>
                    <select id="sideFilterBrand" class="side-input">
                        <option value="all">Alla märken</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>Bränsletyp</label>
                    <select id="sideFilterFuel" class="side-input">
                        <option value="all">Alla typer</option>
                        <option value="Bensin">Bensin</option>
                        <option value="Diesel">Diesel</option>
                        <option value="El">El</option>
                        <option value="Hybrid">Hybrid</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Pris (kr)</label>
                    <div class="dual-inputs">
                        <input type="number" id="sideMinPrice" class="side-input" placeholder="Från">
                        <input type="number" id="sideMaxPrice" class="side-input" placeholder="Till">
                    </div>
                </div>

                <div class="filter-group">
                    <label>Miltal (mil)</label>
                    <div class="dual-inputs">
                        <input type="number" id="sideMinMil" class="side-input" placeholder="Min">
                        <input type="number" id="sideMaxMil" class="side-input" placeholder="Max">
                    </div>
                </div>

                <button class="btn-update" id="triggerUpdate">
                    Uppdatera sökning
                </button>
            </div>
        </aside>

        <main>
            <div class="results-grid" id="mainResultsGrid">
                <!-- Skeletons placeholders -->
                <div class="skeleton-box"></div>
                <div class="skeleton-box"></div>
                <div class="skeleton-box"></div>
            </div>
        </main>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import carData from './cars-data.js';

        // --- GLOBAL STATE ---
        const urlParams = new URLSearchParams(window.location.search);
        let carsCache = [];

        /**
         * 1. INITIALIZE UI COMPONENTS
         * مزامنة الواجهة مع البيانات القادمة من الرابط والبيانات الثابتة
         */
        function initUI() {
            const sideBrand = document.getElementById('sideFilterBrand');
            
            // إضافة الماركات من الملف المصدري carData بشكل مرتب
            if (carData) {
                const sortedBrands = Object.keys(carData).sort();
                sortedBrands.forEach(b => {
                    const opt = document.createElement('option');
                    opt.value = b;
                    opt.textContent = b;
                    sideBrand.appendChild(opt);
                });
            }

            // مزامنة مدخلات الفلترة مع قيم الـ URL الحالية
            sideBrand.value = urlParams.get('brand') || 'all';
            document.getElementById('sideFilterFuel').value = urlParams.get('fuel') || 'all';
            document.getElementById('sideMinPrice').value = urlParams.get('minP') || '';
            document.getElementById('sideMaxPrice').value = urlParams.get('maxP') || '';
            document.getElementById('sideMinMil').value = urlParams.get('minM') || '';
            document.getElementById('sideMaxMil').value = urlParams.get('maxM') || '';
            
            console.log("UI Initialized with Params:", Object.fromEntries(urlParams));
        }

        /**
         * 2. DATA FETCHING ENGINE (FIRESTORE)
         * جلب البيانات مع معالجة الأخطاء والتشخيص الدقيق
         */
        async function runSearchEngine() {
            const grid = document.getElementById('mainResultsGrid');
            
            // استخراج المعايير لتحويلها إلى أرقام للمقارنة الدقيقة
            const filterBrand = urlParams.get('brand');
            const filterFuel = urlParams.get('fuel');
            const minPrice = Number(urlParams.get('minP')) || 0;
            const maxPrice = Number(urlParams.get('maxP')) || 10000000;
            const minMil = Number(urlParams.get('minM')) || 0;
            const maxMil = Number(urlParams.get('maxM')) || 1000000;

            try {
                // جلب السيارات التي حالتها active فقط لضمان الخصوصية والأمان
                const carsRef = collection(db, "cars");
                const q = query(carsRef, where("status", "==", "active"));
                
                const querySnapshot = await getDocs(q);
                
                console.log(`Firestore Debug: Found ${querySnapshot.size} total active raw documents.`);

                carsCache = [];
                querySnapshot.forEach(doc => {
                    const data = doc.data();
                    const car = { id: doc.id, ...data };

                    // تحويل القيم إلى أرقام لضمان عدم فشل المقارنة إذا كانت مخزنة كنصوص
                    const carPrice = Number(car.price);
                    const carMil = Number(car.mileage);

                    // منطق الفلترة الهجين (Hybrid Filtering Logic)
                    const isBrandMatch = !filterBrand || filterBrand === 'all' || car.brand === filterBrand;
                    const isFuelMatch = !filterFuel || filterFuel === 'all' || car.fuel === filterFuel;
                    const isPriceInRange = carPrice >= minPrice && carPrice <= maxPrice;
                    const isMilInRange = carMil >= minMil && carMil <= maxMil;

                    if (isBrandMatch && isFuelMatch && isPriceInRange && isMilInRange) {
                        carsCache.push(car);
                    }
                });

                console.log(`Final Processed Results: ${carsCache.length} cars passed all filters.`);
                processAndRender();

            } catch (error) {
                console.error("Critical Engine Error:", error);
                grid.innerHTML = `
                    <div class="not-found">
                        <i class="fa-solid fa-triangle-exclamation" style="color: #ef4444;"></i>
                        <h2>Systemfel</h2>
                        <p>Kunde ikke hämta annonser. Kontrollera din anslutning eller Firebase Rules.</p>
                        <small style="color: #94a3b8;">Error: ${error.message}</small>
                    </div>`;
            }
        }

        /**
         * 3. RENDERING & SORTING ENGINE
         * مسؤول عن عرض الكروت والروابط الديناميكية
         */
        function processAndRender() {
            const sortVal = document.getElementById('sortMechanism').value;
            const grid = document.getElementById('mainResultsGrid');
            const counter = document.getElementById('totalFoundLabel');

            // منطق الفرز المتقدم
            carsCache.sort((a, b) => {
                if (sortVal === 'price_asc') return Number(a.price) - Number(b.price);
                if (sortVal === 'price_desc') return Number(b.price) - Number(a.price);
                if (sortVal === 'mil_asc') return Number(a.mileage) - Number(b.mileage);
                
                // الترتيب حسب التاريخ (الأحدث أولاً)
                const dateA = a.createdAt?.seconds || 0;
                const dateB = b.createdAt?.seconds || 0;
                return dateB - dateA;
            });

            grid.innerHTML = "";
            counter.innerText = `${carsCache.length} bilar tillgängliga just nu`;

            if (carsCache.length === 0) {
                grid.innerHTML = `
                    <div class="not-found">
                        <i class="fa-solid fa-car-side"></i>
                        <h2>Inga träffar hittades</h2>
                        <p>Försök att bredda din sökning eller ändra filtren.</p>
                    </div>`;
                return;
            }

            // بناء واجهة الإعلانات
            carsCache.forEach(car => {
                const formattedPrice = Number(car.price).toLocaleString('sv-SE');
                const thumbnail = (car.images && car.images.length > 0) ? car.images[0] : 'assets/placeholder-car.jpg';
                
                // الرابط الديناميكي هنا يربط الإعلان بصفحة التفاصيل عبر الـ ID
                grid.innerHTML += `
                    <a href="details.html?id=${car.id}" class="car-pro-card" title="${car.brand} ${car.model}">
                        <div class="img-container">
                            <img src="${thumbnail}" alt="${car.brand} ${car.model}" loading="lazy">
                            <div class="floating-price">${formattedPrice} kr</div>
                        </div>
                        <div class="card-details">
                            <div class="car-title">${car.brand} ${car.model}</div>
                            <div class="tag-row">
                                <span class="spec-tag"><i class="fa-regular fa-calendar-days"></i> ${car.year}</span>
                                <span class="spec-tag"><i class="fa-solid fa-road"></i> ${car.mileage} mil</span>
                                <span class="spec-tag"><i class="fa-solid fa-gas-pump"></i> ${car.fuel}</span>
                            </div>
                            <div class="card-meta">
                                <span><i class="fa-solid fa-location-dot"></i> ${car.city || 'Sverige'}</span>
                                <span style="color:var(--primary); font-weight: 800;">Visa annons <i class="fa-solid fa-chevron-right" style="font-size: 10px;"></i></span>
                            </div>
                        </div>
                    </a>
                `;
            });
        }

        /**
         * 4. EVENT LISTENERS & NAVIGATION LOGIC
         */
        
        // تبديل طرق العرض (Grid/List)
        document.getElementById('btnGrid').onclick = () => {
            document.getElementById('mainResultsGrid').classList.remove('list-view');
            document.getElementById('btnGrid').classList.add('active');
            document.getElementById('btnList').classList.remove('active');
        };

        document.getElementById('btnList').onclick = () => {
            document.getElementById('mainResultsGrid').classList.add('list-view');
            document.getElementById('btnList').classList.add('active');
            document.getElementById('btnGrid').classList.remove('active');
        };

        // تحديث البحث عند الضغط على الزر
        document.getElementById('triggerUpdate').onclick = () => {
            const brand = document.getElementById('sideFilterBrand').value;
            const fuel = document.getElementById('sideFilterFuel').value;
            const minP = document.getElementById('sideMinPrice').value;
            const maxP = document.getElementById('sideMaxPrice').value;
            const minM = document.getElementById('sideMinMil').value;
            const maxM = document.getElementById('sideMaxMil').value;

            const params = new URLSearchParams();
            if (brand !== 'all') params.set('brand', brand);
            if (fuel !== 'all') params.set('fuel', fuel);
            if (minP) params.set('minP', minP);
            if (maxP) params.set('maxP', maxP);
            if (minM) params.set('minM', minM);
            if (maxM) params.set('maxM', maxM);

            // إعادة توجيه الصفحة بالقيم الجديدة
            window.location.href = `results.html?${params.toString()}`;
        };

        // إعادة الفرز عند تغيير خيار الترتيب
        document.getElementById('sortMechanism').onchange = processAndRender;

        // --- EXECUTION START ---
        initUI();
        runSearchEngine();

    </script>
</body>
</html>

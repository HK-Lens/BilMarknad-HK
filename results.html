<!DOCTYPE html>
<html lang="sv" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sökresultat | BILHK Professional System</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; --white: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--dark); line-height: 1.6; }

        /* Navigation */
        nav { background: var(--white); padding: 15px 6%; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 26px; font-weight: 900; text-decoration: none; color: var(--dark); }
        .logo span { color: var(--primary); }

        /* Header */
        .results-header { background: var(--white); padding: 30px 6%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        .header-text h1 { font-size: 28px; font-weight: 900; }

        .main-layout { max-width: 1500px; margin: 40px auto; padding: 0 5%; display: grid; grid-template-columns: 320px 1fr; gap: 40px; }

        /* Sidebar Filter */
        .sidebar { position: sticky; top: 110px; height: fit-content; }
        .filter-card { background: var(--white); border-radius: 30px; padding: 30px; border: 1px solid var(--border); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .filter-group { margin-bottom: 25px; }
        .filter-group label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #64748b; margin-bottom: 10px; }
        
        .form-input { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid var(--border); background: var(--bg); font-size: 14px; font-weight: 600; transition: 0.3s; }
        .form-input:focus { border-color: var(--primary); background: white; outline: none; }

        .btn-update { width: 100%; padding: 18px; background: var(--dark); color: white; border: none; border-radius: 16px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-update:hover { background: var(--primary); transform: translateY(-3px); }

        /* Grid */
        .ads-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        
        .car-card { background: var(--white); border-radius: 35px; border: 1px solid var(--border); overflow: hidden; transition: 0.4s; text-decoration: none; color: inherit; display: flex; flex-direction: column; position: relative; }
        .car-card:hover { transform: translateY(-12px); border-color: var(--primary); box-shadow: 0 30px 60px -12px rgba(0,0,0,0.1); }

        .img-box { width: 100%; height: 240px; background: #f1f5f9; position: relative; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }

        .price-badge { position: absolute; bottom: 20px; right: 20px; background: var(--primary); color: white; padding: 10px 20px; border-radius: 15px; font-weight: 900; font-size: 20px; box-shadow: 0 10px 15px rgba(245, 130, 32, 0.3); }

        .card-body { padding: 25px; flex-grow: 1; }
        .card-body h3 { font-size: 20px; font-weight: 800; margin-bottom: 15px; }
        
        .tag-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .tag { background: var(--bg); padding: 6px 12px; border-radius: 10px; font-size: 12px; font-weight: 700; color: #64748b; }

        .empty-state { grid-column: 1/-1; text-align: center; padding: 100px; border: 2px dashed var(--border); border-radius: 40px; }

        @media (max-width: 1024px) { .main-layout { grid-template-columns: 1fr; } .sidebar { display: none; } }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">BIL<span>HK</span></a>
    </nav>

    <header class="results-header">
        <div class="header-text">
            <h1>Sökresultat</h1>
            <p id="totalFound">Ansluter till databasen...</p>
        </div>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <div class="filter-card">
                <div class="filter-group">
                    <label>Märke</label>
                    <select id="fBrand" class="form-input"><option value="all">Alla märken</option></select>
                </div>
                <div class="filter-group">
                    <label>Pris (kr)</label>
                    <input type="number" id="fMinP" class="form-input" placeholder="Från" style="margin-bottom:10px;">
                    <input type="number" id="fMaxP" class="form-input" placeholder="Till">
                </div>
                <button class="btn-update" id="btnUpdate">Uppdatera sökning</button>
            </div>
        </aside>

        <main>
            <div class="ads-grid" id="mainGrid">
                <p style="text-align:center; grid-column:1/-1;">Laddar...</p>
            </div>
        </main>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import carData from './cars-data.js';

        const urlParams = new URLSearchParams(window.location.search);
        const grid = document.getElementById('mainGrid');
        const counter = document.getElementById('totalFound');

        /**
         * المحرك الرئيسي المطور (Hybrid Engine)
         * هذا المحرك يجلب كل البيانات أولاً ثم يقوم بالفلترة محلياً لضمان عدم ضياع أي إعلان
         */
        async function runEngine() {
            try {
                console.log("--- بدء البحث العميق ---");
                
                // 1. جلب "كل" الإعلانات الموجودة في مجموعة cars
                const snap = await getDocs(collection(db, "cars"));
                console.log(`تم العثور على ${snap.size} إعلان في قاعدة البيانات.`);

                let filtered = [];

                snap.forEach(doc => {
                    const car = { id: doc.id, ...doc.data() };
                    
                    // --- منطق المطابقة الذكية (Smart Matching) ---
                    
                    // أ. جلب القيم من الرابط (URL)
                    const sBrand = urlParams.get('brand') || 'all';
                    const sMinP = Number(urlParams.get('minP')) || 0;
                    const sMaxP = Number(urlParams.get('maxP')) || 99999999;
                    const sFuel = urlParams.get('fuel') || 'all';

                    // ب. المطابقة (تجاهل حالة الأحرف والمسافات)
                    const brandMatch = (sBrand === 'all' || car.brand.toLowerCase().trim() === sBrand.toLowerCase().trim());
                    const fuelMatch = (sFuel === 'all' || car.fuel === sFuel);
                    const priceMatch = (Number(car.price) >= sMinP && Number(car.price) <= sMaxP);
                    const activeMatch = (car.active === true); // التأكد من أن الإعلان نشط

                    // ج. التشخيص (طباعة الأسباب في الكونسول إذا لم يظهر الإعلان)
                    if (brandMatch && priceMatch && activeMatch) {
                        filtered.push(car);
                    } else {
                        console.log(`تم استبعاد السيارة ${car.model}:`, {brandMatch, priceMatch, activeMatch});
                    }
                });

                render(filtered);

            } catch (error) {
                console.error("Critical Fault:", error);
                grid.innerHTML = `<div class="empty-state"><h2>Systemfel</h2><p>${error.message}</p></div>`;
            }
        }

        function render(cars) {
            grid.innerHTML = "";
            counter.innerText = `${cars.length} bilar hittades`;

            if (cars.length === 0) {
                grid.innerHTML = `<div class="empty-state"><h2>Inga bilar hittades</h2><p>Kontrollera dina filter eller lägg till nya annonser.</p></div>`;
                return;
            }

            cars.forEach(car => {
                const img = (car.images && car.images[0]) ? car.images[0] : 'assets/placeholder.jpg';
                grid.innerHTML += `
                    <a href="details.html?id=${car.id}" class="car-card">
                        <div class="img-box">
                            <img src="${img}" alt="${car.brand}">
                            <div class="price-badge">${Number(car.price).toLocaleString()} kr</div>
                        </div>
                        <div class="card-body">
                            <h3>${car.brand} ${car.model}</h3>
                            <div class="tag-row">
                                <span class="tag">${car.year}</span>
                                <span class="tag">${car.mileage} mil</span>
                                <span class="tag">${car.fuel}</span>
                            </div>
                        </div>
                    </a>`;
            });
        }

        // تهيئة الفلاتر الجانبية
        if (carData) {
            const bSelect = document.getElementById('fBrand');
            Object.keys(carData).sort().forEach(b => {
                const opt = document.createElement('option');
                opt.value = b; opt.innerText = b;
                bSelect.appendChild(opt);
            });
            bSelect.value = urlParams.get('brand') || 'all';
            document.getElementById('fMinP').value = urlParams.get('minP') || '';
            document.getElementById('fMaxP').value = urlParams.get('maxP') || '';
        }

        document.getElementById('btnUpdate').onclick = () => {
            const b = document.getElementById('fBrand').value;
            const min = document.getElementById('fMinP').value;
            const max = document.getElementById('fMaxP').value;
            window.location.href = `results.html?brand=${b}&minP=${min}&maxP=${max}`;
        };

        runEngine();
    </script>
</body>
</html>

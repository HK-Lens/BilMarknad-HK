<!DOCTYPE html>
<html lang="sv" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sökresultat | BILHK Advanced Search Engine</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #f58220;
            --primary-dark: #e07210;
            --dark-deep: #0f172a;
            --slate-800: #1e293b;
            --slate-500: #64748b;
            --bg-light: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
            --shadow-premium: 0 20px 25px -5px rgba(0,0,0,0.08);
            --transition-hq: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-light); color: var(--dark-deep); line-height: 1.6; overflow-x: hidden; }

        /* --- Navigation Layer --- */
        nav {
            background: var(--white);
            padding: 18px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-size: 26px; font-weight: 900; text-decoration: none; color: var(--dark-deep); letter-spacing: -1.5px; }
        .logo span { color: var(--primary); }

        /* --- Dynamic Header --- */
        .results-header {
            background: var(--white);
            padding: 35px 6%;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .summary-stats h1 { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; }
        .summary-stats p { font-size: 14px; color: var(--slate-500); font-weight: 600; }

        .control-strip { display: flex; gap: 15px; align-items: center; }
        .sort-select {
            padding: 12px 20px;
            border-radius: 14px;
            border: 2px solid var(--border);
            background: var(--bg-light);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            outline: none;
            transition: var(--transition-hq);
        }
        .sort-select:focus { border-color: var(--primary); background: white; }

        /* --- Main Architectural Layout --- */
        .main-container {
            max-width: 1440px;
            margin: 40px auto;
            padding: 0 5%;
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 40px;
        }

        /* --- Sidebar Detailed Filters --- */
        .sidebar { position: sticky; top: 110px; height: fit-content; }
        .filter-panel {
            background: var(--white);
            border-radius: 35px;
            border: 1px solid var(--border);
            padding: 30px;
            box-shadow: var(--shadow-premium);
        }
        .filter-group { margin-bottom: 25px; }
        .filter-group label { display: block; font-size: 11px; font-weight: 900; text-transform: uppercase; color: var(--slate-500); margin-bottom: 12px; letter-spacing: 0.8px; }
        
        .hq-input {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--bg-light);
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }
        .hq-input:focus { border-color: var(--primary); background: white; outline: none; }

        .range-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .btn-refresh {
            width: 100%;
            padding: 18px;
            background: var(--dark-deep);
            color: white;
            border: none;
            border-radius: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: var(--transition-hq);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-refresh:hover { background: var(--primary); transform: translateY(-3px); box-shadow: 0 12px 24px rgba(245, 130, 32, 0.3); }

        /* --- Results Grid & Professional Cards --- */
        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }

        .car-hq-card {
            background: var(--white);
            border-radius: 35px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: var(--transition-hq);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .car-hq-card:hover { transform: translateY(-12px); box-shadow: 0 30px 60px -15px rgba(0,0,0,0.1); border-color: var(--primary); }

        .img-container { width: 100%; height: 240px; background: #f1f5f9; position: relative; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: 1s ease; }
        .car-hq-card:hover .img-container img { transform: scale(1.1); }

        .price-badge {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: var(--primary);
            color: white;
            padding: 10px 22px;
            border-radius: 16px;
            font-weight: 900;
            font-size: 20px;
            box-shadow: 0 10px 20px rgba(245, 130, 32, 0.35);
            z-index: 5;
        }

        .card-content { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }
        .car-name { font-size: 22px; font-weight: 800; color: var(--dark-deep); margin-bottom: 12px; }
        
        .spec-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .spec-chip { 
            background: var(--bg-light); 
            padding: 7px 14px; 
            border-radius: 12px; 
            font-size: 12px; 
            font-weight: 700; 
            color: var(--slate-500); 
            display: flex; 
            align-items: center; 
            gap: 7px; 
        }

        .card-footer {
            margin-top: auto;
            padding-top: 18px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: 700;
            color: var(--slate-500);
        }

        /* --- States: Loading & Empty --- */
        .skeleton-loader { height: 450px; background: linear-gradient(90deg, #f1f5f9 25%, #f8fafc 50%, #f1f5f9 75%); background-size: 200% 100%; animation: pulse 1.5s infinite; border-radius: 35px; }
        @keyframes pulse { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .not-found-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px 40px;
            background: var(--white);
            border-radius: 45px;
            border: 2px dashed var(--border);
        }
        .not-found-state i { font-size: 70px; color: var(--border); margin-bottom: 25px; }

        @media (max-width: 1024px) {
            .main-container { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">BIL<span>HK</span></a>
        <div id="authContainer"></div>
    </nav>

    <header class="results-header">
        <div class="summary-stats">
            <h1 id="viewHeading">Sökresultat</h1>
            <p id="totalCountLabel">Initierar sökning...</p>
        </div>

        <div class="control-strip">
            <select id="sortMechanism" class="sort-select">
                <option value="newest">Senast inkommet</option>
                <option value="price_asc">Pris: Lägst först</option>
                <option value="price_desc">Pris: Högst först</option>
                <option value="mil_asc">Miltal: Kortast</option>
            </select>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="filter-panel">
                <div class="filter-group">
                    <label>Märke</label>
                    <select id="sideBrand" class="hq-input">
                        <option value="all">Alla märken</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>Pris (SEK)</label>
                    <div class="range-grid">
                        <input type="number" id="sideMinPrice" class="hq-input" placeholder="Från">
                        <input type="number" id="sideMaxPrice" class="hq-input" placeholder="Till">
                    </div>
                </div>

                <div class="filter-group">
                    <label>Årsmodell</label>
                    <div class="range-grid">
                        <input type="number" id="sideMinYear" class="hq-input" placeholder="Från">
                        <input type="number" id="sideMaxYear" class="hq-input" placeholder="Till">
                    </div>
                </div>

                <div class="filter-group">
                    <label>Drivmedel</label>
                    <select id="sideFuel" class="hq-input">
                        <option value="all">Alla drivmedel</option>
                        <option value="Bensin">Bensin</option>
                        <option value="Diesel">Diesel</option>
                        <option value="El">El</option>
                        <option value="Hybrid">Hybrid</option>
                    </select>
                </div>

                <button class="btn-refresh" id="triggerUpdate">
                    <i class="fa-solid fa-rotate"></i> Uppdatera filter
                </button>
            </div>
        </aside>

        <main>
            <div class="results-grid" id="mainAdsContainer">
                <div class="skeleton-loader"></div>
                <div class="skeleton-loader"></div>
                <div class="skeleton-loader"></div>
            </div>
        </main>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import carData from './cars-data.js';

        // --- Core Engine State ---
        const urlParams = new URLSearchParams(window.location.search);
        let cachedAds = [];

        /**
         * 1. UI Initialization & Dropdown Population
         */
        function initializeUI() {
            const sideBrand = document.getElementById('sideBrand');
            if (carData) {
                Object.keys(carData).sort().forEach(b => {
                    const opt = document.createElement('option');
                    opt.value = b; opt.textContent = b;
                    sideBrand.appendChild(opt);
                });
            }

            // Sync inputs with URL params for persistence
            document.getElementById('sideBrand').value = urlParams.get('brand') || 'all';
            document.getElementById('sideFuel').value = urlParams.get('fuel') || 'all';
            document.getElementById('sideMinPrice').value = urlParams.get('minP') || '';
            document.getElementById('sideMaxPrice').value = urlParams.get('maxP') || '';
            document.getElementById('sideMinYear').value = urlParams.get('minY') || '';
            document.getElementById('sideMaxYear').value = urlParams.get('maxY') || '';
        }

        /**
         * 2. High-Precision Search Engine
         * هاد المحرك بجيب البيانات "النشطة" وبصفيها برمجياً ليتجنب مشاكل الـ Index في Firestore
         */
        async function runEngine() {
            const container = document.getElementById('mainAdsContainer');
            
            try {
                // جلب كل الإعلانات النشطة (تضمن وصول الإعلان بغض النظر عن الـ Sold status)
                const carsRef = collection(db, "cars");
                // ملاحظة: استعلمنا عن active: true لأنه المصدر الأوثق في صورك
                const q = query(carsRef, where("active", "==", true));
                
                const snap = await getDocs(q);
                
                cachedAds = [];
                snap.forEach(doc => {
                    const data = doc.data();
                    const car = { id: doc.id, ...data };

                    // --- Advanced Hybrid Filtering Logic ---
                    if (matchAdvancedFilters(car)) {
                        cachedAds.push(car);
                    }
                });

                renderProcess();

            } catch (err) {
                console.error("Engine Fault:", err);
                container.innerHTML = `<div class="not-found-state"><h2>Ett anslutningsfel uppstod.</h2><p>${err.message}</p></div>`;
            }
        }

        /**
         * 3. Advanced Filtering Logic (Deep Search Implementation)
         * هاد الجزء هو اللي بيعرف "وين المعلومات" وبربطها بالمعايير
         */
        function matchAdvancedFilters(car) {
            // استخراج القيم من الرابط
            const fBrand = urlParams.get('brand') || 'all';
            const fModel = urlParams.get('model') || 'all';
            const fFuel = urlParams.get('fuel') || 'all';
            const fBody = urlParams.get('karosseri') || 'all';
            const minP = Number(urlParams.get('minP')) || 0;
            const maxP = Number(urlParams.get('maxP')) || Infinity;
            const minY = Number(urlParams.get('minY')) || 0;
            const maxY = Number(urlParams.get('maxY')) || Infinity;
            const maxM = Number(urlParams.get('maxM')) || Infinity;

            // التطهير (Sanitization) للبيانات القادمة من الداتا بيز
            const carPrice = Number(car.price) || 0;
            const carYear = Number(car.year) || 0;
            const carMil = Number(car.mileage) || 0;

            // شروط المطابقة الدقيقة
            const brandMatch = fBrand === 'all' || (car.brand && car.brand.toLowerCase() === fBrand.toLowerCase());
            const modelMatch = fModel === 'all' || (car.model && car.model.toLowerCase().includes(fModel.toLowerCase()));
            const fuelMatch = fFuel === 'all' || car.fuel === fFuel;
            const bodyMatch = fBody === 'all' || car.karosseri === fBody;
            
            const priceInRange = carPrice >= minP && carPrice <= maxP;
            const yearInRange = carYear >= minY && carYear <= maxY;
            const milInRange = carMil <= maxM;

            // يجب أن تتحقق كل الشروط المختارة
            return brandMatch && modelMatch && fuelMatch && bodyMatch && priceInRange && yearInRange && milInRange;
        }

        /**
         * 4. Rendering & Sorting Layer
         */
        function renderProcess() {
            const container = document.getElementById('mainAdsContainer');
            const label = document.getElementById('totalCountLabel');
            const sortVal = document.getElementById('sortMechanism').value;

            // Sorting Engine
            cachedAds.sort((a, b) => {
                if (sortVal === 'price_asc') return (a.price || 0) - (b.price || 0);
                if (sortVal === 'price_desc') return (b.price || 0) - (a.price || 0);
                if (sortVal === 'mil_asc') return (a.mileage || 0) - (b.mileage || 0);
                return (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0); // Newest
            });

            container.innerHTML = "";
            label.innerText = `${cachedAds.length} bilar hittades enligt dina önskemål`;

            if (cachedAds.length === 0) {
                container.innerHTML = `
                    <div class="not-found-state">
                        <i class="fa-solid fa-magnifying-glass-plus"></i>
                        <h2>Inga träffar hittades</h2>
                        <p>Försök att bredda din sökning genom att ta bort några filter.</p>
                        <button onclick="window.location.href='results.html'" class="btn-refresh" style="width:auto; margin-top:20px; padding:12px 30px;">Rensa alla filter</button>
                    </div>`;
                return;
            }

            cachedAds.forEach(car => {
                const formattedPrice = Number(car.price).toLocaleString('sv-SE');
                const thumbnail = (car.images && car.images.length > 0) ? car.images[0] : 'assets/placeholder-car.jpg';
                
                container.innerHTML += `
                    <a href="details.html?id=${car.id}" class="car-hq-card">
                        <div class="img-container">
                            <img src="${thumbnail}" alt="${car.brand} ${car.model}" loading="lazy">
                            <div class="price-badge">${formattedPrice} kr</div>
                        </div>
                        <div class="card-content">
                            <div class="car-name">${car.brand} ${car.model}</div>
                            <div class="spec-row">
                                <span class="spec-chip"><i class="fa-regular fa-calendar"></i> ${car.year}</span>
                                <span class="spec-chip"><i class="fa-solid fa-gauge-high"></i> ${car.mileage} mil</span>
                                <span class="spec-chip"><i class="fa-solid fa-gas-pump"></i> ${car.fuel}</span>
                            </div>
                            <div class="card-footer">
                                <span><i class="fa-solid fa-location-dot"></i> ${car.city || 'Sverige'}</span>
                                <span style="color:var(--primary)">Visa mer <i class="fa-solid fa-arrow-right"></i></span>
                            </div>
                        </div>
                    </a>
                `;
            });
        }

        // --- Interaction Handlers ---
        document.getElementById('triggerUpdate').onclick = () => {
            const brand = document.getElementById('sideBrand').value;
            const fuel = document.getElementById('sideFuel').value;
            const minP = document.getElementById('sideMinPrice').value;
            const maxP = document.getElementById('sideMaxPrice').value;
            const minY = document.getElementById('sideMinYear').value;
            const maxY = document.getElementById('sideMaxYear').value;

            const p = new URLSearchParams();
            if (brand !== 'all') p.set('brand', brand);
            if (fuel !== 'all') p.set('fuel', fuel);
            if (minP) p.set('minP', minP);
            if (maxP) p.set('maxP', maxP);
            if (minY) p.set('minY', minY);
            if (maxY) p.set('maxY', maxY);

            window.location.href = `results.html?${p.toString()}`;
        };

        document.getElementById('sortMechanism').onchange = renderProcess;

        // Startup
        initializeUI();
        runEngine();
    </script>
</body>
</html>

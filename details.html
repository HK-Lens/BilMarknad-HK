<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Fordonsdetaljer på BILHK.">
    <title>Fordonsdetaljer | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary:#f58220; --primary-hover:#e07210; --dark:#0f172a; --bg:#f8fafc; --border:#e2e8f0; --white:#fff; --gray-text:#64748b; --danger:#ef4444; }
        * { box-sizing:border-box; margin:0; padding:0; font-family:'Inter',sans-serif; }
        body { background:var(--bg); color:var(--dark); display:flex; flex-direction:column; min-height:100vh; overflow-x:hidden; }
        header { background:var(--white); padding:15px 5%; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:1000; }
        .logo-box { display:flex; align-items:center; gap:20px; }
        .logo { text-decoration:none; font-weight:900; color:var(--dark); font-size:26px; letter-spacing:-.5px; }
        .logo span { color:var(--primary); }
        .btn-home { text-decoration:none; color:var(--dark); font-weight:700; font-size:14px; display:flex; align-items:center; gap:5px; }
        .nav-links { display:flex; align-items:center; gap:20px; }
        .btn-sell { background:var(--primary); color:white!important; padding:8px 20px; border-radius:50px; text-decoration:none; font-weight:700; font-size:13px; }
        .container { max-width:1200px; margin:40px auto; padding:0 20px; display:grid; grid-template-columns:1fr; gap:30px; flex:1; width:100%; }
        @media(min-width:900px){ .container{grid-template-columns:2fr 1fr;} }
        .main-col,.side-col { display:flex; flex-direction:column; gap:25px; }
        .gallery { background:var(--white); border-radius:20px; overflow:hidden; border:1px solid var(--border); position:relative; }
        .main-img { width:100%; height:450px; object-fit:cover; display:block; }
        .thumb-list { display:flex; gap:10px; padding:15px; overflow-x:auto; background:var(--bg); }
        .thumb { width:80px; height:60px; object-fit:cover; border-radius:8px; cursor:pointer; border:2px solid transparent; transition:.2s; }
        .thumb:hover { opacity:.8; }
        .thumb.active { border-color:var(--primary); }
        .sold-overlay { position:absolute; top:15px; left:15px; background:var(--danger); color:white; padding:7px 14px; border-radius:8px; font-size:12px; font-weight:900; z-index:5; box-shadow:0 6px 14px rgba(0,0,0,.18); }
        .info-card,.contact-card { background:var(--white); padding:30px; border-radius:20px; border:1px solid var(--border); box-shadow:0 10px 30px rgba(0,0,0,.02); }
        .contact-card { position:sticky; top:90px; }
        .car-title { font-size:28px; font-weight:900; margin-bottom:5px; }
        .car-price { font-size:24px; font-weight:900; color:var(--primary); }
        .btn-save-ad { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:10px 15px; font-weight:800; font-size:14px; cursor:pointer; transition:.2s; display:flex; align-items:center; gap:6px; color:var(--dark); }
        .btn-save-ad:hover { background:white; border-color:var(--primary); }
        .btn-save-ad.saved { color:var(--danger); border-color:#fca5a5; background:#fee2e2; }
        .specs-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:25px; }
        @media(min-width:600px){ .specs-grid{grid-template-columns:repeat(3,1fr);} }
        @media(min-width:1024px){ .specs-grid{grid-template-columns:repeat(4,1fr);} }
        .spec-item { background:var(--bg); padding:15px; border-radius:12px; text-align:center; border:1px solid var(--border); }
        .spec-item i { color:var(--gray-text); font-size:18px; margin-bottom:8px; display:block; }
        .spec-item span { font-size:11px; font-weight:900; color:var(--gray-text); text-transform:uppercase; }
        .spec-item strong { display:block; font-size:13px; font-weight:900; margin-top:4px; color:var(--dark); }
        .desc-title { font-size:18px; font-weight:900; margin-bottom:15px; border-bottom:2px solid var(--bg); padding-bottom:10px; }
        .description { font-size:15px; line-height:1.7; color:#334155; white-space:pre-wrap; }
        .features-list { display:flex; flex-wrap:wrap; gap:10px; margin-top:20px; }
        .feature-tag { background:var(--bg); padding:8px 12px; border-radius:8px; font-size:13px; font-weight:700; border:1px solid var(--border); color:var(--dark); display:flex; align-items:center; gap:6px; }
        .contact-title { font-size:18px; font-weight:900; margin-bottom:15px; display:flex; align-items:center; gap:8px; }
        .seller-info { display:flex; align-items:center; gap:15px; margin-bottom:20px; padding-bottom:20px; border-bottom:1px solid var(--border); }
        .seller-avatar { width:50px; height:50px; background:var(--primary); color:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:900; }
        .seller-name { font-weight:900; font-size:16px; }
        .seller-meta { color:var(--gray-text); font-size:13px; margin-top:3px; }
        .msg-input { width:100%; min-height:120px; padding:15px; border:1px solid var(--border); border-radius:12px; font-size:14px; resize:vertical; margin-bottom:15px; background:var(--bg); outline:none; transition:.2s; }
        .msg-input:focus { border-color:var(--primary); background:white; }
        .btn-send { width:100%; background:var(--primary); color:white; border:none; padding:16px; border-radius:12px; font-size:15px; font-weight:900; cursor:pointer; transition:.3s; display:flex; align-items:center; justify-content:center; gap:8px; text-decoration:none; }
        .btn-send:hover { background:var(--primary-hover); transform:translateY(-2px); }
        .btn-muted { background:white; color:var(--dark); border:1px solid var(--border); margin-top:10px; }
        .loading { grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--gray-text); font-weight:700; }
        footer { background:var(--white); border-top:1px solid var(--border); padding:35px 5% 20px; margin-top:auto; text-align:center; color:#94a3b8; font-size:12px; }
        @media(max-width:600px){ .main-img{height:300px;} .info-card,.contact-card{padding:22px;} .car-title{font-size:23px;} }
    </style>
</head>
<body>
<header>
    <div class="logo-box">
        <a href="index.html" class="logo">BIL<span>HK</span></a>
        <a href="index.html" class="btn-home"><i class="fa-solid fa-house"></i> Hem</a>
    </div>
    <div class="nav-links">
        <a href="sell.html" class="btn-sell">Sälj din bil</a>
        <div id="authStatusContainer"></div>
    </div>
</header>

<div class="container" id="appContent">
    <div class="loading"><i class="fa-solid fa-spinner fa-spin" style="font-size:30px;color:var(--primary);"></i><p style="margin-top:15px;">Laddar annons...</p></div>
</div>

<footer>© 2026 BILHK. BILHK är en öppen marknadsplats. Kontrollera alltid fordon och säljare innan köp.</footer>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import {
        doc, getDoc, collection, query, where, getDocs, addDoc, updateDoc,
        increment, serverTimestamp, arrayUnion, arrayRemove, setDoc
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const params = new URLSearchParams(window.location.search);
    const carId = params.get('id');
    let currentUser = null;
    let carData = null;
    let sellerData = null;
    let isSaved = false;

    function escapeHTML(value) {
        return String(value ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function money(value) {
        return Number(value || 0).toLocaleString('sv-SE');
    }

    function safeImage(url) {
        return escapeHTML(url || 'placeholder.jpg');
    }

    onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        const authContainer = document.getElementById('authStatusContainer');
        authContainer.innerHTML = user
            ? `<a href="dashboard.html" style="color:var(--primary);font-weight:900;text-decoration:none;"><i class="fa-solid fa-circle-user"></i> Mitt Konto</a>`
            : `<a href="login.html" style="color:var(--dark);font-weight:800;text-decoration:none;">Logga in</a>`;
        await loadAd();
    });

    async function loadAd() {
        if (!carId) {
            document.getElementById('appContent').innerHTML = `<div class="loading">Ingen annons vald.</div>`;
            return;
        }

        try {
            const carRef = doc(db, 'cars', carId);
            const carSnap = await getDoc(carRef);

            if (!carSnap.exists()) {
                document.getElementById('appContent').innerHTML = `<div class="loading">Annonsen hittades inte.</div>`;
                return;
            }

            carData = carSnap.data();
            const isOwner = currentUser && currentUser.uid === carData.sellerId;

            if (!isOwner) {
                try { await updateDoc(carRef, { views: increment(1) }); } catch (e) { console.warn('View counter skipped:', e); }
            }

            if (carData.sellerId) {
                const sellerSnap = await getDoc(doc(db, 'users', carData.sellerId));
                sellerData = sellerSnap.exists() ? sellerSnap.data() : { name: 'Okänd säljare' };
            } else {
                sellerData = { name: 'Okänd säljare' };
            }

            if (currentUser) {
                const userSnap = await getDoc(doc(db, 'users', currentUser.uid));
                isSaved = !!(userSnap.exists() && Array.isArray(userSnap.data().savedCars) && userSnap.data().savedCars.includes(carId));
            }

            renderPage(isOwner);
        } catch (error) {
            console.error(error);
            document.getElementById('appContent').innerHTML = `<div class="loading">Ett fel uppstod vid laddning av annonsen.</div>`;
        }
    }

    function renderPage(isOwner) {
        const images = Array.isArray(carData.images) && carData.images.length ? carData.images : ['placeholder.jpg'];
        const isSold = carData.status === 'sold';

        const thumbs = images.map((url, index) => `
            <img src="${safeImage(url)}" class="thumb ${index === 0 ? 'active' : ''}" onclick="changeImg('${safeImage(url)}', this)" onerror="this.src='placeholder.jpg'">
        `).join('');

        const features = Array.isArray(carData.features) && carData.features.length
            ? carData.features.map((f) => `<div class="feature-tag"><i class="fa-solid fa-check" style="color:var(--primary);"></i> ${escapeHTML(f)}</div>`).join('')
            : `<span style="color:var(--gray-text);font-size:14px;">Ingen specifik utrustning listad.</span>`;

        const sellerName = escapeHTML(sellerData?.name || sellerData?.companyName || 'Säljare');
        const sellerInitial = sellerName.charAt(0).toUpperCase() || 'S';
        const title = `${escapeHTML(carData.brand || '')} ${escapeHTML(carData.model || '')}`.trim();
        const description = escapeHTML(carData.description || 'Ingen beskrivning angiven.');

        const sideCard = isOwner ? `
            <div class="contact-card" style="border-top:4px solid var(--primary);background:#fffaf5;">
                <h3 class="contact-title" style="color:var(--primary);"><i class="fa-solid fa-chart-line"></i> Din annons</h3>
                <p style="font-size:13px;margin-bottom:20px;color:var(--gray-text);line-height:1.5;">Detta är hur kunder ser din annons.</p>
                <div style="display:flex;justify-content:space-between;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);"><span><i class="fa-regular fa-eye"></i> Visningar</span><strong>${Number(carData.views || 0)}</strong></div>
                <div style="display:flex;justify-content:space-between;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);"><span><i class="fa-solid fa-heart" style="color:#ef4444;"></i> Sparade</span><strong>${Number(carData.saves || 0)}</strong></div>
                <div style="display:flex;justify-content:space-between;margin-bottom:25px;"><span><i class="fa-regular fa-message"></i> Meddelanden</span><strong>${Number(carData.messagesCount || 0)}</strong></div>
                <a href="dashboard.html?tab=messages&carId=${encodeURIComponent(carId)}" class="btn-send" style="background:var(--dark);"><i class="fa-regular fa-comments"></i> Svara på meddelanden</a>
                <a href="edit-car.html?id=${encodeURIComponent(carId)}" class="btn-send btn-muted"><i class="fa-solid fa-pen"></i> Redigera annons</a>
            </div>
        ` : `
            <div class="contact-card">
                <h3 class="contact-title"><i class="fa-regular fa-envelope"></i> Kontakta säljaren</h3>
                <div class="seller-info">
                    <div class="seller-avatar">${sellerInitial}</div>
                    <div><div class="seller-name">${sellerName}</div><div class="seller-meta">Verifiera alltid säljaren innan köp.</div></div>
                </div>
                <textarea id="msgBody" class="msg-input" placeholder="Hej! Finns bilen kvar? Jag är intresserad..."></textarea>
                <button id="sendBtn" class="btn-send"><i class="fa-solid fa-paper-plane"></i> Skicka meddelande</button>
            </div>
        `;

        document.getElementById('appContent').innerHTML = `
            <div class="main-col">
                <div class="gallery">
                    ${isSold ? '<div class="sold-overlay">SÅLD</div>' : ''}
                    <img src="${safeImage(images[0])}" id="mainImage" class="main-img" onerror="this.src='placeholder.jpg'">
                    <div class="thumb-list">${thumbs}</div>
                </div>

                <div class="info-card">
                    <div style="display:flex;justify-content:space-between;align-items:flex-end;gap:15px;margin-bottom:20px;flex-wrap:wrap;">
                        <div>
                            <h1 class="car-title">${title || 'Fordon'}</h1>
                            <div class="car-price">${money(carData.price)} kr</div>
                        </div>
                        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px;">
                            <div style="background:var(--bg);padding:7px 10px;border-radius:7px;border:1px solid var(--border);font-weight:900;font-size:12px;text-transform:uppercase;"><i class="fa-solid fa-hashtag" style="color:var(--gray-text);"></i> ${escapeHTML(carData.regNr || carData.regNo || 'Okänd')}</div>
                            ${!isOwner ? `<button id="saveAdBtn" class="btn-save-ad ${isSaved ? 'saved' : ''}"><i class="${isSaved ? 'fa-solid' : 'fa-regular'} fa-heart"></i> ${isSaved ? 'Sparad' : 'Spara'}</button>` : ''}
                        </div>
                    </div>

                    <div class="specs-grid">
                        <div class="spec-item"><i class="fa-regular fa-calendar"></i><span>Årsmodell</span><strong>${escapeHTML(carData.year || '-')}</strong></div>
                        <div class="spec-item"><i class="fa-solid fa-gauge"></i><span>Miltal</span><strong>${escapeHTML(carData.mileage || carData.mil || '-')} mil</strong></div>
                        <div class="spec-item"><i class="fa-solid fa-gas-pump"></i><span>Drivmedel</span><strong>${escapeHTML(carData.fuel || carData.fuelType || '-')}</strong></div>
                        <div class="spec-item"><i class="fa-solid fa-gear"></i><span>Växellåda</span><strong>${escapeHTML(carData.gear || carData.transmission || '-')}</strong></div>
                        <div class="spec-item"><i class="fa-solid fa-car-side"></i><span>Karosseri</span><strong>${escapeHTML(carData.karosseri || carData.bodyType || carData.carType || '-')}</strong></div>
                        <div class="spec-item"><i class="fa-solid fa-truck-ramp-box"></i><span>Drivning</span><strong>${escapeHTML(carData.drive || '-')}</strong></div>
                        <div class="spec-item"><i class="fa-solid fa-palette"></i><span>Färg</span><strong>${escapeHTML(carData.color || '-')}</strong></div>
                        <div class="spec-item"><i class="fa-solid fa-horse-head"></i><span>Hästkrafter</span><strong>${carData.hp ? `${escapeHTML(carData.hp)} hk` : '-'}</strong></div>
                        <div class="spec-item"><i class="fa-solid fa-chair"></i><span>Säten</span><strong>${escapeHTML(carData.seats || '-')}</strong></div>
                        <div class="spec-item"><i class="fa-solid fa-door-open"></i><span>Dörrar</span><strong>${escapeHTML(carData.doors || '-')}</strong></div>
                    </div>

                    <h3 class="desc-title">Beskrivning</h3>
                    <div class="description">${description}</div>
                    <h3 class="desc-title" style="margin-top:25px;">Utrustning</h3>
                    <div class="features-list">${features}</div>
                </div>
            </div>
            <div class="side-col">${sideCard}</div>
        `;

        attachActions();
    }

    window.changeImg = (url, el) => {
        const main = document.getElementById('mainImage');
        if (main) main.src = url;
        document.querySelectorAll('.thumb').forEach((thumb) => thumb.classList.remove('active'));
        if (el) el.classList.add('active');
    };

    function attachActions() {
        const saveBtn = document.getElementById('saveAdBtn');
        if (saveBtn) saveBtn.onclick = toggleSave;

        const sendBtn = document.getElementById('sendBtn');
        if (sendBtn) sendBtn.onclick = sendMessage;
    }

    async function toggleSave() {
        if (!currentUser) {
            const res = await Swal.fire({ title:'Logga in krävs', text:'Du måste vara inloggad för att spara annonser.', icon:'info', confirmButtonText:'Logga in', confirmButtonColor:'#f58220' });
            if (res.isConfirmed) window.location.href = 'login.html';
            return;
        }

        if (currentUser.uid === carData.sellerId) return;

        const saveBtn = document.getElementById('saveAdBtn');
        saveBtn.disabled = true;

        try {
            const userRef = doc(db, 'users', currentUser.uid);
            const carRef = doc(db, 'cars', carId);

            if (isSaved) {
                await setDoc(userRef, { savedCars: arrayRemove(carId) }, { merge:true });
                try { await updateDoc(carRef, { saves: increment(-1) }); } catch (e) {}
                isSaved = false;
                saveBtn.classList.remove('saved');
                saveBtn.innerHTML = `<i class="fa-regular fa-heart"></i> Spara`;
            } else {
                await setDoc(userRef, { savedCars: arrayUnion(carId) }, { merge:true });
                try { await updateDoc(carRef, { saves: increment(1) }); } catch (e) {}
                isSaved = true;
                saveBtn.classList.add('saved');
                saveBtn.innerHTML = `<i class="fa-solid fa-heart"></i> Sparad`;
            }
        } catch (error) {
            console.error(error);
            Swal.fire('Fel', 'Kunde inte uppdatera sparade annonser.', 'error');
        } finally {
            saveBtn.disabled = false;
        }
    }

    async function sendMessage() {
        if (!currentUser) {
            const res = await Swal.fire({ title:'Logga in krävs', text:'Du måste vara inloggad för att skicka meddelanden.', icon:'warning', confirmButtonText:'Logga in', confirmButtonColor:'#f58220' });
            if (res.isConfirmed) window.location.href = 'login.html';
            return;
        }

        if (currentUser.uid === carData.sellerId) return;

        const input = document.getElementById('msgBody');
        const sendBtn = document.getElementById('sendBtn');
        const msg = input.value.trim();
        if (!msg) {
            Swal.fire('Tomt', 'Skriv ett meddelande först.', 'warning');
            return;
        }

        sendBtn.disabled = true;
        sendBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Skickar...`;

        try {
            const existingQuery = query(
                collection(db, 'chats'),
                where('carId', '==', carId),
                where('participants', 'array-contains', currentUser.uid)
            );
            const chatSnap = await getDocs(existingQuery);
            let chatId = null;

            if (!chatSnap.empty) {
                const existing = chatSnap.docs.find((d) => {
                    const data = d.data();
                    return Array.isArray(data.participants) && data.participants.includes(carData.sellerId);
                });
                if (existing) chatId = existing.id;
            }

            if (!chatId) {
                const buyerSnap = await getDoc(doc(db, 'users', currentUser.uid));
                const buyerName = buyerSnap.exists() ? (buyerSnap.data().name || buyerSnap.data().email || 'Köpare') : (currentUser.email || 'Köpare');
                const newChat = await addDoc(collection(db, 'chats'), {
                    carId,
                    carTitle: `${carData.brand || ''} ${carData.model || ''}`.trim(),
                    carImage: carData.images?.[0] || 'placeholder.jpg',
                    participants: [currentUser.uid, carData.sellerId],
                    users: [
                        { id: currentUser.uid, name: buyerName },
                        { id: carData.sellerId, name: sellerData?.name || sellerData?.companyName || 'Säljare' }
                    ],
                    lastMessage: '',
                    unreadFor: [carData.sellerId],
                    updatedAt: serverTimestamp(),
                    createdAt: serverTimestamp()
                });
                chatId = newChat.id;
            }

            await addDoc(collection(db, `chats/${chatId}/messages`), {
                text: msg,
                senderId: currentUser.uid,
                createdAt: serverTimestamp()
            });

            await updateDoc(doc(db, 'chats', chatId), {
                lastMessage: msg,
                unreadFor: arrayUnion(carData.sellerId),
                updatedAt: serverTimestamp()
            });

            try { await updateDoc(doc(db, 'cars', carId), { messagesCount: increment(1) }); } catch (e) {}

            input.value = '';
            Swal.fire('Skickat!', 'Ditt meddelande har skickats till säljaren.', 'success');
        } catch (error) {
            console.error(error);
            Swal.fire('Fel', 'Kunde inte skicka meddelandet.', 'error');
        } finally {
            sendBtn.disabled = false;
            sendBtn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> Skicka meddelande`;
        }
    }
</script>
</body>
</html>

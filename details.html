<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fordonsdetaljer | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background: white; padding: 15px 6%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { text-decoration: none; font-size: 24px; font-weight: 900; color: var(--dark); }
        .logo span { color: var(--primary); }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 1.6fr 1fr; gap: 30px; flex: 1; }

        /* --- معرض الصور --- */
        .gallery-container { position: relative; background: #000; border-radius: 20px; overflow: hidden; height: 500px; display: flex; align-items: center; justify-content: center; }
        .main-slide { width: 100%; height: 100%; object-fit: contain; cursor: zoom-in; }
        
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.9); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; font-weight: bold; z-index: 10; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .nav-btn:hover { background: var(--primary); color: white; }
        .prev-btn { left: 20px; }
        .next-btn { right: 20px; }

        .thumb-track { display: flex; gap: 10px; margin-top: 15px; overflow-x: auto; padding-bottom: 5px; }
        .thumb-item { width: 100px; height: 70px; object-fit: cover; border-radius: 10px; cursor: pointer; border: 3px solid transparent; opacity: 0.6; transition: 0.3s; flex-shrink: 0; }
        .thumb-item.active { border-color: var(--primary); opacity: 1; }

        /* --- نافذة التكبير (Zoom Mode) --- */
        .zoom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; justify-content: center; align-items: center; }
        .zoom-modal img { max-width: 90%; max-height: 85%; border-radius: 8px; }
        .zoom-ctrl { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); width: 60px; height: 60px; border-radius: 50%; font-size: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 3100; transition: 0.3s; }
        .zoom-ctrl:hover { background: var(--primary); }
        .close-zoom { position: absolute; top: 30px; right: 40px; color: white; font-size: 40px; cursor: pointer; z-index: 3200; }

        /* --- التفاصيل --- */
        .price-tag { font-size: 38px; font-weight: 900; margin: 25px 0 10px; }
        .car-title { font-size: 24px; color: #64748b; margin-bottom: 30px; }
        .specs-section { background: white; border-radius: 20px; padding: 30px; border: 1px solid var(--border); margin-bottom: 20px; }
        .specs-section h2 { font-size: 18px; margin-bottom: 20px; border-bottom: 3px solid var(--primary); display: inline-block; padding-bottom: 5px; }
        .tech-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .tech-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
        .tech-label { color: #94a3b8; font-size: 14px; }
        .tech-value { font-weight: 700; font-size: 14px; }

        /* --- نظام المراسلة والجانب الأيمن --- */
        .seller-card { background: var(--dark); color: white; padding: 30px; border-radius: 24px; position: sticky; top: 100px; }
        .seller-card h3 { margin-bottom: 10px; }
        .msg-input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; font-family: inherit; }
        .msg-input::placeholder { color: #94a3b8; }
        .btn-send { width: 100%; padding: 16px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: 800; cursor: pointer; margin-top: 10px; font-size: 16px; transition: 0.3s; }
        .btn-send:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-send:disabled { background: #64748b; cursor: not-allowed; }

        footer { text-align: center; padding: 40px 6%; background: white; border-top: 1px solid var(--border); color: #64748b; font-size: 13px; margin-top: 40px; }
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } .gallery-container { height: 350px; } }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
</header>

<div class="container" id="detailsPage">
    </div>

<div id="zoomModal" class="zoom-modal">
    <span class="close-zoom" id="closeZoom">&times;</span>
    <button class="zoom-ctrl" style="left:30px;" id="zoomPrev">❮</button>
    <img id="zoomedImg" src="">
    <button class="zoom-ctrl" style="right:30px;" id="zoomNext">❯</button>
</div>

<footer>
    <p>&copy; 2026 BilMarknad-HK. Alla rättigheter förbehållna.</p>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const carId = new URLSearchParams(window.location.search).get('id');
    let carImages = [];
    let currentIndex = 0;
    let carData = null;

    async function loadCar() {
        if (!carId) return;
        const snap = await getDoc(doc(db, "cars", carId));
        if (snap.exists()) {
            carData = snap.data();
            carImages = carData.images || ['placeholder.jpg'];
            
            document.getElementById('detailsPage').innerHTML = `
                <div class="main-content">
                    <div class="gallery-container">
                        <button class="nav-btn prev-btn" id="prevBtn">❮</button>
                        <img src="${carImages[0]}" class="main-slide" id="mainImg" onclick="openZoom()">
                        <button class="nav-btn next-btn" id="nextBtn">❯</button>
                    </div>
                    <div class="thumb-track" id="thumbTrack">
                        ${carImages.map((img, i) => `<img src="${img}" class="thumb-item ${i===0?'active':''}" data-index="${i}">`).join('')}
                    </div>

                    <div class="price-tag">${Number(carData.price).toLocaleString()} kr</div>
                    <h1 class="car-title">${carData.brand} ${carData.model} - ${carData.year}</h1>

                    <div class="specs-section">
                        <h2>Motor & Specifikationer</h2>
                        <div class="tech-grid">
                            <div class="tech-item"><span class="tech-label">Bränsle</span><span class="tech-value">${carData.fuelType || '-'}</span></div>
                            <div class="tech-item"><span class="tech-label">Växellåda</span><span class="tech-value">${carData.transmission || '-'}</span></div>
                            <div class="tech-item"><span class="tech-label">Miltal</span><span class="tech-value">${carData.mileage} mil</span></div>
                            <div class="tech-item"><span class="tech-label">Färg</span><span class="tech-value">${carData.color || '-'}</span></div>
                        </div>
                    </div>

                    <div class="specs-section">
                        <h2>Beskrivning</h2>
                        <p style="line-height:1.7; white-space: pre-line;">${carData.description || 'Ingen beskrivning tillgänglig.'}</p>
                    </div>
                </div>

                <div class="sidebar">
                    <div class="seller-card">
                        <h3>Intresserad?</h3>
                        <p style="font-size:13px; color:#94a3b8; margin-bottom:15px;">Skicka ett meddelande till säljaren</p>
                        
                        <form id="contactForm">
                            <input type="text" id="senderName" class="msg-input" placeholder="Ditt namn" required>
                            <input type="email" id="senderEmail" class="msg-input" placeholder="Din e-post" required>
                            <textarea id="senderMsg" class="msg-input" rows="4" placeholder="Jag är intresserad av din bil..." required></textarea>
                            <button type="submit" id="sendBtn" class="btn-send">Skicka förfrågan</button>
                        </form>

                        <div style="margin-top:25px; padding-top:20px; border-top:1px solid rgba(255,255,255,0.1);">
                            <p style="font-size:12px; color:#94a3b8;">Säljarens telefon:</p>
                            <div style="font-size:22px; font-weight:900; margin-top:5px;">📞 ${carData.phone || 'Dolt'}</div>
                        </div>
                    </div>
                </div>
            `;
            initGalleryLogic();
            initMessagingLogic();
        }
    }

    function initGalleryLogic() {
        const mainImg = document.getElementById('mainImg');
        const zoomedImg = document.getElementById('zoomedImg');
        const modal = document.getElementById('zoomModal');
        const thumbs = document.querySelectorAll('.thumb-item');

        const updateAll = (index) => {
            currentIndex = index;
            const src = carImages[currentIndex];
            mainImg.src = src;
            zoomedImg.src = src;
            thumbs.forEach((t, i) => t.classList.toggle('active', i === currentIndex));
        };

        // أحداث أزرار المعرض الرئيسي
        document.getElementById('prevBtn').onclick = () => updateAll((currentIndex - 1 + carImages.length) % carImages.length);
        document.getElementById('nextBtn').onclick = () => updateAll((currentIndex + 1) % carImages.length);

        // أحداث أزرار نافذة التكبير
        document.getElementById('zoomPrev').onclick = (e) => { e.stopPropagation(); updateAll((currentIndex - 1 + carImages.length) % carImages.length); };
        document.getElementById('zoomNext').onclick = (e) => { e.stopPropagation(); updateAll((currentIndex + 1) % carImages.length); };

        // النقر على الصور المصغرة
        thumbs.forEach(t => t.onclick = () => updateAll(parseInt(t.dataset.index)));

        // فتح وإغلاق التكبير
        window.openZoom = () => { zoomedImg.src = mainImg.src; modal.style.display = 'flex'; };
        document.getElementById('closeZoom').onclick = () => modal.style.display = 'none';
        modal.onclick = () => modal.style.display = 'none';

        // دعم الكيبورد
        document.addEventListener('keydown', (e) => {
            if (modal.style.display === 'flex') {
                if (e.key === "ArrowLeft") updateAll((currentIndex - 1 + carImages.length) % carImages.length);
                if (e.key === "ArrowRight") updateAll((currentIndex + 1) % carImages.length);
                if (e.key === "Escape") modal.style.display = 'none';
            }
        });
    }

    function initMessagingLogic() {
        const form = document.getElementById('contactForm');
        if (!form) return;

        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.innerText = "Skickar...";

            try {
                await addDoc(collection(db, "messages"), {
                    carId: carId,
                    carTitle: `${carData.brand} ${carData.model}`,
                    receiverId: carData.sellerId, // صاحب الإعلان
                    senderName: document.getElementById('senderName').value,
                    senderEmail: document.getElementById('senderEmail').value,
                    message: document.getElementById('senderMsg').value,
                    createdAt: serverTimestamp(),
                    read: false
                });

                alert("Tack! Ditt meddelande har skickats till säljaren.");
                form.reset();
            } catch (err) {
                alert("Ett fel uppstod: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Skicka förfrågan";
            }
        };
    }

    loadCar();
</script>
</body>
</html>

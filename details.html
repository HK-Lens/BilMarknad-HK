<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detaljer | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); }
        header { background: white; padding: 15px 6%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { text-decoration: none; font-size: 22px; font-weight: 900; color: var(--dark); }
        .logo span { color: var(--primary); }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 800px) { .container { grid-template-columns: 1.5fr 1fr; } }
        .card { background: white; padding: 25px; border-radius: 20px; border: 1px solid var(--border); }
        .btn-chat { width: 100%; background: var(--dark); color: white; padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
<header><a href="index.html" class="logo">BIL<span>HK</span></a></header>
<div class="container" id="details">Laddar...</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const carId = new URLSearchParams(window.location.search).get('id');
    let user = null; let car = null;

    onAuthStateChanged(auth, u => { user = u; load(); });

    async function load() {
        const snap = await getDoc(doc(db, "cars", carId));
        if (!snap.exists()) return;
        car = snap.data();
        document.getElementById('details').innerHTML = `
            <div>
                <img src="${car.images[0]}" style="width:100%; border-radius:20px; height:400px; object-fit:cover;">
                <div class="card" style="margin-top:20px;">
                    <h1 style="font-weight:900;">${car.brand} ${car.model}</h1>
                    <div style="font-size:28px; color:var(--primary); font-weight:900; margin:10px 0;">${Number(car.price).toLocaleString()} kr</div>
                    <p>${car.description}</p>
                </div>
            </div>
            <aside>
                <div class="card">
                    <h3 style="margin-bottom:15px;">Intresserad?</h3>
                    <textarea id="msg" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ddd;" rows="4" placeholder="Skriv ett meddelande..."></textarea>
                    <button onclick="sendMsg()" id="cBtn" class="btn-chat">Starta chatt</button>
                </div>
            </aside>`;
    }

    window.sendMsg = async () => {
        if (!user) { alert("Logga in först!"); return; }
        const text = document.getElementById('msg').value;
        const chatId = `${user.uid}_${car.sellerId}_${carId}`;
        await addDoc(collection(db, "messages"), {
            chatId: chatId, carId: carId, carTitle: car.brand + " " + car.model, carImage: car.images[0],
            senderId: user.uid, senderName: user.email.split('@')[0], recipientId: car.sellerId,
            message: text, timestamp: serverTimestamp(), participants: [user.uid, car.sellerId]
        });
        window.location.href = "my-account.html?chat=" + chatId;
    };
</script>
</body>
</html>

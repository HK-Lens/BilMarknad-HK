<script type="module">
    // ... (أكواد الاستيراد والتعريف) ...
    window.sendInternalMessage = async (e, car) => {
        e.preventDefault();
        if (!currentUser) { alert("Logga in först!"); return; }
        const text = document.getElementById('msgText').value;
        const btn = document.getElementById('sendMsgBtn');
        btn.disabled = true;

        try {
            await addDoc(collection(db, "messages"), {
                carId: carId,
                carTitle: `${car.brand} ${car.model}`,
                carImage: car.images?.[0] || '', // التأكد من إرسال الصورة
                senderId: currentUser.uid,
                senderName: currentUser.displayName || currentUser.email.split('@')[0],
                senderEmail: currentUser.email,
                recipientId: car.sellerId,
                message: text,
                timestamp: serverTimestamp()
            });
            alert("Meddelande skickat!");
            document.getElementById('contactForm').reset();
        } catch (err) { alert("Error!"); } finally { btn.disabled = false; }
    };
</script>

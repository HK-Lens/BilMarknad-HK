<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fordonsdetaljer | BILHK</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.min.css">
    
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; --reg-blue: #005599; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); line-height: 1.6; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* معرض الصور الاحترافي */
        .gallery-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
            height: 500px;
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
        }
        .main-stage { width: 100%; height: 100%; position: relative; }
        .main-stage img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .main-stage:hover img { transform: scale(1.03); }
        
        .side-stack { display: grid; grid-template-rows: 1fr 1fr; gap: 15px; }
        .side-stack img { width: 100%; height: 100%; object-fit: cover; }

        /* منطقة الأكشن: اللوحة والزر */
        .header-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            padding: 20px 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .reg-plate {
            display: inline-flex;
            align-items: center;
            border: 2px solid #222;
            border-radius: 6px;
            padding: 2px 12px;
            font-weight: 800;
            font-size: 24px;
            letter-spacing: 2px;
            background: #fff;
        }
        .reg-plate i {
            background: var(--reg-blue);
            color: white;
            font-style: normal;
            font-size: 11px;
            padding: 6px 4px;
            margin-right: 10px;
            border-radius: 2px;
            display: flex;
            flex-direction: column;
            line-height: 1;
        }

        .btn-contact {
            background: var(--dark);
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }
        .btn-contact:hover { background: var(--primary); transform: translateY(-2px); }
        .actions-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center; }
        .btn-favorite-detail { background: white; color: var(--dark); border: 1px solid var(--border); padding: 12px 20px; border-radius: 50px; font-weight: 800; font-size: 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: .3s; }
        .btn-favorite-detail:hover { border-color: var(--primary); color: var(--primary); transform: translateY(-2px); }
        .btn-favorite-detail.saved { color: #ef4444; border-color: #fecaca; background: #fff1f2; }

        /* شبكة المعلومات */
        .details-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        .info-card { background: white; padding: 35px; border-radius: 28px; border: 1px solid var(--border); margin-bottom: 25px; }
        
        .price-text { font-size: 45px; font-weight: 900; color: var(--primary); margin: 10px 0; }
        
        .specs-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 25px;
        }
        .spec-box {
            display: flex;
            justify-content: space-between;
            background: #f1f5f9;
            padding: 15px 20px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: 700;
        }
        .spec-label { color: #64748b; font-weight: 500; }

        .feature-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; }
        .tag {
            padding: 10px 18px;
            background: #fff5eb;
            color: var(--primary);
            border: 1px solid #fbd38d;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* فوتر الأمان */
        .safety-footer {
            margin-top: 50px;
            padding: 40px;
            background: white;
            border-radius: 30px;
            border: 1px solid var(--border);
        }
        .safety-box {
            background: #fff5eb;
            border-left: 6px solid var(--primary);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .disclaimer { font-size: 12px; color: #94a3b8; text-align: justify; line-height: 1.8; }

        /* Responsive */
        @media (max-width: 900px) {
            .gallery-container { grid-template-columns: 1fr; height: 350px; }
            .side-stack { display: none; }
            .details-grid { grid-template-columns: 1fr; }
            .header-bar { flex-direction: column; gap: 20px; text-align: center; }
            .price-text { font-size: 35px; }
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <div style="text-align:center; padding:100px;">Laddar fordonsdata...</div>
</div>

<script type="module">
    import { db, auth } from './firebase-config.js';
    import { doc, getDoc, setDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import PhotoSwipeLightbox from 'https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe-lightbox.esm.min.js';

    const carId = new URLSearchParams(window.location.search).get('id');
    const app = document.getElementById('app');
    let currentUser = null;
    let currentCar = null;
    let isFavorite = false;

    onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        if (currentCar) await refreshFavoriteState();
    });

    async function refreshFavoriteState() {
        if (!currentUser || !carId) { isFavorite = false; updateFavoriteButton(); return; }
        const favSnap = await getDoc(doc(db, "favorites", `${currentUser.uid}_${carId}`));
        isFavorite = favSnap.exists();
        updateFavoriteButton();
    }

    function updateFavoriteButton() {
        const btn = document.getElementById('favoriteDetailBtn');
        if (!btn) return;
        btn.classList.toggle('saved', isFavorite);
        btn.innerHTML = `<i class="${isFavorite ? 'fa-solid' : 'fa-regular'} fa-heart"></i> ${isFavorite ? 'Sparad' : 'Spara bilen'}`;
    }

    window.toggleFavoriteFromDetails = async () => {
        if (!currentUser) {
            window.location.href = `login.html?redirect=${encodeURIComponent(window.location.href)}`;
            return;
        }
        if (!currentCar) return;
        const favRef = doc(db, "favorites", `${currentUser.uid}_${carId}`);
        if (isFavorite) {
            await deleteDoc(favRef);
            isFavorite = false;
        } else {
            await setDoc(favRef, {
                userId: currentUser.uid,
                carId,
                brand: currentCar.brand || '',
                model: currentCar.model || '',
                price: Number(currentCar.price) || 0,
                image: currentCar.images?.[0] || 'placeholder.jpg',
                createdAt: serverTimestamp()
            });
            isFavorite = true;
        }
        updateFavoriteButton();
    };

    async function init() {
        if (!carId) return;
        try {
            const snap = await getDoc(doc(db, "cars", carId));
            if (!snap.exists()) { app.innerHTML = "Annonsen hittades inte."; return; }
            const car = snap.data();
            currentCar = car;

            app.innerHTML = `
                <div class="pswp-gallery gallery-container" id="mainGallery">
                    <a href="${car.images[0]}" data-pswp-width="1920" data-pswp-height="1280" target="_blank" class="main-stage">
                        <img src="${car.images[0]}" alt="Huvudbild">
                    </a>
                    <div class="side-stack">
                        ${car.images.slice(1, 3).map(img => `
                            <a href="${img}" data-pswp-width="1920" data-pswp-height="1280" target="_blank">
                                <img src="${img}">
                            </a>
                        `).join('')}
                    </div>
                </div>

                <div class="header-bar">
                    <div class="reg-plate">
                        <i>S</i> ${(car.regNo || '--- ---').toUpperCase()}
                    </div>
                    <div class="actions-row">
                        <button id="favoriteDetailBtn" class="btn-favorite-detail" onclick="toggleFavoriteFromDetails()">
                            <i class="fa-regular fa-heart"></i> Spara bilen
                        </button>
                        <a href="messages.html?sellerId=${car.sellerId}&carId=${carId}" class="btn-contact">
                            <i class="fa-solid fa-comments"></i> Kontakta säljaren
                        </a>
                    </div>
                </div>

                <div class="details-grid">
                    <div class="content-left">
                        <div class="info-card">
                            <h1 style="font-size:38px; font-weight:900;">${car.brand} ${car.model}</h1>
                            <p style="color:#64748b; font-weight:700; font-size:18px;">Modellår: ${car.year} • ${car.mileage} mil</p>
                            <div class="price-text">${Number(car.price).toLocaleString()} kr</div>
                            
                            <div class="specs-list">
                                <div class="spec-box"><span class="spec-label">Årsmodell</span><span>${car.year}</span></div>
                                <div class="spec-box"><span class="spec-label">Drivmedel</span><span>${car.fuel}</span></div>
                                <div class="spec-box"><span class="spec-label">Växellåda</span><span>${car.transmission || car.gearbox}</span></div>
                                <div class="spec-box"><span class="spec-label">Drivning</span><span>${car.drive || '-'}</span></div>
                                <div class="spec-box"><span class="spec-label">Hästkrafter</span><span>${car.hp || '-'} hk</span></div>
                                <div class="spec-box"><span class="spec-label">Årsskatt</span><span>${car.tax || '-'} kr</span></div>
                                <div class="spec-box"><span class="spec-label">Antal ägare</span><span>${car.owners || '-'} st</span></div>
                                <div class="spec-item spec-box"><span class="spec-label">Färg</span><span>${car.color || '-'}</span></div>
                                <div class="spec-item spec-box"><span class="spec-label">Besiktigad</span><span>${car.besiktning || '-'}</span></div>
                                <div class="spec-item spec-box"><span class="spec-label">Säten</span><span>${car.seats || '-'}</span></div>
                            </div>

                            <div style="margin-top:35px;">
                                <h4 style="text-transform:uppercase; font-size:11px; color:#94a3b8; margin-bottom:15px; font-weight:900;">Utrustning & Säkerhet</h4>
                                <div class="feature-tags">
                                    ${(car.features || []).map(f => `<span class="tag">${f}</span>`).join('')}
                                </div>
                            </div>
                        </div>

                        <div class="info-card">
                            <h3 style="margin-bottom:20px; font-weight:900;">Beskrivning</h3>
                            <p style="white-space: pre-wrap; line-height:1.8; color:#334155;">${car.description}</p>
                        </div>
                    </div>

                    <div class="content-right">
                        <div class="info-card" style="text-align:center; position:sticky; top:100px; background:var(--dark); color:white;">
                            <i class="fa-solid fa-shield-check" style="font-size:45px; color:var(--primary); margin-bottom:20px;"></i>
                            <h3 style="margin-bottom:10px;">Gör en trygg affär</h3>
                            <p style="font-size:13px; color:#94a3b8;">Vi rekommenderar att alltid granska serviceboken och mätarställningen.</p>
                            <button onclick="location.href='messages.html?sellerId=${car.sellerId}&carId=${carId}'" style="width:100%; margin-top:25px; padding:18px; border-radius:15px; border:none; background:var(--primary); color:white; font-weight:900; cursor:pointer;">
                                INTRESSEANMÄLAN
                            </button>
                        </div>
                    </div>
                </div>

                <div class="safety-footer">
                    <div class="safety-box">
                        <h4><i class="fa-solid fa-circle-exclamation"></i> Säker affär</h4>
                        <p style="font-size:14px; margin-top:10px;">Kontrollera alltid fordonets historik, servicebok och mätarställning innan köp.</p>
                    </div>
                    <p class="disclaimer">
                        <strong>Ansvarsfriskrivning:</strong> BILHK är en öppen plattform. Vi granskar inte fordonens faktiska skick. All handel sker på användarens eget ansvar.
                    </p>
                </div>
            `;

            await refreshFavoriteState();

            // تفعيل نظام ملء الشاشة مع الأسهم والتحريك
            const lightbox = new PhotoSwipeLightbox({
                gallery: '#mainGallery',
                children: 'a',
                pswpModule: () => import('https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.esm.min.js'),
                // تفعيل ميزات التنقل
                arrowPrev: true,
                arrowNext: true,
                zoom: true,
                close: true,
                counter: true
            });
            lightbox.init();

        } catch (e) { app.innerHTML = "Error: " + e.message; }
    }

    init();
</script>
</body>
</html>

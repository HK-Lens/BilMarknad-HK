<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Detaljer | BILHK Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--dark); margin: 0; }
        header { background: white; padding: 15px 6%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1.6fr 1fr; gap: 30px; }
        .gallery-card { background: white; border-radius: 28px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .main-img { width: 100%; height: 480px; object-fit: contain; background: #000; }
        .thumb-strip { display: flex; gap: 10px; padding: 15px; overflow-x: auto; }
        .thumb-strip img { width: 100px; height: 70px; object-fit: cover; border-radius: 12px; cursor: pointer; border: 3px solid transparent; }
        .thumb-strip img.active { border-color: var(--primary); }
        .price-card { background: white; padding: 35px; border-radius: 28px; border: 1px solid var(--border); box-shadow: 0 15px 40px rgba(0,0,0,0.05); position: sticky; top: 20px; }
        .price-val { font-size: 42px; font-weight: 900; color: var(--primary); }
        .btn-main { width: 100%; padding: 18px; border-radius: 18px; border: none; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; font-size: 16px; transition: 0.3s; }
        .btn-contact { background: var(--dark); color: white; }
        .btn-contact:disabled { background: #cbd5e1; cursor: not-allowed; }
        .btn-fav { background: transparent; border: 2px solid var(--border); }
        .btn-fav.active { color: var(--primary); border-color: var(--primary); background: #fff7ed; }
        .specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 25px 0; }
        .spec-box { background: #f1f5f9; padding: 15px; border-radius: 15px; text-align: center; }
    </style>
</head>
<body>
<header>
    <a href="index.html" style="text-decoration:none; font-size:24px; font-weight:900; color:var(--dark);">BIL<span style="color:var(--primary);">HK</span></a>
</header>
<div class="container">
    <div>
        <div class="gallery-card">
            <img id="activeImg" src="placeholder.jpg" class="main-img">
            <div id="thumbList" class="thumb-strip"></div>
        </div>
        <div style="background:white; padding:40px; border-radius:28px; margin-top:30px; border:1px solid var(--border);">
            <h2 style="font-weight:900; margin-bottom:15px;">Beskrivning</h2>
            <p id="carDesc" style="white-space:pre-line; color:#475569; line-height:1.7;"></p>
        </div>
    </div>
    <div class="sidebar">
        <div class="price-card">
            <div id="carPrice" class="price-val">0 kr</div>
            <h1 id="carTitle" style="font-size:24px; font-weight:800; margin:10px 0 25px 0;">Laddar...</h1>
            <div class="specs-grid">
                <div class="spec-box"><span>År</span><br><strong id="sYear">-</strong></div>
                <div class="spec-box"><span>Mil</span><br><strong id="sMil">-</strong></div>
            </div>
            <button id="chatBtn" class="btn-main btn-contact"><i class="fa-solid fa-paper-plane"></i> Kontakta Säljaren</button>
            <button id="favBtn" class="btn-main btn-fav"><i class="fa-regular fa-heart" id="fIcon"></i> <span id="fText">Spara</span></button>
            <div style="background:#fff7ed; padding:15px; border-radius:15px; font-size:12px; color:#9a3412; border:1px solid #ffedd5;"><strong>Säkerhet:</strong> Ingen betalning sker via hemsidan.</div>
        </div>
    </div>
</div>
<script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, getDoc, setDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const carId = new URLSearchParams(window.location.search).get('id');
    let carData = null;

    async function loadCar() {
        if (!carId) return;
        const snap = await getDoc(doc(db, "cars", carId));
        if (snap.exists()) {
            carData = snap.data();
            document.getElementById('carTitle').innerText = `${carData.brand} ${carData.model}`;
            document.getElementById('carPrice').innerText = `${Number(carData.price).toLocaleString()} kr`;
            document.getElementById('sYear').innerText = carData.year;
            document.getElementById('sMil').innerText = carData.mileage;
            document.getElementById('carDesc').innerText = carData.description;
            
            if (carData.images?.length > 0) {
                const main = document.getElementById('activeImg');
                const list = document.getElementById('thumbList');
                main.src = carData.images[0];
                carData.images.forEach((url, i) => {
                    const img = document.createElement('img'); img.src = url;
                    if (i === 0) img.classList.add('active');
                    img.onclick = () => { main.src = url; document.querySelectorAll('.thumb-strip img').forEach(t=>t.classList.remove('active')); img.classList.add('active'); };
                    list.appendChild(img);
                });
            }
            checkFav();
        }
    }

    async function checkFav() {
        if (!auth.currentUser) return;
        const snap = await getDoc(doc(db, "favorites", `${auth.currentUser.uid}_${carId}`));
        if (snap.exists()) { document.getElementById('fIcon').className = 'fa-solid fa-heart'; document.getElementById('favBtn').classList.add('active'); }
    }

    document.getElementById('favBtn').onclick = async () => {
        if (!auth.currentUser) return Swal.fire('Info', 'Logga in först', 'info');
        const ref = doc(db, "favorites", `${auth.currentUser.uid}_${carId}`);
        const snap = await getDoc(ref);
        if (snap.exists()) { 
            await deleteDoc(ref); 
            location.reload(); 
        } else { 
            await setDoc(ref, { userId: auth.currentUser.uid, carId, carName: carData.brand, price: carData.price, image: carData.images?.[0] || '' }); 
            location.reload(); 
        }
    };

    document.getElementById('chatBtn').onclick = async () => {
        if (!auth.currentUser) return Swal.fire('Info', 'Logga in först', 'info');
        const btn = document.getElementById('chatBtn');
        btn.disabled = true;

        try {
            const roomId = [auth.currentUser.uid, carData.sellerId].sort().join('_') + '_' + carId;
            await setDoc(doc(db, "chats", roomId), { 
                carId, 
                carName: carData.brand, 
                participants: [auth.currentUser.uid, carData.sellerId], 
                updatedAt: serverTimestamp() 
            }, { merge: true });
            
            window.location.href = "messages.html";
        } catch (error) {
            console.error(error);
            Swal.fire('Fel', 'Systemet nekade åtkomst: ' + error.message, 'error');
            btn.disabled = false;
        }
    };

    onAuthStateChanged(auth, () => loadCar());
</script>
</body>
</html>

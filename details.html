<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fordonsdetaljer | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); padding-bottom: 50px; color: var(--dark); }
        
        header { background: white; padding: 15px 6%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { text-decoration: none; font-size: 24px; font-weight: 900; color: var(--dark); }
        .logo span { color: var(--primary); }

        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 900px) { .container { grid-template-columns: 1.6fr 1fr; } }

        .main-card { background: white; border-radius: 24px; overflow: hidden; border: 1px solid var(--border); }
        .main-img { width: 100%; height: 450px; object-fit: contain; background: #000; }
        
        .content-padding { padding: 30px; }
        .description { white-space: pre-line; color: #475569; line-height: 1.7; margin-top: 15px; }

        .sidebar-card { background: white; padding: 25px; border-radius: 24px; border: 1px solid var(--border); position: sticky; top: 20px; }
        .price { font-size: 32px; font-weight: 900; color: var(--primary); margin: 15px 0; }
        
        .spec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .spec-box { background: #f8fafc; padding: 12px; border-radius: 12px; border: 1px solid var(--border); font-size: 14px; }

        .btn-action { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 16px; transition: 0.3s; margin-bottom: 12px; }
        .btn-msg { background: var(--dark); color: white; }
        .btn-msg:hover { opacity: 0.9; }
        
        .btn-fav { background: white; border: 2px solid var(--border); color: #64748b; }
        .btn-fav.active { color: var(--primary); border-color: var(--primary); background: #fff7ed; }
        
        .back-btn { background: none; border: none; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 5px; color: var(--dark); }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <button onclick="history.back()" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Tillbaka</button>
</header>

<div class="container">
    <div class="main-card">
        <img id="activeImg" src="" class="main-img" alt="Bilbild">
        <div class="content-padding">
            <h2 style="font-weight:900;">Beskrivning</h2>
            <p id="carDesc" class="description">Laddar beskrivning...</p>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-card">
            <h1 id="carTitle" style="font-size:26px; font-weight:900;">Laddar...</h1>
            <div id="carPrice" class="price">0 kr</div>
            
            <div class="spec-grid">
                <div class="spec-box"><strong>Årsmodell:</strong> <span id="specYear">-</span></div>
                <div class="spec-box"><strong>Miltal:</strong> <span id="specMil">-</span></div>
            </div>

            <button id="chatBtn" class="btn-action btn-msg">
                <i class="fa-solid fa-comment-dots"></i> Kontakta Säljaren
            </button>
            
            <button id="favBtn" class="btn-action btn-fav">
                <i class="fa-regular fa-heart" id="fIcon"></i> <span id="fText">Spara</span>
            </button>
        </div>
    </div>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 1. استخراج معرف السيارة من الرابط
    const carId = new URLSearchParams(window.location.search).get('id');
    let carData = null;

    // 2. وظيفة تحميل بيانات السيارة
    async function loadCarDetails() {
        if (!carId) return;
        try {
            const carDoc = await getDoc(doc(db, "cars", carId));
            if (carDoc.exists()) {
                carData = carDoc.data();
                
                // ملء البيانات في الصفحة
                document.title = `${carData.brand} ${carData.model} | BILHK`;
                document.getElementById('carTitle').innerText = `${carData.brand} ${carData.model}`;
                document.getElementById('carPrice').innerText = `${Number(carData.price).toLocaleString()} kr`;
                document.getElementById('carDesc').innerText = carData.description || "Ingen beskrivning tillgänglig.";
                document.getElementById('activeImg').src = carData.images?.[0] || "";
                document.getElementById('specYear').innerText = carData.year || "-";
                document.getElementById('specMil').innerText = carData.mileage || "-";
                
                // التحقق من حالة الإعجاب إذا كان المستخدم مسجلاً
                if (auth.currentUser) {
                    checkFavStatus();
                }
            } else {
                Swal.fire('Fel', 'Annonsen hittades inte.', 'error');
            }
        } catch (error) {
            console.error("Error loading car:", error);
        }
    }

    // 3. وظيفة التحقق من حالة الإعجاب (Favorites)
    async function checkFavStatus() {
        if (!auth.currentUser || !carId) return;
        const favRef = doc(db, "favorites", `${auth.currentUser.uid}_${carId}`);
        const snap = await getDoc(favRef);
        
        if (snap.exists()) {
            document.getElementById('fIcon').className = 'fa-solid fa-heart';
            document.getElementById('favBtn').classList.add('active');
            document.getElementById('fText').innerText = "Sparad";
        }
    }

    // 4. منطق زر الإعجاب (إضافة/حذف)
    document.getElementById('favBtn').onclick = async () => {
        if (!auth.currentUser) return Swal.fire('Info', 'Logga in för att spara annonser.', 'info');
        
        const favRef = doc(db, "favorites", `${auth.currentUser.uid}_${carId}`);
        const snap = await getDoc(favRef);
        
        try {
            if (snap.exists()) {
                await deleteDoc(favRef);
                document.getElementById('fIcon').className = 'fa-regular fa-heart';
                document.getElementById('favBtn').classList.remove('active');
                document.getElementById('fText').innerText = "Spara";
            } else {
                await setDoc(favRef, {
                    userId: auth.currentUser.uid,
                    carId: carId,
                    brand: carData.brand,
                    model: carData.model,
                    price: carData.price,
                    image: carData.images[0],
                    savedAt: new Date()
                });
                document.getElementById('fIcon').className = 'fa-solid fa-heart';
                document.getElementById('favBtn').classList.add('active');
                document.getElementById('fText').innerText = "Sparad";
            }
        } catch (error) {
            console.error("Error toggling favorite:", error);
        }
    };

    // 5. منطق زر المراسلة (التوجيه فقط)
    document.getElementById('chatBtn').onclick = () => {
        if (!auth.currentUser) return window.location.href = "login.html";
        
        // منع المستخدم من مراسلة نفسه
        if (auth.currentUser.uid === carData.sellerId) {
            return Swal.fire('Info', 'Detta är din egen annons.', 'info');
        }

        const carName = `${carData.brand} ${carData.model}`;
        // التوجيه لصفحة الرسائل مع تمرير المعلمات اللازمة
        window.location.href = `messages.html?seller=${carData.sellerId}&carId=${carId}&name=${encodeURIComponent(carName)}`;
    };

    // 6. تشغيل الوظائف عند تغير حالة المستخدم
    onAuthStateChanged(auth, (user) => {
        loadCarDetails();
    });

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detaljer | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        img { width: 100%; border-radius: 15px; height: 400px; object-fit: cover; }
        .price { font-size: 32px; color: #2563eb; font-weight: 800; margin: 20px 0; }
        .spec-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .spec-item { background: #f1f5f9; padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>
<div class="container" id="content">Laddar...</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import firebaseConfig from './firebase-config.js';
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const id = new URLSearchParams(window.location.search).get('id');
    async function load() {
        const snap = await getDoc(doc(db, "cars", id));
        if(snap.exists()) {
            const c = snap.data();
            document.getElementById('content').innerHTML = `
                <a href="index.html">← Tillbaka</a>
                <img src="${c.images?.[0] || ''}">
                <h1>${c.brand}</h1>
                <div class="price">${Number(c.price).toLocaleString()} kr</div>
                <div class="spec-box">
                    <div class="spec-item"><b>Modellår:</b> ${c.year || '-'}</div>
                    <div class="spec-item"><b>Miltal:</b> ${c.mileage || 0} mil</div>
                    <div class="spec-item"><b>RegNr:</b> ${c.regNr || '-'}</div>
                </div>
            `;
        }
    }
    load();
</script>
</body>
</html>

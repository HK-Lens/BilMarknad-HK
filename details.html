<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fordonsdetaljer | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; --reg-blue: #005599; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); margin: 0; }
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        
        /* لوحة رقم السيارة السويدية */
        .reg-plate { 
            display: inline-flex; align-items: center; background: white; 
            border: 2px solid #333; border-radius: 6px; padding: 2px 10px; 
            font-weight: 800; font-size: 22px; letter-spacing: 2px; 
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px;
        }
        .reg-plate .eu-symbol { 
            background: var(--reg-blue); color: white; font-size: 10px; 
            padding: 5px 3px; margin-right: 8px; border-radius: 2px; 
            display: flex; flex-direction: column; align-items: center;
        }

        .image-gallery { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; height: 450px; margin-bottom: 30px; border-radius: 24px; overflow: hidden; }
        .main-img { width: 100%; height: 100%; object-fit: cover; }
        .side-imgs { display: grid; grid-template-rows: 1fr 1fr; gap: 12px; }
        .side-img { width: 100%; height: 100%; object-fit: cover; }

        .content-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        .card { background: white; padding: 30px; border-radius: 24px; border: 1px solid var(--border); margin-bottom: 25px; }

        .price-big { font-size: 40px; font-weight: 900; color: var(--primary); margin: 10px 0; }
        
        .specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .spec-row { display: flex; justify-content: space-between; padding: 12px; background: #f1f5f9; border-radius: 12px; font-size: 14px; font-weight: 700; }
        .spec-label { color: #64748b; font-weight: 500; }

        .tech-tag { padding: 10px 18px; background: #fff5eb; color: var(--primary); border: 1px solid #fbd38d; border-radius: 50px; font-size: 12px; font-weight: 800; }
        .btn-contact { width: 100%; padding: 20px; background: var(--dark); color: white; border: none; border-radius: 20px; font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .btn-contact:hover { background: var(--primary); transform: translateY(-3px); }

        @media (max-width: 800px) { .image-gallery { grid-template-columns: 1fr; height: 300px; } .side-imgs { display: none; } .content-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container" id="detailsWrapper"></div>

<script type="module">
    import { db, auth } from './firebase-config.js';
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const carId = new URLSearchParams(window.location.search).get('id');
    const wrapper = document.getElementById('detailsWrapper');

    async function fetchAllData() {
        if (!carId) return;
        const snap = await getDoc(doc(db, "cars", carId));
        if (!snap.exists()) return;
        const car = snap.data();

        wrapper.innerHTML = `
            <div class="image-gallery">
                <img src="${car.images[0]}" class="main-img">
                <div class="side-imgs">
                    <img src="${car.images[1] || car.images[0]}" class="side-img">
                    <img src="${car.images[2] || car.images[0]}" class="side-img">
                </div>
            </div>

            <div class="content-grid">
                <div class="left">
                    <div class="card">
                        <div class="reg-plate">
                            <div class="eu-symbol"><span>S</span></div>
                            ${(car.regNo || '--- ---').toUpperCase()}
                        </div>
                        
                        <h1 style="font-size:36px; font-weight:900;">${car.brand} ${car.model}</h1>
                        <p style="color:#64748b; font-weight:700;">Modellår ${car.year} • ${car.mileage} mil</p>
                        <div class="price-big">${Number(car.price).toLocaleString()} kr</div>

                        <h4 style="margin: 30px 0 15px; text-transform:uppercase; font-size:12px; color:#94a3b8;">Teknisk Data</h4>
                        <div class="specs-grid">
                            <div class="spec-row"><span class="spec-label">Drivmedel</span><span>${car.fuel}</span></div>
                            <div class="spec-row"><span class="spec-label">Växellåda</span><span>${car.gearbox || car.transmission}</span></div>
                            <div class="spec-row"><span class="spec-label">Effekt</span><span>${car.hp || '-'} hk</span></div>
                            <div class="spec-row"><span class="spec-label">Drivning</span><span>${car.drive || '-'}</span></div>
                            <div class="spec-row"><span class="spec-label">Besiktigad</span><span>${car.besiktning || '-'}</span></div>
                            <div class="spec-row"><span class="spec-label">Årsskatt</span><span>${car.tax || '-'} kr</span></div>
                            <div class="spec-row"><span class="spec-label">Ägare</span><span>${car.owners || '-'} st</span></div>
                            <div class="spec-row"><span class="spec-label">Färg</span><span>${car.color || '-'}</span></div>
                        </div>

                        <h4 style="margin: 30px 0 15px; text-transform:uppercase; font-size:12px; color:#94a3b8;">Utrustning</h4>
                        <div style="display:flex; flex-wrap:wrap; gap:10px;">
                            ${(car.features || []).map(f => `<span class="tech-tag">${f}</span>`).join('')}
                        </div>
                    </div>

                    <div class="card">
                        <h3 style="margin-bottom:15px;">Beskrivning</h3>
                        <p style="white-space: pre-wrap; line-height:1.7;">${car.description}</p>
                    </div>
                </div>

                <div class="right">
                    <div class="card" style="position:sticky; top:100px; text-align:center;">
                        <i class="fa-solid fa-user-tie" style="font-size:50px; color:var(--primary); margin-bottom:15px;"></i>
                        <h2 style="margin-bottom:20px;">Intresserad?</h2>
                        <button class="btn-contact" onclick="window.location.href='messages.html?sellerId=${car.sellerId}&carId=${carId}'">
                            <i class="fa-solid fa-envelope"></i> Kontakta Säljaren
                        </button>
                    </div>
                </div>
            </div>
        `;
    }
    fetchAllData();
</script>
</body>
</html>

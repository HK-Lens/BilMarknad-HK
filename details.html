<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Fordonsdetaljer | BILHK</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root{--primary:#f58220;--primary-hover:#e07210;--dark:#0f172a;--bg:#f8fafc;--border:#e2e8f0;--white:#fff;--muted:#64748b;--danger:#ef4444;--success:#10b981}
    *{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif}body{background:var(--bg);color:var(--dark);min-height:100vh;display:flex;flex-direction:column}a{text-decoration:none;color:inherit}
    header{background:var(--white);border-bottom:1px solid var(--border);padding:15px 5%;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:30}.logo{font-size:26px;font-weight:900}.logo span{color:var(--primary)}.nav{display:flex;gap:16px;align-items:center}.nav a{font-size:14px;font-weight:800}.sell{background:var(--primary);color:white!important;border-radius:999px;padding:9px 18px}
    .wrap{max-width:1200px;margin:38px auto;padding:0 20px;width:100%;display:grid;grid-template-columns:2fr 1fr;gap:28px;flex:1}.card{background:var(--white);border:1px solid var(--border);border-radius:24px;padding:28px;box-shadow:0 10px 30px rgba(15,23,42,.03);margin-bottom:22px}.gallery{background:white;border:1px solid var(--border);border-radius:24px;overflow:hidden;margin-bottom:22px}.main-img{width:100%;height:460px;object-fit:cover;background:#e5e7eb}.thumbs{display:flex;gap:10px;padding:14px;overflow:auto;background:var(--bg)}.thumb{width:90px;height:65px;object-fit:cover;border-radius:10px;border:2px solid transparent;cursor:pointer}.thumb.active{border-color:var(--primary)}.head{display:flex;justify-content:space-between;gap:18px;margin-bottom:22px}.title{font-size:30px;font-weight:900}.price{font-size:28px;font-weight:900;color:var(--primary)}.save{border:1px solid var(--border);background:var(--bg);border-radius:12px;padding:11px 16px;font-weight:900;cursor:pointer}.save.saved{background:#fee2e2;border-color:#fecaca;color:var(--danger)}.sold{display:inline-block;background:var(--danger);color:white;font-weight:900;font-size:12px;padding:6px 10px;border-radius:8px;margin-left:8px}.specs{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:12px}.spec{background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center}.spec i{color:var(--muted);margin-bottom:6px}.spec span{display:block;font-size:10px;text-transform:uppercase;color:var(--muted);font-weight:900}.spec strong{display:block;margin-top:4px;font-size:13px}.section-title{font-size:18px;font-weight:900;margin:26px 0 12px;border-bottom:1px solid var(--border);padding-bottom:10px}.desc{white-space:pre-wrap;color:#334155;line-height:1.7;font-size:15px}.features{display:flex;flex-wrap:wrap;gap:9px}.tag{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:8px 11px;font-size:13px;font-weight:800}.seller-card{position:sticky;top:88px}.seller-top{display:flex;gap:14px;align-items:center;border-bottom:1px solid var(--border);padding-bottom:18px;margin-bottom:18px}.avatar{width:58px;height:58px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:22px;object-fit:cover}.seller-name{font-size:18px;font-weight:900}.seller-type{font-size:12px;color:var(--muted);font-weight:800}.info-row{display:flex;gap:9px;align-items:flex-start;margin:10px 0;color:#475569;font-size:14px;font-weight:700}.info-row i{width:20px;color:var(--primary)}.msg{width:100%;min-height:120px;border:1px solid var(--border);border-radius:14px;background:var(--bg);padding:14px;resize:vertical;outline:none;margin:16px 0}.btn{border:none;border-radius:13px;padding:14px 18px;font-weight:900;cursor:pointer;display:flex;gap:8px;align-items:center;justify-content:center;width:100%}.btn-primary{background:var(--primary);color:white}.btn-dark{background:var(--dark);color:white}.btn-light{background:var(--bg);border:1px solid var(--border);color:var(--dark)}footer{background:var(--white);border-top:1px solid var(--border);padding:34px 20px;text-align:center;color:#94a3b8;font-size:13px;margin-top:auto}.footer-links{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}.footer-links a{font-weight:900;color:var(--muted)}.footer-links a:hover{color:var(--primary)}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.main-img{height:330px}.head{flex-direction:column}.seller-card{position:static}}
  </style>
</head>
<body>
<header><a href="index.html" class="logo">BIL<span>HK</span></a><div class="nav"><a href="index.html">Hem</a><a href="sell.html" class="sell">Sälj din bil</a><span id="authLink"></span></div></header>
<main class="wrap" id="app"><div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--muted);font-weight:800"><i class="fa-solid fa-spinner fa-spin"></i> Laddar annons...</div></main>
<footer><div class="footer-links"><a href="terms.html">Användarvillkor</a><a href="terms.html#disclaimer">Ansvarsfriskrivning</a></div><div>BILHK är en annonsplattform. Vi ansvarar inte för annonser, affärer, betalningar eller tvister mellan användare.</div></footer>
<script type="module">
import { auth, db } from './firebase-config.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { doc, getDoc, updateDoc, increment, serverTimestamp, setDoc, arrayUnion, arrayRemove, addDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
const carId=new URLSearchParams(location.search).get('id');let currentUser=null,car=null,seller=null,isSaved=false;
const esc=v=>String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));const money=v=>Number(v||0).toLocaleString('sv-SE');const sellerDisplayName=()=>seller?.companyName||seller?.name||seller?.displayName||'Säljare';
onAuthStateChanged(auth,async user=>{currentUser=user;document.getElementById('authLink').innerHTML=user?'<a href="dashboard.html">Mitt Konto</a>':'<a href="login.html">Logga in</a>';await loadAd();});
async function loadAd(){if(!carId){document.getElementById('app').innerHTML='<h2>Annons saknas.</h2>';return}const ref=doc(db,'cars',carId);const snap=await getDoc(ref);if(!snap.exists()){document.getElementById('app').innerHTML='<h2 style="grid-column:1/-1;text-align:center">Annonsen hittades inte.</h2>';return}car=snap.data();const isOwner=currentUser&&currentUser.uid===car.sellerId;if(!isOwner)try{await updateDoc(ref,{views:increment(1)})}catch(e){}const sSnap=await getDoc(doc(db,'users',car.sellerId));seller=sSnap.exists()?sSnap.data():{};if(currentUser){const u=await getDoc(doc(db,'users',currentUser.uid));isSaved=!!(u.exists()&&(u.data().savedCars||[]).includes(carId));}render(isOwner)}
function render(isOwner){const imgs=Array.isArray(car.images)&&car.images.length?car.images:['placeholder.jpg'];const thumbs=imgs.map((u,i)=>`<img class="thumb ${i===0?'active':''}" src="${esc(u)}" onclick="changeImg('${esc(u)}',this)">`).join('');const features=(car.features||[]).map(f=>`<span class="tag"><i class="fa-solid fa-check" style="color:var(--primary)"></i> ${esc(f)}</span>`).join('')||'<span style="color:var(--muted);font-weight:700">Ingen utrustning angiven.</span>';const sold=car.status==='sold';document.getElementById('app').innerHTML=`
<div><div class="gallery"><img id="mainImage" class="main-img" src="${esc(imgs[0])}"><div class="thumbs">${thumbs}</div></div><div class="card"><div class="head"><div><h1 class="title">${esc(car.brand)} ${esc(car.model)} ${sold?'<span class="sold">SÅLD</span>':''}</h1><div class="price">${money(car.price)} kr</div></div><button id="saveBtn" class="save ${isSaved?'saved':''}"><i class="${isSaved?'fa-solid':'fa-regular'} fa-heart"></i> ${isSaved?'Sparad':'Spara'}</button></div><div class="specs"><div class="spec"><i class="fa-regular fa-calendar"></i><span>Årsmodell</span><strong>${esc(car.year)}</strong></div><div class="spec"><i class="fa-solid fa-gauge"></i><span>Miltal</span><strong>${esc(car.mileage||car.mil||'-')} mil</strong></div><div class="spec"><i class="fa-solid fa-gas-pump"></i><span>Drivmedel</span><strong>${esc(car.fuel||car.fuelType||'-')}</strong></div><div class="spec"><i class="fa-solid fa-gear"></i><span>Växellåda</span><strong>${esc(car.gear||car.transmission||'-')}</strong></div><div class="spec"><i class="fa-solid fa-car-side"></i><span>Karosseri</span><strong>${esc(car.karosseri||car.body||car.carType||'-')}</strong></div><div class="spec"><i class="fa-solid fa-palette"></i><span>Färg</span><strong>${esc(car.color||'-')}</strong></div></div><h3 class="section-title">Beskrivning</h3><div class="desc">${esc(car.description||'Ingen beskrivning angiven.')}</div><h3 class="section-title">Utrustning</h3><div class="features">${features}</div><h3 class="section-title">Säljare</h3><div class="seller-top" style="border:0;margin:0;padding:0"><img class="avatar" src="${esc(seller.logoUrl||'')}" onerror="this.outerHTML='<div class=&quot;avatar&quot;>${esc(sellerDisplayName()[0]||'S')}</div>'"><div><div class="seller-name">${esc(sellerDisplayName())}</div><div class="seller-type">${seller.userType==='business'?'Företag':'Privatperson'}</div></div></div></div></div>
<aside><div class="card seller-card"><div class="seller-top"><img class="avatar" src="${esc(seller.logoUrl||'')}" onerror="this.outerHTML='<div class=&quot;avatar&quot;>${esc(sellerDisplayName()[0]||'S')}</div>'"><div><div class="seller-name">${esc(sellerDisplayName())}</div><div class="seller-type">${seller.userType==='business'?'Företag':'Privatperson'}</div></div></div><div id="sellerInfo"></div>${seller.publicProfileEnabled?`<button class="btn btn-light" onclick="location.href='seller.html?id=${esc(car.sellerId)}'"><i class="fa-solid fa-store"></i> Visa säljarens sida</button>`:''}${isOwner?`<button class="btn btn-dark" style="margin-top:10px" onclick="location.href='edit-car.html?id=${carId}'"><i class="fa-solid fa-pen"></i> Redigera annons</button><button class="btn btn-primary" style="margin-top:10px" onclick="location.href='dashboard.html'"><i class="fa-solid fa-chart-line"></i> Dashboard</button>`:`<textarea id="msgBody" class="msg" placeholder="Hej! Finns bilen kvar?"></textarea><button id="sendMsg" class="btn btn-primary"><i class="fa-solid fa-paper-plane"></i> Skicka meddelande</button>`}</div></aside>`;renderSellerInfo();document.getElementById('saveBtn').onclick=toggleSave;const btn=document.getElementById('sendMsg');if(btn)btn.onclick=sendMessage;}
function renderSellerInfo(){const rows=[];if(seller.publicPhone&&seller.phone)rows.push(`<div class="info-row"><i class="fa-solid fa-phone"></i><span>${esc(seller.phone)}</span></div>`);if(seller.publicEmail&&(seller.contactEmail||seller.email))rows.push(`<div class="info-row"><i class="fa-solid fa-envelope"></i><span>${esc(seller.contactEmail||seller.email)}</span></div>`);if(seller.publicWebsite&&seller.website)rows.push(`<div class="info-row"><i class="fa-solid fa-globe"></i><a href="${esc(seller.website)}" target="_blank" rel="noopener">${esc(seller.website)}</a></div>`);if(seller.publicAddress&&seller.address)rows.push(`<div class="info-row"><i class="fa-solid fa-location-dot"></i><span>${esc(seller.address)}</span></div>`);document.getElementById('sellerInfo').innerHTML=rows.join('')||'<p style="color:var(--muted);font-size:13px;font-weight:700;margin-bottom:15px">Säljaren har inte valt att visa kontaktuppgifter offentligt.</p>'}
window.changeImg=(url,el)=>{document.getElementById('mainImage').src=url;document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('active'));el.classList.add('active')};
async function toggleSave(){if(!currentUser){Swal.fire({title:'Logga in krävs',text:'Du måste logga in för att spara annonser.',icon:'info'}).then(()=>location.href='login.html');return}const uRef=doc(db,'users',currentUser.uid);const cRef=doc(db,'cars',carId);try{if(isSaved){await setDoc(uRef,{savedCars:arrayRemove(carId),lastActiveAt:serverTimestamp()},{merge:true});try{await updateDoc(cRef,{saves:increment(-1)})}catch(e){}isSaved=false}else{await setDoc(uRef,{savedCars:arrayUnion(carId),lastActiveAt:serverTimestamp()},{merge:true});try{await updateDoc(cRef,{saves:increment(1)})}catch(e){}isSaved=true}render(currentUser&&currentUser.uid===car.sellerId)}catch(e){console.error(e);Swal.fire('Fel','Kunde inte uppdatera favoriter. Kontrollera Firestore Rules.','error')}}
async function sendMessage(){if(!currentUser){Swal.fire({title:'Logga in krävs',text:'Du måste logga in för att skicka meddelande.',icon:'warning'}).then(()=>location.href='login.html');return}if(currentUser.uid===car.sellerId)return;const text=document.getElementById('msgBody').value.trim();if(!text){Swal.fire('Tomt','Skriv ett meddelande först.','warning');return}const meSnap=await getDoc(doc(db,'users',currentUser.uid));const me=meSnap.exists()?meSnap.data():{};const buyerName=me.companyName||me.name||me.displayName||'Användare';const sellerName=sellerDisplayName();const chatQ=query(collection(db,'chats'),where('carId','==',carId),where('participants','array-contains',currentUser.uid));const found=await getDocs(chatQ);let chatId=null;found.forEach(d=>{const p=d.data().participants||[];if(p.includes(car.sellerId))chatId=d.id});if(!chatId){const newChat=await addDoc(collection(db,'chats'),{carId,carTitle:`${car.brand||''} ${car.model||''}`.trim(),carImage:car.images?.[0]||'placeholder.jpg',participants:[currentUser.uid,car.sellerId],hiddenFor:[],users:[{id:currentUser.uid,name:buyerName,logoUrl:me.logoUrl||''},{id:car.sellerId,name:sellerName,logoUrl:seller.logoUrl||''}],lastMessage:text,updatedAt:serverTimestamp(),createdAt:serverTimestamp()});chatId=newChat.id}else{await updateDoc(doc(db,'chats',chatId),{lastMessage:text,updatedAt:serverTimestamp(),hiddenFor:[]})}await addDoc(collection(db,`chats/${chatId}/messages`),{text,senderId:currentUser.uid,senderName:buyerName,createdAt:serverTimestamp()});try{await updateDoc(doc(db,'cars',carId),{messagesCount:increment(1)})}catch(e){}Swal.fire('Skickat','Meddelandet har skickats.','success');document.getElementById('msgBody').value=''}
</script>
</body>
</html>

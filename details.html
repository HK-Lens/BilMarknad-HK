<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fordonsdetaljer | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); padding-bottom: 50px; }

        /* Header & Logo */
        header { background: white; padding: 15px 6%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { text-decoration: none; font-size: 22px; font-weight: 900; color: var(--dark); }
        .logo span { color: var(--primary); }

        .container { max-width: 1100px; margin: 20px auto; padding: 0 15px; display: grid; grid-template-columns: 1fr; gap: 30px; }
        @media (min-width: 850px) { .container { grid-template-columns: 1.7fr 1fr; } }

        /* Gallery */
        .main-image { width: 100%; height: 350px; object-fit: cover; border-radius: 24px; background: #eee; }
        @media (min-width: 600px) { .main-image { height: 450px; } }

        /* Content Cards */
        .card { background: white; padding: 25px; border-radius: 24px; border: 1px solid var(--border); margin-bottom: 25px; }
        .price-tag { font-size: 32px; font-weight: 900; color: var(--primary); margin-bottom: 10px; }
        .car-title { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; }
        
        .specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .spec-item { background: #f1f5f9; padding: 12px; border-radius: 12px; }
        .spec-item label { display: block; font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; }
        .spec-item span { font-weight: 700; font-size: 14px; }

        /* Contact Box */
        .contact-card { background: white; padding: 25px; border-radius: 24px; border: 1px solid var(--border); position: sticky; top: 100px; }
        .btn-action { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 800; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; transition: 0.2s; margin-bottom: 10px; }
        
        textarea { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); font-family: inherit; margin: 15px 0; outline: none; resize: none; background: #fcfcfc; }
        .nav-link { font-size: 13px; font-weight: 700; color: var(--dark); text-decoration: none; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <div id="navUser"><a href="login.html" class="nav-link">Logga in</a></div>
</header>

<div class="container" id="detailsWrapper">
    <div style="text-align: center; padding: 50px;">Laddar fordonsuppgifter...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const carId = new URLSearchParams(window.location.search).get('id');
    let currentUser = null;
    let carData = null;

    onAuthStateChanged(auth, user => {
        currentUser = user;
        if (user) {
            document.getElementById('navUser').innerHTML = `<a href="my-account.html" class="nav-link">Min Sida</a>`;
        }
        loadCar();
    });

    async function loadCar() {
        if (!carId) return;
        try {
            const snap = await getDoc(doc(db, "cars", carId));
            if (snap.exists()) {
                carData = snap.data();
                renderUI();
            } else {
                document.getElementById('detailsWrapper').innerHTML = "Bilen hittades inte.";
            }
        } catch (e) { console.error(e); }
    }

    function renderUI() {
        const wrapper = document.getElementById('detailsWrapper');
        
        // خيارات عرض الهاتف
        const phoneSect = (!carData.hidePhone && carData.phone) ? `
            <a href="tel:${carData.phone}" class="btn-action" style="background:#22c55e; color:white;">📞 Ring ${carData.phone}</a>
            <a href="https://wa.me/${carData.phone.replace(/\s+/g,'')}" class="btn-action" style="background:#25d366; color:white;">💬 WhatsApp</a>
        ` : `<p style="text-align:center; font-size:12px; color:#94a3b8; margin-bottom:15px;">Säljaren föredrar chatt</p>`;

        wrapper.innerHTML = `
            <div>
                <img src="${carData.images[0]}" class="main-image" onerror="this.src='https://via.placeholder.com/800x500'">
                
                <div class="card" style="margin-top:25px;">
                    <div class="price-tag">${Number(carData.price).toLocaleString()} kr</div>
                    <h1 class="car-title">${carData.brand} ${carData.model || ''}</h1>
                    
                    <div class="specs-grid">
                        <div class="spec-item"><label>Årsmodell</label><span>${carData.year}</span></div>
                        <div class="spec-item"><label>Miltal</label><span>${carData.mileage} mil</span></div>
                        <div class="spec-item"><label>Växellåda</label><span>${carData.transmission || 'Manuell'}</span></div>
                        <div class="spec-item"><label>Bränsle</label><span>${carData.fuelType}</span></div>
                    </div>

                    <h3 style="margin-bottom:10px; font-weight:900;">Beskrivning</h3>
                    <p style="line-height:1.7; color:#475569;">${carData.description || 'Ingen beskrivning.'}</p>
                </div>
            </div>

            <aside>
                <div class="contact-card">
                    <h3 style="margin-bottom:20px;">Intresserad?</h3>
                    ${phoneSect}
                    
                    <div style="margin-top:20px; border-top:1px solid #eee; padding-top:20px;">
                        <span style="font-size:11px; font-weight:800; color:#94a3b8; text-transform:uppercase;">Skicka meddelande</span>
                        <textarea id="initialMsg" rows="4" placeholder="Hej! Är bilen kvar?"></textarea>
                        <button onclick="startConversation()" id="sendBtn" class="btn-action" style="background:var(--dark); color:white;">Starta chatt</button>
                    </div>
                </div>
            </aside>
        `;
    }

    window.startConversation = async () => {
        if (!currentUser) {
            alert("Logga in först för att skicka meddelanden.");
            window.location.href = "login.html";
            return;
        }

        const msgText = document.getElementById('initialMsg').value.trim();
        if (!msgText) return alert("Skriv ett meddelande!");

        const btn = document.getElementById('sendBtn');
        btn.disabled = true;
        btn.innerText = "Skickar...";

        try {
            // إنشاء معرف غرفة فريد: buyer_seller_car
            const chatId = `${currentUser.uid}_${carData.sellerId}_${carId}`;

            await addDoc(collection(db, "messages"), {
                chatId: chatId,
                participants: [currentUser.uid, carData.sellerId], // الحقل الأساسي لعمل الصندوق
                carId: carId,
                carTitle: `${carData.brand} ${carData.model}`,
                carImage: carData.images[0],
                senderId: currentUser.uid,
                senderName: currentUser.displayName || currentUser.email.split('@')[0],
                recipientId: carData.sellerId,
                message: msgText,
                timestamp: serverTimestamp()
            });

            alert("Meddelande skickat! Du skickas nu till din inkorg.");
            window.location.href = "my-account.html?chat=" + chatId;
        } catch (e) {
            alert("Ett fel uppstod.");
            btn.disabled = false;
        }
    };
</script>
</body>
</html>

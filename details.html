<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bildetaljer | BilHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --white: #ffffff; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: #1e293b; }

        header { background: var(--white); padding: 1rem 6%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--dark); text-decoration: none; }
        .logo span { color: var(--primary); }
        .nav-links a { text-decoration: none; color: var(--dark); font-weight: 600; margin-left: 20px; }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }

        .car-image-box { background: var(--white); border-radius: 20px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .car-image-box img { width: 100%; height: 400px; object-fit: cover; display: block; }

        .car-info { background: var(--white); padding: 30px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.05); height: fit-content; }
        .car-price { font-size: 28px; font-weight: 900; color: var(--primary); margin-bottom: 10px; }
        .car-title { font-size: 24px; font-weight: 800; margin-bottom: 20px; color: var(--dark); }
        
        .specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .spec-item { background: var(--bg); padding: 15px; border-radius: 10px; font-size: 14px; font-weight: 600; text-align: center; color: #475569; }
        .spec-item span { display: block; font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; }

        .desc-box { background: var(--white); padding: 30px; border-radius: 20px; border: 1px solid var(--border); margin-top: 30px; grid-column: 1 / -1; line-height: 1.8; color: #334155; }
        
        .contact-btn { display: block; width: 100%; background: #25D366; color: white; border: none; padding: 18px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; text-align: center; }
        .contact-btn:hover { background: #1ebc5a; transform: translateY(-2px); }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <nav class="nav-links">
        <a href="index.html">← Tillbaka</a>
    </nav>
</header>

<div class="container" id="detailsContainer">
    <div style="grid-column: 1 / -1; text-align: center; padding: 50px;">
        <h2>Laddar bilinformation...</h2>
    </div>
</div>

<script type="module">
    import { db, auth } from './firebase-config.js';
    import { doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    let currentUser = null;
    let currentCarData = null;

    onAuthStateChanged(auth, (user) => {
        currentUser = user;
    });

    async function loadCarDetails() {
        // استخراج معرف السيارة من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const carId = urlParams.get('id');

        if (!carId) {
            document.getElementById('detailsContainer').innerHTML = "<h2 style='grid-column: 1/-1; text-align:center;'>Bilen hittades inte.</h2>";
            return;
        }

        try {
            const docRef = doc(db, "cars", carId);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                currentCarData = docSnap.data();
                renderCarUI(currentCarData);
            } else {
                document.getElementById('detailsContainer').innerHTML = "<h2 style='grid-column: 1/-1; text-align:center;'>Bilen har tagits bort.</h2>";
            }
        } catch (error) {
            console.error("Fel vid hämtning av bil:", error);
            document.getElementById('detailsContainer').innerHTML = "<h2 style='grid-column: 1/-1; text-align:center;'>Ett fel uppstod.</h2>";
        }
    }

    function renderCarUI(car) {
        const container = document.getElementById('detailsContainer');
        const defaultImage = "https://via.placeholder.com/800x400?text=Ingen+bild";
        const carImg = (car.images && car.images.length > 0) ? car.images[0] : defaultImage;

        container.innerHTML = `
            <div class="car-image-box">
                <img src="${carImg}" alt="${car.brand} ${car.model}">
            </div>
            
            <div class="car-info">
                <div class="car-price">${Number(car.price).toLocaleString()} kr</div>
                <div class="car-title">${car.brand} ${car.model}</div>
                
                <div class="specs-grid">
                    <div class="spec-item"><span>Årsmodell</span>${car.year || '-'}</div>
                    <div class="spec-item"><span>Miltal</span>${car.mileage || '-'} mil</div>
                    <div class="spec-item"><span>Drivmedel</span>${car.fuelType || '-'}</div>
                    <div class="spec-item"><span>Växellåda</span>${car.gearbox || 'Manuell/Automat'}</div>
                </div>

                <button class="contact-btn" id="contactSellerBtn">💬 Kontakta Säljaren</button>
            </div>

            <div class="desc-box">
                <h3 style="margin-bottom:15px; color:var(--dark);">Beskrivning</h3>
                <p style="white-space: pre-wrap;">${car.description || 'Ingen beskrivning tillgänglig.'}</p>
            </div>
        `;

        // ربط حدث الضغط بالزر
        document.getElementById('contactSellerBtn').onclick = handleContactSeller;
    }

    // الدالة الذكية المحدثة بدون السؤال (تتخطى خطأ الحماية)
    async function handleContactSeller() {
        if (!currentUser) {
            alert("Du måste logga in för att kontakta säljaren.");
            window.location.href = "login.html";
            return;
        }

        if (currentUser.uid === currentCarData.sellerId) {
            alert("Du kan inte skicka meddelande till din egen bil.");
            return;
        }

        try {
            // تغيير نص الزر أثناء التحميل
            const btn = document.getElementById('contactSellerBtn');
            btn.innerText = "Öppnar chatt...";
            btn.disabled = true;

            const sellerId = currentCarData.sellerId;
            const sellerName = currentCarData.sellerName || "Säljare";
            const carTitle = `${currentCarData.brand} ${currentCarData.model}`;
            
            // صناعة معرف الغرفة الموحد
            const roomId = [currentUser.uid, sellerId].sort().join('_') + '_' + carTitle.replace(/\\s+/g, '');
            const roomRef = doc(db, "chats", roomId);

            // 🚀 الحل السحري هنا: نستخدم setDoc مع merge:true
            // هذا الأمر يتخطى خطأ الحماية لأنه لا يحاول القراءة، بل يكتب مباشرة
            await setDoc(roomRef, {
                users: [currentUser.uid, sellerId],
                names: [currentUser.displayName || currentUser.email.split('@')[0], sellerName],
                carTitle: carTitle,
                lastMessage: "Ny konversation startad...",
                updatedAt: serverTimestamp()
            }, { merge: true });

            // التوجيه لنظام الدردشة الجديد بنجاح
            window.location.href = "messages.html";

        } catch (error) {
            console.error("Kontaktfel:", error);
            alert("Kunde inte starta chatt: " + error.message);
            
            // إعادة الزر لشكله الطبيعي في حال حدوث خطأ
            const btn = document.getElementById('contactSellerBtn');
            btn.innerText = "💬 Kontakta Säljaren";
            btn.disabled = false;
        }
    }

    // تشغيل الدالة عند فتح الصفحة
    loadCarDetails();
</script>
</body>
</html>

<script type="module">

import { auth, db } from './firebase-config.js';

import {
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

import {
doc,
getDoc,
collection,
query,
where,
getDocs,
addDoc,
updateDoc,
increment,
serverTimestamp,
arrayUnion,
arrayRemove,
setDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const urlParams = new URLSearchParams(window.location.search);

const carId = urlParams.get('id');

let currentUser = null;
let carData = null;
let sellerData = null;

onAuthStateChanged(auth, async(user)=>{

currentUser = user;

const authContainer =
document.getElementById('authStatusContainer');

if(user){

authContainer.innerHTML = `
<a href="dashboard.html"
style="
color:var(--primary);
font-weight:800;
text-decoration:none;
">
<i class="fa-solid fa-circle-user"></i>
Mitt Konto
</a>
`;

}else{

authContainer.innerHTML = `
<a href="login.html"
style="
color:var(--dark);
font-weight:700;
text-decoration:none;
">
Logga in
</a>
`;

}

await loadAd();

});

async function loadAd(){

if(!carId){

document.getElementById('appContent').innerHTML =
`
<h2 style="padding:50px;text-align:center;">
Ingen annons vald.
</h2>
`;

return;

}

try{

const carRef = doc(db,"cars",carId);

const snap = await getDoc(carRef);

if(!snap.exists()){

document.getElementById('appContent').innerHTML =
`
<h2 style="padding:50px;text-align:center;">
Annonsen hittades inte.
</h2>
`;

return;

}

carData = snap.data();

const isOwner =
currentUser &&
currentUser.uid === carData.sellerId;

if(!isOwner){

try{

await updateDoc(carRef,{
views: increment(1)
});

}catch(e){
console.log("Views skipped");
}

}

const sellerSnap = await getDoc(
doc(db,"users",carData.sellerId)
);

sellerData = sellerSnap.exists()
? sellerSnap.data()
: {name:"Säljare"};

renderPage();

}catch(err){

console.error(err);

Swal.fire(
"Fel",
"Kunde inte ladda annonsen.",
"error"
);

}

}

function renderPage(){

const app =
document.getElementById('appContent');

const images =
Array.isArray(carData.images)
? carData.images
: [];

const mainImage =
images.length > 0
? images[0]
: "placeholder.jpg";

let thumbs = '';

images.forEach((img,index)=>{

thumbs += `
<img
src="${img}"
class="thumb ${index===0?'active':''}"
onclick="changeImg('${img}',this)"
>
`;

});

app.innerHTML = `

<div class="main-col">

<div class="gallery">

<img
src="${mainImage}"
id="mainImage"
class="main-img"
>

<div class="thumb-list">
${thumbs}
</div>

</div>

<div class="info-card">

<h1 class="car-title">
${carData.brand || '-'}
${carData.model || ''}
</h1>

<div class="car-price">
${Number(carData.price || 0).toLocaleString()} kr
</div>

<br>

<button
id="saveAdBtn"
class="btn-save-ad"
>
<i class="fa-regular fa-heart"></i>
Spara
</button>

<br><br>

<div class="specs-grid">

<div class="spec-item">
<span>År</span>
<strong>${carData.year || '-'}</strong>
</div>

<div class="spec-item">
<span>Miltal</span>
<strong>${carData.mileage || '-'} mil</strong>
</div>

<div class="spec-item">
<span>Bränsle</span>
<strong>${carData.fuel || '-'}</strong>
</div>

<div class="spec-item">
<span>Växellåda</span>
<strong>${carData.gear || '-'}</strong>
</div>

</div>

<h3 class="desc-title">
Beskrivning
</h3>

<div class="description">
${carData.description || 'Ingen beskrivning.'}
</div>

</div>

</div>

<div class="side-col">

<div class="contact-card">

<h3 class="contact-title">
Kontakta säljaren
</h3>

<div class="seller-info">

<div class="seller-avatar">
${sellerData.name
? sellerData.name.charAt(0).toUpperCase()
: 'S'}
</div>

<div class="seller-name">
${sellerData.name || 'Säljare'}
</div>

</div>

<textarea
id="msgBody"
class="msg-input"
placeholder="Hej! Finns bilen kvar?"
></textarea>

<button
id="sendBtn"
class="btn-send"
>
<i class="fa-solid fa-paper-plane"></i>
Skicka meddelande
</button>

</div>

</div>

`;

setupButtons();

}

function setupButtons(){

window.changeImg = function(url,el){

document.getElementById('mainImage').src = url;

document.querySelectorAll('.thumb').forEach(t=>{
t.classList.remove('active');
});

el.classList.add('active');

};

const saveBtn =
document.getElementById('saveAdBtn');

if(saveBtn){

saveBtn.onclick = async()=>{

if(!currentUser){

Swal.fire(
"Logga in",
"Du måste vara inloggad.",
"info"
);

return;

}

try{

const userRef =
doc(db,"users",currentUser.uid);

const userSnap =
await getDoc(userRef);

let savedCars = [];

if(userSnap.exists()){

savedCars =
userSnap.data().savedCars || [];

}

const alreadySaved =
savedCars.includes(carId);

if(alreadySaved){

await setDoc(userRef,{
savedCars: arrayRemove(carId)
},{merge:true});

try{
await updateDoc(
doc(db,"cars",carId),
{
saves: increment(-1)
}
);
}catch(e){}

saveBtn.innerHTML =
`
<i class="fa-regular fa-heart"></i>
Spara
`;

saveBtn.classList.remove('saved');

Swal.fire(
"Borttagen",
"Annons borttagen från sparade.",
"success"
);

}else{

await setDoc(userRef,{
savedCars: arrayUnion(carId)
},{merge:true});

try{
await updateDoc(
doc(db,"cars",carId),
{
saves: increment(1)
}
);
}catch(e){}

saveBtn.innerHTML =
`
<i class="fa-solid fa-heart"></i>
Sparad
`;

saveBtn.classList.add('saved');

Swal.fire(
"Sparad",
"Annons sparad.",
"success"
);

}

}catch(err){

console.error(err);

Swal.fire(
"Fel",
"Kunde inte spara annonsen.",
"error"
);

}

};

}

const sendBtn =
document.getElementById('sendBtn');

if(sendBtn){

sendBtn.onclick = async()=>{

if(!currentUser){

Swal.fire(
"Logga in",
"Du måste vara inloggad.",
"warning"
);

return;

}

if(currentUser.uid === carData.sellerId){

Swal.fire(
"Info",
"Du kan inte skriva till dig själv.",
"info"
);

return;

}

const msg =
document.getElementById('msgBody')
.value
.trim();

if(!msg){

Swal.fire(
"Tomt",
"Skriv ett meddelande.",
"warning"
);

return;

}

sendBtn.disabled = true;

sendBtn.innerHTML =
`
<i class="fa-solid fa-spinner fa-spin"></i>
Skickar...
`;

try{

const q = query(
collection(db,"chats"),
where("carId","==",carId),
where("participants","array-contains",currentUser.uid)
);

const existing =
await getDocs(q);

let chatId = null;

if(!existing.empty){

chatId = existing.docs[0].id;

}else{

const buyerSnap =
await getDoc(
doc(db,"users",currentUser.uid)
);

const buyerName =
buyerSnap.exists()
? buyerSnap.data().name
: "Köpare";

const newChat =
await addDoc(
collection(db,"chats"),
{
carId: carId,
carTitle:
`${carData.brand} ${carData.model}`,
carImage:
carData.images?.[0] ||
'placeholder.jpg',
participants: [
currentUser.uid,
carData.sellerId
],
users:[
{
id: currentUser.uid,
name: buyerName
},
{
id: carData.sellerId,
name: sellerData.name || 'Säljare'
}
],
lastMessage:'',
updatedAt: serverTimestamp()
}
);

chatId = newChat.id;

}

await addDoc(
collection(
db,
`chats/${chatId}/messages`
),
{
text: msg,
senderId: currentUser.uid,
createdAt: serverTimestamp()
}
);

await updateDoc(
doc(db,"chats",chatId),
{
lastMessage: msg,
updatedAt: serverTimestamp()
}
);

try{

await updateDoc(
doc(db,"cars",carId),
{
messagesCount: increment(1)
}
);

}catch(e){}

Swal.fire(
"Skickat!",
"Meddelandet skickades.",
"success"
);

document.getElementById('msgBody').value = '';

}catch(err){

console.error(err);

Swal.fire(
"Fel",
"Kunde inte skicka meddelandet.",
"error"
);

}finally{

sendBtn.disabled = false;

sendBtn.innerHTML =
`
<i class="fa-solid fa-paper-plane"></i>
Skicka meddelande
`;

}

};

}

}

</script>

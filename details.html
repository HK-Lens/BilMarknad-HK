<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detaljer | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding-bottom: 50px; }
        header { background: white; padding: 15px 6%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr; gap: 25px; }
        @media (min-width: 800px) { .container { grid-template-columns: 1.5fr 1fr; } }
        .main-img { width: 100%; border-radius: 20px; height: 400px; object-fit: cover; }
        .card { background: white; padding: 25px; border-radius: 20px; border: 1px solid var(--border); }
        .btn-contact { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
<header><a href="index.html" style="text-decoration:none; font-weight:900; color:var(--dark);">BIL<span>HK</span></a></header>
<div class="container" id="details">Laddar...</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const carId = new URLSearchParams(window.location.search).get('id');
    let currentUser = null;
    let currentCar = null;

    onAuthStateChanged(auth, user => { currentUser = user; load(); });

    async function load() {
        const snap = await getDoc(doc(db, "cars", carId));
        if (!snap.exists()) return;
        currentCar = snap.data();
        const c = currentCar;
        document.getElementById('details').innerHTML = `
            <div>
                <img src="${c.images?.[0]}" class="main-img">
                <div class="card" style="margin-top:20px;">
                    <h1 style="font-size:28px; font-weight:900;">${c.brand} ${c.model}</h1>
                    <div style="font-size:32px; color:var(--primary); font-weight:900; margin:10px 0;">${Number(c.price).toLocaleString()} kr</div>
                    <p>${c.description}</p>
                </div>
            </div>
            <aside>
                <div class="card">
                    <h3>Kontakta säljaren</h3>
                    ${(!c.hidePhone && c.phone) ? `<a href="tel:${c.phone}" class="btn-contact" style="background:#22c55e; color:white; display:block; text-align:center; text-decoration:none;">📞 Ring ${c.phone}</a>` : ''}
                    <div style="margin-top:20px;">
                        <textarea id="msgText" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ddd;" rows="4" placeholder="Skriv ett internt meddelande..."></textarea>
                        <button onclick="sendMsg()" id="sendBtn" class="btn-contact" style="background:var(--dark); color:white;">Skicka till Inkorg</button>
                    </div>
                </div>
            </aside>`;
    }

    window.sendMsg = async () => {
        if (!currentUser) return alert("Logga in först!");
        const text = document.getElementById('msgText').value;
        const btn = document.getElementById('sendBtn');
        btn.disabled = true;
        try {
            await addDoc(collection(db, "messages"), {
                carId: carId, carTitle: `${currentCar.brand} ${currentCar.model}`, carImage: currentCar.images[0],
                senderId: currentUser.uid, senderName: currentUser.displayName || currentUser.email.split('@')[0], senderEmail: currentUser.email,
                recipientId: currentCar.sellerId, message: text, timestamp: serverTimestamp()
            });
            alert("Meddelande skickat!");
        } catch (e) { alert("Fel!"); } finally { btn.disabled = false; }
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Detaljer | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); padding-bottom: 50px; }
        header { background: white; padding: 15px 6%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 900px) { .container { grid-template-columns: 1.6fr 1fr; } }
        .gallery-card { background: white; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); }
        .main-img { width: 100%; height: 350px; object-fit: contain; background: #000; }
        .price-card { background: white; padding: 25px; border-radius: 20px; border: 1px solid var(--border); }
        .btn-main { width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; font-size: 16px; }
        .btn-contact { background: var(--dark); color: white; }
        .btn-fav { background: transparent; border: 2px solid var(--border); }
        .btn-fav.active { color: var(--primary); border-color: var(--primary); background: #fff7ed; }
        .spec-box { background: #f1f5f9; padding: 15px; border-radius: 12px; text-align: center; font-size: 14px; }
    </style>
</head>
<body>
<header>
    <a href="index.html" style="text-decoration:none; font-size:22px; font-weight:900; color:var(--dark);">BIL<span style="color:var(--primary);">HK</span></a>
</header>
<div class="container">
    <div>
        <div class="gallery-card"><img id="activeImg" src="" class="main-img"></div>
        <div style="background:white; padding:30px; border-radius:20px; margin-top:20px; border:1px solid var(--border);">
            <h2 style="font-weight:900; margin-bottom:15px;">Beskrivning</h2>
            <p id="carDesc" style="white-space:pre-line; color:#475569;"></p>
        </div>
    </div>
    <div class="sidebar">
        <div class="price-card">
            <div id="carPrice" style="font-size:36px; font-weight:900; color:var(--primary);">0 kr</div>
            <h1 id="carTitle" style="font-size:22px; font-weight:800; margin:10px 0 20px 0;">Laddar...</h1>
            <button id="chatBtn" class="btn-main btn-contact"><i class="fa-solid fa-paper-plane"></i> Kontakta Säljaren</button>
            <button id="favBtn" class="btn-main btn-fav"><i class="fa-regular fa-heart" id="fIcon"></i> <span id="fText">Spara</span></button>
        </div>
    </div>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, getDoc, setDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const carId = new URLSearchParams(window.location.search).get('id');
    let carData = null;

    async function loadCar() {
        const snap = await getDoc(doc(db, "cars", carId));
        if (snap.exists()) {
            carData = snap.data();
            document.getElementById('carTitle').innerText = `${carData.brand} ${carData.model}`;
            document.getElementById('carPrice').innerText = `${Number(carData.price).toLocaleString()} kr`;
            document.getElementById('carDesc').innerText = carData.description;
            document.getElementById('activeImg').src = carData.images?.[0] || '';
            checkFavStatus();
        }
    }

    async function checkFavStatus() {
        if (!auth.currentUser) return;
        const snap = await getDoc(doc(db, "favorites", `${auth.currentUser.uid}_${carId}`));
        if (snap.exists()) { document.getElementById('fIcon').className = 'fa-solid fa-heart'; document.getElementById('favBtn').classList.add('active'); document.getElementById('fText').innerText = "Sparad"; }
    }

    document.getElementById('favBtn').onclick = async () => {
        if (!auth.currentUser) return Swal.fire('Logga in', 'Du måste logga in först', 'info');
        const favRef = doc(db, "favorites", `${auth.currentUser.uid}_${carId}`);
        const snap = await getDoc(favRef);
        if (snap.exists()) { await deleteDoc(favRef); location.reload(); }
        else { await setDoc(favRef, { userId: auth.currentUser.uid, carId, brand: carData.brand, model: carData.model, price: carData.price, image: carData.images[0] }); location.reload(); }
    };

    document.getElementById('chatBtn').onclick = async () => {
        if (!auth.currentUser) return window.location.href="login.html";
        const roomId = [auth.currentUser.uid, carData.sellerId].sort().join('_') + '_' + carId;
        await setDoc(doc(db, "chats", roomId), { 
            carId, carName: carData.brand, participants: [auth.currentUser.uid, carData.sellerId],
            sellerId: carData.sellerId, buyerId: auth.currentUser.uid, buyerName: auth.currentUser.displayName || 'Köpare', updatedAt: serverTimestamp() 
        }, { merge: true });
        window.location.href = `messages.html?chat=${roomId}&name=${encodeURIComponent(carData.brand)}`;
    };

    onAuthStateChanged(auth, () => loadCar());
</script>
</body>
</html>

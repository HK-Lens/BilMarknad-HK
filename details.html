<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fordonsdetaljer | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); margin: 0; }
        
        header { background: white; padding: 15px 6%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { text-decoration: none; font-size: 24px; font-weight: 900; color: var(--dark); }
        .logo span { color: var(--primary); }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1.5fr 1fr; gap: 30px; }
        
        /* الصور */
        .main-image { width: 100%; height: 500px; border-radius: 20px; object-fit: cover; background: #eee; }
        
        /* بطاقة المعلومات الأساسية */
        .info-card { background: white; padding: 30px; border-radius: 24px; border: 1px solid var(--border); }
        .price-big { font-size: 36px; font-weight: 900; color: var(--dark); margin-bottom: 10px; }
        .car-title-big { font-size: 24px; font-weight: 700; color: #64748b; margin-bottom: 25px; }

        /* شبكة المواصفات - هنا تظهر المعلومات الكثيرة */
        .specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; border-top: 1px solid #f1f5f9; padding-top: 25px; }
        .spec-item { display: flex; flex-direction: column; }
        .spec-label { font-size: 12px; color: #94a3b8; text-transform: uppercase; font-weight: 700; }
        .spec-value { font-size: 16px; font-weight: 700; margin-top: 4px; }

        .description-box { margin-top: 30px; line-height: 1.8; color: #475569; }
        
        /* بطاقة البائع */
        .seller-card { background: var(--dark); color: white; padding: 30px; border-radius: 24px; position: sticky; top: 100px; }
        .btn-contact { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 16px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
</header>

<div class="container" id="detailsContainer">
    <p>Laddar information...</p>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const params = new URLSearchParams(window.location.search);
    const carId = params.get('id');

    async function loadCarDetails() {
        if (!carId) return;
        const docRef = doc(db, "cars", carId);
        const snap = await getDoc(docRef);

        if (snap.exists()) {
            const car = snap.data();
            renderDetails(car);
        }
    }

    function renderDetails(c) {
        const container = document.getElementById('detailsContainer');
        container.innerHTML = `
            <div class="left-side">
                <img src="${c.images ? c.images[0] : 'placeholder.jpg'}" class="main-image">
                
                <div class="description-box">
                    <h2 style="margin-bottom:15px;">Beskrivning</h2>
                    <p>${c.description || 'Ingen beskrivning tillgänglig.'}</p>
                </div>
            </div>

            <div class="right-side">
                <div class="info-card">
                    <div class="price-big">${Number(c.price).toLocaleString()} kr</div>
                    <div class="car-title-big">${c.brand} ${c.model}</div>
                    
                    <div class="specs-grid">
                        <div class="spec-item"><span class="spec-label">Modellår</span><span class="spec-value">${c.year}</span></div>
                        <div class="spec-item"><span class="spec-label">Miltal</span><span class="spec-value">${c.mileage} mil</span></div>
                        <div class="spec-item"><span class="spec-label">Växellåda</span><span class="spec-value">${c.transmission || 'Automat'}</span></div>
                        <div class="spec-item"><span class="spec-label">Drivmedel</span><span class="spec-value">${c.fuelType || 'Bensin'}</span></div>
                        <div class="spec-item"><span class="spec-label">Kaross</span><span class="spec-value">${c.bodyType || 'Sedan'}</span></div>
                        <div class="spec-item"><span class="spec-label">Ort</span><span class="spec-value">${c.city || 'Sverige'}</span></div>
                    </div>
                </div>

                <div class="seller-card">
                    <h3>Intresserad?</h3>
                    <p style="color: #94a3b8; font-size: 14px; margin-top:10px;">Kontakta säljaren för mer information eller provkörning.</p>
                    <button class="btn-contact" onclick="window.location.href='mailto:${c.sellerEmail}'">Skicka e-post</button>
                    <div style="margin-top: 20px; font-size: 18px; font-weight: 700; text-align: center;">
                        📞 ${c.phone || 'Inget nummer'}
                    </div>
                </div>
            </div>
        `;
    }

    loadCarDetails();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detaljer | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; margin: 0; }
        header { background: white; padding: 15px 6%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 900px) { .container { grid-template-columns: 1.6fr 1fr; } }
        .sidebar-card { background: white; padding: 25px; border-radius: 20px; border: 1px solid var(--border); position: sticky; top: 20px; }
        .btn-msg { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; background: var(--dark); color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body>
<header><a href="index.html" style="text-decoration:none; font-size:24px; font-weight:900; color:var(--dark);">BIL<span style="color:var(--primary);">HK</span></a></header>
<div class="container">
    <div style="background:white; border-radius:20px; overflow:hidden; border:1px solid var(--border);">
        <img id="activeImg" src="" style="width:100%; height:400px; object-fit:contain; background:#000;">
        <div style="padding:30px;"><h2 style="font-weight:900;">Beskrivning</h2><p id="carDesc">Laddar...</p></div>
    </div>
    <div class="sidebar">
        <div class="sidebar-card">
            <h1 id="carTitle" style="font-size:26px; font-weight:900;">Laddar...</h1>
            <div id="carPrice" style="font-size:32px; font-weight:900; color:var(--primary); margin-bottom:20px;">0 kr</div>
            <button id="chatBtn" class="btn-msg"><i class="fa-solid fa-message"></i> Kontakta Säljaren</button>
        </div>
    </div>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const carId = new URLSearchParams(window.location.search).get('id');
    let carData = null;

    onAuthStateChanged(auth, async (u) => {
        if(!carId) return;
        const snap = await getDoc(doc(db, "cars", carId));
        if (snap.exists()) {
            carData = snap.data();
            document.getElementById('carTitle').innerText = `${carData.brand} ${carData.model}`;
            document.getElementById('carPrice').innerText = `${Number(carData.price).toLocaleString()} kr`;
            document.getElementById('carDesc').innerText = carData.description || "";
            document.getElementById('activeImg').src = carData.images?.[0] || "";
        }
    });

    document.getElementById('chatBtn').onclick = () => {
        if (!auth.currentUser) return window.location.href = "login.html";
        const carName = `${carData.brand} ${carData.model}`;
        window.location.href = `messages.html?seller=${carData.sellerId}&carId=${carId}&name=${encodeURIComponent(carName)}`;
    };
</script>
</body>
</html>

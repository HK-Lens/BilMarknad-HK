<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fordonsdetaljer | BILHK</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--dark); line-height: 1.6; }

        header { background: white; padding: 15px 5%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { text-decoration: none; font-weight: 900; color: var(--dark); font-size: 24px; }
        .logo span { color: var(--primary); }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        
        .main-layout { display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
        
        /* Image Gallery */
        .gallery-container { background: white; border-radius: 25px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .main-image { width: 100%; height: 500px; object-fit: cover; }
        
        /* Car Info */
        .content-card { background: white; padding: 30px; border-radius: 25px; border: 1px solid var(--border); margin-top: 25px; }
        .price-tag { font-size: 32px; font-weight: 900; color: var(--primary); margin-bottom: 10px; }
        .car-title { font-size: 28px; font-weight: 800; margin-bottom: 20px; }
        
        .specs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 20px; margin: 25px 0; padding: 20px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        .spec-item { display: flex; flex-direction: column; }
        .spec-item span { font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; }
        .spec-item b { font-size: 16px; }

        /* Sidebar Actions */
        .sidebar-card { background: white; padding: 25px; border-radius: 25px; border: 1px solid var(--border); position: sticky; top: 100px; height: fit-content; }
        .btn-action { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 15px; transition: 0.3s; text-decoration: none; }
        .btn-msg { background: var(--dark); color: white; }
        .btn-fav { background: #f1f5f9; color: var(--dark); }
        .btn-fav.active { background: #fee2e2; color: #ef4444; }

        .seller-info { margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; text-align: center; }

        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } .main-image { height: 300px; } }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <nav>
        <a href="index.html" style="text-decoration:none; color:var(--dark); font-weight:700;">Hem</a>
    </nav>
</header>

<div class="container">
    <div class="main-layout" id="detailsContainer">
        <div>
            <div class="gallery-container">
                <img id="displayImg" src="placeholder.jpg" class="main-image">
            </div>
            
            <div class="content-card">
                <div class="price-tag" id="priceText">0 kr</div>
                <h1 class="car-title" id="titleText">Laddar...</h1>
                
                <div class="specs-grid">
                    <div class="spec-item"><span>Årsmodell</span><b id="specYear">-</b></div>
                    <div class="spec-item"><span>Miltal</span><b id="specMil">-</b></div>
                    <div class="spec-item"><span>Drivmedel</span><b id="specFuel">-</b></div>
                    <div class="spec-item"><span>Växellåda</span><b>Manuell</b></div>
                </div>

                <div style="margin-top:20px;">
                    <h3 style="margin-bottom:10px;">Beskrivning</h3>
                    <p id="descText" style="color:#475569; white-space: pre-line;">-</p>
                </div>
            </div>
        </div>

        <aside>
            <div class="sidebar-card">
                <button id="msgBtn" class="btn-action btn-msg"><i class="fa-solid fa-paper-plane"></i> Kontakta säljaren</button>
                <button id="favBtn" class="btn-action btn-fav"><i class="fa-solid fa-heart"></i> Spara som favorit</button>
                
                <div class="seller-info">
                    <p style="font-size:12px; color:#94a3b8;">ANNONS-ID</p>
                    <p id="adId" style="font-weight:700; font-size:14px;">-</p>
                    <div style="margin-top:15px; font-size:14px;">
                        <i class="fa-solid fa-eye" style="color:var(--primary)"></i> <span id="viewCount">0</span> visningar
                    </div>
                </div>
            </div>
        </aside>
    </div>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { doc, getDoc, updateDoc, increment, setDoc, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const params = new URLSearchParams(window.location.search);
    const carId = params.get('id');

    if (!carId) window.location.href = "index.html";

    onAuthStateChanged(auth, (user) => {
        loadCarDetails();
    });

    async function loadCarDetails() {
        try {
            const carRef = doc(db, "cars", carId);
            const carSnap = await getDoc(carRef);

            if (carSnap.exists()) {
                const car = carSnap.data();

                // 1. Update UI
                document.getElementById('displayImg').src = (car.images && car.images[0]) ? car.images[0] : 'placeholder.jpg';
                document.getElementById('priceText').innerText = `${Number(car.price).toLocaleString()} kr`;
                document.getElementById('titleText').innerText = `${car.brand} ${car.model}`;
                document.getElementById('specYear').innerText = car.year;
                document.getElementById('specMil').innerText = `${car.mil} mil`;
                document.getElementById('specFuel').innerText = car.fuel;
                document.getElementById('descText').innerText = car.description || "Ingen beskrivning tillgänglig.";
                document.getElementById('adId').innerText = carId;
                document.getElementById('viewCount').innerText = (car.views || 0) + 1;

                // 2. Increment Views (The Magic Trick for Dashboard)
                await updateDoc(carRef, {
                    views: increment(1)
                });

            } else {
                window.location.href = "index.html";
            }
        } catch (error) {
            console.error("Error loading details:", error);
        }
    }

    // Message functionality
    document.getElementById('msgBtn').onclick = () => {
        if (!auth.currentUser) {
            Swal.fire('Logga in', 'Du måste logga in för att skicka meddelanden.', 'info');
            return;
        }
        // Logic for opening chat...
        location.href = `messages.html?adId=${carId}`;
    };
</script>
</body>
</html>

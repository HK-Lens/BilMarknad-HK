<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detaljer | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding-bottom: 50px; }
        header { background: white; padding: 15px 6%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { text-decoration: none; font-size: 22px; font-weight: 900; color: var(--dark); }
        .logo span { color: var(--primary); }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 15px; display: grid; grid-template-columns: 1fr; gap: 30px; }
        @media (min-width: 850px) { .container { grid-template-columns: 1.8fr 1fr; } }
        .card { background: white; padding: 25px; border-radius: 24px; border: 1px solid var(--border); }
        .btn-contact { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; text-decoration: none; gap: 10px; }
    </style>
</head>
<body>
<header><a href="index.html" class="logo">BIL<span>HK</span></a></header>
<div class="container" id="details">Laddar...</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const carId = new URLSearchParams(window.location.search).get('id');
    let currentUser = null;
    let car = null;

    onAuthStateChanged(auth, user => { currentUser = user; load(); });

    async function load() {
        const snap = await getDoc(doc(db, "cars", carId));
        if (!snap.exists()) return;
        car = snap.data();
        
        const phoneSect = (!car.hidePhone && car.phone) ? `
            <a href="tel:${car.phone}" class="btn-contact" style="background:#22c55e; color:white;">📞 Ring ${car.phone}</a>
            <a href="https://wa.me/${car.phone.replace(/\s+/g,'')}" class="btn-contact" style="background:#25d366; color:white;">💬 WhatsApp</a>
        ` : `<p style="text-align:center; color:#94a3b8; font-size:12px; margin-bottom:15px;">Säljaren föredrar internmeddelanden</p>`;

        document.getElementById('details').innerHTML = `
            <div>
                <img src="${car.images[0]}" style="width:100%; border-radius:24px; height:450px; object-fit:cover;">
                <div class="card" style="margin-top:25px;">
                    <h1 style="font-weight:900; font-size:32px;">${car.brand} ${car.model}</h1>
                    <div style="font-size:36px; color:var(--primary); font-weight:900; margin:15px 0;">${Number(car.price).toLocaleString()} kr</div>
                    <div style="display:grid; grid-template-columns:repeat(2, 1fr); gap:15px; margin-bottom:30px;">
                        <div style="background:#f1f5f9; padding:15px; border-radius:15px;"><b>Årsmodell:</b> ${car.year}</div>
                        <div style="background:#f1f5f9; padding:15px; border-radius:15px;"><b>Miltal:</b> ${car.mileage} mil</div>
                        <div style="background:#f1f5f9; padding:15px; border-radius:15px;"><b>Bränsle:</b> ${car.fuelType}</div>
                        <div style="background:#f1f5f9; padding:15px; border-radius:15px;"><b>Reg-nr:</b> ${car.regNr}</div>
                    </div>
                    <p style="line-height:1.7; color:#475569;">${car.description}</p>
                </div>
            </div>
            <aside>
                <div class="card" style="position:sticky; top:100px;">
                    <h3 style="margin-bottom:20px;">Intresserad?</h3>
                    ${phoneSect}
                    <div style="margin-top:25px; border-top:1px solid #eee; padding-top:25px;">
                        <textarea id="msg" style="width:100%; padding:15px; border-radius:15px; border:1px solid #ddd; outline:none;" rows="5" placeholder="Skriv ett meddelande..."></textarea>
                        <button onclick="startChat()" id="sBtn" class="btn-contact" style="background:var(--dark); color:white;">Starta chatt</button>
                    </div>
                </div>
            </aside>`;
    }

    window.startChat = async () => {
        if (!currentUser) { alert("Vänligen logga in!"); return; }
        const btn = document.getElementById('sBtn');
        const text = document.getElementById('msg').value;
        if(!text) return alert("Skriv ett meddelande!");
        
        btn.disabled = true;
        try {
            // "chatID" فريد يجمع (المشتري + البائع + السيارة) لفتح غرفة واحدة فقط
            const chatId = `${currentUser.uid}_${car.sellerId}_${carId}`;
            await addDoc(collection(db, "messages"), {
                chatId: chatId,
                carId: carId,
                carTitle: `${car.brand} ${car.model}`,
                carImage: car.images[0],
                senderId: currentUser.uid,
                senderName: currentUser.displayName || currentUser.email.split('@')[0],
                recipientId: car.sellerId,
                message: text,
                timestamp: serverTimestamp()
            });
            window.location.href = "my-account.html?chat=" + chatId;
        } catch (e) { alert("Fel!"); btn.disabled = false; }
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fordonsdetaljer | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); margin: 0; }
        header { background: white; padding: 15px 6%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { text-decoration: none; font-size: 24px; font-weight: 900; color: var(--dark); }
        .logo span { color: var(--primary); }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1.6fr 1fr; gap: 30px; }
        
        /* الصور والمعلومات الأساسية */
        .main-image { width: 100%; height: 450px; border-radius: 20px; object-fit: cover; background: #eee; }
        .price-tag { font-size: 38px; font-weight: 900; margin: 20px 0 10px; }
        .car-heading { font-size: 24px; color: #64748b; margin-bottom: 30px; }

        /* جداول البيانات التقنية (Technical Data) */
        .specs-section { background: white; border-radius: 20px; padding: 30px; border: 1px solid var(--border); margin-bottom: 20px; }
        .specs-section h2 { font-size: 18px; margin-bottom: 20px; border-bottom: 2px solid var(--primary); display: inline-block; padding-bottom: 5px; }
        
        .tech-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .tech-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
        .tech-label { color: #94a3b8; font-size: 14px; }
        .tech-value { font-weight: 700; font-size: 14px; }

        /* بطاقة التواصل */
        .contact-sidebar { position: sticky; top: 100px; }
        .seller-box { background: var(--dark); color: white; padding: 30px; border-radius: 24px; text-align: center; }
        .btn-call { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
</header>

<div class="container" id="detailsPage">
    </div>

<script type="module">
    import { db } from './firebase-config.js';
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const carId = new URLSearchParams(window.location.search).get('id');

    async function loadData() {
        const snap = await getDoc(doc(db, "cars", carId));
        if (snap.exists()) {
            const c = snap.data();
            document.getElementById('detailsPage').innerHTML = `
                <div class="main-content">
                    <img src="${c.images ? c.images[0] : 'placeholder.jpg'}" class="main-image">
                    <div class="price-tag">${Number(c.price).toLocaleString()} kr</div>
                    <h1 class="car-heading">${c.brand} ${c.model} ${c.year}</h1>

                    <div class="specs-section">
                        <h2>Motor & Prestanda</h2>
                        <div class="tech-grid">
                            <div class="tech-item"><span class="tech-label">Drivmedel</span><span class="tech-value">${c.fuelType || '-'}</span></div>
                            <div class="tech-item"><span class="tech-label">Växellåda</span><span class="tech-value">${c.transmission || '-'}</span></div>
                            <div class="tech-item"><span class="tech-label">Räckvidd (WLTP)</span><span class="tech-value">${c.range || '-'} km</span></div>
                            <div class="tech-item"><span class="tech-label">Topphastighet</span><span class="tech-value">${c.topSpeed || '-'} km/h</span></div>
                        </div>
                    </div>

                    <div class="specs-section">
                        <h2>Fordonsdata & Mått</h2>
                        <div class="tech-grid">
                            <div class="tech-item"><span class="tech-label">I trafik</span><span class="tech-value">${c.inTrafficDate || '-'}</span></div>
                            <div class="tech-item"><span class="tech-label">Miltal</span><span class="tech-value">${c.mileage} mil</span></div>
                            <div class="tech-item"><span class="tech-label">Totalvikt</span><span class="tech-value">${c.totalWeight || '-'} kg</span></div>
                            <div class="tech-item"><span class="tech-label">Längd</span><span class="tech-value">${c.length || '-'} m</span></div>
                            <div class="tech-item"><span class="tech-label">Färg</span><span class="tech-value">${c.color || '-'}</span></div>
                            <div class="tech-item"><span class="tech-label">Svensksåld</span><span class="tech-value">${c.swedishSold ? 'Ja' : 'Nej'}</span></div>
                        </div>
                    </div>

                    <div class="specs-section">
                        <h2>Beskrivning</h2>
                        <p style="line-height:1.7;">${c.description || 'Ingen beskrivning.'}</p>
                    </div>
                </div>

                <div class="contact-sidebar">
                    <div class="seller-box">
                        <h3>Intresserad?</h3>
                        <p style="font-size:14px; color:#94a3b8; margin:10px 0;">Kontakta säljaren direkt för en provkörning.</p>
                        <div style="font-size:22px; font-weight:900; margin:15px 0;">📞 ${c.phone || 'Dolt nummer'}</div>
                        <button class="btn-call" onclick="window.location.href='mailto:${c.sellerEmail}'">Skicka meddelande</button>
                    </div>
                </div>
            `;
        }
    }
    loadData();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fordonsdetaljer | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.min.css">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; --reg-blue: #005599; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); margin: 0; padding-bottom: 50px; }
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        .header-action-area { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .reg-plate { display: inline-flex; align-items: center; background: white; border: 2px solid #333; border-radius: 6px; padding: 2px 10px; font-weight: 800; font-size: 22px; letter-spacing: 2px; }
        .reg-plate .eu-symbol { background: var(--reg-blue); color: white; font-size: 10px; padding: 5px 3px; margin-right: 8px; border-radius: 2px; display: flex; flex-direction: column; align-items: center; }
        .btn-msg-small { background: var(--dark); color: white; border: none; padding: 10px 20px; border-radius: 50px; font-weight: 800; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; text-decoration: none; }
        
        /* معرض الصور المتناسق */
        .gallery-wrapper { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-bottom: 30px; border-radius: 24px; overflow: hidden; }
        .main-img-link { display: block; width: 100%; height: 450px; overflow: hidden; }
        .main-img-link img { width: 100%; height: 100%; object-fit: cover; }
        .side-imgs-column { display: grid; grid-template-rows: 1fr 1fr; gap: 12px; }
        .side-img-link { display: block; width: 100%; height: 219px; overflow: hidden; }
        .side-img-link img { width: 100%; height: 100%; object-fit: cover; }

        .content-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        .card { background: white; padding: 35px; border-radius: 28px; border: 1px solid var(--border); margin-bottom: 25px; }
        .price-big { font-size: 44px; font-weight: 900; color: var(--primary); margin: 15px 0; }
        .full-specs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
        .spec-item { display: flex; justify-content: space-between; padding: 16px; background: #f1f5f9; border-radius: 14px; font-size: 14px; font-weight: 700; }
        .tech-pill { padding: 10px 18px; background: #fff5eb; color: var(--primary); border: 1px solid #fbd38d; border-radius: 50px; font-size: 11px; font-weight: 900; display: inline-block; margin: 4px; }
        
        .footer-legal { margin-top: 50px; padding: 40px; border-top: 1px solid var(--border); }
        .saker-affar { background: #fff5eb; border-left: 6px solid var(--primary); padding: 25px; border-radius: 15px; margin-bottom: 25px; }
        
        @media (max-width: 850px) { .gallery-wrapper { grid-template-columns: 1fr; } .side-imgs-column { display: none; } .content-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container" id="detailsContainer"></div>

<script type="module">
    import { db } from './firebase-config.js';
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import PhotoSwipeLightbox from 'https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe-lightbox.esm.min.js';

    const carId = new URLSearchParams(window.location.search).get('id');
    const container = document.getElementById('detailsContainer');

    async function loadFullData() {
        if (!carId) return;
        try {
            const snap = await getDoc(doc(db, "cars", carId));
            if (!snap.exists()) { container.innerHTML = "Annonsen hittades inte."; return; }
            const car = snap.data();
            
            container.innerHTML = `
                <div class="pswp-gallery gallery-wrapper" id="carGallery">
                    <a href="${car.images[0]}" data-pswp-width="1600" data-pswp-height="1000" target="_blank" class="main-img-link">
                        <img src="${car.images[0]}">
                    </a>
                    <div class="side-imgs-column">
                        ${car.images.slice(1, 3).map(img => `
                            <a href="${img}" data-pswp-width="1600" data-pswp-height="1000" target="_blank" class="side-img-link">
                                <img src="${img}">
                            </a>
                        `).join('')}
                    </div>
                </div>
                
                <div class="header-action-area">
                    <div class="reg-plate"><div class="eu-symbol"><span>S</span></div>${(car.regNo || 'EJ ANGIVET').toUpperCase()}</div>
                    <a href="messages.html?sellerId=${car.sellerId}&carId=${carId}" class="btn-msg-small">
                        <i class="fa-solid fa-comments"></i> Kontakta säljaren
                    </a>
                </div>

                <div class="content-grid">
                    <div class="main-side">
                        <div class="card">
                            <h1 style="font-size:38px; font-weight:900;">${car.brand} ${car.model}</h1>
                            <p style="color:#64748b; font-weight:700;">Modellår: ${car.year} • ${car.mileage} mil</p>
                            <div class="price-big">${Number(car.price).toLocaleString()} kr</div>
                            <div class="full-specs-grid">
                                <div class="spec-item"><span>Årsmodell</span><span>${car.year}</span></div>
                                <div class="spec-item"><span>Drivmedel</span><span>${car.fuel}</span></div>
                                <div class="spec-item"><span>Växellåda</span><span>${car.transmission}</span></div>
                                <div class="spec-item"><span>Hästkrafter</span><span>${car.hp || '-'} hk</span></div>
                                <div class="spec-item"><span>Årsskatt</span><span>${car.tax || '-'} kr</span></div>
                                <div class="spec-item"><span>Färg</span><span>${car.color || '-'}</span></div>
                                <div class="spec-item"><span>Karosseri</span><span>${car.karosseri || '-'}</span></div>
                                <div class="spec-item"><span>Besiktigad</span><span>${car.besiktning || '-'}</span></div>
                            </div>
                        </div>
                        <div class="card">
                            <h3>Beskrivning</h3>
                            <p style="white-space: pre-wrap; line-height:1.8;">${car.description}</p>
                        </div>
                    </div>
                    <div class="info-side">
                        <div class="card" style="background:var(--dark); color:white; text-align:center;">
                            <i class="fa-solid fa-shield-check" style="font-size:40px; color:var(--primary); margin-bottom:15px;"></i>
                            <h3>Säker affär</h3>
                            <p style="font-size:13px; color:#94a3b8;">Kontrollera historik och servicebok.</p>
                        </div>
                    </div>
                </div>

                <div class="footer-legal">
                    <div class="saker-affar">
                        <h4>Viktig information</h4>
                        <p>Kontrollera alltid fordonets mätarställning och servicebok innan betalning.</p>
                    </div>
                    <div class="disclaimer" style="font-size:12px; color:#94a3b8;">
                        Ansvarsfriskrivning: BILHK är en öppen plattform. All handel sker på egen risk.
                    </div>
                </div>`;

            const lightbox = new PhotoSwipeLightbox({
                gallery: '#carGallery',
                children: 'a',
                pswpModule: () => import('https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.esm.min.js')
            });
            lightbox.init();
        } catch (e) { container.innerHTML = "Error: " + e.message; }
    }
    loadFullData(); // استدعاء الدالة الصحيحة
</script>
</body>
</html>

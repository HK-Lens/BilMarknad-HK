<!DOCTYPE html><html lang="sv"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Fordonsdetaljer | BILHK</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script><style>:root{--primary:#f58220;--dark:#0f172a;--bg:#f8fafc;--border:#e2e8f0;--gray:#64748b;--danger:#ef4444}*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,sans-serif}body{background:var(--bg);color:var(--dark)}header{background:white;padding:15px 6%;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}.logo{text-decoration:none;font-size:26px;font-weight:900;color:var(--dark)}.logo span{color:var(--primary)}.container{max-width:1200px;margin:35px auto;padding:0 20px;display:grid;grid-template-columns:1fr;gap:25px}@media(min-width:920px){.container{grid-template-columns:2fr 1fr}}.card{background:white;border:1px solid var(--border);border-radius:22px;padding:26px}.main-img{width:100%;height:440px;object-fit:cover;border-radius:18px}.thumbs{display:flex;gap:10px;overflow:auto;margin-top:12px}.thumb{width:92px;height:64px;object-fit:cover;border-radius:10px;border:2px solid transparent;cursor:pointer}.thumb.active{border-color:var(--primary)}h1{font-size:30px;font-weight:900}.price{font-size:26px;color:var(--primary);font-weight:900;margin:8px 0 18px}.specs{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px}.spec{background:#f8fafc;border:1px solid var(--border);border-radius:14px;padding:13px;text-align:center}.spec span{display:block;color:var(--gray);font-size:11px;font-weight:900;text-transform:uppercase}.spec strong{display:block;margin-top:4px}.btn{width:100%;padding:14px;border:0;border-radius:13px;font-weight:900;cursor:pointer;margin-top:10px}.primary{background:var(--primary);color:white}.dark{background:var(--dark);color:white}.light{background:#f8fafc;color:var(--dark);border:1px solid var(--border)}.seller-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}.avatar{width:54px;height:54px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;font-weight:900;overflow:hidden}.avatar img{width:100%;height:100%;object-fit:cover}.info-line{font-size:14px;margin:8px 0;color:#334155}.sold{display:inline-block;background:var(--danger);color:white;padding:6px 12px;border-radius:8px;font-weight:900;margin-bottom:12px}textarea{width:100%;min-height:120px;padding:13px;border:1px solid var(--border);border-radius:12px;background:#f8fafc;font-weight:600}footer{background:white;border-top:1px solid var(--border);padding:34px 20px;text-align:center;color:#94a3b8;font-size:13px;margin-top:40px}.footer-links{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}.footer-links a{font-weight:900;color:#64748b;text-decoration:none}</style></head><body><header><a href="index.html" class="logo">BIL<span>HK</span></a><div style="display:flex;gap:15px"><a href="dashboard.html" style="font-weight:900;text-decoration:none;color:var(--primary)">Min sida</a><a href="sell.html" style="font-weight:900;text-decoration:none;color:var(--dark)">Sälj bil</a></div></header><main class="container" id="app"><div style="grid-column:1/-1;text-align:center;padding:50px">Laddar annons...</div></main><footer><div class="footer-links"><a href="terms.html">Användarvillkor</a><a href="terms.html#disclaimer">Ansvarsfriskrivning</a></div><div>BILHK är endast en annonsplattform. Vi ansvarar inte för annonser, betalningar, affärer eller tvister.</div></footer><script type="module">import{auth,db}from'./firebase-config.js';import{onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";import{doc,getDoc,updateDoc,setDoc,addDoc,collection,query,where,getDocs,increment,arrayUnion,arrayRemove,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";const id=new URLSearchParams(location.search).get('id');let currentUser=null,car={},seller={},isSaved=false;const esc=s=>String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');onAuthStateChanged(auth,async u=>{currentUser=u;await load();});async function load(){if(!id){location.href='404.html';return;}const snap=await getDoc(doc(db,'cars',id));if(!snap.exists()){location.href='404.html';return;}car=snap.data();if(currentUser?.uid!==car.sellerId)try{await updateDoc(doc(db,'cars',id),{views:increment(1)})}catch{}const us=await getDoc(doc(db,'users',car.sellerId));seller=us.exists()?us.data():{};if(currentUser){const me=await getDoc(doc(db,'users',currentUser.uid));isSaved=!!me.data()?.savedCars?.includes(id);}render();}function allowed(k){return car.sellerVisibility?.[k]||seller['show'+k[0].toUpperCase()+k.slice(1)]}function sellerName(){return seller.companyName||seller.name||car.sellerDisplayName||'BILHK-användare'}function render(){const imgs=car.images?.length?car.images:['placeholder.jpg'];const isOwner=currentUser&&currentUser.uid===car.sellerId;const sellerPublic=car.sellerProfilePublic!==false&&seller.profilePublic!==false;app.innerHTML=`<section><div class="card"><img id="mainImg" class="main-img" src="${esc(imgs[0])}"><div class="thumbs">${imgs.map((x,i)=>`<img class="thumb ${i?'':'active'}" src="${esc(x)}" onclick="mainImg.src='${esc(x)}';document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('active'));this.classList.add('active')">`).join('')}</div></div><div class="card" style="margin-top:22px">${car.status==='sold'?'<div class="sold">SÅLD</div>':''}<h1>${esc(car.brand)} ${esc(car.model)}</h1><div class="price">${Number(car.price||0).toLocaleString('sv-SE')} kr</div><div class="specs"><div class="spec"><span>År</span><strong>${esc(car.year)}</strong></div><div class="spec"><span>Miltal</span><strong>${esc(car.mileage||car.mil)} mil</strong></div><div class="spec"><span>Drivmedel</span><strong>${esc(car.fuel||car.fuelType)}</strong></div><div class="spec"><span>Växellåda</span><strong>${esc(car.gear||car.transmission)}</strong></div><div class="spec"><span>Karosseri</span><strong>${esc(car.karosseri)}</strong></div><div class="spec"><span>Reg.nr</span><strong>${esc(car.regNr||car.regNo||'-')}</strong></div></div><h3 style="margin-top:24px">Beskrivning</h3><p style="white-space:pre-wrap;line-height:1.7;color:#334155;margin-top:10px">${esc(car.description||'Ingen beskrivning.')}</p><h3 style="margin-top:24px">Utrustning</h3><p style="line-height:1.8;color:#334155;margin-top:10px">${(car.features||[]).map(esc).join(' • ')||'Ingen utrustning listad.'}</p></div></section><aside><div class="card"><h3 style="font-weight:900;margin-bottom:16px">Säljare</h3><div class="seller-row"><div class="avatar">${seller.logoUrl?`<img src="${esc(seller.logoUrl)}">`:esc(sellerName().charAt(0).toUpperCase())}</div><div><strong>${esc(sellerName())}</strong><div style="color:#64748b;font-size:13px">${seller.userType==='Foretag'?'Företag':'Privatperson'}</div></div></div>${sellerPublic?`<button class="btn light" onclick="location.href='seller.html?id=${car.sellerId}'"><i class="fa-solid fa-store"></i> Visa säljarens sida</button>`:'<p class="info-line">Säljaren har valt att inte visa offentlig profilsida.</p>'}${allowed('phone')&&seller.phone?`<div class="info-line"><i class="fa-solid fa-phone"></i> ${esc(seller.phone)}</div>`:''}${allowed('email')&&seller.email?`<div class="info-line"><i class="fa-solid fa-envelope"></i> ${esc(seller.email)}</div>`:''}${allowed('address')&&seller.address?`<div class="info-line"><i class="fa-solid fa-location-dot"></i> ${esc(seller.address)}</div>`:''}${allowed('website')&&seller.website?`<div class="info-line"><i class="fa-solid fa-globe"></i> <a href="${esc(seller.website)}" target="_blank">Webbplats</a></div>`:''}${isOwner?`<button class="btn dark" onclick="location.href='edit-car.html?id=${id}'">Redigera annons</button><button class="btn light" onclick="location.href='dashboard.html?tab=messages&carId=${id}'">Visa meddelanden</button>`:`<button id="saveBtn" class="btn light">${isSaved?'Ta bort från favoriter':'Spara i favoriter'}</button><textarea id="msg" placeholder="Hej! Finns bilen kvar?"></textarea><button id="send" class="btn primary">Skicka meddelande</button>`}</div></aside>`;if(!isOwner){saveBtn.onclick=toggleSave;send.onclick=sendMsg;}}async function toggleSave(){if(!currentUser)return Swal.fire('Logga in','Du måste logga in först.','info').then(()=>location.href='login.html');await setDoc(doc(db,'users',currentUser.uid),{savedCars:isSaved?arrayRemove(id):arrayUnion(id),lastActiveAt:serverTimestamp()},{merge:true});try{await updateDoc(doc(db,'cars',id),{saves:increment(isSaved?-1:1)})}catch{}isSaved=!isSaved;render();}async function sendMsg(){if(!currentUser)return Swal.fire('Logga in','Du måste logga in först.','info').then(()=>location.href='login.html');const text=msg.value.trim();if(!text)return;const q=query(collection(db,'chats'),where('carId','==',id),where('participants','array-contains',currentUser.uid));const s=await getDocs(q);let chatId;if(!s.empty)chatId=s.docs.find(d=>d.data().participants.includes(car.sellerId))?.id;if(!chatId){const me=await getDoc(doc(db,'users',currentUser.uid));const buyer=me.exists()?me.data():{};const ch=await addDoc(collection(db,'chats'),{carId:id,carTitle:`${car.brand} ${car.model}`,carImage:car.images?.[0]||'placeholder.jpg',participants:[currentUser.uid,car.sellerId],hiddenFor:[],buyerId:currentUser.uid,sellerId:car.sellerId,buyerName:buyer.name||'BILHK-användare',sellerName:sellerName(),lastMessage:'',updatedAt:serverTimestamp(),createdAt:serverTimestamp()});chatId=ch.id;}await addDoc(collection(db,`chats/${chatId}/messages`),{text,senderId:currentUser.uid,senderName:(await getDoc(doc(db,'users',currentUser.uid))).data()?.name||'BILHK-användare',createdAt:serverTimestamp()});await updateDoc(doc(db,'chats',chatId),{lastMessage:text,updatedAt:serverTimestamp(),hiddenFor:arrayRemove(currentUser.uid)});try{await updateDoc(doc(db,'cars',id),{messagesCount:increment(1)})}catch{}await Swal.fire('Skickat','Meddelandet har skickats.','success');msg.value='';}</script></body></html>

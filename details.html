<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detaljer | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding-bottom: 50px; }
        header { background: white; padding: 15px 6%; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .logo { text-decoration: none; font-size: 22px; font-weight: 900; color: var(--dark); }
        .logo span { color: var(--primary); }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; display: grid; grid-template-columns: 1fr; gap: 30px; }
        @media (min-width: 800px) { .container { grid-template-columns: 1.5fr 1fr; } }
        .btn-chat { width: 100%; background: var(--dark); color: white; padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>
<header><a href="index.html" class="logo">BIL<span>HK</span></a></header>
<div class="container" id="details">Laddar...</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const carId = new URLSearchParams(window.location.search).get('id');
    let user = null;
    let carData = null;

    onAuthStateChanged(auth, u => { user = u; load(); });

    async function load() {
        const snap = await getDoc(doc(db, "cars", carId));
        if (!snap.exists()) return;
        carData = snap.data();
        document.getElementById('details').innerHTML = `
            <div>
                <img src="${carData.images[0]}" style="width:100%; border-radius:20px; height:400px; object-fit:cover;" onerror="this.src='https://via.placeholder.com/800x400'">
                <div style="background:white; padding:25px; border-radius:20px; margin-top:20px; border:1px solid #eee;">
                    <h1 style="font-weight:900;">${carData.brand} ${carData.model}</h1>
                    <div style="font-size:28px; color:var(--primary); font-weight:900; margin:10px 0;">${Number(carData.price).toLocaleString()} kr</div>
                    <p>${carData.description}</p>
                </div>
            </div>
            <aside>
                <div style="background:white; padding:25px; border-radius:20px; border:1px solid #eee; position:sticky; top:100px;">
                    <h3 style="margin-bottom:15px;">Intresserad?</h3>
                    <textarea id="msg" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ddd; margin-bottom:10px;" rows="4" placeholder="Skriv ett meddelande..."></textarea>
                    <button onclick="startChat()" id="cBtn" class="btn-chat">Skicka & Starta chatt</button>
                </div>
            </aside>`;
    }

    window.startChat = async () => {
        if (!user) { alert("Logga in först!"); return; }
        const btn = document.getElementById('cBtn');
        const text = document.getElementById('msg').value;
        if(!text) return;
        btn.disabled = true;
        const chatId = `${user.uid}_${carData.sellerId}_${carId}`;
        await addDoc(collection(db, "messages"), {
            chatId: chatId, carId: carId, carTitle: carData.brand + " " + carData.model, carImage: carData.images[0],
            senderId: user.uid, senderName: user.email.split('@')[0], recipientId: carData.sellerId,
            message: text, timestamp: serverTimestamp(), participants: [user.uid, carData.sellerId]
        });
        window.location.href = "my-account.html?chat=" + chatId;
    };
</script>
</body>
</html>

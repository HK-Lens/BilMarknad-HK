<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fordonsdetaljer | BILHK</title>
    <meta name="description" content="Visa fordonsdetaljer, bilder, utrustning och kontaktmöjlighet för bilannons på BILHK.">
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.min.css">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; --reg-blue: #005599; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .gallery-container { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; margin-bottom: 30px; height: 500px; border-radius: 24px; overflow: hidden; cursor: pointer; }
        .main-stage { width: 100%; height: 100%; position: relative; background:#e2e8f0; }
        .main-stage img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; display:block; }
        .main-stage:hover img { transform: scale(1.03); }
        .side-stack { display: grid; grid-template-rows: 1fr 1fr; gap: 15px; }
        .side-stack a { background:#e2e8f0; overflow:hidden; }
        .side-stack img { width: 100%; height: 100%; object-fit: cover; display:block; }
        .header-bar { display: flex; align-items: center; justify-content: space-between; background: white; padding: 20px 30px; border-radius: 20px; margin-bottom: 30px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .reg-plate { display: inline-flex; align-items: center; border: 2px solid #222; border-radius: 6px; padding: 2px 12px; font-weight: 800; font-size: 24px; letter-spacing: 2px; background: #fff; }
        .reg-plate i { background: var(--reg-blue); color: white; font-style: normal; font-size: 11px; padding: 6px 4px; margin-right: 10px; border-radius: 2px; display: flex; flex-direction: column; line-height: 1; }
        .btn-contact { background: var(--dark); color: white; text-decoration: none; padding: 12px 25px; border-radius: 50px; font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .btn-contact:hover { background: var(--primary); transform: translateY(-2px); }
        .actions-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center; }
        .btn-favorite-detail { background: white; color: var(--dark); border: 1px solid var(--border); padding: 12px 20px; border-radius: 50px; font-weight: 800; font-size: 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: .3s; }
        .btn-favorite-detail:hover { border-color: var(--primary); color: var(--primary); transform: translateY(-2px); }
        .btn-favorite-detail.saved { color: #ef4444; border-color: #fecaca; background: #fff1f2; }
        .details-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        .info-card { background: white; padding: 35px; border-radius: 28px; border: 1px solid var(--border); margin-bottom: 25px; }
        .price-text { font-size: 45px; font-weight: 900; color: var(--primary); margin: 10px 0; }
        .specs-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-top: 25px; }
        .spec-box { display: flex; justify-content: space-between; gap: 14px; background: #f1f5f9; padding: 15px 20px; border-radius: 15px; font-size: 14px; font-weight: 700; }
        .spec-box span:last-child { text-align:right; word-break:break-word; }
        .spec-label { color: #64748b; font-weight: 500; }
        .feature-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; }
        .tag { padding: 10px 18px; background: #fff5eb; color: var(--primary); border: 1px solid #fbd38d; border-radius: 50px; font-size: 12px; font-weight: 800; text-transform: uppercase; }
        .empty-tags { color:#94a3b8; font-size:13px; font-weight:700; }
        .safety-footer { margin-top: 50px; padding: 40px; background: white; border-radius: 30px; border: 1px solid var(--border); }
        .safety-box { background: #fff5eb; border-left: 6px solid var(--primary); padding: 25px; border-radius: 15px; margin-bottom: 20px; }
        .disclaimer { font-size: 12px; color: #94a3b8; text-align: justify; line-height: 1.8; }
        .state-card { text-align:center; padding:80px; background:white; border-radius:24px; border:1px solid var(--border); }
        .state-card a { color:var(--primary); font-weight:800; text-decoration:none; }
        @media (max-width: 900px) { .gallery-container { grid-template-columns: 1fr; height: 350px; } .side-stack { display: none; } .details-grid { grid-template-columns: 1fr; } .header-bar { flex-direction: column; gap: 20px; text-align: center; } .price-text { font-size: 35px; } .info-card { padding:25px; } }
    </style>
</head>
<body>
<div class="container" id="app">
    <div style="text-align:center; padding:100px;">Laddar fordonsdata...</div>
</div>

<script type="module">
    import { db, auth } from './firebase-config.js';
    import { doc, getDoc, setDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import PhotoSwipeLightbox from 'https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe-lightbox.esm.min.js';

    const PLACEHOLDER_IMAGE = 'placeholder.jpg';
    const carId = cleanId(new URLSearchParams(window.location.search).get('id'));
    const app = document.getElementById('app');
    let currentUser = null;
    let currentCar = null;
    let isFavorite = false;
    let lightboxInstance = null;

    onAuthStateChanged(auth, async (user) => {
        currentUser = user || null;
        if (currentCar) await refreshFavoriteState();
    });

    async function refreshFavoriteState() {
        if (!currentUser || !carId) {
            isFavorite = false;
            updateFavoriteButton();
            return;
        }
        try {
            const favSnap = await getDoc(doc(db, "favorites", `${currentUser.uid}_${carId}`));
            isFavorite = favSnap.exists();
        } catch (error) {
            console.warn("Favorite state could not be loaded:", error);
            isFavorite = false;
        }
        updateFavoriteButton();
    }

    function updateFavoriteButton() {
        const btn = document.getElementById('favoriteDetailBtn');
        if (!btn) return;
        btn.classList.toggle('saved', isFavorite);
        btn.replaceChildren();
        const icon = document.createElement('i');
        icon.className = `${isFavorite ? 'fa-solid' : 'fa-regular'} fa-heart`;
        btn.append(icon, document.createTextNode(isFavorite ? ' Sparad' : ' Spara bilen'));
    }

    async function toggleFavoriteFromDetails() {
        if (!currentUser) {
            window.location.href = `login.html?redirect=${encodeURIComponent(window.location.href)}`;
            return;
        }
        if (!currentCar || !carId) return;
        const favRef = doc(db, "favorites", `${currentUser.uid}_${carId}`);
        const images = Array.isArray(currentCar.images) ? currentCar.images.filter(isSafeImageURL) : [];
        try {
            if (isFavorite) {
                await deleteDoc(favRef);
                isFavorite = false;
            } else {
                await setDoc(favRef, {
                    userId: currentUser.uid,
                    carId,
                    sellerId: safeString(currentCar.sellerId),
                    brand: safeString(currentCar.brand),
                    model: safeString(currentCar.model),
                    year: safeString(currentCar.year),
                    mileage: safeString(currentCar.mileage),
                    price: Number(currentCar.price) || 0,
                    image: images[0] || PLACEHOLDER_IMAGE,
                    createdAt: serverTimestamp()
                });
                isFavorite = true;
            }
            updateFavoriteButton();
        } catch (error) {
            console.error("Favorite could not be saved:", error);
            alert("Kunde inte spara bilen just nu. Kontrollera Firebase-reglerna för favorites.");
        }
    }

    async function init() {
        if (!carId) {
            renderState('Annons-ID saknas.', 'Till startsidan', 'index.html');
            return;
        }
        try {
            const snap = await getDoc(doc(db, "cars", carId));
            if (!snap.exists()) {
                renderState('Annonsen hittades inte.', 'Till startsidan', 'index.html');
                return;
            }
            currentCar = normalizeCarData(snap.data());
            renderCarDetails(currentCar);
            await refreshFavoriteState();
            initLightbox();
        } catch (error) {
            console.error('Details page error:', error);
            renderState(`Ett fel uppstod: ${safeString(error.message)}`, 'Till startsidan', 'index.html');
        }
    }

    function normalizeCarData(rawCar) {
        const car = rawCar || {};
        const images = Array.isArray(car.images) ? car.images.filter(isSafeImageURL) : [];
        const fallbackImage = isSafeImageURL(car.mainImage) ? car.mainImage : PLACEHOLDER_IMAGE;
        const features = buildFeatureList(car);
        return {
            ...car,
            images: images.length ? images : [fallbackImage],
            features,
            sellerId: getSellerIdFromCar(car),
            brand: safeString(car.brand),
            model: safeString(car.model),
            year: valueOrDash(car.year),
            mileage: valueOrDash(car.mileage),
            price: Number(car.price) || 0,
            regNo: safeString(car.regNo || car.registrationNumber || '--- ---'),
            fuel: valueOrDash(car.fuelType || car.fuel),
            transmission: valueOrDash(car.transmission || car.gearbox),
            drive: valueOrDash(car.drivetrain || car.drive),
            hp: valueOrDash(car.horsepower ?? car.hp),
            tax: valueOrDash(car.tax),
            owners: valueOrDash(car.owners),
            color: valueOrDash(car.color),
            besiktning: valueOrDash(car.inspectionUntil || car.besiktning),
            seats: valueOrDash(car.seats),
            description: safeString(car.description || 'Ingen beskrivning angiven.'),
            bodyType: valueOrDash(car.bodyType || car.karosseri),
            county: valueOrDash(car.county),
            location: valueOrDash(car.location),
            condition: valueOrDash(car.condition),
            doors: valueOrDash(car.doors),
            engineSize: valueOrDash(car.engineSize),
            batteryRange: valueOrDash(car.batteryRange),
            interiorColor: valueOrDash(car.interiorColor),
            upholstery: valueOrDash(car.upholstery)
        };
    }

    function buildFeatureList(car) {
        const merged = [];
        ['features', 'comfortFeatures', 'safetyFeatures', 'equipmentFeatures'].forEach(key => {
            if (Array.isArray(car[key])) merged.push(...car[key]);
        });
        return Array.from(new Set(merged.map(safeString).filter(Boolean))).slice(0, 80);
    }

    function renderCarDetails(car) {
        const images = car.images;
        const title = `${car.brand} ${car.model}`.trim() || 'Fordonsdetaljer';
        const messagesUrl = buildMessagesUrl(car, title);
        const priceText = `${formatNumber(car.price)} kr`;
        const mileageText = `${formatNumber(car.mileage)} km`;
        const featureHTML = car.features.length
            ? car.features.map(feature => `<span class="tag">${escapeHTML(feature)}</span>`).join('')
            : '<span class="empty-tags">Ingen utrustning angiven</span>';
        const sideImages = images.slice(1, 3).map(img => galleryAnchor(img, '')).join('');

        app.innerHTML = `
            <div class="pswp-gallery gallery-container" id="mainGallery">
                ${galleryAnchor(images[0], 'main-stage', 'Huvudbild')}
                <div class="side-stack">
                    ${sideImages || galleryAnchor(images[0], '', 'Fordonsbild')}
                </div>
            </div>

            <div class="header-bar">
                <div class="reg-plate"><i>S</i> ${escapeHTML(car.regNo.toUpperCase())}</div>
                <div class="actions-row">
                    <button id="favoriteDetailBtn" class="btn-favorite-detail" type="button"><i class="fa-regular fa-heart"></i> Spara bilen</button>
                    <a href="${escapeHTML(messagesUrl)}" class="btn-contact" id="contactSellerBtn"><i class="fa-solid fa-comments"></i> Kontakta säljaren</a>
                </div>
            </div>

            <div class="details-grid">
                <div class="content-left">
                    <div class="info-card">
                        <h1 style="font-size:38px; font-weight:900;">${escapeHTML(title)}</h1>
                        <p style="color:#64748b; font-weight:700; font-size:18px;">Modellår: ${escapeHTML(car.year)} • ${escapeHTML(mileageText)}</p>
                        <div class="price-text">${escapeHTML(priceText)}</div>
                        <div class="specs-list">
                            ${specBox('Årsmodell', car.year)}
                            ${specBox('Drivmedel', car.fuel)}
                            ${specBox('Växellåda', car.transmission)}
                            ${specBox('Drivning', car.drive)}
                            ${specBox('Hästkrafter', car.hp === '-' ? '-' : `${car.hp} hk`)}
                            ${specBox('Årsskatt', car.tax === '-' ? '-' : `${car.tax} kr`)}
                            ${specBox('Antal ägare', car.owners === '-' ? '-' : `${car.owners} st`)}
                            ${specBox('Färg', car.color)}
                            ${specBox('Besiktigad', car.besiktning)}
                            ${specBox('Säten', car.seats)}
                            ${specBox('Karosstyp', car.bodyType)}
                            ${specBox('Plats', [car.county, car.location].filter(v => v && v !== '-').join(', ') || '-')}
                            ${specBox('Skick', car.condition)}
                            ${specBox('Dörrar', car.doors)}
                            ${specBox('Motorvolym', car.engineSize === '-' ? '-' : `${car.engineSize} L`)}
                            ${specBox('Räckvidd el', car.batteryRange === '-' ? '-' : `${car.batteryRange} km`)}
                            ${specBox('Interiör färg', car.interiorColor)}
                            ${specBox('Klädsel', car.upholstery)}
                        </div>
                        <div style="margin-top:35px;">
                            <h4 style="text-transform:uppercase; font-size:11px; color:#94a3b8; margin-bottom:15px; font-weight:900;">Utrustning & Säkerhet</h4>
                            <div class="feature-tags">${featureHTML}</div>
                        </div>
                    </div>

                    <div class="info-card">
                        <h3 style="margin-bottom:20px; font-weight:900;">Beskrivning</h3>
                        <p style="white-space: pre-wrap; line-height:1.8; color:#334155;">${escapeHTML(car.description)}</p>
                    </div>
                </div>

                <div class="content-right">
                    <div class="info-card" style="text-align:center; position:sticky; top:100px; background:var(--dark); color:white;">
                        <i class="fa-solid fa-shield-check" style="font-size:45px; color:var(--primary); margin-bottom:20px;"></i>
                        <h3 style="margin-bottom:10px;">Gör en trygg affär</h3>
                        <p style="font-size:13px; color:#94a3b8;">Vi rekommenderar att alltid granska serviceboken och mätarställningen.</p>
                        <button id="interestButton" type="button" style="width:100%; margin-top:25px; padding:18px; border-radius:15px; border:none; background:var(--primary); color:white; font-weight:900; cursor:pointer;">INTRESSEANMÄLAN</button>
                    </div>
                </div>
            </div>

            <div class="safety-footer">
                <div class="safety-box">
                    <h4><i class="fa-solid fa-circle-exclamation"></i> Säker affär</h4>
                    <p style="font-size:14px; margin-top:10px;">Kontrollera alltid fordonets historik, servicebok och mätarställning innan köp.</p>
                </div>
                <p class="disclaimer"><strong>Ansvarsfriskrivning:</strong> BILHK är en öppen plattform. Vi granskar inte fordonens faktiska skick. All handel sker på användarens eget ansvar.</p>
            </div>
        `;

        document.getElementById('favoriteDetailBtn')?.addEventListener('click', toggleFavoriteFromDetails);
        document.getElementById('contactSellerBtn')?.addEventListener('click', handleContactSeller);
        document.getElementById('interestButton')?.addEventListener('click', handleContactSeller);
    }

    function handleContactSeller(event) {
        event?.preventDefault?.();

        if (!currentCar || !carId) {
            alert('Annonsen kunde inte laddas. Försök igen.');
            return;
        }

        const messagesUrl = buildMessagesUrl(currentCar, `${currentCar.brand || ''} ${currentCar.model || ''}`.trim() || 'Bilannons');
        const sellerId = getSellerIdFromCar(currentCar);

        if (!currentUser) {
            window.location.href = `login.html?redirect=${encodeURIComponent(messagesUrl)}`;
            return;
        }

        if (!sellerId) {
            alert('Den här annonsen är inte kompatibel med nya chattsystemet. Publicera en ny annons via sell.html så sparas sellerId korrekt.');
            return;
        }

        if (sellerId === currentUser.uid) {
            alert('Du kan inte kontakta din egen annons från samma konto. Testa med ett annat köparkonto.');
            return;
        }

        window.location.href = messagesUrl;
    }

    function buildMessagesUrl(car, titleText = 'Bilannons') {
        const params = new URLSearchParams();
        const sellerId = getSellerIdFromCar(car);
        params.set('carId', carId);
        if (sellerId) params.set('sellerId', sellerId);
        params.set('title', safeString(`${titleText} ${car.year || ''}`.trim()));
        const sellerName = safeString(car.sellerName || '');
        const sellerEmail = safeString(car.sellerEmail || '');
        if (sellerName) params.set('sellerName', sellerName);
        if (sellerEmail) params.set('sellerEmail', sellerEmail);
        return `messages.html?${params.toString()}`;
    }

    function getSellerIdFromCar(car) {
        if (!car) return '';
        return cleanId(car.sellerId);
    }

    function galleryAnchor(src, className = '', alt = 'Fordonsbild') {
        const safeSrc = isSafeImageURL(src) ? src : PLACEHOLDER_IMAGE;
        return `<a href="${escapeHTML(safeSrc)}" data-pswp-width="1920" data-pswp-height="1280" target="_blank" rel="noopener" class="${escapeHTML(className)}"><img src="${escapeHTML(safeSrc)}" alt="${escapeHTML(alt)}" loading="lazy" onerror="this.onerror=null;this.src='${PLACEHOLDER_IMAGE}';"></a>`;
    }

    function specBox(label, value) {
        return `<div class="spec-box"><span class="spec-label">${escapeHTML(label)}</span><span>${escapeHTML(valueOrDash(value))}</span></div>`;
    }

    function initLightbox() {
        if (lightboxInstance) lightboxInstance.destroy();
        lightboxInstance = new PhotoSwipeLightbox({
            gallery: '#mainGallery',
            children: 'a',
            pswpModule: () => import('https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.esm.min.js'),
            arrowPrev: true,
            arrowNext: true,
            zoom: true,
            close: true,
            counter: true
        });
        lightboxInstance.init();
    }

    function renderState(message, linkText, linkHref) {
        app.innerHTML = `<div class="state-card">${escapeHTML(message)}<br><br><a href="${escapeHTML(linkHref)}">${escapeHTML(linkText)}</a></div>`;
    }

    function cleanId(value) {
        const id = String(value || '').trim();
        return /^[A-Za-z0-9_-]{6,120}$/.test(id) ? id : '';
    }

    function safeString(value) {
        return String(value ?? '').replace(/[\u0000-\u001F\u007F]/g, ' ').trim();
    }

    function valueOrDash(value) {
        const cleaned = safeString(value);
        return cleaned ? cleaned : '-';
    }

    function formatNumber(value) {
        const number = Number(value);
        if (!Number.isFinite(number)) return valueOrDash(value);
        return number.toLocaleString('sv-SE');
    }

    function escapeHTML(value) {
        return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }

    function isSafeImageURL(value) {
        const url = String(value || '').trim();
        if (!url) return false;
        if (url === PLACEHOLDER_IMAGE) return true;
        if (/^(javascript|data|vbscript):/i.test(url)) return false;
        try {
            const parsed = new URL(url, window.location.origin);
            return ['https:', 'http:'].includes(parsed.protocol) || parsed.origin === window.location.origin;
        } catch {
            return /^[./A-Za-z0-9_\-/]+\.(jpg|jpeg|png|webp|avif)$/i.test(url);
        }
    }

    init();
</script>
</body>
</html>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // الحصول على معرف السيارة من الرابط
    const carId = new URLSearchParams(window.location.search).get('id');
    let user = null;
    let car = null;

    // التأكد من حالة تسجيل الدخول
    onAuthStateChanged(auth, u => {
        user = u;
        loadCarData(); // جلب بيانات السيارة فور التأكد من المستخدم
    });

    // دالة جلب بيانات السيارة من قاعدة البيانات
    async function loadCarData() {
        if (!carId) return;
        const snap = await getDoc(doc(db, "cars", carId));
        if (snap.exists()) {
            car = snap.data();
            // هنا يتم عرض البيانات في الصفحة (يمكنك إضافة كود العرض هنا)
        }
    }

    // الدالة التي أرسلتها أنت (مدمجة ومنظمة)
    window.sendMsg = async () => {
        if (!user) {
            alert("Logga in först!");
            return;
        }
        
        const inputField = document.getElementById('msg');
        const text = inputField.value.trim();
        if (!text) return;

        const btn = document.getElementById('cBtn');
        btn.disabled = true;
        btn.innerText = "Skickar...";

        // معرف الغرفة: يجمع المشتري والبائع والسيارة لضمان عدم التكرار
        const chatId = `${user.uid}_${car.sellerId}_${carId}`;

        try {
            await addDoc(collection(db, "messages"), {
                chatId: chatId,
                participants: [user.uid, car.sellerId], // هذا هو مفتاح ظهور الرسالة في "Min Sida"
                carId: carId,
                carTitle: car.brand + " " + car.model,
                carImage: car.images[0],
                senderId: user.uid,
                senderName: user.email.split('@')[0],
                recipientId: car.sellerId,
                message: text,
                timestamp: serverTimestamp()
            });
            
            // التوجه إلى صفحة المراسلات فوراً بعد الإرسال
            window.location.href = "my-account.html?chat=" + chatId;
        } catch (e) {
            alert("Feil: " + e.message);
            btn.disabled = false;
            btn.innerText = "Starta chatt";
        }
    };
</script>

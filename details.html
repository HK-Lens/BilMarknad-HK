<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Detaljer | BILHK</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header><a href="index.html" class="logo">BIL<span>HK</span></a></header>
<main id="detailsContent" class="container">Laddar uppgifter...</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const carId = new URLSearchParams(window.location.search).get('id');
    let user, car;

    onAuthStateChanged(auth, u => { user = u; load(); });

    async function load() {
        const snap = await getDoc(doc(db, "cars", carId));
        if (!snap.exists()) return;
        car = snap.data();
        document.getElementById('detailsContent').innerHTML = `
            <img src="${car.images[0]}" class="main-img">
            <div class="info-card">
                <h1>${car.brand} ${car.model}</h1>
                <p class="price-big">${car.price} kr</p>
                <textarea id="msgInput" placeholder="Hej, är bilen kvar?"></textarea>
                <button onclick="startChat()" id="sendBtn" class="btn-primary">Skicka meddelande</button>
            </div>`;
    }

    window.startChat = async () => {
        if (!user) return alert("Logga in!");
        const txt = document.getElementById('msgInput').value;
        const chatId = `${user.uid}_${car.sellerId}_${carId}`;
        await addDoc(collection(db, "messages"), {
            chatId, participants: [user.uid, car.sellerId],
            carId, carTitle: car.brand, carImage: car.images[0],
            senderId: user.uid, senderName: user.email.split('@')[0],
            message: txt, timestamp: serverTimestamp()
        });
        location.href = `my-account.html?chat=${chatId}`;
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Fordonsdetaljer på BILHK.">
    <title>Fordonsdetaljer | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root{--primary:#f58220;--primary-hover:#e07210;--dark:#0f172a;--bg:#f8fafc;--border:#e2e8f0;--white:#fff;--gray:#64748b;--danger:#ef4444;--green:#10b981;}
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif}body{background:var(--bg);color:var(--dark);min-height:100vh;display:flex;flex-direction:column}header{background:white;border-bottom:1px solid var(--border);padding:15px 5%;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:1000}.logo{font-size:26px;font-weight:900;color:var(--dark);text-decoration:none}.logo span{color:var(--primary)}.nav{display:flex;gap:18px;align-items:center}.nav a{text-decoration:none;font-weight:800;color:var(--dark);font-size:14px}.sell{background:var(--primary);color:white!important;padding:8px 18px;border-radius:999px}.container{max-width:1200px;margin:35px auto;padding:0 20px;display:grid;grid-template-columns:1fr;gap:28px;width:100%;flex:1}@media(min-width:900px){.container{grid-template-columns:2fr 1fr}}.card{background:white;border:1px solid var(--border);border-radius:22px;box-shadow:0 10px 30px rgba(0,0,0,.025);overflow:hidden}.pad{padding:28px}.gallery{position:relative}.main-img{width:100%;height:460px;object-fit:cover;display:block}.thumbs{display:flex;gap:10px;padding:14px;background:var(--bg);overflow-x:auto}.thumb{width:86px;height:62px;border-radius:10px;object-fit:cover;border:2px solid transparent;cursor:pointer}.thumb.active{border-color:var(--primary)}.sold{position:absolute;top:15px;left:15px;background:var(--danger);color:white;font-weight:900;padding:8px 14px;border-radius:8px}.topline{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;margin-bottom:22px}.title{font-size:30px;font-weight:900}.price{font-size:26px;font-weight:900;color:var(--primary)}.save-btn{border:1px solid var(--border);background:var(--bg);padding:10px 14px;border-radius:12px;font-weight:900;cursor:pointer}.save-btn.saved{background:#fee2e2;color:var(--danger);border-color:#fca5a5}.specs{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:22px 0}@media(min-width:650px){.specs{grid-template-columns:repeat(4,1fr)}}.spec{background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center}.spec span{display:block;color:var(--gray);font-size:11px;font-weight:900;text-transform:uppercase}.spec strong{display:block;margin-top:5px;font-size:14px}.desc-title{font-size:18px;font-weight:900;margin:25px 0 12px;border-bottom:2px solid var(--bg);padding-bottom:10px}.desc{white-space:pre-wrap;color:#334155;line-height:1.7;font-size:15px}.features{display:flex;flex-wrap:wrap;gap:10px}.tag{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-weight:700;font-size:13px}.side{display:flex;flex-direction:column;gap:18px}.sticky{position:sticky;top:90px}.seller-row{display:flex;align-items:center;gap:14px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)}.avatar{width:54px;height:54px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900}.seller-name{font-size:17px;font-weight:900}.small{color:var(--gray);font-size:13px;font-weight:600}.contact-line{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f1f5f9;color:#334155;font-size:14px}.contact-line i{width:20px;color:var(--primary)}.msg{width:100%;min-height:110px;border:1px solid var(--border);background:var(--bg);border-radius:14px;padding:14px;outline:none;resize:vertical;margin:14px 0;font-size:14px}.msg:focus{border-color:var(--primary);background:white}.btn{width:100%;border:none;border-radius:14px;padding:15px;font-size:14px;font-weight:900;cursor:pointer;text-decoration:none;display:flex;justify-content:center;align-items:center;gap:8px}.btn-primary{background:var(--primary);color:white}.btn-primary:hover{background:var(--primary-hover)}.btn-dark{background:var(--dark);color:white}.btn-light{background:white;color:var(--dark);border:1px solid var(--border);margin-top:10px}.notice{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;padding:14px;border-radius:14px;font-size:13px;font-weight:700;line-height:1.5}.loading{grid-column:1/-1;text-align:center;padding:70px 20px;color:var(--gray);font-weight:800}footer{text-align:center;color:#94a3b8;font-size:12px;padding:30px;background:white;border-top:1px solid var(--border)}@media(max-width:600px){.main-img{height:310px}.topline{flex-direction:column}.title{font-size:24px}.pad{padding:22px}}
    </style>
</head>
<body>
<header><a href="index.html" class="logo">BIL<span>HK</span></a><div class="nav"><a href="index.html"><i class="fa-solid fa-house"></i> Hem</a><a href="sell.html" class="sell">Sälj din bil</a><span id="authBox"></span></div></header>
<div class="container" id="app"><div class="loading"><i class="fa-solid fa-spinner fa-spin" style="font-size:30px;color:var(--primary)"></i><p style="margin-top:12px">Laddar annons...</p></div></div>
<footer>© 2026 BILHK. Kontrollera alltid fordon och säljare innan köp.</footer>
<script type="module">
import { auth, db } from './firebase-config.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { doc,getDoc,collection,query,where,getDocs,addDoc,updateDoc,increment,serverTimestamp,arrayUnion,arrayRemove,setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
const carId=new URLSearchParams(location.search).get('id');let currentUser=null,carData=null,sellerData=null,isSaved=false;
const $=id=>document.getElementById(id);function esc(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}function money(v){return Number(v||0).toLocaleString('sv-SE')}function img(u){return esc(u||'placeholder.jpg')}function val(...xs){for(const x of xs){if(x!==undefined&&x!==null&&String(x).trim()!=='')return x}return ''}
function publicAllowed(){return sellerData?.publicProfile===true||sellerData?.sellerProfilePublic===true||sellerData?.allowPublicContact===true}
function showField(field){if(!publicAllowed())return false;const key='show'+field.charAt(0).toUpperCase()+field.slice(1);return sellerData?.[key]===true||sellerData?.publicProfile===true}
onAuthStateChanged(auth,async user=>{currentUser=user;$('authBox').innerHTML=user?`<a href="dashboard.html" style="color:var(--primary);font-weight:900;text-decoration:none"><i class="fa-solid fa-user"></i> Mitt konto</a>`:`<a href="login.html" style="font-weight:800;text-decoration:none;color:var(--dark)">Logga in</a>`;await loadAd()});
async function loadAd(){if(!carId){$('app').innerHTML='<div class="loading">Annons-ID saknas.</div>';return}try{const carRef=doc(db,'cars',carId);const snap=await getDoc(carRef);if(!snap.exists()){$('app').innerHTML='<div class="loading">Annonsen hittades inte.</div>';return}carData=snap.data();const owner=currentUser&&currentUser.uid===carData.sellerId;if(!owner){try{await updateDoc(carRef,{views:increment(1)})}catch(e){}}
if(carData.sellerId){const s=await getDoc(doc(db,'users',carData.sellerId));sellerData=s.exists()?s.data():{name:'Okänd säljare'}}else sellerData={name:'Okänd säljare'};
if(currentUser){const u=await getDoc(doc(db,'users',currentUser.uid));isSaved=!!(u.exists()&&Array.isArray(u.data().savedCars)&&u.data().savedCars.includes(carId))}render()}catch(e){console.error(e);$('app').innerHTML='<div class="loading">Kunde inte ladda annonsen.</div>'}}
function render(){const owner=currentUser&&currentUser.uid===carData.sellerId;const images=Array.isArray(carData.images)&&carData.images.length?carData.images:['placeholder.jpg'];const title=esc(`${val(carData.brand)} ${val(carData.model)}`.trim()||'Annons');const status=carData.status==='sold';const sellerName=esc(val(sellerData.companyName,sellerData.name,sellerData.email,'Säljare'));const initial=sellerName.charAt(0).toUpperCase()||'S';const features=Array.isArray(carData.features)?carData.features:[];const contactHtml=publicAllowed()?`
${showField('phone')&&sellerData.phone?`<div class="contact-line"><i class="fa-solid fa-phone"></i><span>${esc(sellerData.phone)}</span></div>`:''}
${showField('email')&&(sellerData.contactEmail||sellerData.email)?`<div class="contact-line"><i class="fa-solid fa-envelope"></i><span>${esc(sellerData.contactEmail||sellerData.email)}</span></div>`:''}
${showField('website')&&sellerData.website?`<div class="contact-line"><i class="fa-solid fa-globe"></i><a href="${esc(sellerData.website)}" target="_blank" rel="noopener" style="color:var(--dark);font-weight:800">${esc(sellerData.website)}</a></div>`:''}
${showField('address')&&sellerData.address?`<div class="contact-line"><i class="fa-solid fa-location-dot"></i><span>${esc(sellerData.address)}</span></div>`:''}
<a class="btn btn-light" href="seller.html?id=${encodeURIComponent(carData.sellerId)}"><i class="fa-solid fa-store"></i> Visa säljarens sida</a>`:`<div class="notice"><i class="fa-solid fa-lock"></i> Säljaren har inte gjort sin offentliga profilsida eller kontaktuppgifter synliga ännu.</div>`;
$('app').innerHTML=`<main class="main"><div class="card gallery">${status?'<div class="sold">SÅLD</div>':''}<img src="${img(images[0])}" id="mainImage" class="main-img" alt="${title}"><div class="thumbs">${images.map((u,i)=>`<img src="${img(u)}" class="thumb ${i===0?'active':''}" onclick="changeImg('${img(u)}',this)" alt="Bild ${i+1}">`).join('')}</div></div><div class="card pad"><div class="topline"><div><h1 class="title">${title}</h1><p class="small">Reg.nr: <b>${esc(val(carData.regNr,carData.regNo,'Okänd'))}</b></p></div><div style="text-align:right"><div class="price">${money(carData.price)} kr</div>${!owner?`<button id="saveAdBtn" class="save-btn ${isSaved?'saved':''}"><i class="${isSaved?'fa-solid':'fa-regular'} fa-heart"></i> ${isSaved?'Sparad':'Spara'}</button>`:''}</div></div><div class="specs">${spec('calendar','Årsmodell',carData.year)}${spec('gauge','Miltal',`${val(carData.mileage,carData.mil,0)} mil`)}${spec('gas-pump','Drivmedel',val(carData.fuel,carData.fuelType,'-'))}${spec('gear','Växellåda',val(carData.gear,carData.transmission,'-'))}${spec('car-side','Karosseri',val(carData.karosseri,carData.body,carData.carType,'-'))}${spec('truck-ramp-box','Drivning',val(carData.drive,'-'))}${spec('palette','Färg',val(carData.color,'-'))}${spec('horse-head','Hästkrafter',carData.hp?carData.hp+' hk':'-')}</div><h3 class="desc-title">Beskrivning</h3><div class="desc">${esc(carData.description||'Ingen beskrivning angiven.')}</div><h3 class="desc-title">Utrustning</h3><div class="features">${features.length?features.map(f=>`<span class="tag"><i class="fa-solid fa-check" style="color:var(--primary)"></i> ${esc(f)}</span>`).join(''):'<span class="small">Ingen utrustning listad.</span>'}</div></div></main><aside class="side"><div class="card pad sticky"><h3 class="desc-title" style="margin-top:0">${owner?'Din annons':'Kontakta säljaren'}</h3><div class="seller-row"><div class="avatar">${initial}</div><div><div class="seller-name">${sellerName}</div><div class="small">${esc(val(sellerData.userType,sellerData.type,'Säljare'))}</div></div></div>${owner?`<div class="contact-line"><i class="fa-regular fa-eye"></i><span>Visningar: <b>${carData.views||0}</b></span></div><div class="contact-line"><i class="fa-solid fa-heart"></i><span>Sparade: <b>${carData.saves||0}</b></span></div><a class="btn btn-dark" href="dashboard.html?tab=messages&carId=${encodeURIComponent(carId)}"><i class="fa-regular fa-comments"></i> Svara på meddelanden</a><a class="btn btn-light" href="edit-car.html?id=${encodeURIComponent(carId)}"><i class="fa-solid fa-pen"></i> Redigera annons</a>`:`${contactHtml}<textarea id="msgBody" class="msg" placeholder="Hej! Jag är intresserad av ${title}..."></textarea><button id="sendBtn" class="btn btn-primary"><i class="fa-solid fa-paper-plane"></i> Skicka meddelande</button>`}</div></aside>`;window.changeImg=(url,el)=>{const main=$('mainImage');if(main)main.src=url;document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('active'));el.classList.add('active')};if(!owner){const save=$('saveAdBtn');if(save)save.onclick=toggleSave;const send=$('sendBtn');if(send)send.onclick=sendMessage}}
function spec(icon,label,value){return`<div class="spec"><i class="fa-solid fa-${icon}"></i><span>${label}</span><strong>${esc(value||'-')}</strong></div>`}
async function toggleSave(){if(!currentUser){Swal.fire('Logga in krävs','Du måste logga in för att spara annonser.','info').then(()=>location.href='login.html');return}try{const u=doc(db,'users',currentUser.uid),c=doc(db,'cars',carId);if(isSaved){await setDoc(u,{savedCars:arrayRemove(carId)},{merge:true});await updateDoc(c,{saves:increment(-1)});isSaved=false}else{await setDoc(u,{savedCars:arrayUnion(carId),email:currentUser.email},{merge:true});await updateDoc(c,{saves:increment(1)});isSaved=true}render()}catch(e){console.error(e);Swal.fire('Fel','Kunde inte uppdatera sparade annonser.','error')}}
async function sendMessage(){if(!currentUser){Swal.fire('Logga in krävs','Du måste logga in för att skicka meddelanden.','warning').then(()=>location.href='login.html');return}if(currentUser.uid===carData.sellerId)return;const input=$('msgBody'),btn=$('sendBtn');const text=input.value.trim();if(!text){Swal.fire('Tomt','Skriv ett meddelande först.','warning');return}btn.disabled=true;btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Skickar...';try{const buyerSnap=await getDoc(doc(db,'users',currentUser.uid));const buyer=buyerSnap.exists()?buyerSnap.data():{};const buyerName=val(buyer.name,buyer.companyName,currentUser.email,'Köpare');const sellerName=val(sellerData.companyName,sellerData.name,sellerData.email,'Säljare');const existing=query(collection(db,'chats'),where('carId','==',carId),where('participants','array-contains',currentUser.uid));const ch=await getDocs(existing);let chatId=null;ch.docs.forEach(d=>{const data=d.data();if(Array.isArray(data.participants)&&data.participants.includes(carData.sellerId))chatId=d.id});if(!chatId){const newChat=await addDoc(collection(db,'chats'),{carId,carTitle:`${carData.brand||''} ${carData.model||''}`.trim(),carImage:carData.images?.[0]||'placeholder.jpg',sellerId:carData.sellerId,buyerId:currentUser.uid,sellerName,buyerName,participants:[currentUser.uid,carData.sellerId],users:[{id:currentUser.uid,name:buyerName,role:'buyer'},{id:carData.sellerId,name:sellerName,role:'seller'}],lastMessage:'',lastSenderId:null,unreadFor:[carData.sellerId],createdAt:serverTimestamp(),updatedAt:serverTimestamp()});chatId=newChat.id}await addDoc(collection(db,`chats/${chatId}/messages`),{text,senderId:currentUser.uid,senderName:buyerName,createdAt:serverTimestamp()});await updateDoc(doc(db,'chats',chatId),{lastMessage:text,lastSenderId:currentUser.uid,lastSenderName:buyerName,unreadFor:arrayUnion(carData.sellerId),updatedAt:serverTimestamp()});try{await updateDoc(doc(db,'cars',carId),{messagesCount:increment(1)})}catch(e){}input.value='';Swal.fire('Skickat!','Meddelandet har skickats.','success')}catch(e){console.error(e);Swal.fire('Fel','Kunde inte skicka meddelandet.','error')}finally{btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-paper-plane"></i> Skicka meddelande'}}
</script>
</body>
</html>

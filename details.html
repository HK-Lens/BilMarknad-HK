<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fordonsdetaljer | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background: white; padding: 15px 6%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { text-decoration: none; font-size: 24px; font-weight: 900; color: var(--dark); }
        .logo span { color: var(--primary); }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 1.6fr 1fr; gap: 30px; flex: 1; }

        /* --- نظام معرض الصور المطور --- */
        .gallery-wrapper { position: relative; background: #000; border-radius: 20px; overflow: hidden; height: 500px; display: flex; align-items: center; justify-content: center; }
        .main-slide { width: 100%; height: 100%; object-fit: contain; cursor: zoom-in; transition: 0.3s; }
        
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.9); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; font-weight: bold; z-index: 10; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .nav-btn:hover { background: var(--primary); color: white; }
        .prev-btn { left: 20px; }
        .next-btn { right: 20px; }

        .thumb-container { display: flex; gap: 10px; margin-top: 15px; overflow-x: auto; padding-bottom: 5px; }
        .thumb-img { width: 100px; height: 70px; object-fit: cover; border-radius: 10px; cursor: pointer; border: 3px solid transparent; opacity: 0.6; transition: 0.3s; }
        .thumb-img.active { border-color: var(--primary); opacity: 1; }

        /* نافذة التكبير (Zoom Modal) */
        .zoom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .zoom-modal img { max-width: 95%; max-height: 90%; border-radius: 10px; }
        .close-zoom { position: absolute; top: 30px; right: 40px; color: white; font-size: 40px; cursor: pointer; font-weight: 900; }

        /* --- باقي تفاصيل الصفحة --- */
        .price-tag { font-size: 38px; font-weight: 900; margin: 25px 0 10px; }
        .car-heading { font-size: 24px; color: #64748b; margin-bottom: 30px; font-weight: 600; }

        .specs-section { background: white; border-radius: 20px; padding: 30px; border: 1px solid var(--border); margin-bottom: 20px; }
        .specs-section h2 { font-size: 18px; margin-bottom: 20px; border-bottom: 3px solid var(--primary); display: inline-block; padding-bottom: 5px; }
        
        .tech-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .tech-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
        .tech-label { color: #94a3b8; font-size: 14px; }
        .tech-value { font-weight: 700; font-size: 14px; }

        .contact-sidebar { position: sticky; top: 100px; }
        .seller-box { background: var(--dark); color: white; padding: 30px; border-radius: 24px; text-align: center; }
        .btn-call { width: 100%; padding: 16px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: 800; cursor: pointer; margin-top: 15px; font-size: 16px; }

        footer { text-align: center; padding: 40px 6%; background-color: white; border-top: 1px solid var(--border); color: #64748b; font-size: 13px; margin-top: 40px; }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
            .gallery-wrapper { height: 350px; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
</header>

<div class="container" id="detailsPage">
    </div>

<div id="zoomModal" class="zoom-modal" onclick="this.style.display='none'">
    <span class="close-zoom">&times;</span>
    <img id="zoomedImg">
</div>

<footer>
    <p>&copy; 2026 BilMarknad-HK. Alla rättigheter förbehållna.</p>
    <div style="margin-top: 10px;">
        <a href="terms.html" style="color: #f58220; text-decoration: none; font-weight: 700;">Användarvillkor & Säkerhet</a>
    </div>
</footer>

<script type="module">
    import { db } from './firebase-config.js';
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const carId = new URLSearchParams(window.location.search).get('id');
    let images = [];
    let currentIndex = 0;

    async function loadData() {
        if (!carId) return;
        const snap = await getDoc(doc(db, "cars", carId));
        
        if (snap.exists()) {
            const c = snap.data();
            images = c.images || ['placeholder.jpg'];
            
            document.getElementById('detailsPage').innerHTML = `
                <div class="main-content">
                    <div class="gallery-wrapper">
                        <button class="nav-btn prev-btn" id="prevBtn">❮</button>
                        <img src="${images[0]}" class="main-slide" id="activeImg">
                        <button class="nav-btn next-btn" id="nextBtn">❯</button>
                    </div>
                    
                    <div class="thumb-container" id="thumbTrack">
                        ${images.map((img, i) => `<img src="${img}" class="thumb-img ${i===0?'active':''}" data-index="${i}">`).join('')}
                    </div>

                    <div class="price-tag">${Number(c.price).toLocaleString()} kr</div>
                    <h1 class="car-heading">${c.brand} ${c.model} - ${c.year}</h1>

                    <div class="specs-section">
                        <h2>Motor & Prestanda</h2>
                        <div class="tech-grid">
                            <div class="tech-item"><span class="tech-label">Drivmedel</span><span class="tech-value">${c.fuelType || '-'}</span></div>
                            <div class="tech-item"><span class="tech-label">Växellåda</span><span class="tech-value">${c.transmission || '-'}</span></div>
                            <div class="tech-item"><span class="tech-label">Kaross</span><span class="tech-value">${c.bodyType || '-'}</span></div>
                            <div class="tech-item"><span class="tech-label">Årsmodell</span><span class="tech-value">${c.year || '-'}</span></div>
                        </div>
                    </div>

                    <div class="specs-section">
                        <h2>Fordonsdata & Mått</h2>
                        <div class="tech-grid">
                            <div class="tech-item"><span class="tech-label">Miltal</span><span class="tech-value">${c.mileage} mil</span></div>
                            <div class="tech-item"><span class="tech-label">Svensksåld</span><span class="tech-value">${c.swedishSold ? 'Ja' : 'Nej'}</span></div>
                            <div class="tech-item"><span class="tech-label">Färg</span><span class="tech-value">${c.color || '-'}</span></div>
                        </div>
                    </div>

                    <div class="specs-section">
                        <h2>Beskrivning</h2>
                        <p style="line-height:1.7; white-space: pre-line;">${c.description || 'Ingen beskrivning.'}</p>
                    </div>
                </div>

                <div class="contact-sidebar">
                    <div class="seller-box">
                        <h3>Intresserad?</h3>
                        <p style="font-size:14px; color:#94a3b8; margin:10px 0;">Kontakta säljaren direkt för mer information.</p>
                        <div style="font-size:24px; font-weight:900; margin:15px 0; color:#fff;">📞 ${c.phone || 'Dolt nummer'}</div>
                        <button class="btn-call" id="msgBtn">Skicka meddelande</button>
                    </div>
                </div>
            `;

            setupGallery();
            document.getElementById('msgBtn').onclick = () => window.location.href = `mailto:${c.sellerEmail}`;
        }
    }

    function setupGallery() {
        const activeImg = document.getElementById('activeImg');
        const thumbs = document.querySelectorAll('.thumb-img');
        const zoomModal = document.getElementById('zoomModal');
        const zoomedImg = document.getElementById('zoomedImg');

        const updateImage = (index) => {
            currentIndex = index;
            activeImg.src = images[currentIndex];
            thumbs.forEach((t, i) => t.classList.toggle('active', i === currentIndex));
        };

        // أزرار التنقل
        document.getElementById('prevBtn').onclick = () => {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            updateImage(currentIndex);
        };

        document.getElementById('nextBtn').onclick = () => {
            currentIndex = (currentIndex + 1) % images.length;
            updateImage(currentIndex);
        };

        // الضغط على الصور المصغرة
        thumbs.forEach(thumb => {
            thumb.onclick = () => updateImage(parseInt(thumb.dataset.index));
        });

        // ميزة التكبير
        activeImg.onclick = () => {
            zoomedImg.src = activeImg.src;
            zoomModal.style.display = 'flex';
        };
    }

    loadData();
</script>
</body>
</html>

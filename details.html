<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fordonsdetaljer | BILHK Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --white: #ffffff; --border: #e2e8f0; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--dark); padding-bottom: 50px; }
        header { background: white; padding: 15px 6%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 900px) { .container { grid-template-columns: 1.6fr 1fr; } }
        .gallery-card { background: white; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); }
        .main-img { width: 100%; height: 350px; object-fit: contain; background: #000; }
        .thumb-strip { display: flex; gap: 10px; padding: 15px; overflow-x: auto; }
        .thumb-strip img { width: 80px; height: 60px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 2px solid transparent; }
        .thumb-strip img.active { border-color: var(--primary); }
        .price-card { background: white; padding: 25px; border-radius: 20px; border: 1px solid var(--border); }
        .price-val { font-size: 36px; font-weight: 900; color: var(--primary); }
        .btn-main { width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; font-size: 16px; transition: 0.3s; }
        .btn-contact { background: var(--dark); color: white; }
        .btn-fav { background: transparent; border: 2px solid var(--border); color: var(--dark); }
        .btn-fav.active { color: var(--primary); border-color: var(--primary); background: #fff7ed; }
        .specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .spec-box { background: #f1f5f9; padding: 15px; border-radius: 12px; text-align: center; font-size: 14px; }
    </style>
</head>
<body>
<header>
    <a href="index.html" style="text-decoration:none; font-size:22px; font-weight:900; color:var(--dark);">BIL<span style="color:var(--primary);">HK</span></a>
</header>
<div class="container">
    <div>
        <div class="gallery-card">
            <img id="activeImg" src="placeholder.jpg" class="main-img">
            <div id="thumbList" class="thumb-strip"></div>
        </div>
        <div style="background:white; padding:30px; border-radius:20px; margin-top:20px; border:1px solid var(--border);">
            <h2 style="font-weight:900; margin-bottom:15px;">Beskrivning</h2>
            <p id="carDesc" style="white-space:pre-line; color:#475569; line-height:1.6;"></p>
        </div>
    </div>
    <div class="sidebar">
        <div class="price-card">
            <div id="carPrice" class="price-val">0 kr</div>
            <h1 id="carTitle" style="font-size:22px; font-weight:800; margin:10px 0 20px 0;">Laddar...</h1>
            <div class="specs-grid">
                <div class="spec-box"><span>År</span><br><strong id="sYear">-</strong></div>
                <div class="spec-box"><span>Mil</span><br><strong id="sMil">-</strong></div>
            </div>
            <button id="chatBtn" class="btn-main btn-contact"><i class="fa-solid fa-paper-plane"></i> Kontakta Säljaren</button>
            <button id="favBtn" class="btn-main btn-fav"><i class="fa-regular fa-heart" id="fIcon"></i> <span id="fText">Spara</span></button>
            <div style="background:#fff7ed; padding:15px; border-radius:12px; font-size:12px; color:#9a3412; border:1px solid #ffedd5; margin-top: 15px;"><strong>Säkerhet:</strong> Ingen betalning sker via hemsidan.</div>
        </div>
    </div>
</div>
<script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, getDoc, setDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const carId = new URLSearchParams(window.location.search).get('id');
    let carData = null;

    async function loadCar() {
        if (!carId) return;
        const snap = await getDoc(doc(db, "cars", carId));
        if (snap.exists()) {
            carData = snap.data();
            document.getElementById('carTitle').innerText = `${carData.brand} ${carData.model}`;
            document.getElementById('carPrice').innerText = `${Number(carData.price).toLocaleString()} kr`;
            document.getElementById('sYear').innerText = carData.year;
            document.getElementById('sMil').innerText = carData.mileage;
            document.getElementById('carDesc').innerText = carData.description;
            if (carData.images?.length > 0) {
                const main = document.getElementById('activeImg');
                const list = document.getElementById('thumbList');
                main.src = carData.images[0];
                carData.images.forEach((url, i) => {
                    const img = document.createElement('img'); img.src = url;
                    if (i === 0) img.classList.add('active');
                    img.onclick = () => { main.src = url; document.querySelectorAll('.thumb-strip img').forEach(t=>t.classList.remove('active')); img.classList.add('active'); };
                    list.appendChild(img);
                });
            }
            checkFavStatus();
        }
    }

    async function checkFavStatus() {
        if (!auth.currentUser || !carId) return;
        const favRef = doc(db, "favorites", `${auth.currentUser.uid}_${carId}`);
        const snap = await getDoc(favRef);
        const fIcon = document.getElementById('fIcon');
        const favBtn = document.getElementById('favBtn');
        const fText = document.getElementById('fText');
        if (snap.exists()) { fIcon.className = 'fa-solid fa-heart'; favBtn.classList.add('active'); fText.innerText = "Sparad"; }
        else { fIcon.className = 'fa-regular fa-heart'; favBtn.classList.remove('active'); fText.innerText = "Spara"; }
    }

    document.getElementById('favBtn').onclick = async () => {
        if (!auth.currentUser) return Swal.fire('Info', 'Logga in först', 'info');
        const favRef = doc(db, "favorites", `${auth.currentUser.uid}_${carId}`);
        const snap = await getDoc(favRef);
        try {
            if (snap.exists()) { await deleteDoc(favRef); }
            else { await setDoc(favRef, { userId: auth.currentUser.uid, carId: carId, brand: carData.brand, model: carData.model, price: carData.price, image: carData.images[0] || '', createdAt: serverTimestamp() }); }
            checkFavStatus();
        } catch (e) { console.error(e); }
    };

    document.getElementById('chatBtn').onclick = async () => {
        if (!auth.currentUser) return Swal.fire('Info', 'Logga in först', 'info');
        const roomId = [auth.currentUser.uid, carData.sellerId].sort().join('_') + '_' + carId;
        const buyerName = auth.currentUser.displayName || auth.currentUser.email.split('@')[0];
        await setDoc(doc(db, "chats", roomId), { carId, carName: carData.brand, participants: [auth.currentUser.uid, carData.sellerId], sellerId: carData.sellerId, buyerName, updatedAt: serverTimestamp() }, { merge: true });
        localStorage.setItem('targetChat', roomId);
        window.location.href = `messages.html?chat=${roomId}`;
    };

    onAuthStateChanged(auth, (user) => { loadCar(); });
</script>
</body>
</html>

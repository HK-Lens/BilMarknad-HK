<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fordonsdetaljer | BILHK</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { 
            --primary: #f58220; 
            --primary-hover: #e07210;
            --dark: #0f172a; 
            --bg: #f8fafc; 
            --border: #e2e8f0; 
            --white: #ffffff;
            --gray-text: #64748b;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--dark); display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        header { background: var(--white); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .logo-box { display: flex; align-items: center; gap: 20px; }
        .logo { text-decoration: none; font-weight: 900; color: var(--dark); font-size: 26px; letter-spacing: -0.5px;}
        .logo span { color: var(--primary); }
        .btn-home { text-decoration: none; color: var(--dark); font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        .nav-links { display: flex; align-items: center; gap: 20px; }
        .btn-sell { background: var(--primary); color: white !important; padding: 8px 20px; border-radius: 50px; text-decoration: none; font-weight: 600; font-size: 13px; }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr; gap: 30px; flex: 1; width: 100%; }
        @media (min-width: 900px) { .container { grid-template-columns: 2fr 1fr; } }
        
        .main-col { display: flex; flex-direction: column; gap: 25px; }
        .gallery { background: var(--white); border-radius: 20px; overflow: hidden; border: 1px solid var(--border); }
        .main-img { width: 100%; height: 450px; object-fit: cover; }
        .thumb-list { display: flex; gap: 10px; padding: 15px; overflow-x: auto; background: var(--bg); }
        .thumb { width: 80px; height: 60px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .thumb:hover { opacity: 0.8; }
        .thumb.active { border-color: var(--primary); }
        
        .info-card { background: var(--white); padding: 30px; border-radius: 20px; border: 1px solid var(--border); }
        .car-title { font-size: 28px; font-weight: 900; margin-bottom: 5px; }
        .car-price { font-size: 24px; font-weight: 900; color: var(--primary); margin-bottom: 0; }
        
        .btn-save-ad { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 15px; font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px; color: var(--dark); }
        .btn-save-ad:hover { background: white; border-color: var(--primary); }
        .btn-save-ad.saved { color: #ef4444; border-color: #fca5a5; background: #fee2e2; }

        .specs-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 25px; }
        @media (min-width: 600px) { .specs-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1024px) { .specs-grid { grid-template-columns: repeat(4, 1fr); } }
        .spec-item { background: var(--bg); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
        .spec-item i { color: var(--gray-text); font-size: 18px; margin-bottom: 8px; display: block; }
        .spec-item span { font-size: 11px; font-weight: 800; color: var(--gray-text); text-transform: uppercase; }
        .spec-item strong { display: block; font-size: 13px; font-weight: 800; margin-top: 4px; color: var(--dark); }

        .desc-title { font-size: 18px; font-weight: 900; margin-bottom: 15px; border-bottom: 2px solid var(--light); padding-bottom: 10px; }
        .description { font-size: 15px; line-height: 1.6; color: #334155; white-space: pre-wrap; }
        
        .features-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
        .feature-tag { background: var(--bg); padding: 8px 12px; border-radius: 8px; font-size: 13px; font-weight: 600; border: 1px solid var(--border); color: var(--dark); display: flex; align-items: center; gap: 6px;}
        
        .side-col { display: flex; flex-direction: column; gap: 20px; }
        .contact-card { background: var(--white); padding: 25px; border-radius: 20px; border: 1px solid var(--border); position: sticky; top: 90px; }
        .contact-title { font-size: 18px; font-weight: 900; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        .seller-info { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        .seller-avatar { width: 50px; height: 50px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }
        .seller-name { font-weight: 800; font-size: 16px; }
        
        .msg-input { width: 100%; min-height: 120px; padding: 15px; border: 1px solid var(--border); border-radius: 12px; font-family: 'Inter', sans-serif; font-size: 14px; resize: vertical; margin-bottom: 15px; background: var(--bg); outline: none; transition: 0.2s;}
        .msg-input:focus { border-color: var(--primary); background: white; }
        .btn-send { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 15px; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-send:hover { background: var(--primary-hover); transform: translateY(-2px); }

        footer { background: var(--white); border-top: 1px solid var(--border); padding: 40px 5% 20px; margin-top: auto; }
        .footer-content { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 20px; }
        .disclaimer { font-size: 12px; color: #94a3b8; max-width: 600px; line-height: 1.5; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <a href="index.html" class="logo">BIL<span>HK</span></a>
        <a href="index.html" class="btn-home"><i class="fa-solid fa-house"></i> Hem</a>
    </div>
    <div class="nav-links">
        <a href="sell.html" class="btn-sell">Sälj din bil</a>
        <div id="authStatusContainer"></div>
    </div>
</header>

<div class="container" id="appContent">
    <div style="grid-column: 1/-1; text-align: center; padding: 50px;">
        <i class="fa-solid fa-spinner fa-spin" style="font-size: 30px; color: var(--primary);"></i>
        <p style="margin-top: 15px; font-weight: 600; color: var(--gray-text);">Laddar annons...</p>
    </div>
</div>

<footer>
    <div class="footer-content">
        <a href="index.html" class="logo">BIL<span>HK</span></a>
        <div style="display:flex; gap:20px; margin: 15px 0;">
            <a href="terms.html" style="text-decoration:none; color:var(--gray-text); font-weight:600; font-size: 14px;">Användarvillkor</a>
            <a href="terms.html#disclaimer" style="text-decoration:none; color:var(--gray-text); font-weight:600; font-size: 14px;">Ansvarsfriskrivning</a>
        </div>
        <p class="disclaimer">BILHK är en öppen marknadsplats för fordon. Vi tar inget ansvar för riktigheten i annonserna eller de affärer som görs upp.</p>
        <div style="margin-top:20px; font-size:12px; color:#cbd5e1; font-weight: 600;">&copy; 2026 BilMarknad-HK.</div>
    </div>
</footer>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, getDoc, collection, query, where, getDocs, addDoc, updateDoc, increment, serverTimestamp, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const urlParams = new URLSearchParams(window.location.search);
    const carId = urlParams.get('id');
    let currentUser = null;
    let carData = null;
    let sellerData = null;

    onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        const authContainer = document.getElementById('authStatusContainer');
        if(user) {
            authContainer.innerHTML = `<a href="dashboard.html" style="color:var(--primary); font-weight:800; text-decoration:none;"><i class="fa-solid fa-circle-user"></i> Mitt Konto</a>`;
        } else {
            authContainer.innerHTML = `<a href="login.html" style="color:var(--dark); font-weight:700; text-decoration:none;">Logga in</a>`;
        }
        
        // بمجرد التأكد من حالة المستخدم، نقوم بتحميل بيانات الإعلان
        await loadAd();
    });

    async function loadAd() {
        if(!carId) return;
        const carRef = doc(db, "cars", carId);
        const snap = await getDoc(carRef);
        
        if(!snap.exists()) {
            document.getElementById('appContent').innerHTML = "<h2 style='text-align:center; padding:50px; grid-column:1/-1;'>Annonsen hittades inte.</h2>";
            return;
        }
        
        carData = snap.data();
        
        // التحقق القاطع: إذا كان الزائر هو البائع، لا نزيد عداد المشاهدات
        const isOwner = currentUser && (currentUser.uid === carData.sellerId);
        
        if (!isOwner) {
            try { await updateDoc(carRef, { views: increment(1) }); } catch(e){}
        }

        const sSnap = await getDoc(doc(db, "users", carData.sellerId));
        sellerData = sSnap.exists() ? sSnap.data() : { name: "Okänd Säljare" };

        let isSaved = false;
        if (currentUser) {
            const uDoc = await getDoc(doc(db, "users", currentUser.uid));
            if (uDoc.exists() && uDoc.data().savedCars && uDoc.data().savedCars.includes(carId)) {
                isSaved = true;
            }
        }

        let imagesHtml = '';
        let thumbsHtml = '';
        if(carData.images && carData.images.length > 0) {
            imagesHtml = `<img src="${carData.images[0]}" id="mainImage" class="main-img">`;
            carData.images.forEach((url, i) => {
                thumbsHtml += `<img src="${url}" class="thumb ${i===0?'active':''}" onclick="changeImg('${url}', this)">`;
            });
        } else {
            imagesHtml = `<img src="placeholder.jpg" class="main-img">`;
        }

        let featuresHtml = '';
        if(carData.features && carData.features.length > 0) {
            carData.features.forEach(f => {
                featuresHtml += `<div class="feature-tag"><i class="fa-solid fa-check" style="color:var(--primary);"></i> ${f}</div>`;
            });
        }

        let sideCardHtml = '';
        
        // هنا يتم بناء الواجهة الجانبية بناءً على هوية الزائر
        if (isOwner) {
            // واجهة المالك (لوحة التحكم السريعة للإعلان بدون إمكانية إرسال رسائل لنفسه)
            sideCardHtml = `
                <div class="contact-card" style="border-top: 4px solid var(--primary); background: #fffaf5;">
                    <h3 class="contact-title" style="color: var(--primary);"><i class="fa-solid fa-chart-line"></i> Din Annons</h3>
                    <p style="font-size: 13px; margin-bottom: 20px; color: var(--gray-text); line-height: 1.5;">Detta är hur kunderna ser din annons. Här är din nuvarande statistik:</p>
                    
                    <div style="display: flex; justify-content: space-between; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border);">
                        <span style="font-weight: 700; font-size: 14px;"><i class="fa-regular fa-eye" style="color: var(--gray-text); width: 20px;"></i> Visningar</span>
                        <strong style="color: var(--dark); font-size: 16px;">${carData.views || 0}</strong>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border);">
                        <span style="font-weight: 700; font-size: 14px;"><i class="fa-solid fa-heart" style="color: #ef4444; width: 20px;"></i> Sparade</span>
                        <strong style="color: var(--dark); font-size: 16px;">${carData.saves || 0}</strong>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 25px;">
                        <span style="font-weight: 700; font-size: 14px;"><i class="fa-regular fa-message" style="color: #3b82f6; width: 20px;"></i> Meddelanden</span>
                        <strong style="color: var(--dark); font-size: 16px;">${carData.messagesCount || 0}</strong>
                    </div>

                    <button onclick="window.location.href='dashboard.html?tab=messages&carId=${carId}'" class="btn-send" style="background: var(--dark);"><i class="fa-regular fa-comments"></i> Svara på meddelanden</button>
                    <button onclick="window.location.href='edit-car.html?id=${carId}'" class="btn-send" style="background: white; color: var(--dark); border: 1px solid var(--border); margin-top: 10px;"><i class="fa-solid fa-pen"></i> Redigera annons</button>
                </div>
            `;
        } else {
            // واجهة المشتري (تظهر خانة المراسلة العادية)
            sideCardHtml = `
                <div class="contact-card">
                    <h3 class="contact-title"><i class="fa-regular fa-envelope"></i> Kontakta säljaren</h3>
                    <div class="seller-info">
                        <div class="seller-avatar">${sellerData.name ? sellerData.name.charAt(0).toUpperCase() : 'S'}</div>
                        <div class="seller-name">${sellerData.name || 'Säljare'}</div>
                    </div>
                    
                    <textarea id="msgBody" class="msg-input" placeholder="Hej! Finns bilen kvar? Jag är intresserad..."></textarea>
                    <button id="sendBtn" class="btn-send"><i class="fa-solid fa-paper-plane"></i> Skicka meddelande</button>
                </div>
            `;
        }

        document.getElementById('appContent').innerHTML = `
            <div class="main-col">
                <div class="gallery">
                    ${imagesHtml}
                    <div class="thumb-list">${thumbsHtml}</div>
                </div>
                
                <div class="info-card">
                    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom: 20px;">
                        <div>
                            <h1 class="car-title">${carData.brand} ${carData.model}</h1>
                            <div class="car-price">${Number(carData.price).toLocaleString()} kr</div>
                        </div>
                        
                        <div style="display:flex; flex-direction:column; align-items:flex-end; gap:10px;">
                            <div style="background:var(--bg); padding:6px 10px; border-radius:6px; border:1px solid var(--border); font-weight:800; font-size:12px; text-transform: uppercase;">
                                <i class="fa-solid fa-hashtag" style="color:var(--gray-text);"></i> ${carData.regNr || 'Okänd'}
                            </div>
                            <button id="saveAdBtn" class="btn-save-ad ${isSaved ? 'saved' : ''}">
                                <i class="${isSaved ? 'fa-solid' : 'fa-regular'} fa-heart"></i> ${isSaved ? 'Sparad' : 'Spara'}
                            </button>
                        </div>
                    </div>
                    
                    <div class="specs-grid">
                        <div class="spec-item"><i class="fa-regular fa-calendar"></i><span>Årsmodell</span><strong>${carData.year}</strong></div>
                        <div class="spec-item"><i class="fa-solid fa-gauge"></i><span>Miltal</span><strong>${carData.mileage} mil</strong></div>
                        <div class="spec-item"><i class="fa-solid fa-gas-pump"></i><span>Drivmedel</span><strong>${carData.fuel || '-'}</strong></div>
                        <div class="spec-item"><i class="fa-solid fa-gear"></i><span>Växellåda</span><strong>${carData.gear || carData.transmission || '-'}</strong></div>
                        <div class="spec-item"><i class="fa-solid fa-car-side"></i><span>Karosseri</span><strong>${carData.karosseri || '-'}</strong></div>
                        <div class="spec-item"><i class="fa-solid fa-truck-ramp-box"></i><span>Drivning</span><strong>${carData.drive || '-'}</strong></div>
                        <div class="spec-item"><i class="fa-solid fa-palette"></i><span>Färg</span><strong>${carData.color || '-'}</strong></div>
                        <div class="spec-item"><i class="fa-solid fa-horse-head"></i><span>Hästkrafter</span><strong>${carData.hp ? carData.hp + ' hk' : '-'}</strong></div>
                        <div class="spec-item"><i class="fa-solid fa-wheelchair"></i><span>Säten</span><strong>${carData.seats || '-'}</strong></div>
                        <div class="spec-item"><i class="fa-solid fa-door-open"></i><span>Dörrar</span><strong>${carData.doors || '-'}</strong></div>
                    </div>

                    <h3 class="desc-title">Beskrivning</h3>
                    <div class="description">${carData.description || 'Ingen beskrivning angiven.'}</div>
                    
                    <h3 class="desc-title" style="margin-top:25px;">Utrustning (Säkerhet & Komfort)</h3>
                    <div class="features-list">${featuresHtml || '<span style="color:var(--gray-text); font-size:14px;">Ingen specifik utrustning listad.</span>'}</div>
                </div>
            </div>
            
            <div class="side-col">
                ${sideCardHtml}
            </div>
        `;

        window.changeImg = (url, el) => {
            document.getElementById('mainImage').src = url;
            document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        };

        const saveAdBtn = document.getElementById('saveAdBtn');
        if (saveAdBtn) {
            saveAdBtn.onclick = async () => {
                if(!currentUser) {
                    Swal.fire({ title: 'Logga in krävs', text: 'Du måste vara inloggad för att spara annonser.', icon: 'info', confirmButtonText: 'Logga in' }).then((res) => {
                        if(res.isConfirmed) window.location.href="login.html";
                    });
                    return;
                }
                
                const userRef = doc(db, "users", currentUser.uid);
                
                try {
                    if (isSaved) {
                        await updateDoc(userRef, { savedCars: arrayRemove(carId) });
                        try { await updateDoc(carRef, { saves: increment(-1) }); } catch(e){}
                        isSaved = false;
                        saveAdBtn.classList.remove('saved');
                        saveAdBtn.innerHTML = `<i class="fa-regular fa-heart"></i> Spara`;
                    } else {
                        await updateDoc(userRef, { savedCars: arrayUnion(carId) });
                        try { await updateDoc(carRef, { saves: increment(1) }); } catch(e){}
                        isSaved = true;
                        saveAdBtn.classList.add('saved');
                        saveAdBtn.innerHTML = `<i class="fa-solid fa-heart"></i> Sparad`;
                    }
                } catch(err) {
                    console.error("Save error", err);
                }
            };
        }

        const sendBtn = document.getElementById('sendBtn');
        if (sendBtn) {
            sendBtn.onclick = async () => {
                if(!currentUser) {
                    Swal.fire({ title: 'Logga in krävs', text: 'Du måste vara inloggad för att skicka meddelanden.', icon: 'warning', confirmButtonText: 'Logga in' }).then(() => window.location.href="login.html");
                    return;
                }

                const msg = document.getElementById('msgBody').value.trim();
                if(!msg) { Swal.fire('Tomt', 'Skriv ett meddelande först.', 'warning'); return; }

                sendBtn.disabled = true;
                sendBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Skickar...';

                try {
                    const q = query(collection(db, "chats"), where("carId", "==", carId), where("participants", "array-contains", currentUser.uid));
                    const chatSnap = await getDocs(q);
                    
                    let chatId = null;
                    if(!chatSnap.empty) {
                        chatId = chatSnap.docs[0].id;
                    } else {
                        const bSnap = await getDoc(doc(db, "users", currentUser.uid));
                        const bName = bSnap.exists() ? bSnap.data().name : "Köpare";
                        
                        const newChat = await addDoc(collection(db, "chats"), {
                            carId: carId,
                            carTitle: `${carData.brand} ${carData.model}`,
                            carImage: carData.images?.[0] || 'placeholder.jpg',
                            participants: [currentUser.uid, carData.sellerId],
                            users: [
                                { id: currentUser.uid, name: bName },
                                { id: carData.sellerId, name: sellerData.name || 'Säljare' }
                            ],
                            lastMessage: "",
                            updatedAt: serverTimestamp()
                        });
                        chatId = newChat.id;
                    }

                    await addDoc(collection(db, `chats/${chatId}/messages`), {
                        text: msg,
                        senderId: currentUser.uid,
                        createdAt: serverTimestamp()
                    });

                    await updateDoc(doc(db, "chats", chatId), {
                        lastMessage: msg,
                        updatedAt: serverTimestamp()
                    });

                    try { await updateDoc(doc(db, "cars", carId), { messagesCount: increment(1) }); } catch(err) {}

                    Swal.fire('Skickat!', 'Ditt meddelande har skickats till säljaren.', 'success');
                    document.getElementById('msgBody').value = '';
                    
                } catch (error) {
                    console.error(error);
                    Swal.fire('Fel', 'Kunde inte skicka meddelandet.', 'error');
                } finally {
                    sendBtn.disabled = false;
                    sendBtn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Skicka meddelande';
                }
            };
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fordonsuppgifter | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); margin: 0; }
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        
        /* معرض الصور الاحترافي */
        .image-gallery { display: grid; grid-template-columns: 2fr 1.2fr; gap: 12px; height: 450px; margin-bottom: 30px; border-radius: 24px; overflow: hidden; }
        .main-img { width: 100%; height: 100%; object-fit: cover; }
        .side-imgs { display: grid; grid-template-rows: 1fr 1fr; gap: 12px; }
        .side-img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }

        .content-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        .card { background: white; padding: 30px; border-radius: 24px; border: 1px solid var(--border); margin-bottom: 25px; }

        /* الأقسام الفنية */
        .spec-header { font-size: 11px; font-weight: 900; color: #94a3b8; text-transform: uppercase; margin: 25px 0 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #f1f5f9; padding-bottom: 8px; }
        
        .full-specs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .spec-box { display: flex; justify-content: space-between; align-items: center; padding: 14px; background: #f1f5f9; border-radius: 14px; font-size: 13px; font-weight: 700; }
        .spec-label { color: #64748b; font-weight: 500; }

        /* وسم التقنيات والمواصفات */
        .tech-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .tech-pill { padding: 10px 18px; background: #fff5eb; color: var(--primary); border: 1px solid #fbd38d; border-radius: 50px; font-size: 11px; font-weight: 900; text-transform: uppercase; }

        /* شريط التواصل */
        .seller-info { position: sticky; top: 100px; background: var(--dark); color: white; padding: 30px; border-radius: 28px; text-align: center; }
        .btn-contact { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 18px; font-weight: 900; font-size: 16px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-contact:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(245, 130, 32, 0.3); }

        @media (max-width: 800px) { .image-gallery { grid-template-columns: 1fr; height: 300px; } .side-imgs { display: none; } .content-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <p style="text-align: center; padding: 100px;">Laddar fordonets fullständiga profil...</p>
</div>

<script type="module">
    import { db, auth } from './firebase-config.js';
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const carId = new URLSearchParams(window.location.search).get('id');
    const container = document.getElementById('mainContainer');

    async function getFullDetails() {
        if (!carId) return;
        try {
            const snap = await getDoc(doc(db, "cars", carId));
            if (!snap.exists()) { container.innerHTML = "<h1>Fordonet hittades inte</h1>"; return; }
            
            const car = snap.data();
            
            // تجميع التقنيات من كل الحقول الممكنة
            const allFeatures = [
                ...(car.features || []),
                ...(car.techs || []),
                ...(car.safety || [])
            ];

            container.innerHTML = `
                <div class="image-gallery">
                    <img src="${car.images[0]}" class="main-img">
                    <div class="side-imgs">
                        <img src="${car.images[1] || car.images[0]}" class="side-img">
                        <img src="${car.images[2] || car.images[0]}" class="side-img">
                    </div>
                </div>

                <div class="content-grid">
                    <div class="main-info">
                        <div class="card">
                            <h1 style="font-size:32px; font-weight:900; margin-bottom:5px;">${car.brand} ${car.model}</h1>
                            <p style="color:#64748b; font-weight:700; margin-bottom:20px;">Årsmodell ${car.year} | ${car.mileage} mil</p>
                            <div style="font-size:36px; font-weight:900; color:var(--primary);">${Number(car.price).toLocaleString()} kr</div>
                            
                            <div class="spec-header"><i class="fa-solid fa-microchip"></i> Teknisk Specifikation</div>
                            <div class="full-specs">
                                <div class="spec-box"><span class="spec-label">Drivmedel</span> <span>${car.fuel || '-'}</span></div>
                                <div class="spec-box"><span class="spec-label">Växellåda</span> <span>${car.gearbox || car.transmission || '-'}</span></div>
                                <div class="spec-box"><span class="spec-label">Effekt</span> <span>${car.hp || '-'} hk</span></div>
                                <div class="spec-box"><span class="spec-label">Drivning</span> <span>${car.drive || '-'}</span></div>
                                <div class="spec-box"><span class="spec-label">Besiktigad till</span> <span>${car.besiktning || '-'}</span></div>
                                <div class="spec-box"><span class="spec-label">Årsskatt</span> <span>${car.tax || '-'} kr</span></div>
                                <div class="spec-box"><span class="spec-label">Ägare</span> <span>${car.owners || '-'} st</span></div>
                                <div class="spec-box"><span class="spec-label">Färg</span> <span>${car.color || '-'}</span></div>
                                <div class="spec-box"><span class="spec-label">Karosseri</span> <span>${car.karosseri || '-'}</span></div>
                                <div class="spec-box"><span class="spec-label">Platser</span> <span>${car.seats || '-'}</span></div>
                            </div>

                            <div class="spec-header"><i class="fa-solid fa-shield-halved"></i> Utrustning & Säkerhetspaket</div>
                            <div class="tech-container">
                                ${allFeatures.length > 0 
                                    ? allFeatures.map(f => `<span class="tech-pill">${f}</span>`).join('') 
                                    : '<span style="font-size:12px; color:#94a3b8;">Ingen extrautrustning angiven</span>'}
                            </div>
                        </div>

                        <div class="card">
                            <h3 style="margin-bottom:15px; font-weight:800;">Säljarens beskrivning</h3>
                            <p style="line-height:1.8; color:#334155; white-space: pre-wrap;">${car.description}</p>
                        </div>
                    </div>

                    <div class="side-bar">
                        <div class="seller-info">
                            <i class="fa-solid fa-shield-check" style="font-size:45px; color:var(--primary); margin-bottom:15px;"></i>
                            <h2 style="margin-bottom:10px;">Intresserad?</h2>
                            <p style="font-size:13px; color:#94a3b8; line-height:1.5;">Starta en säker chatt med säljaren för att boka visning eller ställa frågor.</p>
                            <button class="btn-contact" onclick="openChat('${car.sellerId}', '${car.brand} ${car.model}')">
                                <i class="fa-solid fa-paper-plane"></i> Kontakta Säljaren
                            </button>
                        </div>
                    </div>
                </div>
            `;
        } catch (e) { console.error(e); }
    }

    window.openChat = (sellerId, carTitle) => {
        if(!auth.currentUser) { window.location.href='login.html'; return; }
        window.location.href = `messages.html?sellerId=${sellerId}&carId=${carId}&title=${encodeURIComponent(carTitle)}`;
    };

    getFullDetails();
</script>
</body>
</html>

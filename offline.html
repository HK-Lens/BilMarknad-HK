<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | VORQ Fordon</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#f58220">
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Inter,Arial,sans-serif;background:#f8fafc;color:#0f172a;padding:24px;text-align:center}
    .card{max-width:430px;background:white;border:1px solid #e2e8f0;border-radius:28px;padding:34px;box-shadow:0 20px 60px rgba(15,23,42,.12)}

    h1{font-size:28px;margin:0 0 10px}p{color:#64748b;font-weight:700;line-height:1.7}a{display:inline-flex;margin-top:18px;background:#f58220;color:white;text-decoration:none;border-radius:999px;padding:13px 22px;font-weight:900}
  </style>
</head>
<body>
  <main class="card">
    <div class="icon">!</div>
    <h1>Ingen anslutning</h1>
    <p>Kontrollera internetanslutningen och försök igen. Vissa sparade sidor kan öppnas när appen är offline.</p>
    <a href="index.html">Till startsidan</a>
  </main>

</html>

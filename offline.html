<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | VORQ Fordon</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#f58220">
  <link rel="icon" href="./vorq-fordon-logo-header.png" type="image/png">
  <style>
    :root{
      --primary:#f58220;
      --primary-hover:#e67312;
      --dark:#0f172a;
      --muted:#64748b;
      --bg:#f8fafc;
      --border:#e2e8f0;
      --white:#ffffff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      font-family:Inter,Arial,sans-serif;
      background:
        radial-gradient(circle at 12% 8%,rgba(245,130,32,.14),transparent 32%),
        radial-gradient(circle at 88% 0%,rgba(15,23,42,.08),transparent 30%),
        var(--bg);
      color:var(--dark);
      padding:24px;
      text-align:center;
    }
    .card{
      width:100%;
      max-width:520px;
      background:var(--white);
      border:1px solid var(--border);
      border-radius:28px;
      padding:34px;
      box-shadow:0 20px 60px rgba(15,23,42,.12);
    }
    .brand{
      display:grid;
      justify-items:center;
      gap:10px;
      margin-bottom:22px;
    }
    .brand img{
      width:min(340px,78vw);
      max-height:78px;
      object-fit:contain;
      display:block;
    }
    .brand-fallback{
      display:none;
      font-size:28px;
      font-weight:900;
      letter-spacing:-.04em;
      color:var(--dark);
    }
    .brand-fallback span{color:var(--primary)}
    .owner{
      color:var(--muted);
      font-size:13px;
      font-weight:850;
      line-height:1.5;
      margin:0;
    }
    .icon{
      width:76px;
      height:76px;
      border-radius:24px;
      background:rgba(245,130,32,.12);
      color:var(--primary);
      display:grid;
      place-items:center;
      margin:0 auto 18px;
      font-size:34px;
      font-weight:900;
    }
    h1{
      font-size:28px;
      margin:0 0 10px;
      letter-spacing:-.03em;
    }
    p{
      color:var(--muted);
      font-weight:700;
      line-height:1.7;
      margin:0;
    }
    .tagline{
      margin-top:14px;
      color:var(--dark);
      font-size:13px;
      font-weight:900;
    }
    .contact{
      margin-top:8px;
      font-size:13px;
      font-weight:850;
    }
    a{
      display:inline-flex;
      justify-content:center;
      align-items:center;
      margin-top:22px;
      background:var(--primary);
      color:white;
      text-decoration:none;
      border-radius:999px;
      padding:13px 22px;
      font-weight:900;
      transition:.25s ease;
    }
    a:hover{background:var(--primary-hover);transform:translateY(-1px)}
  </style>
</head>
<body>
  <main class="card">
    <div class="brand" aria-label="VORQ Fordon">
      <img src="./vorq-fordon-logo-header.png" alt="VORQ Fordon - Ägs av VORQ Group" onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
      <div class="brand-fallback">VORQ <span>Fordon</span></div>
      <p class="owner">Ägs och drivs av VORQ Group</p>
    </div>

    <div class="icon">!</div>
    <h1>Ingen anslutning</h1>
    <p>Kontrollera internetanslutningen och försök igen. Vissa sparade sidor kan öppnas när appen är offline.</p>
    <p class="tagline">Vision • Operations • Reach • Quality</p>
    <p class="contact">info@vorq.group</p>
    <a href="index.html">Till startsidan</a>
  </main>
</body>
</html>

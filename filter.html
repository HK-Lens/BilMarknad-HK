<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sök Bil | BILHK</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--dark); line-height: 1.6; }

        header { background: white; padding: 15px 5%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { text-decoration: none; font-weight: 900; color: var(--dark); font-size: 24px; }
        .logo span { color: var(--primary); }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        
        /* Filter Sidebar & Layout */
        .search-layout { display: grid; grid-template-columns: 300px 1fr; gap: 30px; }
        
        .filter-card { background: white; padding: 25px; border-radius: 20px; border: 1px solid var(--border); height: fit-content; position: sticky; top: 100px; }
        .filter-title { font-size: 18px; font-weight: 900; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        .filter-group { margin-bottom: 18px; }
        .filter-group label { display: block; font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 8px; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; background: #f1f5f9; outline: none; font-size: 14px; }
        select:focus, input:focus { border-color: var(--primary); background: white; }

        .btn-search { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-search:hover { filter: brightness(1.1); }

        /* Results Grid */
        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .car-card { background: white; border-radius: 20px; border: 1px solid var(--border); overflow: hidden; transition: 0.3s; cursor: pointer; }
        .car-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .car-img { width: 100%; height: 180px; object-fit: cover; }
        .car-info { padding: 15px; }
        .car-price { font-size: 20px; font-weight: 900; color: var(--primary); }
        .car-name { font-weight: 700; font-size: 16px; margin: 5px 0; }
        .car-meta { font-size: 12px; color: #64748b; display: flex; gap: 10px; }

        @media (max-width: 900px) {
            .search-layout { grid-template-columns: 1fr; }
            .filter-card { position: static; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <nav style="display:flex; gap:20px; align-items:center;">
        <a href="index.html" style="text-decoration:none; color:var(--dark); font-weight:700;">Hem</a>
        <a href="dashboard.html" style="text-decoration:none; color:var(--dark); font-weight:700;">Mitt konto</a>
    </nav>
</header>

<div class="container">
    <div class="search-layout">
        <aside class="filter-card">
            <div class="filter-title"><i class="fa-solid fa-sliders"></i> Filtrera sökning</div>
            
            <div class="filter-group">
                <label>Märke</label>
                <select id="brandFilter"><option value="">Alla märken</option></select>
            </div>
            <div class="filter-group">
                <label>Modell</label>
                <select id="modelFilter"><option value="">Alla modeller</option></select>
            </div>
            <div class="filter-group">
                <label>Max Pris (kr)</label>
                <input type="number" id="priceFilter" placeholder="T.ex 200000">
            </div>
            <div class="filter-group">
                <label>Drivmedel</label>
                <select id="fuelFilter">
                    <option value="">Alla</option>
                    <option value="Bensin">Bensin</option>
                    <option value="Diesel">Diesel</option>
                    <option value="El">El</option>
                    <option value="Hybrid">Hybrid</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Max Miltal</label>
                <input type="number" id="milFilter" placeholder="T.ex 10000">
            </div>
            
            <button class="btn-search" onclick="applyFilters()">Visa Resultat</button>
        </aside>

        <main>
            <h2 id="resultStatus" style="margin-bottom: 20px; font-weight: 800;">Senaste bilar</h2>
            <div id="resultsArea" class="results-grid">
                </div>
        </main>
    </div>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { collection, query, where, getDocs, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { carData } from './cars-data.js';

    const brandSelect = document.getElementById('brandFilter');
    const modelSelect = document.getElementById('modelFilter');
    const resultsArea = document.getElementById('resultsArea');

    // Populate Brand Dropdown
    Object.keys(carData).sort().forEach(brand => {
        brandSelect.innerHTML += `<option value="${brand}">${brand}</option>`;
    });

    brandSelect.onchange = () => {
        modelSelect.innerHTML = '<option value="">Alla modeller</option>';
        if(carData[brandSelect.value]) {
            carData[brandSelect.value].sort().forEach(m => {
                modelSelect.innerHTML += `<option value="${m}">${m}</option>`;
            });
        }
    };

    // Initial Load (Recent Cars)
    async function initialLoad() {
        resultsArea.innerHTML = "<p>Söker efter bilar...</p>";
        const q = query(collection(db, "cars"), orderBy("createdAt", "desc"), limit(20));
        renderResults(q);
    }

    window.applyFilters = async () => {
        resultsArea.innerHTML = "<p>Filtrerar...</p>";
        let q = collection(db, "cars");
        
        // Firebase filtering logic (Note: For multiple filters, composite indexes might be needed)
        // For simplicity, we fetch recent and filter in JS if complex, or use multiple queries
        const querySnapshot = await getDocs(query(q, orderBy("createdAt", "desc")));
        
        const b = document.getElementById('brandFilter').value;
        const m = document.getElementById('modelFilter').value;
        const p = document.getElementById('priceFilter').value;
        const f = document.getElementById('fuelFilter').value;
        const ml = document.getElementById('milFilter').value;

        resultsArea.innerHTML = "";
        let count = 0;

        querySnapshot.forEach(doc => {
            const car = doc.data();
            const carId = doc.id;

            // Logic matching
            const matchBrand = !b || car.brand === b;
            const matchModel = !m || car.model === m;
            const matchPrice = !p || car.price <= Number(p);
            const matchFuel = !f || car.fuel === f;
            const matchMil = !ml || car.mil <= Number(ml);

            if(matchBrand && matchModel && matchPrice && matchFuel && matchMil) {
                count++;
                resultsArea.innerHTML += `
                    <div class="car-card" onclick="location.href='details.html?id=${carId}'">
                        <img src="${car.images?.[0] || 'placeholder.jpg'}" class="car-img">
                        <div class="car-info">
                            <div class="car-price">${Number(car.price).toLocaleString()} kr</div>
                            <div class="car-name">${car.brand} ${car.model}</div>
                            <div class="car-meta">
                                <span><i class="fa-solid fa-calendar"></i> ${car.year}</span>
                                <span><i class="fa-solid fa-road"></i> ${car.mil} mil</span>
                            </div>
                        </div>
                    </div>`;
            }
        });

        document.getElementById('resultStatus').innerText = `${count} bilar hittades`;
        if(count === 0) resultsArea.innerHTML = "<p>Inga bilar matchade din sökning.</p>";
    };

    async function renderResults(q) {
        const querySnapshot = await getDocs(q);
        resultsArea.innerHTML = "";
        querySnapshot.forEach(doc => {
            const car = doc.data();
            const carId = doc.id;
            resultsArea.innerHTML += `
                <div class="car-card" onclick="location.href='details.html?id=${carId}'">
                    <img src="${car.images?.[0] || 'placeholder.jpg'}" class="car-img">
                    <div class="car-info">
                        <div class="car-price">${Number(car.price).toLocaleString()} kr</div>
                        <div class="car-name">${car.brand} ${car.model}</div>
                        <div class="car-meta">
                            <span>${car.year}</span> | <span>${car.mil} mil</span>
                        </div>
                    </div>
                </div>`;
        });
    }

    initialLoad();
</script>
</body>
</html>

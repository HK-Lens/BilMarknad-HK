<!DOCTYPE html><html lang="sv"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Avancerad sökning | BILHK</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>:root{--primary:#f58220;--dark:#0f172a;--bg:#f8fafc;--border:#e2e8f0;--gray:#64748b}*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,sans-serif}body{background:var(--bg);color:var(--dark)}header{background:white;padding:15px 6%;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0}.logo{text-decoration:none;font-weight:900;color:var(--dark);font-size:26px}.logo span{color:var(--primary)}.container{max-width:1120px;margin:35px auto;padding:0 20px}.panel{background:white;border:1px solid var(--border);border-radius:24px;padding:30px}.section{font-size:14px;font-weight:900;color:var(--primary);text-transform:uppercase;border-bottom:2px solid var(--bg);padding-bottom:10px;margin:28px 0 16px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:15px}label{font-size:11px;font-weight:900;color:var(--gray);text-transform:uppercase;margin-bottom:6px;display:block}input,select{width:100%;padding:12px;border:1px solid var(--border);border-radius:11px;background:#f8fafc;font-weight:700}.checks{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px}.check{display:flex;align-items:center;gap:8px;background:#f8fafc;border:1px solid var(--border);border-radius:11px;padding:10px;font-size:13px;font-weight:700}.check input{width:16px}.actions{display:flex;gap:14px;margin-top:26px}.btn{flex:1;padding:16px;border:0;border-radius:13px;font-weight:900;cursor:pointer}.apply{background:var(--primary);color:white}.reset{max-width:160px;background:#e2e8f0}footer{background:white;border-top:1px solid var(--border);padding:34px 20px;text-align:center;color:#94a3b8;font-size:13px;margin-top:40px}.footer-links{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}.footer-links a{font-weight:900;color:#64748b;text-decoration:none}</style></head><body><header><a href="index.html" class="logo">BIL<span>HK</span></a><a href="dashboard.html" style="font-weight:900;color:var(--dark);text-decoration:none">Min sida</a></header><main class="container"><h1 style="font-size:30px;font-weight:900;margin-bottom:20px">Djup sökning</h1><div class="panel"><div class="section"><i class="fa-solid fa-car"></i> Grundläggande</div><div class="grid"><div><label>Märke</label><select id="brand"><option value="">Alla märken</option></select></div><div><label>Modell</label><select id="model"><option value="">Alla modeller</option></select></div><div><label>Min pris</label><input type="number" id="minP"></div><div><label>Max pris</label><input type="number" id="maxP"></div><div><label>År från</label><input type="number" id="yFrom"></div><div><label>År till</label><input type="number" id="yTo"></div><div><label>Mil från</label><input type="number" id="milFrom"></div><div><label>Mil till</label><input type="number" id="milTo"></div></div><div class="section"><i class="fa-solid fa-gears"></i> Teknik</div><div class="grid"><div><label>Drivmedel</label><select id="fuel"><option value="">Alla</option><option>Bensin</option><option>Diesel</option><option>El</option><option>Hybrid</option><option>Laddhybrid</option><option>Gas</option><option>Etanol</option></select></div><div><label>Växellåda</label><select id="gear"><option value="">Alla</option><option>Automat</option><option>Manuell</option></select></div><div><label>Karosseri</label><select id="body"><option value="">Alla</option><option>Sedan</option><option>Halvkombi</option><option>Kombi</option><option>SUV</option><option>Coupé</option><option>Cabriolet</option><option>Pickup</option><option>Transportbil</option></select></div><div><label>Drivning</label><select id="drive"><option value="">Alla</option><option>Framhjulsdrift</option><option>Bakhjulsdrift</option><option>Fyrhjulsdrift</option></select></div><div><label>Min hk</label><input type="number" id="minHp"></div><div><label>Färg</label><input id="color"></div><div><label>Säten</label><input type="number" id="seats"></div><div><label>Dörrar</label><input type="number" id="doors"></div></div><div class="section"><i class="fa-solid fa-shield-halved"></i> Utrustning</div><div class="checks" id="features"></div><div class="actions"><button class="btn reset" onclick="location.href='filter.html'">Rensa</button><button id="apply" class="btn apply">Visa resultat</button></div></div></main><footer><div class="footer-links"><a href="terms.html">Användarvillkor</a><a href="terms.html#disclaimer">Ansvarsfriskrivning</a></div><div>BILHK är endast en annonsplattform. Vi ansvarar inte för annonser, betalningar, affärer eller tvister.</div></footer><script type="module">import{carData,brands,featuresList}from'./cars-data.js';const b=document.getElementById('brand'),m=document.getElementById('model');brands.forEach(x=>b.insertAdjacentHTML('beforeend',`<option value="${x}">${x}</option>`));featuresList.forEach(f=>features.insertAdjacentHTML('beforeend',`<label class="check"><input type="checkbox" class="feat" value="${f}"> ${f}</label>`));b.onchange=()=>{m.innerHTML='<option value="">Alla modeller</option>';(carData[b.value]||[]).forEach(x=>m.insertAdjacentHTML('beforeend',`<option value="${x}">${x}</option>`));};document.getElementById('apply').onclick=()=>{const p=new URLSearchParams();['brand','model','minP','maxP','yFrom','yTo','milFrom','milTo','fuel','gear','body','drive','minHp','color','seats','doors'].forEach(id=>{const v=document.getElementById(id).value.trim();if(v)p.set(id,v);});const feats=[...document.querySelectorAll('.feat:checked')].map(x=>x.value);if(feats.length)p.set('feats',feats.join(','));location.href='results.html?'+p.toString();};</script></body></html>

<!DOCTYPE html>
<html lang="sv">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BilFilter Pro | BilMarknad-HK</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --primary:#f58220;
    --dark:#111827;
    --text:#6b7280;
    --border:#e5e7eb;
    --bg:#f5f7fb;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--dark);
}

/* ================= HEADER ================= */

.header{

    position:sticky;
    top:0;
    z-index:1000;

    background:white;

    border-bottom:1px solid var(--border);

    padding:18px 25px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:800;
}

.logo span{
    color:var(--primary);
}

.close-btn{
    text-decoration:none;
    color:var(--dark);
    font-size:26px;
}

/* ================= LAYOUT ================= */

.layout{

    display:grid;

    grid-template-columns:340px 1fr;

    min-height:100vh;
}

/* ================= SIDEBAR ================= */

.sidebar{

    background:white;

    border-right:1px solid var(--border);

    padding:25px;

    overflow-y:auto;
}

/* ================= BLOCK ================= */

.filter-block{
    margin-bottom:28px;
}

.filter-title{

    font-size:13px;

    font-weight:800;

    color:#6b7280;

    text-transform:uppercase;

    margin-bottom:12px;
}

/* ================= INPUTS ================= */

select,
input{

    width:100%;

    height:54px;

    border:1px solid var(--border);

    border-radius:14px;

    padding:0 15px;

    background:#fafafa;

    font-size:15px;

    transition:0.2s;
}

select:focus,
input:focus{

    outline:none;

    border-color:var(--primary);

    background:white;

    box-shadow:0 0 0 4px rgba(245,130,32,0.12);
}

.double{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:12px;
}

/* ================= BODY TYPE ================= */

.kar-grid{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:12px;
}

.kar-item{

    border:1px solid var(--border);

    border-radius:18px;

    padding:18px 12px;

    text-align:center;

    background:white;

    cursor:pointer;

    transition:0.25s;
}

.kar-item:hover{
    transform:translateY(-2px);
}

.kar-item.active{

    border-color:var(--primary);

    background:#fff5eb;

    box-shadow:0 8px 20px rgba(245,130,32,0.14);
}

.kar-item img{

    width:55px;

    height:55px;

    object-fit:contain;

    margin-bottom:10px;
}

.kar-item span{

    font-size:14px;

    font-weight:700;
}

/* ================= BUTTON ================= */

.apply-btn{

    width:100%;

    height:58px;

    border:none;

    border-radius:16px;

    background:linear-gradient(135deg,var(--primary),#ff9d4d);

    color:white;

    font-size:17px;

    font-weight:800;

    cursor:pointer;

    transition:0.25s;

    margin-top:20px;
}

.apply-btn:hover{
    transform:translateY(-2px);
}

/* ================= CONTENT ================= */

.content{
    padding:30px;
}

.topbar{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:25px;
}

.results-count{

    font-size:28px;

    font-weight:800;
}

.results{

    display:grid;

    grid-template-columns:
    repeat(auto-fill,minmax(320px,1fr));

    gap:24px;
}

/* ================= CARD ================= */

.car-card{

    background:white;

    border-radius:24px;

    overflow:hidden;

    border:1px solid #eee;

    transition:0.3s;

    cursor:pointer;
}

.car-card:hover{

    transform:translateY(-6px);

    box-shadow:0 18px 35px rgba(0,0,0,0.08);
}

.car-card img{

    width:100%;

    height:220px;

    object-fit:cover;
}

.car-body{
    padding:20px;
}

.car-title{

    font-size:20px;

    font-weight:800;

    margin-bottom:8px;
}

.car-info{

    color:#6b7280;

    font-size:14px;

    margin-bottom:14px;
}

.price{

    font-size:28px;

    font-weight:800;

    color:var(--primary);
}

/* ================= MOBILE ================= */

@media(max-width:980px){

    .layout{
        grid-template-columns:1fr;
    }

    .sidebar{
        border-right:none;
        border-bottom:1px solid var(--border);
    }

    .content{
        padding:20px;
    }

    .results{
        grid-template-columns:1fr;
    }

}

</style>

</head>

<body>

<!-- ================= HEADER ================= -->

<div class="header">

    <div class="logo">
        BILMARKNAD<span>HK</span>
    </div>

    <a href="index.html" class="close-btn">
        ✕
    </a>

</div>

<!-- ================= LAYOUT ================= -->

<div class="layout">

    <!-- ================= SIDEBAR ================= -->

    <aside class="sidebar">

        <!-- BRAND -->

        <div class="filter-block">

            <div class="filter-title">
                Märke
            </div>

            <select id="brand" onchange="updateModels()">

                <option value="all">
                    Alla märken
                </option>

            </select>

        </div>

        <!-- MODEL -->

        <div class="filter-block">

            <div class="filter-title">
                Modell
            </div>

            <select id="model">

                <option value="all">
                    Alla modeller
                </option>

            </select>

        </div>

        <!-- PRICE -->

        <div class="filter-block">

            <div class="filter-title">
                Pris
            </div>

            <div class="double">

                <input type="number"
                       id="minPrice"
                       placeholder="Från">

                <input type="number"
                       id="maxPrice"
                       placeholder="Till">

            </div>

        </div>

        <!-- YEAR -->

        <div class="filter-block">

            <div class="filter-title">
                Årsmodell
            </div>

            <div class="double">

                <input type="number"
                       id="yearFrom"
                       placeholder="1990">

                <input type="number"
                       id="yearTo"
                       placeholder="2026">

            </div>

        </div>

        <!-- BODY -->

        <div class="filter-block">

            <div class="filter-title">
                Karosseri
            </div>

            <div class="kar-grid">

                <div class="kar-item active">

                    <img src="https://cdn-icons-png.flaticon.com/512/3202/3202931.png">

                    <span>SUV</span>

                </div>

                <div class="kar-item">

                    <img src="https://cdn-icons-png.flaticon.com/512/3202/3202926.png">

                    <span>Sedan</span>

                </div>

                <div class="kar-item">

                    <img src="https://cdn-icons-png.flaticon.com/512/3202/3202921.png">

                    <span>Kombi</span>

                </div>

                <div class="kar-item">

                    <img src="https://cdn-icons-png.flaticon.com/512/744/744465.png">

                    <span>Coupe</span>

                </div>

            </div>

        </div>

        <!-- BUTTON -->

        <button class="apply-btn">

            Visa resultat

        </button>

    </aside>

    <!-- ================= CONTENT ================= -->

    <main class="content">

        <div class="topbar">

            <div class="results-count">
                Alla bilar
            </div>

        </div>

        <!-- RESULTS -->

        <div class="results">

            <div class="car-card">

                <img src="https://images.unsplash.com/photo-1555215695-3004980ad54e?q=80&w=1200&auto=format&fit=crop">

                <div class="car-body">

                    <div class="car-title">
                        Volvo XC60
                    </div>

                    <div class="car-info">
                        2023 • Automat
                    </div>

                    <div class="price">
                        359 000 kr
                    </div>

                </div>

            </div>

            <div class="car-card">

                <img src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=1200&auto=format&fit=crop">

                <div class="car-body">

                    <div class="car-title">
                        BMW X5 M Sport
                    </div>

                    <div class="car-info">
                        2020 • Diesel
                    </div>

                    <div class="price">
                        304 000 kr
                    </div>

                </div>

            </div>

        </div>

    </main>

</div>

.sort()
.forEach(brand => {

});

/* ================= UPDATE MODELS ================= */

function updateModels(){

    const brand =
        document.getElementById('brand').value;

    const modelSelect =
        document.getElementById('model');

    modelSelect.innerHTML =
        '<option value="all">Alla modeller</option>';

    if(carData[brand]){

        carData[brand]
        .sort()
        .forEach(model => {

            modelSelect.innerHTML += `

                </option>
            `;

}

<!DOCTYPE html>
<html lang="sv" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sökfilter | BILHK Professional Search</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #f58220;
            --primary-hover: #e07210;
            --primary-soft: #fff5eb;
            --dark: #0f172a;
            --dark-2: #1e293b;
            --muted: #64748b;
            --light-bg: #f8fafc;
            --border: #e2e8f0;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background: var(--white);
            color: var(--dark);
            padding-bottom: 100px; /* مساحة لزر العرض العائم */
        }

        /* --- Header --- */
        .filter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 6%;
            background: var(--white);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .close-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--light-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--dark);
            transition: 0.3s;
        }
        .close-btn:hover { background: var(--border); }

        .header-title { font-size: 18px; font-weight: 800; }

        .reset-link {
            font-size: 14px;
            font-weight: 700;
            color: var(--muted);
            background: none;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .reset-link:hover { color: var(--primary); }

        /* --- Container --- */
        .filter-content {
            max-width: 700px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .section-label {
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            margin: 35px 0 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* --- Body Type Grid --- */
        .kaross-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .kaross-item {
            background: var(--light-bg);
            border: 2px solid transparent;
            border-radius: 18px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .kaross-item i { font-size: 24px; color: var(--muted); margin-bottom: 8px; display: block; }
        .kaross-item span { font-size: 12px; font-weight: 700; }

        .kaross-item:hover { border-color: var(--border); }
        .kaross-item.active { border-color: var(--primary); background: var(--primary-soft); }
        .kaross-item.active i, .kaross-item.active span { color: var(--primary); }

        /* --- Input Styles --- */
        .input-box {
            position: relative;
            margin-bottom: 20px;
        }

        .input-box i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none;
        }

        .form-select, .form-input {
            width: 100%;
            padding: 16px 18px 16px 48px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--light-bg);
            font-size: 15px;
            font-weight: 600;
            appearance: none;
            transition: 0.3s;
        }

        .form-select:focus, .form-input:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--white);
            box-shadow: 0 0 0 4px var(--primary-soft);
        }

        /* --- Range Grid (Min/Max) --- */
        .range-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .range-box { position: relative; }
        .range-box .unit {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 13px;
            font-weight: 700;
            color: var(--muted);
        }

        /* --- Footer Button --- */
        .filter-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 6%;
            background: var(--white);
            border-top: 1px solid var(--border);
            z-index: 1000;
        }

        .btn-show {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: var(--dark);
            color: var(--white);
            border: none;
            padding: 18px;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-show:hover { background: var(--primary); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        /* Responsive */
        @media (max-width: 480px) {
            .kaross-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .kaross-item { padding: 12px 5px; }
            .range-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="filter-header">
        <a href="index.html" class="close-btn"><i class="fa-solid fa-xmark"></i></a>
        <div class="header-title">Sökfilter</div>
        <button class="reset-link" id="resetAll">Rensa allt</button>
    </div>

    <div class="filter-content">
        
        <div class="section-label">Karosstyp</div>
        <div class="kaross-grid">
            <div class="kaross-item" data-type="SUV">
                <i class="fa-solid fa-truck-monster"></i>
                <span>SUV</span>
            </div>
            <div class="kaross-item" data-type="Kombi">
                <i class="fa-solid fa-car-side"></i>
                <span>Kombi</span>
            </div>
            <div class="kaross-item" data-type="Sedan">
                <i class="fa-solid fa-car"></i>
                <span>Sedan</span>
            </div>
            <div class="kaross-item" data-type="Halvkombi">
                <i class="fa-solid fa-car-rear"></i>
                <span>Hatchback</span>
            </div>
            <div class="kaross-item" data-type="Coupé">
                <i class="fa-solid fa-car-tilt"></i>
                <span>Coupé</span>
            </div>
            <div class="kaross-item" data-type="Cabriolet">
                <i class="fa-solid fa-car-convertible"></i>
                <span>Cab</span>
            </div>
        </div>

        <div class="section-label">Märke & Modell</div>
        <div class="input-box">
            <i class="fa-solid fa-tag"></i>
            <select id="brandFilter" class="form-select">
                <option value="all">Alla märken (جميع الماركات)</option>
            </select>
        </div>
        <div class="input-box">
            <i class="fa-solid fa-car-side"></i>
            <select id="modelFilter" class="form-select" disabled>
                <option value="all">Alla modeller (جميع الموديلات)</option>
            </select>
        </div>

        <div class="section-label">Pris (SEK)</div>
        <div class="range-container">
            <div class="range-box">
                <i class="fa-solid fa-money-bill-1"></i>
                <input type="number" id="minPrice" class="form-input" placeholder="Från">
                <span class="unit">kr</span>
            </div>
            <div class="range-box">
                <input type="number" id="maxPrice" class="form-input" placeholder="Till">
                <span class="unit">kr</span>
            </div>
        </div>

        <div class="section-label">Miltal (Mil)</div>
        <div class="range-container">
            <div class="range-box">
                <i class="fa-solid fa-gauge-high"></i>
                <input type="number" id="minMil" class="form-input" placeholder="Från">
                <span class="unit">mil</span>
            </div>
            <div class="range-box">
                <input type="number" id="maxMil" class="form-input" placeholder="Till">
                <span class="unit">mil</span>
            </div>
        </div>

        <div class="section-label">Årsmodell</div>
        <div class="range-container">
            <div class="range-box">
                <i class="fa-solid fa-calendar-days"></i>
                <input type="number" id="minYear" class="form-input" placeholder="Från">
            </div>
            <div class="range-box">
                <input type="number" id="maxYear" class="form-input" placeholder="Till">
            </div>
        </div>

        <div class="section-label">Drivlina</div>
        <div class="range-container">
            <div class="input-box">
                <i class="fa-solid fa-gas-pump"></i>
                <select id="fuelFilter" class="form-select">
                    <option value="all">Alla bränslen</option>
                    <option value="Bensin">Bensin</option>
                    <option value="Diesel">Diesel</option>
                    <option value="El">Elbil</option>
                    <option value="Hybrid">Hybrid</option>
                </select>
            </div>
            <div class="input-box">
                <i class="fa-solid fa-gear"></i>
                <select id="gearFilter" class="form-select">
                    <option value="all">Alla växellådor</option>
                    <option value="Automat">Automat</option>
                    <option value="Manuell">Manuell</option>
                </select>
            </div>
        </div>

    </div>

    <div class="filter-footer">
        <button class="btn-show" id="applySearch">
            Visa fordon <i class="fa-solid fa-arrow-right"></i>
        </button>
    </div>

    <script type="module">
        import carData from './cars-data.js';

        const brandSel = document.getElementById('brandFilter');
        const modelSel = document.getElementById('modelFilter');
        let selectedKaross = 'all';

        // 1. تعبئة الماركات ديناميكياً
        function init() {
            const sortedBrands = Object.keys(carData).sort();
            sortedBrands.forEach(brand => {
                const opt = document.createElement('option');
                opt.value = brand;
                opt.textContent = brand;
                brandSel.appendChild(opt);
            });
        }

        // 2. تحديث الموديلات عند اختيار ماركة
        brandSel.addEventListener('change', () => {
            const brand = brandSel.value;
            modelSel.innerHTML = '<option value="all">Alla modeller</option>';
            
            if (brand !== 'all' && carData[brand]) {
                modelSel.disabled = false;
                carData[brand].sort().forEach(model => {
                    const opt = document.createElement('option');
                    opt.value = model;
                    opt.textContent = model;
                    modelSel.appendChild(opt);
                });
            } else {
                modelSel.disabled = true;
            }
        });

        // 3. اختيار نوع الهيكل (Visual Selection)
        document.querySelectorAll('.kaross-item').forEach(item => {
            item.addEventListener('click', () => {
                if (item.classList.contains('active')) {
                    item.classList.remove('active');
                    selectedKaross = 'all';
                } else {
                    document.querySelectorAll('.kaross-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    selectedKaross = item.dataset.type;
                }
            });
        });

        // 4. تصفير الفلاتر
        document.getElementById('resetAll').onclick = () => {
            document.querySelectorAll('input').forEach(i => i.value = '');
            document.querySelectorAll('select').forEach(s => s.value = 'all');
            document.querySelectorAll('.kaross-item').forEach(k => k.classList.remove('active'));
            selectedKaross = 'all';
            modelSel.disabled = true;
        };

        // 5. بناء الرابط والتوجه لصفحة النتائج
        document.getElementById('applySearch').onclick = () => {
            const params = new URLSearchParams();

            // جمع البيانات
            const data = {
                brand: brandSel.value,
                model: modelSel.value,
                kar: selectedKaross,
                minP: document.getElementById('minPrice').value,
                maxP: document.getElementById('maxPrice').value,
                minM: document.getElementById('minMil').value,
                maxM: document.getElementById('maxMil').value,
                minY: document.getElementById('minYear').value,
                maxY: document.getElementById('maxYear').value,
                fuel: document.getElementById('fuelFilter').value,
                gear: document.getElementById('gearFilter').value
            };

            // إضافة المعاملات الموجودة فقط للرابط
            Object.entries(data).forEach(([key, val]) => {
                if (val && val !== 'all') {
                    params.append(key, val);
                }
            });

            // التوجه لصفحة النتائج
            window.location.href = `results-fixed.html?${params.toString()}`;
        };

        init();
    </script>
</body>
</html>

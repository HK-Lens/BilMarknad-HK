<!DOCTYPE html>
<html lang="sv">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Filter | BilMarknad-HK</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ================= ROOT ================= */

:root{
    --primary:#f58220;
    --dark:#111827;
    --text:#6b7280;
    --border:#e5e7eb;
    --bg:#f5f7fb;
    --white:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--dark);
}

/* ================= HEADER ================= */

.header{

    position:sticky;
    top:0;
    z-index:1000;

    background:rgba(255,255,255,0.92);

    backdrop-filter:blur(10px);

    border-bottom:1px solid var(--border);

    padding:18px 25px;

    display:flex;
    align-items:center;
    justify-content:space-between;
}

.header-left{
    display:flex;
    align-items:center;
    gap:15px;
}

.close-btn{
    text-decoration:none;
    font-size:28px;
    color:var(--dark);
}

.header h1{
    font-size:22px;
    font-weight:800;
}

.reset-btn{
    color:var(--primary);
    font-weight:700;
    cursor:pointer;
}

/* ================= LAYOUT ================= */

.layout{

    display:grid;

    grid-template-columns:320px 1fr;

    min-height:calc(100vh - 80px);
}

/* ================= SIDEBAR ================= */

.sidebar{

    background:white;

    border-right:1px solid var(--border);

    padding:25px;

    overflow-y:auto;
}

/* ================= FILTER BLOCK ================= */

.filter-block{
    margin-bottom:30px;
}

.filter-title{

    font-size:13px;

    font-weight:800;

    text-transform:uppercase;

    color:#6b7280;

    margin-bottom:14px;

    letter-spacing:0.5px;
}

/* Inputs */

input,
select{

    width:100%;

    height:54px;

    border:1px solid var(--border);

    border-radius:14px;

    padding:0 15px;

    font-size:15px;

    background:#fafafa;

    transition:0.2s;
}

input:focus,
select:focus{

    outline:none;

    border-color:var(--primary);

    background:white;

    box-shadow:0 0 0 4px rgba(245,130,32,0.12);
}

/* Double */

.double{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

/* ================= CHECKBOX ================= */

.checkbox-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.checkbox-item{

    display:flex;
    align-items:center;
    gap:10px;

    font-size:15px;

    cursor:pointer;
}

.checkbox-item input{
    width:18px;
    height:18px;
}

/* ================= BODY TYPES ================= */

.kar-grid{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:12px;
}

.kar-item{

    border:1px solid var(--border);

    border-radius:18px;

    padding:18px 10px;

    text-align:center;

    background:white;

    cursor:pointer;

    transition:0.25s;
}

.kar-item:hover{
    transform:translateY(-2px);
}

.kar-item.active{

    border-color:var(--primary);

    background:#fff5eb;

    box-shadow:0 8px 20px rgba(245,130,32,0.14);
}

.kar-item img{
    width:55px;
    height:55px;
    object-fit:contain;
    margin-bottom:10px;
}

.kar-item span{
    font-size:14px;
    font-weight:700;
}

/* ================= CONTENT ================= */

.content{
    padding:30px;
}

/* Top */

.topbar{

    display:flex;
    align-items:center;
    justify-content:space-between;

    margin-bottom:25px;
}

.results-count{
    font-size:24px;
    font-weight:800;
}

.sort-select{
    width:220px;
}

/* ================= CARDS ================= */

.results{

    display:grid;

    grid-template-columns:
    repeat(auto-fill,minmax(320px,1fr));

    gap:24px;
}

.car-card{

    background:white;

    border-radius:24px;

    overflow:hidden;

    border:1px solid #eee;

    transition:0.3s;

    cursor:pointer;
}

.car-card:hover{

    transform:translateY(-5px);

    box-shadow:0 18px 35px rgba(0,0,0,0.08);
}

.car-card img{

    width:100%;
    height:220px;
    object-fit:cover;
}

.car-body{
    padding:20px;
}

.car-title{

    font-size:19px;

    font-weight:800;

    margin-bottom:8px;
}

.car-info{

    color:#6b7280;

    font-size:14px;

    margin-bottom:14px;
}

.price{

    font-size:28px;

    font-weight:800;

    color:var(--primary);
}

/* ================= APPLY ================= */

.bottom-bar{

    position:sticky;
    bottom:0;

    background:white;

    padding:18px;

    border-top:1px solid var(--border);

    margin-top:30px;
}

.apply-btn{

    width:100%;

    height:58px;

    border:none;

    border-radius:16px;

    background:linear-gradient(135deg,var(--primary),#ff9d4d);

    color:white;

    font-size:17px;

    font-weight:800;

    cursor:pointer;

    transition:0.25s;
}

.apply-btn:hover{
    transform:translateY(-2px);
}

/* ================= MOBILE ================= */

@media(max-width:980px){

    .layout{
        grid-template-columns:1fr;
    }

    .sidebar{
        border-right:none;
        border-bottom:1px solid var(--border);
    }

    .content{
        padding:20px;
    }

    .results{
        grid-template-columns:1fr;
    }

}

</style>

</head>

<body>

<!-- ================= HEADER ================= -->

<div class="header">

    <div class="header-left">

        <a href="index.html" class="close-btn">
            ✕
        </a>

        <h1>Filtrera sökning</h1>

    </div>

    <div class="reset-btn" onclick="location.reload()">
        Rensa filter
    </div>

</div>

<!-- ================= LAYOUT ================= -->

<div class="layout">

    <!-- ================= SIDEBAR ================= -->

    <aside class="sidebar">

        <!-- Brand -->

        <div class="filter-block">

            <div class="filter-title">
                Märke
            </div>

            <select id="brand" onchange="updateModels()">
                <option value="all">Alla märken</option>
            </select>

        </div>

        <!-- Model -->

        <div class="filter-block">

            <div class="filter-title">
                Modell
            </div>

            <select id="model">

                <option value="all">
                    Alla modeller
                </option>

            </select>

        </div>

        <!-- Price -->

        <div class="filter-block">

            <div class="filter-title">
                Pris
            </div>

            <div class="double">

                <input type="number"
                       id="minPrice"
                       placeholder="Från">

                <input type="number"
                       id="maxPrice"
                       placeholder="Till">

            </div>

        </div>

        <!-- Year -->

        <div class="filter-block">

            <div class="filter-title">
                Årsmodell
            </div>

            <div class="double">

                <input type="number"
                       id="yearFrom"
                       placeholder="1990">

                <input type="number"
                       id="yearTo"
                       placeholder="2026">

            </div>

        </div>

        <!-- Fuel -->

        <div class="filter-block">

            <div class="filter-title">
                Drivmedel
            </div>

            <div class="checkbox-list">

                <label class="checkbox-item">
                    <input type="checkbox" value="Bensin">
                    Bensin
                </label>

                <label class="checkbox-item">
                    <input type="checkbox" value="Diesel">
                    Diesel
                </label>

                <label class="checkbox-item">
                    <input type="checkbox" value="Hybrid">
                    Hybrid
                </label>

                <label class="checkbox-item">
                    <input type="checkbox" value="El">
                    Elbil
                </label>

            </div>

        </div>

        <!-- Body -->

        <div class="filter-block">

            <div class="filter-title">
                Karosseri
            </div>

            <div class="kar-grid">

                <div class="kar-item"
                     onclick="setKar('SUV', this)">

                    <img src="https://cdn-icons-png.flaticon.com/512/3202/3202931.png">

                    <span>SUV</span>

                </div>

                <div class="kar-item"
                     onclick="setKar('Sedan', this)">

                    <img src="https://cdn-icons-png.flaticon.com/512/3202/3202926.png">

                    <span>Sedan</span>

                </div>

                <div class="kar-item"
                     onclick="setKar('Kombi', this)">

                    <img src="https://cdn-icons-png.flaticon.com/512/3202/3202921.png">

                    <span>Kombi</span>

                </div>

                <div class="kar-item"
                     onclick="setKar('Coupe', this)">

                    <img src="https://cdn-icons-png.flaticon.com/512/744/744465.png">

                    <span>Coupe</span>

                </div>

            </div>

        </div>

        <!-- Button -->

        <div class="bottom-bar">

            <button class="apply-btn" onclick="applyFilters()">

                Visa resultat

            </button>

        </div>

    </aside>

    <!-- ================= CONTENT ================= -->

    <main class="content">

        <div class="topbar">

            <div class="results-count">
                Alla bilar
            </div>

            <select class="sort-select">

                <option>Senaste</option>

                <option>Pris stigande</option>

                <option>Pris fallande</option>

                <option>Årsmodell</option>

            </select>

        </div>

        <!-- Cars -->

        <div class="results" id="results">

        </div>

    </main>

</div>

<!-- ================= CAR DATA ================= -->

<script>

/* ================= HUGE CAR DATABASE ================= */

const carData = {

    "Audi":[
        "80","100","A1","A3","A4","A5","A6","A7","A8",
        "Q2","Q3","Q5","Q7","Q8",
        "TT","R8","e-tron","RS3","RS6"
    ],

    "BMW":[
        "1-serie","2-serie","3-serie","4-serie",
        "5-serie","6-serie","7-serie","8-serie",
        "X1","X3","X5","X6","X7",
        "Z3","Z4",
        "i3","i4","i5","i7","iX"
    ],

    "Mercedes-Benz":[
        "190","A-Klass","B-Klass","C-Klass",
        "E-Klass","S-Klass",
        "CLA","CLS",
        "GLA","GLB","GLC","GLE","GLS",
        "SL","EQC","EQE","EQS"
    ],

    "Volvo":[
        "240","740","850",
        "S40","S60","S80","S90",
        "V40","V60","V70","V90",
        "XC40","XC60","XC70","XC90",
        "C30","EX30","EX90"
    ],

    "Volkswagen":[
        "Golf","Passat","Polo","Touareg",
        "Tiguan","Arteon","ID.3","ID.4",
        "ID.7","Beetle","Scirocco"
    ],

    "Toyota":[
        "Corolla","Camry","Yaris",
        "Avensis","RAV4","Land Cruiser",
        "Hilux","Prius","Supra",
        "Celica","MR2","bZ4X"
    ],

    "Tesla":[
        "Model S","Model 3",
        "Model X","Model Y",
        "Cybertruck","Roadster"
    ],

    "Ford":[
        "Fiesta","Focus","Mondeo",
        "Mustang","Explorer","Kuga",
        "Bronco","F-150"
    ],

    "Porsche":[
        "911","718 Cayman",
        "718 Boxster","Panamera",
        "Macan","Cayenne","Taycan"
    ],

    "Ferrari":[
        "F40","F50","Enzo",
        "458 Italia","488 GTB",
        "Roma","SF90","LaFerrari"
    ]

};

/* ================= SAMPLE CARS ================= */

const cars = [

{
    brand:"Volvo",
    model:"XC60",
    year:2023,
    price:359000,
    image:"https://images.unsplash.com/photo-1555215695-3004980ad54e?q=80&w=1200&auto=format&fit=crop"
},

{
    brand:"BMW",
    model:"X5",
    year:2020,
    price:304000,
    image:"https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=1200&auto=format&fit=crop"
},

{
    brand:"Audi",
    model:"Q5",
    year:2022,
    price:259000,
    image:"https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1200&auto=format&fit=crop"
}

];

/* ================= BRANDS ================= */

const brandSelect =
    document.getElementById('brand');

Object.keys(carData)
.sort()
.forEach(brand => {

    brandSelect.innerHTML += `
        <option value="${brand}">
            ${brand}
        </option>
    `;

});

/* ================= UPDATE MODELS ================= */

function updateModels(){

    const brand =
        document.getElementById('brand').value;

    const model =
        document.getElementById('model');

    model.innerHTML =
        '<option value="all">Alla modeller</option>';

    if(carData[brand]){

        carData[brand]
        .sort()
        .forEach(m => {

            model.innerHTML += `
                <option value="${m}">
                    ${m}
                </option>
            `;

        });

    }

}

/* ================= BODY TYPE ================= */

let selectedKar = "all";

function setKar(type, el){

    document
    .querySelectorAll('.kar-item')
    .forEach(i => i.classList.remove('active'));

    el.classList.add('active');

    selectedKar = type;
}

/* ================= APPLY ================= */

function applyFilters(){

    const brand =
        document.getElementById('brand').value;

    const model =
        document.getElementById('model').value;

    const minPrice =
        Number(document.getElementById('minPrice').value) || 0;

    const maxPrice =
        Number(document.getElementById('maxPrice').value) || Infinity;

    const yearFrom =
        Number(document.getElementById('yearFrom').value) || 1900;

    const yearTo =
        Number(document.getElementById('yearTo').value) || 2026;

    const filtered = cars.filter(c =>

        (brand === 'all' || c.brand === brand)

        &&

        (model === 'all' || c.model === model)

        &&

        (c.price >= minPrice)

        &&

        (c.price <= maxPrice)

        &&

        (c.year >= yearFrom)

        &&

        (c.year <= yearTo)

    );

    render(filtered);

}

/* ================= RENDER ================= */

function render(data){

    const results =
        document.getElementById('results');

    if(data.length === 0){

        results.innerHTML = `
            <div style="
                background:white;
                padding:40px;
                border-radius:24px;
                text-align:center;
                font-size:18px;
                font-weight:700;
            ">
                Inga bilar hittades
            </div>
        `;

        return;
    }

    results.innerHTML = data.map(c => `

        <div class="car-card">

            <img src="${c.image}">

            <div class="car-body">

                <div class="car-title">
                    ${c.brand} ${c.model}
                </div>

                <div class="car-info">
                    ${c.year}
                </div>

                <div class="price">
                    ${c.price.toLocaleString()} kr
                </div>

            </div>

        </div>

    `).join('');

}

/* ================= INIT ================= */

render(cars);

</script>

</body>
</html>

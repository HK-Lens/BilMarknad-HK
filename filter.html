<script type="module">

import { auth } from './firebase-config.js';

import {
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

import { carData } from './cars-data.js';

onAuthStateChanged(auth,(user)=>{

const container =
document.getElementById('authStatusContainer');

if(user){

container.innerHTML = `
<a href="dashboard.html"
style="
text-decoration:none;
color:var(--primary);
font-weight:800;
">
Mitt Konto
</a>
`;

}else{

container.innerHTML = `
<a href="login.html"
style="
text-decoration:none;
color:var(--dark);
font-weight:700;
">
Logga in
</a>
`;

}

});

const brandSelect =
document.getElementById('brandSelect');

const modelSelect =
document.getElementById('modelSelect');

Object.keys(carData)
.sort()
.forEach(brand=>{

brandSelect.innerHTML += `
<option value="${brand}">
${brand}
</option>
`;

});

brandSelect.addEventListener('change',()=>{

modelSelect.innerHTML =
'<option value="">Alla modeller</option>';

const selectedBrand =
brandSelect.value;

if(
selectedBrand &&
carData[selectedBrand]
){

carData[selectedBrand]
.sort()
.forEach(model=>{

modelSelect.innerHTML += `
<option value="${model}">
${model}
</option>
`;

});

}

});

function cleanValue(value){

if(
value === null ||
value === undefined
){

return '';

}

return value.toString().trim();

}

function addParam(params,key,value){

const cleaned = cleanValue(value);

if(cleaned !== ''){

params.append(key,cleaned);

}

}

document
.getElementById('applyFiltersBtn')
.addEventListener('click',()=>{

const params =
new URLSearchParams();

const minPrice =
Number(
document.getElementById('minPrice').value
);

const maxPrice =
Number(
document.getElementById('maxPrice').value
);

const minYear =
Number(
document.getElementById('minYear').value
);

const maxYear =
Number(
document.getElementById('maxYear').value
);

if(
minPrice &&
maxPrice &&
minPrice > maxPrice
){

alert('Min pris kan inte vara större än max pris.');

return;

}

if(
minYear &&
maxYear &&
minYear > maxYear
){

alert('Min år kan inte vara större än max år.');

return;

}

addParam(
params,
'brand',
document.getElementById('brandSelect').value
);

addParam(
params,
'model',
document.getElementById('modelSelect').value
);

addParam(
params,
'minP',
document.getElementById('minPrice').value
);

addParam(
params,
'maxP',
document.getElementById('maxPrice').value
);

addParam(
params,
'yFrom',
document.getElementById('minYear').value
);

addParam(
params,
'yTo',
document.getElementById('maxYear').value
);

addParam(
params,
'milFrom',
document.getElementById('minMil').value
);

addParam(
params,
'milTo',
document.getElementById('maxMil').value
);

addParam(
params,
'fuel',
document.getElementById('fuel').value
);

addParam(
params,
'gear',
document.getElementById('gear').value
);

addParam(
params,
'drive',
document.getElementById('drive').value
);

addParam(
params,
'color',
document.getElementById('color').value
);

addParam(
params,
'minHp',
document.getElementById('minHp').value
);

addParam(
params,
'seats',
document.getElementById('seats').value
);

addParam(
params,
'doors',
document.getElementById('doors').value
);

addParam(
params,
'body',
document.getElementById('body').value
);

const selectedFeatures = [];

document
.querySelectorAll('.feat:checked')
.forEach(cb=>{

selectedFeatures.push(
cleanValue(cb.value)
);

});

if(selectedFeatures.length > 0){

params.append(
'features',
selectedFeatures.join(',')
);

}

window.location.href =
`results.html?${params.toString()}`;

});

</script>

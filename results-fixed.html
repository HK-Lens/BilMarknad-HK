<!DOCTYPE html>
<html lang="sv" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sökresultat | BILHK Professional</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --white: #ffffff; --border: #e2e8f0; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; }
        nav { background: var(--white); padding: 15px 6%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .main-layout { display: grid; grid-template-columns: 300px 1fr; gap: 40px; max-width: 1400px; margin: 40px auto; padding: 0 5%; }
        .filter-card { background: var(--white); padding: 25px; border-radius: 24px; border: 1px solid var(--border); position: sticky; top: 20px; }
        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .car-card { background: var(--white); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; transition: 0.3s; text-decoration: none; color: inherit; }
        .car-card:hover { transform: translateY(-10px); box-shadow: 0 20px 30px rgba(0,0,0,0.05); }
        .img-box { height: 220px; background: #eee; position: relative; }
        .price-tag { position: absolute; bottom: 15px; right: 15px; background: var(--primary); color: white; padding: 8px 18px; border-radius: 12px; font-weight: 900; }
        .info { padding: 20px; }
        .empty-state { text-align: center; padding: 100px 0; grid-column: 1/-1; }
    </style>
</head>
<body>

<nav><a href="index.html" style="font-weight:900; text-decoration:none; color:black; font-size:24px;">BIL<span>HK</span></a></nav>

<div class="main-layout">
    <aside>
        <div class="filter-card">
            <h3 style="margin-bottom:20px;">Filtrera</h3>
            <label style="font-size:12px; font-weight:900;">MÄRKE</label>
            <select id="fBrand" style="width:100%; padding:12px; margin-bottom:20px; border-radius:10px; border:1px solid #ddd;"></select>
            <button id="applyF" style="width:100%; padding:15px; background:var(--dark); color:white; border:none; border-radius:12px; font-weight:900; cursor:pointer;">Uppdatera</button>
        </div>
    </aside>

    <main>
        <div id="counter" style="margin-bottom:20px; font-weight:700;">Laddar annonser...</div>
        <div class="results-grid" id="resultsGrid"></div>
    </main>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import carData from './cars-data.js';

    const grid = document.getElementById('resultsGrid');
    const params = new URLSearchParams(window.location.search);

    async function init() {
        // تعبئة الماركات
        const brandSel = document.getElementById('fBrand');
        Object.keys(carData).forEach(b => {
            const o = document.createElement('option'); o.value = b; o.textContent = b;
            brandSel.appendChild(o);
        });
        brandSel.value = params.get('brand') || 'all';

        await fetchAds();
    }

    async function fetchAds() {
        grid.innerHTML = "Laddar...";
        try {
            // جلب الإعلانات النشطة فقط
            const q = query(collection(db, "cars"), where("status", "==", "active"));
            const snap = await getDocs(q);
            
            let cars = [];
            snap.forEach(doc => cars.push({ id: doc.id, ...doc.data() }));

            // الفلترة البرمجية المعمقة
            const brandF = params.get('brand');
            const maxPF = Number(params.get('maxP')) || Infinity;

            const filtered = cars.filter(c => {
                const matchB = !brandF || brandF === 'all' || c.brand === brandF;
                const matchP = Number(c.price) <= maxPF;
                return matchB && matchP;
            });

            render(filtered);
        } catch (e) {
            console.error(e);
            grid.innerHTML = "Ett fel uppstod.";
        }
    }

    function render(data) {
        grid.innerHTML = "";
        document.getElementById('counter').innerText = `${data.length} bilar hittades`;
        if (data.length === 0) {
            grid.innerHTML = `<div class="empty-state"><h2>Inga bilar hittades</h2></div>`;
            return;
        }
        data.forEach(c => {
            grid.innerHTML += `
                <a href="details.html?id=${c.id}" class="car-card">
                    <div class="img-box">
                        <img src="${c.images?.[0] || ''}" style="width:100%; height:100%; object-fit:cover;">
                        <div class="price-tag">${Number(c.price).toLocaleString()} kr</div>
                    </div>
                    <div class="info">
                        <h3>${c.brand} ${c.model}</h3>
                        <p style="color:#666; font-size:14px; margin-top:10px;">${c.year} | ${c.mileage} mil | ${c.fuel}</p>
                    </div>
                </a>`;
        });
    }

    document.getElementById('applyF').onclick = () => {
        const b = document.getElementById('fBrand').value;
        location.href = `results-fixed.html?brand=${b}`;
    };

    init();
</script>
</body>
</html>

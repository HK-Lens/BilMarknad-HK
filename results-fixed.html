<!DOCTYPE html>
<html lang="sv" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sökresultat | BILHK Professional Search Engine</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #f58220;
            --primary-hover: #e07210;
            --primary-soft: #fff5eb;
            --dark: #0f172a;
            --dark-2: #1e293b;
            --muted: #64748b;
            --bg: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
            --success: #10b981;
            --shadow: 0 15px 35px rgba(0,0,0,0.05);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--dark); line-height: 1.6; }

        /* --- Navigation Architecture --- */
        nav {
            background: var(--white);
            padding: 15px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-size: 24px; font-weight: 900; text-decoration: none; color: var(--dark); letter-spacing: -1px; }
        .logo span { color: var(--primary); }

        /* --- Search Bar Header --- */
        .results-header {
            background: var(--white);
            padding: 20px 6%;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .search-summary h1 { font-size: 22px; font-weight: 800; }
        .search-summary p { font-size: 14px; color: var(--muted); }

        .view-controls { display: flex; gap: 10px; align-items: center; }
        .control-btn {
            padding: 10px 15px;
            background: var(--soft);
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: var(--transition);
        }
        .control-btn.active { background: var(--dark); color: white; border-color: var(--dark); }
        .control-btn:hover:not(.active) { border-color: var(--primary); color: var(--primary); }

        /* --- Main Layout Grid --- */
        .main-layout {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 40px;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 40px;
        }

        /* --- Sidebar Filters --- */
        .sidebar { position: sticky; top: 100px; height: fit-content; }
        .filter-card {
            background: var(--white);
            border-radius: 24px;
            border: 1px solid var(--border);
            padding: 25px;
            box-shadow: var(--shadow);
        }
        .filter-section { margin-bottom: 25px; }
        .filter-section h4 { font-size: 14px; font-weight: 800; margin-bottom: 15px; text-transform: uppercase; color: var(--muted); }
        
        .filter-input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg);
            font-size: 14px;
            margin-bottom: 10px;
        }

        /* --- Results Grid Architecture --- */
        .results-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            transition: var(--transition);
        }

        /* Grid View Card */
        .car-card {
            background: var(--white);
            border-radius: 28px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: var(--transition);
            text-decoration: none;
            color: inherit;
            position: relative;
        }
        .car-card:hover { transform: translateY(-10px); box-shadow: var(--shadow); border-color: var(--primary); }

        .img-box { width: 100%; height: 220px; background: #eee; position: relative; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .price-badge {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: var(--primary);
            color: white;
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 18px;
        }

        .card-body { padding: 25px; }
        .card-title { font-size: 19px; font-weight: 800; margin-bottom: 10px; }
        .card-specs { display: flex; gap: 15px; font-size: 13px; color: var(--muted); font-weight: 600; }
        .card-specs span { display: flex; align-items: center; gap: 5px; }

        /* List View Modifier */
        .results-container.list-view { grid-template-columns: 1fr; }
        .results-container.list-view .car-card { display: flex; height: 200px; }
        .results-container.list-view .img-box { width: 300px; height: 100%; }

        /* --- Skeleton Loader --- */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #f8f8f8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading { from { background-position: 200% 0; } to { background-position: -200% 0; } }

        /* --- Empty State --- */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px 20px;
        }
        .no-results i { font-size: 60px; color: var(--border); margin-bottom: 20px; }

        @media (max-width: 992px) {
            .main-layout { grid-template-columns: 1fr; padding: 20px; }
            .sidebar { display: none; } /* يمكن تحويله لفلتر منسدل لاحقاً */
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">BIL<span>HK</span></a>
        <div id="navAuthArea">
            </div>
    </nav>

    <header class="results-header">
        <div class="search-summary">
            <h1 id="resultTitle">Sökresultat</h1>
            <p id="resultCount">Hittar fordon...</p>
        </div>

        <div class="view-controls">
            <div style="margin-right: 20px;">
                <select id="sortOrder" class="control-btn" style="width: 180px;">
                    <option value="newest">Senast inkomna</option>
                    <option value="priceLow">Pris: Lågt till högt</option>
                    <option value="priceHigh">Pris: Högt till lågt</option>
                    <option value="milLow">Miltal: Lägst först</option>
                </select>
            </div>
            <button class="control-btn active" id="gridViewBtn"><i class="fa-solid fa-grid-2"></i></button>
            <button class="control-btn" id="listViewBtn"><i class="fa-solid fa-list"></i></button>
        </div>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <div class="filter-card">
                <div class="filter-section">
                    <h4>Märke</h4>
                    <select id="sideBrand" class="filter-input">
                        <option value="all">Alla märken</option>
                    </select>
                </div>
                <div class="filter-section">
                    <h4>Bränsle</h4>
                    <select id="sideFuel" class="filter-input">
                        <option value="all">Alla typer</option>
                        <option value="Bensin">Bensin</option>
                        <option value="Diesel">Diesel</option>
                        <option value="El">Elbil</option>
                    </select>
                </div>
                <div class="filter-section">
                    <h4>Prisintervall</h4>
                    <div style="display: flex; gap: 5px;">
                        <input type="number" id="sideMinP" class="filter-input" placeholder="Från">
                        <input type="number" id="sideMaxP" class="filter-input" placeholder="Till">
                    </div>
                </div>
                <button class="control-btn active" style="width: 100%; background: var(--primary); border: none;" id="applySideFilter">Uppdatera sökning</button>
            </div>
        </aside>

        <section>
            <div class="results-container" id="resultsGrid">
                <div class="car-card skeleton" style="height: 380px;"></div>
                <div class="car-card skeleton" style="height: 380px;"></div>
                <div class="car-card skeleton" style="height: 380px;"></div>
            </div>
        </section>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import carData from './cars-data.js';

        const urlParams = new URLSearchParams(window.location.search);
        let currentCars = [];

        // 1. تهيئة الفلاتر الجانبية
        function initSidebar() {
            const sideBrand = document.getElementById('sideBrand');
            Object.keys(carData).sort().forEach(b => {
                const opt = document.createElement('option');
                opt.value = b;
                opt.textContent = b;
                sideBrand.appendChild(opt);
            });

            // تعبئة الفلاتر من الرابط الحالي
            sideBrand.value = urlParams.get('brand') || 'all';
            document.getElementById('sideFuel').value = urlParams.get('fuel') || 'all';
            document.getElementById('sideMinP').value = urlParams.get('minP') || '';
            document.getElementById('sideMaxP').value = urlParams.get('maxP') || '';
        }

        // 2. المحرك الرئيسي لجلب البيانات
        async function fetchResults() {
            const grid = document.getElementById('resultsGrid');
            const brand = urlParams.get('brand');
            const fuel = urlParams.get('fuel');
            const minP = Number(urlParams.get('minP')) || 0;
            const maxP = Number(urlParams.get('maxP')) || Infinity;

            try {
                // بناء الاستعلام الأساسي (Firebase لا يدعم الفلترة المتعددة بنطاقات بسهولة بدون اندكسات مركبة)
                // لذا سنقوم بجلب البيانات وفلترتها برمجياً لضمان "العمق" والمرونة
                let q = query(collection(db, "cars"), where("status", "==", "active"));
                
                const querySnapshot = await getDocs(q);
                currentCars = [];

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const car = { id: doc.id, ...data };

                    // الفلترة البرمجية المتقدمة
                    const matchesBrand = !brand || brand === 'all' || car.brand === brand;
                    const matchesFuel = !fuel || fuel === 'all' || car.fuel === fuel;
                    const price = Number(car.price);
                    const matchesPrice = price >= minP && price <= maxP;

                    if (matchesBrand && matchesFuel && matchesPrice) {
                        currentCars.push(car);
                    }
                });

                applySortingAndRender();
            } catch (err) {
                console.error("Fetch Error:", err);
            }
        }

        // 3. نظام الفرز والعرض
        function applySortingAndRender() {
            const sort = document.getElementById('sortOrder').value;
            
            // الفرز
            currentCars.sort((a, b) => {
                if (sort === 'priceLow') return a.price - b.price;
                if (sort === 'priceHigh') return b.price - a.price;
                if (sort === 'milLow') return a.mileage - b.mileage;
                return b.createdAt - a.createdAt; // newest
            });

            renderResults();
        }

        function renderResults() {
            const grid = document.getElementById('resultsGrid');
            const countEl = document.getElementById('resultCount');
            
            grid.innerHTML = "";
            countEl.innerText = `${currentCars.length} fordon hittades`;

            if (currentCars.length === 0) {
                grid.innerHTML = `
                    <div class="no-results">
                        <i class="fa-solid fa-car-magnifying-glass"></i>
                        <h2>Inga bilar matchar din sökning</h2>
                        <p>Prova att ändra dina filter eller sök på något annat.</p>
                    </div>`;
                return;
            }

            currentCars.forEach(car => {
                const price = Number(car.price).toLocaleString('sv-SE');
                const img = (car.images && car.images.length > 0) ? car.images[0] : 'placeholder.jpg';
                
                grid.innerHTML += `
                    <a href="details.html?id=${car.id}" class="car-card">
                        <div class="img-box">
                            <img src="${img}" alt="${car.brand}" loading="lazy">
                            <div class="price-badge">${price} kr</div>
                        </div>
                        <div class="card-body">
                            <div class="card-title">${car.brand} ${car.model}</div>
                            <div class="card-specs">
                                <span><i class="fa-regular fa-calendar"></i> ${car.year}</span>
                                <span><i class="fa-solid fa-gauge"></i> ${car.mileage} mil</span>
                                <span><i class="fa-solid fa-gas-pump"></i> ${car.fuel}</span>
                            </div>
                        </div>
                    </a>
                `;
            });
        }

        // 4. التحكم في العرض (Grid/List)
        document.getElementById('gridViewBtn').onclick = () => {
            document.getElementById('resultsGrid').classList.remove('list-view');
            document.getElementById('gridViewBtn').classList.add('active');
            document.getElementById('listViewBtn').classList.remove('active');
        };

        document.getElementById('listViewBtn').onclick = () => {
            document.getElementById('resultsGrid').classList.add('list-view');
            document.getElementById('listViewBtn').classList.add('active');
            document.getElementById('gridViewBtn').classList.remove('active');
        };

        // 5. تطبيق الفلاتر الجانبية
        document.getElementById('applySideFilter').onclick = () => {
            const brand = document.getElementById('sideBrand').value;
            const fuel = document.getElementById('sideFuel').value;
            const minP = document.getElementById('sideMinP').value;
            const maxP = document.getElementById('sideMaxP').value;

            const params = new URLSearchParams();
            if (brand !== 'all') params.set('brand', brand);
            if (fuel !== 'all') params.set('fuel', fuel);
            if (minP) params.set('minP', minP);
            if (maxP) params.set('maxP', maxP);

            window.location.href = `results-fixed.html?${params.toString()}`;
        };

        document.getElementById('sortOrder').onchange = applySortingAndRender;

        // التشغيل
        initSidebar();
        fetchResults();
    </script>
</body>
</html>

<!DOCTYPE html><html lang="sv"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Skapa konto | BILHK</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script><style>:root{--primary:#f58220;--dark:#0f172a;--bg:#f8fafc;--border:#e2e8f0}*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,sans-serif}body{background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.card{background:white;border:1px solid var(--border);border-radius:30px;padding:36px;max-width:560px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,.06)}.logo{text-align:center;display:block;text-decoration:none;font-size:32px;font-weight:900;color:var(--dark);margin-bottom:18px}.logo span{color:var(--primary)}.tabs{display:flex;background:#f1f5f9;padding:5px;border-radius:14px;margin-bottom:18px}.tab{flex:1;padding:12px;border:0;border-radius:10px;font-weight:900;color:#64748b}.tab.active{background:white;color:var(--dark)}label{display:block;font-size:11px;text-transform:uppercase;font-weight:900;color:#64748b;margin-bottom:7px}input{width:100%;padding:13px;border:1px solid var(--border);border-radius:12px;background:#f8fafc;margin-bottom:12px;font-weight:700}.btn{width:100%;padding:15px;border:0;border-radius:13px;background:var(--primary);color:white;font-weight:900;cursor:pointer;margin-top:8px}.check{font-size:13px;font-weight:700;color:#334155;display:flex;gap:8px;align-items:flex-start}.notice{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;padding:13px;border-radius:13px;font-size:13px;font-weight:700;margin-bottom:14px;line-height:1.5}</style></head><body><div class="card"><a href="index.html" class="logo">BIL<span>HK</span></a><div class="notice">Konto kan användas först efter godkännande av användarvillkor och ansvarsfriskrivning.</div><div class="tabs"><button id="pTab" class="tab active" type="button">Privatperson</button><button id="fTab" class="tab" type="button">Företag</button></div><form id="form"><div id="biz" style="display:none"><label>Företagsnamn</label><input id="companyName"><label>Organisationsnummer</label><input id="taxId"><label>Webbplats</label><input id="website"></div><label>Namn</label><input id="name" required><label>E-post</label><input type="email" id="email" required><label>Telefon</label><input id="phone"><label>Adress</label><input id="address"><label>Lösenord</label><input type="password" id="pass" minlength="8" required><label>Bekräfta lösenord</label><input type="password" id="confirm" minlength="8" required><label class="check"><input type="checkbox" id="terms" required> Jag godkänner <a href="terms.html" target="_blank">användarvillkor och ansvarsfriskrivning</a>.</label><button class="btn" id="btn">Skapa konto</button></form></div><script type="module">import{auth,db}from'./firebase-config.js';import{createUserWithEmailAndPassword}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";import{doc,setDoc,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";let mode='Privat';pTab.onclick=()=>{mode='Privat';pTab.classList.add('active');fTab.classList.remove('active');biz.style.display='none'};fTab.onclick=()=>{mode='Foretag';fTab.classList.add('active');pTab.classList.remove('active');biz.style.display='block'};form.onsubmit=async e=>{e.preventDefault();if(pass.value!==confirm.value)return Swal.fire('Fel','Lösenorden matchar inte.','warning');btn.disabled=true;btn.textContent='Skapar...';try{const c=await createUserWithEmailAndPassword(auth,email.value.trim(),pass.value);await setDoc(doc(db,'users',c.user.uid),{uid:c.user.uid,userType:mode,name:name.value.trim(),companyName:companyName.value.trim(),taxId:taxId.value.trim(),email:email.value.trim(),phone:phone.value.trim(),address:address.value.trim(),website:website.value.trim(),profilePublic:true,showPhone:false,showEmail:false,showAddress:false,showWebsite:false,savedCars:[],createdAt:serverTimestamp(),lastActiveAt:serverTimestamp(),termsAcceptedAt:serverTimestamp()},{merge:true});location.href='dashboard.html';}catch(err){Swal.fire('Fel',err.message,'error');btn.disabled=false;btn.textContent='Skapa konto';}};</script></body></html>

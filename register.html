<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skapa konto | BILHK</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--dark); display: flex; align-items: center; justify-content: center; min-height: 100vh; }

        .auth-card { background: white; width: 100%; max-width: 450px; padding: 40px; border-radius: 30px; border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .logo-area { text-align: center; margin-bottom: 30px; text-decoration: none; display: block; }
        .logo-area h1 { font-weight: 900; font-size: 28px; color: var(--dark); }
        .logo-area span { color: var(--primary); }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 8px; text-transform: uppercase; }
        input { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; background: #f1f5f9; outline: none; font-size: 14px; transition: 0.3s; }
        input:focus { border-color: var(--primary); background: white; }

        .btn-register { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-register:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(245, 130, 32, 0.3); }

        .footer-links { text-align: center; margin-top: 25px; font-size: 14px; color: #64748b; }
        .footer-links a { color: var(--primary); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

<div class="auth-card">
    <a href="index.html" class="logo-area"><h1>BIL<span>HK</span></h1></a>
    <h2 style="margin-bottom: 25px; font-weight: 900; text-align: center;">Skapa nytt konto</h2>

    <form id="registerForm">
        <div class="form-group">
            <label>E-postadress</label>
            <input type="email" id="email" placeholder="Din e-post" required>
        </div>
        
        <div class="form-group">
            <label>Mobilnummer</label>
            <input type="text" id="phone" placeholder="T.ex 0701234567" required>
        </div>

        <div class="form-group">
            <label>Adress</label>
            <input type="text" id="address" placeholder="Stad, Gata" required>
        </div>

        <div class="form-group">
            <label>Lösenord</label>
            <input type="password" id="password" placeholder="Minst 6 tecken" required>
        </div>

        <div class="form-group">
            <label>Bekräfta Lösenord</label>
            <input type="password" id="confirmPassword" placeholder="Upprepa lösenord" required>
        </div>

        <button type="submit" class="btn-register" id="regBtn">Registrera konto</button>
    </form>

    <div class="footer-links">
        Har du redan ett konto? <a href="login.html">Logga in här</a>
    </div>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    document.getElementById('registerForm').onsubmit = async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const phone = document.getElementById('phone').value;
        const address = document.getElementById('address').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const btn = document.getElementById('regBtn');

        // Validation
        if (password !== confirmPassword) {
            Swal.fire('Fel', 'Lösenorden matchar inte.', 'error');
            return;
        }

        if (password.length < 6) {
            Swal.fire('Fel', 'Lösenordet måste vara minst 6 tecken.', 'warning');
            return;
        }

        btn.disabled = true;
        btn.innerText = "Skapar konto...";

        try {
            // 1. Create User in Firebase Auth
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            // 2. Save Additional Info in Firestore
            await setDoc(doc(db, "users", user.uid), {
                uid: user.uid,
                email: email,
                phone: phone,
                address: address,
                createdAt: serverTimestamp()
            });

            await Swal.fire({
                title: 'Välkommen!',
                text: 'Ditt konto har skapats framgångsrikt.',
                icon: 'success',
                confirmButtonColor: '#f58220'
            });

            window.location.href = "dashboard.html";

        } catch (error) {
            console.error(error);
            let msg = "Kunde inte registrera kontot.";
            if (error.code === 'auth/email-already-in-use') msg = "E-postadressen används redan.";
            
            Swal.fire('Ett fel uppstod', msg, 'error');
            btn.disabled = false;
            btn.innerText = "Registrera konto";
        }
    };
</script>
</body>
</html>

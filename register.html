<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skapa konto | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f4f6f9; --border: #e5e7eb; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .auth-card { background: white; padding: 35px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); width: 100%; max-width: 550px; border: 1px solid var(--border); }
        .logo { text-decoration: none; font-size: 30px; font-weight: 900; color: var(--dark); margin-bottom: 20px; display: block; text-align: center; }
        .logo span { color: var(--primary); }
        h2 { font-size: 22px; margin-bottom: 20px; text-align: center; color: var(--dark); }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 13px; font-weight: 700; color: #374151; margin-bottom: 6px; }
        input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; background: #f9fafb; font-size: 14px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); background: white; }
        #businessFields { display: none; background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px dashed #cbd5e1; margin-bottom: 15px; }
        .disclaimer-box { background: #fff8f1; border: 1px solid #fde6d5; padding: 15px; border-radius: 12px; margin: 20px 0; display: flex; gap: 12px; align-items: flex-start; text-align: left; }
        .disclaimer-box input { width: 22px; height: 22px; cursor: pointer; accent-color: var(--primary); margin-top: 3px; }
        .disclaimer-box label { font-size: 12px; color: #555; line-height: 1.6; font-weight: 400; cursor: pointer; }
        .btn-primary { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-primary:hover { background: #e07210; transform: translateY(-2px); }
        .footer-links { margin-top: 25px; text-align: center; font-size: 15px; color: #64748b; border-top: 1px solid #eee; padding-top: 20px; }
        .footer-links a { color: var(--primary); text-decoration: none; font-weight: 700; background: #fff4eb; padding: 5px 15px; border-radius: 8px; }
    </style>
</head>
<body>
<div class="auth-card">
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <h2>Skapa nytt konto</h2>
    <form id="regForm">
        <div class="form-group">
            <label>Kontotyp</label>
            <select id="userType" onchange="toggleFields()">
                <option value="private">Privatperson</option>
                <option value="business">Företag / Bilhandlare</option>
            </select>
        </div>
        <div class="form-group"><label id="nameLabel">Ditt Namn</label><input type="text" id="fullName" required></div>
        <div id="businessFields">
            <div class="form-group"><label>Organisationsnummer</label><input type="text" id="taxId"></div>
            <div class="form-group"><label>Företagsadress</label><input type="text" id="address"></div>
        </div>
        <div class="form-group"><label>E-postadress</label><input type="email" id="email" required></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="form-group"><label>Lösenord</label><input type="password" id="pass" required></div>
            <div class="form-group"><label>Bekräfta</label><input type="password" id="confirmPass" required></div>
        </div>
        <div class="disclaimer-box">
            <input type="checkbox" id="termsCheck" required>
            <label for="termsCheck"><strong>Ansvarsfriskrivning:</strong> Jag godkänner أن BILHK منصة وساطة فقط ولا تتحمل مسؤولية الصفقات.</label>
        </div>
        <button type="submit" class="btn-primary" id="regBtn">Skapa konto</button>
    </form>
    <div class="footer-links">Har du redan ett konto? <a href="login.html">Logga in här</a></div>
</div>
<script type="module">
    import { auth, db } from './firebase-config.js';
    import { createUserWithEmailAndPassword, updateProfile, sendEmailVerification, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    window.toggleFields = () => {
        const type = document.getElementById('userType').value;
        document.getElementById('businessFields').style.display = type === 'business' ? 'block' : 'none';
        document.getElementById('nameLabel').innerText = type === 'business' ? "Företagsnamn" : "Ditt Namn";
    };
    document.getElementById('regForm').onsubmit = async (e) => {
        e.preventDefault();
        const name = document.getElementById('fullName').value;
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        if (pass !== document.getElementById('confirmPass').value) { alert("Lösenorden matchar inte!"); return; }
        const btn = document.getElementById('regBtn');
        btn.disabled = true; btn.innerText = "Behandlar...";
        try {
            const userCred = await createUserWithEmailAndPassword(auth, email, pass);
            await updateProfile(userCred.user, { displayName: name });
            await sendEmailVerification(userCred.user);
            await setDoc(doc(db, "users", userCred.user.uid), {
                name, email, userType: document.getElementById('userType').value,
                taxId: document.getElementById('taxId').value || "",
                address: document.getElementById('address').value || "",
                createdAt: serverTimestamp()
            });
            await signOut(auth);
            alert("Kontot är skapat! Bekräfta din e-post innan du loggar in.");
            window.location.href = "login.html";
        } catch (err) { alert("Fel: " + err.message); btn.disabled = false; }
    };
</script>
</body>
</html>

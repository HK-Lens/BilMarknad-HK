<!DOCTYPE html>
<html lang="sv"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Skapa konto | BILHK</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script><style>:root{--primary:#f58220;--dark:#0f172a;--bg:#f8fafc;--border:#e2e8f0;--muted:#64748b}*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,sans-serif}body{background:var(--bg);min-height:100vh;display:flex;flex-direction:column}.main{flex:1;display:flex;align-items:center;justify-content:center;padding:25px}.card{background:white;border:1px solid var(--border);border-radius:30px;width:100%;max-width:560px;padding:38px;box-shadow:0 20px 50px rgba(15,23,42,.06)}.logo{text-align:center;display:block;text-decoration:none;color:var(--dark);font-size:32px;font-weight:900;margin-bottom:20px}.logo span{color:var(--primary)}.tabs{display:flex;background:#f1f5f9;border-radius:14px;padding:5px;margin-bottom:22px}.tab{flex:1;border:none;background:transparent;border-radius:10px;padding:12px;font-weight:900;cursor:pointer;color:var(--muted)}.tab.active{background:white;color:var(--dark);box-shadow:0 4px 10px rgba(15,23,42,.05)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.full{grid-column:1/-1}.field{margin-bottom:14px}label{display:block;font-size:10px;font-weight:900;color:var(--muted);text-transform:uppercase;margin-bottom:6px}input{width:100%;padding:13px;border:1px solid var(--border);border-radius:12px;background:#f8fafc;outline:none}.check{display:flex;gap:10px;font-size:13px;line-height:1.5;color:#475569;margin:15px 0}.check input{width:18px;height:18px;flex:0 0 auto}.btn{width:100%;border:none;border-radius:14px;padding:16px;background:var(--primary);color:white;font-weight:900;cursor:pointer}.btn:disabled{background:#cbd5e1}.links{text-align:center;margin-top:16px;font-size:13px}.links a{color:var(--primary);font-weight:900;text-decoration:none}footer{background:white;border-top:1px solid var(--border);padding:25px 20px;text-align:center;color:#94a3b8;font-size:13px}.footer-links{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;margin-bottom:10px}.footer-links a{font-weight:900;color:var(--muted);text-decoration:none}@media(max-width:650px){.grid{grid-template-columns:1fr}.card{padding:28px 20px}}</style></head><body><main class="main"><div class="card"><a class="logo" href="index.html">BIL<span>HK</span></a><div class="tabs"><button class="tab active" id="privateTab" type="button">Privatperson</button><button class="tab" id="businessTab" type="button">Företag</button></div><form id="form"><div class="grid"><div class="field"><label>Namn</label><input id="name" required></div><div class="field business" style="display:none"><label>Företagsnamn</label><input id="companyName"></div><div class="field full"><label>E-postadress</label><input id="email" type="email" required></div><div class="field"><label>Lösenord</label><input id="pass" type="password" minlength="8" required></div><div class="field"><label>Bekräfta lösenord</label><input id="pass2" type="password" minlength="8" required></div><div class="field"><label>Telefon</label><input id="phone"></div><div class="field"><label>Adress / Ort</label><input id="address"></div><div class="field business" style="display:none"><label>Webbplats</label><input id="website" placeholder="https://..."></div><div class="field business" style="display:none"><label>Logo URL</label><input id="logoUrl" placeholder="https://..."></div></div><label class="check"><input id="publicProfileEnabled" type="checkbox"><span>Jag vill kunna visa en offentlig säljarprofil.</span></label><label class="check"><input id="acceptTerms" type="checkbox" required><span>Jag accepterar <a href="terms.html" target="_blank">användarvillkoren och ansvarsfriskrivningen</a>, inklusive att BILHK inte ansvarar för annonser, betalningar eller tvister.</span></label><button class="btn" id="btn" type="submit">Skapa konto</button></form><div class="links"><a href="login.html">Har du redan konto? Logga in</a></div></div></main><footer><div class="footer-links"><a href="terms.html">Användarvillkor</a><a href="terms.html#disclaimer">Ansvarsfriskrivning</a></div><div>BILHK ansvarar inte för annonser, affärer, betalningar eller tvister mellan användare.</div></footer><script type="module">
import { auth, db } from './firebase-config.js';
import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
let mode='private';const setMode=m=>{mode=m;document.getElementById('privateTab').classList.toggle('active',m==='private');document.getElementById('businessTab').classList.toggle('active',m==='business');document.querySelectorAll('.business').forEach(x=>x.style.display=m==='business'?'block':'none')};document.getElementById('privateTab').onclick=()=>setMode('private');document.getElementById('businessTab').onclick=()=>setMode('business');document.getElementById('form').onsubmit=async e=>{e.preventDefault();const pass=document.getElementById('pass').value;if(pass!==document.getElementById('pass2').value){Swal.fire('Fel','Lösenorden matchar inte.','error');return}if(!document.getElementById('acceptTerms').checked){Swal.fire('Villkor krävs','Du måste acceptera villkoren.','warning');return}const btn=document.getElementById('btn');btn.disabled=true;btn.innerText='Skapar...';try{const email=document.getElementById('email').value.trim();const cred=await createUserWithEmailAndPassword(auth,email,pass);await setDoc(doc(db,'users',cred.user.uid),{uid:cred.user.uid,email,name:document.getElementById('name').value.trim(),displayName:document.getElementById('name').value.trim(),companyName:document.getElementById('companyName').value.trim(),userType:mode,phone:document.getElementById('phone').value.trim(),address:document.getElementById('address').value.trim(),website:document.getElementById('website').value.trim(),logoUrl:document.getElementById('logoUrl').value.trim(),publicProfileEnabled:document.getElementById('publicProfileEnabled').checked,publicPhone:false,publicEmail:false,publicWebsite:false,publicAddress:false,savedCars:[],termsAcceptedAt:serverTimestamp(),createdAt:serverTimestamp(),lastActiveAt:serverTimestamp()});location.href='index.html'}catch(e){console.error(e);Swal.fire('Fel',e.message,'error');btn.disabled=false;btn.innerText='Skapa konto'}};
</script></body></html>

<script type="module">
    // 1. أضفنا sendEmailVerification هنا
    import { auth, db } from './firebase-config.js';
    import { createUserWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let currentMode = 'Privat';

    // قائمة بالنطاقات الوهمية الشائعة (يمكنك توسيعها لاحقاً)
    const bannedDomains = [
        'mailinator.com', '10minutemail.com', 'guerrilla-mail.com', 
        'temp-mail.org', 'fakeinbox.com', 'getnada.com', 'throwawaymail.com',
        'yopmail.com', 'sharklasers.com', 'dispostable.com'
    ];

    window.setMode = (m) => {
        currentMode = m;
        document.getElementById('pTab').classList.toggle('active', m === 'Privat');
        document.getElementById('fTab').classList.toggle('active', m === 'Foretag');
        document.getElementById('bizFields').style.display = (m === 'Foretag') ? 'block' : 'none';
    };

    window.handlePreRegister = () => {
        const email = document.getElementById('email').value.toLowerCase().trim(); // تحويل للاحرف الصغيرة
        const p = document.getElementById('pass').value;
        const c = document.getElementById('confirmPass').value;

        // التحقق من صحة الإيميل ومنع الوهمي
        if (!email || !email.includes('@')) {
            return Swal.fire('Obs', 'Vänligen ange en giltig e-postadress.', 'warning');
        }

        const domain = email.split('@')[1];
        if (bannedDomains.includes(domain)) {
            return Swal.fire('Error', 'Vi tillåter inte tillfälliga e-postadresser. Använd en riktig e-post.', 'error');
        }

        if (!p || p.length < 8) return Swal.fire('Obs', 'Lösenordet måste vara minst 8 tecken.', 'warning');
        if (p !== c) return Swal.fire('Obs', 'Lösenorden matchar inte!', 'warning');
        
        document.getElementById('termsModal').style.display = 'block';
    };

    window.closeModal = () => document.getElementById('termsModal').style.display = 'none';

    document.getElementById('finalConsent').onchange = (e) => {
        document.getElementById('confirmRegBtn').disabled = !e.target.checked;
    };

    window.executeRegistration = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const btn = document.getElementById('confirmRegBtn');
        
        btn.disabled = true; 
        btn.innerText = "Registrerar...";

        try {
            // إنشاء الحساب في Firebase
            const cred = await createUserWithEmailAndPassword(auth, email, pass);
            
            // 2. إرسال رابط تفعيل للبريد الإلكتروني فوراً
            await sendEmailVerification(cred.user);

            const userData = {
                uid: cred.user.uid,
                email: email,
                userType: currentMode,
                termsAccepted: true,
                emailVerified: false, // سنحدثها لاحقاً عند تسجيل الدخول
                consentDate: serverTimestamp(),
                createdAt: serverTimestamp()
            };

            if (currentMode === 'Foretag') {
                userData.companyName = document.getElementById('compName').value;
                userData.taxId = document.getElementById('taxId').value;
                userData.address = document.getElementById('address').value;
            }

            // حفظ البيانات في Firestore
            await setDoc(doc(db, "users", cred.user.uid), userData);

            // إعلام المستخدم بضرورة التفعيل
            Swal.fire({
                title: 'Konto skapat!',
                text: 'Ett verifieringsmail har skickats till ' + email + '. Vänligen aktivera ditt konto innan du loggar in.',
                icon: 'success',
                confirmButtonText: 'OK'
            }).then(() => {
                window.location.href = "login.html"; // وجهه لصفحة تسجيل الدخول
            });

        } catch (error) {
            let msg = error.message;
            if (error.code === 'auth/email-already-in-use') msg = "E-postadressen används redan.";
            
            Swal.fire('Fel', msg, 'error');
            btn.disabled = false; 
            btn.innerText = "Godkänn och Slutför";
        }
    };
</script>

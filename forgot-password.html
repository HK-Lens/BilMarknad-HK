<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Återställ lösenord | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f4f6f9; }
        body { background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Inter', sans-serif; }
        .auth-card { background: white; padding: 35px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); width: 450px; text-align: center; }
        .btn-primary { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
<div class="auth-card">
    <a href="index.html" style="text-decoration:none; color:var(--dark); font-weight:900; font-size:30px;">BIL<span style="color:var(--primary);">HK</span></a>
    <h2 style="margin: 20px 0;">Återställ lösenord</h2>
    <form id="resetForm">
        <input type="email" id="email" placeholder="Din e-post" required style="width:100%; padding:14px; border-radius:12px; border:1px solid #e5e7eb;">
        <button type="submit" class="btn-primary" id="resetBtn">Skicka länk</button>
    </form>
    <div style="margin-top: 20px;"><a href="login.html" style="color: var(--primary); text-decoration:none; font-weight:700;">← Tillbaka till logga in</a></div>
</div>
<script type="module">
    import { auth } from './firebase-config.js';
    import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    document.getElementById('resetForm').onsubmit = async (e) => {
        e.preventDefault();
        try {
            await sendPasswordResetEmail(auth, document.getElementById('email').value);
            alert("Länk skickad!"); window.location.href = "login.html";
        } catch (err) { alert(err.message); }
    };
</script>
</body>
</html>

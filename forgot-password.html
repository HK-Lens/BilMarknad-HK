<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Återställ lösenord | BILHK</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        
        .auth-card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); width: 100%; max-width: 450px; text-align: center; border: 1px solid var(--border); }
        .logo { text-decoration: none; font-size: 30px; font-weight: 900; color: var(--dark); margin-bottom: 25px; display: block; }
        .logo span { color: var(--primary); }
        
        h2 { font-size: 24px; font-weight: 900; margin-bottom: 12px; color: var(--dark); }
        p { color: #64748b; font-size: 14px; margin-bottom: 30px; line-height: 1.6; }
        
        .form-group { text-align: left; margin-bottom: 25px; }
        label { display: block; font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 8px; text-transform: uppercase; }
        input { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; background: #f1f5f9; outline: none; font-size: 14px; transition: 0.3s; }
        input:focus { border-color: var(--primary); background: white; }

        .btn-reset { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-reset:hover { background: #e07210; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(245, 130, 32, 0.2); }
        
        .back-link { margin-top: 30px; font-size: 14px; color: #64748b; }
        .back-link a { color: var(--primary); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

<div class="auth-card">
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <h2>Glömt lösenordet?</h2>
    <p>Ingen fara! Ange din e-postadress nedan så skickar vi en återställningslänk till dig.</p>
    
    <form id="resetForm">
        <div class="form-group">
            <label>E-postadress</label>
            <input type="email" id="email" placeholder="Skriv din e-post" required>
        </div>
        <button type="submit" class="btn-reset" id="resetBtn">Skicka länk</button>
    </form>

    <div class="back-link">
        <a href="login.html"><i class="fa-solid fa-arrow-left"></i> Tillbaka till inloggning</a>
    </div>
</div>

<script type="module">
    import { auth } from './firebase-config.js';
    import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const resetForm = document.getElementById('resetForm');
    const resetBtn = document.getElementById('resetBtn');

    resetForm.onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        
        resetBtn.disabled = true;
        resetBtn.innerText = "Skickar...";

        try {
            await sendPasswordResetEmail(auth, email);
            
            await Swal.fire({
                title: 'Mejl skickat!',
                text: `Vi har skickat instruktioner till ${email}. Kontrollera din skräppost om du inte ser det.`,
                icon: 'success',
                confirmButtonColor: '#f58220'
            });
            
            window.location.href = "login.html";
            
        } catch (error) {
            console.error(error);
            let errorMsg = "Kunde inte skicka återställningsmejlet.";
            
            if (error.code === 'auth/user-not-found') {
                errorMsg = "Det finns inget konto registrerat med denna e-postadress.";
            }

            Swal.fire({
                title: 'Ett fel uppstod',
                text: errorMsg,
                icon: 'error',
                confirmButtonColor: '#f58220'
            });
            
            resetBtn.disabled = false;
            resetBtn.innerText = "Skicka länk";
        }
    };
</script>
</body>
</html>

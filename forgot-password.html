<!DOCTYPE html>
<html lang="sv" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Återställ lösenord | BILHK Professional Security</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #f58220;
            --primary-hover: #e07210;
            --primary-soft: #fff5eb;
            --dark: #0f172a;
            --muted: #64748b;
            --bg: #f8fafc;
            --border: #e2e8f0;
            --white: #ffffff;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: var(--bg);
            color: var(--dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Auth Card Layout */
        .auth-card {
            background: var(--white);
            padding: 50px 40px;
            border-radius: 32px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 480px;
            text-align: center;
            animation: fadeInScale 0.5s ease-out;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .logo {
            font-size: 32px;
            font-weight: 900;
            text-decoration: none;
            color: var(--dark);
            margin-bottom: 20px;
            display: block;
        }
        .logo span { color: var(--primary); }

        .auth-header h2 { font-size: 26px; font-weight: 800; margin-bottom: 10px; letter-spacing: -0.5px; }
        .auth-header p { color: var(--muted); font-size: 15px; line-height: 1.6; margin-bottom: 35px; }

        /* Form Controls */
        .form-group { text-align: left; margin-bottom: 25px; }
        .form-group label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 10px; color: var(--dark); }
        
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--muted); transition: var(--transition); }
        
        .form-control {
            width: 100%;
            padding: 16px 18px 16px 52px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--bg);
            font-size: 15px;
            font-weight: 500;
            transition: var(--transition);
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--white);
            box-shadow: 0 0 0 4px var(--primary-soft);
        }
        .form-control:focus + i { color: var(--primary); }

        /* Buttons */
        .btn-submit {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .btn-submit:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(245, 130, 32, 0.2); }
        .btn-submit:disabled { background: var(--muted); cursor: not-allowed; transform: none; }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--muted);
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
        }
        .back-link:hover { color: var(--dark); }

        /* Full Screen Loader */
        #globalLoader {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(5px);
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="globalLoader">
        <div style="text-align: center;">
            <div class="spinner"></div>
            <p style="margin-top: 15px; font-weight: 700; color: var(--dark);">Skickar länk...</p>
        </div>
    </div>

    <div class="auth-card">
        <a href="index.html" class="logo">BIL<span>HK</span></a>
        
        <div class="auth-header">
            <h2>Återställ lösenord</h2>
            <p>Ange din e-postadress nedan så skickar vi en säker länk för att återställa ditt lösenord.</p>
        </div>

        <form id="resetRequestForm">
            <div class="form-group">
                <label>E-postadress</label>
                <div class="input-wrapper">
                    <input type="email" id="userEmail" class="form-control" placeholder="din@epost.se" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="mainSubmitBtn">
                <span>Skicka återställningslänk</span>
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </form>

        <div style="margin-top: 15px;">
            <a href="login.html" class="back-link">
                <i class="fa-solid fa-chevron-left"></i>
                Tillbaka till logga in
            </a>
        </div>
    </div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const resetForm = document.getElementById('resetRequestForm');
        const submitBtn = document.getElementById('mainSubmitBtn');
        const loader = document.getElementById('globalLoader');

        /**
         * معالجة إرسال رابط إعادة التعيين
         */
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('userEmail').value.trim();
            if (!email) return;

            // تفعيل حالة التحميل
            toggleLoading(true);

            try {
                // إرسال البريد الإلكتروني عبر Firebase
                await sendPasswordResetEmail(auth, email);

                toggleLoading(false);
                
                // إظهار تنبيه النجاح
                await Swal.fire({
                    icon: 'success',
                    title: 'Länk har skickats!',
                    text: `Vi har skickat instruktioner till ${email}. Kontrollera din inkorg och skräppost.`,
                    confirmButtonColor: '#f58220',
                    confirmButtonText: 'Jag förstår',
                    allowOutsideClick: false
                });

                // العودة لصفحة تسجيل الدخول
                window.location.href = "login.html";

            } catch (error) {
                toggleLoading(false);
                console.error("Firebase Reset Error:", error.code);

                // ترجمة ومعالجة الأخطاء
                let SwedishMessage = "Ett oväntat fel uppstod. Försök igen senare.";
                
                switch (error.code) {
                    case 'auth/user-not-found':
                        SwedishMessage = "Det finns inget konto kopplat till denna e-postadress.";
                        break;
                    case 'auth/invalid-email':
                        SwedishMessage = "E-postadressen är felaktigt formaterad.";
                        break;
                    case 'auth/too-many-requests':
                        SwedishMessage = "För många försök. Vänta en stund och försök igen.";
                        break;
                }

                Swal.fire({
                    icon: 'error',
                    title: 'Misslyckades',
                    text: SwedishMessage,
                    confirmButtonColor: '#0f172a'
                });
            }
        });

        function toggleLoading(isLoading) {
            loader.style.display = isLoading ? 'flex' : 'none';
            submitBtn.disabled = isLoading;
        }
    </script>
</body>
</html>

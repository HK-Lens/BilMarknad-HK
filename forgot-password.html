<!DOCTYPE html>
<html lang="sv" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Återställ lösenord | BILHK Professional Security</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #f58220;
            --primary-hover: #e07210;
            --primary-soft: #fff5eb;
            --dark: #0f172a;
            --muted: #64748b;
            --bg: #f8fafc;
            --border: #e2e8f0;
            --white: #ffffff;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: var(--bg);
            color: var(--dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* تصميم بطاقة الاستعادة */
        .auth-card {
            background: var(--white);
            padding: 45px;
            border-radius: 32px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 480px;
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 32px;
            font-weight: 900;
            text-decoration: none;
            color: var(--dark);
            margin-bottom: 25px;
            display: block;
        }
        .logo span { color: var(--primary); }

        h2 { font-size: 24px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.5px; }
        p { color: var(--muted); font-size: 15px; line-height: 1.6; margin-bottom: 30px; }

        /* تنسيق الحقول */
        .form-group { text-align: left; margin-bottom: 25px; }
        .form-group label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 10px; color: var(--dark); }
        
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--muted); transition: 0.3s; }
        
        .form-control {
            width: 100%;
            padding: 16px 18px 16px 50px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--bg);
            font-size: 15px;
            font-weight: 500;
            transition: 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--white);
            box-shadow: 0 0 0 4px var(--primary-soft);
        }
        .form-control:focus + i { color: var(--primary); }

        /* الأزرار */
        .btn-reset {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn-reset:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 10px 15px rgba(245, 130, 32, 0.2); }
        .btn-reset:disabled { background: var(--muted); cursor: not-allowed; transform: none; }

        .back-to-login {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--muted);
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
        }
        .back-to-login:hover { color: var(--dark); }

        /* شاشة التحميل */
        #loaderOverlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>

    <div id="loaderOverlay">
        <div style="text-align: center;">
            <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 40px; color: var(--primary);"></i>
            <p style="margin-top: 15px; font-weight: 700;">Skickar länk...</p>
        </div>
    </div>

    <div class="auth-card">
        <a href="index.html" class="logo">BIL<span>HK</span></a>
        <h2>Glömt lösenordet?</h2>
        <p>Ingen fara! Ange din e-postadress nedan så skickar vi en säker länk för att återställa ditt konto.</p>

        <form id="forgotPasswordForm">
            <div class="form-group">
                <label>E-postadress</label>
                <div class="input-wrapper">
                    <input type="email" id="resetEmail" class="form-control" placeholder="din@epost.se" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>
            </div>

            <button type="submit" class="btn-reset" id="submitBtn">
                <span>Skicka återställningslänk</span>
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </form>

        <a href="login.html" class="back-to-login">
            <i class="fa-solid fa-arrow-left"></i>
            Tillbaka till logga in
        </a>
    </div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const form = document.getElementById('forgotPasswordForm');
        const submitBtn = document.getElementById('submitBtn');
        const loader = document.getElementById('loaderOverlay');

        form.onsubmit = async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('resetEmail').value.trim();
            
            // بدء حالة التحميل
            loader.style.display = 'flex';
            submitBtn.disabled = true;

            try {
                // إرسال طلب إعادة تعيين كلمة المرور عبر Firebase
                await sendPasswordResetEmail(auth, email);

                // إخفاء التحميل وإظهار رسالة نجاح احترافية
                loader.style.display = 'none';
                
                await Swal.fire({
                    icon: 'success',
                    title: 'Länk har skickats!',
                    text: `Vi har skickat instruktioner till ${email}. Kontrollera även din skräppost om du inte ser mejlet.`,
                    confirmButtonColor: '#f58220',
                    confirmButtonText: 'Gå till logga in',
                    allowOutsideClick: false
                });

                // التوجيه لصفحة تسجيل الدخول
                window.location.href = "login.html";

            } catch (error) {
                loader.style.display = 'none';
                submitBtn.disabled = false;
                
                console.error("Password Reset Error:", error.code);

                // معالجة الأخطاء بشكل تفصيلي
                let errorMessage = "Ett oväntat fel uppstod. Försök igen senare.";
                
                if (error.code === 'auth/user-not-found') {
                    errorMessage = "Det finns inget konto registrerat med denna e-postadress.";
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = "Den angivna e-postadressen är inte giltig.";
                } else if (error.code === 'auth/too-many-requests') {
                    errorMessage = "För många försök. Vänta en stund och försök igen.";
                }

                Swal.fire({
                    icon: 'error',
                    title: 'Kunde inte skicka länk',
                    text: errorMessage,
                    confirmButtonColor: '#0f172a'
                });
            }
        };
    </script>
</body>
</html>

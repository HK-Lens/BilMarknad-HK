<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Återställ lösenord | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f4f6f9; --border: #e5e7eb; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        
        .auth-card { background: white; padding: 35px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); width: 100%; max-width: 450px; text-align: center; border: 1px solid var(--border); }
        .logo { text-decoration: none; font-size: 30px; font-weight: 900; color: var(--dark); margin-bottom: 20px; display: block; }
        .logo span { color: var(--primary); }
        
        h2 { font-size: 22px; margin-bottom: 10px; color: var(--dark); }
        p { color: #64748b; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 700; color: #374151; margin-bottom: 6px; }
        input { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; background: #f9fafb; font-size: 14px; outline: none; }
        input:focus { border-color: var(--primary); background: white; }

        .btn-primary { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-primary:hover { background: #e07210; transform: translateY(-2px); }
        
        .back-link { margin-top: 25px; font-size: 14px; }
        .back-link a { color: var(--primary); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

<div class="auth-card">
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <h2>Återställ lösenord</h2>
    <p>Ange din e-postadress så skickar vi en länk för att återställa ditt lösenord.</p>
    
    <form id="resetForm">
        <div class="form-group">
            <label>E-postadress</label>
            <input type="email" id="email" placeholder="Din e-post" required>
        </div>
        <button type="submit" class="btn-primary" id="resetBtn">Skicka länk</button>
    </form>

    <div class="back-link">
        <a href="login.html">← Tillbaka till logga in</a>
    </div>
</div>

<script type="module">
    import { auth } from './firebase-config.js';
    import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const resetForm = document.getElementById('resetForm');
    const resetBtn = document.getElementById('resetBtn');

    resetForm.onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        
        resetBtn.disabled = true;
        resetBtn.innerText = "Skickar...";

        try {
            await sendPasswordResetEmail(auth, email);
            alert("Ett mejl har skickats till " + email + " med instruktioner för att återställa ditt lösenord.");
            window.location.href = "login.html";
        } catch (error) {
            alert("Fel: " + error.message);
            resetBtn.disabled = false;
            resetBtn.innerText = "Skicka länk";
        }
    };
</script>
</body>
</html>

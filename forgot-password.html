<script type="module">

import { auth } from './firebase-config.js';

import {
sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const resetForm =
document.getElementById('resetForm');

const resetBtn =
document.getElementById('resetBtn');

const emailInput =
document.getElementById('email');

/* =========================================
   AUTO FOCUS
========================================= */

emailInput.focus();

/* =========================================
   EMAIL VALIDATION
========================================= */

function isValidEmail(email){

return /^[^\s@]+@[^\s@]+\.[^\s@]+$/
.test(email);

}

/* =========================================
   FORM SUBMIT
========================================= */

resetForm.addEventListener('submit',async(e)=>{

e.preventDefault();

const email =
emailInput.value.trim().toLowerCase();

if(!email){

Swal.fire({
title:'Saknas',
text:'Ange din e-postadress.',
icon:'warning',
confirmButtonColor:'#f58220'
});

return;

}

if(!isValidEmail(email)){

Swal.fire({
title:'Felaktig e-post',
text:'Ange en giltig e-postadress.',
icon:'error',
confirmButtonColor:'#f58220'
});

return;

}

/* =========================================
   BUTTON LOADING STATE
========================================= */

resetBtn.disabled = true;

resetBtn.innerHTML = `
<i class="fa-solid fa-spinner fa-spin"></i>
Skickar...
`;

try{

await sendPasswordResetEmail(auth,email);

await Swal.fire({
title:'Mejl skickat!',
text:
`Vi har skickat återställningsinstruktioner till ${email}`,
icon:'success',
confirmButtonColor:'#f58220'
});

window.location.href = "login.html";

}catch(error){

console.error(error);

let errorMsg =
"Kunde inte skicka återställningsmejlet.";

/* =========================================
   ERROR HANDLING
========================================= */

switch(error.code){

case 'auth/user-not-found':

errorMsg =
"Inget konto hittades med denna e-postadress.";

break;

case 'auth/invalid-email':

errorMsg =
"E-postadressen är ogiltig.";

break;

case 'auth/too-many-requests':

errorMsg =
"För många försök. Försök igen senare.";

break;

case 'auth/network-request-failed':

errorMsg =
"Nätverksfel. Kontrollera internetanslutningen.";

break;

default:

errorMsg =
"Something went wrong. Försök igen.";

}

Swal.fire({
title:'Ett fel uppstod',
text:errorMsg,
icon:'error',
confirmButtonColor:'#f58220'
});

}finally{

resetBtn.disabled = false;

resetBtn.innerHTML =
'Skicka länk';

}

});

</script>

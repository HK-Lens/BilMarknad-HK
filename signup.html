<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skapa konto | BILHK v2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f4f6f9; --border: #e5e7eb; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        
        .auth-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); width: 100%; max-width: 480px; text-align: center; border: 1px solid var(--border); }
        .logo { text-decoration: none; font-size: 32px; font-weight: 900; color: var(--dark); margin-bottom: 20px; display: block; }
        .logo span { color: var(--primary); }
        
        h2 { font-size: 20px; margin-bottom: 25px; color: var(--dark); }
        
        .form-group { text-align: left; margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: 700; color: #374151; margin-bottom: 6px; }
        input[type="text"], input[type="email"], input[type="password"] { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; background: #f9fafb; font-size: 14px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); background: white; }
        
        /* صندوق إخلاء المسؤولية القانوني */
        .disclaimer-box { background: #fff8f1; border: 1px solid #fde6d5; padding: 15px; border-radius: 12px; margin: 20px 0; text-align: left; display: flex; gap: 10px; align-items: flex-start; }
        .disclaimer-box input { width: 20px; height: 20px; margin-top: 3px; cursor: pointer; accent-color: var(--primary); }
        .disclaimer-box label { font-size: 12px; color: #555; line-height: 1.6; cursor: pointer; }
        .disclaimer-box label strong { color: var(--primary); display: block; margin-bottom: 4px; font-size: 14px; }

        .btn-primary { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-primary:hover { background: #e07210; transform: translateY(-2px); }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }

        .link-alt { margin-top: 25px; font-size: 14px; color: #64748b; }
        .link-alt a { color: var(--primary); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

<div class="auth-card">
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <h2>Skapa nytt konto</h2>
    
    <form id="regForm">
        <div class="form-group">
            <label>Ditt namn</label>
            <input type="text" id="fullName" placeholder="T.ex. Miro" required>
        </div>

        <div class="form-group">
            <label>E-postadress</label>
            <input type="email" id="email" placeholder="Din e-post" required>
        </div>
        
        <div class="form-group">
            <label>Lösenord</label>
            <input type="password" id="pass" placeholder="Minst 6 tecken" required>
        </div>

        <div class="disclaimer-box">
            <input type="checkbox" id="termsCheck" required>
            <label for="termsCheck">
                <strong>Ansvarsfriskrivning</strong>
                Jag godkänner att denna webbplats endast är en förmedlingsplattform. Webbplatsen och dess ägare bär inget juridiskt eller ekonomiskt ansvar för affärer mellan köpare och säljare.
            </label>
        </div>

        <button type="submit" class="btn-primary" id="regBtn">Skapa konto</button>
    </form>

    <p class="link-alt">Har du redan ett konto? <a href="login.html">Logga in</a></p>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { createUserWithEmailAndPassword, updateProfile, sendEmailVerification, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const regForm = document.getElementById('regForm');
    const regBtn = document.getElementById('regBtn');

    regForm.onsubmit = async (e) => {
        e.preventDefault();
        
        const fullName = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('pass').value;
        const termsAccepted = document.getElementById('termsCheck').checked;

        if (!termsAccepted) {
            alert("Du måste godkänna ansvarsfriskrivningen.");
            return;
        }

        regBtn.disabled = true;
        regBtn.innerText = "Skapar konto...";

        try {
            // 1. إنشاء الحساب
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            // 2. تحديث اسم المستخدم (ليظهر في الموقع بكلمة: ميرو)
            await updateProfile(user, { displayName: fullName });

            // 3. إرسال رابط تأكيد البريد الإلكتروني
            await sendEmailVerification(user);

            // 4. حفظ البيانات في Firestore مع تأكيد الموافقة على العقد
            await setDoc(doc(db, "users", user.uid), {
                name: fullName,
                email: email,
                termsAccepted: true,
                createdAt: serverTimestamp()
            });

            // 5. تسجيل خروج إلزامي لفرض التأكيد
            await signOut(auth);

            // 6. رسالة النجاح المخصصة
            alert(`Grattis ${fullName}, ditt konto har skapats!\n\nEtt bekräftelsemail har skickats till ${email}.\nVänligen aktivera ditt konto via länken i mailet innan du loggar in.`);
            
            // 7. التوجيه لصفحة الدخول
            window.location.href = "login.html"; 
            
        } catch (err) {
            console.error(err);
            if (err.code === 'auth/email-already-in-use') {
                alert("Den här e-postadressen används redan.");
            } else if (err.code === 'auth/weak-password') {
                alert("Lösenordet är för svagt. Använd minst 6 tecken.");
            } else {
                alert("Ett fel uppstod: " + err.message);
            }
            regBtn.disabled = false;
            regBtn.innerText = "Skapa konto";
        }
    };
</script>
</body>
</html>

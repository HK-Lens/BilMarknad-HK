<!DOCTYPE html>
<html lang="sv"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Bekräftar inloggning | BILHK</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script><style>:root{--primary:#f58220;--dark:#0f172a;--bg:#f8fafc;--border:#e2e8f0}*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,sans-serif}body{background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.box{background:white;border:1px solid var(--border);border-radius:28px;padding:40px;max-width:460px;width:100%;text-align:center;box-shadow:0 20px 50px rgba(15,23,42,.06)}.logo{font-size:32px;font-weight:900;color:var(--dark);text-decoration:none}.logo span{color:var(--primary)}p{color:#64748b;margin-top:18px;font-weight:700}.btn{margin-top:22px;border:none;border-radius:12px;padding:14px 18px;background:var(--primary);color:white;font-weight:900;cursor:pointer}</style></head><body><div class="box"><a class="logo" href="index.html">BIL<span>HK</span></a><p id="status">Bekräftar din inloggning...</p><button class="btn" onclick="location.href='login.html'" style="display:none" id="backBtn">Till login</button></div><script type="module">
import { auth, db } from './firebase-config.js';
import { isSignInWithEmailLink, signInWithEmailLink } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
const status=document.getElementById('status'),back=document.getElementById('backBtn');
(async()=>{try{if(!isSignInWithEmailLink(auth,location.href)){status.innerText='Länken är ogiltig eller har redan använts.';back.style.display='inline-block';return}let email=localStorage.getItem('emailForSignIn');if(!email){email=prompt('Ange din e-postadress för att slutföra inloggningen:')}if(!email){status.innerText='E-postadress saknas.';back.style.display='inline-block';return}const cred=await signInWithEmailLink(auth,email,location.href);localStorage.removeItem('emailForSignIn');await setDoc(doc(db,'users',cred.user.uid),{uid:cred.user.uid,email:cred.user.email,termsAcceptedAt:serverTimestamp(),lastActiveAt:serverTimestamp()},{merge:true});status.innerText='Klart! Du skickas vidare...';setTimeout(()=>location.href='index.html',900)}catch(e){console.error(e);status.innerText='Kunde inte slutföra inloggningen.';back.style.display='inline-block';Swal.fire('Fel','Inloggningslänken kunde inte verifieras.','error')}})();
</script></body></html>

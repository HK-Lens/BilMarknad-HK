<!DOCTYPE html>
<html lang="sv">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Verifierar Inloggning - BILHK</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body>

    <div class="auth-container">

        <div class="auth-card" id="confirmCard">

            <h2 id="pageTitle">
                Verifierar din länk...
            </h2>

            <div id="loadingSpinner" class="spinner"></div>

            <!-- Company Form -->
            <div id="companyForm"
                 style="display:none; text-align:left; margin-top:20px;">

                <h3 style="text-align:center; margin-bottom:20px;">
                    Företagsinformation
                </h3>

                <div class="form-group">
                    <label>Företagsnamn</label>

                    <input type="text"
                           id="compName"
                           placeholder="Ex: BILHK AB"
                           maxlength="120"
                           required>
                </div>

                <div class="form-group">
                    <label>Organisationsnummer</label>

                    <input type="text"
                           id="compTax"
                           placeholder="55XXXX-XXXX"
                           maxlength="20"
                           required>
                </div>

                <div class="form-group">
                    <label>Företagsadress</label>

                    <input type="text"
                           id="compAddress"
                           placeholder="Gatunamn 1, Stad"
                           maxlength="200"
                           required>
                </div>

                <div class="form-group">
                    <label>Telefonnummer</label>

                    <input type="tel"
                           id="compPhone"
                           placeholder="070-XXX XX XX"
                           maxlength="30"
                           required>
                </div>

                <div class="form-group">
                    <label>Officiell E-post</label>

                    <input type="email"
                           id="compEmail"
                           placeholder="info@foretag.se"
                           maxlength="120"
                           required>
                </div>

                <div class="form-group">
                    <label>Webbplats</label>

                    <input type="url"
                           id="compWeb"
                           placeholder="https://www.foretag.se"
                           maxlength="200">
                </div>

                <button class="btn-auth"
                        id="saveCompanyBtn"
                        onclick="saveCompanyAndFinish()">

                    Spara och Fortsätt

                </button>

            </div>

        </div>

    </div>


<script type="module">

    import { auth, db } from './firebase-config.js';

    import {
        isSignInWithEmailLink,
        signInWithEmailLink
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    import {
        doc,
        setDoc,
        getDoc,
        serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";


    // ========================================
    // Main Confirmation Handler
    // ========================================

    async function handleConfirmation() {

        try {

            // Check if current link is valid
            if (!isSignInWithEmailLink(auth, window.location.href)) {

                Swal.fire(
                    'Fel',
                    'Ogiltig inloggningslänk.',
                    'error'
                );

                return;

            }

            let email =
                window.localStorage.getItem('emailForSignIn');

            const userType =
                window.localStorage.getItem('userTypePreference');


            // Ask user for email if missing
            if (!email) {

                const result = await Swal.fire({
                    title: 'Ange din e-post',
                    input: 'email',
                    inputPlaceholder: 'Bekräfta din e-postadress',
                    confirmButtonText: 'Fortsätt',
                    allowOutsideClick: false
                });

                if (!result.value) return;

                email = result.value;

            }


            // Sign in with email link
            const result = await signInWithEmailLink(
                auth,
                email,
                window.location.href
            );

            const user = result.user;


            // Clear old localStorage data
            window.localStorage.removeItem('emailForSignIn');


            // Get existing user document
            const userRef = doc(db, "users", user.uid);

            const userDoc = await getDoc(userRef);


            // ========================================
            // Existing User
            // ========================================

            if (userDoc.exists()) {

                window.location.href = 'index.html';
                return;

            }


            // ========================================
            // New Business Account
            // ========================================

            if (userType === 'Foretag') {

                document.getElementById('pageTitle').innerText =
                    "Komplettera företagsprofil";

                document.getElementById('loadingSpinner').style.display =
                    'none';

                document.getElementById('companyForm').style.display =
                    'block';

                document.getElementById('compEmail').value =
                    email;

                return;

            }


            // ========================================
            // New Private Account
            // ========================================

            await setDoc(userRef, {

                uid: user.uid,

                email: user.email || "",

                type: "Privat",

                createdAt: serverTimestamp()

            });

            window.location.href = 'index.html';

        } catch (error) {

            console.error(error);

            Swal.fire(
                'Fel',
                'Länken är ogiltig eller har gått ut.',
                'error'
            );

        }

    }


    // ========================================
    // Save Company Account
    // ========================================

    window.saveCompanyAndFinish = async () => {

        try {

            const user = auth.currentUser;

            if (!user) {

                Swal.fire(
                    'Fel',
                    'Ingen användare hittades.',
                    'error'
                );

                return;

            }


            // Disable button while saving
            const saveBtn =
                document.getElementById('saveCompanyBtn');

            saveBtn.disabled = true;
            saveBtn.innerText = "Sparar...";


            // Collect data
            const companyName =
                document.getElementById('compName').value.trim();

            const taxId =
                document.getElementById('compTax').value.trim();

            const address =
                document.getElementById('compAddress').value.trim();

            const phone =
                document.getElementById('compPhone').value.trim();

            const officialEmail =
                document.getElementById('compEmail').value.trim();

            const website =
                document.getElementById('compWeb').value.trim();


            // Validation
            if (
                !companyName ||
                !taxId ||
                !address ||
                !phone ||
                !officialEmail
            ) {

                Swal.fire(
                    'Obs!',
                    'Fyll i alla obligatoriska fält.',
                    'warning'
                );

                saveBtn.disabled = false;
                saveBtn.innerText = "Spara och Fortsätt";

                return;

            }


            // Save company account
            await setDoc(doc(db, "users", user.uid), {

                uid: user.uid,

                email: user.email || "",

                type: "Foretag",

                companyName,

                taxId,

                address,

                phone,

                officialEmail,

                website: website || "",

                createdAt: serverTimestamp()

            });


            // Clear preference
            window.localStorage.removeItem('userTypePreference');


            await Swal.fire(
                'Klart!',
                'Ditt företagskonto har skapats.',
                'success'
            );

            window.location.href = 'index.html';

        } catch (error) {

            console.error(error);

            Swal.fire(
                'Fel',
                'Kunde inte spara företagsdata.',
                'error'
            );

            const saveBtn =
                document.getElementById('saveCompanyBtn');

            saveBtn.disabled = false;
            saveBtn.innerText = "Spara och Fortsätt";

        }

    };


    // ========================================
    // Start
    // ========================================

    handleConfirmation();

</script>

</body>
</html>

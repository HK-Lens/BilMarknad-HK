<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تأكيد الحساب | BILHK Verification</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #f58220;
            --primary-dark: #d66d0d;
            --dark: #0f172a;
            --bg: #f8fafc;
            --border: #e2e8f0;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .verify-card {
            background: var(--white);
            padding: 40px;
            border-radius: 32px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.06);
            width: 100%;
            max-width: 480px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .logo {
            font-size: 32px;
            font-weight: 900;
            text-decoration: none;
            color: var(--dark);
            margin-bottom: 30px;
            display: block;
        }

        .logo span { color: var(--primary); }

        .loader {
            width: 60px;
            height: 60px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 25px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h2 { font-size: 24px; font-weight: 800; margin-bottom: 15px; }
        p { color: #64748b; line-height: 1.6; margin-bottom: 20px; }

        .status-icon {
            font-size: 60px;
            margin-bottom: 20px;
            display: none;
        }

        .success-icon { color: #22c55e; }
        .error-icon { color: #ef4444; }

        .btn-retry {
            display: none;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 14px 30px;
            border-radius: 14px;
            font-weight: 700;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-retry:hover { background: var(--primary-dark); }
    </style>
</head>
<body>

    <div class="verify-card" id="mainCard">
        <a href="index.html" class="logo">BIL<span>HK</span></a>
        
        <div id="loadingState">
            <div class="loader"></div>
            <h2>جاري التحقق من الرابط...</h2>
            <p>يرجى الانتظار بينما نقوم بتأكيد هويتك وتجهيز لوحة التحكم الخاصة بك.</p>
        </div>

        <div id="successState" style="display: none;">
            <i class="fa-solid fa-circle-check status-icon success-icon" style="display: block;"></i>
            <h2>تم التأكيد بنجاح!</h2>
            <p>تم تسجيل دخولك بنجاح. سنقوم بتحويلك الآن...</p>
        </div>

        <div id="errorState" style="display: none;">
            <i class="fa-solid fa-circle-xmark status-icon error-icon" style="display: block;"></i>
            <h2>عذراً، فشل التحقق</h2>
            <p id="errorMessage">الرابط غير صالح أو انتهت صلاحيته.</p>
            <a href="login.html" class="btn-retry" style="display: inline-block;">العودة لتسجيل الدخول</a>
        </div>
    </div>

    <script type="module">
        import { auth } from "./firebase-config.js";
        import { 
            isSignInWithEmailLink, 
            signInWithEmailLink 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        /**
         * وظيفة معالجة التأكيد الاحترافية
         */
        async function handleVerification() {
            const url = window.location.href;

            // 1. التحقق إذا كان الرابط هو فعلاً رابط تسجيل دخول من Firebase
            if (isSignInWithEmailLink(auth, url)) {
                
                // جلب البريد الإلكتروني من الذاكرة المحلية (تم تخزينه في صفحة login.html)
                let email = window.localStorage.getItem('emailForSignIn');

                // 2. حالة "الجهاز المختلف": إذا فتح المستخدم الرابط في متصفح آخر أو جهاز آخر
                if (!email) {
                    const result = await Swal.fire({
                        title: 'تأكيد البريد الإلكتروني',
                        text: 'يرجى إدخال بريدك الإلكتروني لإتمام عملية تسجيل الدخول من هذا الجهاز:',
                        input: 'email',
                        inputPlaceholder: 'email@example.com',
                        confirmButtonText: 'تأكيد',
                        confirmButtonColor: '#f58220',
                        allowOutsideClick: false,
                        inputValidator: (value) => {
                            if (!value) return 'البريد الإلكتروني مطلوب!';
                        }
                    });
                    email = result.value;
                }

                if (email) {
                    try {
                        // 3. محاولة تسجيل الدخول الفعلي
                        const result = await signInWithEmailLink(auth, email, url);
                        
                        // تنظيف الذاكرة المحلية
                        window.localStorage.removeItem('emailForSignIn');

                        // إظهار واجهة النجاح
                        showState('success');

                        // 4. توجيه ذكي: التوجه إلى لوحة التحكم بعد ثانيتين
                        setTimeout(() => {
                            window.location.href = "dashboard-fixed.html";
                        }, 2000);

                    } catch (error) {
                        console.error("Verification Error:", error);
                        handleError(error.code);
                    }
                }
            } else {
                // إذا لم يكن الرابط صالحاً أصلاً
                handleError('invalid-link');
            }
        }

        /**
         * تبديل الحالات البصرية في الصفحة
         */
        function showState(state) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('successState').style.display = state === 'success' ? 'block' : 'none';
            document.getElementById('errorState').style.display = state === 'error' ? 'block' : 'none';
        }

        /**
         * معالجة الأخطاء بشكل تفصيلي
         */
        function handleError(code) {
            showState('error');
            const msgEl = document.getElementById('errorMessage');
            
            switch (code) {
                case 'auth/expired-action-code':
                    msgEl.innerText = "انتهت صلاحية الرابط. يرجى طلب رابط جديد.";
                    break;
                case 'auth/invalid-action-code':
                    msgEl.innerText = "الرابط غير صحيح أو تم استخدامه مسبقاً.";
                    break;
                case 'invalid-link':
                    msgEl.innerText = "هذا الرابط لا يبدو كرابط تأكيد صالح.";
                    break;
                default:
                    msgEl.innerText = "حدث خطأ غير متوقع. يرجى المحاولة مرة أخرى.";
            }
        }

        // تشغيل العملية عند تحميل الصفحة
        window.onload = handleVerification;
    </script>
</body>
</html>

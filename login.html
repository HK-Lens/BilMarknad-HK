<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logga in | BILHK</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>:root{--primary:#f58220;--dark:#0f172a;--bg:#f8fafc;--border:#e2e8f0;--muted:#64748b}*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif}body{background:var(--bg);min-height:100vh;display:flex;flex-direction:column}.main{flex:1;display:flex;align-items:center;justify-content:center;padding:25px}.card{background:white;border:1px solid var(--border);border-radius:30px;box-shadow:0 20px 50px rgba(15,23,42,.06);width:100%;max-width:455px;padding:38px}.logo{text-align:center;display:block;text-decoration:none;color:var(--dark);font-size:32px;font-weight:900;margin-bottom:24px}.logo span{color:var(--primary)}.notice{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:16px;padding:16px;margin-bottom:22px;font-size:13px;line-height:1.6}.form-group{margin-bottom:18px}label{display:block;font-size:11px;font-weight:900;color:var(--muted);text-transform:uppercase;margin-bottom:7px}input{width:100%;padding:14px;border:1px solid var(--border);border-radius:13px;background:#f8fafc;outline:none}input:focus{background:white;border-color:var(--primary)}.check{display:flex;gap:10px;font-size:13px;color:#475569;line-height:1.5;margin:15px 0}.check input{width:18px;height:18px;flex:0 0 auto}.btn{width:100%;border:none;border-radius:14px;padding:16px;font-weight:900;cursor:pointer}.primary{background:var(--primary);color:white}.google{background:white;border:1px solid var(--border);color:var(--dark);margin-top:14px}.links{text-align:center;margin-top:18px;font-size:13px}.links a{color:var(--primary);font-weight:900;text-decoration:none}footer{background:white;border-top:1px solid var(--border);padding:25px 20px;text-align:center;color:#94a3b8;font-size:13px}.footer-links{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;margin-bottom:10px}.footer-links a{font-weight:900;color:var(--muted);text-decoration:none}</style>
</head>
<body><div class="main"><div class="card"><a href="index.html" class="logo">BIL<span>HK</span></a><div class="notice"><b>Viktig information:</b> BILHK är endast en annonsplattform. Genom att logga in accepterar du villkoren och ansvarsfriskrivningen.</div><form id="loginForm"><div class="form-group"><label>E-postadress</label><input id="email" type="email" required placeholder="exempel@mail.com"></div><label class="check"><input type="checkbox" id="acceptTerms" required><span>Jag accepterar <a href="terms.html" target="_blank">användarvillkoren och ansvarsfriskrivningen</a>.</span></label><button class="btn primary" id="emailBtn" type="submit">Skicka inloggningslänk</button></form><button class="btn google" id="googleBtn"><i class="fa-brands fa-google"></i> Logga in med Google</button><div class="links"><a href="register.html">Skapa konto</a> · <a href="forgot-password.html">Glömt lösenord?</a></div></div></div><footer><div class="footer-links"><a href="terms.html">Användarvillkor</a><a href="terms.html#disclaimer">Ansvarsfriskrivning</a></div><div>BILHK ansvarar inte för annonser, affärer, betalningar eller tvister mellan användare.</div></footer>
<script type="module">
import { auth, db } from './firebase-config.js';
import { sendSignInLinkToEmail, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
function termsOk(){if(!document.getElementById('acceptTerms').checked){Swal.fire('Villkor krävs','Du måste acceptera användarvillkoren och ansvarsfriskrivningen för att fortsätta.','warning');return false}return true}
document.getElementById('loginForm').onsubmit=async e=>{e.preventDefault();if(!termsOk())return;const email=document.getElementById('email').value.trim();const btn=document.getElementById('emailBtn');btn.disabled=true;btn.innerText='Skickar...';try{await sendSignInLinkToEmail(auth,email,{url:location.origin+location.pathname.replace('login.html','confirm.html'),handleCodeInApp:true});localStorage.setItem('emailForSignIn',email);localStorage.setItem('acceptedTermsAt',new Date().toISOString());Swal.fire('Länk skickad','Kontrollera din e-post för att logga in.','success')}catch(err){console.error(err);Swal.fire('Fel','Kunde inte skicka länken. Kontrollera Firebase Authentication-inställningarna.','error')}finally{btn.disabled=false;btn.innerText='Skicka inloggningslänk'}};
document.getElementById('googleBtn').onclick=async()=>{if(!termsOk())return;try{const cred=await signInWithPopup(auth,new GoogleAuthProvider());await setDoc(doc(db,'users',cred.user.uid),{uid:cred.user.uid,email:cred.user.email,name:cred.user.displayName||'',termsAcceptedAt:serverTimestamp(),lastActiveAt:serverTimestamp()},{merge:true});location.href='index.html'}catch(e){console.error(e);Swal.fire('Fel','Google-inloggning misslyckades.','error')}};
</script></body></html>

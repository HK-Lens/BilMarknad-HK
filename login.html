<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logga in | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f0f2f5; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        
        .login-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .logo { font-size: 24px; font-weight: 900; color: var(--dark); margin-bottom: 30px; text-decoration: none; display: block; }
        .logo span { color: var(--primary); }
        
        h1 { font-size: 20px; font-weight: 800; margin-bottom: 25px; }
        input { width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 15px; outline: none; font-size: 15px; }
        
        .btn-login { width: 100%; background: var(--dark); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        .google-btn { width: 100%; background: white; border: 1px solid #e2e8f0; padding: 14px; border-radius: 12px; margin-top: 15px; cursor: pointer; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body>

<div class="login-card">
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <h1>Logga in</h1>
    
    <form id="loginForm">
        <input type="email" id="email" placeholder="Din e-postadress" required>
        <input type="password" id="password" placeholder="Lösenord" required>
        <button type="submit" class="btn-login">Logga in</button>
    </form>

    <button class="google-btn" id="googleBtn">
        <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="20">
        Logga in med Google
    </button>
    
    <p style="margin-top: 20px; font-size: 13px; color: #64748b;">
        Har du inget konto? <a href="#" style="color: var(--primary); text-decoration: none; font-weight: 700;">Skapa ett här</a>
    </p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        try {
            await signInWithEmailAndPassword(auth, email, password);
            window.location.href = "index.html";
        } catch (error) {
            alert("Fel: " + error.message);
        }
    };

    document.getElementById('googleBtn').onclick = async () => {
        try {
            await signInWithPopup(auth, provider);
            window.location.href = "index.html";
        } catch (error) {
            alert("Inloggning misslyckades.");
        }
    };
</script>

</body>
</html>

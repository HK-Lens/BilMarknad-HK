<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logga in | BILHK</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { 
            --primary: #f58220; 
            --dark: #0f172a; 
            --bg: #f8fafc; 
            --border: #e2e8f0; 
            --white: #ffffff;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--dark); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }

        .auth-container { width: 100%; max-width: 480px; }
        .auth-card { background: var(--white); padding: 40px; border-radius: 32px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }

        .logo-box { text-align: center; margin-bottom: 35px; }
        .logo-box h1 { font-weight: 900; font-size: 32px; letter-spacing: -1px; }
        .logo-box span { color: var(--primary); }

        /* Login Type Tabs */
        .tabs { display: flex; background: #f1f5f9; padding: 5px; border-radius: 16px; margin-bottom: 30px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.3s; color: #64748b; background: none; }
        .tab-btn.active { background: var(--white); color: var(--dark); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* Google Sign In Button */
        .google-btn { 
            width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 14px; 
            background: white; color: var(--dark); font-weight: 700; font-size: 15px;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            cursor: pointer; transition: 0.2s; margin-bottom: 25px;
        }
        .google-btn:hover { background: #f8fafc; border-color: #cbd5e1; }
        .google-btn img { width: 20px; }

        .divider { display: flex; align-items: center; margin-bottom: 25px; color: #94a3b8; font-size: 12px; font-weight: 600; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
        .divider span { padding: 0 15px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 8px; text-transform: uppercase; }
        input { width: 100%; padding: 15px; border: 1px solid var(--border); border-radius: 14px; background: #f8fafc; outline: none; font-size: 15px; }
        input:focus { border-color: var(--primary); background: white; }

        .btn-submit { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 16px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(245, 130, 32, 0.25); }

        .footer-links { text-align: center; margin-top: 30px; font-size: 14px; color: #64748b; }
        .footer-links a { color: var(--primary); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <div class="logo-box"><a href="index.html" style="text-decoration:none; color:inherit;"><h1>BIL<span>HK</span></h1></a></div>

        <div class="tabs">
            <button class="tab-btn active" onclick="setLoginType('Privatperson')">Privatperson</button>
            <button class="tab-btn" onclick="setLoginType('Företag')">Företag</button>
        </div>

        <button class="google-btn" id="googleLogin">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Logo.svg" alt="Google">
            Logga in med Google
        </button>

        <div class="divider"><span>ELLER E-POST</span></div>

        <form id="loginForm">
            <div class="form-group">
                <label>E-postadress</label>
                <input type="email" id="email" placeholder="namn@exempel.se" required>
            </div>
            <div class="form-group">
                <label>Lösenord</label>
                <input type="password" id="password" placeholder="••••••••" required>
                <div style="text-align:right; margin-top:8px;"><a href="forgot-password.html" style="font-size:12px; color:var(--primary); text-decoration:none; font-weight:700;">Glömt lösenord?</a></div>
            </div>
            <button type="submit" class="btn-submit" id="loginBtn">Logga in</button>
        </form>

        <div class="footer-links">
            Saknar du konto? <a href="register.html">Skapa ett här</a>
        </div>
    </div>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let loginType = 'Privatperson';

    window.setLoginType = (type) => {
        loginType = type;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText === type);
        });
    };

    // Email/Password Login
    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        btn.disabled = true; btn.innerText = "Vänta...";

        try {
            await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
            window.location.href = "dashboard.html";
        } catch (error) {
            Swal.fire('Fel', 'Inloggningen misslyckades. Kontrollera uppgifterna.', 'error');
            btn.disabled = false; btn.innerText = "Logga in";
        }
    };

    // Google Login
    document.getElementById('googleLogin').onclick = async () => {
        const provider = new GoogleAuthProvider();
        try {
            const result = await signInWithPopup(auth, provider);
            const user = result.user;

            // Save user type if it's a new user
            const userRef = doc(db, "users", user.uid);
            const userSnap = await getDoc(userRef);

            if (!userSnap.exists()) {
                await setDoc(userRef, {
                    uid: user.uid,
                    email: user.email,
                    userType: loginType,
                    createdAt: new Date()
                });
            }
            window.location.href = "dashboard.html";
        } catch (error) {
            console.error(error);
        }
    };
</script>
</body>
</html>

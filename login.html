<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>BilMarknad-HK | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        .brand-name { color: #0d6efd; font-size: 28px; font-weight: 700; margin-bottom: 5px; }
        .page-title { color: #333; font-size: 18px; font-weight: 600; margin-bottom: 30px; }
        .google-btn { background-color: #fff; color: #333; border: 1px solid #ddd; padding: 12px; width: 100%; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: background 0.3s; }
        .google-btn:hover { background-color: #f1f1f1; }
        .google-icon { width: 20px; height: 20px; }
        .divider { display: flex; align-items: center; text-align: center; margin: 25px 0; color: #888; font-size: 13px; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #eee; }
        .divider span { padding: 0 10px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { display: block; color: #555; font-size: 14px; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .login-btn { background-color: #0d6efd; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1 class="brand-name">BilMarknad-HK</h1>
        <p class="page-title">Logga in | Sign In</p>

        <button id="google-login-btn" class="google-btn">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="google-icon">
            Sign in with Google
        </button>

        <div class="divider"><span>or with Email</span></div>

        <form id="email-login-form">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="email@example.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="******" required>
            </div>
            <button type="submit" class="login-btn">Login</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // إعدادات مشروعك
        const firebaseConfig = {
            apiKey: "AIzaSyDCsMbG5pT3y6MC6b05LEdFoByWM1nT7NY",
            authDomain: "bilmarknad-hk.firebaseapp.com",
            databaseURL: "https://bilmarknad-hk-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bilmarknad-hk",
            storageBucket: "bilmarknad-hk.firebasestorage.app",
            messagingSenderId: "284008879407",
            appId: "1:284008879407:web:66bee60b51ec277e8dbdda"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // تفعيل زر الدخول عبر جوجل مع التحويل التلقائي
        document.getElementById('google-login-btn').addEventListener('click', () => {
            signInWithPopup(auth, provider)
                .then((result) => {
                    // الكود الذي سألت عنه يوضع هنا
                    // بمجرد نجاح الدخول، يتم تحويلك للصفحة الرئيسية
                    window.location.href = 'index.html'; 
                })
                .catch((error) => {
                    alert("Login Error: " + error.message);
                });
        });

        // منع التحديث عند محاولة دخول البريد (لأنه غير مفعل برمجياً بعد)
        document.getElementById('email-login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("Email login functionality will be added soon.");
        });
    </script>
</body>
</html>

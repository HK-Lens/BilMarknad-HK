<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Logga in | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .google-btn { width: 100%; background: white; border: 1px solid #e2e8f0; padding: 14px; border-radius: 12px; margin-top: 15px; cursor: pointer; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .google-btn:active { background: #f8fafc; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <h1 style="font-size:20px; text-align:center; margin-bottom:25px;">Välkommen</h1>
    
    <form id="loginForm">
        <input type="email" id="email" placeholder="Din e-postadress" required>
        <input type="password" id="password" placeholder="Lösenord" required>
        <button type="submit" class="btn-primary" id="loginBtn">Logga in</button>
    </form>

    <div style="margin:20px 0; text-align:center; color:#94a3b8; font-size:14px;">eller</div>

    <button class="google-btn" id="googleBtn">
        <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="20">
        Logga in med Google
    </button>
    
    <p style="margin-top:25px; text-align:center; font-size:13px; color:#64748b;">
        Har du inget konto? <a href="signup.html" style="color:var(--primary); text-decoration:none; font-weight:700;">Skapa ett här</a>
    </p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signInWithRedirect, GoogleAuthProvider, getRedirectResult } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // معالجة نتيجة العودة من جوجل (حل مشكلة الفشل)
    getRedirectResult(auth).then((result) => {
        if (result) window.location.href = "index.html";
    }).catch((error) => {
        console.error(error);
        if (error.code !== 'auth/popup-closed-by-user') {
            alert("Fel vid inloggning: " + error.message);
        }
    });

    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        btn.innerText = "Loggar in...";
        try {
            await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
            window.location.href = "index.html";
        } catch (error) {
            alert("Fel: " + error.message);
            btn.innerText = "Logga in";
        }
    };

    document.getElementById('googleBtn').onclick = () => {
        // استخدام Redirect بدلاً من Popup لضمان العمل على Xiaomi والأندرويد
        signInWithRedirect(auth, provider);
    };
</script>
</body>
</html>

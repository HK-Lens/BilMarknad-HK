<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logga in | BilHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* تنسيقات خاصة بصفحة تسجيل الدخول */
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f0f2f5; }
        .login-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #64748b; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; outline: none; }
        .btn-login-submit { width: 100%; padding: 14px; background: var(--dark); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .divider { margin: 25px 0; border-top: 1px solid #e2e8f0; position: relative; }
        .divider span { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: white; padding: 0 10px; font-size: 12px; color: #94a3b8; }
        .btn-google { width: 100%; padding: 12px; background: white; border: 1px solid #e2e8f0; border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body>

<div class="login-card">
    <a href="index.html" class="logo" style="margin-bottom: 20px; display: block; text-decoration: none;">BIL<span>HK</span></a>
    <h2 style="margin-bottom: 30px;">Välkommen tillbaka</h2>

    <form id="loginForm">
        <div class="form-group">
            <label>E-post (البريد الإلكتروني)</label>
            <input type="email" id="email" required placeholder="din@epost.se">
        </div>
        <div class="form-group">
            <label>Lösenord (كلمة المرور)</label>
            <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn-login-submit">Logga in</button>
    </form>

    <div class="divider"><span>Eller</span></div>

    <button class="btn-google" id="googleBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
        Logga in med Google
    </button>
</div>

<script type="module">
    // استيراد auth و googleProvider من ملف الإعدادات المركزي الذي أصلحناه
    import { auth, googleProvider } from './firebase-config.js';
    import { signInWithEmailAndPassword, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // 1. منطق تسجيل الدخول بالبريد الإلكتروني
    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            await signInWithEmailAndPassword(auth, email, password);
            // التوجيه للصفحة الرئيسية بعد النجاح
            window.location.href = "index.html"; 
        } catch (error) {
            console.error("Login Error:", error.code);
            alert("خطأ: تأكد من البريد الإلكتروني وكلمة المرور.");
        }
    };

    // 2. منطق تسجيل الدخول عبر Google
    document.getElementById('googleBtn').onclick = async () => {
        try {
            await signInWithPopup(auth, googleProvider);
            window.location.href = "index.html";
        } catch (error) {
            alert("حدث خطأ أثناء تسجيل الدخول بجوجل.");
        }
    };
</script>

</body>
</html>

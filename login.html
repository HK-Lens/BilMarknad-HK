<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Logga in | BILHK</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container" style="max-width:400px; margin: 100px auto;">
    <h2>Logga in</h2>
    <input id="email" type="email" placeholder="E-post">
    <input id="password" type="password" placeholder="Lösenord">
    <button onclick="login()" class="btn-primary">Logga in</button>
    <p>Har inget konto? <a href="signup.html">Skapa ett</a></p>
</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    window.login = () => {
        signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
        .then(() => location.href='index.html').catch(e => alert(e.message));
    };
</script>
</body>
</html>

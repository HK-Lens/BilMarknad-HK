<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logga in | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f4f6f9; --border: #e5e7eb; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        
        .auth-card { background: white; padding: 35px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); width: 100%; max-width: 450px; text-align: center; border: 1px solid var(--border); }
        .logo { text-decoration: none; font-size: 30px; font-weight: 900; color: var(--dark); margin-bottom: 25px; display: block; }
        .logo span { color: var(--primary); }
        
        h2 { font-size: 22px; margin-bottom: 25px; color: var(--dark); }
        
        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 700; color: #374151; margin-bottom: 6px; }
        input { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; background: #f9fafb; font-size: 14px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); background: white; }

        .forgot-link { text-align: right; margin-bottom: 20px; }
        .forgot-link a { color: var(--primary); text-decoration: none; font-size: 13px; font-weight: 600; }

        .btn-primary { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-primary:hover { background: #e07210; transform: translateY(-2px); }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }

        .footer-links { margin-top: 25px; padding-top: 20px; border-top: 1px solid #eee; font-size: 14px; color: #64748b; }
        .footer-links a { color: var(--primary); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

<div class="auth-card">
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <h2>Välkommen tillbaka</h2>
    
    <form id="loginForm">
        <div class="form-group">
            <label>E-postadress</label>
            <input type="email" id="email" placeholder="din@epost.se" required>
        </div>
        
        <div class="form-group">
            <label>Lösenord</label>
            <input type="password" id="pass" placeholder="Din lösenord" required>
        </div>

        <div class="forgot-link">
            <a href="forgot-password.html">Glömt lösenord?</a>
        </div>

        <button type="submit" class="btn-primary" id="loginBtn">Logga in</button>
    </form>

    <div class="footer-links">
        Har du inget konto? <a href="signup.html">Skapa ett här</a>
    </div>
</div>

<script type="module">
    import { auth } from './firebase-config.js';
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');

    loginForm.onsubmit = async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('pass').value;

        loginBtn.disabled = true;
        loginBtn.innerText = "Loggar in...";

        try {
            await signInWithEmailAndPassword(auth, email, password);
            // التوجيه للصفحة الرئيسية بعد النجاح
            window.location.href = "index.html"; 
        } catch (error) {
            console.error(error);
            // ترجمة الأخطاء للعامل
            if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                alert("Fel e-postadress eller lösenord.");
            } else if (error.code === 'auth/too-many-requests') {
                alert("För många misslyckade försök. Försök igen senare.");
            } else {
                alert("Ett fel uppstod: " + error.message);
            }
            loginBtn.disabled = false;
            loginBtn.innerText = "Logga in";
        }
    };
</script>
</body>
</html>

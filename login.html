<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logga in | BILHK</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--dark); display: flex; align-items: center; justify-content: center; min-height: 100vh; }

        .auth-card { background: white; width: 100%; max-width: 400px; padding: 40px; border-radius: 30px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .logo-area { text-align: center; margin-bottom: 30px; text-decoration: none; display: block; }
        .logo-area h1 { font-weight: 900; font-size: 30px; color: var(--dark); }
        .logo-area span { color: var(--primary); }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 8px; text-transform: uppercase; }
        input { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; background: #f1f5f9; outline: none; font-size: 14px; transition: 0.3s; }
        input:focus { border-color: var(--primary); background: white; }

        .btn-login { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; transition: 0.3s; font-size: 16px; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(245, 130, 32, 0.2); }

        .extra-links { text-align: center; margin-top: 25px; font-size: 14px; color: #64748b; }
        .extra-links a { color: var(--primary); text-decoration: none; font-weight: 700; margin: 0 5px; }
        
        .divider { margin: 20px 0; text-align: center; position: relative; }
        .divider::before { content: ""; position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: var(--border); z-index: 1; }
        .divider span { position: relative; background: white; padding: 0 10px; z-index: 2; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>

<div class="auth-card">
    <a href="index.html" class="logo-area"><h1>BIL<span>HK</span></h1></a>
    <h2 style="margin-bottom: 25px; font-weight: 900; text-align: center;">Välkommen tillbaka</h2>

    <form id="loginForm">
        <div class="form-group">
            <label>E-postadress</label>
            <input type="email" id="email" placeholder="Skriv din e-post" required>
        </div>
        
        <div class="form-group">
            <label>Lösenord</label>
            <input type="password" id="password" placeholder="Ditt lösenord" required>
            <div style="text-align: right; margin-top: 5px;">
                <a href="forgot-password.html" style="font-size: 12px; color: var(--primary); text-decoration: none; font-weight: 600;">Glömt lösenord?</a>
            </div>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">Logga in</button>
    </form>

    <div class="divider"><span>ELLER</span></div>

    <div class="extra-links">
        Ny på BILHK? <a href="register.html">Skapa konto här</a>
    </div>
</div>

<script type="module">
    import { auth } from './firebase-config.js';
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');

        btn.disabled = true;
        btn.innerText = "Loggar in...";

        try {
            await signInWithEmailAndPassword(auth, email, password);
            
            // Redirect to Dashboard after success
            window.location.href = "dashboard.html";

        } catch (error) {
            console.error(error);
            let msg = "Fel e-post eller lösenord.";
            if (error.code === 'auth/user-not-found') msg = "Användaren hittades inte.";
            if (error.code === 'auth/wrong-password') msg = "Felaktigt lösenord.";
            
            Swal.fire({
                title: 'Inloggning misslyckades',
                text: msg,
                icon: 'error',
                confirmButtonColor: '#f58220'
            });
            
            btn.disabled = false;
            btn.innerText = "Logga in";
        }
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logga in | BilHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            padding: 20px;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #eee;
        }
        .login-card h1 { font-size: 24px; font-weight: 900; margin-bottom: 10px; }
        .login-card p { color: #666; font-size: 14px; margin-bottom: 30px; }

        /* زر جوجل الاحترافي */
        .google-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: white;
            color: #374151;
            border: 1px solid #d1d5db;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            font-size: 15px;
        }
        .google-btn:hover { background: #f9fafb; border-color: #9ca3af; }
        .google-btn img { width: 20px; height: 20px; }

        .divider {
            margin: 25px 0;
            display: flex;
            align-items: center;
            color: #9ca3af;
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #eee;
            margin: 0 10px;
        }

        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 5px; color: #4b5563; }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            outline: none;
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
</header>

<div class="login-wrapper">
    <div class="login-card">
        <h1>Välkommen tillbaka</h1>
        <p>Logga in för att hantera dina annonser</p>

        <button class="google-btn" id="googleBtn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/layout/google.svg" alt="Google">
            Logga in med Google
        </button>

        <div class="divider">eller med e-post</div>

        <form id="loginForm">
            <div class="input-group">
                <label>E-postadress</label>
                <input type="email" id="email" placeholder="din@epost.se" required>
            </div>
            <div class="input-group">
                <label>Lösenord</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Logga in</button>
        </form>

        <p style="margin-top: 25px; font-size: 13px;">
            Har du inget konto? <a href="#" style="color: var(--primary); text-decoration: none; font-weight: 700;">Skapa konto</a>
        </p>
    </div>
</div>

<script type="module">
    import { auth, googleProvider } from './firebase-config.js';
    import { signInWithEmailAndPassword, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // تفعيل تسجيل الدخول عبر جوجل
    const googleBtn = document.getElementById('googleBtn');
    googleBtn.onclick = async () => {
        try {
            await signInWithPopup(auth, googleProvider);
            window.location.href = "index.html"; // التوجه للصفحة الرئيسية بعد النجاح
        } catch (error) {
            console.error("Google login error:", error);
            alert("Kunde inte logga in med Google: " + error.message);
        }
    };

    // تسجيل الدخول العادي بالبريد
    const loginForm = document.getElementById('loginForm');
    loginForm.onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            await signInWithEmailAndPassword(auth, email, password);
            window.location.href = "index.html";
        } catch (error) {
            alert("Fel: " + error.message);
        }
    };
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logga in | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f4f6f9; --border: #e5e7eb; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .auth-card { background: white; padding: 35px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); width: 100%; max-width: 450px; text-align: center; border: 1px solid var(--border); }
        .logo { text-decoration: none; font-size: 30px; font-weight: 900; color: var(--dark); margin-bottom: 25px; display: block; }
        .logo span { color: var(--primary); }
        h2 { font-size: 22px; margin-bottom: 25px; color: var(--dark); }
        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 700; color: #374151; margin-bottom: 6px; }
        input { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; background: #f9fafb; font-size: 14px; outline: none; }
        .btn-primary { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .footer-links { margin-top: 25px; border-top: 1px solid #eee; padding-top: 20px; font-size: 14px; color: #64748b; }
        .footer-links a { color: var(--primary); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
<div class="auth-card">
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <h2>Välkommen tillbaka</h2>
    <form id="loginForm">
        <div class="form-group"><label>E-postadress</label><input type="email" id="email" required></div>
        <div class="form-group"><label>Lösenord</label><input type="password" id="pass" required></div>
        <div style="text-align: right; margin-bottom: 15px;"><a href="forgot-password.html" style="color: var(--primary); font-size: 13px; text-decoration: none;">Glömt lösenord?</a></div>
        <button type="submit" class="btn-primary" id="loginBtn">Logga in</button>
    </form>
    <div class="footer-links">Har du inget konto? <a href="register.html">Skapa ett här</a></div>
</div>
<script type="module">
    import { auth } from './firebase-config.js';
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        btn.disabled = true; btn.innerText = "Loggar in...";
        try {
            await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
            window.location.href = "dashboard.html";
        } catch (err) { alert("Fel: " + err.message); btn.disabled = false; btn.innerText = "Logga in"; }
    };
</script>
</body>
</html>

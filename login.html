<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logga in | BilMarknad-HK</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #f58220;
            --primary-hover: #e07210;
            --dark: #0f172a;
            --light: #f8fafc;
            --border: #e2e8f0;
            --white: #ffffff;
            --danger: #ef4444;
            --warning-bg: #fff7ed;
            --warning-text: #9a3412;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--light);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: var(--white);
            padding: 15px 6%;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--dark);
            text-decoration: none;
        }

        .logo span {
            color: var(--primary);
        }

        .auth-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .auth-card {
            background: var(--white);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 480px;
            border: 1px solid var(--border);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 800;
            color: var(--dark);
        }

        .login-tabs {
            display: flex;
            background: #f1f5f9;
            border-radius: 50px;
            padding: 5px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            border: none;
            padding: 12px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            color: #64748b;
            background: transparent;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .disclaimer-box {
            background: var(--warning-bg);
            border: 1px solid #ffedd5;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 12px;
            color: var(--warning-text);
            line-height: 1.5;
        }

        .verify-box {
            display: none;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #1e40af;
            line-height: 1.6;
        }

        .verify-box.show {
            display: block;
        }

        .terms-container {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #475569;
            cursor: pointer;
        }

        .terms-container input {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: #f1f5f9;
            outline: none;
            font-size: 15px;
        }

        input:focus {
            border-color: var(--primary);
            background: white;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-hover);
        }

        .btn-primary:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        .btn-google {
            width: 100%;
            padding: 14px;
            background: white;
            color: var(--dark);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-google:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .divider {
            margin: 25px 0;
            display: flex;
            align-items: center;
            color: #94a3b8;
            font-size: 13px;
            gap: 10px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }

        .register-section {
            margin-top: 30px;
            text-align: center;
            padding-top: 20px;
            border-top: 1px dashed var(--border);
        }

        .register-section p {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 10px;
        }

        .btn-outline {
            display: inline-block;
            width: 100%;
            padding: 14px;
            border: 2px solid var(--primary);
            color: var(--primary);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 800;
            transition: 0.3s;
        }

        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }
    </style>
</head>

    <a href="index.html" class="logo">BIL<span>HK</span></a>
</header>

<div class="auth-container">
    <div class="auth-card">
        <h2>Logga in</h2>

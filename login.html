<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logga in | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            display: flex; align-items: center; justify-content: center;
            min-height: 90vh; padding: 20px; background: #f4f6f9;
        }
        .auth-card {
            background: white; padding: 40px; border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            width: 100%; max-width: 450px; border: 1px solid #e5e7eb; text-align: center;
        }
        .auth-header h1 { font-size: 26px; font-weight: 900; color: #111827; }
        
        /* زر جوجل المحدث */
        .google-auth-btn {
            width: 100%; display: flex; align-items: center; justify-content: center;
            gap: 12px; background: white; color: #374151; border: 1px solid #d1d5db;
            padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer;
            margin-top: 20px; transition: 0.2s; font-family: inherit;
        }
        .google-auth-btn:hover { background: #f9fafb; border-color: #9ca3af; }
        
        .divider { display: flex; align-items: center; color: #9ca3af; font-size: 12px; margin: 25px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #eee; margin: 0 10px; }

        .form-group { text-align: left; margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #e5e7eb; border-radius: 10px; }
        
        .btn-auth-submit {
            width: 100%; padding: 14px; background: #f58220; color: white;
            border: none; border-radius: 10px; font-weight: 700; cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
</header>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Välkommen</h1>
            <p>Logga in på ditt konto</p>
        </div>

        <button class="google-auth-btn" id="googleBtn">
            <svg width="20" height="20" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
            </svg>
            Fortsätt med Google
        </button>

        <div class="divider">eller e-post</div>

        <form id="authForm">
            <div class="form-group">
                <label>E-postadress</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Lösenord</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn-auth-submit">Logga in</button>
        </form>
    </div>
</div>

<script type="module">
    import { auth, googleProvider } from './firebase-config.js';
    import { signInWithPopup, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    document.getElementById('googleBtn').onclick = async () => {
        try {
            await signInWithPopup(auth, googleProvider);
            window.location.href = "index.html";
        } catch (err) {
            console.error(err);
            alert("Inloggning misslyckades.");
        }
    };

    document.getElementById('authForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        try {
            await signInWithEmailAndPassword(auth, email, password);
            window.location.href = "index.html";
        } catch (err) {
            alert("Fel: " + err.message);
        }
    };
</script>
</body>
</html>

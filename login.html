<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logga in | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        
        .auth-card { background: white; width: 100%; max-width: 440px; padding: 40px; border-radius: 32px; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
        .logo { text-align: center; margin-bottom: 25px; text-decoration: none; font-weight: 900; font-size: 32px; color: var(--dark); display: block; }
        .logo span { color: var(--primary); }

        .security-box { background: #fff7ed; border: 1px solid #ffedd5; padding: 15px; border-radius: 12px; font-size: 12px; color: #9a3412; margin-bottom: 20px; line-height: 1.5; text-align: left; }
        .security-box b { color: #c2410c; display: block; margin-bottom: 5px; text-transform: uppercase; }

        .tabs { display: flex; background: #f1f5f9; padding: 5px; border-radius: 14px; margin-bottom: 25px; }
        .tab { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 14px; background: none; color: #64748b; }
        .tab.active { background: white; color: var(--dark); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 8px; text-transform: uppercase; }
        input { width: 100%; padding: 15px; border: 1px solid var(--border); border-radius: 14px; outline: none; font-size: 15px; background: #f9fafb; transition: 0.2s; }
        input:focus { border-color: var(--primary); background: white; }

        .terms-area { font-size: 13px; color: #64748b; margin-bottom: 20px; display: flex; align-items: flex-start; gap: 10px; cursor: pointer; line-height: 1.4; }
        .btn-auth { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 14px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-auth:disabled { background: #cbd5e1; cursor: not-allowed; }

        .google-btn { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 14px; background: white; display: flex; align-items: center; justify-content: center; gap: 12px; font-weight: 700; cursor: pointer; margin-top: 20px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="auth-card">
    <a href="index.html" class="logo">BIL<span>HK</span></a>

    <div class="security-box">
        <b>Säkerhet först:</b> Vi ansvarar inte för annonsernas innehåll. Betala aldrig i förskott och dela inte personlig information. All handel sker på egen risk.
    </div>
    
    <div class="tabs">
        <button class="tab active" id="tabP" onclick="switchLogin('Privat')">Privatperson</button>
        <button class="tab" id="tabF" onclick="switchLogin('Foretag')">Företag</button>
    </div>

    <form id="loginForm">
        <div class="form-group"><label id="emailLabel">E-postadress</label><input type="email" id="email" required></div>
        <div class="form-group"><label>Lösenord</label><input type="password" id="password" required></div>

        <label class="terms-area">
            <input type="checkbox" id="termsCheck" style="width:20px; height:20px;">
            <span>Jag godkänner villkoren och bekräftar ansvarsfriskrivningen.</span>
        </label>

        <button type="submit" class="btn-auth" id="loginBtn" disabled>Logga in</button>
    </form>

    <div id="googleSection">
        <div style="text-align:center; margin:15px 0; font-size:12px; color:#cbd5e1; font-weight: 800;">ELLER</div>
        <button class="google-btn" id="googleBtn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18"> Logga in med Google
        </button>
    </div>

    <p style="text-align:center; margin-top:25px; font-size:14px; color:#64748b;">
        Ny på BILHK? <a href="register.html" style="color:var(--primary); font-weight:800; text-decoration:none;">Skapa konto</a>
    </p>
</div>

<script type="module">
    import { auth } from './firebase-config.js';
    import { signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const termsCheck = document.getElementById('termsCheck');
    const loginBtn = document.getElementById('loginBtn');

    window.switchLogin = (type) => {
        document.getElementById('tabP').classList.toggle('active', type === 'Privat');
        document.getElementById('tabF').classList.toggle('active', type === 'Foretag');
        document.getElementById('emailLabel').innerText = type === 'Privat' ? 'E-postadress' : 'Företags-e-post';
        document.getElementById('googleSection').style.display = (type === 'Privat') ? 'block' : 'none';
    };

    termsCheck.onchange = (e) => loginBtn.disabled = !e.target.checked;

    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        try {
            await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
            window.location.href = "index.html";
        } catch (error) { 
            Swal.fire('Fel', 'Inloggning misslyckades. Kontrollera dina uppgifter.', 'error'); 
        }
    };

    document.getElementById('googleBtn').onclick = async () => {
        if(!termsCheck.checked) return Swal.fire('Obs', 'Godkänn villkoren först', 'warning');
        try { await signInWithPopup(auth, new GoogleAuthProvider()); window.location.href = "index.html"; } catch (e) {}
    };
</script>
</body>
</html>

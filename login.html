<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | BilMarknad-HK</title>
    
    <style>
        :root {
            --primary-color: #0056b3;
            --accent-color: #ffcc00;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: #fff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 20px;
            display: block;
            text-decoration: none;
        }

        h2 { color: #333; margin-bottom: 25px; font-size: 1.4rem; }

        .btn-google {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
            color: #555;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
            margin-bottom: 20px;
        }

        .btn-google:hover { background: #f9f9f9; border-color: #bbb; }
        .btn-google img { width: 20px; }

        .divider {
            margin: 20px 0;
            display: flex;
            align-items: center;
            color: #999;
            font-size: 0.9rem;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #eee;
            margin: 0 10px;
        }

        .form-group { text-align: right; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; font-weight: 500; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-login:hover { background: #004494; }
        
        .footer-links { margin-top: 20px; font-size: 0.9rem; color: #777; }
        .footer-links a { color: var(--primary-color); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-card">
        <a href="index.html" class="logo">BilMarknad-HK</a>
        <h2>تسجيل الدخول | Logga in</h2>

        <button class="btn-google" id="googleBtn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" alt="Google">
            الدخول عبر جوجل
        </button>

        <div class="divider">أو عبر البريد الإلكتروني</div>

        <form id="loginForm">
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" placeholder="******" required>
            </div>
            <button type="submit" class="btn-login">دخول</button>
        </form>

        <div class="footer-links">
            ليس لديك حساب؟ <a href="#">سجل الآن</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

        // إعدادات Firebase الخاصة بمشروعك
        const firebaseConfig = {
            apiKey: "AIzaSyDCsMbG5pT3y6MC6b05LEdFoByWM1nT7NY",
            authDomain: "bilmarknad-hk.firebaseapp.com",
            projectId: "bilmarknad-hk",
            storageBucket: "bilmarknad-hk.firebasestorage.app",
            messagingSenderId: "284008879407",
            appId: "1:284008879407:web:66bee60b51ec277e8dbdda"
        };

        // تشغيل Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // 1. الدخول عبر جوجل
        const googleBtn = document.getElementById('googleBtn');
        googleBtn.onclick = () => {
            signInWithPopup(auth, provider)
                .then((result) => {
                    console.log("Logged in:", result.user);
                    // التوجه للرئيسية بعد النجاح (استخدم اسم الفولدر إذا لزم الأمر على GitHub)
                    window.location.href = "index.html"; 
                })
                .catch((error) => {
                    console.error("Login Error:", error);
                    if (error.code === 'auth/unauthorized-domain') {
                        alert("خطأ: يجب إضافة رابط موقعك (hk-lens.github.io) في Authorized Domains داخل Firebase Settings.");
                    } else {
                        alert("فشل تسجيل الدخول: " + error.message);
                    }
                });
        };

        // 2. الدخول عبر الإيميل والباسورد
        const loginForm = document.getElementById('loginForm');
        loginForm.onsubmit = (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            signInWithEmailAndPassword(auth, email, password)
                .then(() => {
                    window.location.href = "index.html";
                })
                .catch((error) => {
                    alert("خطأ في البيانات: " + error.message);
                });
        };
    </script>

</body>
</html>

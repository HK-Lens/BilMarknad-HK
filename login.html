<!DOCTYPE html><html lang="sv"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Logga in | BILHK</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script><style>:root{--primary:#f58220;--dark:#0f172a;--bg:#f8fafc;--border:#e2e8f0}*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,sans-serif}body{background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.card{background:white;border:1px solid var(--border);border-radius:30px;padding:38px;max-width:460px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,.06)}.logo{text-align:center;display:block;text-decoration:none;font-size:32px;font-weight:900;color:var(--dark);margin-bottom:18px}.logo span{color:var(--primary)}label{display:block;font-size:11px;text-transform:uppercase;font-weight:900;color:#64748b;margin-bottom:8px}input{width:100%;padding:14px;border:1px solid var(--border);border-radius:13px;background:#f8fafc;margin-bottom:14px;font-weight:700}.btn{width:100%;padding:15px;border:0;border-radius:13px;background:var(--primary);color:white;font-weight:900;cursor:pointer;margin-top:8px}.links{text-align:center;margin-top:18px;font-size:14px}.links a{color:var(--primary);font-weight:900;text-decoration:none}.notice{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;padding:13px;border-radius:13px;font-size:13px;font-weight:700;margin-bottom:18px;line-height:1.5}.check{font-size:13px;font-weight:700;color:#334155;display:flex;gap:8px;align-items:flex-start}</style></head><body><div class="card"><a href="index.html" class="logo">BIL<span>HK</span></a><div class="notice">Genom att logga in accepterar du att BILHK endast är en annonsplattform och inte ansvarar för annonser, betalningar eller tvister.</div><form id="form"><label>E-post</label><input type="email" id="email" required><label>Lösenord</label><input type="password" id="pass" required><label class="check"><input type="checkbox" id="terms" required> Jag godkänner <a href="terms.html" target="_blank">användarvillkor och ansvarsfriskrivning</a>.</label><button class="btn" id="btn">Logga in</button></form><div class="links"><a href="register.html">Skapa konto</a> · <a href="reset-password.html">Glömt lösenord?</a></div></div><script type="module">import{auth,db}from'./firebase-config.js';import{signInWithEmailAndPassword}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";import{doc,setDoc,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";form.onsubmit=async e=>{e.preventDefault();btn.disabled=true;btn.textContent='Loggar in...';try{const c=await signInWithEmailAndPassword(auth,email.value.trim(),pass.value);await setDoc(doc(db,'users',c.user.uid),{email:c.user.email,lastActiveAt:serverTimestamp(),termsAcceptedAt:serverTimestamp()},{merge:true});location.href='dashboard.html';}catch(err){Swal.fire('Fel','Inloggningen misslyckades. Kontrollera e-post och lösenord.','error');btn.disabled=false;btn.textContent='Logga in';}};</script></body></html>

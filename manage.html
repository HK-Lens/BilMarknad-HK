<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hantera Annonser | BILHK</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { 
            --primary: #f58220; 
            --dark: #0f172a; 
            --bg: #f8fafc; 
            --border: #e2e8f0; 
            --danger: #ef4444;
            --success: #22c55e;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--dark); line-height: 1.6; }

        header { background: white; padding: 15px 5%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        header .logo { text-decoration: none; font-weight: 900; color: var(--dark); font-size: 24px; }
        header .logo span { color: var(--primary); }

        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; }
        .page-title { font-size: 28px; font-weight: 900; display: flex; align-items: center; gap: 12px; }

        .ads-list { display: flex; flex-direction: column; gap: 20px; }
        
        /* Advanced Ad Card */
        .ad-item {
            background: white;
            border-radius: 20px;
            padding: 20px;
            display: grid;
            grid-template-columns: 200px 1fr 180px;
            gap: 25px;
            align-items: center;
            border: 1px solid var(--border);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .ad-item:hover { transform: translateY(-3px); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.1); }

        .ad-image-container { position: relative; width: 200px; height: 140px; border-radius: 14px; overflow: hidden; background: #f1f5f9; }
        .ad-image { width: 100%; height: 100%; object-fit: cover; }

        .ad-info h3 { font-size: 20px; font-weight: 800; margin-bottom: 10px; }
        .ad-price { color: var(--primary); font-size: 22px; font-weight: 900; margin-bottom: 15px; }
        
        /* Stats Styling */
        .ad-stats-row { display: flex; gap: 20px; margin-bottom: 15px; }
        .stat-unit { display: flex; flex-direction: column; }
        .stat-unit span { font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-unit b { font-size: 16px; color: var(--dark); }

        /* Rating System */
        .rating-box { text-align: center; border-left: 1px solid var(--border); padding-left: 20px; }
        .score-circle { font-size: 28px; font-weight: 900; margin-bottom: 4px; }
        .score-label { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; }

        .actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn { padding: 10px 16px; border-radius: 10px; font-weight: 700; font-size: 13px; text-decoration: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        
        .edit-btn { background: #f1f5f9; color: var(--dark); }
        .edit-btn:hover { background: #e2e8f0; }
        
        .delete-btn { background: #fee2e2; color: var(--danger); }
        .delete-btn:hover { background: var(--danger); color: white; }

        .empty-state { text-align: center; padding: 100px 20px; grid-column: 1 / -1; }
        .empty-state i { font-size: 64px; color: var(--border); margin-bottom: 20px; }

        @media (max-width: 850px) {
            .ad-item { grid-template-columns: 1fr; text-align: center; }
            .ad-image-container { width: 100%; height: 200px; }
            .ad-stats-row { justify-content: center; }
            .rating-box { border-left: none; border-top: 1px solid var(--border); padding: 20px 0 0; }
            .actions { justify-content: center; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <a href="dashboard.html" style="text-decoration:none; color:var(--dark); font-weight:700;"><i class="fa-solid fa-gauge"></i> Dashboard</a>
</header>

<div class="container">
    <div class="page-header">
        <h1 class="page-title">Mina Annonser</h1>
        <button onclick="location.href='sell.html'" style="padding:12px 25px; background:var(--primary); color:white; border:none; border-radius:50px; font-weight:800; cursor:pointer; box-shadow: 0 4px 10px rgba(245, 130, 32, 0.3);">+ Ny annons</button>
    </div>
    
    <div id="loading" style="text-align:center; padding:50px; font-weight:700; color:#64748b;">Analyse...</div>
    <div class="ads-list" id="adsContainer"></div>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { collection, query, where, getDocs, writeBatch, doc, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    onAuthStateChanged(auth, (user) => {
        if (user) {
            loadAdvancedAds(user.uid);
        } else {
            window.location.href = "login.html";
        }
    });

    async function loadAdvancedAds(uid) {
        const container = document.getElementById('adsContainer');
        const loading = document.getElementById('loading');
        
        try {
            const q = query(collection(db, "cars"), where("sellerId", "==", uid), orderBy("createdAt", "desc"));
            const querySnapshot = await getDocs(q);
            
            loading.style.display = 'none';

            if (querySnapshot.empty) {
                container.innerHTML = `<div class="empty-state"><i class="fa-solid fa-car-rear"></i><h3>Inga annonser än</h3></div>`;
                return;
            }

            container.innerHTML = "";
            
            for (const documentSnap of querySnapshot.docs) {
                const car = documentSnap.data();
                const carId = documentSnap.id;

                // Fetch statistics for this car
                // 1. Get Message count from 'chats' collection
                const chatQ = query(collection(db, "chats"), where("carId", "==", carId));
                const chatSnap = await getDocs(chatQ);
                const msgCount = chatSnap.size;

                // 2. Get Favorites count
                const favQ = query(collection(db, "favorites"), where("carId", "==", carId));
                const favSnap = await getDocs(favQ);
                const favCount = favSnap.size;

                const views = car.views || 0;
                
                // Ad Performance Score Calculation
                let score = 0;
                if(views > 0) {
                    score = Math.min(100, Math.round((views * 0.1) + (favCount * 2) + (msgCount * 5)));
                }
                const scoreColor = score > 70 ? "#22c55e" : (score > 35 ? "#f59e0b" : "#ef4444");

                const item = document.createElement('div');
                item.className = 'ad-item';
                item.innerHTML = `
                    <div class="ad-image-container">
                        <img src="${(car.images && car.images[0]) ? car.images[0] : 'placeholder.jpg'}" class="ad-image">
                    </div>
                    <div class="ad-info">
                        <h3>${car.brand} ${car.model || ''}</h3>
                        <div class="ad-price">${Number(car.price).toLocaleString()} kr</div>
                        
                        <div class="ad-stats-row">
                            <div class="stat-unit"><span>Visningar</span><b>${views}</b></div>
                            <div class="stat-unit"><span>Sparade</span><b>${favCount}</b></div>
                            <div class="stat-unit"><span>Meddelanden</span><b>${msgCount}</b></div>
                        </div>

                        <div class="actions">
                            <a href="edit-car.html?id=${carId}" class="btn edit-btn"><i class="fa-solid fa-pen"></i> Redigera</a>
                            <button class="btn delete-btn" onclick="deleteAdCompletely('${carId}')">
                                <i class="fa-solid fa-trash-can"></i> Radera
                            </button>
                        </div>
                    </div>
                    <div class="rating-box">
                        <div class="score-circle" style="color: ${scoreColor}">${score}%</div>
                        <div class="score-label">Performance Score</div>
                    </div>
                `;
                container.appendChild(item);
            }

        } catch (error) {
            console.error("Fetch Error:", error);
            loading.innerText = "Error loading data.";
        }
    }

    // Clean Batch Delete Function
    window.deleteAdCompletely = async (carId) => {
        const confirmResult = await Swal.fire({
            title: 'Radera annons?',
            text: "Detta tar bort annonsen, chattar och favoriter permanent.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            cancelButtonColor: '#64748b',
            confirmButtonText: 'Ja, radera allt',
            cancelButtonText: 'Avbryt'
        });

        if (confirmResult.isConfirmed) {
            try {
                const batch = writeBatch(db);

                // 1. Delete car document
                batch.delete(doc(db, "cars", carId));

                // 2. Delete related chats
                const chatsQuery = query(collection(db, "chats"), where("carId", "==", carId));
                const chatSnaps = await getDocs(chatsQuery);
                chatSnaps.forEach(c => batch.delete(c.ref));

                // 3. Delete related favorites
                const favsQuery = query(collection(db, "favorites"), where("carId", "==", carId));
                const favSnaps = await getDocs(favsQuery);
                favSnaps.forEach(f => batch.delete(f.ref));

                await batch.commit();

                Swal.fire({ title: 'Raderad!', icon: 'success', timer: 1500, showConfirmButton: false });
                location.reload();

            } catch (error) {
                console.error("Delete Error:", error);
                Swal.fire('Error', 'Action failed.', 'error');
            }
        }
    };
</script>
</body>
</html>

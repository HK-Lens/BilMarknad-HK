<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mina Bilar | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; }
        header { background: white; padding: 15px 5%; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; }
        
        .dashboard-header { background: var(--dark); color: white; padding: 40px 5%; text-align: center; }
        
        /* أزرار التبديل المبتكرة */
        .tabs { display: flex; justify-content: center; gap: 10px; margin: -25px auto 30px; position: relative; z-index: 10; }
        .tab-btn { 
            padding: 15px 30px; border: none; border-radius: 50px; cursor: pointer; 
            font-weight: 700; background: white; color: var(--dark); box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .tab-btn.active { background: var(--primary); color: white; }

        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        .car-card { background: white; border-radius: 20px; overflow: hidden; border: 1px solid #e2e8f0; position: relative; }
        .car-card img { width: 100%; height: 180px; object-fit: cover; }
        .info { padding: 15px; }
        .badge { position: absolute; top: 10px; left: 10px; background: var(--primary); color: white; padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; }
        
        .empty-state { text-align: center; padding: 50px; color: #94a3b8; }
    </style>
</head>
<body>

<header>
    <a href="index.html" style="text-decoration:none; color:var(--dark); font-weight:700;">← Tillbaka till sökning</a>
    <span style="font-weight:800;">BilMarknad<span style="color:var(--primary);">HK</span></span>
</header>

<div class="dashboard-header">
    <h1>Välkommen tillbaka, Heitham</h1>
    <p>Här kan du hantera dina sparade favoriter och egna annonser</p>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('favs', this)">⭐ Sparade (المفضلة)</button>
    <button class="tab-btn" onclick="switchTab('mine', this)">🚗 Mina Annonser (إعلاناتي)</button>
</div>

<div class="container">
    <div id="displayGrid" class="grid">
        </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let allCars = [];
    let myCars = [];
    let favoriteCars = [];

    // 1. جلب البيانات
    async function loadData(user) {
        const snap = await getDocs(collection(db, "cars"));
        allCars = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));

        // تصفية إعلاناتي (بناءً على البريد الإلكتروني للمستخدم المسجل)
        if(user) {
            myCars = allCars.filter(car => car.sellerEmail === user.email);
        }

        // تصفية المفضلة (من ذاكرة المتصفح المحلية)
        const favIds = JSON.parse(localStorage.getItem('favCars')) || [];
        favoriteCars = allCars.filter(car => favIds.includes(car.id));

        // العرض الافتراضي هو المفضلة
        render(favoriteCars, 'Sparad');
    }

    function render(data, label) {
        const grid = document.getElementById('displayGrid');
        if(data.length === 0) {
            grid.innerHTML = `<div class="empty-state"><h3>Inga bilar här än.</h3></div>`;
            return;
        }
        grid.innerHTML = data.map(car => `
            <div class="car-card" onclick="location.href='details.html?id=${car.id}'">
                <span class="badge">${label}</span>
                <img src="${car.images?.[0] || ''}">
                <div class="info">
                    <div style="font-weight:800;">${car.brand}</div>
                    <div style="color:var(--primary); font-weight:800; margin-top:5px;">${Number(car.price).toLocaleString()} kr</div>
                </div>
            </div>
        `).join('');
    }

    window.switchTab = (type, btn) => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if(type === 'favs') render(favoriteCars, 'Sparad');
        if(type === 'mine') render(myCars, 'Min Annons');
    };

    onAuthStateChanged(auth, user => {
        loadData(user);
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Meddelanden | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f0f2f5; --white: #ffffff; --border: #e4e6eb; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); height: 100vh; overflow: hidden; }
        header { background: var(--white); padding: 0 5%; height: 60px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .messenger { display: grid; grid-template-columns: 350px 1fr; height: calc(100vh - 60px); }
        .sidebar { background: white; border-right: 1px solid var(--border); overflow-y: auto; }
        .thread { padding: 15px; border-bottom: 1px solid #f0f2f5; cursor: pointer; }
        .thread:hover { background: #f5f6f7; }
        .thread.active { background: #fff5ed; border-right: 4px solid var(--primary); }
        .chat-area { display: flex; flex-direction: column; background: #f0f2f5; }
        .msg-list { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 75%; padding: 10px 15px; border-radius: 15px; font-size: 14px; }
        .bubble.sent { align-self: flex-end; background: var(--primary); color: white; }
        .bubble.received { align-self: flex-start; background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .input-bar { padding: 15px; background: white; display: flex; gap: 10px; }
        .input-bar input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
        .send-btn { background: var(--dark); color: white; border: none; padding: 0 25px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
<header>
    <a href="index.html" style="text-decoration:none; color:black; font-weight:900;">BIL<span>HK</span></a>
    <a href="my-account.html" style="text-decoration:none; font-weight:700; color:black;">← Tillbaka</a>
</header>
<div class="messenger">
    <div class="sidebar" id="threadsContainer"></div>
    <div class="chat-area">
        <div id="msgList" class="msg-list"></div>
        <div class="input-bar" id="inputArea" style="display:none;">
            <input type="text" id="msgInput" placeholder="Skriv svar...">
            <button id="sendBtn">Skicka</button>
        </div>
    </div>
</div>

<script type="module">
    import { db, auth } from './firebase-config.js';
    import { collection, query, addDoc, serverTimestamp, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    let currentUser = null;
    let activeChat = null;

    onAuthStateChanged(auth, (user) => {
        if (user) { currentUser = user; loadInbox(); }
        else { window.location.href = "login.html"; }
    });

    function loadInbox() {
        const q = query(collection(db, "messages"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snap) => {
            const threads = {};
            snap.docs.forEach(doc => {
                const m = doc.data();
                if (m.senderId === currentUser.uid || m.receiverId === currentUser.uid) {
                    const threadId = [m.senderId, m.receiverId].sort().join("_") + "_" + m.carTitle;
                    if (!threads[threadId]) threads[threadId] = { id: threadId, ...m, partnerId: m.senderId === currentUser.uid ? m.receiverId : m.senderId };
                }
            });
            document.getElementById('threadsContainer').innerHTML = Object.values(threads).map(t => `
                <div class="thread" onclick="openChat('${t.id}', '${t.partnerId}', '${t.carTitle}', '${t.senderEmail || t.receiverEmail}')">
                    <strong>${t.carTitle}</strong><br><small>${t.message.substring(0,30)}</small>
                </div>`).join('');
        });
    }

    window.openChat = (tid, pId, title, pEmail) => {
        activeChat = { tid, pId, title, pEmail };
        document.getElementById('inputArea').style.display = 'flex';
        const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));
        onSnapshot(q, (snap) => {
            const msgs = snap.docs.map(d => d.data()).filter(m => ([m.senderId, m.receiverId].sort().join("_") + "_" + m.carTitle) === tid);
            document.getElementById('msgList').innerHTML = msgs.map(m => `
                <div class="bubble ${m.senderId === currentUser.uid ? 'sent' : 'received'}">${m.message}</div>`).join('');
            document.getElementById('msgList').scrollTop = 9999;
        });
    };

    document.getElementById('sendBtn').onclick = async () => {
        const input = document.getElementById('msgInput');
        if (!input.value.trim()) return;
        await addDoc(collection(db, "messages"), {
            senderId: currentUser.uid, senderName: "Säljare", senderEmail: currentUser.email,
            receiverId: activeChat.pId, receiverEmail: activeChat.pEmail,
            carTitle: activeChat.title, message: input.value, createdAt: serverTimestamp()
        });
        input.value = "";
    };
</script>
</body>
</html>

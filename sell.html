<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sälj din bil | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); padding: 20px; }

        .container { max-width: 800px; margin: 40px auto; background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        h1 { font-size: 32px; font-weight: 900; text-align: center; margin-bottom: 30px; letter-spacing: -1.5px; }

        .section-title { font-size: 14px; font-weight: 800; text-transform: uppercase; color: var(--primary); margin: 30px 0 15px; border-bottom: 2px solid #fff5eb; padding-bottom: 5px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .field label { font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; }
        
        input, select, textarea { 
            padding: 14px; border: 1px solid var(--border); border-radius: 12px; 
            font-size: 15px; background: #fcfcfc; outline: none; transition: 0.3s;
        }
        input:focus, select:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(245, 130, 32, 0.1); }

        .upload-box { 
            border: 2px dashed var(--border); padding: 40px; text-align: center; 
            border-radius: 16px; cursor: pointer; transition: 0.3s; background: #fdfdfd;
        }
        .upload-box:hover { border-color: var(--primary); background: #fff5eb; }

        .btn-publish { 
            width: 100%; background: var(--dark); color: white; border: none; 
            padding: 20px; border-radius: 14px; font-weight: 800; font-size: 18px; 
            cursor: pointer; transition: 0.3s; margin-top: 30px;
        }
        .btn-publish:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,0,0,0.15); }
        #statusMsg { text-align: center; margin-top: 15px; font-weight: 700; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h1>Skapa din annons</h1>
    
    <form id="sellForm">
        <div class="section-title">Fordonsuppgifter</div>
        <div class="form-grid">
            <div class="field">
                <label>Märke</label>
                <select id="brand" required><option value="">Välj märke</option></select>
            </div>
            <div class="field">
                <label>Modell</label>
                <select id="model" required><option value="">Välj märke först</option></select>
            </div>
            <div class="field">
                <label>Årsmodell</label>
                <input type="number" id="year" placeholder="t.ex. 2022" required>
            </div>
            <div class="field">
                <label>Miltal (mil)</label>
                <input type="number" id="mileage" placeholder="t.ex. 4500" required>
            </div>
            <div class="field">
                <label>Drivmedel</label>
                <select id="fuelType">
                    <option value="Bensin">Bensin</option>
                    <option value="Diesel">Diesel</option>
                    <option value="El">Elbil</option>
                    <option value="Hybrid">Laddhybrid</option>
                </select>
            </div>
            <div class="field">
                <label>Karosstyp</label>
                <select id="bodyType">
                    <option value="Sedan">Sedan</option>
                    <option value="SUV">SUV</option>
                    <option value="Kombi">Kombi</option>
                    <option value="Cabriolet">Cabriolet</option>
                </select>
            </div>
        </div>

        <div class="section-title">Pris & Beskrivning</div>
        <div class="field">
            <label>Pris (kr)</label>
            <input type="number" id="price" placeholder="Ange pris" required style="font-size: 20px; font-weight: 800; color: var(--primary);">
        </div>
        <div class="field">
            <label>Beskrivning</label>
            <textarea id="description" rows="5" placeholder="Berätta mer om bilen..."></textarea>
        </div>

        <div class="section-title">Bilder</div>
        <div class="upload-box" onclick="document.getElementById('photoFiles').click()">
            <p style="font-weight: 700;">+ Lägg till bilder</p>
            <p style="font-size: 12px; color: #94a3b8; margin-top: 5px;">Ladda upp minst en bild på fordonet</p>
            <input type="file" id="photoFiles" multiple accept="image/*" style="display: none;">
        </div>

        <button type="submit" class="btn-publish" id="submitBtn">Publicera annons</button>
        <p id="statusMsg" style="display:none;">Laddar upp... Vänta.</p>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';
    import { carData } from './cars-data.js'; // الربط مع قاعدة البيانات

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const auth = getAuth(app);

    let user = null;
    onAuthStateChanged(auth, u => { if(!u) window.location.href='login.html'; else user = u; });

    // تعبئة الماركات والموديلات بذكاء
    const bSel = document.getElementById('brand');
    const mSel = document.getElementById('model');
    Object.keys(carData).sort().forEach(b => bSel.innerHTML += `<option value="${b}">${b}</option>`);

    bSel.onchange = () => {
        const brand = bSel.value;
        mSel.innerHTML = '<option value="">Välj modell</option>';
        if(carData[brand]) carData[brand].sort().forEach(m => mSel.innerHTML += `<option value="${m}">${m}</option>`);
    };

    document.getElementById('sellForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('statusMsg');
        const files = document.getElementById('photoFiles').files;

        if(files.length === 0) return alert("Ladda upp minst en bild.");

        btn.disabled = true;
        status.style.display = "block";

        try {
            const imageUrls = [];
            for(let file of files) {
                const storageRef = ref(storage, `cars/${Date.now()}_${file.name}`);
                const snap = await uploadBytes(storageRef, file);
                const url = await getDownloadURL(snap.ref);
                imageUrls.push(url);
            }

            await addDoc(collection(db, "cars"), {
                brand: bSel.value,
                model: mSel.value,
                year: Number(document.getElementById('year').value),
                mileage: Number(document.getElementById('mileage').value),
                fuelType: document.getElementById('fuelType').value,
                bodyType: document.getElementById('bodyType').value,
                price: Number(document.getElementById('price').value),
                description: document.getElementById('description').value,
                images: imageUrls,
                sellerId: user.uid,
                sellerEmail: user.email,
                createdAt: serverTimestamp()
            });

            alert("Klart! Din annons är publicerad.");
            window.location.href = "index.html";
        } catch(err) {
            alert("Fel vid publicering: " + err.message);
            btn.disabled = false;
        }
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sälj din bil | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); padding: 20px; color: var(--dark); }
        .form-card { max-width: 950px; margin: 0 auto; background: white; padding: 40px; border-radius: 30px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .section-header { font-size: 13px; font-weight: 900; text-transform: uppercase; color: #94a3b8; margin: 35px 0 15px; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        
        .reg-panel { background: #0f172a; padding: 30px; border-radius: 20px; margin-bottom: 35px; display: flex; gap: 20px; align-items: flex-end; }
        .reg-input { text-transform: uppercase; font-weight: 900; font-size: 28px; letter-spacing: 3px; text-align: center; border: none; background: white; height: 70px; border-radius: 12px; flex: 1; color: var(--dark); }
        .btn-fetch { background: var(--primary); color: white; padding: 0 35px; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; height: 70px; font-size: 16px; transition: 0.3s; display: flex; align-items: center; gap: 10px; }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: 800; color: #475569; font-size: 13px; }
        input, select, textarea { width: 100%; padding: 16px; border: 1px solid var(--border); border-radius: 12px; background: #f8fafc; font-size: 15px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); background: white; }

        /* شبكة الأيقونات والمواصفات */
        .feature-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; background: #f8fafc; padding: 25px; border-radius: 18px; border: 1px solid var(--border); }
        .feature-card { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 13px; cursor: pointer; background: white; padding: 12px; border-radius: 12px; border: 1px solid var(--border); }
        .feature-card input { width: auto; margin: 0; }
        .feature-card i { color: var(--primary); width: 20px; text-align: center; }

        .btn-submit { width: 100%; padding: 22px; background: var(--primary); color: white; border: none; border-radius: 18px; font-weight: 900; cursor: pointer; font-size: 20px; margin-top: 45px; box-shadow: 0 12px 24px rgba(245, 130, 32, 0.25); transition: 0.3s; }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(245, 130, 32, 0.35); }
    </style>
</head>
<body>

<div class="form-card">
    <h1 style="text-align:center; font-weight:900; margin-bottom:5px;">Sälj ditt fordon på BILHK</h1>
    <p style="text-align:center; color:#64748b; margin-bottom:40px;">Komplett teknisk specifikation för det svenska marknaden</p>
    
    <div class="reg-panel">
        <div style="flex:1">
            <label style="color:white">Registreringsnummer (Hämta data)</label>
            <input type="text" id="regNr" class="reg-input" placeholder="ABC 123" maxlength="7">
        </div>
        <button type="button" class="btn-fetch" id="fetchBtn"><i class="fa-solid fa-cloud-arrow-down"></i> HÄMTA DATA</button>
    </div>

    <form id="sellForm">
        <div class="section-header"><i class="fa-solid fa-car-side"></i> Fordonsdata & Identitet</div>
        <div class="form-grid">
            <div>
                <label>Märke</label>
                <select id="brand" required><option value="">Välj märke...</option></select>
            </div>
            <div>
                <label>Modell</label>
                <select id="model" required disabled><option value="">Välj modell...</option></select>
            </div>
            <div>
                <label>Årsmodell</label>
                <input type="number" id="year" placeholder="t.ex. 2022" required>
            </div>
        </div>

        <div class="form-grid">
            <div>
                <label>Pris (SEK)</label>
                <input type="number" id="price" placeholder="t.ex. 350000" required>
            </div>
            <div>
                <label>Miltal (mil)</label>
                <input type="number" id="mileage" placeholder="t.ex. 4500" required>
            </div>
            <div>
                <label>Besiktigad till</label>
                <input type="date" id="besiktning">
            </div>
        </div>

        <div class="section-header"><i class="fa-solid fa-engine"></i> Drivlina & Prestanda</div>
        <div class="form-grid">
            <div>
                <label>Drivmedel</label>
                <select id="fuel" required>
                    <option value="">Välj drivmedel...</option>
                    <option value="Bensin">Bensin</option>
                    <option value="Diesel">Diesel</option>
                    <option value="El">Elbil (EV)</option>
                    <option value="Hybrid">Laddhybrid (PHEV)</option>
                    <option value="Gas">Gasbil</option>
                </select>
            </div>
            <div>
                <label>Växellåda</label>
                <select id="gearbox" required>
                    <option value="Automat">Automatisk</option>
                    <option value="Manuell">Manuell</option>
                </select>
            </div>
            <div>
                <label>Drivning</label>
                <select id="drive">
                    <option value="FWD">Framhjulsdrift</option>
                    <option value="RWD">Bakhjulsdrift</option>
                    <option value="AWD">Fyrhjulsdrift (AWD/4WD)</option>
                </select>
            </div>
        </div>
        <div class="form-grid">
            <input type="number" id="hp" placeholder="Hästkrafter (hk)">
            <input type="number" id="owners" placeholder="Antal ägare">
            <input type="text" id="color" placeholder="Färg (t.ex. Vit Pearl)">
        </div>

        <div class="section-header"><i class="fa-solid fa-shield-virus"></i> Aktiv Säkerhet (ADAS) & Teknik</div>
        <div class="feature-container">
            <label class="feature-card"><i class="fa-solid fa-stop-circle"></i><input type="checkbox" class="feat" value="AEB"> Autobroms (AEB)</label>
            <label class="feature-card"><i class="fa-solid fa-gauge-high"></i><input type="checkbox" class="feat" value="ACC"> Adaptiv farthållare</label>
            <label class="feature-card"><i class="fa-solid fa-arrows-left-right-to-line"></i><input type="checkbox" class="feat" value="LKA"> Filassistans (LKA)</label>
            <label class="feature-card"><i class="fa-solid fa-eye"></i><input type="checkbox" class="feat" value="BSM"> Döda vinkel-varnare</label>
            <label class="feature-card"><i class="fa-solid fa-video"></i><input type="checkbox" class="feat" value="360Cam"> 360° Kamera</label>
            <label class="feature-card"><i class="fa-solid fa-bolt"></i><input type="checkbox" class="feat" value="Matrix"> Matrix LED-ljus</label>
            <label class="feature-card"><i class="fa-solid fa-mobile-screen"></i><input type="checkbox" class="feat" value="ApplePlay"> CarPlay/AndroidAuto</label>
            <label class="feature-card"><i class="fa-solid fa-anchor"></i><input type="checkbox" class="feat" value="Dragkrok"> Dragkrok</label>
            <label class="feature-card"><i class="fa-solid fa-snowflake"></i><input type="checkbox" class="feat" value="Vinterhjul"> Vinterhjul ingår</label>
            <label class="feature-card"><i class="fa-solid fa-book"></i><input type="checkbox" class="feat" value="Service"> Full servicehistorik</label>
        </div>

        <div class="section-header"><i class="fa-solid fa-images"></i> Media & Beskrivning</div>
        <input type="file" id="images" multiple accept="image/*" required style="margin-bottom: 20px;">
        <textarea id="description" rows="6" placeholder="Beskriv bilens skick, utrustningsnivå (t.ex. R-Design, M-Sport) och övrig information..." required></textarea>
        
        <button type="submit" class="btn-submit" id="submitBtn">PUBLICERA ANNONSON</button>
    </form>
</div>

<script type="module">
    import { carData } from './cars-data.js';
    import { auth, db, storage } from './firebase-config.js';
    import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const bSel = document.getElementById('brand'), mSel = document.getElementById('model');
    Object.keys(carData).sort().forEach(b => { bSel.innerHTML += `<option value="${b}">${b}</option>`; });

    bSel.onchange = () => {
        mSel.innerHTML = '<option value="">Modell...</option>';
        if(carData[bSel.value]) {
            mSel.disabled = false;
            carData[bSel.value].sort().forEach(m => { mSel.innerHTML += `<option value="${m}">${m}</option>`; });
        }
    };

    document.getElementById('sellForm').onsubmit = async (e) => {
        e.preventDefault();
        if(!auth.currentUser) return Swal.fire('Error', 'Du måste vara inloggad', 'error');
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = "Laddar upp data...";

        try {
            const files = document.getElementById('images').files, urls = [];
            for (let f of files) {
                const sRef = ref(storage, `cars/${Date.now()}_${f.name}`);
                await uploadBytes(sRef, f);
                urls.push(await getDownloadURL(sRef));
            }

            const features = Array.from(document.querySelectorAll('.feat:checked')).map(el => el.value);

            await addDoc(collection(db, "cars"), {
                regNr: document.getElementById('regNr').value.toUpperCase(),
                brand: bSel.value, model: mSel.value,
                year: Number(document.getElementById('year').value),
                price: Number(document.getElementById('price').value),
                mileage: Number(document.getElementById('mileage').value),
                fuel: document.getElementById('fuel').value,
                gearbox: document.getElementById('gearbox').value,
                drive: document.getElementById('drive').value,
                hp: Number(document.getElementById('hp').value),
                besiktning: document.getElementById('besiktning').value,
                features: features,
                description: document.getElementById('description').value,
                images: urls,
                sellerId: auth.currentUser.uid,
                active: true,
                createdAt: serverTimestamp()
            });

            Swal.fire('Klart!', 'Din annons är nu live!', 'success');
            setTimeout(() => window.location.href="my-account.html", 2000);
        } catch (err) { Swal.fire('Fel', err.message, 'error'); btn.disabled = false; }
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sälj din bil | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--dark); padding: 40px 20px; }
        .form-card { max-width: 800px; margin: 0 auto; background: white; padding: 40px; border-radius: 28px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { margin-bottom: 30px; font-weight: 900; font-size: 28px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 14px; color: #64748b; }
        input, select, textarea { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; font-size: 15px; outline: none; background: #f8fafc; }
        .btn-submit { width: 100%; padding: 18px; background: var(--dark); color: white; border: none; border-radius: 15px; font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-submit:hover { background: #1e293b; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="form-card">
    <h1>Publicera Annons</h1>
    <form id="sellForm">
        <div class="form-group">
            <label>Märke</label>
            <input type="text" id="brand" placeholder="t.ex. Volvo" required>
        </div>
        <div class="form-group">
            <label>Modell</label>
            <input type="text" id="model" placeholder="t.ex. V60" required>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group"><label>Årsmodell</label><input type="number" id="year" required></div>
            <div class="form-group"><label>Pris (kr)</label><input type="number" id="price" required></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group"><label>Miltal</label><input type="number" id="mileage" required></div>
            <div class="form-group">
                <label>Växellåda</label>
                <select id="transmission"><option value="Automat">Automat</option><option value="Manuell">Manuell</option></select>
            </div>
        </div>
        <div class="form-group"><label>Bränsle</label><select id="fuelType"><option value="Bensin">Bensin</option><option value="Diesel">Diesel</option><option value="El">El</option></select></div>
        <div class="form-group"><label>Beskrivning</label><textarea id="description" rows="5"></textarea></div>
        <div class="form-group"><label>Bilder</label><input type="file" id="images" multiple accept="image/*" required></div>
        <button type="submit" class="btn-submit">Publicera nu</button>
    </form>
</div>

<script type="module">
    import { auth, db, storage } from './firebase-config.js';
    import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "login.html"; });

    document.getElementById('sellForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.disabled = true; btn.innerText = "Laddar upp...";

        try {
            const files = document.getElementById('images').files;
            const imageUrls = [];
            for (let file of files) {
                const sRef = ref(storage, `cars/${Date.now()}_${file.name}`);
                await uploadBytes(sRef, file);
                const url = await getDownloadURL(sRef);
                imageUrls.push(url);
            }

            await addDoc(collection(db, "cars"), {
                brand: document.getElementById('brand').value,
                model: document.getElementById('model').value,
                year: Number(document.getElementById('year').value),
                price: Number(document.getElementById('price').value),
                mileage: Number(document.getElementById('mileage').value),
                fuelType: document.getElementById('fuelType').value,
                transmission: document.getElementById('transmission').value,
                description: document.getElementById('description').value,
                images: imageUrls,
                sellerId: auth.currentUser.uid,
                active: true, // إجباري لظهور الإعلان في الصفحة الرئيسية
                carType: "Sedan", // إجباري للفلترة
                createdAt: serverTimestamp()
            });

            alert("Din bil är nu publicerad!");
            window.location.href = "index.html";
        } catch (err) { 
            alert("Ett fel uppstod: " + err.message); 
            btn.disabled = false; 
            btn.innerText = "Publicera nu"; 
        }
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sälj din bil | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); padding: 20px; color: var(--dark); }
        
        .form-card { max-width: 800px; margin: 0 auto; background: white; padding: 35px; border-radius: 28px; border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-weight: 900; font-size: 28px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 14px; color: #64748b; }
        
        input, select, textarea { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; background: #f8fafc; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); background: white; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .btn-submit { width: 100%; padding: 18px; background: var(--dark); color: white; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; font-size: 18px; transition: 0.3s; margin-top: 10px; }
        .btn-submit:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-submit:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; }

        .upload-box { border: 2px dashed var(--border); padding: 30px; text-align: center; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .upload-box:hover { border-color: var(--primary); background: #fff7ed; }
        #fileList { margin-top: 10px; font-size: 12px; color: #64748b; }
    </style>
</head>
<body>

<div class="form-card">
    <header>
        <h1>Publicera din annons</h1>
        <p style="color:#64748b;">Fyll i detaljerna för att sälja din bil snabbt</p>
    </header>

    <form id="sellForm">
        <div class="form-grid">
            <div class="form-group">
                <label>Märke</label>
                <select id="brand" required>
                    <option value="">Välj märke...</option>
                </select>
            </div>
            <div class="form-group">
                <label>Modell</label>
                <select id="model" required disabled>
                    <option value="">Välj modell...</option>
                </select>
            </div>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label>Årsmodell</label>
                <input type="number" id="year" placeholder="t.ex. 2022" required>
            </div>
            <div class="form-group">
                <label>Pris (kr)</label>
                <input type="number" id="price" placeholder="t.ex. 150000" required>
            </div>
        </div>

        <div class="form-group">
            <label>Miltal</label>
            <input type="number" id="mileage" placeholder="t.ex. 5000" required>
        </div>

        <div class="form-group">
            <label>Beskrivning</label>
            <textarea id="description" rows="5" placeholder="Berätta mer om bilen..." required></textarea>
        </div>

        <div class="form-group">
            <label>Bilder</label>
            <div class="upload-box" onclick="document.getElementById('images').click()">
                <i class="fa-solid fa-cloud-arrow-up" style="font-size: 30px; color: var(--primary); margin-bottom: 10px;"></i>
                <p>Klicka för att ladda upp bilder</p>
                <input type="file" id="images" multiple accept="image/*" style="display: none;" required>
                <div id="fileList">Inga filer valda</div>
            </div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Publicera Annons</button>
    </form>
</div>

<script type="module">
    import { carData } from './cars-data.js';
    import { auth, db, storage } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const brandSelect = document.getElementById('brand');
    const modelSelect = document.getElementById('model');
    const fileInput = document.getElementById('images');
    const fileListDisplay = document.getElementById('fileList');

    let currentUser = null;

    // التأكد من تسجيل الدخول
    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = "login.html";
        } else {
            currentUser = user;
        }
    });

    // تحميل الماركات
    Object.keys(carData).sort().forEach(brand => {
        const opt = document.createElement('option');
        opt.value = brand;
        opt.textContent = brand;
        brandSelect.appendChild(opt);
    });

    // تحميل الموديلات عند اختيار الماركة
    brandSelect.onchange = () => {
        modelSelect.innerHTML = '<option value="">Välj modell...</option>';
        if (brandSelect.value) {
            modelSelect.disabled = false;
            carData[brandSelect.value].sort().forEach(model => {
                const opt = document.createElement('option');
                opt.value = model;
                opt.textContent = model;
                modelSelect.appendChild(opt);
            });
        } else {
            modelSelect.disabled = true;
        }
    };

    // عرض أسماء الملفات المختارة
    fileInput.onchange = () => {
        const files = fileInput.files;
        fileListDisplay.innerText = files.length > 0 ? `${files.length} bilder valda` : "Inga filer valda";
    };

    // عملية النشر
    document.getElementById('sellForm').onsubmit = async (e) => {
        e.preventDefault();
        
        if (!currentUser) return Swal.fire('Fel', 'Du måste vara inloggad', 'error');
        
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "Publicerar...";

        try {
            const files = fileInput.files;
            const imageUrls = [];

            // 1. رفع الصور إلى Storage
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const storageRef = ref(storage, `cars/${Date.now()}_${file.name}`);
                const snapshot = await uploadBytes(storageRef, file);
                const url = await getDownloadURL(snapshot.ref);
                imageUrls.push(url);
            }

            // 2. حفظ البيانات في Firestore
            // 💡 ملاحظة: نتأكد من حفظ sellerId لربطه بنظام المراسلة
            await addDoc(collection(db, "cars"), {
                brand: brandSelect.value,
                model: modelSelect.value,
                year: Number(document.getElementById('year').value),
                price: Number(document.getElementById('price').value),
                mileage: Number(document.getElementById('mileage').value),
                description: document.getElementById('description').value,
                images: imageUrls,
                sellerId: currentUser.uid, // هذا الحقل هو الأهم للمراسلة
                sellerEmail: currentUser.email,
                active: true,
                createdAt: serverTimestamp()
            });

            await Swal.fire({
                icon: 'success',
                title: 'Annons Publicerad!',
                text: 'Din bil finns nu ute till försäljning.',
                timer: 2000,
                showConfirmButton: false
            });

            window.location.href = "my-account.html";

        } catch (error) {
            console.error("Error publishing:", error);
            Swal.fire('Fel', 'Kunde inte publicera annonsen: ' + error.message, 'error');
            btn.disabled = false;
            btn.innerText = "Publicera Annons";
        }
    };
</script>

</body>
</html>

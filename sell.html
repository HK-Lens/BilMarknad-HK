<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sälj din bil | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); padding-bottom: 50px; }

        /* Header */
        header { 
            background: white; padding: 15px 6%; border-bottom: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 100; 
        }
        .logo { text-decoration: none; font-size: 22px; font-weight: 900; color: var(--dark); }
        .logo span { color: var(--primary); }

        .container { max-width: 800px; margin: 20px auto; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { font-size: 26px; font-weight: 900; text-align: center; margin-bottom: 25px; letter-spacing: -1px; }

        .section-title { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--primary); margin: 25px 0 12px; border-bottom: 1px solid #fff5eb; padding-bottom: 5px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 600px) { .form-grid { grid-template-columns: 1fr 1fr; } }

        .field { display: flex; flex-direction: column; gap: 6px; }
        .field label { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; }
        
        input, select, textarea { padding: 14px; border: 1px solid var(--border); border-radius: 12px; font-size: 15px; background: #fcfcfc; outline: none; transition: 0.3s; width: 100%; }
        input:focus, select:focus { border-color: var(--primary); background: white; }

        /* Reg-nr styling */
        .reg-group { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 15px; }
        .reg-input { text-transform: uppercase; font-size: 20px !important; font-weight: 900 !important; text-align: center; border: 2px solid var(--dark) !important; }
        .btn-fetch { background: var(--dark); color: white; border: none; padding: 14px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; height: 52px; }

        .upload-box { border: 2px dashed var(--border); padding: 30px; text-align: center; border-radius: 16px; cursor: pointer; background: #fdfdfd; margin-top: 10px; }
        .upload-box:hover { border-color: var(--primary); background: #fff5eb; }

        .check-item { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; margin-top: 10px; cursor: pointer; }
        .check-item input { width: 20px; height: 20px; margin: 0; }

        .btn-publish { width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: 50px; font-weight: 800; font-size: 18px; cursor: pointer; margin-top: 30px; box-shadow: 0 10px 20px rgba(245, 130, 32, 0.2); }
        #statusMsg { text-align: center; margin-top: 15px; font-weight: 700; color: var(--primary); display: none; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <a href="index.html" style="text-decoration:none; font-weight:700; color:var(--dark); font-size:13px;">Avbryt</a>
</header>

<div class="container">
    <h1>Sälj din bil</h1>
    
    <form id="sellForm">
        <div class="section-title">Hämta fordonsuppgifter</div>
        <div class="reg-group">
            <div style="flex: 2;">
                <label style="font-size: 10px; font-weight: 800; color: #94a3b8;">Registreringsnummer</label>
                <input type="text" id="regNr" maxlength="6" class="reg-input" placeholder="ABC 123" required>
            </div>
            <button type="button" class="btn-fetch" id="fetchBtn">Hämta info</button>
        </div>

        <div class="section-title">Grunduppgifter</div>
        <div class="form-grid">
            <div class="field"><label>Märke</label><select id="brand" required><option value="">Välj märke</option></select></div>
            <div class="field"><label>Modell</label><select id="model" required><option value="">Välj modell</option></select></div>
            <div class="field"><label>Årsmodell</label><input type="number" id="year" placeholder="t.ex. 2021" required></div>
            <div class="field"><label>Miltal (mil)</label><input type="number" id="mileage" placeholder="t.ex. 4500" required></div>
        </div>

        <div class="section-title">Tekniska specifikationer</div>
        <div class="form-grid">
            <div class="field">
                <label>Drivmedel</label>
                <select id="fuelType">
                    <option value="Bensin">Bensin</option><option value="Diesel">Diesel</option>
                    <option value="El">El</option><option value="Hybrid">Hybrid</option>
                </select>
            </div>
            <div class="field">
                <label>Växellåda</label>
                <select id="transmission">
                    <option value="Automat">Automatisk</option><option value="Manuell">Manuell</option>
                </select>
            </div>
            <div class="field">
                <label>Karosstyp</label>
                <select id="bodyType">
                    <option value="Sedan">Sedan</option><option value="Kombi">Kombi</option>
                    <option value="SUV">SUV</option><option value="Halvkombi">Halvkombi</option>
                </select>
            </div>
            <div class="field"><label>Motoreffekt (hk)</label><input type="number" id="power" placeholder="t.ex. 190"></div>
        </div>

        <div class="section-title">Kontaktinställningar</div>
        <div class="field">
            <label>Telefonnummer</label>
            <input type="tel" id="phone" placeholder="070 XXX XX XX">
        </div>
        <label class="check-item">
            <input type="checkbox" id="hidePhone"> Dölj mitt telefonnummer (Använd endast internmeddelanden)
        </label>

        <div class="section-title">Pris & Beskrivning</div>
        <div class="field"><label>Pris (kr)</label><input type="number" id="price" placeholder="Ange pris" required style="font-size: 18px; font-weight: 800; color: var(--primary);"></div>
        <div class="field" style="margin-top:15px;"><label>Beskrivning</label><textarea id="description" rows="4" placeholder="Skriv om bilens skick..."></textarea></div>

        <div class="section-title">Bilder</div>
        <div class="upload-box" onclick="document.getElementById('photoFiles').click()">
            <p style="font-weight: 700;">📸 Ladda upp bilder</p>
            <input type="file" id="photoFiles" multiple accept="image/*" style="display: none;">
        </div>

        <button type="submit" class="btn-publish" id="submitBtn">Publicera annons</button>
        <p id="statusMsg">Publicerar... Vänta.</p>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';
    import { carData } from './cars-data.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const auth = getAuth(app);

    let user = null;
    onAuthStateChanged(auth, u => { if(!u) window.location.href='login.html'; else user = u; });

    // تعبئة الماركات والموديلات
    const bSel = document.getElementById('brand');
    const mSel = document.getElementById('model');
    Object.keys(carData).sort().forEach(b => bSel.innerHTML += `<option value="${b}">${b}</option>`);
    bSel.onchange = () => {
        mSel.innerHTML = '<option value="">Välj modell</option>';
        if(carData[bSel.value]) carData[bSel.value].sort().forEach(m => mSel.innerHTML += `<option value="${m}">${m}</option>`);
    };

    // جلب البيانات (محاكاة Car.info)
    document.getElementById('fetchBtn').onclick = () => {
        const reg = document.getElementById('regNr').value.trim();
        if(reg.length < 6) return alert("Ange reg-nr.");
        const btn = document.getElementById('fetchBtn');
        btn.innerText = "Söker...";
        
        setTimeout(() => {
            // محاكاة جلب البيانات
            document.getElementById('brand').value = "Volvo";
            bSel.dispatchEvent(new Event('change'));
            document.getElementById('year').value = 2021;
            document.getElementById('fuelType').value = "Diesel";
            document.getElementById('transmission').value = "Automat";
            btn.innerText = "Hämtat!";
            btn.style.background = "#22c55e";
        }, 1000);
    };

    // حفظ الإعلان
    document.getElementById('sellForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const files = document.getElementById('photoFiles').files;

        if (files.length === 0) return alert("Välj bilder.");
        btn.disabled = true;
        document.getElementById('statusMsg').style.display = "block";

        try {
            const imageUrls = [];
            for (let file of files) {
                const sRef = ref(storage, `cars/${Date.now()}_${file.name}`);
                const snap = await uploadBytes(sRef, file);
                const url = await getDownloadURL(snap.ref);
                imageUrls.push(url);
            }

            await addDoc(collection(db, "cars"), {
                regNr: document.getElementById('regNr').value.toUpperCase(),
                brand: bSel.value,
                model: mSel.value,
                year: Number(document.getElementById('year').value),
                mileage: Number(document.getElementById('mileage').value),
                fuelType: document.getElementById('fuelType').value,
                transmission: document.getElementById('transmission').value,
                bodyType: document.getElementById('bodyType').value,
                power: document.getElementById('power').value,
                phone: document.getElementById('phone').value,
                hidePhone: document.getElementById('hidePhone').checked,
                price: Number(document.getElementById('price').value),
                description: document.getElementById('description').value,
                images: imageUrls,
                sellerId: user.uid,
                sellerEmail: user.email,
                createdAt: serverTimestamp()
            });

            alert("Annonsen är publicerad!");
            window.location.href = "index.html";
        } catch (err) { alert("Fel: " + err.message); btn.disabled = false; }
    };
</script>
</body>
</html>

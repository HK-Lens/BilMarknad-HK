<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sälj din bil | BILHK</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--dark); line-height: 1.6; }

        header { background: white; padding: 15px 5%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { text-decoration: none; font-weight: 900; color: var(--dark); font-size: 24px; }
        .logo span { color: var(--primary); }

        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .form-card { background: white; padding: 40px; border-radius: 25px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .form-title { font-size: 26px; font-weight: 900; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full { grid-column: 1 / -1; }

        label { display: block; font-size: 12px; font-weight: 800; color: #64748b; margin-bottom: 8px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; background: #f1f5f9; outline: none; font-size: 14px; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--primary); background: white; }

        .image-upload { border: 2px dashed var(--border); padding: 30px; text-align: center; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .image-upload:hover { border-color: var(--primary); background: #fff7ed; }
        
        .btn-submit { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 30px; transition: 0.3s; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(245, 130, 32, 0.3); }

        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <a href="dashboard.html" style="text-decoration:none; color:var(--dark); font-weight:700;">Dashboard</a>
</header>

<div class="container">
    <div class="form-card">
        <h1 class="form-title"><i class="fa-solid fa-car-on" style="color:var(--primary)"></i> Publicera Annons</h1>
        
        <form id="sellForm">
            <div class="grid">
                <div>
                    <label>Märke</label>
                    <select id="brand" required><option value="">Välj märke</option></select>
                </div>
                <div>
                    <label>Modell</label>
                    <select id="model" required><option value="">Välj modell</option></select>
                </div>
                <div>
                    <label>Pris (kr)</label>
                    <input type="number" id="price" placeholder="T.ex 150000" required>
                </div>
                <div>
                    <label>Årsmodell</label>
                    <input type="number" id="year" placeholder="T.ex 2021" required>
                </div>
                <div>
                    <label>Miltal</label>
                    <input type="number" id="mil" placeholder="T.ex 5000" required>
                </div>
                <div>
                    <label>Drivmedel</label>
                    <select id="fuel">
                        <option value="Bensin">Bensin</option>
                        <option value="Diesel">Diesel</option>
                        <option value="El">El</option>
                        <option value="Hybrid">Hybrid</option>
                    </select>
                </div>
                <div class="full">
                    <label>Beskrivning</label>
                    <textarea id="description" rows="5" placeholder="Berätta mer om bilen..."></textarea>
                </div>
                <div class="full">
                    <label>Bilder (Max 5)</label>
                    <input type="file" id="images" multiple accept="image/*" style="padding: 10px;">
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">Publicera nu</button>
        </form>
    </div>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { carData } from './cars-data.js';

    const brandSelect = document.getElementById('brand');
    const modelSelect = document.getElementById('model');

    // Populate Brands
    Object.keys(carData).sort().forEach(brand => {
        brandSelect.innerHTML += `<option value="${brand}">${brand}</option>`;
    });

    brandSelect.onchange = () => {
        modelSelect.innerHTML = '<option value="">Välj modell</option>';
        if(carData[brandSelect.value]) {
            carData[brandSelect.value].sort().forEach(m => {
                modelSelect.innerHTML += `<option value="${m}">${m}</option>`;
            });
        }
    };

    onAuthStateChanged(auth, (user) => {
        if (!user) window.location.href = "login.html";
    });

    document.getElementById('sellForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "Publicerar...";

        try {
            const carObj = {
                sellerId: auth.currentUser.uid,
                brand: brandSelect.value,
                model: modelSelect.value,
                price: Number(document.getElementById('price').value),
                year: Number(document.getElementById('year').value),
                mil: Number(document.getElementById('mil').value),
                fuel: document.getElementById('fuel').value,
                description: document.getElementById('description').value,
                views: 0,
                favoritesCount: 0,
                createdAt: serverTimestamp()
            };

            await addDoc(collection(db, "cars"), carObj);
            
            await Swal.fire({
                title: 'Succé!',
                text: 'Din bil har nu publicerats på BILHK.',
                icon: 'success',
                confirmButtonColor: '#f58220'
            });
            window.location.href = "dashboard.html";

        } catch (error) {
            console.error(error);
            Swal.fire('Fel', 'Kunde inte spara annonsen.', 'error');
            btn.disabled = false;
            btn.innerText = "Publicera nu";
        }
    };
</script>
</body>
</html>

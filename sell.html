<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sälj din bil | BILHK</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>

        :root{
            --primary:#f58220;
            --primary-hover:#e07210;
            --dark:#0f172a;
            --bg:#f8fafc;
            --border:#e2e8f0;
            --danger:#ef4444;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Inter',sans-serif;
        }

        body{
            background:var(--bg);
            color:var(--dark);
            padding:40px 20px;
        }

        .form-card{
            max-width:900px;
            margin:0 auto;
            background:white;
            padding:40px;
            border-radius:28px;
            border:1px solid var(--border);
            box-shadow:0 10px 30px rgba(0,0,0,.05);
        }

        h1{
            margin-bottom:30px;
            font-weight:900;
            font-size:30px;
            text-align:center;
        }

        .grid-2{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:15px;
        }

        @media(max-width:700px){
            .grid-2{
                grid-template-columns:1fr;
            }
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            font-weight:800;
            margin-bottom:8px;
            font-size:12px;
            color:#64748b;
            text-transform:uppercase;
        }

        input,
        select,
        textarea{
            width:100%;
            padding:14px;
            border:1px solid var(--border);
            border-radius:14px;
            font-size:15px;
            outline:none;
            background:#f8fafc;
            transition:.2s;
        }

        input:focus,
        select:focus,
        textarea:focus{
            border-color:var(--primary);
            background:white;
        }

        textarea{
            resize:vertical;
        }

        .btn-submit{
            width:100%;
            padding:18px;
            background:var(--primary);
            color:white;
            border:none;
            border-radius:15px;
            font-weight:900;
            font-size:16px;
            cursor:pointer;
            margin-top:20px;
            transition:.3s;
        }

        .btn-submit:hover{
            background:var(--primary-hover);
            transform:translateY(-2px);
        }

        .btn-submit:disabled{
            opacity:.7;
            cursor:not-allowed;
        }

        .features-grid{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
            gap:10px;
        }

        .feature-item{
            background:#f8fafc;
            border:1px solid var(--border);
            border-radius:10px;
            padding:10px;
            display:flex;
            align-items:center;
            gap:10px;
        }

        .feature-item input{
            width:auto;
        }

    </style>
</head>

<body>

<div class="form-card">

    <h1>Publicera Annons</h1>

    <form id="sellForm">

        <div class="grid-2">

            <div class="form-group">
                <label>Märke</label>
                <input type="text" id="brand" required>
            </div>

            <div class="form-group">
                <label>Modell</label>
                <input type="text" id="model" required>
            </div>

        </div>

        <div class="grid-2">

            <div class="form-group">
                <label>Årsmodell</label>
                <input type="number" id="year" required>
            </div>

            <div class="form-group">
                <label>Pris (kr)</label>
                <input type="number" id="price" required>
            </div>

        </div>

        <div class="grid-2">

            <div class="form-group">
                <label>Miltal</label>
                <input type="number" id="mileage" required>
            </div>

            <div class="form-group">
                <label>Registreringsnummer</label>
                <input type="text" id="regNr">
            </div>

        </div>

        <div class="grid-2">

            <div class="form-group">
                <label>Drivmedel</label>

                <select id="fuel">

                    <option value="Bensin">Bensin</option>
                    <option value="Diesel">Diesel</option>
                    <option value="El">El</option>
                    <option value="Hybrid">Hybrid</option>

                </select>
            </div>

            <div class="form-group">

                <label>Växellåda</label>

                <select id="gear">

                    <option value="Automat">Automat</option>
                    <option value="Manuell">Manuell</option>

                </select>
            </div>

        </div>

        <div class="grid-2">

            <div class="form-group">

                <label>Karosseri</label>

                <select id="karosseri">

                    <option value="Sedan">Sedan</option>
                    <option value="SUV">SUV</option>
                    <option value="Kombi">Kombi</option>
                    <option value="Halvkombi">Halvkombi</option>
                    <option value="Coupé">Coupé</option>

                </select>

            </div>

            <div class="form-group">

                <label>Drivning</label>

                <select id="drive">

                    <option value="Framhjulsdrift">Framhjulsdrift</option>
                    <option value="Bakhjulsdrift">Bakhjulsdrift</option>
                    <option value="Fyrhjulsdrift">Fyrhjulsdrift</option>

                </select>

            </div>

        </div>

        <div class="grid-2">

            <div class="form-group">
                <label>Hästkrafter</label>
                <input type="number" id="hp">
            </div>

            <div class="form-group">
                <label>Färg</label>
                <input type="text" id="color">
            </div>

        </div>

        <div class="grid-2">

            <div class="form-group">
                <label>Antal säten</label>
                <input type="number" id="seats">
            </div>

            <div class="form-group">
                <label>Antal dörrar</label>
                <input type="number" id="doors">
            </div>

        </div>

        <div class="form-group">

            <label>Beskrivning</label>

            <textarea id="description"
                      rows="5"
                      placeholder="Beskriv bilen..."></textarea>

        </div>

        <div class="form-group">

            <label>Utrustning</label>

            <div class="features-grid">

                <label class="feature-item">
                    <input type="checkbox" value="ABS-bromsar">
                    ABS-bromsar
                </label>

                <label class="feature-item">
                    <input type="checkbox" value="Navigation">
                    Navigation
                </label>

                <label class="feature-item">
                    <input type="checkbox" value="CarPlay">
                    CarPlay
                </label>

                <label class="feature-item">
                    <input type="checkbox" value="Backkamera">
                    Backkamera
                </label>

                <label class="feature-item">
                    <input type="checkbox" value="Skinnklädsel">
                    Skinnklädsel
                </label>

                <label class="feature-item">
                    <input type="checkbox" value="Sätesvärme">
                    Sätesvärme
                </label>

            </div>

        </div>

        <div class="form-group">

            <label>Bilder</label>

            <input type="file"
                   id="images"
                   multiple
                   accept="image/*"
                   required>

        </div>

        <button type="submit"
                class="btn-submit"
                id="submitBtn">

            Publicera nu

        </button>

    </form>

</div>

<script type="module">

import {
    auth,
    db,
    storage
} from './firebase-config.js';

import {
    ref,
    uploadBytes,
    getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

import {
    collection,
    addDoc,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";


onAuthStateChanged(auth,(user)=>{

    if(!user){

        Swal.fire({
            title:'Logga in krävs',
            text:'Du måste logga in först.',
            icon:'warning',
            confirmButtonColor:'#f58220'
        }).then(()=>{
            window.location.href='login.html';
        });

    }

});


document.getElementById('sellForm').onsubmit = async (e)=>{

    e.preventDefault();

    const btn =
        document.getElementById('submitBtn');

    btn.disabled = true;
    btn.innerText = 'Laddar upp...';

    try{

        const files =
            document.getElementById('images').files;

        if(files.length === 0){

            throw new Error('Välj minst en bild.');

        }

        if(files.length > 10){

            throw new Error('Max 10 bilder.');

        }

        const imageUrls = [];

        for(const file of files){

            if(file.size > 5 * 1024 * 1024){

                throw new Error(
                    'En bild är större än 5MB.'
                );

            }

            const storageRef = ref(
                storage,
                `cars/${auth.currentUser.uid}/${Date.now()}_${file.name}`
            );

            await uploadBytes(storageRef,file);

            const url =
                await getDownloadURL(storageRef);

            imageUrls.push(url);

        }

        const features = [];

        document
            .querySelectorAll('.feature-item input:checked')
            .forEach(cb=>{

                features.push(cb.value);

            });

        await addDoc(collection(db,'cars'),{

            brand:
                document.getElementById('brand').value.trim(),

            model:
                document.getElementById('model').value.trim(),

            year:
                Number(document.getElementById('year').value),

            price:
                Number(document.getElementById('price').value),

            mileage:
                Number(document.getElementById('mileage').value),

            regNr:
                document.getElementById('regNr').value.trim(),

            fuel:
                document.getElementById('fuel').value,

            gear:
                document.getElementById('gear').value,

            karosseri:
                document.getElementById('karosseri').value,

            drive:
                document.getElementById('drive').value,

            hp:
                Number(document.getElementById('hp').value || 0),

            color:
                document.getElementById('color').value.trim(),

            seats:
                Number(document.getElementById('seats').value || 0),

            doors:
                Number(document.getElementById('doors').value || 0),

            description:
                document.getElementById('description').value.trim(),

            features,

            images:imageUrls,

            sellerId:
                auth.currentUser.uid,

            status:'active',

            views:0,
            saves:0,
            messagesCount:0,

            createdAt:
                serverTimestamp(),

            updatedAt:
                serverTimestamp()

        });

        await Swal.fire({

            title:'Klart!',
            text:'Din annons har publicerats.',
            icon:'success',
            confirmButtonColor:'#f58220'

        });

        window.location.href='index.html';

    }catch(error){

        console.error(error);

        Swal.fire({

            title:'Fel',
            text:error.message || 'Kunde inte publicera annons.',
            icon:'error',
            confirmButtonColor:'#f58220'

        });

        btn.disabled = false;
        btn.innerText = 'Publicera nu';

    }

};

</script>

</body>
</html>

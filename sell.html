<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sälj bil | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        input, select, textarea { width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 15px; outline: none; }
        .btn-publish { width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: 50px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h1 style="text-align:center; margin-bottom:25px;">Sälj din bil</h1>
    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <input type="text" id="regNr" placeholder="REG-NR (t.ex ABC123)" style="font-weight:900; text-align:center; border:2px solid var(--dark);">
        <button onclick="fetchInfo()" id="fBtn" style="padding:0 20px; border-radius:12px; background:var(--dark); color:white; border:none; cursor:pointer;">Hämta</button>
    </div>
    <form id="sForm">
        <select id="brand"><option>Välj märke</option></select>
        <input type="number" id="price" placeholder="Pris (kr)" required>
        <input type="number" id="mileage" placeholder="Miltal (mil)" required>
        <input type="tel" id="phone" placeholder="Telefonnummer">
        <label style="font-size:12px;"><input type="checkbox" id="hideP"> Dölj nummer (använd endast internmeddelanden)</label>
        <textarea id="desc" rows="4" placeholder="Beskrivning..."></textarea>
        <input type="file" id="pics" multiple required>
        <button type="submit" class="btn-publish" id="sub">Publicera</button>
    </form>
</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';
    import { carData } from './cars-data.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const auth = getAuth(app);
    let user = null;
    onAuthStateChanged(auth, u => { if(!u) window.location.href='login.html'; else user = u; });

    const bSel = document.getElementById('brand');
    Object.keys(carData).sort().forEach(b => bSel.innerHTML += `<option value="${b}">${b}</option>`);

    window.fetchInfo = () => {
        const btn = document.getElementById('fBtn');
        btn.innerText = "Söker...";
        setTimeout(() => {
            document.getElementById('brand').value = "Volvo";
            btn.innerText = "Hämtat!"; btn.style.background = "#22c55e";
        }, 800);
    };

    document.getElementById('sForm').onsubmit = async (e) => {
        e.preventDefault();
        const sub = document.getElementById('sub');
        sub.disabled = true; sub.innerText = "Publicerar...";
        const files = document.getElementById('pics').files;
        try {
            const urls = [];
            for (let f of files) {
                const sRef = ref(storage, `cars/${Date.now()}_${f.name}`);
                const snap = await uploadBytes(sRef, f);
                urls.push(await getDownloadURL(snap.ref));
            }
            await addDoc(collection(db, "cars"), {
                regNr: document.getElementById('regNr').value.toUpperCase(),
                brand: bSel.value, price: Number(document.getElementById('price').value),
                mileage: Number(document.getElementById('mileage').value),
                phone: document.getElementById('phone').value, hidePhone: document.getElementById('hideP').checked,
                description: document.getElementById('desc').value, images: urls,
                sellerId: user.uid, createdAt: serverTimestamp()
            });
            window.location.href = 'index.html';
        } catch (e) { alert("Fel!"); sub.disabled = false; }
    };
</script>
</body>
</html>

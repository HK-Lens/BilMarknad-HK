<!DOCTYPE html>
<html lang="sv" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Sälj din bil | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Roboto', sans-serif; margin: 0; padding: 0; }
        body { background-color: #f4f7f9; color: #333; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 35px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: #002d5a; text-align: center; margin-bottom: 25px; }
        .section-title { margin: 25px 0 15px; padding-bottom: 5px; border-bottom: 2px solid #0056b3; color: #0056b3; font-weight: bold; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .upload-area { border: 2px dashed #0056b3; padding: 30px; text-align: center; border-radius: 8px; background: #f0f7ff; cursor: pointer; }
        .btn-submit { background: #28a745; color: white; border: none; padding: 18px; width: 100%; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
        #status-msg { text-align: center; margin-top: 10px; font-weight: bold; color: #0056b3; }
    </style>
</head>
<body>

<div class="container">
    <h1>Skapa din annons</h1>
    <form id="sell-car-form">
        <div class="section-title">1. Fordonsinfo</div>
        <div class="form-group">
            <label>Registreringsnummer</label>
            <input type="text" id="regNr" placeholder="ABC 123" required>
        </div>
        <div class="row">
            <div class="form-group">
                <label>Märke</label>
                <input type="text" id="brand" placeholder="t.ex. Volvo" required>
            </div>
            <div class="form-group">
                <label>Modell</label>
                <input type="text" id="model" placeholder="t.ex. XC60" required>
            </div>
        </div>

        <div class="section-title">2. Bilder (Optimerad lagring)</div>
        <div class="upload-area" onclick="document.getElementById('photos').click()">
            <p id="photo-label">Klicka för att ladda upp bilder</p>
            <input type="file" id="photos" multiple accept="image/*" style="display:none">
        </div>

        <div class="section-title">3. Kontakt</div>
        <div class="form-group">
            <label>Pris (kr)</label>
            <input type="number" id="price" placeholder="t.ex. 250000" required>
        </div>
        <div class="form-group">
            <label>Välj integritet</label>
            <select id="contactPref">
                <option value="public">Visa mina uppgifter</option>
                <option value="private">Dölj uppgifter (Intern inbox)</option>
            </select>
        </div>

        <div id="status-msg"></div>
        <button type="submit" class="btn-submit" id="submit-btn">Publicera annons</button>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDCsMbG5pT3y6MC6b05LEdFoByWM1nT7NY",
        authDomain: "bilmarknad-hk.firebaseapp.com",
        projectId: "bilmarknad-hk",
        storageBucket: "bilmarknad-hk.firebasestorage.app",
        appId: "1:284008879407:web:66bee60b51ec277e8dbdda"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let currentUser = null;
    onAuthStateChanged(auth, (user) => { currentUser = user; if(!user) window.location.href='login.html'; });

    // وظيفة ضغط الصور برمجياً لتوفير المساحة
    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1200; // تصغير العرض لـ 1200 بكسل كحد أقصى
                    let width = img.width;
                    let height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob((blob) => { resolve(blob); }, 'image/jpeg', 0.7); // ضغط الجودة لـ 70%
                };
            };
        });
    }

    const photoInput = document.getElementById('photos');
    photoInput.onchange = () => { document.getElementById('photo-label').innerText = photoInput.files.length + " bilder valda"; };

    document.getElementById('sell-car-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        const msg = document.getElementById('status-msg');
        btn.disabled = true;
        msg.innerText = "Optimerar och laddar upp... Vänta.";

        try {
            const imageUrls = [];
            for (const file of photoInput.files) {
                const compressedBlob = await compressImage(file); // ضغط الصورة قبل الرفع
                const fileRef = ref(storage, `cars/${Date.now()}_${file.name}`);
                const snapshot = await uploadBytes(fileRef, compressedBlob);
                const url = await getDownloadURL(snapshot.ref);
                imageUrls.push(url);
            }

            await addDoc(collection(db, "cars"), {
                regNr: document.getElementById('regNr').value.toUpperCase(),
                brand: document.getElementById('brand').value,
                model: document.getElementById('model').value,
                price: document.getElementById('price').value,
                contactPref: document.getElementById('contactPref').value,
                images: imageUrls,
                sellerId: currentUser.uid,
                sellerName: currentUser.displayName,
                createdAt: new Date()
            });

            alert("Klart! Annonsen är publicerad.");
            window.location.href = 'index.html';
        } catch (err) {
            console.error(err);
            alert("Fel: " + err.message);
            btn.disabled = false;
        }
    };
</script>
</body>
</html>

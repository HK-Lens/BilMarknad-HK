<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sälj din bil | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); padding: 20px; color: var(--dark); }
        .form-card { max-width: 950px; margin: 0 auto; background: white; padding: 40px; border-radius: 30px; border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        
        .section-header { font-size: 13px; font-weight: 900; text-transform: uppercase; color: #94a3b8; margin: 35px 0 15px; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        
        .reg-panel { background: #0f172a; padding: 30px; border-radius: 20px; margin-bottom: 35px; display: flex; gap: 20px; align-items: flex-end; border: 4px solid #334155; }
        .reg-input { text-transform: uppercase; font-weight: 900; font-size: 30px; letter-spacing: 4px; text-align: center; border: none; background: white; height: 75px; border-radius: 12px; flex: 1; color: var(--dark); }
        .btn-fetch { background: var(--primary); color: white; padding: 0 35px; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; height: 75px; font-size: 17px; transition: 0.3s; display: flex; align-items: center; gap: 10px; }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: 800; color: #475569; font-size: 13px; }
        input, select, textarea { width: 100%; padding: 16px; border: 1px solid var(--border); border-radius: 12px; background: #f8fafc; font-size: 15px; outline: none; }

        .specs-wrapper { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; background: #f1f5f9; padding: 25px; border-radius: 20px; }
        .spec-card { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 13px; cursor: pointer; background: white; padding: 14px; border-radius: 12px; border: 1px solid var(--border); transition: 0.2s; }
        .spec-card:hover { border-color: var(--primary); }
        .spec-card input { width: auto; margin: 0; }
        .spec-card i { color: var(--primary); width: 20px; text-align: center; font-size: 16px; }

        .btn-submit { width: 100%; padding: 25px; background: var(--primary); color: white; border: none; border-radius: 20px; font-weight: 900; cursor: pointer; font-size: 22px; margin-top: 40px; box-shadow: 0 15px 30px rgba(245, 130, 32, 0.3); }
    </style>
</head>
<body>

<div class="form-card">
    <h1 style="text-align:center; font-weight:900; margin-bottom:5px;">Sälj ditt fordon</h1>
    <p style="text-align:center; color:#64748b; margin-bottom:40px;">Marknadens mest detaljerade annonsering för seriösa köpare</p>
    
    <div class="reg-panel">
        <div style="flex:1">
            <label style="color:white">Registreringsnummer (Hämta data automatiskt)</label>
            <input type="text" id="regNr" class="reg-input" placeholder="ABC 123" maxlength="7">
        </div>
        <button type="button" class="btn-fetch" id="fetchBtn"><i class="fa-solid fa-cloud-download-alt"></i> HÄMTA DATA</button>
    </div>

    <form id="sellForm">
        <div class="section-header"><i class="fa-solid fa-car"></i> Identitet & Grunddata</div>
        <div class="form-grid">
            <div>
                <label>Märke</label>
                <select id="brand" required><option value="">Välj märke...</option></select>
            </div>
            <div>
                <label>Modell</label>
                <select id="model" required disabled><option value="">Välj modell...</option></select>
            </div>
            <div>
                <label>Årsmodell</label>
                <input type="number" id="year" placeholder="t.ex. 2022" required>
            </div>
        </div>

        <div class="form-grid">
            <input type="number" id="price" placeholder="Pris (SEK)" required>
            <input type="number" id="mileage" placeholder="Miltal (mil)" required>
            <div>
                <label>Nästa Besiktning</label>
                <input type="date" id="besiktning">
            </div>
        </div>

        <div class="section-header"><i class="fa-solid fa-microchip"></i> Motor & Drivlina (Essentials)</div>
        <div class="form-grid">
            <select id="fuel" required>
                <option value="">Drivmedel...</option>
                <option value="Bensin">Bensin</option>
                <option value="Diesel">Diesel</option>
                <option value="El">Elbil (EV)</option>
                <option value="Hybrid">Laddhybrid (HEV/PHEV)</option>
                <option value="Gas">Gasbil</option>
            </select>
            <select id="gearbox" required>
                <option value="AT">Automatisk (AT/CVT)</option>
                <option value="MT">Manuell (MT)</option>
            </select>
            <select id="drive">
                <option value="FWD">Framhjulsdrift (FWD)</option>
                <option value="RWD">Bakhjulsdrift (RWD)</option>
                <option value="AWD">Fyrhjulsdrift (4WD/AWD)</option>
            </select>
        </div>
        <div class="form-grid">
            <input type="number" id="hp" placeholder="Hästkrafter (HP)">
            <input type="text" id="color" placeholder="Färg (t.ex. Svart Metallic)">
            <input type="number" id="seats" placeholder="Antal säten">
        </div>

        <div class="section-header"><i class="fa-solid fa-shield-alt"></i> Säkerhet & ADAS (Aktiv/Passiv)</div>
        <div class="specs-wrapper">
            <label class="spec-card"><i class="fa-solid fa-check-double"></i><input type="checkbox" class="feat" value="ABS"> ABS & EBD</label>
            <label class="spec-card"><i class="fa-solid fa-gauge"></i><input type="checkbox" class="feat" value="ACC"> Adaptiv farthållare (ACC)</label>
            <label class="spec-card"><i class="fa-solid fa-stop-circle"></i><input type="checkbox" class="feat" value="AEB"> Autobroms (AEB)</label>
            <label class="spec-card"><i class="fa-solid fa-road"></i><input type="checkbox" class="feat" value="LKA"> Filassistans (LKA/LDW)</label>
            <label class="spec-card"><i class="fa-solid fa-eye"></i><input type="checkbox" class="feat" value="BSM"> Nockpunktvarnare (BSM/BLIS)</label>
            <label class="spec-card"><i class="fa-solid fa-compress-arrows-alt"></i><input type="checkbox" class="feat" value="ESP"> Antisladd (ESC/ESP)</label>
            <label class="spec-card"><i class="fa-solid fa-circle-exclamation"></i><input type="checkbox" class="feat" value="TPMS"> Däcktryck (TPMS)</label>
            <label class="spec-card"><i class="fa-solid fa-baby"></i><input type="checkbox" class="feat" value="ISOFIX"> ISOFIX-fästen</label>
        </div>

        <div class="section-header"><i class="fa-solid fa-crown"></i> Premium Features & Komfort</div>
        <div class="specs-wrapper">
            <label class="spec-card"><i class="fa-solid fa-window-maximize"></i><input type="checkbox" class="feat" value="HUD"> Head-up display (HUD)</label>
            <label class="spec-card"><i class="fa-solid fa-video"></i><input type="checkbox" class="feat" value="360Cam"> 360° Kamera</label>
            <label class="spec-card"><i class="fa-solid fa-sun"></i><input type="checkbox" class="feat" value="Panoramic"> Panoramaglastak</label>
            <label class="spec-card"><i class="fa-solid fa-mobile-alt"></i><input type="checkbox" class="feat" value="SmartLink"> Apple CarPlay/Android Auto</label>
            <label class="spec-card"><i class="fa-solid fa-bolt"></i><input type="checkbox" class="feat" value="Matrix"> Matrix LED-ljus</label>
            <label class="spec-card"><i class="fa-solid fa-link"></i><input type="checkbox" class="feat" value="Dragkrok"> Dragkrok</label>
        </div>

        <div class="section-header"><i class="fa-solid fa-images"></i> Bilder & Beskrivning</div>
        <input type="file" id="images" multiple accept="image/*" required style="margin-bottom: 20px;">
        <textarea id="description" rows="6" placeholder="Beskriv bilens skick, fullständig servicehistorik, senaste reparationer..." required></textarea>
        
        <button type="submit" class="btn-submit" id="submitBtn">PUBLICERA ANNONSON NU</button>
    </form>
</div>

<script type="module">
    import { carData } from './cars-data.js';
    import { auth, db, storage } from './firebase-config.js';
    import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const bSel = document.getElementById('brand'), mSel = document.getElementById('model');
    Object.keys(carData).sort().forEach(b => { bSel.innerHTML += `<option value="${b}">${b}</option>`; });

    bSel.onchange = () => {
        mSel.innerHTML = '<option value="">Modell...</option>';
        if(carData[bSel.value]) {
            mSel.disabled = false;
            carData[bSel.value].sort().forEach(m => { mSel.innerHTML += `<option value="${m}">${m}</option>`; });
        }
    };

    document.getElementById('sellForm').onsubmit = async (e) => {
        e.preventDefault();
        if(!auth.currentUser) return Swal.fire('Error', 'Logga in!', 'error');
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = "Publicerar...";

        try {
            const files = document.getElementById('images').files, urls = [];
            for (let f of files) {
                const sRef = ref(storage, `cars/${Date.now()}_${f.name}`);
                await uploadBytes(sRef, f);
                urls.push(await getDownloadURL(sRef));
            }
            const features = Array.from(document.querySelectorAll('.feat:checked')).map(el => el.value);

            await addDoc(collection(db, "cars"), {
                regNr: document.getElementById('regNr').value.toUpperCase(),
                brand: bSel.value, model: mSel.value,
                year: Number(document.getElementById('year').value),
                price: Number(document.getElementById('price').value),
                mileage: Number(document.getElementById('mileage').value),
                fuel: document.getElementById('fuel').value,
                gearbox: document.getElementById('gearbox').value,
                drive: document.getElementById('drive').value,
                hp: Number(document.getElementById('hp').value),
                besiktning: document.getElementById('besiktning').value,
                features: features,
                description: document.getElementById('description').value,
                images: urls,
                sellerId: auth.currentUser.uid, // لضمان عمل الـ Rules والمراسلة
                createdAt: serverTimestamp()
            });
            Swal.fire('Klart!', 'Annonsen är live.', 'success');
            setTimeout(() => window.location.href="my-account.html", 2000);
        } catch (err) { Swal.fire('Fel', err.message, 'error'); btn.disabled = false; }
    };
</script>
</body>
</html>

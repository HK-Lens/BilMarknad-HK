<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sälj din bil | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); padding: 20px; }
        .form-card { max-width: 800px; margin: 0 auto; background: white; padding: 35px; border-radius: 28px; border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        input, select, textarea { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; background: #f8fafc; font-size: 16px; margin-bottom: 15px; }
        .btn-submit { width: 100%; padding: 18px; background: var(--dark); color: white; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; font-size: 18px; }
        .btn-submit:disabled { background: #cbd5e1; cursor: not-allowed; }
    </style>
</head>
<body>
<div class="form-card">
    <h1 style="text-align:center; font-weight:900;">Publicera Annons</h1>
    <form id="sellForm">
        <div class="form-grid">
            <select id="brand" required><option value="">Välj märke...</option></select>
            <select id="model" required disabled><option value="">Välj modell...</option></select>
        </div>
        <div class="form-grid">
            <input type="number" id="year" placeholder="Årsmodell" required>
            <input type="number" id="price" placeholder="Pris (kr)" required>
        </div>
        <input type="number" id="mileage" placeholder="Miltal" required>
        <textarea id="description" rows="4" placeholder="Beskrivning..." required></textarea>
        <input type="file" id="images" multiple accept="image/*" required>
        <button type="submit" class="btn-submit" id="submitBtn">Publicera</button>
    </form>
</div>

<script type="module">
    import { carData } from './cars-data.js';
    import { auth, db, storage } from './firebase-config.js';
    import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const brandSelect = document.getElementById('brand'), modelSelect = document.getElementById('model');
    
    // تحميل الماركات
    Object.keys(carData).sort().forEach(b => {
        const opt = document.createElement('option'); opt.value = b; opt.textContent = b;
        brandSelect.appendChild(opt);
    });

    brandSelect.onchange = () => {
        modelSelect.innerHTML = '<option value="">Välj modell...</option>';
        if (brandSelect.value) {
            modelSelect.disabled = false;
            carData[brandSelect.value].sort().forEach(m => {
                const opt = document.createElement('option'); opt.value = m; opt.textContent = m;
                modelSelect.appendChild(opt);
            });
        }
    };

    document.getElementById('sellForm').onsubmit = async (e) => {
        e.preventDefault();
        
        // 💡 فحص الأمان الأول: هل المستخدم مسجل دخول الآن؟
        if (!auth.currentUser) {
            return Swal.fire('Fel', 'Du måste vara inloggad för att publicera. Logga in och försök igen.', 'error');
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "Laddar upp...";

        try {
            const files = document.getElementById('images').files, urls = [];
            
            for (let f of files) {
                // 💡 رفع الصور بمسار فريد
                const sRef = ref(storage, `cars/${Date.now()}_${f.name}`);
                const metadata = { contentType: f.type };
                
                await uploadBytes(sRef, f, metadata);
                const url = await getDownloadURL(sRef);
                urls.push(url);
            }

            // حفظ في Firestore
            await addDoc(collection(db, "cars"), {
                brand: brandSelect.value,
                model: modelSelect.value,
                year: Number(document.getElementById('year').value),
                price: Number(document.getElementById('price').value),
                mileage: Number(document.getElementById('mileage').value),
                description: document.getElementById('description').value,
                images: urls,
                sellerId: auth.currentUser.uid,
                active: true,
                createdAt: serverTimestamp()
            });

            Swal.fire('Klart!', 'Annonsen är nu publicerad.', 'success');
            setTimeout(() => window.location.href="my-account.html", 2000);

        } catch (err) {
            console.error(err);
            // 💡 إذا ظهر خطأ unauthorized هنا، فهذا يعني أن الجلسة انتهت
            if (err.code === 'storage/unauthorized') {
                Swal.fire('Fel', 'Sessionen har gått ut. Logga ut och logga in igen.', 'error');
            } else {
                Swal.fire('Fel', err.message, 'error');
            }
            btn.disabled = false;
            btn.innerText = "Publicera";
        }
    };
</script>
</body>
</html>

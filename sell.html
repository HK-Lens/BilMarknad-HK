<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Sälj din bil</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-box { background: white; padding: 40px; border-radius: 15px; max-width: 600px; margin: 40px auto; border: 1px solid var(--border); }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 700; }
        .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-box">
        <h2>Annonsera din bil</h2>
        <form id="sellForm">
            <div class="input-group">
                <label>Märke (الشركة)</label>
                <input type="text" id="brand" required>
            </div>
            <div class="input-group">
                <label>Modell</label>
                <input type="text" id="model" required>
            </div>
            <div class="input-group">
                <label>Pris (kr)</label>
                <input type="number" id="price" required>
            </div>
            <div class="input-group">
                <label>Miltal (mil)</label>
                <input type="number" id="mileage" required>
            </div>
            <div class="input-group">
                <label>Årsmodell</label>
                <input type="number" id="year" required>
            </div>
            <div class="input-group">
                <label>Bränsle</label>
                <select id="fuelType">
                    <option>Bensin</option>
                    <option>Diesel</option>
                    <option>El</option>
                    <option>Hybrid</option>
                </select>
            </div>
            <div class="input-group">
                <label>Bilder</label>
                <input type="file" id="photos" multiple accept="image/*">
            </div>
            <button type="submit" class="btn-primary" style="width:100%">Publicera annons</button>
        </form>
    </div>
</div>

<script type="module">
    import { db, auth, storage } from './firebase-config.js';
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    document.getElementById('sellForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.disabled = true;
        btn.innerText = "Publicerar...";

        try {
            const files = document.getElementById('photos').files;
            const imageUrls = [];

            for(let file of files) {
                const sRef = ref(storage, `cars/${Date.now()}_${file.name}`);
                await uploadBytes(sRef, file);
                const url = await getDownloadURL(sRef);
                imageUrls.push(url);
            }

            await addDoc(collection(db, "cars"), {
                brand: document.getElementById('brand').value,
                model: document.getElementById('model').value,
                price: Number(document.getElementById('price').value),
                mileage: Number(document.getElementById('mileage').value),
                year: Number(document.getElementById('year').value),
                fuelType: document.getElementById('fuelType').value,
                images: imageUrls,
                createdAt: serverTimestamp(),
                sellerEmail: auth.currentUser ? auth.currentUser.email : "Gäst"
            });

            alert("Annons publicerad!");
            window.location.href = "index.html";
        } catch (err) {
            alert("Fel: " + err.message);
            btn.disabled = false;
            btn.innerText = "Publicera annons";
        }
    };
</script>
</body>
</html>

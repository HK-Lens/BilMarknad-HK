<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sälj din bil | BILHK</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <h2>Lägg till annons</h2>
    <input type="text" id="brand" placeholder="Märke (t.ex. Volvo)">
    <input type="text" id="model" placeholder="Modell (t.ex. V60)">
    <input type="number" id="price" placeholder="Pris (kr)">
    <textarea id="desc" rows="4" placeholder="Berätta om bilen..."></textarea>
    <input type="text" id="img" placeholder="Bild URL">
    <button class="btn-primary" id="postBtn">Publicera annons</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let userUid = "";

    onAuthStateChanged(auth, u => {
        if(!u) location.href = 'login.html';
        userUid = u.uid;
    });

    document.getElementById('postBtn').onclick = async () => {
        const btn = document.getElementById('postBtn');
        btn.disabled = true;
        btn.innerText = "Publicerar...";
        
        try {
            await addDoc(collection(db, "cars"), {
                brand: document.getElementById('brand').value,
                model: document.getElementById('model').value,
                price: document.getElementById('price').value,
                description: document.getElementById('desc').value,
                images: [document.getElementById('img').value],
                sellerId: userUid,
                createdAt: serverTimestamp()
            });
            location.href = "index.html";
        } catch (e) { alert(e.message); btn.disabled = false; }
    };
</script>
</body>
</html>

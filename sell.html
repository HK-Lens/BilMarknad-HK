<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sälj bil | BILHK</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Sälj din bil</h1>
    <input id="brand" placeholder="Märke">
    <input id="model" placeholder="Modell">
    <input id="price" type="number" placeholder="Pris (kr)">
    <textarea id="desc" placeholder="Beskrivning"></textarea>
    <input id="imgUrl" placeholder="Bild URL (tills vidare)">
    <button onclick="postAd()">Publicera</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    window.postAd = async () => {
        const user = auth.currentUser;
        if(!user) return alert("Logga in!");
        await addDoc(collection(db, "cars"), {
            brand: document.getElementById('brand').value,
            model: document.getElementById('model').value,
            price: document.getElementById('price').value,
            description: document.getElementById('desc').value,
            images: [document.getElementById('imgUrl').value],
            sellerId: user.uid,
            createdAt: serverTimestamp()
        });
        alert("Klart!"); location.href='index.html';
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sälj din bil | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); padding: 20px; color: var(--dark); }
        .form-card { max-width: 850px; margin: 0 auto; background: white; padding: 35px; border-radius: 28px; border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        .reg-box { background: #f1f5f9; padding: 20px; border-radius: 15px; margin-bottom: 25px; display: flex; gap: 15px; align-items: flex-end; border: 2px solid var(--border); }
        .reg-input { text-transform: uppercase; font-weight: 900; font-size: 22px; letter-spacing: 2px; text-align: center; border: 2px solid var(--dark); background: white; height: 55px; border-radius: 12px; flex: 1; }
        .btn-fetch { background: var(--dark); color: white; padding: 0 25px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; height: 55px; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-fetch:hover { background: var(--primary); }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 700; color: #64748b; font-size: 13px; }
        input, select, textarea { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; background: #f8fafc; font-size: 16px; outline: none; }
        
        /* قسم التقنيات المطور */
        .tech-section { margin-top: 25px; background: #f8fafc; padding: 20px; border-radius: 15px; border: 1px solid var(--border); }
        .tech-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .tech-item { display: flex; align-items: center; gap: 10px; font-weight: 600; cursor: pointer; font-size: 14px; }
        .tech-item input { width: auto; margin: 0; }

        .btn-submit { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; font-size: 18px; margin-top: 25px; }
    </style>
</head>
<body>

<div class="form-card">
    <h1 style="text-align:center; font-weight:900; margin-bottom:10px;">Publicera Annons</h1>
    
    <div class="reg-box">
        <div style="flex:1">
            <label>Registreringsnummer (Reg-nr)</label>
            <input type="text" id="regNr" class="reg-input" placeholder="ABC 123" maxlength="7">
        </div>
        <button type="button" class="btn-fetch" id="fetchBtn"><i class="fa-solid fa-sync-alt"></i> Hämta data</button>
    </div>

    <form id="sellForm">
        <div class="form-grid">
            <div>
                <label>Märke</label>
                <select id="brand" required><option value="">Välj märke...</option></select>
            </div>
            <div>
                <label>Modell</label>
                <select id="model" required disabled><option value="">Välj modell...</option></select>
            </div>
        </div>

        <div class="form-grid">
            <input type="number" id="year" placeholder="Årsmodell" required>
            <input type="number" id="price" placeholder="Pris (kr)" required>
        </div>

        <div class="form-grid">
            <input type="number" id="mileage" placeholder="Miltal" required>
            <select id="fuel" required>
                <option value="">Drivmedel...</option>
                <option value="Bensin">Bensin</option>
                <option value="Diesel">Diesel</option>
                <option value="El">El</option>
                <option value="Hybrid">Hybrid</option>
            </select>
        </div>

        <div class="tech-section">
            <h3 style="font-size: 14px; font-weight: 800; color: var(--dark); margin-bottom: 10px;"><i class="fa-solid fa-microchip"></i> Teknik & Säkerhet</h3>
            <div class="tech-grid">
                <label class="tech-item"><input type="checkbox" class="feat" value="Autobroms"> Autobroms (AEB)</label>
                <label class="tech-item"><input type="checkbox" class="feat" value="Regnsensor"> Regnsensor</label>
                <label class="tech-item"><input type="checkbox" class="feat" value="Elhissar"> Elhissar (bak/fram)</label>
                <label class="tech-item"><input type="checkbox" class="feat" value="Avbländande spegel"> Avbländande spegel</label>
                <label class="tech-item"><input type="checkbox" class="feat" value="Döda vinkel-varning"> Döda vinkel-varning</label>
                <label class="tech-item"><input type="checkbox" class="feat" value="Backkamera"> Backkamera</label>
            </div>
        </div>

        <textarea id="description" rows="4" placeholder="Beskrivning..." required style="margin-top:15px;"></textarea>
        <input type="file" id="images" multiple accept="image/*" required>
        
        <button type="submit" class="btn-submit" id="submitBtn">Publicera Annons</button>
    </form>
</div>

<script type="module">
    import { carData } from './cars-data.js';
    import { auth, db, storage } from './firebase-config.js';
    import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const bSel = document.getElementById('brand'), mSel = document.getElementById('model');
    Object.keys(carData).sort().forEach(b => { bSel.innerHTML += `<option value="${b}">${b}</option>`; });

    bSel.onchange = () => {
        mSel.innerHTML = '<option value="">Välj modell...</option>';
        if(carData[bSel.value]) {
            mSel.disabled = false;
            carData[bSel.value].sort().forEach(m => { mSel.innerHTML += `<option value="${m}">${m}</option>`; });
        }
    };

    document.getElementById('fetchBtn').onclick = async () => {
        const reg = document.getElementById('regNr').value.trim();
        if(reg.length < 6) return Swal.fire('Info', 'Ange reg-nr', 'info');
        // هنا يتم ربط الـ API الخاص بك مستقبلاً
        Swal.fire('Hämtar data...', 'Ansluter till bilregister...', 'info');
    };

    document.getElementById('sellForm').onsubmit = async (e) => {
        e.preventDefault();
        if(!auth.currentUser) return Swal.fire('Fel', 'Logga in först!', 'error');

        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = "Publicerar...";

        try {
            const files = document.getElementById('images').files, urls = [];
            for (let f of files) {
                const sRef = ref(storage, `cars/${Date.now()}_${f.name}`);
                await uploadBytes(sRef, f);
                urls.push(await getDownloadURL(sRef));
            }

            const features = Array.from(document.querySelectorAll('.feat:checked')).map(el => el.value);

            await addDoc(collection(db, "cars"), {
                regNr: document.getElementById('regNr').value.toUpperCase(),
                brand: bSel.value,
                model: mSel.value,
                year: Number(document.getElementById('year').value),
                price: Number(document.getElementById('price').value),
                mileage: Number(document.getElementById('mileage').value),
                fuel: document.getElementById('fuel').value,
                features: features,
                description: document.getElementById('description').value,
                images: urls,
                sellerId: auth.currentUser.uid, // لضمان عمل المراسلة والحماية
                createdAt: serverTimestamp()
            });

            Swal.fire('Klart!', 'Annonsen är publicerad.', 'success');
            setTimeout(() => window.location.href="my-account.html", 2000);
        } catch (err) { Swal.fire('Fel', err.message, 'error'); btn.disabled = false; }
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sälj din bil | BILHK Professional</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; --blue-swede: #005293; --yellow-swede: #fecb00; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--dark); padding: 20px; line-height: 1.5; }
        
        .form-card { max-width: 900px; margin: 0 auto; background: white; padding: 35px; border-radius: 28px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { margin-bottom: 30px; font-weight: 900; font-size: 28px; text-align: center; }
        h3 { margin: 25px 0 15px; font-size: 18px; border-bottom: 2px solid var(--bg); padding-bottom: 10px; color: var(--primary); display: flex; align-items: center; gap: 10px; }

        /* تصميم خانة رقم اللوحة السويدية */
        .reg-box { background: #f1f5f9; padding: 25px; border-radius: 20px; border: 2px solid var(--border); margin-bottom: 30px; }
        .reg-wrapper { display: flex; gap: 10px; align-items: flex-end; }
        .reg-input-field { flex: 1; }
        .swedish-plate { 
            text-transform: uppercase; font-weight: 900; font-size: 24px !important; letter-spacing: 2px; 
            text-align: center; border: 3px solid var(--dark) !important; background: white !important;
            height: 60px;
        }
        .btn-fetch { 
            background: var(--blue-swede); color: white; border: none; padding: 0 25px; height: 60px; 
            border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; 
            align-items: center; gap: 10px; font-size: 15px;
        }
        .btn-fetch:hover { background: #003e6f; transform: translateY(-2px); }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 13px; color: #64748b; }
        input, select, textarea { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; font-size: 15px; outline: none; background: #f8fafc; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); background: white; }
        
        .checkbox-group { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; background: #f8fafc; padding: 20px; border-radius: 15px; }
        .check-item { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn-submit { width: 100%; padding: 20px; background: var(--dark); color: white; border: none; border-radius: 15px; font-weight: 800; font-size: 17px; cursor: pointer; margin-top: 30px; transition: 0.3s; }
    </style>
</head>
<body>

<div class="form-card">
    <h1>Sälj din bil</h1>

    <div class="reg-box">
        <div class="reg-wrapper">
            <div class="reg-input-field">
                <label>Registreringsnummer</label>
                <input type="text" id="regNo" class="swedish-plate" placeholder="ABC 123" maxlength="7">
            </div>
            <button type="button" class="btn-fetch" id="fetchDataBtn">
                <i class="fa-solid fa-magnifying-glass"></i> Hämta info
            </button>
        </div>
        <p style="font-size: 12px; color: #64748b; margin-top: 10px;">
            <i class="fa-solid fa-circle-info"></i> Vi hämtar teknisk data direkt från bilregistret.
        </p>
    </div>

    <form id="sellForm">
        <h3><i class="fa-solid fa-car"></i> Fordonsval</h3>
        <div class="form-grid">
            <div class="form-group">
                <label>Märke</label>
                <select id="brand" required><option value="">Välj märke...</option></select>
            </div>
            <div class="form-group">
                <label>Modell</label>
                <select id="model" required disabled><option value="">Välj modell...</option></select>
            </div>
        </div>

        <div class="form-grid">
            <div class="form-group"><label>Årsmodell</label><input type="number" id="year" required></div>
            <div class="form-group"><label>Pris (kr)</label><input type="number" id="price" required></div>
        </div>

        <h3><i class="fa-solid fa-gears"></i> Teknisk Specifikation</h3>
        <div class="form-grid">
            <div class="form-group"><label>Miltal (mil)</label><input type="number" id="mileage" required></div>
            <div class="form-group">
                <label>Växellåda</label>
                <select id="transmission">
                    <option value="Automat">Automat</option>
                    <option value="Manuell">Manuell</option>
                </select>
            </div>
            <div class="form-group">
                <label>Bränsle</label>
                <select id="fuelType">
                    <option value="Bensin">Bensin</option>
                    <option value="Diesel">Diesel</option>
                    <option value="El">El</option>
                    <option value="Hybrid">Hybrid</option>
                </select>
            </div>
            <div class="form-group">
                <label>Karosstyp</label>
                <select id="bodyType">
                    <option value="Sedan">Sedan</option>
                    <option value="Halvkombi">Halvkombi</option>
                    <option value="Kombi">Kombi</option>
                    <option value="SUV">SUV</option>
                    <option value="Coupé">Coupé</option>
                </select>
            </div>
            <div class="form-group"><label>Hästkrafter (hk)</label><input type="number" id="horsepower"></div>
            <div class="form-group"><label>Färg</label><input type="text" id="color"></div>
        </div>

        <h3><i class="fa-solid fa-list-check"></i> Utrustning</h3>
        <div class="checkbox-group" id="equipmentList">
            <label class="check-item"><input type="checkbox" value="Dragkrok"> Dragkrok</label>
            <label class="check-item"><input type="checkbox" value="GPS"> GPS / Navigation</label>
            <label class="check-item"><input type="checkbox" value="Backkamera"> Backkamera</label>
            <label class="check-item"><input type="checkbox" value="Skinnklädsel"> Skinn</label>
            <label class="check-item"><input type="checkbox" value="Fyrhjulsdrift"> 4WD</label>
            <label class="check-item"><input type="checkbox" value="Bluetooth"> Bluetooth</label>
        </div>

        <h3><i class="fa-solid fa-images"></i> Media & Beskrivning</h3>
        <div class="form-group">
            <label>Beskrivning</label>
            <textarea id="description" rows="5" placeholder="Skriv om service, skick etc..."></textarea>
        </div>
        <div class="form-group">
            <label>Bilder</label>
            <input type="file" id="images" multiple accept="image/*" required>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Publicera Annons</button>
    </form>
</div>

<script type="module">
    // 💡 الربط بملف البيانات الشامل
    import { carData } from './cars-data.js';
    import { auth, db, storage } from './firebase-config.js';
    import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const brandSelect = document.getElementById('brand');
    const modelSelect = document.getElementById('model');

    // تهيئة القوائم
    function initDropdowns() {
        brandSelect.innerHTML = '<option value="">Välj märke...</option>';
        Object.keys(carData).forEach(brand => {
            const opt = document.createElement('option');
            opt.value = brand; opt.textContent = brand;
            brandSelect.appendChild(opt);
        });

        brandSelect.onchange = () => {
            modelSelect.innerHTML = '<option value="">Välj modell...</option>';
            const selected = brandSelect.value;
            if (selected && carData[selected]) {
                modelSelect.disabled = false;
                carData[selected].forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m; opt.textContent = m;
                    modelSelect.appendChild(opt);
                });
            } else { modelSelect.disabled = true; }
        };
    }
    initDropdowns();

    // 💡 منطق جلب البيانات (Hämta data)
    document.getElementById('fetchDataBtn').onclick = async () => {
        const reg = document.getElementById('regNo').value.trim().toUpperCase();
        if (reg.length < 6) return Swal.fire('Info', 'Ange ett giltigt registreringsnummer', 'info');

        Swal.fire({ title: 'Hämtar data...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

        try {
            // محاكاة استجابة من API مصلحة النقل أو Car.info
            // في الواقع، ستقوم بطلب Fetch لخدمة توفر هذه البيانات
            setTimeout(() => {
                const results = {
                    brand: "Volvo", 
                    model: "V60", 
                    year: 2021, 
                    fuel: "Diesel", 
                    transmission: "Automat",
                    body: "Kombi",
                    hp: 190,
                    color: "Grå"
                };

                // ملء الخانات آلياً
                brandSelect.value = results.brand;
                brandSelect.dispatchEvent(new Event('change'));
                
                setTimeout(() => {
                    modelSelect.value = results.model;
                    document.getElementById('year').value = results.year;
                    document.getElementById('fuelType').value = results.fuel;
                    document.getElementById('transmission').value = results.transmission;
                    document.getElementById('bodyType').value = results.body;
                    document.getElementById('horsepower').value = results.hp;
                    document.getElementById('color').value = results.color;
                    
                    Swal.fire('Klart!', 'Data från registret har fyllts i.', 'success');
                }, 300);
            }, 1000);
        } catch (e) {
            Swal.fire('Fel', 'Kunde inte hämta data automatiskt.', 'error');
        }
    };

    let user = null;
    onAuthStateChanged(auth, u => { if(u) user = u; else window.location.href="login.html"; });

    document.getElementById('sellForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = "Laddar upp...";

        try {
            const files = document.getElementById('images').files;
            const imageUrls = [];
            for (let file of files) {
                const sRef = ref(storage, `cars/${Date.now()}_${file.name}`);
                await uploadBytes(sRef, file);
                imageUrls.push(await getDownloadURL(sRef));
            }

            const equipment = Array.from(document.querySelectorAll('#equipmentList input:checked')).map(el => el.value);

            await addDoc(collection(db, "cars"), {
                regNo: document.getElementById('regNo').value.toUpperCase(),
                brand: brandSelect.value,
                model: modelSelect.value,
                year: Number(document.getElementById('year').value),
                price: Number(document.getElementById('price').value),
                mileage: Number(document.getElementById('mileage').value),
                transmission: document.getElementById('transmission').value,
                fuelType: document.getElementById('fuelType').value,
                bodyType: document.getElementById('bodyType').value,
                horsepower: Number(document.getElementById('horsepower').value) || 0,
                color: document.getElementById('color').value,
                equipment,
                description: document.getElementById('description').value,
                images: imageUrls,
                sellerId: user.uid,
                active: true,
                createdAt: serverTimestamp()
            });

            Swal.fire('Publicerad!', 'Din annons är nu synlig.', 'success').then(() => {
                window.location.href = "my-account.html";
            });
        } catch (err) {
            Swal.fire('Fel', err.message, 'error');
            btn.disabled = false; btn.innerText = "Publicera Annons";
        }
    };
</script>
</body>
</html>

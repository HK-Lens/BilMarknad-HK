<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; padding: 25px; border: 1px solid var(--border); margin-bottom: 25px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .stat-box { background: white; padding: 20px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        .stat-box h3 { font-size: 28px; font-weight: 900; color: var(--primary); }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn-reset { background: var(--dark); color: white; padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; }
    </style>
</head>
<body>
<nav style="margin-bottom:30px;"><a href="my-account.html" style="text-decoration:none; font-weight:800; color:var(--dark);"><i class="fa-solid fa-arrow-left"></i> Tillbaka</a></nav>
<div class="container">
    <h1 id="welcomeUser" style="margin-bottom:20px; font-weight:900;">Hej...</h1>
    <div class="stats-grid">
        <div class="stat-box"><h3 id="carCount">0</h3><p>Aktiva annonser</p></div>
        <div class="stat-box"><h3 id="msgCount">0</h3><p>Aktiva chattar</p></div>
    </div>
    <div class="card">
        <h3>Personlig Information</h3>
        <div class="info-grid" style="margin:20px 0;">
            <div><label style="color:#94a3b8; font-size:12px;">E-POST</label><p id="displayEmail">...</p></div>
            <div><label style="color:#94a3b8; font-size:12px;">TELEFON</label><p id="displayPhone">Ej angivet</p></div>
        </div>
        <button class="btn-reset" onclick="resetPass()">Byt lösenord</button>
    </div>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    onAuthStateChanged(auth, async (u) => {
        if (u) {
            document.getElementById('displayEmail').innerText = u.email;
            const userSnap = await getDoc(doc(db, "users", u.uid));
            if(userSnap.exists()){
                const data = userSnap.data();
                document.getElementById('welcomeUser').innerText = `Hej, ${data.name}!`;
                document.getElementById('displayPhone').innerText = data.phone || 'Inget nummer';
            }
            const ads = await getDocs(query(collection(db, "cars"), where("sellerId", "==", u.uid)));
            document.getElementById('carCount').innerText = ads.size;
            const chats = await getDocs(query(collection(db, "chats"), where("participants", "array-contains", u.uid)));
            document.getElementById('msgCount').innerText = chats.size;
        } else { window.location.href="login.html"; }
    });

    window.resetPass = () => {
        sendPasswordResetEmail(auth, auth.currentUser.email).then(() => Swal.fire('Skickat!', 'Kolla din e-post.', 'success'));
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | BILHK</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>

:root{
    --primary:#f58220;
    --dark:#0f172a;
    --bg:#f8fafc;
    --border:#e2e8f0;
    --white:#fff;
    --gray:#64748b;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:var(--bg);
    color:var(--dark);
}

header{
    background:white;
    padding:15px 5%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid var(--border);
    position:sticky;
    top:0;
    z-index:999;
}

.logo{
    text-decoration:none;
    font-size:28px;
    font-weight:900;
    color:var(--dark);
}

.logo span{
    color:var(--primary);
}

.container{
    max-width:1200px;
    margin:40px auto;
    padding:0 20px;
    display:grid;
    grid-template-columns:260px 1fr;
    gap:25px;
}

.sidebar{
    background:white;
    border:1px solid var(--border);
    border-radius:20px;
    padding:20px;
    height:fit-content;
}

.nav-btn{
    width:100%;
    border:none;
    background:none;
    padding:14px;
    border-radius:12px;
    margin-bottom:10px;
    text-align:left;
    font-weight:700;
    cursor:pointer;
    transition:.2s;
    color:var(--gray);
}

.nav-btn:hover{
    background:var(--bg);
}

.nav-btn.active{
    background:var(--dark);
    color:white;
}

.content-section{
    display:none;
}

.content-section.active{
    display:block;
}

.card{
    background:white;
    border:1px solid var(--border);
    border-radius:22px;
    padding:30px;
    margin-bottom:25px;
}

.card-title{
    font-size:22px;
    font-weight:900;
    margin-bottom:25px;
}

.stat-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:20px;
}

.stat-box{
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:16px;
    padding:20px;
    text-align:center;
}

.stat-box h2{
    color:var(--primary);
    font-size:30px;
    margin-top:10px;
}

.ad-card{
    border:1px solid var(--border);
    border-radius:16px;
    padding:20px;
    display:flex;
    gap:20px;
    margin-bottom:20px;
    align-items:center;
    background:white;
}

.ad-img{
    width:160px;
    height:110px;
    object-fit:cover;
    border-radius:12px;
}

.ad-info{
    flex:1;
}

.ad-title{
    font-size:18px;
    font-weight:900;
}

.ad-price{
    color:var(--primary);
    font-size:18px;
    font-weight:800;
    margin-top:5px;
}

.btn{
    border:none;
    padding:12px 18px;
    border-radius:10px;
    font-weight:700;
    cursor:pointer;
}

.btn-edit{
    background:var(--dark);
    color:white;
}

.btn-delete{
    background:#fee2e2;
    color:#ef4444;
}

.chat-container{
    display:flex;
    height:650px;
    border:1px solid var(--border);
    border-radius:18px;
    overflow:hidden;
    background:white;
}

.chat-sidebar{
    width:320px;
    border-right:1px solid var(--border);
    overflow-y:auto;
    background:var(--bg);
}

.chat-item{
    padding:15px;
    border-bottom:1px solid var(--border);
    cursor:pointer;
}

.chat-item.active{
    background:white;
    border-left:4px solid var(--primary);
}

.chat-main{
    flex:1;
    display:flex;
    flex-direction:column;
}

.chat-header{
    padding:20px;
    border-bottom:1px solid var(--border);
    font-weight:800;
}

.chat-messages{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.msg{
    max-width:70%;
    padding:12px 16px;
    border-radius:16px;
    font-size:14px;
}

.mine{
    background:var(--primary);
    color:white;
    align-self:flex-end;
}

.theirs{
    background:var(--bg);
    border:1px solid var(--border);
}

.chat-input-area{
    padding:15px;
    border-top:1px solid var(--border);
    display:flex;
    gap:10px;
}

.chat-input{
    flex:1;
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px;
}

.send-btn{
    width:50px;
    border:none;
    border-radius:12px;
    background:var(--primary);
    color:white;
    cursor:pointer;
}

@media(max-width:900px){

.container{
    grid-template-columns:1fr;
}

.chat-container{
    flex-direction:column;
}

.chat-sidebar{
    width:100%;
    height:220px;
    border-right:none;
    border-bottom:1px solid var(--border);
}

.ad-card{
    flex-direction:column;
    align-items:flex-start;
}

.ad-img{
    width:100%;
    height:200px;
}

}

</style>
</head>

<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
</header>

<div class="container">

<aside class="sidebar">

<button class="nav-btn active" onclick="switchTab('overview')" id="tab-overview">
<i class="fa-solid fa-chart-pie"></i>
Översikt
</button>

<button class="nav-btn" onclick="switchTab('messages')" id="tab-messages">
<i class="fa-solid fa-message"></i>
Meddelanden
</button>

<button class="nav-btn" onclick="switchTab('profile')" id="tab-profile">
<i class="fa-solid fa-user"></i>
Profil
</button>

<button class="nav-btn" onclick="logout()" style="background:#fee2e2;color:#ef4444;">
<i class="fa-solid fa-right-from-bracket"></i>
Logga ut
</button>

</aside>

<main>

<div class="content-section active" id="overview">

<div class="card">

<h2 class="card-title">Översikt</h2>

<div class="stat-grid">

<div class="stat-box">
<span>Visningar</span>
<h2 id="viewsCount">0</h2>
</div>

<div class="stat-box">
<span>Sparade</span>
<h2 id="savedCount">0</h2>
</div>

<div class="stat-box">
<span>Annonser</span>
<h2 id="adsCount">0</h2>
</div>

</div>

</div>

<div class="card">

<h2 class="card-title">Mina annonser</h2>

<div id="adsContainer"></div>

</div>

</div>

<div class="content-section" id="messages">

<div class="chat-container">

<div class="chat-sidebar" id="chatList"></div>

<div class="chat-main">

<div class="chat-header" id="chatHeader">
Välj en konversation
</div>

<div class="chat-messages" id="chatMessages"></div>

<div class="chat-input-area">

<input type="text" class="chat-input" id="messageInput" placeholder="Skriv meddelande...">

<button class="send-btn" id="sendBtn">
<i class="fa-solid fa-paper-plane"></i>
</button>

</div>

</div>

</div>

</div>

<div class="content-section" id="profile">

<div class="card">

<h2 class="card-title">Profil</h2>

<form id="profileForm">

<input type="text" id="name" class="chat-input" placeholder="Namn" style="margin-bottom:15px;">

<input type="text" id="phone" class="chat-input" placeholder="Telefon" style="margin-bottom:15px;">

<input type="text" id="address" class="chat-input" placeholder="Adress" style="margin-bottom:15px;">

<button class="btn btn-edit" type="submit">
Spara
</button>

</form>

</div>

</div>

</main>

</div>

<script type="module">

import { auth, db } from './firebase-config.js';

import {
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

import {
collection,
query,
where,
getDocs,
doc,
getDoc,
deleteDoc,
updateDoc,
setDoc,
addDoc,
serverTimestamp,
onSnapshot,
orderBy
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

let currentUser = null;
let currentChatId = null;
let unsubscribeMessages = null;

window.switchTab = function(id){

document.querySelectorAll('.content-section').forEach(section=>{
section.classList.remove('active');
});

document.querySelectorAll('.nav-btn').forEach(btn=>{
btn.classList.remove('active');
});

document.getElementById(id).classList.add('active');
document.getElementById('tab-'+id).classList.add('active');

};

onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.href="login.html";
return;

}

currentUser = user;

loadAds(user.uid);
loadChats(user.uid);
loadProfile(user.uid);

});

async function loadAds(uid){

const q = query(
collection(db,"cars"),
where("sellerId","==",uid)
);

const snap = await getDocs(q);

const container = document.getElementById('adsContainer');

container.innerHTML = '';

let totalViews = 0;
let totalSaved = 0;

document.getElementById('adsCount').innerText = snap.size;

snap.forEach(docSnap=>{

const car = docSnap.data();

totalViews += car.views || 0;
totalSaved += car.saves || 0;

container.innerHTML += `

<div class="ad-card">

<img src="${car.images?.[0] || 'placeholder.jpg'}" class="ad-img">

<div class="ad-info">

<div class="ad-title">
${car.brand} ${car.model}
</div>

<div class="ad-price">
${Number(car.price).toLocaleString()} kr
</div>

</div>

<div style="display:flex; gap:10px;">

<a href="edit-car.html?id=${docSnap.id}" class="btn btn-edit">
Redigera
</a>

<button class="btn btn-delete" onclick="deleteAd('${docSnap.id}')">
Radera
</button>

</div>

</div>

`;

});

document.getElementById('viewsCount').innerText = totalViews;
document.getElementById('savedCount').innerText = totalSaved;

}

window.deleteAd = async function(id){

const confirmDelete = confirm("Radera annons?");

if(!confirmDelete) return;

try{

await deleteDoc(doc(db,"cars",id));

loadAds(currentUser.uid);

}catch(err){

alert("Fel vid radering");

}

};

function loadChats(uid){

const q = query(
collection(db,"chats"),
where("participants","array-contains",uid),
orderBy("updatedAt","desc")
);

onSnapshot(q,(snapshot)=>{

const container = document.getElementById('chatList');

container.innerHTML = '';

snapshot.forEach(chatDoc=>{

const chat = chatDoc.data();

const otherUser = chat.users?.find(u=>u.id !== uid);

container.innerHTML += `

<div class="chat-item"
onclick="openChat('${chatDoc.id}','${otherUser?.name || 'Användare'}',this)">

<strong>${otherUser?.name || 'Användare'}</strong>

<div style="font-size:12px;color:#64748b;margin-top:5px;">
${chat.lastMessage || 'Ingen text'}
</div>

</div>

`;

});

});

}

window.openChat = function(chatId,name,element){

currentChatId = chatId;

document.querySelectorAll('.chat-item').forEach(item=>{
item.classList.remove('active');
});

element.classList.add('active');

document.getElementById('chatHeader').innerHTML = name;

if(unsubscribeMessages){
unsubscribeMessages();
}

const q = query(
collection(db,`chats/${chatId}/messages`),
orderBy("createdAt","asc")
);

unsubscribeMessages = onSnapshot(q,(snapshot)=>{

const box = document.getElementById('chatMessages');

box.innerHTML = '';

snapshot.forEach(docSnap=>{

const msg = docSnap.data();

const mine = msg.senderId === currentUser.uid;

box.innerHTML += `

<div class="msg ${mine ? 'mine' : 'theirs'}">
${msg.text}
</div>

`;

});

box.scrollTop = box.scrollHeight;

});

};

document.getElementById('sendBtn').addEventListener('click',sendMessage);

async function sendMessage(){

const input = document.getElementById('messageInput');

const text = input.value.trim();

if(!text || !currentChatId) return;

input.value = '';

await addDoc(
collection(db,`chats/${currentChatId}/messages`),
{
text:text,
senderId:currentUser.uid,
createdAt:serverTimestamp()
}
);

await updateDoc(
doc(db,"chats",currentChatId),
{
lastMessage:text,
updatedAt:serverTimestamp()
}
);

}

async function loadProfile(uid){

const userDoc = await getDoc(doc(db,"users",uid));

if(userDoc.exists()){

const data = userDoc.data();

document.getElementById('name').value = data.name || '';
document.getElementById('phone').value = data.phone || '';
document.getElementById('address').value = data.address || '';

}

}

document.getElementById('profileForm').addEventListener('submit',async(e)=>{

e.preventDefault();

await setDoc(doc(db,"users",currentUser.uid),{

name:document.getElementById('name').value,
phone:document.getElementById('phone').value,
address:document.getElementById('address').value

},{merge:true});

Swal.fire(
'Sparat!',
'Profil uppdaterad.',
'success'
);

});

window.logout = async function(){

await signOut(auth);

window.location.href = "login.html";

};

</script>

</body>
</html>

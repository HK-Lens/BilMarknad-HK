<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #f58220; --primary-hover: #e07210; --dark: #0f172a; --bg: #f8fafc; --white: #ffffff; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--dark); }

        header { background: var(--white); padding: 15px 6%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 22px; font-weight: 900; text-decoration: none; color: var(--dark); }
        .logo span { color: var(--primary); }
        .nav-links { display: flex; align-items: center; gap: 20px; }
        .nav-links a { text-decoration: none; color: var(--dark); font-weight: 700; font-size: 14px; transition: 0.3s; }
        .nav-links a.active { color: var(--primary); }
        .btn-quick-nav { background: var(--primary); color: white !important; padding: 8px 16px; border-radius: 10px; text-decoration: none; font-weight: 800; font-size: 13px; }

        .main-content { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-bottom: 40px; }
        .stat-card { background: var(--white); padding: 30px; border-radius: 24px; border: 1px solid var(--border); transition: 0.3s; cursor: default; }
        .stat-card.clickable { cursor: pointer; }
        .stat-card.clickable:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-color: var(--primary); }
        .stat-card i { color: var(--primary); font-size: 28px; margin-bottom: 15px; display: block; }
        .stat-card h3 { font-size: 36px; font-weight: 900; }
        .stat-card p { color: #64748b; font-weight: 700; font-size: 14px; text-transform: uppercase; }
        
        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        .content-box { background: var(--white); padding: 30px; border-radius: 24px; border: 1px solid var(--border); }
        .btn-quick { display: block; width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: 800; text-decoration: none; text-align: center; margin-bottom: 10px; }

        @media (max-width: 900px) { .dashboard-grid { grid-template-columns: 1fr; } .nav-links a span { display: none; } }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <nav class="nav-links">
        <a href="index.html">Hem</a>
        <a href="messages.html" title="Meddelanden"><i class="fa-solid fa-envelope"></i> <span>Meddelanden</span></a>
        <a href="dashboard.html" class="active"><i class="fa-solid fa-chart-line"></i> <span>Dashboard</span></a>
        <a href="my-account.html"><i class="fa-solid fa-user-gear"></i> <span>Inställningar</span></a>
        <a href="sell.html" class="btn-quick-nav">+ Sälj bil</a>
    </nav>
</header>

<div class="main-content">
    <div style="margin-bottom: 35px;">
        <h1 id="userName" style="font-size: 28px; font-weight: 900;">Välkommen...</h1>
        <p style="color: #64748b;">Här är en översikt över din aktivitet.</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><i class="fa-solid fa-car-side"></i><h3 id="statAds">0</h3><p>Annonser</p></div>
        <div class="stat-card clickable" onclick="window.location.href='messages.html'">
            <i class="fa-solid fa-envelope-open-text"></i>
            <h3 id="statChats">0</h3>
            <p>Aktiva Chattar</p>
        </div>
        <div class="stat-card"><i class="fa-solid fa-check-circle"></i><h3>Aktiv</h3><p>Status</p></div>
    </div>

    <div class="dashboard-grid">
        <div class="content-box">
            <h3 style="margin-bottom: 20px;">Senaste händelser</h3>
            <div id="activityFeed"><p style="color: #94a3b8;">Laddar senaste aktivitet...</p></div>
        </div>
        <div style="display: flex; flex-direction: column; gap: 20px;">
            <div class="content-box" style="background: var(--dark); color: white; border: none;">
                <h3 style="margin-bottom: 20px;">Snabbval</h3>
                <a href="sell.html" class="btn-quick">Publicera Annons</a>
                <a href="my-account.html" style="color: #94a3b8; text-decoration: none; font-size: 13px; display: block; text-align: center;">Hantera Mitt Konto</a>
            </div>
            <button id="logoutBtn" style="background: #fee2e2; color: #dc2626; border: none; padding: 15px; border-radius: 15px; font-weight: 800; cursor: pointer;">
                <i class="fa-solid fa-right-from-bracket"></i> Logga ut
            </button>
        </div>
    </div>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { collection, query, where, getDocs, limit, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('userName').innerText = `Hej, ${user.displayName || 'Haitham'}!`;
            
            const qAds = query(collection(db, "cars"), where("sellerId", "==", user.uid));
            const snapAds = await getDocs(qAds);
            document.getElementById('statAds').innerText = snapAds.size;

            const qChats = query(collection(db, "chats"), where("participants", "array-contains", user.uid));
            const snapChats = await getDocs(qChats);
            document.getElementById('statChats').innerText = snapChats.size;
            
            const feed = document.getElementById('activityFeed');
            if (snapAds.empty) {
                feed.innerHTML = "Inga annonser än.";
            } else {
                feed.innerHTML = "";
                snapAds.forEach(doc => {
                    const car = doc.data();
                    feed.innerHTML += `<div style="padding:15px 0; border-bottom:1px solid #f1f5f9;"><strong>Publicerad:</strong> ${car.brand} ${car.model}</div>`;
                });
            }
        } else { window.location.href = "login.html"; }
    });

    document.getElementById('logoutBtn').onclick = () => {
        Swal.fire({
            title: 'Vill du logga ut?',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#f58220',
            confirmButtonText: 'Ja',
            cancelButtonText: 'Nej'
        }).then((result) => {
            if (result.isConfirmed) {
                signOut(auth).then(() => window.location.href = "index.html");
            }
        });
    };
</script>
</body>
</html>

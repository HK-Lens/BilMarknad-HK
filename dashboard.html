<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Mitt konto på BILHK.">
    <title>Dashboard | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary:#f58220; --primary-hover:#e07210; --dark:#0f172a; --bg:#f8fafc; --border:#e2e8f0; --white:#fff; --gray-text:#64748b; --danger:#ef4444; }
        * { box-sizing:border-box; margin:0; padding:0; font-family:'Inter',sans-serif; }
        body { background:var(--bg); color:var(--dark); display:flex; flex-direction:column; min-height:100vh; overflow-x:hidden; }
        header { background:var(--white); padding:15px 5%; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:1000; }
        .logo-box { display:flex; align-items:center; gap:20px; }
        .logo { text-decoration:none; font-weight:900; color:var(--dark); font-size:26px; letter-spacing:-.5px; }
        .logo span { color:var(--primary); }
        .btn-home { text-decoration:none; color:var(--dark); font-weight:700; font-size:14px; display:flex; align-items:center; gap:5px; }
        .nav-links { display:flex; align-items:center; gap:15px; }
        .btn-sell { background:var(--primary); color:white!important; padding:8px 20px; border-radius:50px; text-decoration:none; font-weight:700; font-size:13px; }
        .container { max-width:1200px; margin:40px auto; padding:0 20px; display:grid; grid-template-columns:1fr; gap:30px; flex:1; width:100%; }
        @media(min-width:800px){ .container{grid-template-columns:260px 1fr;} }
        .sidebar { background:var(--white); padding:25px 20px; border-radius:20px; border:1px solid var(--border); height:fit-content; box-shadow:0 10px 30px rgba(0,0,0,.02); }
        .nav-btn { display:flex; align-items:center; gap:10px; width:100%; padding:14px 18px; margin-bottom:10px; border:none; background:none; text-align:left; font-weight:800; cursor:pointer; border-radius:12px; color:var(--gray-text); transition:.2s; font-size:14px; }
        .nav-btn i { font-size:16px; width:20px; text-align:center; }
        .nav-btn:hover { background:var(--bg); color:var(--dark); }
        .nav-btn.active { background:var(--dark); color:white; }
        .content-section { display:none; }
        .content-section.active { display:block; animation:fadeIn .25s ease-in-out; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
        .card { background:var(--white); padding:30px; border-radius:24px; border:1px solid var(--border); box-shadow:0 10px 30px rgba(0,0,0,.02); margin-bottom:25px; }
        .card-title { font-size:22px; font-weight:900; margin-bottom:25px; border-left:4px solid var(--primary); padding-left:12px; }
        .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:20px; margin-bottom:0; }
        .stat-box { background:var(--bg); padding:20px; border-radius:16px; text-align:center; border:1px solid var(--border); }
        .stat-box span { font-size:12px; font-weight:900; color:var(--gray-text); text-transform:uppercase; }
        .stat-box h2 { font-size:28px; font-weight:900; color:var(--primary); margin-top:5px; }
        .ad-card { display:flex; flex-direction:column; gap:18px; background:white; padding:18px; border-radius:16px; border:1px solid var(--border); margin-bottom:15px; transition:.2s; }
        @media(min-width:900px){ .ad-card{flex-direction:row;align-items:center;} }
        .ad-img-wrap { position:relative; flex-shrink:0; }
        .ad-img { width:100%; height:160px; border-radius:12px; object-fit:cover; border:1px solid var(--border); }
        @media(min-width:900px){ .ad-img{width:160px;height:110px;} }
        .sold-overlay { position:absolute; top:10px; left:10px; background:var(--danger); color:white; padding:5px 12px; border-radius:6px; font-weight:900; font-size:11px; z-index:5; }
        .ad-card.is-sold { opacity:.82; }
        .ad-info { flex:1.5; display:flex; flex-direction:column; justify-content:center; min-width:0; }
        .ad-title { font-size:18px; font-weight:900; color:var(--dark); text-decoration:none; margin-bottom:6px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .ad-price { font-size:16px; font-weight:900; color:var(--primary); }
        .ad-reg { font-size:12px; font-weight:800; background:var(--bg); padding:4px 8px; border-radius:6px; border:1px solid var(--border); display:inline-block; margin-top:8px; width:fit-content; text-transform:uppercase; }
        .ad-metrics { display:flex; gap:10px; flex:1.4; justify-content:space-around; background:var(--bg); padding:15px; border-radius:12px; border:1px solid var(--border); }
        .metric { text-align:center; }
        .metric span { display:block; font-size:11px; color:var(--gray-text); text-transform:uppercase; font-weight:900; }
        .metric strong { display:block; font-size:18px; color:var(--dark); font-weight:900; margin-top:2px; }
        .btn-sm { padding:12px; border-radius:10px; font-size:13px; cursor:pointer; border:none; font-weight:800; text-decoration:none; transition:.2s; display:flex; align-items:center; justify-content:center; gap:8px; width:100%; }
        .btn-edit { background:var(--dark); color:white; }
        .btn-sold { background:#10b981; color:white; margin-bottom:7px; }
        .btn-del { background:#fee2e2; color:var(--danger); border:1px solid #fca5a5; margin-top:7px; }
        .form-grid { display:grid; grid-template-columns:1fr; gap:20px; }
        @media(min-width:700px){ .form-grid{grid-template-columns:1fr 1fr;} }
        .form-group label { display:block; font-size:12px; font-weight:900; color:var(--gray-text); margin-bottom:8px; text-transform:uppercase; }
        .form-input { width:100%; padding:14px; border-radius:12px; border:1px solid var(--border); background:var(--bg); font-size:14px; outline:none; font-weight:600; }
        .form-input:focus { border-color:var(--primary); background:white; box-shadow:0 0 0 3px rgba(245,130,32,.1); }
        .btn-save { background:var(--primary); color:white; border:none; padding:16px 35px; border-radius:12px; cursor:pointer; font-weight:900; font-size:15px; transition:.3s; margin-top:20px; }
        .chat-container { display:flex; flex-direction:column; height:650px; border:1px solid var(--border); border-radius:16px; overflow:hidden; background:white; }
        @media(min-width:900px){ .chat-container{flex-direction:row;} }
        .chat-sidebar { width:100%; border-bottom:1px solid var(--border); overflow-y:auto; background:var(--bg); display:flex; flex-direction:column; }
        @media(min-width:900px){ .chat-sidebar{width:340px;border-bottom:none;border-right:1px solid var(--border);} }
        .chat-list-item { padding:15px 20px; border-bottom:1px solid var(--border); cursor:pointer; transition:.2s; display:flex; flex-direction:column; gap:4px; }
        .chat-list-item:hover,.chat-list-item.active { background:white; }
        .chat-list-title { font-weight:900; font-size:14px; color:var(--dark); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .chat-list-user { font-size:12px; font-weight:800; color:var(--primary); }
        .chat-list-msg { font-size:12px; color:var(--gray-text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .chat-main { flex:1; display:flex; flex-direction:column; background:white; }
        .chat-header { padding:18px 20px; border-bottom:1px solid var(--border); background:var(--bg); font-weight:900; display:flex; justify-content:space-between; align-items:center; }
        .chat-messages { flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:12px; }
        .msg-bubble { padding:12px 16px; border-radius:16px; max-width:75%; font-size:14px; line-height:1.5; font-weight:500; word-break:break-word; }
        .msg-mine { align-self:flex-end; background:var(--primary); color:white; border-bottom-right-radius:4px; }
        .msg-theirs { align-self:flex-start; background:var(--bg); color:var(--dark); border:1px solid var(--border); border-bottom-left-radius:4px; }
        .msg-time { display:block; font-size:10px; margin-top:5px; opacity:.8; text-align:right; }
        .chat-input-area { padding:15px; border-top:1px solid var(--border); background:var(--bg); display:flex; gap:10px; }
        .chat-input { flex:1; padding:14px; border:1px solid var(--border); border-radius:12px; outline:none; font-size:14px; }
        .btn-send { background:var(--primary); color:white; border:none; width:50px; border-radius:12px; cursor:pointer; font-size:16px; }
        .btn-send:disabled { background:var(--gray-text); cursor:not-allowed; }
        .btn-delete-chat { background:#fee2e2; color:var(--danger); border:1px solid #fca5a5; padding:7px 12px; border-radius:8px; font-size:12px; font-weight:800; cursor:pointer; display:flex; align-items:center; gap:6px; }
        footer { background:var(--white); border-top:1px solid var(--border); padding:30px 5% 15px; margin-top:auto; text-align:center; color:#94a3b8; font-size:12px; }
    </style>
</head>
<body>
<header>
    <div class="logo-box"><a href="index.html" class="logo">BIL<span>HK</span></a><a href="index.html" class="btn-home"><i class="fa-solid fa-house"></i> Hem</a></div>
    <div class="nav-links"><a href="sell.html" class="btn-sell">Sälj din bil</a></div>
</header>

<div class="container">
    <aside class="sidebar">
        <button onclick="switchTab('overview')" id="tab-overview" class="nav-btn active"><i class="fa-solid fa-chart-pie"></i> Översikt</button>
        <button onclick="switchTab('saved')" id="tab-saved" class="nav-btn"><i class="fa-solid fa-heart"></i> Sparade bilar</button>
        <button onclick="switchTab('messages', true)" id="tab-messages" class="nav-btn"><i class="fa-solid fa-message"></i> Meddelanden</button>
        <button onclick="switchTab('profile')" id="tab-profile" class="nav-btn"><i class="fa-solid fa-user-gear"></i> Inställningar</button>
        <button onclick="handleLogout()" class="nav-btn" style="color:#ef4444;margin-top:30px;background:#fee2e2;"><i class="fa-solid fa-right-from-bracket"></i> Logga ut</button>
    </aside>

    <main>
        <section id="overview" class="content-section active">
            <div class="card">
                <h2 class="card-title">Kontoöversikt</h2>
                <div class="stat-grid">
                    <div class="stat-box"><span>Totalt visningar</span><h2 id="global-views">0</h2></div>
                    <div class="stat-box"><span>Totalt sparade</span><h2 id="global-saves">0</h2></div>
                    <div class="stat-box"><span>Mina annonser</span><h2 id="global-ads">0</h2></div>
                </div>
            </div>
            <div class="card"><h2 class="card-title">Mina fordon</h2><div id="adsContainer"><p style="text-align:center;color:var(--gray-text);padding:40px;">Laddar annonser...</p></div></div>
        </section>

        <section id="saved" class="content-section">
            <div class="card"><h2 class="card-title">Mina sparade bilar</h2><div id="savedCarsContainer"><p style="color:var(--gray-text);text-align:center;padding:40px;">Laddar sparade bilar...</p></div></div>
        </section>

        <section id="messages" class="content-section">
            <div class="card" style="padding:0;background:transparent;border:none;box-shadow:none;">
                <div class="chat-container">
                    <div class="chat-sidebar"><div style="padding:20px;font-weight:900;background:white;border-bottom:1px solid var(--border);">Alla konversationer</div><div id="chatListContent"><div style="padding:20px;text-align:center;color:var(--gray-text);font-size:13px;">Laddar meddelanden...</div></div></div>
                    <div class="chat-main">
                        <div class="chat-header" id="chatHeader"><span>Välj en konversation</span></div>
                        <div class="chat-messages" id="chatMessagesBox"><div style="margin:auto;color:var(--gray-text);font-size:14px;font-weight:500;">Ingen chatt vald.</div></div>
                        <div class="chat-input-area"><input type="text" id="chatInput" class="chat-input" placeholder="Skriv ett meddelande..." disabled><button id="sendBtn" class="btn-send" disabled><i class="fa-solid fa-paper-plane"></i></button></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="profile" class="content-section card">
            <h2 class="card-title">Profilinställningar</h2>
            <form id="profileForm">
                <div class="form-grid">
                    <div class="form-group"><label>Namn</label><input type="text" id="p-name" class="form-input"></div>
                    <div class="form-group"><label>E-postadress</label><input type="email" id="p-email" class="form-input" disabled></div>
                    <div class="form-group"><label>Telefonnummer</label><input type="text" id="p-phone" class="form-input"></div>
                    <div class="form-group"><label>Postort</label><input type="text" id="p-address" class="form-input"></div>
                </div>
                <button type="submit" class="btn-save"><i class="fa-solid fa-floppy-disk"></i> Spara inställningar</button>
            </form>
        </section>
    </main>
</div>

<footer>© 2026 BILHK</footer>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import {
        collection, query, where, orderBy, getDocs, getDoc, doc, deleteDoc, setDoc,
        addDoc, updateDoc, serverTimestamp, onSnapshot, writeBatch, arrayRemove,
        arrayUnion, increment
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let currentUser = null;
    let currentChatId = null;
    let unsubscribeMessages = null;
    let unsubscribeChats = null;
    let targetCarId = new URLSearchParams(window.location.search).get('carId');
    let currentTab = new URLSearchParams(window.location.search).get('tab') || 'overview';
    let chatAutoOpened = false;

    function escapeHTML(value) {
        return String(value ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }

    function money(value) { return Number(value || 0).toLocaleString('sv-SE'); }

    window.switchTab = (id, clearFilter = false) => {
        document.querySelectorAll('.content-section').forEach((s) => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach((b) => b.classList.remove('active'));
        const section = document.getElementById(id);
        const button = document.getElementById('tab-' + id);
        if (section) section.classList.add('active');
        if (button) button.classList.add('active');

        if (clearFilter && currentUser) {
            targetCarId = null;
            chatAutoOpened = false;
            window.history.replaceState({}, document.title, window.location.pathname + '?tab=messages');
            resetChatWindow();
            loadChatList(currentUser.uid);
        }
    };

    if (currentTab !== 'overview') switchTab(currentTab, false);

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'login.html';
            return;
        }
        currentUser = user;
        await loadDashboardData(user.uid);
        await loadProfile(user.uid);
        await loadSavedCars(user.uid);
        loadChatList(user.uid);
    });

    function renderAdCard(id, car, savedMode = false) {
        const isSold = car.status === 'sold';
        const image = escapeHTML(car.images?.[0] || 'placeholder.jpg');
        const title = `${escapeHTML(car.brand || '')} ${escapeHTML(car.model || '')}`.trim();
        const reg = escapeHTML(car.regNr || car.regNo || 'Okänd');
        const views = Number(car.views || 0);
        const saves = Number(car.saves || 0);

        return `
            <div class="ad-card ${isSold ? 'is-sold' : ''}">
                <div class="ad-img-wrap"><img src="${image}" class="ad-img" onerror="this.src='placeholder.jpg'">${isSold ? '<div class="sold-overlay">SÅLD</div>' : ''}</div>
                <div class="ad-info"><a href="details.html?id=${encodeURIComponent(id)}" class="ad-title">${title || 'Annons'}</a><div class="ad-price">${money(car.price)} kr</div><div class="ad-reg"><i class="fa-solid fa-hashtag"></i> ${reg}</div></div>
                ${savedMode ? '' : `<div class="ad-metrics"><div class="metric"><span>Visningar</span><strong>${views}</strong></div><div class="metric"><span>Sparade</span><strong>${saves}</strong></div></div>`}
                <div style="flex:.8;min-width:150px;">
                    ${savedMode ? `<button onclick="unsaveCar('${id}')" class="btn-sm btn-del" style="margin-top:0;"><i class="fa-solid fa-heart-crack"></i> Ta bort</button>` : `
                        ${!isSold ? `<button onclick="markAsSold('${id}')" class="btn-sm btn-sold"><i class="fa-solid fa-tag"></i> Markera som såld</button>` : `<div style="color:#10b981;font-weight:900;font-size:13px;text-align:center;margin-bottom:8px;"><i class="fa-solid fa-circle-check"></i> Fordonet är sålt</div>`}
                        <a href="edit-car.html?id=${encodeURIComponent(id)}" class="btn-sm btn-edit"><i class="fa-solid fa-pen"></i> Redigera</a>
                        <button onclick="deleteAd('${id}')" class="btn-sm btn-del"><i class="fa-solid fa-trash"></i> Radera</button>
                    `}
                </div>
            </div>
        `;
    }

    async function loadDashboardData(uid) {
        const container = document.getElementById('adsContainer');
        container.innerHTML = `<p style="text-align:center;color:var(--gray-text);padding:40px;">Laddar annonser...</p>`;
        try {
            const adsQuery = query(collection(db, 'cars'), where('sellerId', '==', uid));
            const snap = await getDocs(adsQuery);
            let globalViews = 0;
            let globalSaves = 0;
            let adCount = 0;
            let html = '';

            snap.forEach((docSnap) => {
                const car = docSnap.data();
                adCount++;
                globalViews += Number(car.views || 0);
                globalSaves += Number(car.saves || 0);
                html += renderAdCard(docSnap.id, car, false);
            });

            document.getElementById('global-views').innerText = globalViews;
            document.getElementById('global-saves').innerText = globalSaves;
            document.getElementById('global-ads').innerText = adCount;
            container.innerHTML = html || `<p style="color:#64748b;text-align:center;padding:40px 20px;font-weight:700;">Du har inga annonser ännu.</p>`;
        } catch (error) {
            console.error(error);
            container.innerHTML = `<p style="color:#ef4444;text-align:center;padding:40px;">Kunde inte ladda dina annonser.</p>`;
        }
    }

    window.markAsSold = async (id) => {
        const res = await Swal.fire({ title:'Är bilen såld?', text:"Detta visar 'SÅLD' på annonsen.", icon:'question', showCancelButton:true, confirmButtonColor:'#10b981', confirmButtonText:'Ja, den är såld', cancelButtonText:'Avbryt' });
        if (!res.isConfirmed) return;
        try {
            await updateDoc(doc(db, 'cars', id), { status:'sold', updatedAt: serverTimestamp() });
            await loadDashboardData(currentUser.uid);
            Swal.fire('Klart!', 'Bilen har markerats som såld.', 'success');
        } catch (error) {
            console.error(error);
            Swal.fire('Fel', 'Kunde inte uppdatera status.', 'error');
        }
    };

    async function loadSavedCars(uid) {
        const container = document.getElementById('savedCarsContainer');
        try {
            const userDoc = await getDoc(doc(db, 'users', uid));
            const savedIds = userDoc.exists() && Array.isArray(userDoc.data().savedCars) ? userDoc.data().savedCars : [];
            if (!savedIds.length) {
                container.innerHTML = `<p style="color:var(--gray-text);text-align:center;padding:40px;">Du har inga sparade bilar än.</p>`;
                return;
            }
            let html = '';
            for (const carId of savedIds) {
                const carSnap = await getDoc(doc(db, 'cars', carId));
                if (carSnap.exists()) html += renderAdCard(carSnap.id, carSnap.data(), true);
            }
            container.innerHTML = html || `<p style="color:var(--gray-text);text-align:center;padding:40px;">Inga sparade bilar kunde visas.</p>`;
        } catch (error) {
            console.error(error);
            container.innerHTML = `<p style="color:#ef4444;text-align:center;padding:40px;">Kunde inte ladda sparade bilar.</p>`;
        }
    }

    window.unsaveCar = async (carId) => {
        const res = await Swal.fire({ title:'Ta bort från sparade?', icon:'question', showCancelButton:true, confirmButtonColor:'#ef4444', confirmButtonText:'Ja, ta bort', cancelButtonText:'Avbryt' });
        if (!res.isConfirmed) return;
        try {
            await updateDoc(doc(db, 'users', currentUser.uid), { savedCars: arrayRemove(carId) });
            try { await updateDoc(doc(db, 'cars', carId), { saves: increment(-1) }); } catch (e) {}
            await loadSavedCars(currentUser.uid);
        } catch (error) {
            console.error(error);
            Swal.fire('Fel', 'Kunde inte ta bort bilen.', 'error');
        }
    };

    function resetChatWindow() {
        currentChatId = null;
        document.getElementById('chatHeader').innerHTML = `<span>Välj en konversation</span>`;
        document.getElementById('chatMessagesBox').innerHTML = `<div style="margin:auto;color:var(--gray-text);font-size:14px;font-weight:500;">Ingen chatt vald.</div>`;
        document.getElementById('chatInput').disabled = true;
        document.getElementById('sendBtn').disabled = true;
        if (unsubscribeMessages) { unsubscribeMessages(); unsubscribeMessages = null; }
    }

    function loadChatList(uid) {
        if (unsubscribeChats) unsubscribeChats();
        const chatsQuery = query(collection(db, 'chats'), where('participants', 'array-contains', uid), orderBy('updatedAt', 'desc'));
        unsubscribeChats = onSnapshot(chatsQuery, (snapshot) => {
            const list = document.getElementById('chatListContent');
            list.innerHTML = '';

            if (targetCarId) {
                list.insertAdjacentHTML('beforeend', `<div style="padding:15px;text-align:center;background:#fff7ed;border-bottom:1px solid var(--border);cursor:pointer;" onclick="switchTab('messages', true)"><span style="color:var(--primary);font-size:13px;font-weight:900;"><i class="fa-solid fa-arrow-left"></i> Visa alla konversationer</span></div>`);
            }

            let count = 0;
            let firstChat = null;
            snapshot.forEach((docSnap) => {
                const chat = docSnap.data();
                if (targetCarId && chat.carId !== targetCarId) return;
                count++;
                const chatId = docSnap.id;
                const otherUser = Array.isArray(chat.users) ? chat.users.find((u) => u.id !== uid) : null;
                const otherName = escapeHTML(otherUser?.name || 'Användare');
                const carTitle = escapeHTML(chat.carTitle || chat.carName || 'Annons');
                const lastMessage = escapeHTML(chat.lastMessage || 'Starta konversationen...');
                const carImage = escapeHTML(chat.carImage || 'placeholder.jpg');

                if (targetCarId && !firstChat) firstChat = { id: chatId, name: otherName, title: carTitle };

                list.insertAdjacentHTML('beforeend', `
                    <div class="chat-list-item ${currentChatId === chatId ? 'active' : ''}" data-chat-id="${chatId}" onclick="openChat('${chatId}', '${otherName}', '${carTitle}')">
                        <div style="display:flex;gap:12px;align-items:center;width:100%;">
                            <img src="${carImage}" alt="Bil" style="width:45px;height:45px;object-fit:cover;border-radius:8px;border:1px solid var(--border);" onerror="this.src='placeholder.jpg'">
                            <div style="flex:1;min-width:0;"><div class="chat-list-title">${carTitle}</div><div class="chat-list-user"><i class="fa-solid fa-user"></i> ${otherName}</div><div class="chat-list-msg">${lastMessage}</div></div>
                        </div>
                    </div>
                `);
            });

            if (count === 0) list.insertAdjacentHTML('beforeend', `<div style="padding:30px 20px;text-align:center;color:var(--gray-text);font-size:13px;font-weight:700;">Inga meddelanden ännu.</div>`);
            if (targetCarId && firstChat && !chatAutoOpened) { window.openChat(firstChat.id, firstChat.name, firstChat.title); chatAutoOpened = true; }
        });
    }

    window.openChat = async (chatId, otherName, carTitle) => {
        currentChatId = chatId;
        document.getElementById('chatHeader').innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;width:100%;"><span>${carTitle}<small style="display:block;color:var(--primary);font-size:12px;">Chattar med: ${otherName}</small></span><button onclick="deleteChat('${chatId}')" class="btn-delete-chat"><i class="fa-solid fa-trash"></i> Radera</button></div>`;
        document.getElementById('chatInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;
        document.querySelectorAll('.chat-list-item').forEach((el) => el.classList.toggle('active', el.dataset.chatId === chatId));

        const msgBox = document.getElementById('chatMessagesBox');
        msgBox.innerHTML = `<div style="margin:auto;color:var(--gray-text);font-size:12px;"><i class="fa-solid fa-spinner fa-spin"></i> Laddar...</div>`;
        if (unsubscribeMessages) unsubscribeMessages();

        try { await updateDoc(doc(db, 'chats', chatId), { unreadFor: arrayRemove(currentUser.uid) }); } catch (e) {}

        const messagesQuery = query(collection(db, `chats/${chatId}/messages`), orderBy('createdAt', 'asc'));
        unsubscribeMessages = onSnapshot(messagesQuery, (snapshot) => {
            msgBox.innerHTML = '';
            if (snapshot.empty) {
                msgBox.innerHTML = `<div style="margin:auto;color:var(--gray-text);font-size:13px;font-weight:600;">Skicka det första meddelandet!</div>`;
                return;
            }
            snapshot.forEach((mSnap) => {
                const msg = mSnap.data();
                const isMine = msg.senderId === currentUser.uid;
                const time = msg.createdAt?.toDate ? msg.createdAt.toDate().toLocaleTimeString('sv-SE', { hour:'2-digit', minute:'2-digit' }) : 'Nu';
                msgBox.insertAdjacentHTML('beforeend', `<div class="msg-bubble ${isMine ? 'msg-mine' : 'msg-theirs'}">${escapeHTML(msg.text)}<span class="msg-time">${time}</span></div>`);
            });
            msgBox.scrollTop = msgBox.scrollHeight;
        });
    };

    window.deleteChat = async (chatId) => {
        const res = await Swal.fire({ title:'Radera konversation?', text:'Detta går inte att ångra.', icon:'warning', showCancelButton:true, confirmButtonColor:'#ef4444', cancelButtonText:'Avbryt', confirmButtonText:'Ja, radera' });
        if (!res.isConfirmed) return;
        try {
            const batch = writeBatch(db);
            const messagesSnap = await getDocs(collection(db, `chats/${chatId}/messages`));
            messagesSnap.forEach((messageDoc) => batch.delete(messageDoc.ref));
            batch.delete(doc(db, 'chats', chatId));
            await batch.commit();
            resetChatWindow();
            Swal.fire('Raderad!', 'Konversationen har raderats.', 'success');
        } catch (error) {
            console.error(error);
            Swal.fire('Fel', 'Kunde inte radera konversationen.', 'error');
        }
    };

    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text || !currentChatId || !currentUser) return;
        input.value = '';

        try {
            const chatRef = doc(db, 'chats', currentChatId);
            const chatSnap = await getDoc(chatRef);
            const participants = chatSnap.exists() && Array.isArray(chatSnap.data().participants) ? chatSnap.data().participants : [];
            const receivers = participants.filter((id) => id !== currentUser.uid);

            await addDoc(collection(db, `chats/${currentChatId}/messages`), { text, senderId: currentUser.uid, createdAt: serverTimestamp() });
            await updateDoc(chatRef, { lastMessage: text, unreadFor: arrayUnion(...receivers), updatedAt: serverTimestamp() });
        } catch (error) {
            console.error('Kunde inte skicka meddelande:', error);
            Swal.fire('Fel', 'Kunde inte skicka meddelandet.', 'error');
        }
    }

    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('chatInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

    async function loadProfile(uid) {
        try {
            const userDoc = await getDoc(doc(db, 'users', uid));
            const u = userDoc.exists() ? userDoc.data() : {};
            document.getElementById('p-name').value = u.name || '';
            document.getElementById('p-email').value = u.email || auth.currentUser.email || '';
            document.getElementById('p-phone').value = u.phone || '';
            document.getElementById('p-address').value = u.address || '';
        } catch (error) { console.error(error); }
    }

    document.getElementById('profileForm').onsubmit = async (e) => {
        e.preventDefault();
        try {
            await setDoc(doc(db, 'users', currentUser.uid), { name: document.getElementById('p-name').value.trim(), phone: document.getElementById('p-phone').value.trim(), address: document.getElementById('p-address').value.trim(), email: currentUser.email }, { merge:true });
            Swal.fire('Sparat!', 'Din profil har uppdaterats.', 'success');
        } catch (error) {
            console.error(error);
            Swal.fire('Fel', 'Kunde inte spara profilen.', 'error');
        }
    };

    window.deleteAd = async (id) => {
        const res = await Swal.fire({ title:'Radera annons?', text:'Annonsen och chattar kopplade till den raderas.', icon:'warning', showCancelButton:true, confirmButtonColor:'#ef4444', confirmButtonText:'Ja, radera', cancelButtonText:'Avbryt' });
        if (!res.isConfirmed) return;
        try {
            const batch = writeBatch(db);
            const chatsQuery = query(collection(db, 'chats'), where('carId', '==', id));
            const chatsSnap = await getDocs(chatsQuery);
            for (const chatDoc of chatsSnap.docs) {
                const messagesSnap = await getDocs(collection(db, `chats/${chatDoc.id}/messages`));
                messagesSnap.forEach((messageDoc) => batch.delete(messageDoc.ref));
                batch.delete(chatDoc.ref);
            }
            batch.delete(doc(db, 'cars', id));
            await batch.commit();
            await loadDashboardData(currentUser.uid);
            Swal.fire('Raderad!', 'Annonsen har raderats.', 'success');
        } catch (error) {
            console.error(error);
            Swal.fire('Fel', 'Kunde inte radera annonsen.', 'error');
        }
    };

    window.handleLogout = () => signOut(auth).then(() => window.location.href = 'login.html');
</script>
</body>
</html>

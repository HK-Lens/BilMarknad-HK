<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Hub | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--dark); display: flex; flex-direction: column; min-height: 100vh; }
        header { background: white; padding: 15px 5%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { text-decoration: none; font-weight: 900; color: var(--dark); font-size: 24px; }
        .logo span { color: var(--primary); }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 250px 1fr; gap: 30px; }
        .sidebar { background: white; padding: 20px; border-radius: 20px; border: 1px solid var(--border); height: fit-content; }
        .nav-btn { display: block; width: 100%; padding: 12px; margin-bottom: 10px; border: none; background: none; text-align: left; font-weight: 700; cursor: pointer; border-radius: 10px; color: var(--dark); }
        .nav-btn.active { background: var(--primary); color: white; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        .card { background: white; padding: 25px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: #f1f5f9; padding: 20px; border-radius: 15px; text-align: center; }
        .ad-row { display: grid; grid-template-columns: 100px 1fr 150px; gap: 20px; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
        .ad-img { width: 100%; height: 70px; object-fit: cover; border-radius: 10px; }
        .btn-sm { padding: 8px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; border: none; font-weight: 700; text-decoration: none; }
    </style>
</head>
<body>
<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <a href="index.html" style="font-weight: 700; color: var(--dark); text-decoration: none;">Hem</a>
</header>
<div class="container">
    <aside class="sidebar">
        <button onclick="switchTab('stats')" id="tab-stats" class="nav-btn active"><i class="fa-solid fa-chart-line"></i> Statistik</button>
        <button onclick="switchTab('ads')" id="tab-ads" class="nav-btn"><i class="fa-solid fa-car"></i> Mina Annonser</button>
        <button onclick="switchTab('profile')" id="tab-profile" class="nav-btn"><i class="fa-solid fa-user-gear"></i> Inställningar</button>
        <button onclick="handleLogout()" class="nav-btn" style="color: red; margin-top: 20px;"><i class="fa-solid fa-right-from-bracket"></i> Logga ut</button>
    </aside>
    <main>
        <div id="stats" class="content-section active card">
            <h2 style="margin-bottom: 20px;">Kontoöversikt</h2>
            <div class="stat-grid">
                <div class="stat-box"><span>Visningar</span><h2 id="v-total">0</h2></div>
                <div class="stat-box"><span>Sparade</span><h2 id="f-total">0</h2></div>
                <div class="stat-box"><span>Meddelanden</span><h2 id="m-total">0</h2></div>
            </div>
            <canvas id="chartCanvas"></canvas>
        </div>
        <div id="ads" class="content-section card">
            <h2 style="margin-bottom: 20px;">Hantera Annonser</h2>
            <div id="adsContainer"></div>
        </div>
        <div id="profile" class="content-section card">
            <h2 style="margin-bottom: 20px;">Profilinställningar</h2>
            <form id="profileForm">
                <div style="margin-bottom: 15px;"><label>Telefon</label><input type="text" id="p-phone" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;"></div>
                <div style="margin-bottom: 15px;"><label>Adress</label><input type="text" id="p-address" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;"></div>
                <button type="submit" style="background:var(--primary); color:white; border:none; padding:10px 25px; border-radius:8px; cursor:pointer; font-weight:700;">Spara</button>
            </form>
        </div>
    </main>
</div>
<script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { collection, query, where, getDocs, doc, deleteDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    window.switchTab = (id) => {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('tab-' + id).classList.add('active');
    };

    onAuthStateChanged(auth, async (user) => {
        if (!user) window.location.href = "login.html";
        else {
            loadStats(user.uid);
            loadAds(user.uid);
            loadProfile(user.uid);
        }
    });

    async function loadStats(uid) {
        const q = query(collection(db, "cars"), where("sellerId", "==", uid));
        const snap = await getDocs(q);
        let views = 0; snap.forEach(d => views += (d.data().views || 0));
        document.getElementById('v-total').innerText = views;
        // Add chart logic here...
    }

    async function loadAds(uid) {
        const q = query(collection(db, "cars"), where("sellerId", "==", uid));
        const snap = await getDocs(q);
        const container = document.getElementById('adsContainer');
        container.innerHTML = "";
        snap.forEach(d => {
            const car = d.data();
            container.innerHTML += `
                <div class="ad-row">
                    <img src="${car.images?.[0] || ''}" class="ad-img">
                    <div><b>${car.brand} ${car.model}</b><br><span style="color:var(--primary)">${car.price} kr</span></div>
                    <div style="display:flex; gap:5px;">
                        <a href="edit-car.html?id=${d.id}" class="btn-sm" style="background:#f1f5f9; color:black; text-decoration:none;">Redigera</a>
                        <button onclick="deleteAd('${d.id}')" class="btn-sm" style="background:#fee2e2; color:red;">Radera</button>
                    </div>
                </div>`;
        });
    }

    async function loadProfile(uid) {
        const d = await getDocs(query(collection(db, "users"), where("uid", "==", uid)));
        if (!d.empty) {
            const u = d.docs[0].data();
            document.getElementById('p-phone').value = u.phone || "";
            document.getElementById('p-address').value = u.address || "";
        }
    }

    document.getElementById('profileForm').onsubmit = async (e) => {
        e.preventDefault();
        const user = auth.currentUser;
        await setDoc(doc(db, "users", user.uid), {
            phone: document.getElementById('p-phone').value,
            address: document.getElementById('p-address').value,
            uid: user.uid
        }, { merge: true });
        Swal.fire("Sparat!", "Din profil har uppdaterats.", "success");
    };

    window.deleteAd = async (id) => {
        const res = await Swal.fire({ title: 'Radera?', text: 'Går inte att ångra!', icon: 'warning', showCancelButton: true });
        if (res.isConfirmed) {
            await deleteDoc(doc(db, "cars", id));
            location.reload();
        }
    };

    window.handleLogout = () => signOut(auth).then(() => location.href = "login.html");
</script>
</body>
</html>

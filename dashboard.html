<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontoöversikt | BilMarknad HK</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #f58220; --primary-hover: #e07210; --dark: #0f172a;
            --light: #f8fafc; --border: #e2e8f0; --white: #ffffff; --danger: #ef4444;
            --success: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--light); color: var(--dark); min-height: 100vh; }

        header {
            background: var(--white); padding: 1rem 6%; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--dark); text-decoration: none; }
        .logo span { color: var(--primary); }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        
        /* Dashboard Stats Grid */
        .overall-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--white); padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; border-bottom: 4px solid var(--primary); }
        .stat-card i { font-size: 30px; color: var(--primary); margin-bottom: 15px; }
        .stat-card h2 { font-size: 32px; font-weight: 900; }
        .stat-card p { font-size: 13px; font-weight: 700; color: #64748b; text-transform: uppercase; margin-top: 5px; }

        /* Individual Car Card Styling */
        .section-title { font-size: 24px; font-weight: 900; margin-bottom: 25px; padding-left: 15px; border-left: 5px solid var(--primary); }
        
        .ads-container { display: grid; grid-template-columns: 1fr; gap: 25px; }
        .car-performance-card {
            background: var(--white); border-radius: 24px; padding: 25px;
            display: grid; grid-template-columns: 180px 1fr 220px; gap: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04); align-items: center;
            border: 1px solid var(--border); transition: 0.3s;
        }
        .car-performance-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.08); }

        .car-img { width: 100%; height: 130px; border-radius: 15px; object-fit: cover; }
        
        .car-info h3 { font-size: 20px; font-weight: 800; margin-bottom: 15px; }
        .car-metrics { display: flex; gap: 25px; }
        .metric { display: flex; flex-direction: column; }
        .metric span { font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; }
        .metric b { font-size: 18px; color: var(--dark); }

        /* AI Rating System */
        .rating-box { text-align: center; border-left: 1px solid var(--border); padding-left: 20px; }
        .rating-score { font-size: 35px; font-weight: 900; color: var(--success); }
        .rating-label { font-size: 11px; font-weight: 800; color: #64748b; margin-top: 5px; }

        .action-btns { margin-top: 20px; display: flex; gap: 10px; }
        .btn { padding: 10px 15px; border-radius: 10px; font-weight: 700; font-size: 13px; cursor: pointer; text-decoration: none; border: none; display: flex; align-items: center; gap: 8px; }
        .btn-edit { background: #fef3c7; color: #92400e; }
        .btn-delete { background: #fee2e2; color: #b91c1c; }

        @media (max-width: 900px) {
            .car-performance-card { grid-template-columns: 1fr; text-align: center; }
            .car-metrics { justify-content: center; }
            .rating-box { border-left: none; border-top: 1px solid var(--border); padding-top: 20px; padding-left: 0; }
            .action-btns { justify-content: center; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <nav style="display: flex; gap: 20px; align-items: center;">
        <a href="index.html" style="text-decoration:none; color:var(--dark); font-weight:700;">Hem</a>
        <button onclick="logout()" style="background:var(--danger); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:700;">Logga ut</button>
    </nav>
</header>

<div class="container">
    <div class="overall-stats">
        <div class="stat-card"><i class="fa-solid fa-eye"></i><h2 id="totalViews">0</h2><p>Totala Visningar</p></div>
        <div class="stat-card"><i class="fa-solid fa-heart"></i><h2 id="totalFavs">0</h2><p>Sparade</p></div>
        <div class="stat-card"><i class="fa-solid fa-comments"></i><h2 id="totalMsgs">0</h2><p>Meddelanden</p></div>
    </div>

    <h2 class="section-title">Hantera Annonser & Analys</h2>
    <div id="adsList" class="ads-container">
        <p style="text-align:center; padding:50px;">Analyserar ditt konto...</p>
    </div>
</div>

<script type="module">
    import { db, auth } from './firebase-config.js';
    import { collection, query, where, getDocs, doc, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    onAuthStateChanged(auth, (user) => {
        if (user) {
            loadAdvancedDashboard(user.uid);
        } else {
            window.location.href = "login.html";
        }
    });

    async function loadAdvancedDashboard(uid) {
        const adsContainer = document.getElementById('adsList');
        const q = query(collection(db, "cars"), where("sellerId", "==", uid), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        
        adsContainer.innerHTML = "";
        let tViews = 0, tFavs = 0, tMsgs = 0;

        if (snap.empty) {
            adsContainer.innerHTML = "<p style='text-align:center;'>Du har inga aktiva annonser.</p>";
            return;
        }

        for (const adDoc of snap.docs) {
            const car = adDoc.data();
            const carId = adDoc.id;

            // Fetch message count from 'chats' collection
            const msgQ = query(collection(db, "chats"), where("adId", "==", carId));
            const msgSnap = await getDocs(msgQ);
            const msgCount = msgSnap.size;

            const views = car.views || 0;
            const favs = car.favoritesCount || 0;

            tViews += views; tFavs += favs; tMsgs += msgCount;

            // Electronic Rating Logic (Custom Score)
            let score = 0;
            if (views > 0) score = Math.min(100, Math.round((views * 0.1) + (favs * 2) + (msgCount * 5)));
            let scoreColor = score > 70 ? "#22c55e" : (score > 40 ? "#f59e0b" : "#ef4444");

            const card = document.createElement('div');
            card.className = 'car-performance-card';
            card.id = `car-${carId}`;
            card.innerHTML = `
                <img src="${car.images?.[0] || 'placeholder.jpg'}" class="car-img">
                <div class="car-info">
                    <h3>${car.brand} ${car.model}</h3>
                    <div class="car-metrics">
                        <div class="metric"><span>Visningar</span><b>${views}</b></div>
                        <div class="metric"><span>Favoriter</span><b>${favs}</b></div>
                        <div class="metric"><span>Meddelanden</span><b>${msgCount}</b></div>
                    </div>
                    <div class="action-btns">
                        <a href="edit-ad.html?id=${carId}" class="btn btn-edit"><i class="fa-solid fa-pen"></i> Redigera</a>
                        <button onclick="deleteAd('${carId}')" class="btn btn-delete"><i class="fa-solid fa-trash"></i> Radera</button>
                    </div>
                </div>
                <div class="rating-box">
                    <div class="rating-score" style="color: ${scoreColor}">${score}%</div>
                    <div class="rating-label">AD PERFORMANCE SCORE</div>
                    <div style="font-size: 10px; color: #94a3b8; margin-top:10px;">Baserat på interaktion</div>
                </div>
            `;
            adsContainer.appendChild(card);
        }

        document.getElementById('totalViews').innerText = tViews;
        document.getElementById('totalFavs').innerText = tFavs;
        document.getElementById('totalMsgs').innerText = tMsgs;
    }

    window.deleteAd = async (id) => {
        const confirm = await Swal.fire({
            title: 'Radera annons?',
            text: "Detta går inte att ångra!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            confirmButtonText: 'Ja, radera den'
        });
        if (confirm.isConfirmed) {
            await deleteDoc(doc(db, "cars", id));
            document.getElementById(`car-${id}`).remove();
            Swal.fire('Raderad!', 'Annonsen har tagits bort.', 'success');
        }
    };

    window.logout = () => signOut(auth).then(() => location.href="login.html");
</script>

</body>
</html>

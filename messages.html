<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mina Meddelanden | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        body { background: var(--bg); height: 100vh; display: flex; flex-direction: column; margin: 0; font-family: 'Inter', sans-serif; overflow: hidden; }
        .app-container { display: flex; flex: 1; overflow: hidden; background: white; max-width: 1400px; margin: 0 auto; width: 100%; position: relative; }
        .sidebar { width: 350px; border-right: 1px solid var(--border); overflow-y: auto; background: white; flex-shrink: 0; }
        .chat-window { flex: 1; display: flex; flex-direction: column; background: #fdfdfd; }
        @media (max-width: 768px) {
            .sidebar.hide-mobile { display: none !important; }
            .chat-window { display: none; }
            .chat-window.show-mobile { display: flex !important; width: 100%; z-index: 10; }
        }
        .header-chat { padding: 15px 20px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .back-btn { display: none; background: none; border: none; font-size: 18px; margin-right: 10px; cursor: pointer; }
        @media (max-width: 768px) { .back-btn { display: block; } }
        .msg-display { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 12px 18px; border-radius: 18px; max-width: 80%; font-size: 15px; }
        .sent { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: #e2e8f0; border-bottom-left-radius: 4px; }
        .chat-item { padding: 15px 20px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
        .chat-item.active { background: #fff7ed; border-left: 4px solid var(--primary); }
    </style>
</head>
<body>
<header style="background:white; padding:15px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
    <a href="index.html" style="text-decoration:none; font-weight:900; color:var(--dark); font-size:20px;">BIL<span>HK</span></a>
    <a href="my-account.html" style="text-decoration:none; font-weight:700; font-size:14px; color:var(--dark);">Mitt Konto</a>
</header>

<div class="app-container">
    <div class="sidebar" id="sidebarView">
        <div style="padding:20px; font-weight:900; border-bottom:1px solid var(--border);">Meddelanden</div>
        <div id="chatList"></div>
    </div>
    <div class="chat-window" id="chatWindowView">
        <div class="header-chat">
            <div style="display:flex; align-items:center;">
                <button onclick="closeChat()" class="back-btn"><i class="fa-solid fa-arrow-left"></i></button>
                <div id="activeChatHeader" style="font-weight:800; cursor:pointer; color:var(--dark);">Välj en konversation</div>
            </div>
        </div>
        <div class="msg-display" id="msgArea"></div>
        <div style="padding:15px; border-top:1px solid var(--border); display:flex; gap:10px; background:white;">
            <input type="text" id="msgInput" style="flex:1; padding:12px 20px; border-radius:30px; border:1px solid var(--border); outline:none;" placeholder="Skriv ett meddelande..." disabled>
            <button id="sendBtn" style="background:var(--primary); color:white; border:none; padding:10px 25px; border-radius:30px; font-weight:700; cursor:pointer;" disabled>Sänd</button>
        </div>
    </div>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { collection, query, where, onSnapshot, addDoc, serverTimestamp, orderBy, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let user = null, activeRoom = null;
    const urlParams = new URLSearchParams(window.location.search);
    const roomFromUrl = urlParams.get('chat');
    const nameFromUrl = urlParams.get('name');

    onAuthStateChanged(auth, (u) => { 
        if(u) { user = u; loadRooms(); } 
        else { window.location.href="login.html"; }
    });

    function loadRooms() {
        const q = query(collection(db, "chats"), where("participants", "array-contains", user.uid));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('chatList'); list.innerHTML = "";
            if (snap.empty) { list.innerHTML = "<div style='padding:20px; color:#94a3b8;'>Inga meddelanden än.</div>"; }
            
            snap.forEach(d => {
                const r = d.data();
                const div = document.createElement('div');
                div.className = `chat-item ${activeRoom === d.id ? 'active' : ''}`;
                const displayTitle = r.sellerId === user.uid ? `${r.carName} (Från: ${r.buyerName})` : r.carName;
                div.innerHTML = `<strong>${displayTitle}</strong><br><small style="color:#64748b;">${r.lastMessage || '...'}</small>`;
                div.onclick = () => openRoom(d.id, displayTitle, r.carId);
                list.appendChild(div);
                
                // فتح المحادثة تلقائياً إذا جاء المستخدم من صفحة التفاصيل
                if (roomFromUrl === d.id && !activeRoom) openRoom(d.id, displayTitle, r.carId);
            });
        });
    }

    window.openRoom = (id, name, carId) => {
        activeRoom = id;
        const header = document.getElementById('activeChatHeader');
        header.innerText = name;
        // جعل العنوان يفتح صفحة تفاصيل السيارة
        header.onclick = () => window.location.href = `details.html?id=${carId || id.split('_').pop()}`;
        
        document.getElementById('msgInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('chatWindowView').classList.add('show-mobile');
        document.getElementById('sidebarView').classList.add('hide-mobile');

        const q = query(collection(db, `chats/${id}/messages`), orderBy("createdAt", "asc"));
        onSnapshot(q, (snap) => {
            const area = document.getElementById('msgArea'); area.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                const div = document.createElement('div');
                div.className = `bubble ${m.senderId === user.uid ? 'sent' : 'received'}`;
                div.innerText = m.text;
                area.appendChild(div);
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    window.closeChat = () => {
        document.getElementById('chatWindowView').classList.remove('show-mobile');
        document.getElementById('sidebarView').classList.remove('hide-mobile');
        activeRoom = null;
    }

    document.getElementById('sendBtn').onclick = async () => {
        const input = document.getElementById('msgInput'); const text = input.value.trim();
        if(!text || !activeRoom) return;
        input.value = "";
        await addDoc(collection(db, `chats/${activeRoom}/messages`), { senderId: user.uid, text, createdAt: serverTimestamp() });
        await setDoc(doc(db, "chats", activeRoom), { lastMessage: text, updatedAt: serverTimestamp() }, { merge: true });
    };

    document.getElementById('msgInput').onkeypress = (e) => { if (e.key === 'Enter') document.getElementById('sendBtn').click(); };
</script>
</body>
</html>

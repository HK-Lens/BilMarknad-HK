<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mina Meddelanden | BILHK</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; --danger: #ef4444; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
        }

        /* Main Layout */
        .app-container { 
            display: flex; 
            flex: 1; 
            overflow: hidden; 
            max-width: 1400px; 
            margin: 0 auto; 
            width: 100%; 
            background: white; 
            border-left: 1px solid var(--border); 
            border-right: 1px solid var(--border); 
        }

        /* Sidebar Styling */
        .sidebar { 
            width: 360px; 
            border-right: 1px solid var(--border); 
            overflow-y: auto; 
            flex-shrink: 0; 
            background: #fff; 
            display: flex;
            flex-direction: column;
        }

        .sidebar-header { 
            padding: 25px 20px; 
            font-weight: 900; 
            font-size: 1.3rem; 
            border-bottom: 2px solid var(--bg); 
            position: sticky; 
            top: 0; 
            background: white; 
            z-index: 10; 
        }

        .chat-list { flex: 1; overflow-y: auto; }

        /* Chat Item Layout */
        .chat-item { 
            position: relative; 
            padding: 20px; 
            border-bottom: 1px solid #f1f5f9; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: all 0.25s ease;
        }

        .chat-item:hover { background: #f8fafc; }
        .chat-item.active { background: #fff7ed; border-left: 6px solid var(--primary); }

        .chat-content { flex: 1; min-width: 0; }
        .chat-content strong { display: block; font-size: 15px; color: var(--dark); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-content small { color: #64748b; font-size: 12px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Delete Chat Button in Sidebar */
        .delete-chat-btn {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            color: #cbd5e1;
            transition: 0.3s;
            margin-left: 10px;
            flex-shrink: 0;
        }
        .delete-chat-btn:hover { background: #fee2e2; color: var(--danger); transform: scale(1.1); }

        /* Chat Window Area */
        .chat-window { flex: 1; display: flex; flex-direction: column; background: #ffffff; position: relative; }
        
        .chat-header {
            padding: 15px 25px;
            border-bottom: 1px solid var(--border);
            background: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .msg-display { 
            flex: 1; 
            padding: 25px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background: #f9fafb; 
        }

        /* Bubbles and Delete Message Logic */
        .bubble { 
            position: relative; 
            padding: 12px 18px; 
            border-radius: 20px; 
            max-width: 75%; 
            font-size: 14.5px; 
            line-height: 1.5; 
            word-wrap: break-word;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .sent { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: white; border: 1px solid var(--border); border-bottom-left-radius: 4px; }

        /* Individual Message Delete Button */
        .msg-del {
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--danger);
            color: white;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            cursor: pointer;
            opacity: 0;
            transition: 0.2s;
            border: 2px solid white;
            z-index: 5;
        }
        .bubble.sent:hover .msg-del { opacity: 1; }

        .input-box { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 12px; background: white; }
        input { flex: 1; padding: 14px 22px; border-radius: 30px; border: 1px solid var(--border); outline: none; font-size: 15px; }
        
        .send-btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 12px 30px; 
            border-radius: 30px; 
            font-weight: 900; 
            cursor: pointer; 
            transition: 0.2s; 
        }
        .send-btn:hover { background: #e07210; transform: translateY(-1px); }

        .timestamp { font-size: 9px; opacity: 0.6; margin-top: 5px; display: block; text-align: right; }

        @media (max-width: 768px) {
            .sidebar { width: 100%; }
            .sidebar.hide-mobile { display: none !important; }
            .chat-window { display: none; }
            .chat-window.show-mobile { display: flex !important; width: 100%; position: absolute; height: 100%; z-index: 100; }
        }
    </style>
</head>
<body>

<header style="background:white; padding:15px 5%; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
    <a href="index.html" style="text-decoration:none; font-weight:900; color:var(--dark); font-size:24px;">BIL<span>HK</span></a>
    <div id="userEmail" style="font-size:12px; font-weight:700; color:#64748b;"></div>
</header>

<div class="app-container">
    <div class="sidebar" id="sidebarArea">
        <div class="sidebar-header">Konversationer</div>
        <div class="chat-list" id="chatList"></div>
    </div>
    
    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            <div style="display:flex; align-items:center;">
                <button onclick="closeChatMobile()" style="background:none; border:none; font-size:18px; margin-right:15px; cursor:pointer;"><i class="fa-solid fa-arrow-left"></i></button>
                <div id="activeTitle" style="font-weight:900;">Välj en chatt</div>
            </div>
        </div>
        
        <div class="msg-display" id="msgArea">
            <div style="text-align:center; padding-top:100px; color:#94a3b8;">
                <i class="fa-regular fa-comment-dots" style="font-size:60px; margin-bottom:20px;"></i>
                <p>Ingen vald konversation</p>
            </div>
        </div>
        
        <div class="input-box">
            <input type="text" id="msgInput" placeholder="Skriv ett meddelande..." disabled>
            <button id="sendBtn" class="send-btn" disabled><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { 
        collection, query, where, onSnapshot, addDoc, serverTimestamp, 
        orderBy, doc, setDoc, getDoc, deleteDoc, updateDoc, arrayRemove 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let user = null, activeRoom = null;

    onAuthStateChanged(auth, (u) => { 
        if(u) { 
            user = u; 
            document.getElementById('userEmail').innerText = u.email;
            loadRooms(); 
        } else { 
            window.location.href="login.html"; 
        }
    });

    // 🔴 حذف الدردشة بالكامل من واجهتك فقط
    window.deleteFullChat = async (e, roomId) => {
        e.stopPropagation();
        const result = await Swal.fire({
            title: 'Radera konversation?',
            text: "Denna chatt försvinner för dig, men mottagaren har kvar sin kopia.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            confirmButtonText: 'Ja, radera',
            cancelButtonText: 'Avbryt'
        });

        if (result.isConfirmed) {
            try {
                const chatRef = doc(db, "chats", roomId);
                const snap = await getDoc(chatRef);
                if (snap.exists()) {
                    const participants = snap.data().participants;
                    if (participants.length <= 1) {
                        await deleteDoc(chatRef);
                    } else {
                        // إزالتك برمجياً من المصفوفة لإخفاء الدردشة عنك تماماً
                        await updateDoc(chatRef, { participants: arrayRemove(user.uid) });
                    }
                }
                if (activeRoom === roomId) {
                    activeRoom = null;
                    document.getElementById('msgArea').innerHTML = "Chatten raderades.";
                    document.getElementById('msgInput').disabled = true;
                    document.getElementById('sendBtn').disabled = true;
                }
                Swal.fire('Raderad!', 'Konversationen har tagits bort.', 'success');
            } catch (err) {
                console.error("Delete Error:", err);
            }
        }
    };

    // 🗑️ حذف رسالة فردية مرسلة من قبلك
    window.deleteMessage = async (msgId) => {
        try {
            await deleteDoc(doc(db, `chats/${activeRoom}/messages`, msgId));
        } catch (err) {
            console.error("Message delete failed:", err);
        }
    };

    function loadRooms() {
        const q = query(collection(db, "chats"), where("participants", "array-contains", user.uid), orderBy("updatedAt", "desc"));
        onSnapshot(q, snap => {
            const list = document.getElementById('chatList');
            list.innerHTML = "";
            snap.forEach(d => {
                const r = d.data();
                const title = r.sellerId === user.uid ? `${r.carName} (Köpare)` : r.carName;
                const item = document.createElement('div');
                item.className = `chat-item ${activeRoom === d.id ? 'active' : ''}`;
                item.innerHTML = `
                    <div class="chat-content" onclick="openRoom('${d.id}', '${title}')">
                        <strong>${title}</strong>
                        <small>${r.lastMessage || 'Inga meddelanden'}</small>
                    </div>
                    <div class="delete-chat-btn" onclick="deleteFullChat(event, '${d.id}')">
                        <i class="fa-solid fa-trash-can"></i>
                    </div>`;
                list.appendChild(item);
            });
        });
    }

    window.openRoom = (id, name) => {
        activeRoom = id;
        document.getElementById('msgInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('activeTitle').innerText = name;
        document.getElementById('chatWindow').classList.add('show-mobile');
        document.getElementById('sidebarArea').classList.add('hide-mobile');

        onSnapshot(query(collection(db, `chats/${id}/messages`), orderBy("createdAt", "asc")), snap => {
            const area = document.getElementById('msgArea');
            area.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                const isSent = m.senderId === user.uid;
                const div = document.createElement('div');
                div.className = `bubble ${isSent ? 'sent' : 'received'}`;
                div.innerHTML = `
                    ${isSent ? `<div class="msg-del" onclick="deleteMessage('${d.id}')">×</div>` : ''}
                    ${m.text}
                    <span class="timestamp">${m.createdAt?.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) || ''}</span>
                `;
                area.appendChild(div);
            });
            area.scrollTop = area.scrollHeight;
        });
    };

    window.closeChatMobile = () => {
        document.getElementById('chatWindow').classList.remove('show-mobile');
        document.getElementById('sidebarArea').classList.remove('hide-mobile');
    };

    document.getElementById('sendBtn').onclick = async () => {
        const input = document.getElementById('msgInput'), text = input.value.trim();
        if(!text) return; input.value = "";
        
        await addDoc(collection(db, `chats/${activeRoom}/messages`), {
            senderId: user.uid,
            text: text,
            createdAt: serverTimestamp()
        });
        
        await setDoc(doc(db, "chats", activeRoom), {
            lastMessage: text,
            updatedAt: serverTimestamp()
        }, { merge: true });
    };
</script>
</body>
</html>

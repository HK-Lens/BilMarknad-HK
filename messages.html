<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meddelanden | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #f58220; 
            --dark: #0f172a; 
            --bg: #f0f2f5; 
            --white: #ffffff;
            --border: #e4e6eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); height: 100vh; overflow: hidden; }

        /* --- Navigationsfält --- */
        header {
            background: var(--white);
            padding: 10px 2%;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }
        .logo { text-decoration: none; font-size: 20px; font-weight: 900; color: var(--dark); }
        .logo span { color: var(--primary); }

        /* --- Layout --- */
        .messenger-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            height: calc(100vh - 60px);
            background: var(--white);
        }

        /* --- Vänster: Inbox Lista --- */
        .inbox-sidebar {
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .inbox-header { padding: 20px; font-size: 24px; font-weight: 800; border-bottom: 1px solid var(--border); }
        
        .thread-item {
            padding: 15px 20px;
            border-bottom: 1px solid #f0f2f5;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .thread-item:hover { background: #f5f6f7; }
        .thread-item.active { background: #ebf5ff; border-right: 4px solid var(--primary); }
        .thread-item .car-title { font-weight: 700; color: var(--dark); font-size: 14px; }
        .thread-item .last-msg { font-size: 13px; color: #65676b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .thread-item .time { font-size: 11px; color: #8a8d91; align-self: flex-end; }

        /* --- Höger: Chat View --- */
        .chat-area { display: flex; flex-direction: column; background: #fff; position: relative; }
        
        .chat-header {
            padding: 15px 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
        }
        .chat-header h3 { font-size: 16px; font-weight: 800; }

        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #f0f2f5;
        }

        .bubble {
            max-width: 65%;
            padding: 10px 15px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            position: relative;
        }
        .bubble.received { align-self: flex-start; background: var(--white); color: var(--dark); border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .bubble.sent { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }

        /* --- Input Area --- */
        .input-bar {
            padding: 15px 20px;
            background: var(--white);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .input-bar input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 20px;
            border: 1px solid #e4e6eb;
            background: #f0f2f5;
            outline: none;
        }
        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
        }

        /* --- Empty State --- */
        .empty-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #8a8d91;
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <a href="my-account.html" style="text-decoration:none; font-size:14px; color:var(--dark); font-weight:600;">Tillbaka till konto</a>
</header>

<div class="messenger-container">
    <div class="inbox-sidebar" id="inboxList">
        <div class="inbox-header">Chatt</div>
        <div id="threadsContainer">
            <p style="text-align:center; padding:20px; color:#999;">Laddar...</p>
        </div>
    </div>

    <div class="chat-area" id="chatArea">
        <div id="noChat" class="empty-view">
            <p>Välj en konversation för att se meddelanden</p>
        </div>

        <div id="activeChat" style="display:none; flex-direction:column; height:100%;">
            <div class="chat-header">
                <div>
                    <h3 id="currentPartnerName">Namn</h3>
                    <span id="currentCarTitle" style="font-size:12px; color:var(--primary); font-weight:700;">Bil</span>
                </div>
            </div>
            <div class="messages-container" id="messagesDisplay"></div>
            <div class="input-bar">
                <input type="text" id="replyField" placeholder="Skriv ett meddelande...">
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { db, auth } from './firebase-config.js';
    import { collection, query, where, addDoc, serverTimestamp, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    let currentUser = null;
    let selectedThreadId = null;
    let chatPartner = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            initMessenger();
        } else {
            window.location.href = "login.html";
        }
    });

    function initMessenger() {
        // جلب الرسائل وتنظيمها في "خيوط" محادثة
        const q = query(collection(db, "messages"), orderBy("createdAt", "desc"));
        
        onSnapshot(q, (snap) => {
            const threads = {};
            snap.docs.forEach(doc => {
                const data = doc.data();
                if (data.senderId === currentUser.uid || data.receiverId === currentUser.uid) {
                    // إنشاء معرف فريد يجمع بين الشخصين والسيارة
                    const threadId = [data.senderId, data.receiverId].sort().join("_") + "_" + (data.carId || data.carTitle);
                    
                    if (!threads[threadId]) {
                        threads[threadId] = {
                            id: threadId,
                            carTitle: data.carTitle,
                            lastMsg: data.message,
                            time: data.createdAt?.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                            partnerId: data.senderId === currentUser.uid ? data.receiverId : data.senderId,
                            partnerName: data.senderId === currentUser.uid ? "Intresserad köpare" : data.senderName,
                            partnerEmail: data.senderId === currentUser.uid ? data.receiverEmail : data.senderEmail
                        };
                    }
                }
            });

            renderThreads(Object.values(threads));
        });
    }

    function renderThreads(threads) {
        const container = document.getElementById('threadsContainer');
        if (threads.length === 0) {
            container.innerHTML = "<p style='padding:20px; text-align:center;'>Inga meddelanden än.</p>";
            return;
        }

        container.innerHTML = threads.map(t => `
            <div class="thread-item ${selectedThreadId === t.id ? 'active' : ''}" 
                 onclick="openChat('${t.id}', '${t.partnerId}', '${t.partnerName}', '${t.carTitle}', '${t.partnerEmail}')">
                <div style="display:flex; justify-content:space-between;">
                    <span class="car-title">${t.carTitle}</span>
                    <span class="time">${t.time || ''}</span>
                </div>
                <div class="last-msg">${t.lastMsg}</div>
                <div style="font-size:11px; color:#999;">${t.partnerName}</div>
            </div>
        `).join('');
    }

    window.openChat = (id, partnerId, partnerName, carTitle, partnerEmail) => {
        selectedThreadId = id;
        chatPartner = { id: partnerId, name: partnerName, title: carTitle, email: partnerEmail };

        document.getElementById('noChat').style.display = 'none';
        document.getElementById('activeChat').style.display = 'flex';
        document.getElementById('currentPartnerName').innerText = partnerName;
        document.getElementById('currentCarTitle').innerText = carTitle;

        // تحميل الرسائل لهذه المحادثة فقط
        const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));
        onSnapshot(q, (snap) => {
            const display = document.getElementById('messagesDisplay');
            const msgs = snap.docs
                .map(d => d.data())
                .filter(m => {
                    const tid = [m.senderId, m.receiverId].sort().join("_") + "_" + (m.carId || m.carTitle);
                    return tid === id;
                });

            display.innerHTML = msgs.map(m => `
                <div class="bubble ${m.senderId === currentUser.uid ? 'sent' : 'received'}">
                    ${m.message}
                </div>
            `).join('');
            display.scrollTop = display.scrollHeight;
        });
    };

    document.getElementById('sendBtn').onclick = async () => {
        const input = document.getElementById('replyField');
        if (!input.value.trim() || !chatPartner) return;

        try {
            await addDoc(collection(db, "messages"), {
                senderId: currentUser.uid,
                senderName: currentUser.displayName || "Säljare",
                senderEmail: currentUser.email,
                receiverId: chatPartner.id,
                receiverEmail: chatPartner.email,
                carTitle: chatPartner.title,
                message: input.value,
                createdAt: serverTimestamp()
            });
            input.value = "";
        } catch (err) { console.error(err); }
    };
</script>
</body>
</html>

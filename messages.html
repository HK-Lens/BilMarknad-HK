<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chatt | BILHK Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --white: #ffffff; --border: #e2e8f0; }
        body { background: var(--bg); height: 100vh; display: flex; flex-direction: column; margin: 0; font-family: 'Inter', sans-serif; }
        header { background: white; padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .app-container { display: flex; flex: 1; overflow: hidden; background: white; max-width: 1400px; margin: 0 auto; width: 100%; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        .sidebar { width: 320px; border-right: 1px solid var(--border); overflow-y: auto; background: var(--white); }
        .chat-window { flex: 1; display: flex; flex-direction: column; background: #fdfdfd; }
        .msg-display { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .bubble { padding: 12px 18px; border-radius: 20px; max-width: 80%; font-size: 15px; line-height: 1.4; }
        .sent { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: #e2e8f0; border-bottom-left-radius: 4px; color: var(--dark); }
        .input-area { padding: 15px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: white; }
        input { flex: 1; padding: 15px 20px; border-radius: 30px; border: 1px solid var(--border); outline: none; font-size: 15px; }
        .btn-send { background: var(--primary); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .chat-item { padding: 15px 20px; border-bottom: 1px solid #eee; cursor: pointer; }
        .chat-item.active { background: #fff7ed; border-left: 4px solid var(--primary); }
        @media (max-width: 768px) { .sidebar { display: none; } } /* إخفاء في الهاتف للتركيز على الدردشة */
    </style>
</head>
<body>
<header>
    <a href="index.html" style="text-decoration:none; font-size:22px; font-weight:900; color:var(--dark);">BIL<span style="color:var(--primary);">HK</span></a>
    <a href="dashboard.html" style="text-decoration:none; color:var(--dark); font-weight:700; font-size:14px;">Tillbaka</a>
</header>
<div class="app-container">
    <div class="sidebar">
        <div style="padding:20px; font-weight:900; border-bottom:1px solid var(--border);">Meddelanden</div>
        <div id="chatList"></div>
    </div>
    <div class="chat-window">
        <div id="activeChatHeader" style="padding:15px 20px; background:white; border-bottom:1px solid var(--border); font-weight:700;">Välj en chatt</div>
        <div class="msg-display" id="msgArea"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Skriv ett meddelande...">
            <button id="sendBtn" class="btn-send"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>
</div>
<script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { collection, query, where, onSnapshot, addDoc, serverTimestamp, orderBy, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let user = null, activeRoom = null;

    onAuthStateChanged(auth, (u) => { 
        if(u) { user = u; loadRooms(); } 
        else { window.location.href = "login.html"; } 
    });

    function loadRooms() {
        const q = query(collection(db, "chats"), where("participants", "array-contains", user.uid), orderBy("updatedAt", "desc"));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('chatList'); list.innerHTML = "";
            snap.forEach(d => {
                const room = d.data();
                const div = document.createElement('div'); 
                div.className = `chat-item ${activeRoom === d.id ? 'active' : ''}`;
                
                // التمييز الذكي: عرض اسم المشتري إذا كنت أنت البائع
                let displayTitle = room.carName;
                if (room.sellerId && user.uid === room.sellerId && room.buyerName) {
                    displayTitle = `${room.carName} (Från: ${room.buyerName})`;
                }

                div.innerHTML = `<strong>${displayTitle}</strong><br><small style="color:#64748b;">${room.lastMessage || '...'}</small>`;
                div.onclick = () => openRoom(d.id, displayTitle);
                list.appendChild(div);
                
                if(!activeRoom) openRoom(d.id, displayTitle);
            });
        });
    }

    function openRoom(id, name) {
        activeRoom = id;
        document.getElementById('activeChatHeader').innerText = name;
        const q = query(collection(db, `chats/${id}/messages`), orderBy("createdAt", "asc"));
        onSnapshot(q, (snap) => {
            const area = document.getElementById('msgArea'); area.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                const div = document.createElement('div'); 
                div.className = `bubble ${m.senderId === user.uid ? 'sent' : 'received'}`;
                div.innerText = m.text; 
                area.appendChild(div);
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    document.getElementById('sendBtn').onclick = async () => {
        const input = document.getElementById('msgInput'); 
        const text = input.value.trim();
        
        if(!activeRoom) return alert("Fel: Ingen chatt är vald!");
        if(!text) return;

        input.value = "";
        const btn = document.getElementById('sendBtn');
        btn.disabled = true;

        try {
            await addDoc(collection(db, `chats/${activeRoom}/messages`), { 
                senderId: user.uid, 
                text: text, 
                createdAt: serverTimestamp() 
            });
            
            await setDoc(doc(db, "chats", activeRoom), { 
                lastMessage: text, 
                updatedAt: serverTimestamp() 
            }, { merge: true });

        } catch (error) {
            alert("Sändningsfel (Database): " + error.message);
            console.error(error);
        } finally {
            btn.disabled = false;
        }
    };
</script>
</body>
</html>

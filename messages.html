<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mina Meddelanden | BILHK</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root { 
            --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; 
            --danger: #ef4444; --success: #22c55e;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { background: var(--bg); height: 100vh; display: flex; flex-direction: column; font-family: 'Inter', sans-serif; overflow: hidden; color: var(--dark); }

        header { background: white; padding: 18px 5%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        header .logo { text-decoration: none; font-weight: 900; color: var(--dark); font-size: 26px; }
        header .logo span { color: var(--primary); }
        #userStatus { font-size: 12px; font-weight: 700; color: #64748b; background: #f1f5f9; padding: 6px 12px; border-radius: 50px; }

        .app-container { display: flex; flex: 1; overflow: hidden; max-width: 1500px; margin: 0 auto; width: 100%; background: white; position: relative; }

        .sidebar { width: 380px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: #fff; z-index: 200; }
        .sidebar-header { padding: 30px 20px; font-weight: 900; font-size: 1.4rem; border-bottom: 2px solid var(--bg); background: white; }
        .chat-list { flex: 1; overflow-y: auto; }

        .chat-item { position: relative; padding: 22px 20px; border-bottom: 1px solid #f1f5f9; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .chat-item:hover { background: #f8fafc; }
        .chat-item.active { background: #fff7ed; border-left: 6px solid var(--primary); }

        .chat-content { flex: 1; min-width: 0; }
        .chat-content strong { display: block; font-size: 15px; font-weight: 800; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chat-content small { color: #64748b; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }

        .delete-chat-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 12px; color: #cbd5e1; transition: 0.3s; margin-left: 10px; }
        .delete-chat-btn:hover { background: #fee2e2; color: var(--danger); }

        .chat-window { flex: 1; display: flex; flex-direction: column; background: #ffffff; position: relative; }
        .chat-header { padding: 20px 25px; border-bottom: 1px solid var(--border); background: white; display: flex; align-items: center; }

        .msg-display { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #fdfdfd; }
        
        .bubble { position: relative; padding: 14px 18px; border-radius: 22px; max-width: 75%; font-size: 15px; line-height: 1.5; word-wrap: break-word; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .sent { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: white; border: 1px solid var(--border); border-bottom-left-radius: 4px; }

        .msg-del-btn { position: absolute; top: -10px; right: -10px; background: var(--danger); color: white; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; opacity: 0; border: 2px solid white; transition: 0.2s; }
        .bubble.sent:hover .msg-del-btn { opacity: 1; }

        .input-box { padding: 25px; border-top: 1px solid var(--border); display: flex; gap: 15px; background: white; align-items: center; }
        #msgInput { flex: 1; padding: 16px 24px; border-radius: 35px; border: 1px solid var(--border); outline: none; font-size: 15px; background: #f8fafc; }
        #msgInput:focus { background: white; border-color: var(--primary); }
        
        .send-btn { background: var(--primary); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .send-btn:hover { transform: scale(1.1); }
        .send-btn:disabled { background: #cbd5e1; cursor: not-allowed; }

        .timestamp { font-size: 9px; opacity: 0.7; margin-top: 5px; display: block; text-align: right; }

        @media (max-width: 850px) {
            .sidebar { width: 100%; }
            .sidebar.hide-mobile { display: none !important; }
            .chat-window { display: none; }
            .chat-window.show-mobile { display: flex !important; width: 100%; position: absolute; height: 100%; z-index: 500; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <div id="userStatus">Laddar...</div>
</header>

<div class="app-container">
    <div class="sidebar" id="sidebarArea">
        <div class="sidebar-header"><i class="fa-solid fa-comments"></i> Meddelanden</div>
        <div class="chat-list" id="chatList"></div>
    </div>
    
    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            <button onclick="closeChatMobile()" style="background:none; border:none; font-size:20px; margin-right:15px; cursor:pointer;"><i class="fa-solid fa-chevron-left"></i></button>
            <div id="activeTitle" style="font-weight:900;">Välj en chatt</div>
        </div>
        
        <div class="msg-display" id="msgArea">
            <div style="text-align:center; padding-top:100px; color:#94a3b8;">
                <i class="fa-regular fa-comment-dots" style="font-size:60px; margin-bottom:20px;"></i>
                <p>Klicka på en konversation för att skriva</p>
            </div>
        </div>
        
        <div class="input-box">
            <input type="text" id="msgInput" placeholder="Skriv ditt medدلاند هير..." disabled>
            <button id="sendBtn" class="send-btn" disabled onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { collection, query, where, onSnapshot, addDoc, serverTimestamp, orderBy, doc, getDoc, deleteDoc, updateDoc, arrayRemove, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let user = null;
    let activeRoom = null;
    let unsubMsg = null;

    onAuthStateChanged(auth, (u) => { 
        if(u) { user = u; document.getElementById('userStatus').innerText = u.email; loadRooms(); initIncoming(); } 
        else { window.location.href="login.html"; }
    });

    // 💡 تفعيل الكتابة (الحل الجذري)
    function unlockInput() {
        const input = document.getElementById('msgInput');
        const btn = document.getElementById('sendBtn');
        input.disabled = false;
        btn.disabled = false;
        input.focus();
    }

    // 🔴 حذف الدردشة
    window.deleteFullChat = async (e, roomId) => {
        e.stopPropagation();
        const res = await Swal.fire({
            title: 'Radera chatt?',
            text: "Den tas bort från din lista.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'Ja, radera'
        });
        if (res.isConfirmed) {
            try {
                const ref = doc(db, "chats", roomId);
                const snap = await getDoc(ref);
                if (snap.exists()) {
                    const p = snap.data().participants;
                    if (p.length <= 1) await deleteDoc(ref);
                    else await updateDoc(ref, { participants: arrayRemove(user.uid) });
                }
                if (activeRoom === roomId) location.reload();
            } catch (err) { console.error(err); }
        }
    };

    // 🗑️ حذف رسالة
    window.deleteSingleMsg = async (id) => {
        try { await deleteDoc(doc(db, `chats/${activeRoom}/messages`, id)); } catch (e) {}
    };

    function loadRooms() {
        const q = query(collection(db, "chats"), where("participants", "array-contains", user.uid), orderBy("updatedAt", "desc"));
        onSnapshot(q, snap => {
            const list = document.getElementById('chatList');
            list.innerHTML = "";
            snap.forEach(d => {
                const r = d.data();
                const title = r.sellerId === user.uid ? `${r.carName} (Köpare)` : r.carName;
                const div = document.createElement('div');
                div.className = `chat-item ${activeRoom === d.id ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="chat-content" onclick="openRoom('${d.id}', '${title}')">
                        <strong>${title}</strong><small>${r.lastMessage || '...'}</small>
                    </div>
                    <div class="delete-chat-btn" onclick="deleteFullChat(event, '${d.id}')"><i class="fa-solid fa-trash-can"></i></div>`;
                list.appendChild(div);
            });
        });
    }

    async function initIncoming() {
        const urlParams = new URLSearchParams(window.location.search);
        const sId = urlParams.get('sellerId'), cId = urlParams.get('carId'), title = urlParams.get('title');
        if (sId && cId) {
            const rId = [user.uid, sId].sort().join('_') + '_' + cId;
            activeRoom = rId;
            openRoom(rId, title);
            const snap = await getDoc(doc(db, "chats", rId));
            if (!snap.exists()) {
                await setDoc(doc(db, "chats", rId), {
                    carId: cId, carName: title, participants: [user.uid, sId],
                    sellerId: sId, buyerId: user.uid, buyerName: user.email.split('@')[0],
                    lastMessage: "", updatedAt: serverTimestamp()
                });
            }
        }
    }

    window.openRoom = (id, name) => {
        if (unsubMsg) unsubMsg();
        activeRoom = id;
        unlockInput(); // تفعيل الحقول فوراً هنا
        document.getElementById('activeTitle').innerText = name;
        document.getElementById('chatWindow').classList.add('show-mobile');

        const q = query(collection(db, `chats/${id}/messages`), orderBy("createdAt", "asc"));
        unsubMsg = onSnapshot(q, snap => {
            const area = document.getElementById('msgArea'); area.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                const isMine = m.senderId === user.uid;
                const div = document.createElement('div');
                div.className = `bubble ${isMine ? 'sent' : 'received'}`;
                div.innerHTML = `
                    ${isMine ? `<div class="msg-del-btn" onclick="deleteSingleMsg('${d.id}')">×</div>` : ''}
                    ${m.text}
                    <span class="timestamp">${m.createdAt?.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) || '...'}</span>`;
                area.appendChild(div);
            });
            area.scrollTop = area.scrollHeight;
        }, (err) => {
            console.error("Rules Error:", err);
            // إذا فشل Snapshot بسبب القواعد، نحاول تفعيل الحقل على أي حال
            unlockInput();
        });
    };

    window.sendMessage = async () => {
        const input = document.getElementById('msgInput'), text = input.value.trim();
        if(!text) return; input.value = "";
        try {
            await addDoc(collection(db, `chats/${activeRoom}/messages`), { senderId: user.uid, text, createdAt: serverTimestamp() });
            await updateDoc(doc(db, "chats", activeRoom), { lastMessage: text, updatedAt: serverTimestamp() });
        } catch (e) { console.error(e); }
    };

    window.closeChatMobile = () => {
        document.getElementById('chatWindow').classList.remove('show-mobile');
    };

    document.getElementById('msgInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>

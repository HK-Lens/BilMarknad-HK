<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meddelanden | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #f58220; --dark: #0f172a; --bg: #f0f2f5; --white: #ffffff; --border: #e4e6eb;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); height: 100vh; overflow: hidden; }

        header { background: var(--white); padding: 0 4%; height: 65px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo { text-decoration: none; font-size: 22px; font-weight: 900; color: var(--dark); }
        .logo span { color: var(--primary); }

        .messenger-container { display: grid; grid-template-columns: 350px 1fr; height: calc(100vh - 65px); }

        /* Sidebar */
        .sidebar { background: var(--white); border-right: 1px solid var(--border); overflow-y: auto; }
        .sidebar-header { padding: 20px; font-size: 22px; font-weight: 900; border-bottom: 1px solid var(--border); }
        .thread-item { padding: 15px 20px; border-bottom: 1px solid #f0f2f5; cursor: pointer; transition: 0.2s; }
        .thread-item:hover { background: #f5f6f7; }
        .thread-item.active { background: #ebf5ff; border-right: 4px solid var(--primary); }
        .thread-car { font-weight: 800; font-size: 14px; }
        .thread-preview { font-size: 13px; color: #65676b; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Chat Area */
        .chat-area { display: flex; flex-direction: column; background: #fff; }
        .chat-header { padding: 15px 25px; border-bottom: 1px solid var(--border); background: #fff; }
        .messages-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #f0f2f5; }
        .bubble { max-width: 70%; padding: 10px 15px; border-radius: 18px; font-size: 14px; }
        .bubble.sent { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .bubble.received { align-self: flex-start; background: white; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }

        .input-bar { padding: 15px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .input-bar input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid var(--border); outline: none; }
        .send-btn { background: var(--dark); color: white; border: none; padding: 0 20px; border-radius: 25px; cursor: pointer; font-weight: 700; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">BIL<span>HK</span></a>
        <a href="my-account.html" style="text-decoration:none; font-weight:700; color:var(--dark);">Tillbaka till konto</a>
    </header>

    <div class="messenger-container">
        <div class="sidebar" id="threadsList">
            <div class="sidebar-header">Inbox</div>
            <div id="threadsContainer"></div>
        </div>

        <div class="chat-area">
            <div id="chatHeader" class="chat-header"><h3>Välj en chatt</h3></div>
            <div class="messages-box" id="messagesDisplay"></div>
            <div class="input-bar" id="inputArea" style="display:none;">
                <input type="text" id="msgInput" placeholder="Skriv ett svar...">
                <button id="sendBtn">Skicka</button>
            </div>
        </div>
    </div>

<script type="module">
    import { db, auth } from './firebase-config.js';
    import { collection, query, where, addDoc, serverTimestamp, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    let currentUser = null;
    let activeThread = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            loadThreads();
        } else { window.location.href = "login.html"; }
    });

    function loadThreads() {
        // جلب الرسائل حيث المستخدم مرسل أو مستقبل
        const q = query(collection(db, "messages"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snap) => {
            const threads = {};
            snap.docs.forEach(doc => {
                const m = doc.data();
                if (m.senderId === currentUser.uid || m.receiverId === currentUser.uid) {
                    const threadId = [m.senderId, m.receiverId].sort().join("_") + "_" + (m.carId || m.carTitle);
                    if (!threads[threadId]) {
                        threads[threadId] = { id: threadId, carTitle: m.carTitle, lastMsg: m.message, 
                            partnerId: m.senderId === currentUser.uid ? m.receiverId : m.senderId,
                            partnerEmail: m.senderId === currentUser.uid ? m.receiverEmail : m.senderEmail };
                    }
                }
            });
            renderThreads(Object.values(threads));
        });
    }

    function renderThreads(threads) {
        const container = document.getElementById('threadsContainer');
        container.innerHTML = threads.map(t => `
            <div class="thread-item" onclick="openChat('${t.id}', '${t.partnerId}', '${t.carTitle}', '${t.partnerEmail}')">
                <div class="thread-car">${t.carTitle}</div>
                <div class="thread-preview">${t.lastMsg}</div>
            </div>
        `).join('');
    }

    window.openChat = (threadId, pId, title, pEmail) => {
        activeThread = { threadId, pId, title, pEmail };
        document.getElementById('inputArea').style.display = 'flex';
        document.getElementById('chatHeader').innerHTML = `<h3>${title}</h3>`;
        
        const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));
        onSnapshot(q, (snap) => {
            const msgs = snap.docs.map(d => d.data()).filter(m => {
                const tid = [m.senderId, m.receiverId].sort().join("_") + "_" + (m.carId || m.carTitle);
                return tid === threadId;
            });
            document.getElementById('messagesDisplay').innerHTML = msgs.map(m => `
                <div class="bubble ${m.senderId === currentUser.uid ? 'sent' : 'received'}">${m.message}</div>
            `).join('');
            const box = document.getElementById('messagesDisplay');
            box.scrollTop = box.scrollHeight;
        });
    };

    document.getElementById('sendBtn').onclick = async () => {
        const input = document.getElementById('msgInput');
        if (!input.value.trim() || !activeThread) return;
        await addDoc(collection(db, "messages"), {
            senderId: currentUser.uid, senderName: "Säljare", senderEmail: currentUser.email,
            receiverId: activeThread.pId, receiverEmail: activeThread.pEmail,
            carTitle: activeThread.title, message: input.value, createdAt: serverTimestamp()
        });
        input.value = "";
    };
</script>
</body>
</html>

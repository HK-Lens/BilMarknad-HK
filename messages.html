<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chatt | BILHK Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --white: #ffffff; --border: #e2e8f0; }
        body { background: var(--bg); height: 100vh; display: flex; flex-direction: column; margin: 0; font-family: 'Inter', sans-serif; }
        header { background: white; padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        
        .app-container { display: flex; flex: 1; overflow: hidden; background: white; max-width: 1400px; margin: 0 auto; width: 100%; border-left: 1px solid var(--border); border-right: 1px solid var(--border); position: relative; }
        .sidebar { width: 350px; border-right: 1px solid var(--border); overflow-y: auto; background: var(--white); display: flex; flex-direction: column; }
        .chat-window { flex: 1; display: flex; flex-direction: column; background: #fdfdfd; }
        
        @media (max-width: 768px) {
            .sidebar { width: 100%; border-right: none; }
            .chat-window { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: none; }
            .chat-window.active-mobile { display: flex; }
        }
        
        .back-btn { display: none; background: none; border: none; font-size: 20px; color: var(--dark); cursor: pointer; padding-right: 15px; }
        @media (max-width: 768px) { .back-btn { display: inline-block; } }

        .msg-display { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .bubble { padding: 12px 18px; border-radius: 20px; max-width: 80%; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .sent { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: #e2e8f0; border-bottom-left-radius: 4px; color: var(--dark); }
        .input-area { padding: 15px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: white; }
        
        /* 💡 تنسيق الحقل والزر عند الإغلاق لمنع الخطأ */
        input { flex: 1; padding: 15px 20px; border-radius: 30px; border: 1px solid var(--border); outline: none; font-size: 15px; background: #f8fafc; }
        input:disabled { background: #e2e8f0; cursor: not-allowed; }
        .btn-send { background: var(--primary); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .btn-send:disabled { background: #cbd5e1; cursor: not-allowed; }
        
        .chat-item { padding: 20px; border-bottom: 1px solid #f1f5f9; cursor: pointer; display: flex; flex-direction: column; gap: 5px; }
        .chat-item.active { background: #fff7ed; border-left: 4px solid var(--primary); }
        .empty-state { margin: auto; color: #94a3b8; text-align: center; padding: 20px; }
    </style>
</head>
<body>
<header>
    <a href="index.html" style="text-decoration:none; font-size:22px; font-weight:900; color:var(--dark);">BIL<span style="color:var(--primary);">HK</span></a>
    <a href="dashboard.html" style="text-decoration:none; color:var(--dark); font-weight:700; font-size:14px;">Tillbaka</a>
</header>
<div class="app-container">
    <div class="sidebar" id="sidebarView">
        <div style="padding:20px; font-weight:900; border-bottom:1px solid var(--border); font-size: 18px;">Meddelanden</div>
        <div id="chatList" style="flex: 1; overflow-y: auto;">
            <div class="empty-state">Laddar...</div>
        </div>
    </div>
    <div class="chat-window" id="chatWindowView">
        <div style="padding:15px 20px; background:white; border-bottom:1px solid var(--border); display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.02);">
            <button class="back-btn" id="backBtn"><i class="fa-solid fa-arrow-left"></i></button>
            <div id="activeChatHeader" style="font-weight:800; font-size: 16px;">Ingen chatt vald</div>
        </div>
        <div class="msg-display" id="msgArea">
            <div class="empty-state">Välj en konversation från listan för att börja chatta.</div>
        </div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Välj en chatt först..." autocomplete="off" disabled>
            <button id="sendBtn" class="btn-send" disabled><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { collection, query, where, onSnapshot, addDoc, serverTimestamp, orderBy, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let user = null, activeRoom = null;
    
    // 💡 الخطة المزدوجة: قراءة الرابط أولاً، وإذا فشل نقرأ الذاكرة المحلية
    const urlParams = new URLSearchParams(window.location.search);
    const targetChatId = urlParams.get('chat') || localStorage.getItem('targetChat');
    const targetChatName = localStorage.getItem('targetChatName') || "Chatt";

    onAuthStateChanged(auth, (u) => { 
        if(u) { 
            user = u; 
            if (targetChatId) {
                window.openRoom(targetChatId, targetChatName);
                // مسح الذاكرة بعد الاستخدام
                localStorage.removeItem('targetChat');
                localStorage.removeItem('targetChatName');
            }
            loadRooms(); 
        } 
        else { window.location.href = "login.html"; } 
    });

    function loadRooms() {
        const q = query(collection(db, "chats"), where("participants", "array-contains", user.uid), orderBy("updatedAt", "desc"));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('chatList'); list.innerHTML = "";
            
            if(snap.empty) {
                list.innerHTML = "<div class='empty-state'>Inga meddelanden än.</div>";
                return;
            }

            snap.forEach(d => {
                const room = d.data();
                const div = document.createElement('div'); 
                div.className = `chat-item ${activeRoom === d.id ? 'active' : ''}`;
                div.setAttribute('data-id', d.id);
                
                let displayTitle = room.carName;
                if (room.sellerId && user.uid === room.sellerId && room.buyerName) {
                    displayTitle = `${room.carName} (Från: ${room.buyerName})`;
                }

                div.innerHTML = `<strong>${displayTitle}</strong><small style="color:#64748b; margin-top:4px;">${room.lastMessage || 'Skicka meddelande'}</small>`;
                div.onclick = () => window.openRoom(d.id, displayTitle);
                list.appendChild(div);
            });
        });
    }

    window.openRoom = function(id, name) {
        activeRoom = id;
        document.getElementById('activeChatHeader').innerText = name;
        
        // 💡 تفعيل حقل الكتابة وزر الإرسال عند اختيار الغرفة
        const inputField = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        inputField.disabled = false;
        sendBtn.disabled = false;
        inputField.placeholder = "Skriv ett meddelande...";

        // إظهار نافذة الدردشة للهواتف
        document.getElementById('chatWindowView').classList.add('active-mobile');

        // تمييز المحادثة النشطة في القائمة
        document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
        const clickedChat = document.querySelector(`.chat-item[data-id='${id}']`);
        if(clickedChat) clickedChat.classList.add('active');

        const q = query(collection(db, `chats/${id}/messages`), orderBy("createdAt", "asc"));
        onSnapshot(q, (snap) => {
            const area = document.getElementById('msgArea'); area.innerHTML = "";
            if(snap.empty) {
                area.innerHTML = "<div class='empty-state'>Skicka ditt första meddelande!</div>";
            }
            snap.forEach(d => {
                const m = d.data();
                const div = document.createElement('div'); 
                div.className = `bubble ${m.senderId === user.uid ? 'sent' : 'received'}`;
                div.innerText = m.text; 
                area.appendChild(div);
            });
            setTimeout(() => { area.scrollTop = area.scrollHeight; }, 100);
        });
    }

    // زر الرجوع في الهاتف
    document.getElementById('backBtn').onclick = () => {
        document.getElementById('chatWindowView').classList.remove('active-mobile');
        activeRoom = null; 
        
        // 💡 إعادة إقفال الحقل عند الخروج من الغرفة
        document.getElementById('msgInput').disabled = true;
        document.getElementById('sendBtn').disabled = true;
        document.getElementById('msgInput').placeholder = "Välj en chatt först...";
        document.getElementById('activeChatHeader').innerText = "Ingen chatt vald";
    };

    document.getElementById('sendBtn').onclick = async () => {
        const input = document.getElementById('msgInput'); 
        const text = input.value.trim();
        
        if(!activeRoom || !text) return;

        input.value = "";
        const btn = document.getElementById('sendBtn');
        btn.disabled = true;

        try {
            await addDoc(collection(db, `chats/${activeRoom}/messages`), { 
                senderId: user.uid, 
                text: text, 
                createdAt: serverTimestamp() 
            });
            
            await setDoc(doc(db, "chats", activeRoom), { 
                lastMessage: text, 
                updatedAt: serverTimestamp() 
            }, { merge: true });

        } catch (error) {
            alert("Sändningsfel (Database): " + error.message);
            console.error(error);
        } finally {
            btn.disabled = false;
            input.focus();
        }
    };

    document.getElementById('msgInput').onkeypress = (e) => { 
        if (e.key === 'Enter' && !document.getElementById('msgInput').disabled) {
            document.getElementById('sendBtn').click(); 
        }
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mina Meddelanden | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); height: 100vh; display: flex; flex-direction: column; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        .app-container { display: flex; flex: 1; overflow: hidden; max-width: 1400px; margin: 0 auto; width: 100%; background: white; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        
        /* Sidebar */
        .sidebar { width: 350px; border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; background: #fff; }
        .sidebar-header { padding: 25px 20px; font-weight: 900; font-size: 1.2rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: white; z-index: 10; }
        
        /* Chat Window */
        .chat-window { flex: 1; display: flex; flex-direction: column; background: #fdfdfd; position: relative; }
        @media (max-width: 768px) { 
            .sidebar.hide-mobile { display: none !important; } 
            .chat-window { display: none; } 
            .chat-window.show-mobile { display: flex !important; width: 100%; position: absolute; height: 100%; z-index: 20; } 
        }
        
        .msg-display { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #f9fafb; }
        
        /* Message Bubbles */
        .bubble { position: relative; padding: 14px 18px; border-radius: 20px; max-width: 75%; font-size: 15px; line-height: 1.4; transition: 0.3s; word-wrap: break-word; }
        .sent { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; box-shadow: 0 4px 12px rgba(245, 130, 32, 0.15); }
        .received { align-self: flex-start; background: white; border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        
        /* خيار الحذف - معدل ليظهر بوضوح */
        .del-option {
            position: absolute; top: 50%; right: 100%; transform: translateY(-50%);
            margin-right: 10px; color: #94a3b8; font-size: 14px; cursor: pointer;
            opacity: 0; transition: 0.2s; padding: 5px;
        }
        .bubble.sent:hover .del-option { opacity: 1; }
        .del-option:hover { color: var(--danger); }

        .chat-item { padding: 20px; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: 0.2s; }
        .chat-item.active { background: #fff7ed; border-left: 5px solid var(--primary); }
        
        .input-box { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 12px; background: white; }
        input { flex: 1; padding: 14px 22px; border-radius: 30px; border: 1px solid var(--border); outline: none; font-size: 15px; }
        .send-btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 30px; font-weight: 900; cursor: pointer; }
        
        .time-stamp { font-size: 9px; opacity: 0.6; margin-top: 4px; display: block; text-align: right; }
    </style>
</head>
<body>

<header style="background:white; padding:15px 5%; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
    <a href="index.html" style="text-decoration:none; font-weight:900; color:var(--dark); font-size:22px;">BIL<span>HK</span></a>
    <div id="userStatus" style="font-size:12px; font-weight:700; color:#64748b;"></div>
</header>

<div class="app-container">
    <div class="sidebar" id="sidebarView">
        <div class="sidebar-header">Mina chattar</div>
        <div id="chatList"></div>
    </div>
    
    <div class="chat-window" id="chatWindowView">
        <div style="padding:15px 20px; border-bottom:1px solid var(--border); background:white; display:flex; align-items:center;">
            <button onclick="location.href='messages.html'" style="background:none; border:none; font-size:18px; margin-right:15px; cursor:pointer;"><i class="fa-solid fa-arrow-left"></i></button>
            <div id="activeChatHeader" style="font-weight:900;">Välj en konversation</div>
        </div>
        
        <div class="msg-display" id="msgArea">
            <div style="text-align:center; padding-top:100px; color:#94a3b8;">
                <i class="fa-regular fa-comment-dots" style="font-size:50px; margin-bottom:20px;"></i>
                <p>Klicka på en chatt för att börja skriva</p>
            </div>
        </div>
        
        <div class="input-box">
            <input type="text" id="msgInput" placeholder="Skriv ett meddelande..." disabled>
            <button id="sendBtn" class="send-btn" disabled><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { collection, query, where, onSnapshot, addDoc, serverTimestamp, orderBy, doc, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let user = null, activeRoom = null, tempChatData = null;
    const urlParams = new URLSearchParams(window.location.search);

    onAuthStateChanged(auth, (u) => { 
        if(u) { user = u; document.getElementById('userStatus').innerText = `Inloggad som: ${u.email}`; loadRooms(); initIncoming(); } 
        else { window.location.href="login.html"; }
    });

    // دالة الحذف معرفة عالمياً لتصل إليها الـ HTML
    window.requestDelete = async (msgId) => {
        const { isConfirmed } = await Swal.fire({
            title: 'Radera?',
            text: "Meddelandet tas bort för båda parter.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            confirmButtonText: 'Ja, ta bort'
        });

        if (isConfirmed) {
            try {
                const path = `chats/${activeRoom}/messages/${msgId}`;
                await deleteDoc(doc(db, path));
            } catch (err) { console.error("Error deleting:", err); }
        }
    };

    function enableUI(name) {
        document.getElementById('msgInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('activeChatHeader').innerText = name;
        document.getElementById('chatWindowView').classList.add('show-mobile');
    }

    async function initIncoming() {
        const sellerId = urlParams.get('seller'), carId = urlParams.get('carId'), carName = urlParams.get('name');
        if (sellerId && carId) {
            const roomId = [user.uid, sellerId].sort().join('_') + '_' + carId;
            activeRoom = roomId;
            enableUI(carName);
            const snap = await getDoc(doc(db, "chats", roomId));
            if (snap.exists()) openRoom(roomId, carName);
            else tempChatData = { sellerId, carId, carName };
        }
    }

    function loadRooms() {
        const q = query(collection(db, "chats"), where("participants", "array-contains", user.uid), orderBy("updatedAt", "desc"));
        onSnapshot(q, snap => {
            const list = document.getElementById('chatList'); list.innerHTML = "";
            snap.forEach(d => {
                const r = d.data();
                const div = document.createElement('div');
                div.className = `chat-item ${activeRoom === d.id ? 'active' : ''}`;
                const title = r.sellerId === user.uid ? `${r.carName} (Köpare: ${r.buyerName})` : r.carName;
                div.innerHTML = `<strong>${title}</strong><br><small style="color:#64748b">${r.lastMessage || 'Inga meddelanden'}</small>`;
                div.onclick = () => openRoom(d.id, title);
                list.appendChild(div);
            });
        });
    }

    window.openRoom = (id, name) => {
        activeRoom = id; tempChatData = null; enableUI(name);
        onSnapshot(query(collection(db, `chats/${id}/messages`), orderBy("createdAt", "asc")), snap => {
            const area = document.getElementById('msgArea'); area.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                const isSent = m.senderId === user.uid;
                const div = document.createElement('div');
                div.className = `bubble ${isSent ? 'sent' : 'received'}`;
                
                // إضافة خيار الحذف لرسائلك فقط
                div.innerHTML = `
                    ${isSent ? `<i class="fa-solid fa-trash-can del-option" onclick="requestDelete('${d.id}')"></i>` : ''}
                    ${m.text}
                    <span class="time-stamp">${m.createdAt?.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) || ''}</span>
                `;
                area.appendChild(div);
            });
            area.scrollTop = area.scrollHeight;
        });
    };

    document.getElementById('sendBtn').onclick = async () => {
        const input = document.getElementById('msgInput'), text = input.value.trim();
        if(!text) return; input.value = "";
        
        if (tempChatData) {
            await setDoc(doc(db, "chats", activeRoom), {
                carId: tempChatData.carId, carName: tempChatData.carName,
                participants: [user.uid, tempChatData.sellerId],
                sellerId: tempChatData.sellerId, buyerId: user.uid,
                buyerName: user.displayName || user.email.split('@')[0],
                lastMessage: text, updatedAt: serverTimestamp()
            });
            const name = tempChatData.carName; tempChatData = null; openRoom(activeRoom, name);
        }
        await addDoc(collection(db, `chats/${activeRoom}/messages`), { senderId: user.uid, text, createdAt: serverTimestamp() });
        await setDoc(doc(db, "chats", activeRoom), { lastMessage: text, updatedAt: serverTimestamp() }, { merge: true });
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Chatt | BILHK Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --white: #ffffff; --border: #e2e8f0; }
        body { background: var(--bg); height: 100vh; display: flex; flex-direction: column; margin: 0; font-family: 'Inter', sans-serif; }
        .app-container { display: flex; flex: 1; overflow: hidden; background: white; max-width: 1400px; margin: 0 auto; width: 100%; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        .sidebar { width: 350px; border-right: 1px solid var(--border); overflow-y: auto; }
        .chat-window { flex: 1; display: flex; flex-direction: column; background: #fdfdfd; }
        .msg-display { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 12px 18px; border-radius: 20px; max-width: 70%; font-size: 14px; line-height: 1.5; }
        .sent { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: #e2e8f0; border-bottom-left-radius: 4px; }
        .input-area { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: white; }
        input { flex: 1; padding: 15px 25px; border-radius: 30px; border: 1px solid var(--border); outline: none; font-size: 15px; }
        .btn-send { background: var(--primary); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-send:disabled { background: #cbd5e1; cursor: not-allowed; }
        .chat-item { padding: 20px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; }
        .chat-item:hover { background: #f8fafc; }
        .chat-item.active { background: #fff7ed; border-left: 5px solid var(--primary); }
    </style>
</head>
<body>
<header style="background: white; padding: 15px 6%; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center;">
    <a href="index.html" style="text-decoration:none; font-size:24px; font-weight:900; color:#0f172a;">BIL<span style="color:#f58220;">HK</span></a>
</header>
<div class="app-container">
    <div class="sidebar">
        <div style="padding:20px; font-weight:900; border-bottom:1px solid #e2e8f0;">Dina konversationer</div>
        <div id="chatList"></div>
    </div>
    <div class="chat-window">
        <div id="activeChatHeader" style="padding:20px 30px; background:white; border-bottom:1px solid #e2e8f0; font-weight:700;">Välj en chatt</div>
        <div class="msg-display" id="msgArea"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Skriv ett meddelande...">
            <button id="sendBtn" class="btn-send"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>
</div>
<script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { collection, query, where, onSnapshot, addDoc, serverTimestamp, orderBy, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let user = null, activeRoom = null;

    onAuthStateChanged(auth, (u) => { 
        if(u) { user = u; loadRooms(); } 
        else { window.location.href = "login.html"; } 
    });

    function loadRooms() {
        const q = query(collection(db, "chats"), where("participants", "array-contains", user.uid), orderBy("updatedAt", "desc"));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('chatList'); list.innerHTML = "";
            snap.forEach(d => {
                const room = d.data();
                const div = document.createElement('div'); 
                div.className = `chat-item ${activeRoom === d.id ? 'active' : ''}`;
                div.innerHTML = `<strong>${room.carName}</strong><br><small style="color:#64748b;">${room.lastMessage || 'Skicka ett meddelande'}</small>`;
                div.onclick = () => openRoom(d.id, room.carName);
                list.appendChild(div);
            });
        });
    }

    function openRoom(id, name) {
        activeRoom = id;
        document.getElementById('activeChatHeader').innerText = name;
        
        // إبراز المحادثة النشطة في القائمة الجانبية
        document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
        const clickedChat = Array.from(document.querySelectorAll('.chat-item')).find(el => el.innerHTML.includes(name));
        if(clickedChat) clickedChat.classList.add('active');

        const q = query(collection(db, `chats/${id}/messages`), orderBy("createdAt", "asc"));
        onSnapshot(q, (snap) => {
            const area = document.getElementById('msgArea'); area.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                const div = document.createElement('div'); 
                div.className = `bubble ${m.senderId === user.uid ? 'sent' : 'received'}`;
                div.innerText = m.text; 
                area.appendChild(div);
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    document.getElementById('sendBtn').onclick = async () => {
        const input = document.getElementById('msgInput'); 
        const text = input.value.trim();
        
        if(!activeRoom) {
            alert("Välj en chatt från listan först.");
            return;
        }
        if(!text) return;

        input.value = "";
        const btn = document.getElementById('sendBtn');
        btn.disabled = true; // منع الضغط المزدوج أثناء التحميل

        try {
            await addDoc(collection(db, `chats/${activeRoom}/messages`), { 
                senderId: user.uid, 
                text: text, 
                createdAt: serverTimestamp() 
            });
            
            await setDoc(doc(db, "chats", activeRoom), { 
                lastMessage: text, 
                updatedAt: serverTimestamp() 
            }, { merge: true });

        } catch (error) {
            console.error("Databasfel:", error);
            alert("Det gick inte att skicka: " + error.message);
        } finally {
            btn.disabled = false;
            input.focus();
        }
    };

    document.getElementById('msgInput').onkeypress = (e) => { 
        if (e.key === 'Enter') document.getElementById('sendBtn').click(); 
    };
</script>
</body>
</html>

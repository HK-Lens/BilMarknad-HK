<!DOCTYPE html>
<html lang="sv" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meddelanden | BILHK Professional Chat</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #f58220;
            --primary-light: #fff5eb;
            --dark: #0f172a;
            --dark-soft: #1e293b;
            --muted: #64748b;
            --bg: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--dark); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* --- Navigation Bar --- */
        nav {
            background: var(--white);
            padding: 12px 4%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 100;
            flex-shrink: 0;
        }
        .logo { font-size: 22px; font-weight: 900; text-decoration: none; color: var(--dark); }
        .logo span { color: var(--primary); }

        /* --- Main Layout --- */
        .chat-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            background: var(--white);
            margin: 15px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
        }

        /* --- Sidebar: Chat List --- */
        .chat-sidebar {
            width: 380px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            background: #fdfdfd;
        }

        .sidebar-header { padding: 25px; border-bottom: 1px solid var(--border); }
        .sidebar-header h2 { font-size: 20px; font-weight: 800; }

        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 18px 25px;
            cursor: pointer;
            transition: 0.2s;
            border-bottom: 1px solid #f9f9f9;
            position: relative;
        }
        .chat-item:hover { background: var(--primary-soft); }
        .chat-item.active { background: var(--primary-soft); border-left: 4px solid var(--primary); }

        .chat-item-img { width: 55px; height: 55px; border-radius: 14px; object-fit: cover; background: #eee; }
        .chat-item-info { flex: 1; overflow: hidden; }
        .chat-item-name { font-weight: 700; font-size: 15px; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .chat-item-msg { font-size: 13px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-item-time { font-size: 11px; color: var(--muted); }

        .unread-badge {
            background: var(--primary);
            color: white;
            min-width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 900;
        }

        /* --- Main Chat Area --- */
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #fcfcfc; position: relative; }

        /* Chat Header */
        .chat-header {
            padding: 15px 25px;
            border-bottom: 1px solid var(--border);
            background: var(--white);
            display: flex;
            justify-content: space-between;
            align-items: center;
            display: none; /* يظهر عند اختيار محادثة */
        }
        .partner-info { display: flex; align-items: center; gap: 12px; }
        .car-link { font-size: 12px; color: var(--primary); font-weight: 700; text-decoration: none; }

        /* Messages Display */
        .messages-area {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .msg-bubble {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
            word-wrap: break-word;
        }
        .msg-sent {
            align-self: flex-end;
            background: var(--dark);
            color: var(--white);
            border-bottom-right-radius: 4px;
        }
        .msg-received {
            align-self: flex-start;
            background: var(--white);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        .msg-time { font-size: 10px; margin-top: 5px; opacity: 0.6; text-align: right; }

        /* Input Area */
        .input-area {
            padding: 20px 25px;
            background: var(--white);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: center;
            display: none;
        }
        .chat-input {
            flex: 1;
            padding: 14px 20px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--bg);
            outline: none;
            font-size: 14px;
            transition: 0.3s;
        }
        .chat-input:focus { border-color: var(--primary); background: white; }

        .btn-send {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .btn-send:hover { transform: scale(1.05); background: var(--primary-hover); }

        /* Welcome Screen */
        .welcome-screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fff;
            z-index: 5;
            text-align: center;
        }
        .welcome-screen i { font-size: 60px; color: var(--primary-soft); margin-bottom: 20px; }

        /* Mobile View Adjustments */
        @media (max-width: 900px) {
            .chat-sidebar { width: 100%; position: absolute; inset: 0; z-index: 20; transition: 0.3s; }
            .chat-sidebar.hidden { transform: translateX(-100%); }
            .chat-main { width: 100%; }
            .back-btn { display: block !important; }
        }

        .back-btn { display: none; cursor: pointer; font-size: 20px; color: var(--muted); }
    </style>
</head>
<body>

    <nav>
        <div style="display:flex; align-items:center; gap:15px;">
            <div class="back-btn" id="mobileBack"><i class="fa-solid fa-arrow-left"></i></div>
            <a href="index.html" class="logo">BIL<span>HK</span></a>
        </div>
        <div class="nav-links">
            <a href="dashboard-fixed.html" style="text-decoration:none; color:var(--muted); font-weight:700; font-size:14px;">Dashboard</a>
        </div>
    </nav>

    <div class="chat-container">
        <aside class="chat-sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Mina meddelanden</h2>
            </div>
            <div class="chat-list" id="chatsList">
                <div style="text-align:center; padding:40px; color:var(--muted)">Laddar konversationer...</div>
            </div>
        </aside>

        <main class="chat-main">
            <div class="welcome-screen" id="welcomeBox">
                <i class="fa-solid fa-comments"></i>
                <h3>Dina meddelanden</h3>
                <p style="color:var(--muted); font-size:14px; margin-top:10px;">Välj en konversation för att börja chatta.</p>
            </div>

            <div class="chat-header" id="chatHeader">
                <div class="partner-info">
                    <img src="" id="headerCarImg" style="width:40px; height:40px; border-radius:8px; object-fit:cover;">
                    <div>
                        <div id="headerPartnerName" style="font-weight:800; font-size:15px;">-</div>
                        <a href="#" id="headerCarLink" class="car-link">Visa annons <i class="fa-solid fa-chevron-right" style="font-size:8px;"></i></a>
                    </div>
                </div>
                <div class="chat-actions">
                    <i class="fa-solid fa-ellipsis-vertical" style="color:var(--muted); cursor:pointer;"></i>
                </div>
            </div>

            <div class="messages-area" id="msgArea">
                </div>

            <div class="input-area" id="chatInputArea">
                <input type="text" id="messageInput" class="chat-input" placeholder="Skriv ett meddelande...">
                <button class="btn-send" id="sendMsgBtn">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </main>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { 
            collection, query, where, orderBy, onSnapshot, 
            addDoc, serverTimestamp, doc, updateDoc, getDoc, getDocs, limit 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let currentUserId = null;
        let activeChatId = null;
        let activeChatUnsubscribe = null;

        // --- 1. التحقق من حالة المستخدم ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserId = user.uid;
                loadChatsList();
                checkUrlForDirectChat();
            } else {
                window.location.href = 'login.html';
            }
        });

        // --- 2. جلب قائمة المحادثات (Real-time) ---
        function loadChatsList() {
            const q = query(
                collection(db, "chats"),
                where("participants", "array-contains", currentUserId),
                orderBy("lastMessageTime", "desc")
            );

            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('chatsList');
                list.innerHTML = "";

                if (snapshot.empty) {
                    list.innerHTML = `<div style="text-align:center; padding:50px; color:var(--muted); font-size:13px;">Inga meddelanden ännu.</div>`;
                    return;
                }

                snapshot.docs.forEach(chatDoc => {
                    const chat = chatDoc.data();
                    const id = chatDoc.id;
                    const isUnread = chat.lastMessageReceiver === currentUserId && chat.unreadCount > 0;
                    
                    const div = document.createElement('div');
                    div.className = `chat-item ${activeChatId === id ? 'active' : ''}`;
                    div.innerHTML = `
                        <img src="${chat.carImage || 'placeholder.jpg'}" class="chat-item-img">
                        <div class="chat-item-info">
                            <div class="chat-item-name">
                                <span>${chat.carTitle}</span>
                                <span class="chat-item-time">${formatChatTime(chat.lastMessageTime)}</span>
                            </div>
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <div class="chat-item-msg">${chat.lastMessage || 'Inga meddelanden'}</div>
                                ${isUnread ? `<div class="unread-badge">${chat.unreadCount}</div>` : ''}
                            </div>
                        </div>
                    `;
                    div.onclick = () => selectChat(id, chat);
                    list.appendChild(div);
                });
            });
        }

        // --- 3. اختيار محادثة وتحميل رسائلها ---
        async function selectChat(chatId, chatData) {
            activeChatId = chatId;
            
            // تحديث الواجهة للموبايل
            if (window.innerWidth < 900) {
                document.getElementById('sidebar').classList.add('hidden');
            }

            // إظهار عناصر الدردشة وإخفاء شاشة الترحيب
            document.getElementById('welcomeBox').style.display = 'none';
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('chatInputArea').style.display = 'flex';

            // تحديث بيانات الهيدر
            document.getElementById('headerCarImg').src = chatData.carImage || 'placeholder.jpg';
            document.getElementById('headerPartnerName').innerText = chatData.carTitle;
            document.getElementById('headerCarLink').href = `details.html?id=${chatData.carId}`;

            // تصفير عداد الرسائل غير المقروءة إذا كنت أنت المستلم
            if (chatData.lastMessageReceiver === currentUserId) {
                await updateDoc(doc(db, "chats", chatId), { unreadCount: 0 });
            }

            // تحميل الرسائل (Real-time)
            if (activeChatUnsubscribe) activeChatUnsubscribe(); // إلغاء المراقبة السابقة
            
            const msgQuery = query(
                collection(db, "chats", chatId, "messages"),
                orderBy("sentAt", "asc")
            );

            activeChatUnsubscribe = onSnapshot(msgQuery, (snapshot) => {
                const area = document.getElementById('msgArea');
                area.innerHTML = "";
                
                snapshot.docs.forEach(mDoc => {
                    const msg = mDoc.data();
                    const isMe = msg.senderId === currentUserId;
                    
                    const bubble = document.createElement('div');
                    bubble.className = `msg-bubble ${isMe ? 'msg-sent' : 'msg-received'}`;
                    bubble.innerHTML = `
                        <div>${msg.text}</div>
                        <div class="msg-time">${formatChatTime(msg.sentAt)}</div>
                    `;
                    area.appendChild(bubble);
                });
                
                // تمرير لأسفل تلقائياً
                area.scrollTop = area.scrollHeight;
            });

            // تظليل المحادثة النشطة في القائمة
            document.querySelectorAll('.chat-item').forEach(item => item.classList.remove('active'));
            loadChatsList(); // تحديث القائمة لتعكس الحالة النشطة
        }

        // --- 4. إرسال رسالة ---
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !activeChatId) return;

            input.value = ""; // تفريغ الحقل فوراً لتحسين UX

            try {
                // 1. إضافة الرسالة للمجموعة الفرعية
                await addDoc(collection(db, "chats", activeChatId, "messages"), {
                    senderId: currentUserId,
                    text: text,
                    sentAt: serverTimestamp()
                });

                // 2. تحديث وثيقة المحادثة الرئيسية (Last Message)
                const chatRef = doc(db, "chats", activeChatId);
                const chatSnap = await getDoc(chatRef);
                const chatData = chatSnap.data();
                
                // تحديد من هو الطرف الآخر لزيادة عداد غير المقروء لديه
                const partnerId = chatData.participants.find(p => p !== currentUserId);

                await updateDoc(chatRef, {
                    lastMessage: text,
                    lastMessageTime: serverTimestamp(),
                    lastMessageReceiver: partnerId,
                    unreadCount: (chatData.unreadCount || 0) + 1
                });

            } catch (error) {
                console.error("Error sending message:", error);
            }
        }

        // --- 5. وظائف مساعدة ---
        document.getElementById('sendMsgBtn').onclick = sendMessage;
        document.getElementById('messageInput').onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
        document.getElementById('mobileBack').onclick = () => {
            document.getElementById('sidebar').classList.remove('hidden');
        };

        function formatChatTime(ts) {
            if (!ts) return "";
            const date = ts.toDate ? ts.toDate() : new Date(ts);
            return date.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });
        }

        // فتح محادثة مباشرة إذا كان هناك ID في الرابط
        function checkUrlForDirectChat() {
            const params = new URLSearchParams(window.location.search);
            const directId = params.get('chat');
            if (directId) {
                // سيتم تفعيلها تلقائياً عند تحميل القائمة
                activeChatId = directId;
            }
        }
    </script>
</body>
</html>

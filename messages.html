<!DOCTYPE html>
<html lang="sv">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>Meddelanden | BILHK</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script><style>:root{--primary:#f58220;--dark:#0f172a;--bg:#f8fafc;--border:#e2e8f0;--gray:#64748b;--danger:#ef4444}*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif}body{height:100vh;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}header{background:white;padding:16px 5%;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}.logo{font-size:26px;font-weight:900;text-decoration:none;color:var(--dark)}.logo span{color:var(--primary)}.app{flex:1;display:grid;grid-template-columns:360px 1fr;max-width:1500px;width:100%;margin:auto;background:white;overflow:hidden}.sidebar{border-right:1px solid var(--border);background:var(--bg);overflow-y:auto}.head{padding:20px;background:white;border-bottom:1px solid var(--border);font-weight:900}.item{padding:14px;border-bottom:1px solid var(--border);cursor:pointer}.item:hover,.item.active{background:white}.mini{display:grid;grid-template-columns:64px 1fr;gap:12px;align-items:center}.mini img{width:64px;height:50px;object-fit:cover;border-radius:10px}.t{font-weight:900;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.u{font-size:12px;color:var(--primary);font-weight:900}.l{font-size:12px;color:var(--gray);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.main{display:flex;flex-direction:column;min-width:0}.chathead{padding:16px 20px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}.adcard{display:grid;grid-template-columns:74px 1fr;gap:12px;align-items:center}.adcard img{width:74px;height:56px;object-fit:cover;border-radius:10px}.messages{flex:1;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:12px}.bubble{padding:12px 15px;border-radius:16px;max-width:78%;font-size:14px;line-height:1.5}.sent{align-self:flex-end;background:var(--primary);color:white;border-bottom-right-radius:4px}.received{align-self:flex-start;background:var(--bg);border:1px solid var(--border);border-bottom-left-radius:4px}.sender{display:block;font-size:11px;font-weight:900;margin-bottom:5px}.time{display:block;text-align:right;font-size:10px;opacity:.75;margin-top:5px}.input{padding:15px;border-top:1px solid var(--border);display:flex;gap:10px;background:white}.input input{flex:1;padding:14px;border:1px solid var(--border);border-radius:14px;outline:none}.input button{width:52px;border:0;background:var(--primary);color:white;border-radius:14px;font-size:16px}.input button:disabled{background:#cbd5e1}.empty{padding:45px;text-align:center;color:var(--gray);font-weight:800}@media(max-width:800px){.app{grid-template-columns:1fr}.sidebar.hide{display:none}.main{display:none}.main.show{display:flex;position:absolute;inset:58px 0 0 0;background:white}.back{display:block!important}}.back{display:none}</style></head><body><header><a href="index.html" class="logo">BIL<span>HK</span></a><a href="dashboard.html" style="font-weight:900;color:var(--dark);text-decoration:none">Dashboard</a></header><div class="app"><aside class="sidebar" id="sidebar"><div class="head">Meddelanden</div><div id="chatList"><div class="empty">Laddar...</div></div></aside><main class="main" id="main"><div class="chathead" id="chatHead"><b>Välj en konversation</b></div><div class="messages" id="msgArea"><div class="empty">Klicka på en konversation.</div></div><div class="input"><input id="msgInput" placeholder="Skriv ett meddelande..." disabled><button id="sendBtn" disabled><i class="fa-solid fa-paper-plane"></i></button></div></main></div><script type="module">import{auth,db}from'./firebase-config.js';import{onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";import{collection,query,where,orderBy,onSnapshot,doc,getDoc,addDoc,updateDoc,serverTimestamp,arrayUnion}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";let user=null,active=null,unsub=null;const $=id=>document.getElementById(id);function esc(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}function val(...xs){for(const x of xs){if(x!==undefined&&x!==null&&String(x).trim()!=='')return x}return''}onAuthStateChanged(auth,u=>{if(!u){location.href='login.html';return}user=u;loadRooms()});function loadRooms(){const q=query(collection(db,'chats'),where('participants','array-contains',user.uid),orderBy('updatedAt','desc'));onSnapshot(q,snap=>{let html='';snap.forEach(d=>{const c=d.data();const other=Array.isArray(c.users)?c.users.find(x=>x.id!==user.uid):null;html+=`<div class="item ${active===d.id?'active':''}" data-id="${d.id}" onclick="openChat('${d.id}')"><div class="mini"><img src="${esc(c.carImage||'placeholder.jpg')}"><div><div class="t">${esc(c.carTitle||c.carName||'Annons')}</div><div class="u"><i class="fa-solid fa-user"></i> ${esc(other?.name||(c.sellerId===user.uid?c.buyerName:c.sellerName)||'Användare')}</div><div class="l">${esc(c.lastMessage||'Inga meddelanden ännu')}</div></div></div></div>`});$('chatList').innerHTML=html||'<div class="empty">Inga meddelanden.</div>'})}window.openChat=async id=>{active=id;document.querySelectorAll('.item').forEach(x=>x.classList.toggle('active',x.dataset.id===id));$('main').classList.add('show');$('sidebar').classList.add('hide');const s=await getDoc(doc(db,'chats',id));const c=s.data();const other=Array.isArray(c.users)?c.users.find(x=>x.id!==user.uid):null;const otherName=other?.name||(c.sellerId===user.uid?c.buyerName:c.sellerName)||'Användare';$('chatHead').innerHTML=`<button class="back" onclick="closeMobile()" style="border:0;background:none;font-size:18px"><i class="fa-solid fa-arrow-left"></i></button><div class="adcard"><img src="${esc(c.carImage||'placeholder.jpg')}"><div><b>${esc(c.carTitle||'Annons')}</b><div class="u">Med: ${esc(otherName)}</div><a href="details.html?id=${encodeURIComponent(c.carId||'')}" style="color:var(--primary);font-weight:900;font-size:12px;text-decoration:none">Öppna annons</a></div></div>`;$('msgInput').disabled=false;$('sendBtn').disabled=false;if(unsub)unsub();unsub=onSnapshot(query(collection(db,`chats/${id}/messages`),orderBy('createdAt','asc')),snap=>{let html='';snap.forEach(d=>{const m=d.data(),mine=m.senderId===user.uid;const time=m.createdAt?.toDate?m.createdAt.toDate().toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'}):'';html+=`<div class="bubble ${mine?'sent':'received'}"><span class="sender">${esc(m.senderName||(mine?'Du':otherName))}</span>${esc(m.text)}<span class="time">${time}</span></div>`});$('msgArea').innerHTML=html||'<div class="empty">Inga meddelanden ännu.</div>';$('msgArea').scrollTop=$('msgArea').scrollHeight})};async function send(){const text=$('msgInput').value.trim();if(!text||!active)return;const ch=await getDoc(doc(db,'chats',active));const c=ch.data();const me=await getDoc(doc(db,'users',user.uid));const senderName=me.exists()?val(me.data().companyName,me.data().name,me.data().email,user.email):user.email;const receivers=(c.participants||[]).filter(id=>id!==user.uid);await addDoc(collection(db,`chats/${active}/messages`),{text,senderId:user.uid,senderName,createdAt:serverTimestamp()});await updateDoc(doc(db,'chats',active),{lastMessage:text,lastSenderName:senderName,lastSenderId:user.uid,unreadFor:arrayUnion(...receivers),updatedAt:serverTimestamp()});$('msgInput').value=''}$('sendBtn').onclick=send;$('msgInput').addEventListener('keypress',e=>{if(e.key==='Enter')send()});window.closeMobile=()=>{$('main').classList.remove('show');$('sidebar').classList.remove('hide')};</script></body></html>

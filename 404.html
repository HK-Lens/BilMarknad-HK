<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>404 | Sidan hittades inte | BILHK</title>

    <meta name="description" content="Sidan kunde inte hittas. Gå tillbaka till startsidan, sök efter bilar eller publicera en bilannons på BILHK.">

    <meta name="robots" content="noindex, follow">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --primary: #f58220;
            --primary-hover: #e07210;
            --primary-soft: rgba(245, 130, 32, 0.12);

            --dark: #0f172a;
            --dark-soft: #1e293b;

            --text: #0f172a;
            --muted: #64748b;
            --muted-light: #94a3b8;

            --light: #f8fafc;
            --surface: #ffffff;

            --border: #e2e8f0;
            --border-dark: #334155;

            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;

            --shadow-sm: 0 4px 10px rgba(15, 23, 42, 0.06);
            --shadow-md: 0 12px 30px rgba(15, 23, 42, 0.10);
            --shadow-lg: 0 25px 70px rgba(15, 23, 42, 0.16);

            --radius-sm: 12px;
            --radius-md: 18px;
            --radius-lg: 28px;
            --radius-full: 999px;

            --max-width: 1180px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', Roboto, Helvetica, Arial, sans-serif;
            background:
                radial-gradient(circle at 15% 15%, rgba(245, 130, 32, 0.16), transparent 28%),
                radial-gradient(circle at 85% 10%, rgba(15, 23, 42, 0.10), transparent 30%),
                linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
            color: var(--text);
            display: flex;
            flex-direction: column;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button,
        input {
            font-family: inherit;
        }

        .top-notice {
            width: 100%;
            background: linear-gradient(90deg, var(--dark) 0%, var(--dark-soft) 55%, #2b1d12 100%);
            color: #ffffff;
            padding: 11px 6%;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-align: center;
            letter-spacing: 0.01em;
        }

        .top-notice i {
            color: var(--primary);
            font-size: 15px;
        }

        .site-header {
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 17px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 22px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--dark);
            letter-spacing: -0.06em;
            white-space: nowrap;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            border-radius: 15px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, var(--primary) 0%, #ffb15c 100%);
            color: white;
            box-shadow: 0 10px 25px rgba(245, 130, 32, 0.35);
        }

        .logo span {
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav-link {
            min-height: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: var(--radius-full);
            color: var(--dark);
            font-size: 14px;
            font-weight: 800;
            transition: 0.25s ease;
        }

        .nav-link:hover {
            background: var(--primary-soft);
            color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .nav-link.sell-link {
            background: var(--primary);
            color: white;
            padding-inline: 20px;
            box-shadow: 0 12px 25px rgba(245, 130, 32, 0.28);
        }

        .nav-link.sell-link:hover {
            background: var(--primary-hover);
            color: white;
        }

        main {
            flex: 1;
        }

        .not-found-section {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 66px 24px 80px;
            display: grid;
            grid-template-columns: minmax(0, 1.05fr) minmax(340px, 0.95fr);
            gap: 34px;
            align-items: center;
        }

        .error-content {
            position: relative;
            z-index: 2;
        }

        .eyebrow {
            width: fit-content;
            display: inline-flex;
            align-items: center;
            gap: 9px;
            padding: 9px 14px;
            border-radius: var(--radius-full);
            background: var(--primary-soft);
            color: var(--primary-hover);
            font-size: 13px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 20px;
        }

        .error-code {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .error-code strong {
            font-size: clamp(72px, 12vw, 150px);
            line-height: 0.86;
            font-weight: 900;
            letter-spacing: -0.09em;
            background: linear-gradient(135deg, var(--dark) 0%, var(--primary) 75%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .error-code .small-car {
            width: 76px;
            height: 76px;
            border-radius: 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            display: grid;
            place-items: center;
            box-shadow: var(--shadow-md);
            color: var(--primary);
            font-size: 30px;
            transform: rotate(-8deg);
        }

        .error-title {
            max-width: 700px;
            font-size: clamp(32px, 5vw, 58px);
            line-height: 1.05;
            font-weight: 900;
            letter-spacing: -0.055em;
            color: var(--dark);
            margin-bottom: 18px;
        }

        .error-description {
            max-width: 690px;
            color: var(--muted);
            font-size: 17px;
            line-height: 1.8;
            margin-bottom: 28px;
        }

        .action-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 13px;
            margin-bottom: 28px;
        }

        .btn {
            min-height: 52px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 20px;
            border-radius: var(--radius-full);
            border: 1px solid transparent;
            font-size: 14px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.25s ease;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 14px 30px rgba(245, 130, 32, 0.30);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-dark {
            background: var(--dark);
            color: white;
            box-shadow: 0 14px 30px rgba(15, 23, 42, 0.18);
        }

        .btn-dark:hover {
            background: #020617;
            transform: translateY(-2px);
        }

        .btn-light {
            background: white;
            color: var(--dark);
            border-color: var(--border);
            box-shadow: var(--shadow-sm);
        }

        .btn-light:hover {
            border-color: rgba(245, 130, 32, 0.45);
            color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .search-box {
            max-width: 700px;
            background: rgba(255, 255, 255, 0.84);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 14px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            box-shadow: var(--shadow-md);
            backdrop-filter: blur(14px);
            margin-bottom: 24px;
        }

        .search-input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input-wrap i {
            position: absolute;
            left: 17px;
            color: var(--muted-light);
            font-size: 15px;
        }

        .search-box input {
            width: 100%;
            min-height: 54px;
            border: 1px solid var(--border);
            background: #f8fafc;
            border-radius: 17px;
            padding: 0 18px 0 44px;
            color: var(--dark);
            font-size: 15px;
            font-weight: 700;
            outline: none;
            transition: 0.25s ease;
        }

        .search-box input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(245, 130, 32, 0.13);
        }

        .search-box button {
            min-width: 145px;
            min-height: 54px;
            border: none;
            border-radius: 17px;
            background: var(--dark);
            color: white;
            font-size: 14px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.25s ease;
        }

        .search-box button:hover {
            background: var(--primary);
            transform: translateY(-1px);
        }

        .help-links {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
            max-width: 760px;
        }

        .help-card {
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px;
            min-height: 122px;
            box-shadow: var(--shadow-sm);
            transition: 0.25s ease;
        }

        .help-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
            border-color: rgba(245, 130, 32, 0.42);
        }

        .help-card i {
            width: 38px;
            height: 38px;
            border-radius: 14px;
            background: var(--primary-soft);
            color: var(--primary);
            display: grid;
            place-items: center;
            margin-bottom: 13px;
            font-size: 16px;
        }

        .help-card strong {
            display: block;
            font-size: 14px;
            font-weight: 900;
            color: var(--dark);
            margin-bottom: 6px;
        }

        .help-card span {
            display: block;
            font-size: 12px;
            line-height: 1.55;
            color: var(--muted);
            font-weight: 600;
        }

        .visual-panel {
            position: relative;
            min-height: 560px;
        }

        .panel-card {
            position: relative;
            overflow: hidden;
            min-height: 560px;
            border-radius: 34px;
            background:
                linear-gradient(180deg, rgba(15, 23, 42, 0.95) 0%, rgba(15, 23, 42, 0.88) 100%),
                radial-gradient(circle at top right, rgba(245, 130, 32, 0.45), transparent 38%);
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 32px;
            color: white;
        }

        .panel-card::before {
            content: "";
            position: absolute;
            width: 420px;
            height: 420px;
            border-radius: 999px;
            background: rgba(245, 130, 32, 0.14);
            top: -120px;
            right: -140px;
        }

        .panel-card::after {
            content: "";
            position: absolute;
            width: 280px;
            height: 280px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.06);
            bottom: -110px;
            left: -110px;
        }

        .floating-label {
            position: relative;
            z-index: 2;
            width: fit-content;
            display: inline-flex;
            align-items: center;
            gap: 9px;
            background: rgba(255, 255, 255, 0.10);
            border: 1px solid rgba(255, 255, 255, 0.14);
            color: white;
            border-radius: var(--radius-full);
            padding: 10px 14px;
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .floating-label i {
            color: var(--primary);
        }

        .car-illustration {
            position: relative;
            z-index: 2;
            margin: 75px auto 52px;
            width: min(100%, 430px);
            height: 230px;
        }

        .car-body {
            position: absolute;
            width: 100%;
            height: 124px;
            left: 0;
            bottom: 45px;
            border-radius: 70px 95px 42px 42px;
            background: linear-gradient(135deg, #ffffff 0%, #e2e8f0 100%);
            box-shadow: 0 28px 60px rgba(0, 0, 0, 0.28);
        }

        .car-body::before {
            content: "";
            position: absolute;
            width: 46%;
            height: 82px;
            left: 92px;
            top: -55px;
            border-radius: 80px 80px 16px 16px;
            background: linear-gradient(135deg, #f8fafc 0%, #cbd5e1 100%);
            border: 8px solid #ffffff;
        }

        .car-body::after {
            content: "";
            position: absolute;
            width: 54px;
            height: 18px;
            right: 24px;
            top: 48px;
            border-radius: 99px;
            background: var(--primary);
            box-shadow: -315px 0 0 #facc15;
        }

        .window {
            position: absolute;
            z-index: 4;
            top: 25px;
            left: 154px;
            width: 104px;
            height: 52px;
            border-radius: 45px 45px 10px 10px;
            background: linear-gradient(135deg, #0f172a 0%, #334155 100%);
            opacity: 0.96;
        }

        .window::after {
            content: "";
            position: absolute;
            right: -84px;
            top: 10px;
            width: 72px;
            height: 42px;
            border-radius: 10px 35px 10px 10px;
            background: linear-gradient(135deg, #0f172a 0%, #334155 100%);
        }

        .wheel {
            position: absolute;
            z-index: 5;
            bottom: 23px;
            width: 86px;
            height: 86px;
            border-radius: 50%;
            background: #020617;
            border: 12px solid #1e293b;
            box-shadow: inset 0 0 0 10px #64748b;
        }

        .wheel.left {
            left: 58px;
        }

        .wheel.right {
            right: 58px;
        }

        .road {
            position: absolute;
            z-index: 1;
            left: 50%;
            bottom: 16px;
            transform: translateX(-50%);
            width: 92%;
            height: 8px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.18);
        }

        .status-box {
            position: relative;
            z-index: 3;
            background: rgba(255, 255, 255, 0.10);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 24px;
            padding: 21px;
            backdrop-filter: blur(14px);
        }

        .status-box h2 {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -0.04em;
            margin-bottom: 10px;
        }

        .status-box p {
            color: #cbd5e1;
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 18px;
        }

        .status-list {
            display: grid;
            gap: 10px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #e2e8f0;
            font-size: 13px;
            font-weight: 700;
        }

        .status-item i {
            width: 28px;
            height: 28px;
            border-radius: 10px;
            display: grid;
            place-items: center;
            background: rgba(245, 130, 32, 0.16);
            color: var(--primary);
        }

        .

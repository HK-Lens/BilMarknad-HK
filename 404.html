<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sidan kunde inte hittas på BILHK.">
    <title>Sidan hittades inte | BILHK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary:#f58220; --primary-hover:#e07210; --dark:#0f172a; --bg:#f8fafc; --border:#e2e8f0; --white:#fff; --gray:#64748b; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { background:var(--bg); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; color:var(--dark); }
        .error-card { width:100%; max-width:650px; background:var(--white); border-radius:32px; border:1px solid var(--border); padding:60px 40px; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,.05); }
        .logo { text-decoration:none; font-size:36px; font-weight:900; color:var(--dark); display:inline-block; margin-bottom:35px; letter-spacing:-1px; }
        .logo span { color:var(--primary); }
        .error-icon { width:120px; height:120px; margin:0 auto 30px; border-radius:50%; background:#fff7ed; display:flex; align-items:center; justify-content:center; color:var(--primary); font-size:50px; }
        .error-code { font-size:80px; font-weight:900; color:var(--primary); line-height:1; margin-bottom:15px; }
        .error-title { font-size:32px; font-weight:900; margin-bottom:15px; }
        .error-text { color:var(--gray); font-size:16px; line-height:1.7; margin-bottom:40px; }
        .actions { display:flex; justify-content:center; gap:15px; flex-wrap:wrap; }
        .btn { text-decoration:none; padding:16px 28px; border-radius:14px; font-weight:800; transition:.25s; font-size:14px; }
        .btn-primary { background:var(--primary); color:white; }
        .btn-primary:hover { background:var(--primary-hover); transform:translateY(-2px); }
        .btn-secondary { background:#f1f5f9; color:var(--dark); border:1px solid var(--border); }
        .btn-secondary:hover { background:white; border-color:var(--primary); color:var(--primary); }
        .footer-note { margin-top:45px; color:#94a3b8; font-size:13px; font-weight:600; }
        @media(max-width:600px){ .error-card{padding:40px 25px;} .error-code{font-size:64px;} .error-title{font-size:26px;} .error-text{font-size:14px;} .logo{font-size:30px;} .actions{flex-direction:column;} .btn{width:100%;} }
    </style>
</head>
<body>
    <div class="error-card">
        <a href="index.html" class="logo">BIL<span>HK</span></a>
        <div class="error-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
        <div class="error-code">404</div>
        <h1 class="error-title">Sidan kunde inte hittas</h1>
        <p class="error-text">Den sida du försöker öppna finns inte längre, har flyttats eller så är adressen felaktig.</p>
        <div class="actions">
            <a href="index.html" class="btn btn-primary"><i class="fa-solid fa-house"></i> Till startsidan</a>
            <a href="filter.html" class="btn btn-secondary"><i class="fa-solid fa-magnifying-glass"></i> Sök bilar</a>
        </div>
        <div class="footer-note">© 2026 BILHK</div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilMarknad-HK | Hem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); }
        header { background: white; padding: 15px 6%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { text-decoration: none; font-size: 24px; font-weight: 900; color: var(--dark); }
        .logo span { color: var(--primary); }
        .nav-actions { display: flex; gap: 10px; align-items: center; }
        .btn { text-decoration: none; padding: 10px 18px; border-radius: 12px; font-weight: 700; font-size: 13px; }
        .btn-login { border: 1px solid var(--border); color: var(--dark); }
        .btn-sell { background: var(--dark); color: white; }
        .hero { padding: 60px 6% 30px; text-align: center; }
        .grid { max-width: 1300px; margin: auto; padding: 0 6% 60px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .car-card { background: white; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); transition: 0.3s; position: relative; cursor: pointer; }
        .car-card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
        .car-card img { width: 100%; height: 200px; object-fit: cover; }
        .card-info { padding: 20px; }
        .price { font-size: 22px; font-weight: 900; color: var(--primary); }
        footer { background: white; padding: 40px 6%; border-top: 1px solid var(--border); text-align: center; font-size: 13px; color: #64748b; }
    </style>
</head>
<body>
<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <div class="nav-actions" id="navActions">
        <a href="login.html" class="btn btn-login">Laddar...</a>
    </div>
</header>
<section class="hero">
    <h1 style="font-size: 40px; font-weight: 900;">Hitta din nästa bil</h1>
    <p style="color: #64748b; margin-top: 10px;">Enkel, säker och snabb bilmarknad i Sverige.</p>
    <div style="margin-top: 30px;">
        <a href="filter.html" style="text-decoration:none; color:var(--primary); font-weight:800;">⚙️ Avancerad sökning</a>
    </div>
</section>
<div class="grid" id="carGrid"></div>
<footer>
    <p><strong>Viktig information:</strong> Vi är en annonsplattform. Kontrollera alltid fordon och dokument personligen innan köp.</p>
    <p style="margin-top: 15px;">&copy; 2026 BilMarknad-HK</p>
</footer>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    onAuthStateChanged(auth, user => {
        const nav = document.getElementById('navActions');
        if (user) {
            const name = user.displayName || user.email.split('@')[0];
            nav.innerHTML = `<span style="font-size:12px; font-weight:700;">Hej, ${name}!</span><a href="my-account.html" class="btn btn-login">Min Sida</a><a href="sell.html" class="btn btn-sell">Sälj bil</a>`;
        } else {
            nav.innerHTML = `<a href="login.html" class="btn btn-login">Logga in</a><a href="sell.html" class="btn btn-sell">Sälj bil</a>`;
        }
        loadCars();
    });
    async function loadCars() {
        const q = query(collection(db, "cars"), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        const grid = document.getElementById('carGrid');
        grid.innerHTML = snap.docs.map(doc => {
            const c = doc.data();
            return `<div class="car-card" onclick="location.href='details.html?id=${doc.id}'">
                <img src="${c.images?.[0] || ''}">
                <div class="card-info">
                    <div style="font-weight:800; font-size:18px;">${c.brand} ${c.model}</div>
                    <div style="font-size:12px; color:#94a3b8; margin:5px 0;">${c.year} • ${c.mileage} mil • ${c.fuelType}</div>
                    <div class="price">${Number(c.price).toLocaleString()} kr</div>
                </div>
            </div>`;
        }).join('');
    }
</script>
</body>
</html>

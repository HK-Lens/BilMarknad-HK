<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilMarknad-HK | Hem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #1a1a1a; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); }
        header { background: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        .logo { font-size: 22px; font-weight: 800; text-decoration: none; color: var(--dark); }
        .logo span { color: var(--primary); }

        /* بار البحث البسيط */
        .search-bar-container { background: white; padding: 20px 5%; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid #eee; }
        .search-input { flex: 1; padding: 15px; border: 1px solid #ddd; border-radius: 50px; font-size: 16px; outline: none; }
        .filter-trigger { background: #f4f4f4; padding: 12px 25px; border-radius: 50px; text-decoration: none; color: var(--dark); font-weight: 700; display: flex; align-items: center; gap: 8px; border: 1px solid #ddd; }

        .results { padding: 40px 5%; max-width: 1200px; margin: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .car-card { background: white; border-radius: 15px; overflow: hidden; border: 1px solid #ddd; cursor: pointer; transition: 0.3s; }
        .car-card img { width: 100%; height: 180px; object-fit: cover; }
        .car-content { padding: 15px; }
        .price { font-size: 22px; font-weight: 800; color: var(--primary); }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BILMARKNAD<span>HK</span></a>
    <nav>
        <a href="manage.html" style="margin-right:20px; text-decoration:none; font-weight:700; color:var(--dark);">Mitt Garage</a>
        <a href="sell.html" style="background:var(--primary); color:white; padding:8px 20px; border-radius:20px; text-decoration:none; font-weight:700;">Sälj bil</a>
    </nav>
</header>

<div class="search-bar-container">
    <input type="text" id="mainSearch" class="search-input" placeholder="Sök märke, modell eller sökord..." oninput="instantSearch()">
    <a href="filter.html" class="filter-trigger">⚙️ Anpassa sökning</a>
</div>

<div class="results" id="carGrid"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allCars = [];

    async function load() {
        const snap = await getDocs(collection(db, "cars"));
        allCars = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
        
        // التحقق مما إذا كان المستخدم قادماً من صفحة الفلتر
        const params = new URLSearchParams(window.location.search);
        if(params.toString()) {
            applyUrlFilters(params);
        } else {
            render(allCars);
        }
    }

    function applyUrlFilters(p) {
        const brand = p.get('brand');
        const model = p.get('model');
        const kar = p.get('kar');
        
        const filtered = allCars.filter(c => {
            return (!brand || brand === 'all' || c.brand === brand) &&
                   (!model || model === 'all' || c.model === model) &&
                   (!kar || kar === 'all' || c.karosseri === kar);
        });
        render(filtered);
    }

    window.instantSearch = () => {
        const val = document.getElementById('mainSearch').value.toLowerCase();
        render(allCars.filter(c => c.brand.toLowerCase().includes(val) || c.model?.toLowerCase().includes(val)));
    };

    function render(data) {
        document.getElementById('carGrid').innerHTML = data.map(c => `
            <div class="car-card" onclick="location.href='details.html?id=${c.id}'">
                <img src="${c.images?.[0] || ''}">
                <div class="car-content">
                    <div style="font-weight:800; font-size:18px;">${c.brand} ${c.model || ''}</div>
                    <div style="color:gray; font-size:13px; margin:5px 0;">${c.year} | ${c.mileage} mil</div>
                    <div class="price">${Number(c.price).toLocaleString()} kr</div>
                </div>
            </div>
        `).join('');
    }

    load();
</script>
</body>
</html>

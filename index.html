<script type="module">

import { auth, db } from './firebase-config.js';

import {
collection,
getDocs,
query,
orderBy,
limit
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

/* =====================================================
   GLOBALS
===================================================== */

let selectedBodyType = null;

const carsGrid =
document.getElementById('carsGrid');

const searchBtn =
document.getElementById('searchBtn');

/* =====================================================
   AUTH STATUS
===================================================== */

onAuthStateChanged(auth,(user)=>{

const status =
document.getElementById('authStatus');

if(user){

status.innerHTML = `
<a href="dashboard.html"
style="
text-decoration:none;
color:var(--dark);
font-weight:700;
">
<i class="fa-solid fa-user"></i>
Mitt Konto
</a>
`;

}else{

status.innerHTML = `
<a href="login.html"
style="
text-decoration:none;
color:var(--dark);
font-weight:700;
">
Logga in
</a>
`;

}

});

/* =====================================================
   BODY TYPE SELECTOR
===================================================== */

document.querySelectorAll('.body-btn')
.forEach(btn=>{

btn.addEventListener('click',()=>{

const type = btn.dataset.type;

if(selectedBodyType === type){

selectedBodyType = null;

btn.classList.remove('active');

return;

}

document.querySelectorAll('.body-btn')
.forEach(b=>b.classList.remove('active'));

selectedBodyType = type;

btn.classList.add('active');

});

});

/* =====================================================
   IMAGE FALLBACK
===================================================== */

function getImage(url){

if(!url || url.trim() === ''){

return 'placeholder.jpg';

}

return url;

}

/* =====================================================
   LOADING STATE
===================================================== */

function renderLoading(){

carsGrid.innerHTML = `
<div style="
grid-column:1/-1;
display:flex;
justify-content:center;
align-items:center;
padding:60px;
font-weight:800;
color:var(--gray-text);
gap:10px;
">
<i class="fa-solid fa-spinner fa-spin"></i>
Laddar bilar...
</div>
`;

}

/* =====================================================
   EMPTY STATE
===================================================== */

function renderEmpty(){

carsGrid.innerHTML = `
<div style="
grid-column:1/-1;
text-align:center;
padding:70px 20px;
">

<i class="fa-solid fa-car-side"
style="
font-size:50px;
color:#cbd5e1;
margin-bottom:20px;
">
</i>

<h3 style="
font-size:22px;
font-weight:900;
margin-bottom:10px;
">
Inga annonser hittades
</h3>

<p style="
color:var(--gray-text);
font-weight:600;
">
Det finns inga fordon att visa just nu.
</p>

</div>
`;

}

/* =====================================================
   FETCH RECENT CARS
===================================================== */

async function fetchRecentCars(){

renderLoading();

try{

const q = query(
collection(db,"cars"),
orderBy("createdAt","desc"),
limit(8)
);

const snap = await getDocs(q);

if(snap.empty){

renderEmpty();

return;

}

let html = '';

snap.forEach(docSnap=>{

const car = docSnap.data();

const isSold =
car.status === 'sold';

html += `
<div class="car-card"
onclick="window.location.href='details.html?id=${docSnap.id}'">

${isSold
? '<div class="sold-badge">SÅLD</div>'
: ''
}

<img
src="${getImage(car.images?.[0])}"
alt="${car.brand || ''}"
loading="lazy"
onerror="this.src='placeholder.jpg'"
style="
width:100%;
height:190px;
object-fit:cover;
${isSold ? 'opacity:0.6;' : ''}
">

<div style="
padding:20px;
${isSold ? 'opacity:0.7;' : ''}
">

<h3 style="
color:var(--primary);
font-size:22px;
font-weight:900;
margin-bottom:6px;
">
${Number(car.price || 0).toLocaleString()} kr
</h3>

<p style="
font-weight:800;
margin-bottom:6px;
">
${car.brand || ''} ${car.model || ''}
</p>

<p style="
color:#64748b;
font-size:13px;
font-weight:600;
">
${car.year || '-'} |
${car.mileage || 0} mil |
${car.fuel || '-'}
</p>

</div>
</div>
`;

});

carsGrid.innerHTML = html;

}catch(error){

console.error(error);

carsGrid.innerHTML = `
<div style="
grid-column:1/-1;
text-align:center;
padding:60px;
">

<i class="fa-solid fa-triangle-exclamation"
style="
font-size:45px;
color:#ef4444;
margin-bottom:20px;
">
</i>

<h3 style="
font-size:22px;
font-weight:900;
margin-bottom:10px;
">
Kunde inte ladda annonser
</h3>

<p style="
color:var(--gray-text);
font-weight:600;
">
Kontrollera Firebase eller internetanslutningen.
</p>

</div>
`;

}

}

/* =====================================================
   SEARCH VALIDATION
===================================================== */

function validateSearch(){

const yearFrom =
Number(document.getElementById('yearFrom').value);

const yearTo =
Number(document.getElementById('yearTo').value);

if(yearFrom && yearTo && yearTo < yearFrom){

alert('År Till måste vara större än År Från');

return false;

}

return true;

}

/* =====================================================
   SEARCH BUTTON
===================================================== */

searchBtn.addEventListener('click',(e)=>{

e.preventDefault();

if(!validateSearch()) return;

searchBtn.disabled = true;

searchBtn.innerHTML = `
<i class="fa-solid fa-spinner fa-spin"></i>
Söker...
`;

const params = new URLSearchParams();

const brand =
document.getElementById('brandSelect').value;

const model =
document.getElementById('modelInput')
.value
.trim();

const price =
document.getElementById('maxPrice').value;

const yFrom =
document.getElementById('yearFrom').value;

const yTo =
document.getElementById('yearTo').value;

const fuel =
document.getElementById('fuelSelect').value;

const gear =
document.getElementById('gearSelect').value;

const mil =
document.getElementById('maxMileage').value;

if(brand !== 'all')
params.append('brand',brand);

if(model)
params.append('model',model);

if(price)
params.append('maxP',price);

if(yFrom)
params.append('yFrom',yFrom);

if(yTo)
params.append('yTo',yTo);

if(fuel !== 'all')
params.append('fuel',fuel);

if(gear !== 'all')
params.append('gear',gear);

if(mil)
params.append('mil',mil);

if(selectedBodyType)
params.append('body',selectedBodyType);

/* =========================================
   REDIRECT
========================================= */

window.location.href =
`results.html?${params.toString()}`;

});

/* =====================================================
   START
===================================================== */

window.addEventListener(
'DOMContentLoaded',
fetchRecentCars
);

</script>

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BilMarknad-HK | Hem</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --primary:#f58220;
    --dark:#111827;
    --bg:#f5f7fb;
    --white:#ffffff;
    --border:#e5e7eb;
    --text:#374151;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--dark);
}

/* ================= HEADER ================= */

header{
    position:sticky;
    top:0;
    z-index:1000;
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);
    padding:16px 5%;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.logo{
    font-size:28px;
    font-weight:800;
    text-decoration:none;
    color:var(--dark);
    letter-spacing:-1px;
}

.logo span{
    color:var(--primary);
}

/* القائمة */

.navbar{
    display:flex;
    align-items:center;
    gap:14px;
}

.nav-link{
    text-decoration:none;
    color:var(--text);
    font-weight:600;
    transition:0.2s;
}

.nav-link:hover{
    color:var(--primary);
}

/* زر تسجيل الدخول */

.btn-login{
    background:white;
    border:1px solid var(--border);
    padding:10px 18px;
    border-radius:12px;
    text-decoration:none;
    color:var(--dark);
    font-weight:700;
    transition:0.25s;
}

.btn-login:hover{
    background:#f3f4f6;
    transform:translateY(-2px);
}

/* زر بيع السيارة */

.btn-sell{
    background:linear-gradient(135deg,var(--primary),#ff9d4d);
    color:white;
    padding:11px 20px;
    border-radius:12px;
    text-decoration:none;
    font-weight:700;
    box-shadow:0 8px 20px rgba(245,130,32,0.25);
    transition:0.25s;
}

.btn-sell:hover{
    transform:translateY(-2px);
}

/* ================= HERO ================= */

.hero{
    padding:70px 5% 30px;
    text-align:center;
}

.hero h1{
    font-size:48px;
    font-weight:800;
    margin-bottom:12px;
}

.hero p{
    color:#6b7280;
    font-size:17px;
    max-width:700px;
    margin:auto;
}

/* ================= SEARCH BOX ================= */

.search-wrapper{
    max-width:1200px;
    margin:35px auto;
    padding:0 5%;
}

.search-strip{
    background:white;
    border-radius:24px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.06);
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:18px;
    align-items:end;
}

.input-group{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.input-group label{
    font-size:12px;
    font-weight:700;
    color:#6b7280;
    text-transform:uppercase;
}

select,
input{
    padding:14px;
    border-radius:14px;
    border:1px solid var(--border);
    background:#f9fafb;
    font-size:14px;
    outline:none;
    transition:0.2s;
}

select:focus,
input:focus{
    border-color:var(--primary);
    background:white;
    box-shadow:0 0 0 4px rgba(245,130,32,0.12);
}

/* زر البحث */

.btn-search{
    background:linear-gradient(135deg,var(--primary),#ff9d4d);
    color:white;
    border:none;
    border-radius:14px;
    padding:14px;
    font-weight:800;
    cursor:pointer;
    transition:0.25s;
    font-size:14px;
    box-shadow:0 8px 20px rgba(245,130,32,0.2);
}

.btn-search:hover{
    transform:translateY(-2px);
}

/* زر الفلاتر */

.btn-filter{
    background:#f3f4f6;
    color:var(--dark);
    text-decoration:none;
    border-radius:14px;
    padding:14px;
    text-align:center;
    font-weight:700;
    border:1px solid var(--border);
    transition:0.2s;
}

.btn-filter:hover{
    background:#e5e7eb;
}

/* ================= CARS ================= */

.results{
    padding:20px 5% 60px;
    max-width:1300px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:25px;
}

.car-card{
    background:white;
    border-radius:22px;
    overflow:hidden;
    transition:0.3s;
    cursor:pointer;
    border:1px solid #eee;
}

.car-card:hover{
    transform:translateY(-6px);
    box-shadow:0 18px 35px rgba(0,0,0,0.08);
}

.car-card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.car-body{
    padding:18px;
}

.car-title{
    font-size:18px;
    font-weight:800;
    margin-bottom:6px;
}

.car-info{
    color:#6b7280;
    font-size:13px;
    margin-bottom:12px;
}

.price{
    color:var(--primary);
    font-size:24px;
    font-weight:800;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

    .hero h1{
        font-size:34px;
    }

    header{
        flex-direction:column;
        gap:15px;
    }

    .navbar{
        width:100%;
        justify-content:center;
        flex-wrap:wrap;
    }
}
</style>
</head>

<body>

<!-- HEADER -->

<header>

    <a href="index.html" class="logo">
        BILMARKNAD<span>HK</span>
    </a>

    <nav class="navbar">
        <a href="manage.html" class="nav-link">Mitt Garage</a>

        <!-- زر تسجيل الدخول -->
        <a href="login.html" class="btn-login">
            Logga in
        </a>

        <a href="sell.html" class="btn-sell">
            Sälj bil
        </a>
    </nav>

</header>

<!-- HERO -->

<section class="hero">
    <h1>Hitta din nästa bil</h1>
    <p>
        Sveriges moderna marknadsplats för nya och begagnade bilar.
        Sök enkelt bland tusentals annonser.
    </p>
</section>

<!-- SEARCH -->

<div class="search-wrapper">

    <div class="search-strip">

        <div class="input-group">
            <label>Märke</label>

            <select id="mainBrand">
                <option value="all">Alla märken</option>
                <option value="Volvo">Volvo</option>
                <option value="Volkswagen">Volkswagen</option>
                <option value="BMW">BMW</option>
                <option value="Audi">Audi</option>
                <option value="Mercedes-Benz">Mercedes-Benz</option>
                <option value="Tesla">Tesla</option>
                <option value="Toyota">Toyota</option>
            </select>
        </div>

        <div class="input-group">
            <label>Pris från</label>
            <input type="number" id="minPrice" placeholder="0 kr">
        </div>

        <div class="input-group">
            <label>Pris till</label>
            <input type="number" id="maxPrice" placeholder="Ingen gräns">
        </div>

        <button class="btn-search" onclick="fastSearch()">
            🔍 SÖK
        </button>

        <a href="filter.html" class="btn-filter">
            Fler filter
        </a>

    </div>

</div>

<!-- RESULTS -->

<div class="results" id="carGrid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import firebaseConfig from './firebase-config.js';

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cars = [];

async function load() {

    const snap = await getDocs(collection(db, "cars"));

    cars = snap.docs.map(doc => ({
        id: doc.id,
        ...doc.data()
    }));

    const p = new URLSearchParams(window.location.search);

    if (p.toString()) applyDeepFilters(p);
    else render(cars);
}

window.fastSearch = () => {

    const b = document.getElementById('mainBrand').value;

    const min = Number(document.getElementById('minPrice').value) || 0;

    const max = Number(document.getElementById('maxPrice').value) || Infinity;

    const filtered = cars.filter(c =>

        (b === 'all' || c.brand === b) &&
        (Number(c.price) >= min) &&
        (Number(c.price) <= max)

    );

    render(filtered);
};

function applyDeepFilters(p) {

    const filtered = cars.filter(c => {

        return (
            (!p.get('brand') || p.get('brand') === 'all' || c.brand === p.get('brand')) &&
            (!p.get('model') || p.get('model') === 'all' || c.model === p.get('model')) &&
            (!p.get('maxPrice') || Number(c.price) <= Number(p.get('maxPrice'))) &&
            (!p.get('kar') || p.get('kar') === 'all' || c.karosseri === p.get('kar'))
        );

    });

    render(filtered);
}

function render(data) {

    const grid = document.getElementById('carGrid');

    grid.innerHTML = data.map(c => `

        <div class="car-card"
             onclick="location.href='details.html?id=${c.id}'">

            <img src="${c.images?.[0] || ''}">

            <div class="car-body">

                <div class="car-title">
                    ${c.brand} ${c.model || ''}
                </div>

                <div class="car-info">
                    ${c.year} | ${c.mileage} mil
                </div>

                <div class="price">
                    ${Number(c.price).toLocaleString()} kr
                </div>

            </div>

        </div>

    `).join('');
}

load();

</script>

</body>
</html>

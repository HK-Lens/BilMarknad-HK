<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <div id="navActions"><a href="login.html" class="btn-login">Logga in</a></div>
</header>
<div class="search-container">
    <select id="brandFilter"><option value="all">Alla märken</option></select>
    <button onclick="applyFilter()">Sök</button>
</div>
<div class="grid" id="carGrid">Laddar bilar...</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, user => {
        if (user) document.getElementById('navActions').innerHTML = `<a href="my-account.html" class="btn-acc">Min Sida</a>`;
    });

    async function loadCars() {
        const snap = await getDocs(query(collection(db, "cars"), orderBy("createdAt", "desc")));
        const grid = document.getElementById('carGrid');
        grid.innerHTML = snap.docs.map(doc => {
            const c = doc.data();
            return `<div class="card" onclick="location.href='details.html?id=${doc.id}'">
                <img src="${c.images[0]}">
                <div class="p-3"><b>${c.brand} ${c.model}</b><br><span class="price">${c.price} kr</span></div>
            </div>`;
        }).join('');
    }
    loadCars();
</script>
</body>
</html>

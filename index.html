<!DOCTYPE html>
<html lang="sv" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>BilMarknad-HK | Köp och sälj bilar</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Roboto', sans-serif; margin: 0; padding: 0; }
        body { background-color: #f0f2f5; color: #333; }

        /* Header */
        header { background: #fff; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 700; color: #0056b3; text-decoration: none; }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .btn-post { background: #28a745; color: white; padding: 10px 20px; border-radius: 4px; text-decoration: none; font-weight: bold; font-size: 14px; }
        .user-link { font-weight: 500; font-size: 14px; color: #0056b3; text-decoration: none; }
        .btn-logout { color: #d9534f; cursor: pointer; font-size: 12px; font-weight: bold; margin-left: 10px; border: none; background: none; }

        /* Search Section */
        .hero-search { background: #002d5a; padding: 40px 5%; color: white; text-align: center; }
        .search-box { background: white; padding: 20px; border-radius: 8px; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; max-width: 1000px; margin: 20px auto 0; }
        .search-box select, .search-box input { padding: 12px; border: 1px solid #ccc; border-radius: 4px; }
        .btn-search { background: #007bff; color: white; border: none; padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        /* Main Content */
        .main-content { padding: 40px 5%; max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        
        /* Car Card */
        .car-card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); position: relative; }
        .car-img { width: 100%; height: 200px; background: #ddd; object-fit: cover; }
        .car-info { padding: 15px; }
        .car-price { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
        .car-title { font-size: 18px; margin-bottom: 10px; font-weight: 500; }
        
        /* Action Buttons */
        .actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-action { flex: 1; padding: 10px; border-radius: 4px; border: 1px solid #ddd; cursor: pointer; font-size: 13px; font-weight: bold; background: #fff; transition: 0.2s; }
        .btn-save { color: #555; }
        .btn-contact { background: #0056b3; color: white; border: none; }
        .btn-action:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">BilMarknad-HK</a>
        <div class="nav-right">
            <a href="#" class="btn-post protected-action">Sälj din bil</a>
            <div id="auth-area">
                </div>
        </div>
    </header>

    <section class="hero-search">
        <h1>Hitta din nästa bil</h1>
        <div class="search-box">
            <select><option>Alla märken</option><option>Volvo</option><option>Tesla</option></select>
            <input type="text" placeholder="Max pris (kr)">
            <button class="btn-search">Sök bilar</button>
        </div>
    </section>

    <main class="main-content">
        <h2 style="margin-bottom: 20px;">Aktuella annonser</h2>
        <div class="grid">
            <div class="car-card">
                <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&q=80&w=400" class="car-img">
                <div class="car-info">
                    <p class="car-price">1 250 000 kr</p>
                    <p class="car-title">Porsche 911 Carrera - 2023</p>
                    <div class="actions">
                        <button class="btn-action btn-save protected-action">Spara ⭐</button>
                        <button class="btn-action btn-contact protected-action">Kontakta</button>
                    </div>
                </div>
            </div>

            <div class="car-card">
                <img src="https://images.unsplash.com/photo-1549399542-7e3f8b79c3d8?auto=format&fit=crop&q=80&w=400" class="car-img">
                <div class="car-info">
                    <p class="car-price">950 000 kr</p>
                    <p class="car-title">Volvo XC90 Recharge - 2024</p>
                    <div class="actions">
                        <button class="btn-action btn-save protected-action">Spara ⭐</button>
                        <button class="btn-action btn-contact protected-action">Kontakta</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDCsMbG5pT3y6MC6b05LEdFoByWM1nT7NY",
            authDomain: "bilmarknad-hk.firebaseapp.com",
            projectId: "bilmarknad-hk",
            appId: "1:284008879407:web:66bee60b51ec277e8dbdda"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const authArea = document.getElementById('auth-area');
        let currentUser = null;

        // التحقق من حالة المستخدم
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                // مستخدم مسجل
                authArea.innerHTML = `
                    <span class="user-link">Välkommen, ${user.displayName}</span>
                    <button id="logout-btn" class="btn-logout">Logga ut</button>
                `;
                document.getElementById('logout-btn').addEventListener('click', () => signOut(auth).then(() => location.reload()));
            } else {
                // زائر
                authArea.innerHTML = `<a href="login.html" class="user-link">Logga in</a>`;
            }
        });

        // حماية الأزرار الخاصة (النشر، الحفظ، المراسلة)
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('protected-action')) {
                if (!currentUser) {
                    e.preventDefault();
                    if (confirm("Du måste vara inloggad för att göra detta. Vill du logga in nu?")) {
                        window.location.href = 'login.html';
                    }
                } else {
                    // إذا كان مسجلاً، يمكن إضافة المنطق الخاص بكل زر هنا
                    if (e.target.classList.contains('btn-save')) alert("Sparad till dina favoriter!");
                    if (e.target.classList.contains('btn-contact')) alert("Öppnar chatt med säljaren...");
                }
            }
        });
    </script>
</body>
</html>

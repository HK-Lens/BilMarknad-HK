<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilHK | Hitta din nästa bil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        header { background: white; padding: 1rem 6%; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--dark); text-decoration: none; }
        .logo span { color: var(--primary); }
        .btn-reg { background: var(--primary); color: white; padding: 0.6rem 1.2rem; border-radius: 10px; text-decoration: none; font-weight: 700; transition: 0.3s; }
        .btn-reg:hover { background: #e07210; }
    </style>
</head>
<body>
<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <div class="nav-auth">
        <a href="login.html" style="margin-right: 15px; text-decoration: none; color: var(--dark); font-weight: 600;">Logga in</a>
        <a href="register.html" class="btn-reg">Skapa konto</a>
    </div>
</header>
</body>
</html>

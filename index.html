<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilMarknad-HK | Hitta din nästa bil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --bg: #f8fafc;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--dark);
        }

        /* نافبار شفاف وأنيق */
        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #e2e8f0;
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            color: var(--dark);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo span { color: var(--primary); }

        /* منطقة الهيرو - مثل Bytbil */
        .hero {
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)), 
                        url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&q=80&w=1500');
            background-size: cover;
            background-position: center;
            height: 450px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 { font-size: 42px; margin-bottom: 20px; font-weight: 800; }

        .search-wrapper {
            background: white;
            padding: 10px;
            border-radius: 50px;
            display: flex;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .search-wrapper input {
            flex: 1;
            border: none;
            padding: 15px 25px;
            font-size: 16px;
            border-radius: 50px;
            outline: none;
        }

        /* شبكة السيارات التفاعلية */
        .main-content { padding: 50px 8%; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .car-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #f1f5f9;
            cursor: pointer;
        }

        .car-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .car-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .car-card:hover img { transform: scale(1.05); }

        .car-content { padding: 20px; }
        .car-tag {
            background: #dbeafe;
            color: var(--primary);
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .car-title { font-size: 18px; font-weight: 700; margin: 10px 0 5px 0; }
        .car-reg { color: #64748b; font-size: 13px; margin-bottom: 15px; }
        
        .car-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #f1f5f9;
            padding-top: 15px;
        }

        .price { font-size: 22px; font-weight: 800; color: var(--primary); }
        .view-btn { 
            background: var(--dark); color: white; border: none; 
            padding: 8px 18px; border-radius: 10px; font-weight: 600; cursor: pointer;
        }

        /* منطقة المستخدم */
        .user-nav { position: relative; }
        .user-pill {
            background: #f1f5f9; padding: 5px 15px; border-radius: 50px;
            display: flex; align-items: center; gap: 10px; font-weight: 600; cursor: pointer;
        }
        .dropdown {
            display: none; position: absolute; right: 0; top: 45px;
            background: white; border-radius: 15px; width: 200px;
            box-shadow: 0 10px 15px rgba(0,0,0,0.1); border: 1px solid #f1f5f9; overflow: hidden;
        }
        .dropdown a { display: block; padding: 12px 20px; text-decoration: none; color: #475569; font-size: 14px; }
        .dropdown a:hover { background: #f8fafc; color: var(--primary); }

    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BILMARKNAD<span>HK</span></a>
    <div id="authSection">
        <a href="login.html" id="loginBtn" style="text-decoration: none; font-weight: 700; color: var(--primary);">Logga in</a>
        <div class="user-nav" id="userArea" style="display:none;">
            <div class="user-pill" onclick="toggleDrop()">
                <div style="width:25px; height:25px; background:var(--primary); border-radius:50%;"></div>
                <span id="userName">Hejsan!</span>
            </div>
            <div class="dropdown" id="dropMenu">
                <a href="manage.html">Mina annonser</a>
                <a href="sell.html">Sälj din bil</a>
                <a href="#" onclick="logout()" style="color: #ef4444;">Logga ut</a>
            </div>
        </div>
    </div>
</header>

<section class="hero">
    <h1>Hitta din nästa bil</h1>
    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Sök märke, modell eller regnr..." oninput="searchCars()">
    </div>
</section>

<main class="main-content">
    <div class="grid" id="carGrid">
        </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let cars = [];

    async function loadData() {
        const snap = await getDocs(collection(db, "cars"));
        cars = snap.docs.map(d => ({id: d.id, ...d.data()}));
        render(cars);
    }

    function render(data) {
        const grid = document.getElementById('carGrid');
        grid.innerHTML = data.map(car => `
            <div class="car-card">
                <img src="${car.images?.[0] || 'https://via.placeholder.com/400x250'}">
                <div class="car-content">
                    <span class="car-tag">Toppskick</span>
                    <div class="car-title">${car.brand}</div>
                    <div class="car-reg">Registreringsnummer: ${car.regNr}</div>
                    <div class="car-footer">
                        <div class="price">${Number(car.price).toLocaleString()} kr</div>
                        <button class="view-btn">Visa</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    window.searchCars = () => {
        const val = document.getElementById('searchInput').value.toLowerCase();
        render(cars.filter(c => c.brand.toLowerCase().includes(val) || c.regNr.toLowerCase().includes(val)));
    };

    onAuthStateChanged(auth, user => {
        if(user) {
            document.getElementById('loginBtn').style.display='none';
            document.getElementById('userArea').style.display='block';
            document.getElementById('userName').innerText = user.displayName;
        }
    });

    window.toggleDrop = () => {
        const m = document.getElementById('dropMenu');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    };

    window.logout = () => signOut(auth).then(() => location.reload());

    loadData();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilMarknad-HK | Premium Hem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #f58220; 
            --dark: #0f172a; 
            --bg: #f8fafc; 
            --border: #e2e8f0; 
            --glass: rgba(255, 255, 255, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); }

        /* إخفاء أسهم خانات الأرقام */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        /* --- Header مع نظام التعرف على المستخدم --- */
        header {
            position: sticky; top: 0; z-index: 1000;
            background: var(--glass); backdrop-filter: blur(12px);
            padding: 15px 6%; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        .logo { text-decoration: none; font-size: 26px; font-weight: 900; color: var(--dark); letter-spacing: -1px; }
        .logo span { color: var(--primary); }

        .nav-actions { display: flex; gap: 15px; align-items: center; }
        .btn { text-decoration: none; padding: 10px 20px; border-radius: 12px; font-weight: 700; font-size: 14px; transition: 0.3s; display: inline-flex; align-items: center; }
        .btn-login { border: 1px solid var(--border); color: var(--dark); background: white; }
        .btn-sell { background: var(--dark); color: white; }
        .btn-sell:hover { background: var(--primary); transform: translateY(-2px); }

        /* --- Hero Section --- */
        .hero { padding: 80px 6% 40px; text-align: center; }
        .hero h1 { font-size: 48px; font-weight: 900; letter-spacing: -2px; margin-bottom: 15px; }
        .hero p { color: #64748b; font-size: 19px; max-width: 600px; margin: auto; }

        /* --- Search Card --- */
        .search-container { max-width: 1100px; margin: 0 auto 60px; padding: 0 20px; }
        .search-card {
            background: white; padding: 30px; border-radius: 28px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.06);
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;
            align-items: flex-end; border: 1px solid rgba(255,255,255,0.5);
        }
        .field { display: flex; flex-direction: column; gap: 8px; }
        .field label { font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
        select, input { height: 52px; padding: 0 15px; border: 1px solid var(--border); border-radius: 14px; font-size: 15px; font-weight: 600; background: #fcfcfc; outline: none; transition: 0.2s; }
        select:focus, input:focus { border-color: var(--primary); background: white; }

        .btn-search { height: 52px; background: var(--primary); color: white; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .btn-search:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(245, 130, 32, 0.3); }

        /* --- Car Grid --- */
        .grid { max-width: 1300px; margin: auto; padding: 0 6% 80px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .car-card { background: white; border-radius: 24px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: 0.4s; position: relative; }
        .car-card:hover { transform: translateY(-12px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        .car-card img { width: 100%; height: 220px; object-fit: cover; }
        .card-info { padding: 25px; }
        .card-title { font-weight: 800; font-size: 20px; margin-bottom: 5px; }
        .card-meta { color: #94a3b8; font-size: 13px; font-weight: 600; }
        .price { font-size: 24px; font-weight: 900; color: var(--primary); margin-top: 15px; }

        /* --- Favorite Button --- */
        .fav-btn {
            position: absolute; top: 15px; right: 15px;
            background: rgba(255,255,255,0.9); border: none;
            width: 40px; height: 40px; border-radius: 50%;
            cursor: pointer; font-size: 20px; display: flex;
            align-items: center; justify-content: center; transition: 0.3s;
            z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .fav-btn.active { color: #ef4444; background: white; }

        /* --- Footer --- */
        footer { background: white; padding: 60px 6% 30px; border-top: 1px solid var(--border); text-align: center; margin-top: 40px; }
        .footer-content { max-width: 800px; margin: auto; }
        .footer-disclaimer { font-size: 13px; color: #64748b; line-height: 1.6; margin: 20px 0; }
        .footer-links { display: flex; justify-content: center; gap: 25px; margin-bottom: 30px; }
        .footer-links a { text-decoration: none; color: var(--dark); font-weight: 700; font-size: 14px; }
    </style>
</head>

<header>

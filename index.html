<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilMarknad-HK | Hem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f58220;
            --dark: #111827;
            --bg: #f4f6f9;
            --white: #ffffff;
            --border: #e5e7eb;
            --text: #4b5563;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--dark);
        }

        /* ================= HEADER (ثابت) ================= */
        header {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 16px 5%;
            display: flex; align-items: center; justify-content: space-between;
        }

        .logo {
            text-decoration: none; font-size: 28px; font-weight: 800;
            color: var(--dark); letter-spacing: -1px;
        }

        .logo span { color: var(--primary); }

        .navbar { display: flex; align-items: center; gap: 14px; }

        .nav-link {
            text-decoration: none; color: var(--text);
            font-weight: 700; transition: 0.2s;
        }

        .btn-login {
            background: white; border: 1px solid var(--border);
            padding: 11px 18px; border-radius: 12px;
            text-decoration: none; color: var(--dark); font-weight: 700;
        }

        .btn-sell {
            background: linear-gradient(135deg, var(--primary), #ff9d4d);
            color: white; padding: 11px 20px; border-radius: 12px;
            text-decoration: none; font-weight: 800;
            box-shadow: 0 8px 20px rgba(245,130,32,0.25);
        }

        /* ================= HERO (ثابت) ================= */
        .hero { padding: 60px 5% 20px; text-align: center; }
        .hero h1 { font-size: 48px; font-weight: 800; margin-bottom: 12px; }
        .hero p { color: #6b7280; font-size: 17px; max-width: 700px; margin: auto; }

        /* ================= SEARCH SECTION (واجهة البحث الثابتة) ================= */
        .search-section { max-width: 1200px; margin: auto; padding: 20px 5% 40px; }
        
        .search-tabs { display: flex; gap: 5px; }
        .tab {
            border: none; padding: 14px 22px; border-radius: 14px 14px 0 0;
            background: #e2e8f0; font-weight: 800; cursor: pointer; color: #64748b;
        }
        .tab.active { background: white; color: var(--dark); }

        .search-box {
            background: white; padding: 30px; border-radius: 0 20px 20px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .search-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px; align-items: end;
        }

        .field { display: flex; flex-direction: column; gap: 8px; }
        .field label { font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; }

        .field select, .field input {
            height: 50px; border: 1px solid var(--border); border-radius: 12px;
            padding: 0 15px; font-size: 15px; background: #fcfcfc;
        }

        .search-btn {
            height: 50px; border: none; border-radius: 12px;
            background: var(--dark); color: white; font-weight: 800;
            cursor: pointer; transition: 0.3s;
        }

        .search-btn:hover { background: var(--primary); }

        .extra-filters { margin-top: 20px; display: flex; gap: 15px; font-size: 14px; }
        .extra-filters a { text-decoration: none; color: var(--primary); font-weight: 700; }

        /* ================= RESULTS GRID ================= */
        .results {
            max-width: 1200px; margin: auto; padding: 20px 5% 80px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px;
        }

        .car-card {
            background: white; border-radius: 20px; overflow: hidden;
            border: 1px solid var(--border); cursor: pointer; transition: 0.3s;
        }

        .car-card img { width: 100%; height: 190px; object-fit: cover; }
        .car-body { padding: 18px; }
        .car-title { font-size: 18px; font-weight: 800; margin-bottom: 5px; }
        .car-info { color: #64748b; font-size: 13px; margin-bottom: 12px; }
        .price { font-size: 22px; font-weight: 800; color: var(--primary); }

        @media(max-width: 768px) {
            .hero h1 { font-size: 32px; }
            .search-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

<header>
    <a href="index.html" class="logo">BILMARKNAD<span>HK</span></a>
    <nav class="navbar">
        <a href="manage.html" class="nav-link">Mitt Garage</a>
        <a href="login.html" class="btn-login" id="authBtn">Logga in</a>
        <a href="sell.html" class="btn-sell">Sälj bil</a>
    </nav>
</header>

<section class="hero">
    <h1>Hitta din nästa bil</h1>
    <p>Sveriges moderna marknadsplats för nya och begagnade bilar.</p>
</section>

<section class="search-section">
    <div class="search-tabs">
        <button class="tab active">Begagnade bilar</button>
        <button class="tab">Nya bilar</button>
    </div>

    <div class="search-box">
        <div class="search-grid">
            <div class="field">
                <label>Märke</label>
                <select id="brandSelect">
                    <option value="all">Alla märken</option>
                </select>
            </div>

            <div class="field">
                <label>Modell</label>
                <select id="modelSelect">
                    <option value="all">Alla modeller</option>
                </select>
            </div>

            <div class="field">
                <label>Maxpris</label>
                <input type="number" id="maxPrice" placeholder="Ex. 200 000">
            </div>

            <button class="search-btn" onclick="applySearch()">SÖK BILAR</button>
        </div>

        <div class="extra-filters">
            <a href="filter.html">⚙️ Fler filter</a>
            <a href="#">Elbil</a>
            <a href="#">Hybrid</a>
        </div>
    </div>
</section>

<div class="results" id="carGrid">
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import firebaseConfig from './firebase-config.js';
    import { carData } from './cars-data.js'; // استيراد قاعدة بيانات الماركات

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allCars = [];

    // 1. إعداد قائمة الماركات والموديلات الذكية
    const brandSelect = document.getElementById('brandSelect');
    const modelSelect = document.getElementById('modelSelect');

    Object.keys(carData).sort().forEach(brand => {
        brandSelect.innerHTML += `<option value="${brand}">${brand}</option>`;
    });

    brandSelect.onchange = () => {
        const brand = brandSelect.value;
        modelSelect.innerHTML = '<option value="all">Alla modeller</option>';
        if (carData[brand]) {
            carData[brand].sort().forEach(model => {
                modelSelect.innerHTML += `<option value="${model}">${model}</option>`;
            });
        }
    };

    // 2. تحميل البيانات من Firebase
    async function load() {
        const snap = await getDocs(collection(db, "cars"));
        allCars = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        render(allCars);
    }

    // 3. وظيفة البحث
    window.applySearch = () => {
        const brand = brandSelect.value;
        const model = modelSelect.value;
        const max = Number(document.getElementById('maxPrice').value) || Infinity;

        const filtered = allCars.filter(c => 
            (brand === 'all' || c.brand === brand) &&
            (model === 'all' || c.model === model) &&
            (Number(c.price) <= max)
        );
        render(filtered);
    };

    // 4. عرض البطاقات (التصميم ثابت هنا)
    function render(data) {
        const grid = document.getElementById('carGrid');
        grid.innerHTML = data.map(c => `
            <div class="car-card" onclick="location.href='details.html?id=${c.id}'">
                <img src="${c.images?.[0] || 'https://via.placeholder.com/400x250'}">
                <div class="car-body">
                    <div class="car-title">${c.brand} ${c.model || ''}</div>
                    <div class="car-info">${c.year} | ${c.mileage} mil</div>
                    <div class="price">${Number(c.price).toLocaleString()} kr</div>
                </div>
            </div>
        `).join('');
    }

    load();
</script>

</body>
</html>

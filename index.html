<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BilMarknad-HK | Hem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); overflow-x: hidden; }
        
        header { position: sticky; top: 0; z-index: 1000; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); padding: 12px 6%; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .logo { text-decoration: none; font-size: 24px; font-weight: 900; color: var(--dark); }
        .logo span { color: var(--primary); }

        .btn { text-decoration: none; padding: 10px 18px; border-radius: 12px; font-weight: 700; font-size: 13px; transition: 0.2s; }
        .btn-sell { background: var(--dark); color: white; margin-left: 10px; }

        .search-container { max-width: 1100px; margin: 30px auto; padding: 0 15px; }
        .search-card { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 15px 40px rgba(0,0,0,0.06); border: 1px solid var(--border); display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 768px) { .search-card { grid-template-columns: 1.5fr 1fr 1fr auto; align-items: flex-end; } }
        
        .field { display: flex; flex-direction: column; gap: 6px; }
        .field label { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; }
        select, input { height: 50px; padding: 0 15px; border: 1px solid var(--border); border-radius: 12px; font-size: 15px; outline: none; background: #fcfcfc; }
        .btn-search { height: 50px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; padding: 0 30px; transition: 0.3s; }

        .grid { max-width: 1300px; margin: auto; padding: 0 15px 80px; display: grid; grid-template-columns: 1fr; gap: 25px; }
        @media (min-width: 600px) { .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); } }
        
        .car-card { background: white; border-radius: 22px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: 0.4s; position: relative; }
        .car-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        .car-card img { width: 100%; height: 210px; object-fit: cover; }
        .card-info { padding: 20px; }
        .price { font-size: 22px; font-weight: 900; color: var(--primary); margin-top: 8px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <div id="navActions">
        <a href="login.html" class="btn" style="border: 1px solid var(--border);">Logga in</a>
    </div>
</header>

<div class="search-container">
    <div class="search-card">
        <div class="field">
            <label>Märke</label>
            <select id="brandSelect"><option value="all">Alla märken</option></select>
        </div>
        <div class="field">
            <label>Pris från</label>
            <input type="number" id="minPrice" placeholder="0 kr">
        </div>
        <div class="field">
            <label>Pris till</label>
            <input type="number" id="maxPrice" placeholder="Högsta">
        </div>
        <button class="btn-search" onclick="applySearch()">SÖK BILAR</button>
    </div>
    <div style="text-align: center; margin-top: 20px;">
        <a href="filter.html" style="text-decoration:none; color:var(--primary); font-weight:700; font-size:14px;">⚙️ Fler sökfilter (Kaross, Bränsle...)</a>
    </div>
</div>

<div class="grid" id="carGrid"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';
    import { carData } from './cars-data.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let allCars = [];

    onAuthStateChanged(auth, user => {
        const nav = document.getElementById('navActions');
        if (user) {
            nav.innerHTML = `
                <a href="my-account.html" class="btn" style="border:1px solid #ddd;">Min Sida</a>
                <a href="sell.html" class="btn btn-sell">Sälj bil</a>`;
        }
        load();
    });

    const bSel = document.getElementById('brandSelect');
    Object.keys(carData).sort().forEach(b => bSel.innerHTML += `<option value="${b}">${b}</option>`);

    async function load() {
        const snap = await getDocs(query(collection(db, "cars"), orderBy("createdAt", "desc")));
        allCars = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        render(allCars);
    }

    window.applySearch = () => {
        const b = bSel.value;
        const min = Number(document.getElementById('minPrice').value) || 0;
        const max = Number(document.getElementById('maxPrice').value) || Infinity;
        render(allCars.filter(c => (b==='all' || c.brand===b) && (c.price >= min && c.price <= max)));
    };

    function render(data) {
        const grid = document.getElementById('carGrid');
        grid.innerHTML = data.map(c => `
            <div class="car-card" onclick="location.href='details.html?id=${c.id}'">
                <img src="${c.images?.[0] || ''}">
                <div class="card-info">
                    <div style="font-weight:800; font-size:18px;">${c.brand} ${c.model || ''}</div>
                    <div style="font-size:12px; color:#94a3b8; margin:5px 0;">${c.year} • ${c.mileage} mil • ${c.fuelType}</div>
                    <div class="price">${Number(c.price).toLocaleString()} kr</div>
                </div>
            </div>
        `).join('');
    }
</script>
</body>
</html>

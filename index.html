<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilMarknad-HK | تسجيل الدخول</title>
    <style>
        /* تنسيق بسيط للزر ليظهر بشكل احترافي */
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
        .login-container { text-align: center; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        button { background-color: #4285F4; color: white; border: none; padding: 12px 24px; border-radius: 5px; font-size: 16px; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #357ae8; }
        #user-info { margin-top: 20px; color: #333; }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>مرحباً بك في BilMarknad-HK</h1>
        <p>يرجى تسجيل الدخول للمتابعة</p>
        <button id="login-btn">تسجيل الدخول باستخدام Google</button>
        <div id="user-info"></div>
    </div>

    <script type="module">
        // استدعاء وظائف Firebase اللازمة
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // إعدادات مشروعك الخاصة (BilMarknad-HK)
        const firebaseConfig = {
            apiKey: "AIzaSyDCsMbG5pT3y6MC6b05LEdFoByWM1nT7NY",
            authDomain: "bilmarknad-hk.firebaseapp.com",
            databaseURL: "https://bilmarknad-hk-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bilmarknad-hk",
            storageBucket: "bilmarknad-hk.firebasestorage.app",
            messagingSenderId: "284008879407",
            appId: "1:284008879407:web:66bee60b51ec277e8dbdda",
            measurementId: "G-HZ54056GSG"
        };

        // تهيئة التطبيق
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // تفعيل زر تسجيل الدخول
        const loginBtn = document.getElementById('login-btn');
        const userInfoDiv = document.getElementById('user-info');

        loginBtn.addEventListener('click', () => {
            signInWithPopup(auth, provider)
                .then((result) => {
                    const user = result.user;
                    console.log("نجح الدخول:", user);
                    userInfoDiv.innerHTML = `<h3>مرحباً ${user.displayName}</h3><p>إيميلك: ${user.email}</p>`;
                    alert("تم تسجيل الدخول بنجاح!");
                })
                .catch((error) => {
                    console.error("خطأ في تسجيل الدخول:", error.message);
                    alert("حدث خطأ: " + error.message);
                });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilMarknad-HK | Hitta din nästa bil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --bg: #f8fafc;
            --white: #ffffff;
            --gray: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--dark);
            line-height: 1.6;
        }

        /* الهيدر */
        header {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #e2e8f0;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            color: var(--dark);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo span { color: var(--primary); }

        /* منطقة الفلاتر والبحث */
        .search-hero {
            background: var(--dark);
            padding: 60px 5% 100px 5%;
            text-align: center;
            color: white;
        }

        .search-hero h1 {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 30px;
        }

        .filter-container {
            max-width: 1100px;
            margin: -60px auto 0 auto;
            background: var(--white);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            border: 1px solid #e2e8f0;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .filter-group label {
            font-size: 12px;
            font-weight: 700;
            color: var(--gray);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .filter-group select, .filter-group input {
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
            background-color: #fcfcfc;
            transition: 0.2s;
        }

        .filter-group select:focus, .filter-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        /* شبكة السيارات */
        .main-content {
            padding: 60px 5%;
            max-width: 1300px;
            margin: auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .car-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid #e2e8f0;
            position: relative;
        }

        .car-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .car-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .car-content { padding: 20px; }

        .car-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .car-meta {
            font-size: 13px;
            color: var(--gray);
            margin-bottom: 15px;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #f1f5f9;
            padding-top: 15px;
        }

        .price {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
        }

        .view-btn {
            background: var(--dark);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .view-btn:hover { background: var(--primary); }

        /* منطقة المستخدم */
        .user-nav { position: relative; cursor: pointer; }
        .dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: 45px;
            background: white;
            border-radius: 12px;
            width: 200px;
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
            border: 1px solid #f1f5f9;
            overflow: hidden;
        }
        .dropdown a {
            display: block;
            padding: 12px 20px;
            text-decoration: none;
            color: #475569;
            font-size: 14px;
        }
        .dropdown a:hover { background: #f8fafc; color: var(--primary); }

    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BILMARKNAD<span>HK</span></a>
    <div id="authSection">
        <a href="login.html" id="loginBtn" style="text-decoration: none; font-weight: 700; color: var(--primary);">Logga in</a>
        <div class="user-nav" id="userArea" style="display:none;" onclick="toggleDrop()">
            <span id="uName" style="font-weight:700;">Användare ▾</span>
            <div class="dropdown" id="dropMenu">
                <a href="manage.html">Mina annonser</a>
                <a href="sell.html">Sälj din bil</a>
                <hr style="border:0; border-top:1px solid #f1f5f9; margin:0;">
                <a href="#" onclick="logout()" style="color: #ef4444;">Logga ut</a>
            </div>
        </div>
    </div>
</header>

<section class="search-hero">
    <h1>Hitta din drömbil hos oss</h1>
</section>

<div class="filter-container">
    <div class="filter-group">
        <label>Märke</label>
        <select id="brandFilter" onchange="applyFilters()">
            <option value="all">Alla märken</option>
            <option value="Volvo">Volvo</option>
            <option value="BMW">BMW</option>
            <option value="Audi">Audi</option>
            <option value="Volkswagen">Volkswagen</option>
            <option value="Mercedes-Benz">Mercedes-Benz</option>
            <option value="Tesla">Tesla</option>
            <option value="Toyota">Toyota</option>
        </select>
    </div>
    <div class="filter-group">
        <label>Modellår</label>
        <select id="yearFilter" onchange="applyFilters()">
            <option value="all">Alla år</option>
            <option value="2024">2024</option>
            <option value="2023">2023</option>
            <option value="2022">2022</option>
            <option value="2021">2021</option>
            <option value="2020">2020</option>
        </select>
    </div>
    <div class="filter-group">
        <label>Miltal (Max)</label>
        <select id="mileageFilter" onchange="applyFilters()">
            <option value="all">Alla mil</option>
            <option value="5000">0 - 5 000 mil</option>
            <option value="10000">0 - 10 000 mil</option>
            <option value="15000">0 - 15 000 mil</option>
        </select>
    </div>
    <div class="filter-group">
        <label>Max Pris (kr)</label>
        <input type="number" id="priceFilter" placeholder="t.ex. 250000" oninput="applyFilters()">
    </div>
</div>

<main class="main-content">
    <div class="grid" id="carGrid">
        </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let cars = [];

    // جلب البيانات من Firebase
    async function loadCars() {
        const snap = await getDocs(collection(db, "cars"));
        cars = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        render(cars);
    }

    function render(data) {
        const grid = document.getElementById('carGrid');
        if (data.length === 0) {
            grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: gray;">Inga bilar matchar din sökning.</p>';
            return;
        }
        grid.innerHTML = data.map(car => `
            <div class="car-card">
                <img src="${car.images?.[0] || 'https://via.placeholder.com/400x250?text=Ingen+bild'}" alt="Bil">
                <div class="car-content">
                    <div class="car-title">${car.brand}</div>
                    <div class="car-meta">📅 ${car.year || 'N/A'} | 🛣️ ${car.mileage || 0} mil</div>
                    <div class="price-row">
                        <div class="price">${Number(car.price).toLocaleString()} kr</div>
                        <button class="view-btn" onclick="window.location.href='details.html?id=${car.id}'">Visa</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    window.applyFilters = () => {
        const brand = document.getElementById('brandFilter').value;
        const year = document.getElementById('yearFilter').value;
        const mileage = document.getElementById('mileageFilter').value;
        const price = document.getElementById('priceFilter').value;

        const filtered = cars.filter(car => {
            const matchBrand = (brand === 'all' || car.brand === brand);
            const matchYear = (year === 'all' || car.year == year);
            const matchMileage = (mileage === 'all' || Number(car.mileage) <= Number(mileage));
            const matchPrice = (!price || Number(car.price) <= Number(price));
            return matchBrand && matchYear && matchMileage && matchPrice;
        });
        render(filtered);
    };

    onAuthStateChanged(auth, user => {
        const loginBtn = document.getElementById('loginBtn');
        const userArea = document.getElementById('userArea');
        if (user) {
            loginBtn.style.display = 'none';
            userArea.style.display = 'block';
            document.getElementById('uName').innerText = user.displayName + " ▾";
        } else {
            loginBtn.style.display = 'block';
            userArea.style.display = 'none';
        }
    });

    window.toggleDrop = () => {
        const m = document.getElementById('dropMenu');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    };

    window.logout = () => signOut(auth).then(() => location.reload());

    // التحميل الأولي
    loadCars();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="BILHK är en digital annonsplattform för att köpa och sälja bilar i Sverige.">
    <title>BilMarknad HK | Köp och sälj bilar</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* (تم الاحتفاظ بكامل الـ CSS الخاص بك كما هو لعدم تخريب التصميم) */
        :root {
            --primary: #f58220; --primary-hover: #e07210; --dark: #0f172a; --light: #f8fafc;
            --border: #e2e8f0; --white: #ffffff; --danger: #ef4444; --success: #10b981;
            --gray-text: #64748b; --shadow: 0 10px 20px rgba(0,0,0,.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Inter, sans-serif; }
        body { background: var(--light); color: var(--dark); min-height: 100vh; display: flex; flex-direction: column; }
        .notice { background: var(--danger); color: white; text-align: center; padding: 10px 18px; font-size: 13px; font-weight: 800; line-height: 1.5; }
        header { background: var(--white); padding: 15px 6%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .logo { text-decoration: none; font-size: 26px; font-weight: 900; color: var(--dark); letter-spacing: -0.7px; white-space: nowrap; }
        .logo span { color: var(--primary); }
        .top-nav { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
        .top-link, .sell-link, .account-link, .login-link { font-weight: 900; text-decoration: none; color: var(--dark); font-size: 14px; display: inline-flex; align-items: center; gap: 7px; white-space: nowrap; }
        .sell-link { color: var(--primary); border: 2px solid var(--primary); padding: 8px 18px; border-radius: 50px; background: white; }
        .sell-link:hover { background: #fff7ed; }
        .account-link { background: var(--dark); color: white; padding: 9px 18px; border-radius: 50px; }
        .login-link { background: #f1f5f9; padding: 9px 18px; border-radius: 50px; border: 1px solid var(--border); }
        #msgBadge { display: none; background: var(--danger); color: white; border-radius: 999px; padding: 2px 7px; margin-left: 4px; font-size: 11px; font-weight: 900; }
        .hero { background: linear-gradient(rgba(15,23,42,.72), rgba(15,23,42,.72)), url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=2000') center/cover; padding: 85px 20px; text-align: center; color: white; }
        .hero h1 { font-size: 44px; font-weight: 900; margin-bottom: 12px; letter-spacing: -1px; }
        .hero p { font-size: 17px; color: #e2e8f0; font-weight: 500; }
        .search-container { background: white; max-width: 1120px; width: calc(100% - 24px); margin: -55px auto 0; padding: 28px; border-radius: 24px; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .body-types { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 22px; }
        .body-btn { background: white; border: 1px solid var(--border); padding: 10px 18px; border-radius: 12px; cursor: pointer; font-weight: 800; color: var(--dark); transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .body-btn.active, .body-btn:hover { border-color: var(--primary); color: var(--primary); background: #fff7ed; }
        .search-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 14px; }
        .search-group label { display: block; font-size: 11px; font-weight: 900; color: var(--gray-text); margin-bottom: 6px; text-transform: uppercase; }
        .search-group input, .search-group select { width: 100%; padding: 13px; border: 1px solid var(--border); border-radius: 12px; background: #f8fafc; font-weight: 700; color: var(--dark); outline: none; }
        .search-group input:focus, .search-group select:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(245,130,32,.10); }
        .actions { display: flex; gap: 14px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .btn-search, .btn-advanced { padding: 15px 30px; border-radius: 12px; font-weight: 900; text-decoration: none; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-search { background: var(--primary); color: white; border: 0; min-width: 240px; font-size: 15px; }
        .btn-search:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-advanced { background: #f1f5f9; color: var(--dark); border: 1px solid var(--border); }
        .btn-advanced:hover { background: white; border-color: var(--primary); color: var(--primary); }
        .main-content { max-width: 1200px; width: 100%; margin: 55px auto; padding: 0 20px; flex: 1; }
        .section-head { display: flex; justify-content: space-between; align-items: center; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .section-title { font-size: 28px; font-weight: 900; display: flex; align-items: center; gap: 10px; }
        .view-all { color: var(--primary); text-decoration: none; font-weight: 900; font-size: 14px; }
        .cars-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
        .car-card { background: white; border: 1px solid var(--border); border-radius: 20px; overflow: hidden; cursor: pointer; position: relative; transition: .2s; }
        .car-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
        .car-img-wrap { width: 100%; height: 190px; background: #e2e8f0; position: relative; overflow: hidden; }
        .car-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .car-info { padding: 20px; }
        .car-price { color: var(--primary); font-size: 22px; font-weight: 900; margin-bottom: 6px; }
        .car-name { font-size: 16px; font-weight: 900; margin-bottom: 10px; line-height: 1.4; }
        .empty-state, .loading-state, .error-state { grid-column: 1 / -1; background: white; border: 1px solid var(--border); border-radius: 18px; padding: 45px 20px; text-align: center; color: var(--gray-text); font-weight: 700; }
        footer { background: white; border-top: 1px solid var(--border); padding: 34px 20px; text-align: center; color: #94a3b8; font-size: 13px; margin-top: auto; }
        @media(max-width: 620px) {
            header { padding: 14px 18px; align-items: flex-start; gap: 10px; }
            .hero h1 { font-size: 32px; } .hero { padding: 60px 16px; }
            .search-container { margin: -35px 12px 0; padding: 20px; }
            .btn-search, .btn-advanced { width: 100%; }
        }
    </style>
</head>
<body>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilMarknad HK | Köp och sälj bilar i Sverige</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #f58220;
            --primary-hover: #e07210;
            --dark: #0f172a;
            --light: #f8fafc;
            --border: #e2e8f0;
            --white: #ffffff;
            --danger: #ef4444;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--light); color: var(--dark); }
        
        header { background: var(--white); padding: 15px 6%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { text-decoration: none; font-size: 26px; font-weight: 900; color: var(--dark); letter-spacing: -1px; }
        .logo span { color: var(--primary); }

        .hero { background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)), url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=2000') center/cover; padding: 100px 20px; text-align: center; color: white; }
        .hero h1 { font-size: 48px; font-weight: 900; margin-bottom: 20px; }

        .search-container { background: white; max-width: 1000px; margin: -50px auto 0; padding: 30px; border-radius: 24px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .search-group { display: flex; flex-direction: column; gap: 8px; }
        .search-group label { font-size: 13px; font-weight: 700; color: #64748b; }
        .search-group select, .search-group input { padding: 12px; border: 1px solid var(--border); border-radius: 12px; font-size: 15px; outline: none; background: #f1f5f9; }

        .btn-search { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 25px; }
        .btn-search:hover { background: var(--primary-hover); transform: translateY(-2px); }

        .main-content { max-width: 1200px; margin: 60px auto; padding: 0 20px; }
        .section-title { font-size: 28px; font-weight: 900; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }

        .cars-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .car-card { background: white; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); transition: 0.3s; cursor: pointer; }
        .car-card:hover { transform: translateY(-5px); box-shadow: var(--shadow); }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <div id="authStatus"></div>
</header>

<div class="hero">
    <h1>Hitta din nästa bil</h1>
    <p>Sveriges enklaste marknadsplats för fordon</p>
</div>

<div class="search-container">
    <div class="search-group">
        <label>Märke</label>
        <select id="brandSelect">
            <option value="all">Alla märken</option>
            <option value="Volvo">Volvo</option>
            <option value="Volkswagen">Volkswagen</option>
            <option value="BMW">BMW</option>
            <option value="Audi">Audi</option>
        </select>
    </div>
    <div class="search-group">
        <label>Modell</label>
        <select id="modelSelect">
            <option value="all">Alla modeller</option>
        </select>
    </div>
    <div class="search-group">
        <label>Max pris</label>
        <input type="number" id="maxPrice" placeholder="t.ex. 200000">
    </div>
    <button class="btn-search" id="searchBtn">Visa resultat</button>
</div>

<div class="main-content">
    <h2 class="section-title"><i class="fa-solid fa-bolt" style="color:var(--primary)"></i> Senast inkommet</h2>
    <div class="cars-grid" id="carsGrid">
        </div>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // 1. Auth Status
    onAuthStateChanged(auth, (user) => {
        const status = document.getElementById('authStatus');
        if (user) {
            status.innerHTML = `<a href="dashboard.html" style="text-decoration:none; color:var(--dark); font-weight:700;"><i class="fa-solid fa-user"></i> Mitt Konto</a>`;
        } else {
            status.innerHTML = `<a href="login.html" style="text-decoration:none; color:var(--dark); font-weight:700;">Logga in</a>`;
        }
    });

    // 2. Load Cars
    async function fetchCars() {
        const grid = document.getElementById('carsGrid');
        const q = query(collection(db, "cars"), orderBy("createdAt", "desc"), limit(8));
        const snap = await getDocs(q);
        grid.innerHTML = "";
        snap.forEach(doc => {
            const car = doc.data();
            grid.innerHTML += `
                <div class="car-card" onclick="window.location.href='details.html?id=${doc.id}'">
                    <img src="${car.images?.[0] || 'placeholder.jpg'}" style="width:100%; height:190px; object-fit:cover;">
                    <div style="padding:20px;">
                        <h3 style="color:var(--primary); font-size:22px; font-weight:900;">${Number(car.price).toLocaleString()} kr</h3>
                        <p style="font-weight:700;">${car.brand} ${car.model}</p>
                        <p style="color:#64748b; font-size:13px;">${car.year} | ${car.mileage} mil</p>
                    </div>
                </div>`;
        });
    }

    // 3. Fix Search Button Logic
    document.getElementById('searchBtn').onclick = (e) => {
        e.preventDefault(); // منع أي سلوك افتراضي قد يعطل الزر
        
        const brand = document.getElementById('brandSelect').value;
        const model = document.getElementById('modelSelect').value;
        const maxP = document.getElementById('maxPrice').value;

        const params = new URLSearchParams();
        if (brand !== 'all') params.append('brand', brand);
        if (model !== 'all') params.append('model', model);
        if (maxP) params.append('maxP', maxP);

        // التوجيه المباشر لصفحة النتائج مع الفلاتر
        window.location.href = `results.html?${params.toString()}`;
    };

    window.onload = fetchCars;
</script>
</body>
</html>

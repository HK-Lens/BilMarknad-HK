    <title>BilMarknad HK | Köp och sälj bilar i Sverige</title>

    <meta name="description" content="BilMarknad HK är en svensk bilmarknadsplats där användare kan söka, jämföra och publicera bilannonser.">

    <style>
        :root {
            --primary: #f58220;
            --primary-hover: #e07210;
            --primary-soft: rgba(245, 130, 32, 0.12);

            --dark: #0f172a;
            --dark-soft: #1e293b;

            --text: #0f172a;
            --muted: #64748b;
            --muted-light: #94a3b8;

            --bg: #f8fafc;
            --surface: #ffffff;
            --surface-soft: #f1f5f9;

            --border: #e2e8f0;
            --border-strong: #cbd5e1;

            --danger: #ef4444;
            --success: #16a34a;

            --shadow-sm: 0 4px 12px rgba(15, 23, 42, 0.06);
            --shadow-md: 0 14px 35px rgba(15, 23, 42, 0.10);
            --shadow-lg: 0 24px 70px rgba(15, 23, 42, 0.16);

            --radius-sm: 12px;
            --radius-md: 18px;
            --radius-lg: 28px;
            --radius-full: 999px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button,
        input,
        select {
            font-family: inherit;
        }

        button {
            cursor: pointer;
        }

        img {
            max-width: 100%;
            display: block;
        }

        .dev-banner {
            background: linear-gradient(90deg, #dc2626, #ef4444, #b91c1c);
            color: white;
            padding: 11px 6%;
            text-align: center;
            font-weight: 900;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            position: relative;
            z-index: 2000;
        }

        header {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(14px);
            padding: 15px 6%;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1.85rem;
            font-weight: 900;
            color: var(--dark);
            letter-spacing: -0.06em;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            border-radius: 16px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, var(--primary), #ffb15c);
            color: white;
            box-shadow: 0 12px 28px rgba(245, 130, 32, 0.32);
            font-size: 18px;
        }

        .logo span {
            color: var(--primary);
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .top-btn {
            min-height: 42px;
            padding: 11px 17px;
            border-radius: var(--radius-full);
            font-size: 13px;
            font-weight: 900;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid var(--border);
            background: white;
            color: var(--dark);
            transition: 0.25s ease;
        }

        .top-btn:hover {
            border-color: rgba(245, 130, 32, 0.45);
            color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .top-btn.account {
            background: var(--dark);
            color: white;
            border-color: var(--dark);
        }

        .top-btn.account:hover {
            background: var(--dark-soft);
            color: white;
        }

        .top-btn.logout {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
        }

        .top-btn.logout:hover {
            background: #b91c1c;
            color: white;
        }

        .hero {
            position: relative;
            overflow: hidden;
            background:
                radial-gradient(circle at 15% 15%, rgba(245, 130, 32, 0.28), transparent 30%),
                radial-gradient(circle at 85% 20%, rgba(255, 255, 255, 0.10), transparent 28%),
                linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 62px 6% 112px;
            text-align: center;
            color: white;
        }

        .hero::before {
            content: "";
            position: absolute;
            width: 420px;
            height: 420px;
            border-radius: 999px;
            right: -160px;
            bottom: -220px;
            background: rgba(245, 130, 32, 0.16);
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 980px;
            margin: 0 auto;
        }

        .hero-badge {
            width: fit-content;
            margin: 0 auto 18px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 14px;
            border-radius: var(--radius-full);
            background: rgba(255, 255, 255, 0.10);
            border: 1px solid rgba(255, 255, 255, 0.14);
            color: #e2e8f0;
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .hero-badge i {
            color: var(--primary);
        }

        .hero h1 {
            font-size: clamp(34px, 5vw, 62px);
            font-weight: 900;
            line-height: 1.02;
            letter-spacing: -0.065em;
            margin-bottom: 18px;
        }

        .hero p {
            max-width: 740px;
            margin: 0 auto;
            color: #cbd5e1;
            font-size: 17px;
            line-height: 1.75;
            font-weight: 600;
        }

        .car-types-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .type-btn {
            background: rgba(255, 255, 255, 0.10);
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: white;
            padding: 12px 18px;
            border-radius: var(--radius-full);
            font-size: 13px;
            font-weight: 850;
            transition: 0.25s ease;
        }

        .type-btn:hover,
        .type-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(245, 130, 32, 0.22);
        }

        .filter-wrapper {
            max-width: 1200px;
            margin: -55px auto 44px;
            padding: 0 20px;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        .filter-card {
            background: var(--surface);
            padding: 34px;
            border-radius: 28px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }

        .filter-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 24px;
        }

        .filter-header h2 {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -0.04em;
            color: var(--dark);
        }

        .filter-header p {
            margin-top: 6px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 650;
            line-height: 1.55;
        }

            min-height: 44px;
            padding: 12px 17px;

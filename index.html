<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilMarknad-HK | Hitta din drömbil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --bg: #f8fafc; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--bg); color: var(--dark); line-height: 1.6; }
        
        /* هيدر مطور مع خيارات الدخول */
        header { 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #e2e8f0;
        }
        .logo { font-size: 22px; font-weight: 800; text-decoration: none; color: var(--dark); }
        .logo span { color: var(--primary); }

        .nav-links { display: flex; align-items: center; gap: 20px; }
        .nav-links a { text-decoration: none; font-weight: 600; color: var(--dark); font-size: 14px; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); }
        
        /* زر كراجي المميز */
        .garage-btn { 
            background: var(--primary); color: white !important; 
            padding: 8px 18px; border-radius: 50px; box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
        }

        .auth-btn { border: 1px solid #e2e8f0; padding: 8px 18px; border-radius: 50px; cursor: pointer; }

        /* الهيرو والفلاتر */
        .hero { background: var(--dark); padding: 60px 5% 100px; text-align: center; color: white; background-image: linear-gradient(rgba(15,23,42,0.8), rgba(15,23,42,0.8)), url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&q=80&w=1000'); background-size: cover; background-position: center; }
        .filter-wrapper { max-width: 1100px; margin: -50px auto 40px; background: var(--white); padding: 30px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        select, input { padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 14px; outline: none; }

        .cars-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; padding: 0 5% 60px; }
        .car-card { background: white; border-radius: 20px; overflow: hidden; border: 1px solid #e2e8f0; transition: 0.3s; cursor: pointer; }
        .car-card:hover { transform: translateY(-10px); }
        .car-card img { width: 100%; height: 200px; object-fit: cover; }
        .car-info { padding: 20px; }
        .price-tag { font-size: 20px; font-weight: 800; color: var(--primary); }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BILMARKNAD<span>HK</span></a>
    
    <div class="nav-links">
        <a href="sell.html">Sälj bil</a>
        <a href="manage.html" class="garage-btn" id="garageLink" style="display:none;">Mitt Garage</a>
        <a href="login.html" class="auth-btn" id="loginBtn">Logga in</a>
        <a href="#" class="auth-btn" id="logoutBtn" style="display:none;" onclick="logout()">Logga ut</a>
    </div>
</header>

<section class="hero">
    <h1>Hitta din nästa drömbil</h1>
</section>

<div class="filter-wrapper">
    <div class="filter-group">
        <label style="font-size: 11px; font-weight: 700; color: #94a3b8;">MÄRKE</label>
        <select id="brandSelect" onchange="filterData()">
            <option value="all">Alla märken</option>
            <option value="Volvo">Volvo</option>
            <option value="BMW">BMW</option>
            <option value="Tesla">Tesla</option>
            <option value="Audi">Audi</option>
        </select>
    </div>
    <div class="filter-group">
        <label style="font-size: 11px; font-weight: 700; color: #94a3b8;">MAX PRIS</label>
        <input type="number" id="priceInput" placeholder="kr" oninput="filterData()">
    </div>
</div>

<div class="cars-container" id="carsContainer"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let allCars = [];

    // مراقبة حالة المستخدم لتغيير الهيدر
    onAuthStateChanged(auth, user => {
        if (user) {
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'block';
            document.getElementById('garageLink').style.display = 'block';
        } else {
            document.getElementById('loginBtn').style.display = 'block';
            document.getElementById('logoutBtn').style.display = 'none';
            document.getElementById('garageLink').style.display = 'none';
        }
    });

    async function getCars() {
        const snap = await getDocs(collection(db, "cars"));
        allCars = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        display(allCars);
    }

    function display(cars) {
        const container = document.getElementById('carsContainer');
        container.innerHTML = cars.map(car => `
            <div class="car-card" onclick="window.location.href='details.html?id=${car.id}'">
                <img src="${car.images?.[0] || ''}">
                <div class="car-info">
                    <div style="font-weight:700; font-size:18px;">${car.brand}</div>
                    <div style="font-size:13px; color:#64748b; margin-bottom:10px;">${car.year} | ${car.mileage} mil</div>
                    <div class="price-tag">${Number(car.price).toLocaleString()} kr</div>
                </div>
            </div>
        `).join('');
    }

    window.filterData = () => {
        const b = document.getElementById('brandSelect').value;
        const p = document.getElementById('priceInput').value;
        display(allCars.filter(c => (b==='all' || c.brand===b) && (!p || Number(c.price)<=p)));
    };

    window.logout = () => signOut(auth).then(() => location.reload());

    getCars();
</script>

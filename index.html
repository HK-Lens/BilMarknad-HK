<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilMarknad HK | Köp och sälj bilar i Sverige</title>

    <meta name="description" content="BilMarknad HK är en svensk marknadsplats för bilannonser. Köp och sälj bilar tryggt och enkelt.">
    <meta name="robots" content="index, follow">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --primary: #f58220;
            --primary-hover: #e67312;
            --primary-soft: rgba(245, 130, 32, 0.12);

            --dark: #0f172a;
            --dark-soft: #1e293b;

            --text: #0f172a;
            --muted: #64748b;
            --muted-light: #94a3b8;

            --bg: #f8fafc;
            --surface: #ffffff;
            --surface-soft: #f1f5f9;

            --border: #e2e8f0;
            --border-strong: #cbd5e1;

            --danger: #dc2626;
            --success: #16a34a;

            --shadow-sm: 0 4px 12px rgba(15, 23, 42, 0.06);
            --shadow-md: 0 16px 40px rgba(15, 23, 42, 0.10);
            --shadow-lg: 0 24px 70px rgba(15, 23, 42, 0.16);

            --radius-sm: 12px;
            --radius-md: 18px;
            --radius-lg: 28px;
            --radius-full: 999px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button,
        input,
        select {
            font-family: inherit;
        }

        button {
            cursor: pointer;
        }

        .dev-banner {
            background: linear-gradient(90deg, #dc2626, #ef4444, #b91c1c);
            color: white;
            padding: 11px 6%;
            text-align: center;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 0.02em;
            position: relative;
            z-index: 3000;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 2500;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 15px 6%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1.7rem;
            font-weight: 900;
            color: var(--dark);
            letter-spacing: -0.055em;
            white-space: nowrap;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            display: grid;
            place-items: center;
            border-radius: 15px;
            background: linear-gradient(135deg, var(--primary), #ffb15c);
            color: white;
            box-shadow: 0 12px 26px rgba(245, 130, 32, 0.30);
            font-size: 18px;
        }

        .logo span {
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
            flex-wrap: wrap;
        }

        .nav-link,
        .auth-link,
        .btn-sell,
        .btn-logout {
            min-height: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: var(--radius-full);
            font-size: 13px;
            font-weight: 900;
            transition: 0.25s ease;
            border: 1px solid transparent;
            white-space: nowrap;
        }

        .nav-link {
            color: var(--dark);
        }

        .nav-link:hover {
            color: var(--primary);
            background: var(--primary-soft);
        }

        .btn-sell {
            background: var(--primary);
            color: white;
            box-shadow: 0 12px 24px rgba(245, 130, 32, 0.25);
        }

        .btn-sell:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .auth-link.login {
            background: var(--dark);
            color: white;
        }

        .auth-link.account {
            background: white;
            color: var(--primary);
            border-color: rgba(245, 130, 32, 0.35);
        }

        .auth-link.account:hover {
            background: var(--primary-soft);
            border-color: var(--primary);
        }

        .btn-logout {
            background: rgba(220, 38, 38, 0.08);
            color: var(--danger);
            border: 1px solid rgba(220, 38, 38, 0.20);
        }

        .btn-logout:hover {
            background: var(--danger);
            color: white;
        }

        .hero {
            position: relative;
            overflow: hidden;
            background:
                radial-gradient(circle at 15% 20%, rgba(245, 130, 32, 0.28), transparent 34%),
                radial-gradient(circle at 85% 5%, rgba(255, 255, 255, 0.08), transparent 30%),
                linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            text-align: center;
            padding: 62px 6% 105px;
        }

        .hero h1 {
            max-width: 900px;
            margin: 0 auto 18px;
            font-size: clamp(34px, 6vw, 64px);
            line-height: 1.02;
            font-weight: 900;
            letter-spacing: -0.07em;
        }

        .hero p {
            max-width: 720px;
            margin: 0 auto;
            color: #cbd5e1;
            font-size: 16px;
            line-height: 1.8;
            font-weight: 600;
        }

        .car-types-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .type-btn {
            min-height: 44px;
            padding: 11px 17px;
            border-radius: var(--radius-full);
            border: 1px solid rgba(255, 255, 255, 0.22);
            background: rgba(255, 255, 255, 0.10);
            color: white;
            font-size: 13px;
            font-weight: 850;
            transition: 0.25s ease;
        }

        .type-btn:hover,
        .type-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        .filter-wrapper {
            max-width: 1220px;
            width: 100%;
            margin: -52px auto 44px;
            padding: 0 20px;
            position: relative;
            z-index: 5;
        }

        .filter-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 34px;
            box-shadow: var(--shadow-lg);
        }

        .filter-title-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 24px;
        }

        .filter-title-row h2 {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -0.035em;
            color: var(--dark);
        }

        .filter-title-row p {
            margin-top: 6px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 650;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 16px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .filter-group label {
            color: #475569;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.045em;
        }

        .filter-group input,
        .filter-group select {
            width: 100%;
            min-height: 52px;
            padding: 13px 14px;
            border-radius: 15px;
            border: 1px solid var(--border);
            background: var(--surface-soft);
            color: var(--dark);
            outline: none;
            font-size: 14px;
            font-weight: 750;
            transition: 0.25s ease;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(245, 130, 32, 0.12);
        }

        .search-actions {
            display: flex;
            gap: 14px;
            margin-top: 26px;
        }

        .btn-results,
        .btn-deep {
            min-height: 58px;
            border: none;
            border-radius: 18px;
            font-size: 15px;
            font-weight: 900;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.25s ease;
        }

        .btn-results {
            flex: 2;
            background: var(--primary);
            color: white;
            box-shadow: 0 14px 30px rgba(245, 130, 32, 0.28);
        }

        .btn-results:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-deep {
            flex: 1;
            background: var(--surface-soft);
            color: var(--dark);
            border: 1px solid var(--border);
        }

        .btn-deep:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: white;
        }

        .container {
            flex: 1;
            width: 100%;
            max-width: 1320px;
            margin: 0 auto;
            padding: 0 6% 80px;
        }

        .section-heading {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 26px;
        }

        .section-title {
            position: relative;
            font-size: 26px;
            font-weight: 900;
            color: var(--dark);
            letter-spacing: -0.04em;
            padding-left: 16px;
        }

        .section-title::before {
            content: "";
            position: absolute;
            left: 0;
            top: 3px;
            bottom: 3px;
            width: 5px;
            border-radius: 999px;
            background: var(--primary);
        }

        .section-note {
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }

        .cars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(285px, 1fr));
            gap: 24px;
        }

        .car-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: 0.25s ease;
        }

        .car-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: rgba(245, 130, 32, 0.35);
        }

        .

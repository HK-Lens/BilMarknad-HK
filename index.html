<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilMarknad | Hem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <nav>
        <a href="sell.html" class="btn-primary">Sälj din bil</a>
        <a href="login.html" style="margin-left:20px; text-decoration:none; color:inherit;">Logga in</a>
    </nav>
</header>

<div class="container">
    <h1 style="margin-bottom:30px;">Alla bilar till salu</h1>
    <div class="cars-grid" id="carsGrid">
        </div>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    async function loadCars() {
        const grid = document.getElementById('carsGrid');
        try {
            const q = query(collection(db, "cars"), orderBy("createdAt", "desc"));
            const querySnapshot = await getDocs(q);
            
            if (querySnapshot.empty) {
                grid.innerHTML = "<p>Inga bilar hittades.</p>";
                return;
            }

            grid.innerHTML = querySnapshot.docs.map(doc => {
                const c = doc.data();
                return `
                    <div class="car-card" onclick="window.location.href='details.html?id=${doc.id}'">
                        <img src="${c.images ? c.images[0] : 'placeholder.jpg'}" alt="${c.brand}">
                        <div class="card-content">
                            <div class="card-price">${Number(c.price).toLocaleString()} kr</div>
                            <div class="card-title">${c.brand} ${c.model}</div>
                            <div class="card-meta">
                                <span>${c.year}</span> • 
                                <span>${c.mileage} mil</span> • 
                                <span>${c.fuelType}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        } catch (error) {
            console.error("Error loading cars:", error);
            grid.innerHTML = "<p>Ett fel uppstod vid laddning.</p>";
        }
    }

    loadCars();
</script>
</body>
</html>

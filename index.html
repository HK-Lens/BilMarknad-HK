<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BilMarknad-HK | Hem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); }
        header { position: sticky; top: 0; z-index: 1000; background: white; padding: 12px 6%; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .logo { text-decoration: none; font-size: 24px; font-weight: 900; color: var(--dark); }
        .logo span { color: var(--primary); }
        .search-card { max-width: 1000px; margin: 30px auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: grid; grid-template-columns: 1fr; gap: 15px; border: 1px solid var(--border); }
        @media (min-width: 768px) { .search-card { grid-template-columns: 1.5fr 1fr 1fr auto; align-items: flex-end; } }
        select, input { height: 48px; padding: 0 15px; border: 1px solid var(--border); border-radius: 12px; font-size: 14px; outline: none; }
        .btn-search { height: 48px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; padding: 0 25px; }
        .grid { max-width: 1300px; margin: auto; padding: 0 15px 60px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .car-card { background: white; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; }
        .car-card:hover { transform: translateY(-5px); }
        .car-card img { width: 100%; height: 200px; object-fit: cover; }
        .card-info { padding: 15px; }
    </style>
</head>
<body>
<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <div id="navActions"><a href="login.html" style="text-decoration:none; font-weight:700; color:var(--dark);">Logga in</a></div>
</header>
<div class="search-card">
    <div style="display:flex; flex-direction:column; gap:5px;"><label style="font-size:10px; font-weight:800; color:#94a3b8;">MÄRKE</label><select id="brandSelect"><option value="all">Alla märken</option></select></div>
    <input type="number" id="minPrice" placeholder="Från (kr)">
    <input type="number" id="maxPrice" placeholder="Till (kr)">
    <button class="btn-search" onclick="applySearch()">SÖK</button>
</div>
<div class="grid" id="carGrid"></div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';
    import { carData } from './cars-data.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let allCars = [];

    onAuthStateChanged(auth, user => {
        if (user) {
            document.getElementById('navActions').innerHTML = `<a href="my-account.html" style="text-decoration:none; font-weight:700; color:var(--dark); margin-right:15px;">Min Sida</a><a href="sell.html" style="text-decoration:none; background:var(--dark); color:white; padding:8px 15px; border-radius:10px;">Sälj</a>`;
        }
        load();
    });

    const bSel = document.getElementById('brandSelect');
    Object.keys(carData).sort().forEach(b => bSel.innerHTML += `<option value="${b}">${b}</option>`);

    async function load() {
        const snap = await getDocs(query(collection(db, "cars"), orderBy("createdAt", "desc")));
        allCars = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        render(allCars);
    }

    window.applySearch = () => {
        const b = bSel.value;
        const min = Number(document.getElementById('minPrice').value) || 0;
        const max = Number(document.getElementById('maxPrice').value) || Infinity;
        render(allCars.filter(c => (b==='all' || c.brand===b) && (c.price >= min && c.price <= max)));
    };

    function render(data) {
        document.getElementById('carGrid').innerHTML = data.map(c => `
            <div class="car-card" onclick="location.href='details.html?id=${c.id}'">
                <img src="${c.images?.[0] || ''}">
                <div class="card-info">
                    <div style="font-weight:800;">${c.brand} ${c.model || ''}</div>
                    <div style="font-size:12px; color:#94a3b8;">${c.year} • ${c.mileage} mil</div>
                    <div style="font-weight:900; color:var(--primary); margin-top:5px;">${Number(c.price).toLocaleString()} kr</div>
                </div>
            </div>`).join('');
    }
</script>
</body>
</html>

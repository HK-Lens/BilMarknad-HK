<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>BilMarknad-HK | Hem</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; }
        header { background: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .user-menu { position: relative; cursor: pointer; }
        .dropdown { display: none; position: absolute; right: 0; top: 30px; background: white; border: 1px solid #ccc; border-radius: 5px; width: 160px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); z-index: 1000; }
        .dropdown a { display: block; padding: 10px; text-decoration: none; color: #333; font-size: 14px; }
        .dropdown a:hover { background: #f8f9fa; }
        .btn-login { background: #007bff; color: white; padding: 8px 15px; border-radius: 5px; text-decoration: none; }
    </style>
</head>
<body>

<header>
    <div class="logo"><strong>BilMarknad-HK</strong></div>
    
    <div id="authArea">
        <a href="login.html" id="loginLink" class="btn-login">Logga in</a>
        <div class="user-menu" id="userMenu" style="display:none;">
            <span id="userNameDisplay" onclick="toggleDropdown()">Användare ▾</span>
            <div class="dropdown" id="dropdownContent">
                <a href="manage.html">Mina Annonser</a>
                <a href="sell.html">Sälj din bil</a>
                <a href="#" id="logoutBtn" style="color: #dc3545; border-top: 1px solid #eee;">Logga ut</a>
            </div>
        </div>
    </div>
</header>

<main style="padding: 20px; text-align: center;">
    <h1>Välkommen till BilMarknad-HK</h1>
    <p>Här kan du hitta eller sälja din bil enkelt.</p>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import firebaseConfig from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // مراقبة حالة تسجيل الدخول
    onAuthStateChanged(auth, (user) => {
        const loginLink = document.getElementById('loginLink');
        const userMenu = document.getElementById('userMenu');
        const userNameDisplay = document.getElementById('userNameDisplay');

        if (user) {
            loginLink.style.display = 'none';
            userMenu.style.display = 'block';
            userNameDisplay.innerText = user.displayName + " ▾";
        } else {
            loginLink.style.display = 'block';
            userMenu.style.display = 'none';
        }
    });

    // وظيفة القائمة المنسدلة
    window.toggleDropdown = () => {
        const dropdown = document.getElementById('dropdownContent');
        dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
    };

    // تسجيل الخروج
    document.getElementById('logoutBtn').onclick = async (e) => {
        e.preventDefault();
        try {
            await signOut(auth);
            alert("Du har loggat ut!");
            window.location.reload();
        } catch (error) {
            console.error("Logout Error", error);
        }
    };

    // إغلاق القائمة عند الضغط في الخارج
    window.onclick = (event) => {
        if (!event.target.matches('#userNameDisplay')) {
            const dropdown = document.getElementById('dropdownContent');
            if (dropdown) dropdown.style.display = 'none';
        }
    };
</script>
</body>
</html>

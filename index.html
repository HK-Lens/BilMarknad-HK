<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilHK | Hitta din bil</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        /* إعدادات المتغيرات والخطوط العامة */
        :root {
            --primary: #f58220;
            --dark: #0f172a;
            --bg: #f8fafc;
            --border: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
        }

        /* --- رسالة التنبيه العائمة في المنتصف العلوي --- */
        .under-construction-banner {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #fef3c7;
            color: #92400e;
            padding: 10px 24px;
            text-align: center;
            font-weight: 700;
            font-size: 13px;
            border: 1px solid #f59e0b;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            z-index: 9999;
            max-width: 90%;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* --- تحسين الهيدر --- */
        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 6%;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            text-decoration: none;
            font-size: 24px;
            font-weight: 900;
            color: var(--dark);
            letter-spacing: -1px;
        }

        .logo span { color: var(--primary); }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 6%;
        }

        /* شريط الفئات */
        .category-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            overflow-x: auto;
            padding: 5px 0;
        }

        .cat-btn {
            padding: 10px 20px;
            border: 1px solid var(--border);
            background: white;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            transition: 0.2s;
        }

        .cat-btn.active {
            background: var(--dark);
            color: white;
            border-color: var(--dark);
        }

        /* كرت البحث */
        .search-card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            margin-bottom: 40px;
        }

        .search-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .field-group label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            outline: none;
        }

        .btn-search-submit {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        /* شبكة السيارات */
        .cars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .car-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: 0.3s;
            cursor: pointer;
        }

        .car-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        .car-card img { width: 100%; height: 200px; object-fit: cover; }

        .card-content { padding: 20px; }

        .price-tag { font-size: 20px; font-weight: 800; color: var(--dark); }

        .car-title { font-size: 16px; font-weight: 700; margin: 5px 0; }

        .car-meta { font-size: 13px; color: var(--text-muted); font-weight: 500; }

        @media (max-width: 600px) {
            .under-construction-banner { font-size: 11px; padding: 8px 15px; }
        }
    </style>
</head>
<body>

    <div class="under-construction-banner">
        <span>⚠️</span> الموقع تحت الإنشاء. الإعلانات حالياً للعرض فقط ولا يمكن إنشاء إعلانات حقيقية.
        Webbplatsen är under uppbyggnad. För närvarande är annonser endast avsedda för 
        visningsändamål och kan inte skapas som faktiska annonser.
    </div>

    <header>
        <a href="index.html" class="logo">BIL<span>HK</span></a>
        <div class="nav-links">
            <a href="sell.html" style="background:var(--primary); color:white; padding:10px 20px; border-radius:10px; text-decoration:none; font-weight:800; font-size: 13px;">Sälj din bil</a>
            <a href="login.html" class="link-login" id="authButton" style="margin-left: 15px; text-decoration: none; font-weight: 700; color: var(--dark); font-size: 13px;">Logga in</a>
        </div>
    </header>

    <div class="container">
        <div class="category-bar" id="categoryBar">
            <button class="cat-btn active" data-type="all">Alla</button>
            <button class="cat-btn" data-type="Sedan">Sedan</button>
            <button class="cat-btn" data-type="SUV">SUV</button>
            <button class="cat-btn" data-type="Småbil">Småbil</button>
            <button class="cat-btn" data-type="Minibuss">Minibuss</button>
            <button class="cat-btn" data-type="Transport">Transport</button>
        </div>

        <div class="search-card">
            <div class="search-grid">
                <div class="field-group">
                    <label>Märke (الماركة)</label>
                    <select id="brandSelect"><option value="all">Alla märken</option></select>
                </div>
                <div class="field-group">
                    <label>Modell (الموديل)</label>
                    <select id="modelSelect"><option value="all">Alla modeller</option></select>
                </div>
                <div class="field-group">
                    <label>Max Pris (أقصى سعر)</label>
                    <input type="number" id="maxPrice" placeholder="kr">
                </div>
            </div>
            <button class="btn-search-submit" id="searchBtn">Visa resultat</button>
        </div>

        <div class="cars-grid" id="carsGrid"></div>
    </div>

    <script type="module">
        import { db, auth } from './firebase-config.js';
        import { carData } from './cars-data.js';
        import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        let selectedCategory = 'all';
        const bSel = document.getElementById('brandSelect');
        const mSel = document.getElementById('modelSelect');
        const authBtn = document.getElementById('authButton');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                authBtn.textContent = "Mitt Konto";
                authBtn.href = "my-account.html";
            } else {
                authBtn.textContent = "Logga in";
                authBtn.href = "login.html";
            }
        });

        // تعبئة الماركات
        Object.keys(carData).sort().forEach(b => {
            const opt = document.createElement('option');
            opt.value = b; opt.textContent = b;
            bSel.appendChild(opt);
        });

        bSel.onchange = () => {
            mSel.innerHTML = '<option value="all">Alla modeller</option>';
            if (carData[bSel.value]) {
                carData[bSel.value].forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m; opt.textContent = m;
                    mSel.appendChild(opt);
                });
            }
        };

        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedCategory = btn.getAttribute('data-type');
                performSearch(); 
            };
        });

        async function performSearch() {
            const grid = document.getElementById('carsGrid');
            grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center; font-weight:600;'>Söker...</p>";

            try {
                const q = query(collection(db, "cars"), orderBy("createdAt", "desc"));
                const snap = await getDocs(q);
                const allCars = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                const maxP = Number(document.getElementById('maxPrice').value) || Infinity;

                const filtered = allCars.filter(c => {
                    const catMatch = (selectedCategory === 'all' || c.bodyType === selectedCategory);
                    const brandMatch = (bSel.value === 'all' || c.brand === bSel.value);
                    const modelMatch = (mSel.value === 'all' || c.model === mSel.value);
                    const priceMatch = (c.price <= maxP);
                    return catMatch && brandMatch && modelMatch && priceMatch;
                });

                if (filtered.length === 0) {
                    grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center;'>Inga bilar hittades.</p>";
                    return;
                }

                grid.innerHTML = filtered.map(c => `
                    <div class="car-card" onclick="window.location.href='details.html?id=${c.id}'">
                        <img src="${c.images && c.images.length > 0 ? c.images[0] : 'placeholder.jpg'}">
                        <div class="card-content">
                            <div class="price-tag">${Number(c.price).toLocaleString()} kr</div>
                            <div class="car-title">${c.brand} ${c.model}</div>
                            <div class="car-meta">${c.year} • ${c.mileage} mil • ${c.fuelType}</div>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                grid.innerHTML = "<p>Ett fel uppstod.</p>";
            }
        }

        document.getElementById('searchBtn').onclick = performSearch;
        performSearch();
    </script>
</body>
</html>

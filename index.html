<div class="category-wrapper">
    <div class="category-bar" id="categoryBar">
        <button class="cat-btn active" data-type="all"><i class="fa-solid fa-list"></i> Alla</button>
        <button class="cat-btn" data-type="Sedan"><i class="fa-solid fa-car-side"></i> Sedan</button>
        <button class="cat-btn" data-type="SUV"><i class="fa-solid fa-truck-monster"></i> SUV / 4x4</button>
        <button class="cat-btn" data-type="Småbil"><i class="fa-solid fa-car-rear"></i> Småbil</button>
        <button class="cat-btn" data-type="Minibuss"><i class="fa-solid fa-van-shuttle"></i> Minibuss</button>
        <button class="cat-btn" data-type="Transportbil"><i class="fa-solid fa-truck-front"></i> Transport</button>
    </div>
</div>

<div class="search-card">
    <div class="search-grid-main">
        <div class="search-col">
            <div class="field-group">
                <label>Märke</label>
                <select id="brandSelect"><option value="all">Alla märken</option></select>
            </div>
            <div class="field-group">
                <label>Modell</label>
                <select id="modelSelect"><option value="all">Alla modeller</option></select>
            </div>
        </div>

        <div class="search-col">
            <div class="field-group">
                <label>Pris från</label>
                <input type="number" id="minPrice" placeholder="Minsta pris">
            </div>
            <div class="field-group">
                <label>Pris till</label>
                <input type="number" id="maxPrice" placeholder="Högsta pris">
            </div>
        </div>

        <div class="search-col">
            <div class="field-group">
                <label>Minst mil</label>
                <input type="number" id="minMil" placeholder="Från">
            </div>
            <div class="field-group">
                <label>Max mil</label>
                <input type="number" id="maxMil" placeholder="Till">
            </div>
        </div>
    </div>
    <button class="btn-search-submit" style="width:100%; height:50px; margin-top:20px; background:var(--dark); color:white; border:none; border-radius:10px; font-weight:700; cursor:pointer;" id="searchBtn">Visa bilar</button>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let selectedBodyType = 'all';

    // برمجة أزرار الفئات الأفقية
    document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedBodyType = btn.dataset.type;
            performSearch(); // تحديث النتائج فوراً
        };
    });

    async function performSearch() {
        const grid = document.getElementById('carsGrid');
        grid.innerHTML = "Söker...";
        
        const q = query(collection(db, "cars"), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        let cars = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));

        // الفلترة بناءً على المدخلات والفئة المختارة
        const f = {
            brand: document.getElementById('brandSelect').value,
            minP: Number(document.getElementById('minPrice').value),
            maxP: Number(document.getElementById('maxPrice').value),
            minM: Number(document.getElementById('minMil').value),
            maxM: Number(document.getElementById('maxMil').value)
        };

        if(selectedBodyType !== 'all') cars = cars.filter(c => c.bodyType === selectedBodyType);
        if(f.brand !== 'all') cars = cars.filter(c => c.brand === f.brand);
        if(f.minP) cars = cars.filter(c => c.price >= f.minP);
        if(f.maxP) cars = cars.filter(c => c.price <= f.maxP);
        if(f.minM) cars = cars.filter(c => c.mileage >= f.minM);
        if(f.maxM) cars = cars.filter(c => c.mileage <= f.maxM);

        // كود الـ Render هنا (نفس الكود السابق لعرض البطاقات)
        renderCars(cars); 
    }

    document.getElementById('searchBtn').onclick = performSearch;
</script>

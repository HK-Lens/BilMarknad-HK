<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilHK | Hitta din bil</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* إعدادات الخطوط العامة */
        :root {
            --primary: #f58220;
            --dark: #0f172a;
            --bg: #f8fafc;
            --border: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* تطبيق الخط على كل شيء مع تحسين القراءة */
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.5;
        }

        /* تنسيق رسالة التنبيه */
        .under-construction-banner {
            background-color: #fef3c7;
            color: #92400e;
            padding: 12px 20px;
            text-align: center;
            font-weight: 600; /* جعل الخط متوسط الثقل */
            font-size: 14px;
            border-bottom: 2px solid #f59e0b;
            position: relative;
            z-index: 1001;
            width: 100%;
        }

        /* تنسيق الهيدر */
        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 6%;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            text-decoration: none;
            font-size: 24px;
            font-weight: 900; /* خط سميك جداً للعارضة */
            color: var(--dark);
            letter-spacing: -1px;
        }

        .logo span { color: var(--primary); }

        /* تنسيق شريط الفئات */
        .category-bar {
            display: flex;
            gap: 10px;
            margin: 25px 0;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .cat-btn {
            padding: 10px 20px;
            border: 1px solid var(--border);
            background: white;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            transition: 0.2s;
            color: var(--text-main);
        }

        .cat-btn.active {
            background: var(--dark);
            color: white;
            border-color: var(--dark);
        }

        /* تنسيق حقول البحث */
        .search-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin-bottom: 40px;
        }

        .field-group label {
            display: block;
            font-size: 12px;
            font-weight: 800; /* خط عريض للعناوين الصغيرة */
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            color: var(--dark);
            outline: none;
        }

        /* تنسيق بطاقة السيارة */
        .car-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s;
            cursor: pointer;
            border: 1px solid var(--border);
        }

        .car-card:hover { transform: translateY(-5px); }

        .price-tag {
            font-size: 20px;
            font-weight: 800; /* سعر بارز */
            color: var(--dark);
            margin-bottom: 5px;
        }

        .car-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .car-meta {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .btn-search-submit {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
    </style>
</head>
<body>

<div class="under-construction-banner">
    ⚠️ الموقع حالياً تحت الاختبار والإنشاء. لا يمكن إنشاء إعلانات حقيقية الآن، والإعلانات المعروضة هي بيانات تجريبية فقط.
</div>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <div class="nav-links">
        <a href="sell.html" style="background:var(--primary); color:white; padding:10px 22px; border-radius:10px; text-decoration:none; font-weight:800; font-size: 14px;">Sälj din bil</a>
        <a href="login.html" class="link-login" id="authButton" style="margin-left: 20px; text-decoration: none; font-weight: 700; color: var(--dark); font-size: 14px;">Logga in</a>
    </div>
</header>

<div class="container" style="max-width: 1200px; margin: auto; padding: 0 6%;">
    </div>

</body>
</html>

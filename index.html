<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilMarknad-HK | تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        body {
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .brand-name {
            color: #0d6efd;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
            margin-top: 0;
        }
        .page-title {
            color: #333;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 30px;
        }
        .google-btn {
            background-color: #fff;
            color: #333;
            border: 1px solid #ddd;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.3s;
        }
        .google-btn:hover {
            background-color: #f1f1f1;
        }
        .google-icon {
            width: 20px;
            height: 20px;
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
            color: #888;
            font-size: 13px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #eee;
        }
        .divider span {
            padding: 0 10px;
        }
        .input-group {
            text-align: right;
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            color: #555;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            direction: ltr; /* لجعل الإيميل يكتب من اليسار لليمين */
        }
        .input-group input:focus {
            outline: none;
            border-color: #0d6efd;
        }
        .login-btn {
            background-color: #0d6efd;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }
        .login-btn:hover {
            background-color: #0b5ed7;
        }
        .register-link {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        .register-link a {
            color: #0d6efd;
            text-decoration: none;
            font-weight: 600;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1 class="brand-name">BilMarknad-HK</h1>
        <h2 class="page-title">تسجيل الدخول | Logga in</h2>

        <button id="google-login-btn" class="google-btn">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="google-icon">
            الدخول عبر جوجل
        </button>

        <div class="divider">
            <span>أو عبر البريد الإلكتروني</span>
        </div>

        <form id="email-login-form">
            <div class="input-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="email@example.com" required>
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" placeholder="******" required>
            </div>
            <button type="submit" class="login-btn">دخول</button>
        </form>

        <div class="register-link">
            ليس لديك حساب؟ <a href="#">سجل الآن</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDCsMbG5pT3y6MC6b05LEdFoByWM1nT7NY",
            authDomain: "bilmarknad-hk.firebaseapp.com",
            databaseURL: "https://bilmarknad-hk-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bilmarknad-hk",
            storageBucket: "bilmarknad-hk.firebasestorage.app",
            messagingSenderId: "284008879407",
            appId: "1:284008879407:web:66bee60b51ec277e8dbdda",
            measurementId: "G-HZ54056GSG"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // تفعيل زر الدخول عبر جوجل
        const googleBtn = document.getElementById('google-login-btn');
        googleBtn.addEventListener('click', () => {
            signInWithPopup(auth, provider)
                .then((result) => {
                    const user = result.user;
                    alert("تم تسجيل الدخول بنجاح! أهلاً بك " + user.displayName);
                })
                .catch((error) => {
                    alert("حدث خطأ أثناء الدخول: " + error.message);
                });
        });

        // تفعيل وهمي لزر البريد (لحين برمجة الدخول بالبريد لاحقاً)
        const emailForm = document.getElementById('email-login-form');
        emailForm.addEventListener('submit', (e) => {
            e.preventDefault(); // منع تحديث الصفحة
            alert("التصميم يعمل بنجاح! سيتم ربط ميزة البريد الإلكتروني قريباً.");
        });
    </script>

</body>
</html>

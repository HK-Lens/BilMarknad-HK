<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilMarknad HK | Köp och sälj bilar</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #f58220;
            --primary-hover: #e07210;
            --dark: #0f172a;
            --light: #f8fafc;
            --border: #e2e8f0;
            --white: #ffffff;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--light); color: var(--dark); }
        
        header { background: var(--white); padding: 15px 6%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { text-decoration: none; font-size: 26px; font-weight: 900; color: var(--dark); letter-spacing: -1px; }
        .logo span { color: var(--primary); }

        .hero { background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)), url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=2000') center/cover; padding: 80px 20px; text-align: center; color: white; }
        .hero h1 { font-size: 42px; font-weight: 900; margin-bottom: 15px; }

        /* حاوية البحث المحدثة - 8 خانات */
        .search-container { background: white; max-width: 1100px; margin: -60px auto 0; padding: 30px; border-radius: 24px; box-shadow: var(--shadow); border: 1px solid var(--border); }
        
        .search-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 20px; }
        
        .search-group { display: flex; flex-direction: column; gap: 6px; }
        .search-group label { font-size: 12px; font-weight: 800; color: #64748b; text-transform: uppercase; }
        .search-group select, .search-group input { padding: 12px; border: 1px solid var(--border); border-radius: 12px; font-size: 14px; outline: none; background: #f8fafc; font-weight: 600; }

        /* أزرار هيكل السيارة */
        .body-types { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .body-btn { background: white; border: 1px solid var(--border); padding: 10px 20px; border-radius: 12px; cursor: pointer; transition: 0.2s; font-weight: 700; font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .body-btn:hover, .body-btn.active { border-color: var(--primary); color: var(--primary); background: #fffaf5; }

        /* منطقة الأزرار السفلية */
        .search-actions { display: flex; gap: 15px; justify-content: center; align-items: center; margin-top: 10px; }
        .btn-search { background: var(--primary); color: white; border: none; padding: 16px 40px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 16px; flex: 2; max-width: 400px; }
        .btn-search:hover { background: var(--primary-hover); transform: translateY(-2px); }
        
        .btn-advanced { background: #f1f5f9; color: var(--dark); border: 1px solid var(--border); padding: 16px 25px; border-radius: 12px; font-weight: 700; cursor: pointer; text-decoration: none; font-size: 14px; flex: 1; text-align: center; max-width: 200px; }
        .btn-advanced:hover { background: #e2e8f0; }

        .main-content { max-width: 1200px; margin: 60px auto; padding: 0 20px; }
        .section-title { font-size: 28px; font-weight: 900; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }

        .cars-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .car-card { background: white; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); transition: 0.3s; cursor: pointer; }
        .car-card:hover { transform: translateY(-5px); box-shadow: var(--shadow); }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
    <div style="display:flex; gap:15px; align-items:center;">
        <a href="sell.html" style="text-decoration:none; color:var(--primary); font-weight:800; border:2px solid var(--primary); padding:8px 18px; border-radius:50px; font-size:13px;">Sälj din bil</a>
        <div id="authStatus"></div>
    </div>
</header>

<div class="hero">
    <h1>Hitta din nästa bil</h1>
    <p>Sveriges enklaste marknadsplats för fordon</p>
</div>

<div class="search-container">
    <div class="body-types" id="bodyTypeSelector">
        <button class="body-btn" data-type="Sedan"><i class="fa-solid fa-car-side"></i> Sedan</button>
        <button class="body-btn" data-type="Halvkombi"><i class="fa-solid fa-car"></i> Halvkombi</button>
        <button class="body-btn" data-type="Kombi"><i class="fa-solid fa-shuttle-space"></i> Kombi</button>
        <button class="body-btn" data-type="SUV"><i class="fa-solid fa-truck-pickup"></i> SUV</button>
        <button class="body-btn" data-type="Coupé"><i class="fa-solid fa-car-rear"></i> Coupé</button>
    </div>

    <div class="search-grid">
        <div class="search-group">
            <label>Märke</label>
            <select id="brandSelect">
                <option value="all">Alla märken</option>
                <option value="Volvo">Volvo</option>
                <option value="Volkswagen">Volkswagen</option>
                <option value="BMW">BMW</option>
                <option value="Audi">Audi</option>
                <option value="Mercedes-Benz">Mercedes-Benz</option>
                <option value="Toyota">Toyota</option>
            </select>
        </div>
        <div class="search-group">
            <label>Modell</label>
            <input type="text" id="modelInput" placeholder="t.ex. XC60">
        </div>
        <div class="search-group">
            <label>Max pris (kr)</label>
            <input type="number" id="maxPrice" placeholder="Obegränsat">
        </div>
        <div class="search-group">
            <label>År (Från)</label>
            <input type="number" id="yearFrom" placeholder="t.ex. 2018">
        </div>
        <div class="search-group">
            <label>År (Till)</label>
            <input type="number" id="yearTo" placeholder="t.ex. 2024">
        </div>
        <div class="search-group">
            <label>Drivmedel</label>
            <select id="fuelSelect">
                <option value="all">Alla</option>
                <option value="Bensin">Bensin</option>
                <option value="Diesel">Diesel</option>
                <option value="El">El</option>
                <option value="Hybrid">Hybrid</option>
            </select>
        </div>
        <div class="search-group">
            <label>Växellåda</label>
            <select id="gearSelect">
                <option value="all">Alla</option>
                <option value="Automat">Automat</option>
                <option value="Manuell">Manuell</option>
            </select>
        </div>
        <div class="search-group">
            <label>Max mil</label>
            <input type="number" id="maxMileage" placeholder="t.ex. 10000">
        </div>
    </div>

    <div class="search-actions">
        <button class="btn-search" id="searchBtn">Visa resultat</button>
        <a href="filter.html" class="btn-advanced"><i class="fa-solid fa-sliders"></i> Detaljerad sök</a>
    </div>
</div>

<div class="main-content">
    <h2 class="section-title"><i class="fa-solid fa-bolt" style="color:var(--primary)"></i> Senast inkommet</h2>
    <div class="cars-grid" id="carsGrid">
        <p style="text-align:center; grid-column:1/-1;">Laddar bilar...</p>
    </div>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    let selectedBodyType = null;

    // 1. Auth Status
    onAuthStateChanged(auth, (user) => {
        const status = document.getElementById('authStatus');
        if (user) {
            status.innerHTML = `<a href="dashboard.html" style="text-decoration:none; color:var(--dark); font-weight:700;"><i class="fa-solid fa-user"></i> Mitt Konto</a>`;
        } else {
            status.innerHTML = `<a href="login.html" style="text-decoration:none; color:var(--dark); font-weight:700;">Logga in</a>`;
        }
    });

    // 2. Body Type Selection
    document.querySelectorAll('.body-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.body-btn').forEach(b => b.classList.remove('active'));
            if (selectedBodyType === btn.dataset.type) {
                selectedBodyType = null;
            } else {
                selectedBodyType = btn.dataset.type;
                btn.classList.add('active');
            }
        };
    });

    // 3. Load Recent Cars
    async function fetchRecentCars() {
        try {
            const grid = document.getElementById('carsGrid');
            const q = query(collection(db, "cars"), orderBy("createdAt", "desc"), limit(8));
            const snap = await getDocs(q);
            grid.innerHTML = "";
            snap.forEach(doc => {
                const car = doc.data();
                grid.innerHTML += `
                    <div class="car-card" onclick="window.location.href='details.html?id=${doc.id}'">
                        <img src="${car.images?.[0] || 'placeholder.jpg'}" style="width:100%; height:190px; object-fit:cover;">
                        <div style="padding:20px;">
                            <h3 style="color:var(--primary); font-size:22px; font-weight:900;">${Number(car.price).toLocaleString()} kr</h3>
                            <p style="font-weight:700;">${car.brand} ${car.model}</p>
                            <p style="color:#64748b; font-size:13px;">${car.year} | ${car.mileage} mil | ${car.fuel}</p>
                        </div>
                    </div>`;
            });
        } catch(e) { console.error(e); }
    }

    // 4. Fix Search Button Logic (8 Fields + Body Type)
    document.getElementById('searchBtn').onclick = (e) => {
        e.preventDefault();
        
        const params = new URLSearchParams();
        
        const brand = document.getElementById('brandSelect').value;
        const model = document.getElementById('modelInput').value.trim();
        const price = document.getElementById('maxPrice').value;
        const yFrom = document.getElementById('yearFrom').value;
        const yTo = document.getElementById('yearTo').value;
        const fuel = document.getElementById('fuelSelect').value;
        const gear = document.getElementById('gearSelect').value;
        const mil = document.getElementById('maxMileage').value;

        if (brand !== 'all') params.append('brand', brand);
        if (model) params.append('model', model);
        if (price) params.append('maxP', price);
        if (yFrom) params.append('yFrom', yFrom);
        if (yTo) params.append('yTo', yTo);
        if (fuel !== 'all') params.append('fuel', fuel);
        if (gear !== 'all') params.append('gear', gear);
        if (mil) params.append('mil', mil);
        if (selectedBodyType) params.append('body', selectedBodyType);

        // التوجيه الصحيح والمباشر
        window.location.href = `results.html?${params.toString()}`;
    };

    window.onload = fetchRecentCars;
</script>
</body>
</html>

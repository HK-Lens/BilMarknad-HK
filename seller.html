<!DOCTYPE html><html lang="sv"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Säljarsida | BILHK</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>:root{--primary:#f58220;--dark:#0f172a;--bg:#f8fafc;--border:#e2e8f0}*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,sans-serif}body{background:var(--bg);color:var(--dark)}header{background:white;padding:15px 6%;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}.logo{text-decoration:none;font-weight:900;font-size:26px;color:var(--dark)}.logo span{color:var(--primary)}.container{max-width:1100px;margin:35px auto;padding:0 20px}.card{background:white;border:1px solid var(--border);border-radius:22px;padding:25px;margin-bottom:22px}.avatar{width:90px;height:90px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:900;overflow:hidden}.avatar img{width:100%;height:100%;object-fit:cover}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}.car{background:white;border:1px solid var(--border);border-radius:18px;overflow:hidden;cursor:pointer}footer{background:white;border-top:1px solid var(--border);padding:34px 20px;text-align:center;color:#94a3b8;font-size:13px;margin-top:40px}.footer-links{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}.footer-links a{font-weight:900;color:#64748b;text-decoration:none}</style></head><body><header><a href="index.html" class="logo">BIL<span>HK</span></a><a href="dashboard.html" style="font-weight:900;color:var(--primary);text-decoration:none">Min sida</a></header><main class="container" id="app">Laddar...</main><footer><div class="footer-links"><a href="terms.html">Användarvillkor</a><a href="terms.html#disclaimer">Ansvarsfriskrivning</a></div><div>BILHK är endast en annonsplattform. Vi ansvarar inte för annonser, betalningar, affärer eller tvister.</div></footer><script type="module">import{db}from'./firebase-config.js';import{doc,getDoc,collection,query,where,getDocs}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";const id=new URLSearchParams(location.search).get('id');const esc=s=>String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');const allowed=(u,k)=>u['show'+k[0].toUpperCase()+k.slice(1)];async function load(){const u=await getDoc(doc(db,'users',id));if(!u.exists()||u.data().profilePublic===false){app.innerHTML='<div class="card">Säljarprofilen är inte offentlig.</div>';return;}const x=u.data(),name=x.companyName||x.name||'BILHK-användare';let info='';if(allowed(x,'phone')&&x.phone)info+=`<p><i class="fa-solid fa-phone"></i> ${esc(x.phone)}</p>`;if(allowed(x,'email')&&x.email)info+=`<p><i class="fa-solid fa-envelope"></i> ${esc(x.email)}</p>`;if(allowed(x,'address')&&x.address)info+=`<p><i class="fa-solid fa-location-dot"></i> ${esc(x.address)}</p>`;if(allowed(x,'website')&&x.website)info+=`<p><i class="fa-solid fa-globe"></i> <a href="${esc(x.website)}" target="_blank">Webbplats</a></p>`;app.innerHTML=`<div class="card" style="display:flex;gap:20px;align-items:center"><div class="avatar">${x.logoUrl?`<img src="${esc(x.logoUrl)}">`:esc(name.charAt(0))}</div><div><h1>${esc(name)}</h1><p style="color:#64748b">${x.userType==='Foretag'?'Företag':'Privatperson'}</p>${info}</div></div><h2 style="margin:20px 0">Aktiva annonser</h2><div class="grid" id="cars"></div>`;const s=await getDocs(query(collection(db,'cars'),where('sellerId','==',id)));s.forEach(d=>{const c=d.data();if(c.active===false)return;cars.insertAdjacentHTML('beforeend',`<div class="car" onclick="location.href='details.html?id=${d.id}'"><img src="${esc(c.images?.[0]||'placeholder.jpg')}" style="width:100%;height:170px;object-fit:cover"><div style="padding:16px"><h3>${esc(c.brand)} ${esc(c.model)}</h3><b style="color:var(--primary)">${Number(c.price||0).toLocaleString('sv-SE')} kr</b></div></div>`);});}load();</script></body></html>

<!DOCTYPE html>
<html lang="sv"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Säljarprofil | BILHK</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>:root{--primary:#f58220;--dark:#0f172a;--bg:#f8fafc;--border:#e2e8f0;--white:#fff;--muted:#64748b;--danger:#ef4444}*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,sans-serif}body{background:var(--bg);color:var(--dark);min-height:100vh;display:flex;flex-direction:column}a{text-decoration:none;color:inherit}header{background:white;border-bottom:1px solid var(--border);padding:15px 6%;display:flex;justify-content:space-between;align-items:center}.logo{font-size:26px;font-weight:900}.logo span{color:var(--primary)}.wrap{max-width:1120px;margin:38px auto;padding:0 20px;width:100%;flex:1}.profile{background:white;border:1px solid var(--border);border-radius:26px;padding:30px;margin-bottom:26px;display:flex;gap:20px;align-items:center}.avatar{width:90px;height:90px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:900;object-fit:cover}.name{font-size:28px;font-weight:900}.type{font-size:13px;color:var(--muted);font-weight:900}.info{display:flex;gap:14px;flex-wrap:wrap;margin-top:14px}.chip{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:10px 13px;font-size:13px;font-weight:800;color:#475569}.chip i{color:var(--primary);margin-right:5px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:20px}.card{background:white;border:1px solid var(--border);border-radius:20px;overflow:hidden;cursor:pointer}.card img{width:100%;height:190px;object-fit:cover}.card div{padding:17px}.price{font-size:21px;color:var(--primary);font-weight:900}.title{font-weight:900;margin-top:4px}.meta{color:var(--muted);font-size:12px;font-weight:800;margin-top:6px}.sold{position:absolute;top:12px;left:12px;background:var(--danger);color:white;font-size:11px;font-weight:900;padding:5px 10px;border-radius:7px}.empty{text-align:center;color:var(--muted);padding:45px;font-weight:800}footer{background:white;border-top:1px solid var(--border);padding:34px 20px;text-align:center;color:#94a3b8;font-size:13px;margin-top:auto}.footer-links{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}.footer-links a{font-weight:900;color:var(--muted)}</style></head><body><header><a href="index.html" class="logo">BIL<span>HK</span></a><a href="index.html" style="font-weight:900"><i class="fa-solid fa-arrow-left"></i> Tillbaka</a></header><main class="wrap" id="app"><div class="empty">Laddar säljarprofil...</div></main><footer><div class="footer-links"><a href="terms.html">Användarvillkor</a><a href="terms.html#disclaimer">Ansvarsfriskrivning</a></div><div>BILHK är en annonsplattform. Vi ansvarar inte för annonser, affärer, betalningar eller tvister mellan användare.</div></footer><script type="module">
import { db } from './firebase-config.js';
import { doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
const id=new URLSearchParams(location.search).get('id');const esc=v=>String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));const money=v=>Number(v||0).toLocaleString('sv-SE');
async function load(){if(!id){app.innerHTML='<div class="empty">Säljare saknas.</div>';return}const uSnap=await getDoc(doc(db,'users',id));if(!uSnap.exists()){app.innerHTML='<div class="empty">Säljaren hittades inte.</div>';return}const u=uSnap.data();if(!u.publicProfileEnabled){app.innerHTML='<div class="empty">Säljaren har inte gjort profilen offentlig.</div>';return}const name=u.companyName||u.name||u.displayName||'Säljare';let info='';if(u.publicPhone&&u.phone)info+=`<span class="chip"><i class="fa-solid fa-phone"></i>${esc(u.phone)}</span>`;if(u.publicEmail&&(u.contactEmail||u.email))info+=`<span class="chip"><i class="fa-solid fa-envelope"></i>${esc(u.contactEmail||u.email)}</span>`;if(u.publicWebsite&&u.website)info+=`<a class="chip" href="${esc(u.website)}" target="_blank" rel="noopener"><i class="fa-solid fa-globe"></i>${esc(u.website)}</a>`;if(u.publicAddress&&u.address)info+=`<span class="chip"><i class="fa-solid fa-location-dot"></i>${esc(u.address)}</span>`;const carsSnap=await getDocs(query(collection(db,'cars'),where('sellerId','==',id)));const cars=[];carsSnap.forEach(d=>cars.push({id:d.id,...d.data()}));app.innerHTML=`<section class="profile"><img class="avatar" src="${esc(u.logoUrl||'')}" onerror="this.outerHTML='<div class=&quot;avatar&quot;>${esc(name[0]||'S')}</div>'"><div><h1 class="name">${esc(name)}</h1><div class="type">${u.userType==='business'?'Företag':'Privatperson'}</div><div class="info">${info||'<span class="chip">Inga offentliga kontaktuppgifter.</span>'}</div></div></section><h2 style="font-size:22px;font-weight:900;margin-bottom:18px">Annonser från säljaren</h2><section class="grid">${cars.length?cars.map(c=>`<article class="card" onclick="location.href='details.html?id=${c.id}'" style="position:relative">${c.status==='sold'?'<span class="sold">SÅLD</span>':''}<img src="${esc(c.images?.[0]||'placeholder.jpg')}" style="${c.status==='sold'?'opacity:.65':''}"><div><div class="price">${money(c.price)} kr</div><div class="title">${esc(c.brand)} ${esc(c.model)}</div><div class="meta">${esc(c.year)} · ${esc(c.mileage||0)} mil</div></div></article>`).join(''):'<div class="empty">Inga annonser visas just nu.</div>'}</section>`}
load();
</script></body></html>

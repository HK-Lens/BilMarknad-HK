<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Säljarsida | BILHK</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>:root{--primary:#f58220;--dark:#0f172a;--bg:#f8fafc;--border:#e2e8f0;--gray:#64748b;--danger:#ef4444}*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif}body{background:var(--bg);color:var(--dark)}header{background:white;border-bottom:1px solid var(--border);padding:15px 6%;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:20}.logo{font-size:26px;font-weight:900;text-decoration:none;color:var(--dark)}.logo span{color:var(--primary)}header a{font-weight:800;text-decoration:none;color:var(--dark)}.container{max-width:1100px;margin:35px auto;padding:0 20px}.profile{background:white;border:1px solid var(--border);border-radius:24px;padding:30px;display:grid;grid-template-columns:90px 1fr;gap:20px;box-shadow:0 10px 30px rgba(0,0,0,.025);margin-bottom:25px}.avatar{width:90px;height:90px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:36px;font-weight:900}.name{font-size:28px;font-weight:900}.muted{color:var(--gray);font-size:14px;font-weight:700;margin-top:4px}.contacts{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}.contact{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:10px 13px;font-size:13px;font-weight:800;color:#334155}.contact i{color:var(--primary);margin-right:7px}.title{font-size:22px;font-weight:900;margin:28px 0 18px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:22px}.card{background:white;border:1px solid var(--border);border-radius:20px;overflow:hidden;cursor:pointer;transition:.2s;position:relative}.card:hover{transform:translateY(-4px);box-shadow:0 10px 25px rgba(0,0,0,.06)}.card img{width:100%;height:185px;object-fit:cover}.info{padding:18px}.price{color:var(--primary);font-size:21px;font-weight:900}.car{font-weight:900;margin-top:5px}.meta{color:var(--gray);font-size:13px;font-weight:700;margin-top:7px}.sold{position:absolute;top:12px;left:12px;background:var(--danger);color:white;font-weight:900;font-size:11px;padding:6px 10px;border-radius:7px}.empty{background:white;border:1px solid var(--border);border-radius:20px;padding:45px;text-align:center;color:var(--gray);font-weight:800}.lock{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:20px;padding:40px;text-align:center;font-weight:800;line-height:1.6}@media(max-width:650px){.profile{grid-template-columns:1fr;text-align:center}.avatar{margin:auto}.contacts{justify-content:center}}</style>
</head><body><header><a href="index.html" class="logo">BIL<span>HK</span></a><a href="index.html"><i class="fa-solid fa-arrow-left"></i> Tillbaka</a></header><main class="container" id="app"><div class="empty">Laddar säljarsida...</div></main>
<script type="module">
import {db} from './firebase-config.js';import{doc,getDoc,collection,query,where,getDocs,orderBy}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
const sellerId=new URLSearchParams(location.search).get('id');const app=document.getElementById('app');function esc(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}function val(...xs){for(const x of xs){if(x!==undefined&&x!==null&&String(x).trim()!=='')return x}return''}function money(v){return Number(v||0).toLocaleString('sv-SE')}function publicAllowed(u){return u.publicProfile===true||u.sellerProfilePublic===true||u.allowPublicContact===true}function show(u,field){const k='show'+field.charAt(0).toUpperCase()+field.slice(1);return publicAllowed(u)&&u[k]===true}
async function load(){if(!sellerId){app.innerHTML='<div class="empty">Säljar-ID saknas.</div>';return}const s=await getDoc(doc(db,'users',sellerId));if(!s.exists()){app.innerHTML='<div class="empty">Säljaren hittades inte.</div>';return}const u=s.data();if(!publicAllowed(u)){app.innerHTML='<div class="lock"><i class="fa-solid fa-lock" style="font-size:34px"></i><br>Den här säljaren har inte gjort sin säljarprofil offentlig ännu.</div>';return}let contacts='';if(show(u,'phone')&&u.phone)contacts+=`<div class="contact"><i class="fa-solid fa-phone"></i>${esc(u.phone)}</div>`;if(show(u,'email')&&(u.contactEmail||u.email))contacts+=`<div class="contact"><i class="fa-solid fa-envelope"></i>${esc(u.contactEmail||u.email)}</div>`;if(show(u,'website')&&u.website)contacts+=`<a class="contact" href="${esc(u.website)}" target="_blank" rel="noopener"><i class="fa-solid fa-globe"></i>${esc(u.website)}</a>`;if(show(u,'address')&&u.address)contacts+=`<div class="contact"><i class="fa-solid fa-location-dot"></i>${esc(u.address)}</div>`;let ads='';try{const q=query(collection(db,'cars'),where('sellerId','==',sellerId),orderBy('createdAt','desc'));const snap=await getDocs(q);snap.forEach(d=>{const c=d.data(),sold=c.status==='sold';ads+=`<div class="card" onclick="location.href='details.html?id=${encodeURIComponent(d.id)}'">${sold?'<div class="sold">SÅLD</div>':''}<img src="${esc(c.images?.[0]||'placeholder.jpg')}" style="${sold?'opacity:.65':''}"><div class="info"><div class="price">${money(c.price)} kr</div><div class="car">${esc(`${val(c.brand)} ${val(c.model)}`.trim())}</div><div class="meta">${esc(val(c.year,'-'))} | ${esc(val(c.mileage,c.mil,0))} mil | ${esc(val(c.fuel,c.fuelType,'-'))}</div></div></div>`})}catch(e){console.error(e)}const name=esc(val(u.companyName,u.name,u.email,'Säljare'));app.innerHTML=`<section class="profile"><div class="avatar">${name.charAt(0).toUpperCase()}</div><div><div class="name">${name}</div><div class="muted">Offentlig säljarprofil på BILHK</div><div class="contacts">${contacts||'<span class="muted">Säljaren har inte valt att visa kontaktuppgifter.</span>'}</div></div></section><h2 class="title">Annonser från denna säljare</h2><div class="grid">${ads||'<div class="empty">Inga annonser hittades.</div>'}</div>`}
load();
</script></body></html>

<!DOCTYPE html>
<html lang="sv" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Avancerad Sökning | BILHK Professional Search</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #f58220;
            --primary-dark: #d66d0d;
            --primary-soft: #fff5eb;
            --dark: #0f172a;
            --dark-2: #1e293b;
            --muted: #64748b;
            --soft: #f8fafc;
            --border: #e2e8f0;
            --white: #ffffff;
            --shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background: var(--white);
            color: var(--dark);
            overflow-x: hidden;
            padding-bottom: 100px; /* مساحة للزر العائم */
        }

        /* --- Header --- */
        header {
            padding: 20px 6%;
            background: var(--white);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .btn-close {
            background: var(--soft);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--dark);
            transition: 0.3s;
        }
        .btn-close:hover { background: var(--border); }

        .filter-title { font-size: 18px; font-weight: 800; }

        .btn-reset {
            color: var(--muted);
            font-size: 14px;
            font-weight: 600;
            background: none;
            border: none;
            cursor: pointer;
        }

        /* --- Filter Container --- */
        .filter-container {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .section-header {
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            margin: 35px 0 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* --- Body Type Selector --- */
        .body-type-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
        }

        .type-card {
            background: var(--soft);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .type-card i { font-size: 24px; color: var(--muted); margin-bottom: 8px; display: block; }
        .type-card span { font-size: 12px; font-weight: 700; color: var(--dark-2); }

        .type-card:hover { border-color: var(--primary); background: var(--primary-soft); }
        .type-card.active { border-color: var(--primary); background: var(--primary); }
        .type-card.active i, .type-card.active span { color: var(--white); }

        /* --- Input Groups --- */
        .input-group { margin-bottom: 25px; }
        
        .select-wrapper { position: relative; }
        .select-wrapper i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }

        .filter-select, .filter-input {
            width: 100%;
            padding: 16px 18px 16px 50px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--soft);
            font-size: 15px;
            font-weight: 600;
            appearance: none;
            transition: 0.3s;
        }

        .filter-select:focus, .filter-input:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--white);
            box-shadow: 0 0 0 4px var(--primary-soft);
        }

        /* --- Range Grid (Min - Max) --- */
        .range-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .range-item { position: relative; }
        .range-item span {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 13px;
            font-weight: 700;
            color: var(--muted);
        }

        /* --- Footer Action --- */
        .footer-action {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            padding: 20px 6%;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: center;
            z-index: 1000;
        }

        .btn-apply {
            width: 100%;
            max-width: 600px;
            background: var(--dark);
            color: var(--white);
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-apply:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); background: var(--primary); }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .body-type-grid { grid-template-columns: repeat(3, 1fr); }
            .range-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="btn-close"><i class="fa-solid fa-xmark"></i></a>
        <div class="filter-title">Sökfilter</div>
        <button class="btn-reset" id="resetBtn">Rensa allt</button>
    </header>

    <div class="filter-container">
        
        <div class="section-header">Karosstyp</div>
        <div class="body-type-grid">
            <div class="type-card" data-kar="SUV">
                <i class="fa-solid fa-truck-monster"></i>
                <span>SUV</span>
            </div>
            <div class="type-card" data-kar="Kombi">
                <i class="fa-solid fa-car-side"></i>
                <span>Kombi</span>
            </div>
            <div class="type-card" data-kar="Sedan">
                <i class="fa-solid fa-car"></i>
                <span>Sedan</span>
            </div>
            <div class="type-card" data-kar="Halvkombi">
                <i class="fa-solid fa-car-rear"></i>
                <span>Hatchback</span>
            </div>
            <div class="type-card" data-kar="Coupé">
                <i class="fa-solid fa-car-tilt"></i>
                <span>Coupé</span>
            </div>
            <div class="type-card" data-kar="Cabriolet">
                <i class="fa-solid fa-car-convertible"></i>
                <span>Cab</span>
            </div>
        </div>

        <div class="section-header">Märke & Modell</div>
        <div class="input-group">
            <div class="select-wrapper">
                <i class="fa-solid fa-tag"></i>
                <select id="brandSel" class="filter-select">
                    <option value="all">Alla märken</option>
                </select>
            </div>
        </div>
        <div class="input-group">
            <div class="select-wrapper">
                <i class="fa-solid fa-car-side"></i>
                <select id="modelSel" class="filter-select" disabled>
                    <option value="all">Alla modeller</option>
                </select>
            </div>
        </div>

        <div class="section-header">Pris (SEK)</div>
        <div class="range-grid">
            <div class="range-item">
                <i class="fa-solid fa-money-bill-1" style="position:absolute; left:18px; top:50%; transform:translateY(-50%); color:var(--muted); z-index:1;"></i>
                <input type="number" id="minPrice" class="filter-input" placeholder="Från">
                <span>kr</span>
            </div>
            <div class="range-item">
                <input type="number" id="maxPrice" class="filter-input" placeholder="Till">
                <span>kr</span>
            </div>
        </div>

        <div class="section-header">Miltal</div>
        <div class="range-grid">
            <div class="range-item">
                <i class="fa-solid fa-gauge-high" style="position:absolute; left:18px; top:50%; transform:translateY(-50%); color:var(--muted); z-index:1;"></i>
                <input type="number" id="minMil" class="filter-input" placeholder="Från">
                <span>mil</span>
            </div>
            <div class="range-item">
                <input type="number" id="maxMil" class="filter-input" placeholder="Till">
                <span>mil</span>
            </div>
        </div>

        <div class="section-header">Modellår</div>
        <div class="range-grid">
            <div class="range-item">
                <i class="fa-solid fa-calendar-days" style="position:absolute; left:18px; top:50%; transform:translateY(-50%); color:var(--muted); z-index:1;"></i>
                <input type="number" id="minYear" class="filter-input" placeholder="Från">
            </div>
            <div class="range-item">
                <input type="number" id="maxYear" class="filter-input" placeholder="Till">
            </div>
        </div>

        <div class="section-header">Drivlina & Växellåda</div>
        <div class="range-grid">
            <div class="select-wrapper">
                <i class="fa-solid fa-gas-pump"></i>
                <select id="fuelSel" class="filter-select">
                    <option value="all">Alla bränslen</option>
                    <option value="Bensin">Bensin</option>
                    <option value="Diesel">Diesel</option>
                    <option value="El">Elbil</option>
                    <option value="Hybrid">Hybrid</option>
                </select>
            </div>
            <div class="select-wrapper">
                <i class="fa-solid fa-gear"></i>
                <select id="gearSel" class="filter-select">
                    <option value="all">Alla växellådor</option>
                    <option value="Automat">Automat</option>
                    <option value="Manuell">Manuell</option>
                </select>
            </div>
        </div>

    </div>

    <div class="footer-action">
        <button class="btn-apply" id="applyBtn">
            <span>Visa resultat</span>
            <i class="fa-solid fa-arrow-right"></i>
        </button>
    </div>

    <script type="module">
        import carData from './cars-data.js';

        const brandSel = document.getElementById('brandSel');
        const modelSel = document.getElementById('modelSel');
        let selectedKar = 'all';

        // 1. تعبئة الماركات
        function initBrands() {
            Object.keys(carData).sort().forEach(brand => {
                const opt = document.createElement('option');
                opt.value = brand;
                opt.textContent = brand;
                brandSel.appendChild(opt);
            });
        }

        // 2. تحديث الموديلات بناءً على الماركة
        brandSel.onchange = () => {
            const brand = brandSel.value;
            modelSel.innerHTML = '<option value="all">Alla modeller</option>';
            
            if (brand !== 'all' && carData[brand]) {
                modelSel.disabled = false;
                carData[brand].sort().forEach(model => {
                    const opt = document.createElement('option');
                    opt.value = model;
                    opt.textContent = model;
                    modelSel.appendChild(opt);
                });
            } else {
                modelSel.disabled = true;
            }
        };

        // 3. اختيار نوع الهيكل
        document.querySelectorAll('.type-card').forEach(card => {
            card.onclick = () => {
                if (card.classList.contains('active')) {
                    card.classList.remove('active');
                    selectedKar = 'all';
                } else {
                    document.querySelectorAll('.type-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    selectedKar = card.dataset.kar;
                }
            };
        });

        // 4. تصفير الفلاتر
        document.getElementById('resetBtn').onclick = () => {
            document.querySelectorAll('input').forEach(i => i.value = '');
            document.querySelectorAll('select').forEach(s => s.value = 'all');
            document.querySelectorAll('.type-card').forEach(c => c.classList.remove('active'));
            selectedKar = 'all';
            modelSel.disabled = true;
        };

        // 5. تطبيق البحث والتحويل لصفحة النتائج
        document.getElementById('applyBtn').onclick = () => {
            const params = new URLSearchParams();

            const fields = {
                brand: brandSel.value,
                model: modelSel.value,
                fuel: document.getElementById('fuelSel').value,
                gear: document.getElementById('gearSel').value,
                minP: document.getElementById('minPrice').value,
                maxP: document.getElementById('maxPrice').value,
                minM: document.getElementById('minMil').value,
                maxM: document.getElementById('maxMil').value,
                minY: document.getElementById('minYear').value,
                maxY: document.getElementById('maxYear').value
            };

            // إضافة الحقول التي تحتوي على قيمة فقط
            Object.entries(fields).forEach(([key, val]) => {
                if (val && val !== 'all') params.set(key, val);
            });

            if (selectedKar !== 'all') params.set('kar', selectedKar);

            // الانتقال لصفحة النتائج مع المعاملات
            window.location.href = `results-fixed.html?${params.toString()}`;
        };

        initBrands();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lägg till Annons | BilMarknad-HK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #f58220; --dark: #0f172a; --bg: #f8fafc; --border: #e2e8f0; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--dark); padding: 20px; }
        .form-card { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        h1 { margin-bottom: 25px; font-weight: 900; font-size: 24px; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 700; margin-bottom: 6px; font-size: 14px; color: #64748b; }
        input, select, textarea { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; font-size: 15px; outline: none; background: #f8fafc; transition: 0.3s; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); background: white; }
        .btn-submit { width: 100%; padding: 16px; background: var(--dark); color: white; border: none; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .btn-submit:hover { background: #1e293b; }
        .btn-submit:disabled { background: #cbd5e1; cursor: not-allowed; }
    </style>
</head>
<body>
<div class="form-card">
    <h1>Publicera Annons</h1>
    <form id="sellForm">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group"><label>Märke</label><input type="text" id="brand" required></div>
            <div class="form-group"><label>Modell</label><input type="text" id="model" required></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group"><label>År</label><input type="number" id="year" required></div>
            <div class="form-group"><label>Pris (kr)</label><input type="number" id="price" required></div>
        </div>
        <div class="form-group"><label>Miltal</label><input type="number" id="mileage" required></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>Växellåda</label>
                <select id="transmission"><option>Automat</option><option>Manuell</option></select>
            </div>
            <div class="form-group">
                <label>Bränsle</label>
                <select id="fuelType"><option>Bensin</option><option>Diesel</option><option>El</option><option>Hybrid</option></select>
            </div>
        </div>
        <div class="form-group"><label>Beskrivning</label><textarea id="description" rows="4"></textarea></div>
        <div class="form-group"><label>Bilder (Max 5MB)</label><input type="file" id="images" multiple accept="image/*" required></div>
        <button type="submit" class="btn-submit" id="submitBtn">Publicera nu</button>
    </form>
    <button onclick="window.location.href='index.html'" style="width:100%; padding:15px; background:transparent; border:none; color:#64748b; font-weight:700; cursor:pointer; margin-top:5px;">Avbryt</button>
</div>

<script type="module">
    import { auth, db, storage } from './firebase-config.js';
    import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    let currentUser = null;
    onAuthStateChanged(auth, (user) => { 
        if (user) currentUser = user;
        else window.location.href = "login.html"; 
    });

    document.getElementById('sellForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; 
        btn.innerText = "Laddar upp...";

        try {
            const files = document.getElementById('images').files;
            const imageUrls = [];
            
            for (let file of files) {
                if(file.size > 5 * 1024 * 1024) {
                    Swal.fire('Fel', 'En av bilderna är för stor (Max 5MB).', 'error');
                    btn.disabled = false;
                    btn.innerText = "Publicera nu";
                    return;
                }
                const sRef = ref(storage, `cars/${Date.now()}_${file.name}`);
                await uploadBytes(sRef, file);
                imageUrls.push(await getDownloadURL(sRef));
            }

            // 💡 السر هنا: يجب التأكد من حفظ sellerId
            await addDoc(collection(db, "cars"), {
                brand: document.getElementById('brand').value,
                model: document.getElementById('model').value,
                year: Number(document.getElementById('year').value),
                price: Number(document.getElementById('price').value),
                mileage: Number(document.getElementById('mileage').value),
                fuelType: document.getElementById('fuelType').value,
                transmission: document.getElementById('transmission').value,
                description: document.getElementById('description').value,
                images: imageUrls,
                sellerId: currentUser.uid, // هذا السطر هو الذي يربط الإعلان بحسابك!
                active: true, 
                createdAt: serverTimestamp()
            });

            await Swal.fire('Klar!', 'Din annons är nu publicerad.', 'success');
            window.location.href = "my-account.html"; // توجيهك فوراً لحسابك لترى الإعلان
        } catch (err) { 
            Swal.fire('Fel!', 'Ett fel uppstod: ' + err.message, 'error');
            btn.disabled = false; 
            btn.innerText = "Publicera nu";
        }
    };
</script>
</body>
</html>

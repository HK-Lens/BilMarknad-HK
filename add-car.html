<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة إعلان | BilMarknad-HK</title>
    <style>
        :root { --primary: #0056b3; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
        #status { text-align: center; margin-top: 15px; font-weight: bold; color: var(--primary); }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #666; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:var(--primary)">أنشئ إعلانك الآن</h2>
    <form id="addCarForm">
        <div class="form-group"><label>الماركة والموديل (مثلاً: Volvo XC90)</label><input type="text" id="title" required></div>
        <div class="form-group"><label>السعر بالكرون (SEK)</label><input type="number" id="price" required></div>
        <div class="form-group"><label>المسافة (Mil)</label><input type="text" id="mileage" required></div>
        <div class="form-group"><label>المدينة</label><input type="text" id="location" required></div>
        <div class="form-group"><label>صورة السيارة</label><input type="file" id="imageFile" accept="image/*" required></div>
        <div class="form-group"><label>تفاصيل إضافية</label><textarea id="desc" rows="3"></textarea></div>
        <button type="submit" class="btn-submit" id="submitBtn">نشر الإعلان</button>
    </form>
    <div id="status"></div>
    <a href="index.html" class="back-link">← العودة للرئيسية</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDCsMbG5pT3y6MC6b05LEdFoByWM1nT7NY",
        authDomain: "bilmarknad-hk.firebaseapp.com",
        projectId: "bilmarknad-hk",
        storageBucket: "bilmarknad-hk.firebasestorage.app",
        messagingSenderId: "284008879407",
        appId: "1:284008879407:web:66bee60b51ec277e8dbdda"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // التحقق من الدخول
    onAuthStateChanged(auth, (user) => {
        if (!user) {
            alert("يرجى تسجيل الدخول أولاً");
            window.location.href = 'login.html';
        }
    });

    document.getElementById('addCarForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('status');
        
        btn.disabled = true;
        status.innerText = "جاري رفع البيانات والصورة... انتظر قليلاً";

        const file = document.getElementById('imageFile').files[0];
        // إنشاء مسار فريد للصورة في Storage
        const storageRef = ref(storage, 'car_images/' + Date.now() + "_" + file.name);

        try {
            // 1. محاولة رفع الصورة إلى Storage
            const snapshot = await uploadBytes(storageRef, file);
            const imgUrl = await getDownloadURL(snapshot.ref);

            // 2. حفظ البيانات في Firestore
            await addDoc(collection(db, "cars"), {
                title: document.getElementById('title').value,
                price: document.getElementById('price').value,
                mileage: document.getElementById('mileage').value,
                location: document.getElementById('location').value,
                description: document.getElementById('desc').value,
                imageUrl: imgUrl,
                sellerEmail: auth.currentUser.email,
                createdAt: new Date()
            });

            status.style.color = "green";
            status.innerText = "🎉 تم النشر بنجاح! سيتم توجيهك للرئيسية...";
            setTimeout(() => window.location.href = 'index.html', 2000);
            
        } catch (error) {
            console.error("Firebase Error:", error);
            status.style.color = "red";
            if (error.code === 'storage/unauthorized') {
                status.innerText = "خطأ: ميزة Storage غير مفعلة أو تحتاج Billing.";
            } else {
                status.innerText = "حدث خطأ: " + error.message;
            }
            btn.disabled = false;
        }
    };
</script>
</body>
</html>

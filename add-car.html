<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة سيارة | BilMarknad-HK</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-storage-compat.js"></script>

    <style>
        :root { --primary: #0056b3; --bg: #f8f9fa; }
        body { font-family: sans-serif; background: var(--bg); padding: 20px; }
        .form-card { max-width: 600px; margin: auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); text-align: center; }
        .input-group { margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 15px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        #loadingStatus { display: none; color: var(--primary); font-weight: bold; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="form-card">
    <h2>إضافة إعلان جديد | Skapa annons</h2>
    
    <form id="addCarForm">
        <div class="input-group">
            <label>ماركة السيارة وموديلها (Märke & Modell)</label>
            <input type="text" id="title" placeholder="مثلاً: Volvo XC60" required>
        </div>

        <div class="input-group" style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>السنة (Årsmodell)</label>
                <input type="number" id="year" placeholder="2022" required>
            </div>
            <div style="flex: 1;">
                <label>السعر (Pris - SEK)</label>
                <input type="number" id="price" placeholder="250000" required>
            </div>
        </div>

        <div class="input-group">
            <label>المسافة المقطوعة (Miltal)</label>
            <input type="text" id="mileage" placeholder="مثلاً: 5000 mil" required>
        </div>

        <div class="input-group">
            <label>صور السيارة (Bilder)</label>
            <input type="file" id="imageInput" accept="image/*" multiple required>
            <small style="color: #888;">سيتم ضغط الصور تلقائياً لسرعة التحميل</small>
        </div>

        <div id="loadingStatus">جاري ضغط الصور ورفع الإعلان...</div>
        <button type="submit" class="btn-submit" id="submitBtn">نشر الإعلان الآن</button>
    </form>
</div>

<script>
    // 1. ضع إعدادات Firebase الخاصة بك هنا
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "bilmarknad-hk.firebaseapp.com",
        projectId: "bilmarknad-hk",
        storageBucket: "bilmarknad-hk.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();
    const auth = firebase.auth();

    // دقة ضغط الصور: سنقلل الأبعاد لتوفير مساحة
    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1200; // تصغير العرض لـ 1200 بكسل فقط
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.7); // جودة 70% مثالية للمواقع
                };
            };
        });
    }

    document.getElementById('addCarForm').onsubmit = async (e) => {
        e.preventDefault();
        
        const user = auth.currentUser;
        if (!user) {
            alert("يرجى تسجيل الدخول أولاً!");
            return;
        }

        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('loadingStatus');
        btn.disabled = true;
        status.style.display = "block";

        const files = document.getElementById('imageInput').files;
        const imageUrls = [];

        try {
            // رفع الصور بعد ضغطها
            for (let file of files) {
                const compressedBlob = await compressImage(file);
                const storageRef = storage.ref(`cars/${Date.now()}_${file.name}`);
                const snapshot = await storageRef.put(compressedBlob);
                const url = await snapshot.ref.getDownloadURL();
                imageUrls.push(url);
            }

            // إضافة البيانات إلى Firestore (هنا تبدأ الـ Collection)
            await db.collection("cars").add({
                title: document.getElementById('title').value,
                price: Number(document.getElementById('price').value),
                year: Number(document.getElementById('year').value),
                mileage: document.getElementById('mileage').value,
                images: imageUrls,
                sellerId: user.uid,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            alert("تم نشر إعلانك بنجاح!");
            window.location.href = "index.html";

        } catch (error) {
            console.error(error);
            alert("حدث خطأ أثناء الرفع");
            btn.disabled = false;
            status.style.display = "none";
        }
    };
</script>
</body>
</html>

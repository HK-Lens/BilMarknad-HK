<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sälj din bil | BILHK</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .sell-container { max-width: 800px; margin: 40px auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: 1 / -1; }
        label { font-weight: 700; font-size: 13px; color: var(--text-muted); display: block; margin-bottom: 8px; }
        textarea { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); min-height: 120px; outline: none; }
        textarea:focus { border-color: var(--primary); }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BIL<span>HK</span></a>
</header>

<div class="container">
    <div class="sell-container">
        <h2>Lägg upp din bil för försäljning</h2>
        <p style="margin-bottom: 30px; color: var(--text-muted);">Fyll i detaljerna nedan för att publicera din annons.</p>

        <form id="sellForm">
            <div class="form-grid">
                <div class="field-group">
                    <label>Märke</label>
                    <select id="brand" required>
                        <option value="">Välj märke</option>
                    </select>
                </div>
                <div class="field-group">
                    <label>Modell</label>
                    <input type="text" id="model" placeholder="t.ex. Golf, V60..." required>
                </div>
                <div class="field-group">
                    <label>Årsmodell</label>
                    <input type="number" id="year" placeholder="2022" required>
                </div>
                <div class="field-group">
                    <label>Miltal (mil)</label>
                    <input type="number" id="mileage" placeholder="5000" required>
                </div>
                <div class="field-group">
                    <label>Bränsle</label>
                    <select id="fuelType">
                        <option value="Bensin">Bensin</option>
                        <option value="Diesel">Diesel</option>
                        <option value="El">El</option>
                        <option value="Hybrid">Hybrid</option>
                    </select>
                </div>
                <div class="field-group">
                    <label>Växellåda</label>
                    <select id="transmission">
                        <option value="Automat">Automat</option>
                        <option value="Manuell">Manuell</option>
                    </select>
                </div>
                <div class="field-group">
                    <label>Pris (kr)</label>
                    <input type="number" id="price" placeholder="150000" required>
                </div>
                <div class="field-group">
                    <label>Färg</label>
                    <input type="text" id="color" placeholder="Svart">
                </div>
                
                <div class="field-group full-width">
                    <label>Beskrivning</label>
                    <textarea id="description" placeholder="Berätta mer om bilens skick, utrustning m.m."></textarea>
                </div>

                <div class="field-group full-width">
                    <label>Bilder</label>
                    <input type="file" id="photoFiles" multiple accept="image/*" required>
                </div>
            </div>

            <button type="submit" class="btn-search-submit" id="submitBtn">Publicera annons</button>
        </form>
    </div>
</div>

<script type="module">
    // استيراد البيانات والإعدادات
    import { carData } from './cars-data.js'; 
    import { db, storage, auth } from './firebase-config.js';
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    let currentUserId = null;

    // تعبئة قائمة الماركات ديناميكياً من ملف cars-data.js
    const brandSelect = document.getElementById('brand');
    if (carData && brandSelect) {
        Object.keys(carData).sort().forEach(brand => {
            let opt = document.createElement('option');
            opt.value = brand;
            opt.innerText = brand;
            brandSelect.appendChild(opt);
        });
    }

    // التحقق من حالة تسجيل الدخول
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUserId = user.uid;
        } else {
            alert("Du måste vara inloggad för att sälja.");
            window.location.href = "login.html";
        }
    });

    document.getElementById('sellForm').onsubmit = async (e) => {
        e.preventDefault();
        
        if (!currentUserId) return alert("Väntar على تسجيل الدخول...");

        const btn = document.getElementById('submitBtn');
        const files = document.getElementById('photoFiles').files;

        if (files.length === 0) return alert("Vänligen välj minst en bild.");

        btn.disabled = true;
        btn.innerText = "Laddar upp bilder...";

        try {
            const imageUrls = [];
            // رفع الصور إلى Firebase Storage
            for (let file of files) {
                const sRef = ref(storage, `cars/${Date.now()}_${file.name}`);
                const snap = await uploadBytes(sRef, file);
                const url = await getDownloadURL(snap.ref);
                imageUrls.push(url);
            }

            btn.innerText = "Sparar annons...";

            // حفظ بيانات السيارة في Firestore مع ربطها بالـ sellerId للمستخدم الحالي
            await addDoc(collection(db, "cars"), {
                brand: document.getElementById('brand').value,
                model: document.getElementById('model').value,
                year: Number(document.getElementById('year').value),
                mileage: Number(document.getElementById('mileage').value),
                fuelType: document.getElementById('fuelType').value,
                transmission: document.getElementById('transmission').value,
                price: Number(document.getElementById('price').value),
                color: document.getElementById('color').value,
                description: document.getElementById('description').value,
                images: imageUrls,
                sellerId: currentUserId, // لظهورها في صفحة "حسابي"
                createdAt: serverTimestamp()
            });

            alert("Annonsen har publicerats!");
            window.location.href = "my-account.html";

        } catch (err) {
            console.error("Error:", err);
            alert("Ett fel uppstod: " + err.message);
            btn.disabled = false;
            btn.innerText = "Publicera annons";
        }
    };
</script>
</body>
</html>
